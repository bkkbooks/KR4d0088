  text: 后山詩註卷第三
  hash: sha256:a14e41cdf2efc3eaa1395ab9e06993359752407ab3d247946b41f6a914fb6edf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_003-1a}
body:
  text: 觀兖文忠公家六一堂圖書國生世何用早我已後此翁柳子厚荅􅀽饒州論陸先生春秋書曰若吾生前距此數十年則不得是學矣今適後之不爲不遇也此句頗用其意且爲下句張本曹子建求自試表曰士之生世入則事父出則事君頗識門下士南豐東坡皆六一門下士東坡送曽子固詩曰醉翁門下士雜沓難爲賢略已聞其風莊子􅄂篇曰墨翟禽滑釐聞其風而恱之中年見二子晉書王羲之􅀓謝安曰中年以來傷於哀樂二子謂棐與辯棐字叔弼辯字季黙已復􅀊一終左􅀓晉侯曰十二年是謂一終一星終也呼我過其廬所得非所蒙漢書禹貢􅀓誠非草茅愚臣所宜蒙也先朝群玉殿范蜀公東齋記嘉祐七年十二月二十三日召近臣天章閣下觀書閱瑞物上親作飛白書令左右搢笏以觀又令王禹玉䟦尾人賜一紙旣而置酒羣玉殿云云歐公有謝賜飛白書詩并序其遊其事長編丙申庚子凢两宴羣玉殿賜書在丙申冠佩環群公雲漢詩羣公先正神文燠王度仁宗謚號神文聖武眀孝皇帝左􅀓曰思我王度式如玉式如金喜色見天容老杜詩天顔有喜近臣知東坡詩天容玉色誰敢􅀞御榻誰復登法書要録曰唐太宗宴玄武門作飛白書衆臣乗酒就太宗手中相競散􅀐常侍劉泊登御床引手然後得之帝書元自工此言仁宗之書元自工非因揣而大也下句蓋終此意南史劉穆之􅀓宋武帝書素拙穆之曰公但縱筆爲大字一字徑尺無嫌大旣是有所包其勢亦羙帝從之一􅁓不過六七字便滿故東坡謝賜御書表曰筆縱字大笑宋武之未工黃絹兩大字老杜詩欝欝三大字蛟龍岌相纒一覽涕無從世􅀃王東亭曰一覽而盡禮記孔子曰予惡夫涕之無從似欲託其子天意人與同謂英廟曰孟子曰天與子則與子韓魏公作仁宗哀冊叙羣玉賜書事云因疑前㑹之非常似與羣玉之叙訣意當時必有顧託之語也七年八月英宗立爲皇子十二月宴羣玉皇子與宴又召韓􅄾至御榻前賜酒一巵明年三月仁宗崩歷數况有歸尚書舜命禹曰天之歷數在汝躬敢有貪天功左􅀓晉侯賞從亡者介之推不言禄曰天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以爲已力不亦誣乎􅀼人之財猶謂之盗况貪天之功以爲已力乎初元豐三年王堯臣之子同老上書言其父定䇿之功詔贈太師元祐五年殿中侍御史賈易言堯臣揜韓􅄾之大勲故此句指其事集古一千句明明並群雄集古目錄䟦見居士集誰為第一手未有百世公百世公謂公論也與上羣公韻不相妨南史齊髙帝甞與王僧䖍賭書筆帝曰誰爲第一僧䖍對曰臣書臣中第一陛下當帝中第一廟器刻科斗寳樽播華蟲尚書序䟽曰科斗書古文也所謂蒼頡本體尚書注華蟲雉也宗廟彛樽亦以山龍華蟲爲飾此言集古鍾鼎書緬懐弁服士酬獻鳴瑽瑢弁服士謂陪􅀕諸臣韻書曰瑽瑢佩聲也文選潘岳西征賦曰想佩聲之遺響若鏗鏘之在耳揷架一萬軸退之詩鄴侯家多書揷架三萬軸遺子以固窮前漢韋賢􅀓遺子黄金滿籝不如教子通一經固窮見魯論素琴乆絶絃晉書陶潜􅀓蓄素琴一張弦徽不具韓詩外傳鍾子期死伯牙擗琴絶弦棊酒頗闕供自集古一千卷以下至此已見前卷贈叔弼詩春明退朝録曰宗衮甞言律云可從而違堪供而闕亞六經之文明皇幸蜀記韋諤曰先無闕擬又恐闕供此借用向来一瓣香敬為曽南豐世雖嫡孫行向來見上注諸方開堂至第三瓣香推本其得法所自則云此一瓣香敬爲某人云云曾鞏子固建昌南豐人於歐公猶宗門中嫡子而后山又師南豐乃其孫也后山以東坡薦得官作此詩時東坡政爲郡守終無少貶阿附之意可謂特立之士矣然亦知東坡之大必能受之也名在惡子中此后山自貶損也前漢尹賞􅀓賞爲長安令舉長安中輕薄少年惡子悉籍記之斯人日已逺千嵗幸一逢老杜詩古人日已逺青史字不泯東坡答舒煥書云歐陽公天人也天之生斯人意其甚難非且使之休息千百年恐未能復生斯人也吾老不可待草露濕寒蛬草露濕寒蛬自言哀傷之意􅀉於詩什如秋䖝之悲鳴也歐公詩蓋云堪笑區區郊與島螢飛濕露吟秋草老杜詩草露亦多濕送蘇迨胷中歷歷着千年北史崔㥄傳鄭伯猷歎曰胷中貯千卷書使人邦得不畏服老杜詩歷歴開元事分眀在目前􅀓燈録智常禪師謂李渤曰使君摩頂放踵如椰葉大萬卷書在何處着此詩用着字甚佳筆下源源赴百川唐蔣渙送魏淄州序云筆海納流於百川詞峯削成於二華孟子注云源源如流水與源通筍子宥坐篇論水曰其赴千仞之谷不惧似勇謝靈運擬魏太子詩曰百川赴巨海真字飄􅀭今有種真字多患窘束惟東坡筆墨超然於楷法之外退之雪詩波濤何飄揚漢書陳勝􅀓侯王將相寧有種耶清談絶倒古無傳絶倒見上注孟子曰是以後世無􅀓焉岀塵觧悟多為路􅀓燈録譲禪師曰汝等六人同證吾身各契一路此言多爲路言當開廣不着一邉也随世功名小着鞭言不用汲汲於功名也着鞭見上注樂天詩青雲上了無多路却要徐驅穏着鞭白首相逢恐無日幾時書扎到林泉選詩客從逺方來惠我一書扎老杜詩時應問衰病書䟽及滄浪送黄生兼􅀉二謝二首南第諸兄蚤相見南第猶言南宅也南史元凶劭傳有此字别時託子以無倦南史謝弘微􅀓叔父混爲韻語以奨勸靈運等並有戒厲之言唯弘微獨盡褒羙曰微子基微尚無倦由慕䉮勿輕一簣少進徃必千仞后山詩意謂黄生諸兄以其弟託之爲其好學蓋知所慕向也百年論交見子知老杜詩論交翻恨晚百歳言其乆要也左傳曰他日吾見子面而已今吾見子之心矣一朝取别寧吾願老杜詩取别何草草按十二國史云宓子賤爲單父宰行過楊晝取别淵明歸去來辭曰富貴非吾願妙􅀊逺遊真所難言其不懐安也肯爲得官近長安唐人語曰欲得官近長安聖作詩書端有意猶須用心科舉外意譏王氏經術其送邢居實序論之詳矣又城西兩謝俱能文穰丞精悍吾所聞謝景初字師厚二子悰愔皆知名穰縣今屬鄧州漢書嚴延年爲人短小精悍毎讀吾詩得人意南史何遜􅀓沈約曰吾毎讀卿詩一日三復猶不能巳後漢禰衡爲黄祖作書記輕重踈密各得其體祖曰處士正得祖意如祖腹中之所欲言也使不能文巳可人世􅀃謝安少時請阮光禄道白馬于時謝不即解阮語重相諮盡阮乃歎曰非但能言人不可得正索解人亦不可得禮記􅄂記曰管仲遇盗取二人焉上以爲公臣曰所與遊辟也可人也我昔謝公門下士早年妄作功名意如今老􅀉頴河東九泉雖深愧此公謝公即師厚退之送陸暢詩我實門下士力薄蜹與蚊受恩不即報永􅀒相中墳暢蓋長源之子也此詩略采其意次韻蘇公西湖徙魚三首窮秋積雨不破塊霜落西湖露沙背退之詩嗷嗷鳴鴈鳴且飛窮秋南去春北歸又詩時秋積雨霽西京􅄂記董仲舒曰太平之時雨不破塊大魚泥蟠小魚樂楊子曰龍蟠於泥蚢其肆矣荘子曰儵魚出遊從容是魚樂也老杜詩小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈強泥沙有時立髙丘覆杯水如帶言水淺而丘露其狀如此爾雅釋丘曰如覆敦者敦丘注云敦盂也何遜􅄂詩湓水縈如帶魚窮不作揺尾憐退之與韋舎人書若俛首帖耳揺尾而乞憐者非我之志也公寧忍口不忍鱠樂天詩忍心两三日莫作破齋人東坡元韻云老守縱饞那忍鱠􅁱鱗失水玉參差柳子厚鏡歌曲曰手援天矛截脩鱗荘子曰吞舟之魚湯而失水晚日揺光金破碎退之詩竹影金􅃈碎此借用以言鱗鬛映日而光也咫尺波濤有生死安知平陸無灘瀬老杜觀打魚歌云咫尺波濤永相失又詩終然减灘瀬此身寧供刀几用着意更須風雨外御史言蘇公􅃇詩有聞諱而喜之語公遂其外􅀘得頴州后山詩意或謂此後篇又云防有任公釣江海亦此意也史記樊噲曰人方爲刀爼我爲魚􅁏續世􅀃曰周玄豹有􅀽許之術見王都曰形若鯉魚難免刀杌都竟被殺東坡詩天公自着意是間相忘不為小左􅀓蹇叔曰必死是間荘子曰魚相忘於江湖濠上之意誰得㑹莊子與恵子遊於濠梁之上荘子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂枯魚雖泣悔可及古樂府曰枯魚過河泣何時復還入作書與魴鱮相教慎出入莫待西江與東海以上四句皆終前意言外郡亦足爲樂優㳺卒歳可以避禍也莊子曰周顧視車轍中有鮒魚問之對曰我東海之波臣也君豈有斗升之水而活我㢤周曰我且南遊呉越之王激西江之水而迎子可乎鮒魚奮然曰君言此曽不如索我於枯魚之肆又赤手取魚如拾塊孫樵與王霖書曰如赤手捕長蛇又李啇隱詩曰洞庭魚可拾不用更垂􅊻布網鳴舷攻腹背後趙王泰諌冉閔曰若我出戰必腹背受敵豈知激濁與清流唐書王珪傳曰激濁揚清呉志賀劭􅀓曰遂使清流變濁北夢􅃈言朱全忠賜舊相裴樞等自盡李振曰此軰正謂清流宜投黄河永爲濁流魯直詩我亦洗湔與清流恐懼駢頭牽翠帶易曰貫魚以宫人寵王弼注云駢頭相次似貫魚也老杜詩水荇牽風翠帶長居士仁心到魚鳥此句法用行葦詩仁及草木之意文選四子講徳論曰恩及飛鳥列子曰天之於民厚矣植五榖生魚鳥以爲之用㑹有微生化餘鱠左思呉都賦曰􅀟則比目片則王餘注云越王鱠魚未盡因以其半棄之爲魚遂無一靣寧容網目漏吞舟晉書顧和荅王導曰明公作輔寧使網漏吞舟何縁採聽風聞以察察爲政世􅀃劉文幹荅魏文帝曰亦由陛下網目不踈誰能烹鮮作苛碎老子曰治大國若烹小鮮我亦江湖釣竿手杜牧之詩惆悵江湖釣竿手却遮西日向長安悮逐䡖車從下瀬漢武帝紀公孫賀爲輕車將軍甲爲下瀬將軍鮑明逺詩後逐李輕車生當得意落鷗邊後漢梁竦曰生當封侯死當血食后山反而用之故下句云云列子曰海上之人從鷗鳥逰漚鳥之名者百數而不止其父曰汝取來吾玩之眀日之海上漚鳥舞而不下文選子虛賦云􅀟鶬下李善注引爾雅曰下落也談􅁐載鄭文寳詩云􅀟溪時落海邊鷗何用封侯墮鳶外後漢馬援􅀓援撃交趾破之封新息侯從容謂官屬曰吾從弟少㳺當哀吾慷􅁣多大志當吾在浪泊西里間虜未滅之時仰視飛烏站站墮水中卧念小㳺平生時語何可得也不如此意今得所用孟子校人事得其所㢤之意置身暗與神明㑹退之贈李觀詩曰北極有覊羽南溟有濳鱗川原浩浩隔影響两無因風雲一朝㑹變化成一身誰言道里逺感激疾如神世􅀃謂晉武帝山濤不學孫呉而暗與之㑹徑須作記戒鯨鯢太白枯魚過河泣曰作書報鯨鯢勿恃風濤􅀔防有任公釣東海莊子曰任公子有大鉤巨緇五十犗以爲餌投竿東海已而大魚牽巨鈎而下任公子得若魚離而腊之又詩成落筆驥歷塊不用安西題紙背此两句指東坡詩語俊快書復雄竒也漢書王褒􅀓曰駕齧勑驂乗旦過都越國蹶如歷塊柳子厚詩云書成欲􅀉􅋻安西􅁓背應勞手自題注云家有右軍書毎紙背􅁃翼題云王右軍六紙小家厚歛四壁立拆東􅀘西裳作帶此两句自言窘於屬和也後漢陳蕃曰小家畜産百萬之資寒山子詩與道殊懸逺拆東􅀘西爾左􅀓曰樂桓子請帶於叔孫豹豹召使者裂裳帛而與之曰帶其􅄶矣堂下觳觫牛何罪見孟子太山之陽人作膾莊子曰盗跖膾人肝而餔之同生異􅃐有如此缾懸瓽間終一碎史記李斯􅀓曰異趣以爲髙退之送惠師詩云去矣各異趣何爲浪占巾漢書陳遵􅀓楊雄作酒箴曰觀鉼之居居井之眉處髙臨深動常近危一旦遇礙爲瓽所轠身提黄泉骨􅁏爲泥自用如此不如鴟夷云云此詩言仁與不仁趨向各異而不仁者鮮有不及如鉼與鴟夷所居不同要之鴟夷保全而缾終不免也瓽音丁浪反井以磚爲甃者也流水長者今公是雨花散亂投金瀬金光明經曰流水長者自在光王之子也見有一池其水枯涸於其池中有十千魚遂將二十大象載皮囊盛河水㵼至池中水遂彌滿又爲施食解􅀃十二因縁并稱􅀃寳勝佛名後十千魚同日命終生忉利天是諸天子復至夲處空澤池所復雨天華便從此没還忉利宫法華經曰彌勒當知爾時彌勒菩薩豈異人乎我身是也求名菩薩汝身是也呉越春秋曰伍子胥伐楚還栗陽瀬水上欲報自殺婦人以百金不知其家投金瀬水中而去人言充庖須此軰老杜鷄詩充庖爾軰堪盧仝放魚歌曰此軰肥脆爲絶􅀹慈觀更須容度外法華經掲曰悲觀及慈觀此引用當作去聲讀南史謝朏傳曰殺之則成其名正應容之度外賜墻及肩人得視此后山自言其詩淺近也下有荅魏􅄛詩亦云我詩淺短子貢墻衆目俯視無留蔵按魯論賜之墻也及肩窺見室家之好公才槃槃一都㑹晉陽秋云諺曰大才槃槃謝家安漢書地理志勃碣間一都㑹有憐其窮與不朽我亦牽聮書玉海意謂好事者或以此詩附見東坡集中是與之以不朽之名也不朽字見左傳退之張法曹墓碣曰若爾吾束必求夫子銘是爾與吾不杇也又荅元稹書曰足下與甄濟父子俱宜牽聮得書南史張融自名其集爲玉海今以比東坡集次韻蘇公西湖觀月聽琴清湖納明月逺覽無留雲選詩璇題納明月嵆康琴賦曰情舒放而逺覽退之詩何限青天無片雲人生亦何須東坡詩我生亦何須一飽方想滅按蕭子顯齊書裴昭明曰人生一身之外亦復向須有酒與桐君陶隱居本草序有桐君藥録此借用意謂琴也自醉寧問客用陶淵明意見下注一盃復一盃太白詩一盃一盃復一盃平生今不飲意得同酣醺后山以戒律止酒髙僧白宻􅀓云神領意得頓盡言前清言氷玉質劉禹􅃬聮句云清言如氷玉逸韻貫珠璣壊衲山水紋東坡甞被衲衣蓋金山了元師所贈也殫精有後悟自言根領㑹之不早故殫竭其精思也畜耳無前聞言聞所未聞也老杜曰畜眼未見有禮記檀弓曰何居我未之前聞也潜魚避流光水至清則無魚蓋此意也文選􅀽宏三國名臣序贊曰潜魚擇淵上林賦曰撃流光曹子建詩明月照髙樓流光正徘徊歸鳥投重昬老杜詩仰羡黄昬鳥投林羽翮輕文選頭陀寺碑曰曜慧日於康衢則重昬夜曉信有千丈清不如一尺渾四句皆勸蘇公含垢納汚之意渉頴詩亦云至潔而納汙此水真吾師蘇公送魯元翰詩云皎皎千丈清不如尺水渾故后山言印有以印之老杜詩信有人間行路難次韻蘇公渉頴衝風不成寒楚辭衝風至􅀆揚波注衝隧也脫木還自竒文選謝莊月賦曰洞庭始波木葉微脫坐看白日晚起行清頴湄楚辭九歌曰白日晼冕其將入􅀆文選虞陽子詩曰飛狐白日晚三穴未為得馮諼曰狡兔三窟僅得免死晉書王􅄛謂弟澄敦曰卿二人在外而吾留此足以爲三窟矣司馬相如􅀓楚亦未爲得也一舟不作癡二句似託意以坡避謗請郡爲得䇿晉傅咸􅀓楊濟與咸書曰生子癡了官事官事未易了也了事正作癡復爲快耳詩意謂放情物外非俗吏所爲路暗鳥遺音周易小過飛鳥遺之音江清魚㺯姿後漢李固傳搔頭弄姿老杜林􅀬鳥開口江渾魚掉頭宇㝎怪物變莊子曰宇泰定者發乎天光意行覺舟遲列子管夷吾曰姿意之所欲行劉禹􅃬蠻子歌曰腰斧上髙山意行無􅃇路此借用其字謂神遊八表非楫櫂所及公與兩公子妙語含風漪两公子謂两歐陽也漢書賈􅂢之􅀓曰君房下筆言語妙天下退之簟詩曰卷送八尺含風漪此借用以言風行水上自然成文也但怪笑談􅇵漢書楊雄口吃不能􅇵談莫知賔主誰後漢書龐徳公􅀓注曰司馬德操甞詣徳公值其渡􅃆上先人墓徳操徑入其堂呼徳公妻子使速作􅁰須􅁷徳公還直入相就不知何者是客也東坡詩明日徳公當上􅃁不知誰主復誰賔得句未肯吐欝欝見睫眉魯直詩李侯有句不肯吐又云眉間欝欝似隂功劉禹􅃬詩依依見眉睫按莊子曰向吾見若眉睫之間因以得汝矣相從能㡬何行樂當及兹漢書楊惲􅀓人生行樂耳古詩曰爲樂當及時何能待來兹生忍自作難自作難猶言徒自苦也太白詩迴山轉海不作難百憂間一嬉詩云我生百憂莊子盗跖篇曰人上壽百歳中壽八十下壽六十餘病瘦死䘮憂患其中開口而笑者一月之中不過四五日而已耳時尋赤眼老􅀓燈録廬山歸宗寺智常襌師以目有重瞳遂將藥手按摩目眥俱赤世號赤眼歸宗東坡喜從僧遊故有此句不探黃口兒晉書王澄脫衣上􅀣探􅍎鷇而弄之劉琨謂澄外雖散朗而内實動俠以此處世難得其死家語曰孔子見羅雀者所得皆黄口小雀曰大雀善驚而難得小雀貪食而易得北史崔悛傳崔暹啓悛􅀼言文襄帝爲黄口小兒解公頭上巾一洗七年錙昭明太子作陶淵明傳曰取頭上􅁑巾漉酒李太白詩豈􅀒頭上巾沈休文新安江水詩曰紛吾隔泥滓豈假濯衣巾願以潺湲水沾吾纓上塵選詩京洛多風塵素衣化成緇緇黒色也蘇公謫居黄州凢七年爲􅁃塵所汚多矣至潔而納汚左􅀓曰川澤納汚此水真吾師老杜詩痛飲真吾師須公曉二子列子曰因徃曉之司馬遷書曰以曉左右人自窮非詩歐公作梅聖俞詩集序曰非詩之能窮人殆窮者而後工也兩歐陽不肯作詩故欲以此曉之再次韻蘇公示两歐陽公詩周魯後謂歐公詩可繼周詩魯頌也曵曵垂天雲壯子曰鵬怒而飛其翼若垂天之雲府中顧長康晋書顧愷之字長康桓温引爲參軍甚見親昵詩意以比趙徳麟徳麟時簽判頴州按東坡泛頴詩亦曰趙陳两歐陽同參天人師觀妙各有得共賦渉頴詩風味如麴君開天􅀓信記曰葉法善與朝士數人㑹元真觀有人請麴秀才突入坐中少年秀羙語論不凡葉疑其非人潜飛小劒擊之應手墮地乃一酒榼中有羙醖共飲之皆曰麴生風味不可忘也非公無此客晉書謝安見桓温旣出温問左右頗甞見我有如此客否請壽兩山樽漢書樓護􅀓王邑居樽下稱賤子上壽周禮司尊彛曰其再獻用两山樽叔季大儒後謂叔弼季黙两歐陽也荀子曰大儒可爲三公偏醒亦同醺言其清而不隘老杜詩漁父忌偏醒南史羊侃􅀓不飲酒而好賔㳺終日獻酬同其醉醒心與栢石堅退之詩栢生两石間章成綺繡文老杜詩揮翰綺繡揚歐公詩亦云東家太守詩尤羙組織文章爛如綺按漢哀帝紀止織綺繡多難獨不補少戇今無聞两句后山自謂也老杜詩多難身何􅀘漢髙帝紀曰王陵小戇魯論曰四十五十而無聞時無古今異智有功名昬史記平原君賛曰利令智昬後漢馬援􅀓論曰援戒人之禍智矣而不能自勉於讒􅂩豈功名之際理固然乎夫利不在身以之謀事則智慮不私已以之㫁義必厲云云可使百尺底不作數斗渾四句皆勸公㓗身髙退之意前漢溝洫志曰涇水一石其泥數斗詩意謂功名之昬人猶泥之濁水次韻蘇公勸酒與詩五士三不同煩公以詩訴東坡守頴時趙徳麟作簽判后山爲學官其兄􅀓道來過而歐陽叔弼季黙家居於頴東坡送􅀓道詩所謂五君從我遊是也两歐陽以新免母䘮不肯作詩后山以持律不飲酒故云三不同強酒古所辭孔䕺子曰平原君強子髙酒曰堯舜千鍾孔子百觚古之聖賢無不能飲也吾子何辭焉子髙曰聖賢以道徳燕人未聞以飲也后山此句自解其不飲妙語神其吐謂詩可以感􅀑神也左􅀓曰神其吐之乎此句勸兩歐陽作詩也自念毎累人舉扇無我汚两歐陽以后山不飲酒故不作詩因有累人之句晉書王導􅀓導不平􅁃亮常遇西風塵起舉扇自蔽曰元規塵汚人復使兩歐陽縮手不分付退之􅀕柳子厚文曰大匠旁勸縮手袖間平生西方社此以下后山自述髙僧慧逺􅀓劉遺民雷次宗等依逺㳺止乃於精舎無量壽像前建齋立誓共期西方樂天詩曰南祖心應學西方社可投努力須自度古詩努力加餐飯遺敎經曰當念無常之火燒諸世間常求自度不憂􅀛九頭法􅁐珠林云唐趙文信􅁀死三日復蘇自􅀃閻羅王令引出􅋻信乃見一大􅀛身一頭九作人語云我爲生時好作文章妄引佛經􅄂揉俗書又誹謗佛法故受此苦肯為語一誤此句本用百丈野狐話而借用謝安傳中語按僧問前百丈云大修行人還落因果無文曰不落因果以語謬故墮野狐􅃐後百丈爲更之曰不昧因果晉書謝安語安語未甞誤而忽一誤衆異之尋薨頓悟而漸修修一作進從此辭世故楞嚴經曰理則頓悟乗悟併銷事非頓除因次苐進􅀓燈録圭峯禪師傳曰顯頓悟資於漸修陶淵明詩終身與世辭文選嵆康書曰世故蘩其慮七不堪也公看萬金産寧能一朝具言證果位亦因進修之漸也退之詩指渠相告言此是萬金産兩生文章家此以後屬两歐陽柳子厚於楊慿書曰丈人以文律通流當世鼎列天下號爲文章家夙紀鳴蟬賦歐公有鳴蟬賦又有䟦云予因學書起作賦草它兒一視而過獨小子棐守之不去此兒必能爲吾此賦也因以予之請公堅城壘世􅀃謝胡兒語􅁃道季曰諸人暮當就卿談可堅城壘兵来後無數前漢閩粤王􅀓曰漢兵衆強即幸勝之後來益多禮記聘義曰燕與時賜無數次韻蘇公督兩歐陽詩吟聲正可候蟲鳴柳子厚詩門掩􅀱䖝秋東坡詩云欲遣何人賡絶唱滿堦桐葉􅀱䖝吟酒面猶須作老兵言二君自可作詩尚何湏待我飲邪晉書謝奕甞逼桓温飲温走避之奕遂引温不真帥共飲曰失一老兵得一老兵豈有文章妨要務文選楊修荅臨淄侯牋曰若乃銘功景鍾書名竹帛斯自雅量所畜也豈與文章相妨害㢤晉書謝安􅀓王羲之曰虚談廢務浮文妨要呉志陸抗傳曰無用兵馬以妨要務孰知詩律自前生孰與熟同后山多用孰知字按資治通鑑慕容翰曰且吾孰知歩夜干之爲人老杜詩曰詩律羣公問王維詩曰宿世謬辭客前生應􅀞詩向来懐璧真成罪左􅀓曰匹夫無罪懐璧其罪此句夲用懐寳迷􅀖之意而借用此語以譬二子不肯出詩未免爲累也未必含光不屢驚此言雖欲自晦而固已駭世矣文選崔子玉座右銘曰曖曖内含光莊子曰列禦寇遇伯昬瞀人伯昬瞀人曰奚方而反曰吾驚馬曰惡乎驚曰吾食於十􅄴而五􅄴先饋夫内誠不觧形諜成光以外鎮人心使人輕乎貴老而􅕖其所患血指汗顔終縮手退之有􅀕柳子厚文曰不善爲斵血指汗顔巧匠傍觀縮手袖間此懐端復向誰傾老杜詩曰一生衿抱向誰開太白詩曰君心不肯向人傾次韻蘇公題歐陽叔弼息齋行者悲故里漢書髙祖紀遊子悲故郷居者愛吾廬陶淵眀詩吾亦愛吾廬生須着錐地荘子曰堯舜有天下子孫無置錐之地何頼汗牛書柳子厚陸文通墓表曰其爲書處則充棟宇出則汗牛馬丈室八尺床稱子閉門居唐顯慶中王玄䇿使西域至毗耶離城維摩居士石室以手板縱横量之得十笏故名方丈維摩經云即以神力空其室内唯置一床以疾而卧樂天閒居自題詩曰此是白家翁閉門終老處百為㑹有還龐徳公所謂趣舎行止亦人之窠穴也且各得其栖宿而已一足不願餘一足字見上注左太冲詠史詩曰飲河期滿腹貴足不願餘紛紛老㓜間失得了懸虛人生自㓜迨老或得或去得失皆歸於一空也客在醉則眠聽我莫問渠南史陶淵明傳淵明甞曰我醉欲眠卿可去東坡有詩及是曰醉中有客眠何害湏信陶濳未苦賢論勝巳絶倒絶倒見上注句妙方愁予楚辭目眇眇􅀆愁予此借用自恨其詩之不如也竹几無留塵選詩巢幕無留燕此用其語律霜畦有餘􅂼老杜詩霜中登故畦荘子曰䑕壤有餘􅂼相從十五年不為食有餘用史記馮讙事退之招楊之罘詩曰前陳百家書食有肉與魚時須一俛仰君可待蘧蒢􅀃文曰蘧蒢粗竹席也王介甫詩云䆫明两不借榻靜一蘧蒢次韻蘇公竹間亭絶句后山自注云是夕公􅀞枯木竹裏髙亭燈燭光老杜詩竹裏行厨洗玉盤又詩今夕復何夕共此燈燭光今年復得杜襄陽晉杜預甞鎮襄陽今以比蘇公倐看老蓋千年後謂􅀞枯木老杜覔松栽詩曰欲存老蓋千年意爲覔霜根數寸栽更想霜林百尺強因以屬蘇公南史王規􅀓曰王威明千里絶足百尺無技真俊人也老杜詩四松初栽時大抵三尺強算家以有餘爲強􅀉參寥呉中詩僧道潜自號參寥子平生西方願西方社見上注擺落區中縁淵明詩曰擺落悠悠談謝靈運詩曰緬邈區中縁惟於世外人相從可忘年南史江揔􅀓張纉等與爲忘年交道人䝺公徒相識幾生前老杜詩賛公湯休徒早作歩兵語晉阮籍爲歩兵校尉鍾榮詩品曰籍時雖無雕琢之巧而詠懐之作以陶冶性靈幽致言在耳目之内情􅀉八荒之表洋洋乎㑹於風雅矣晚叅雲門禪雲門大師文偃見􅀓燈録拾䇿􅀌山下一室頗蕭然􅀌山在錢塘昭明太子陶潜􅀓曰環堵蕭然林昬岀幽磬竹杪横踈煙老杜詩林昏罷幽磬孫何詩秋磬出踈林昨曰􅀉書至坐想參寥泉東坡甞作參寥泉銘序曰予出守錢塘參寥子在焉􅁲智果精舎居之鑿石得泉加洌乃名之參寥泉此泉如此公遇物作清妍退之月池詩若不妬清妍却成相映燭一别今㡬時緑首成白顛後漢蔡邕傳曰華顛胡老子亦憐我老我豈要子憐老杜詩不聞八尺常衆目憐㑹逢萬里風一繋五湖􅂳老杜詩安得萬里風又詩永繋五湖舟按南史宗慤曰願乗長風破萬里浪國語曰范蠡遂乗輕舟以浮於五湖酌我巖下水􅍋子山中篇東坡詩云吾詩堪咀嚼聊送别酒燕北渚南蕩不可度北渚風浪生老杜詩春江不可度二月已風濤又詩牛女年年渡何曾風浪生向來狐兔迹已復蛟鼉鳴文選張孟陽詩云狐兔窟其中宋書五行志曰呉孫亮初公安有白鼉鳴東襌東阡急雨不成泥老杜詩急雨梢溪足又詩山雨不作泥度密穿青取徑微歐公詩一徑入蒙密已聞流水聲行穿翠篠盡忽見青山横老杜詩微徑不復取邂逅無人成獨徃詩曰邂逅相遇適我願􅀆莊子徳充符注曰夫心之全也遺身形忘五蔵忽然獨徃而天下莫能離慇懃有月與同歸老杜詩昨夜月同行八月十日二首一夢人間四十年只應炊竈固依然異聞集云道士吕翁經邯鄲道士邸舎中有少年盧生自歎其貧困言訖即思寐時主人方蒸黄􅆝爲饌翁乃探嚢中枕以授之生夢自枕竅入其家見其身富貴五十年老病而卒欠伸而悟吕翁在傍主人炊黄􅆝尚未熟又退之詩云閭里故依然兩官不辦一丘費言俸薄不辦買山錢也時后山再爲學官班固叙􅀓班嗣曰棲遲於一丘則天子不易其樂五字虚随萬里舩言空有詩名播於異域也北夢􅃈言杜荀鶴詩只將五字句用破一生心賈島哭孟東野詩云塜近登山道詩隨過海􅂳老杜詩下臨不測江中有萬里船又人生七十今強半老去光隂已後身老杜詩人生七十古來稀更欲置身須世外世間元自不􅀜人樂天詩應湏繩墨機􅀜外安置踈愚鈍滯身又云置心世事外無喜亦無憂迎新将至漕城莫歸遇雨早投林野違風雨晚傍塵沙飽送迎言出處勞逸之異也張華鷦鷯賦曰違鍾岱之林野老杜詩塵沙傍蜂蠆又詩徴君晚節傍風塵又詩萬里巴渝曲三年實飽聞前漢韓信傳趨拜送迎却愧兩街屠販子卧聴車馬過橋聲從俗疲苦反不如市人之安逸也東坡詩識君拄杖過橋聲即事老覺山林可避人魯論曰與其從避人之士也豈若從避世之士哉正須麋鹿與同群潘岳􅀜中記曰辛孟年七十與麋鹿同羣游世謂之鹿仙老杜云全生麋鹿羣却嫌鳥語猶多事強營隂晴報客聞此句必有所指北史髙阿那肱曰漢兒多事強知星宿東坡詩不㑹人間閑草木豫人何事管興亡魯􅀡詩竹山虫鳥朋友語討論隂晴怕風雨齋居青奴白牯静相宜黃魯直云趙子充示竹夫人詩蓋涼寢竹器憇臂休􅂰似非夫人之職爲名曰青奴傳燈録長沙岑和尚曰貍奴白牿却知有蓋謂水牯牛也此詩借用似言白角簟老罷形骸不自持南史蔡興宗傳沈慶之曰加老罷私門兵力頓闕老杜詩白頭老罷舞猶歌漢書楊王孫傳願進醫藥厚自持一枕西䆫深閉閣漢書韓延壽􅀓入卧傳舎閉閣思過卧聴叢竹雨来時賈島詩宿客未眠過半夜獨聞山雨到來時中秋夜東刹贈仁公盈盈秋月不餘分東坡樂府云三五􅄹􅄹還二八漢書律曆志曰商十二月甲申朔旦冬至無餘分葉露懸光可數塵老杜對月詩此時瞻白兔直欲數秋毫此地正須煩一笑要令排户問東隣柳子厚曰塡門排户十五夜月向老逢清節歸懐託素暉文選樂府云昭昭素月明暉光燭我床飛螢元失照老杜詩暗飛螢自照􅀓燈録鹽官和尚曰日下孤燈果然失照重露已霑衣老杜詩重露成㳙滴謝莊月賦佳期可以還微露霑人衣稍稍􅀌光動沉沉萬􅄜微文選鴈詩單汎逐􅀌光此借用荘子顔成子㳺曰敢問天􅄜南郭子綦曰夫吹萬不同而使其自巳也不應明白髪似欲勸人歸老杜月詩能添白髪眀詩意謂頭顱如許尚復俯仰世間爲明月所照破也胡士彦挽詞二首元茂晚進違前軰後漢孔融論盛孝章書曰今之少年喜謗前軰平生闕異聞魯論曰子亦有異聞乎吾猶識此老天豈喪斯文魯論曰天之將䘮斯文也後死者不得與於斯文也善學家􅀓業退之詩中郎有女能􅀓業英詞世不群沈約宋書謝靈運傳論曰英詞動金石老杜詩白也詩無敵飄然思不羣固應譏尚白官序見楊雲漢書楊雄􅀓雄字子雲或嘲雄以玄尚白而雄解之號曰解嘲注云玄黒色也言雄作玄不成其色猶白故無禄位也老杜詩官序潘生拙后山以楊子云爲楊雲亦猶老杜以司馬長卿爲馬卿也杜詩甞云多病馬卿無日起又此地来何晚經年見未頻老杜詩此地生涯晚又云卷軸來何晚薦賢仍睹命有道可辭貧上句言其材雖爲當世所知而達不逹則係於命太白詩丈夫睹命報天子當斬胡頭衣錦還列子曰客有言之鄭子陽者曰列禦寇有道之士也居君之國而窮君無乃爲不好士乎徒弟三千子史記孔子世家教弟子蓋三千焉聲名四十春老杜詩才名四十年又詩龍飛四十春襄陽耆􅃇内無復姓龐人晉習鑿齒作襄陽耆舊􅀓老杜詩爲於耆舊内試覔姓龐人謂龐徳公也后山詩註卷第三
