front:
  text: 后山詩註卷第九
  hash: sha256:ddb9152c363dc2f0bdc054f0a043830888b4928e474273d7adc95f269f8b3ace
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_009-1a}
body:
  text: 晁無咎􅀞山水扇前生阮始平晉阮咸爲始平太守顔延之五君詠曰屢薦不入官一麾乃出守蓋謂咸也無咎亦數􅀘外云黃魯直詩前身鄴下劉公幹今日江南􅁃子山今代王摩詰唐王維字摩詰工詩善􅀞繪工以爲天機所到學者不及也偃屈盖代氣萬里入方尺南史齊竟陵王子良之孫賁於扇上圖山水咫尺之内便􅁴萬里爲遥老杜山水圖歌云咫尺應湏論萬里朽老詩作妙南史沈慶之詩曰朽老筋力盡徒歩還南崗此借用以言樹石險絶天與力老杜詩溟張與筆力君不見杜陵老翁語湘娥増悲真􅈗泣老杜有山水障歌云不見湘妃鼓瑟時至今斑竹臨江活又云元氣淋漓障猶濕真宰上訴天應泣又云湘娥簾外悲奉陪趙大夫㳺桓山後水喧江落渾黄老杜詩寒江舊落聲渾黄謂汴水也元稹有酒章曰濟㳙㳙而縷貫將柰􅀆萬里之渾黄晚雲障日作微凉東坡詩峯多巧障日笙歌聲裏旌旗動羅綺叢中語笑香勸相秋郊開稔熟易井卦曰君子以勞民􅂆相開謂導迎之如禮記所謂有開必先摩挲苔壁吊荒亡詩意屬桓司馬後漢書薊子訓摩挲銅人孟子曰流連荒亡風流一代今山簡有底樽前着葛強晉書山簡􅀓簡鎮襄陽每出嬉遊有童兒歌曰舉鞭問葛強何如并州兒強家在并簡愛將也后山以自比老杜詩花飛有底急底猶言何等見顔師古糾謬正俗􅀉曹州晁大夫東方千􅀐貴當年白髪居頭也自賢古樂府陌上桑曰東方千餘􅀐夫壻居上頭又曰四十専城居此詩言不必盛年出守而後爲賢也文選韋弘嗣􅀶奕論曰君子恥當年而功不立東坡詩直爲鱸魚也自賢肯費精神修客主言不飾厨傳以稱過使客也王介甫詩可憐無益費精神稍回功譽入章篇退之詩餘事作詩人虚名不救飢腸厄晚􅀊仍遭水疾纒此以下皆后山自述老杜詩虚名但蒙寒温問泛愛不救溝􅐿辱東坡詩平生五千卷一字不救飢按世說曰愍度道人立心無義權救飢耳左傳曰風􅁋水疾老杜詩尚纒漳水疾死去不為天下惜晉書王坦之荅謝安書曰天下之寳故爲天下所惜鏡中當有故人憐老杜詩鏡中衰謝色萬一故人憐送馮翊宋令三楚風流信有人三楚見上注風流謂屈宋先聲今已徹咸􅁗咸陽秦所都寧為雞口官無小雞口見上注左傳曰國無小退之藍田丞􅈦壁記曰官無卑顧材不足塞職欲試牛刀乆要新牛刀見魯論莊子曰庖丁解牛十九年而刀刃若新彂於硎細肋卧沙勤下筯馮翊沙􅁐監有卧沙細肋羊下筯見上注長芒刺眼莫霑脣長芒似指首蓿沙􅁐多有之唐薛令之詩曰初日上團圎照見先生盤盤中何所有首蓿長䦨干老杜詩蕂枝刺眼新山西豪傑知吾老山西一作西州後漢皇甫規自以西州豪傑不得豫黨人以后山與曾樞密書考之熈寧間常客㳺􅁗中云為􅀃猶堪舉萬鈞言其尚強徤也孟子曰今曰舉百鈞則爲有力人矣嗟㢤行張生服石為石奴啓顔録云後魏時諸王貴臣多服石藥皆稱石發此云爲石奴言爲石所使也下潦上乾如渴烏後漢馬援傳曰下潦上霧此借用李蘭刻漏法曰以銅爲渴烏以引器中水太白天馬歌尾如流星首渴烏一朝僨蹶湏人扶伏毒未動風岀虚此生所得與昔殊退之作李干墓誌略曰余不知服食說自何世起殺人不可計而世慕尚之益至臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已韓子作志還自屠退之作李干墓誌叙以藥敗者數人以爲世誡然躬自蹈之故樂天有詩曰退之服硫黄一病訖不痊呉越春秋國人作離别之詞曰天道祐助􅀆呉卒自屠白笑未竟人復吁樂天詩序曰予與故刑部李侍郎早結道友以藥術爲事詩曰金丹同學都無益姹女丹砂焼即飛是樂天甞從事於金石也以身濟欲未必愚欲乆而速反所圖李干墓誌有曰蔪不死乃速得死謂之智可不可也嗟㢤偉然二大夫謂韓與白也漢書䟽廣傳曰賢㢤二大夫夜句三首過雨作秋清歸雲放月明魯􅀡詩今夜儻放春月明入簾摇竹影塞耳落洪聲徐州有百歩洪又老􅀣仍􅀌秀秋蟾只獨明何湏夜来雨却聼枕前聲夜來雨見上注又短短長長柳三三五五星唐人王建詩長長南山松短短北澗楊詩曰嘒彼小星三五在東東坡樂府曰旋抺新粧看使君三三五五􅁄離門斷雲當極目不盡逺峯青唐錢起湘靈鼓瑟詩曰江上數峯青送孝忠落觧南歸孝忠蓋后山兄子妙年失手未湏恨白璧深蔵可自妍後漢薊子訓􅀓常抱鄰家嬰兒故失手墮地而死藏璧用魯論韞櫝之意莊子曰良賈深藏若虚短髪我今能種種左傳盧蒲弊曰余髪如此種種余奚能爲注曰種種短也暁粧他日看姢姢老杜詩曉粧隨手抺東坡與潘三失解後飲酒詩曰千金弊帚人誰買半額娥眉世所妍顧我自爲都眊操憐君欲闘小嬋姢千金市帚寧論價魏文帝典論曰我有􅁦帚鬻之千金萬户分侯信有年漢書李廣􅀓文帝曰惜廣不逢時令當髙祖世萬户侯豈足道㢤退之剥啄行曰徃退不及來不有年清白傳家有如此後漢楊震􅀓使後世稱爲清白吏子孫太白詩丈夫立身有如此按禮記儒行曰其特立有如此者歸􅂗囊䀆不留錢老杜詩囊空恐羞縮留得一錢看此反而用之􅀉單州張朝請平生天上張公子尚記門間半面人老杜贈張四學士詩云天上張公子宫中漢客星半面見上注聲烈與風来不盡文選琴賦曰聲烈遐布東京賦曰聲與風翔澤從雲遊此用其字退之書曰名聲隨風而流此用其意音書無使去難頻老杜詩風塵荏苒音書絶又詩欲問平安無使來一言悟主心猶壯漢書車千秋特以一言寤意旬月取宰相封侯百巧成窮髪自新東坡詩宛丘先生不自飽更笑老崔窮百巧聞􅀃監河收貸粟㝎傾東海活窮鱗莊子曰莊周家貧貸粟於監河侯監河侯曰諾我將待邑金將貸子三百金可乎莊周曰昨周來有中道而呼者周顧視車轍中有鮒魚焉周問之對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊呉越之王激西江之水而迎子可乎鮒魚曰吾得斗升之水然活耳君乃言此曽不如早索我於枯魚之肆左傳曰陳氏以公量貸而以家量収之姚嗣宗詩可惜作窮鱗謝憲䑓趙史惠米平生忍欲今忍貧閉口逢人不少陳退之詩枚臯即召窮且忍俸薄身清趙都史也能作意向詩人老杜詩作意莫先鳴又詩獨能無意向漁樵和趙大夫鹿鳴宴集趙侯詩律近風騷雅意推賢荅聖朝漢書蕭望之雅意夲朝老杜詩夫有㳙埃荅聖朝鴻鴈着行過渭水老杜鴈詩却過清渭影髙起洞庭羣不坡詩旅鴈何時更着行鳯凰覧徳下虞韶漢書賈誼􅀓曰鳯凰翔于千仞􅀆覧徳輝而下之尚書蕭韶九成鳯凰來儀三千著籍今爲盛漢書儒林傳序曰成帝末增弟子貟三千人後漢濡不牟長􅀓曰諸生著録前後萬人魯論曰唐虞之際於斯爲盛九萬論程不作遥莊子曰􅅮扶摇而上者九萬里太白詩廽山倒海不作難不讀世書談世事卧看君自致青雲史記范睢􅀓湏賈曰賈不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事晉書王􅄛􅀓曰口不論世事李善注文選辯命論云劉孝􅅮自謂坐致青雲和朱智叔鹿鳴席上三楚風流秀士林英詞從昔動修門三楚風流見上注英詞謂屈宋風騷沈約宋書謝靈運􅀓論曰英詞閏金石楚詞招魂曰魂􅀆歸來入脩門注脩門郢城門也郢蓋楚之所都充庭初識蒼龍礎通典曰武太后長壽三年始令舉人獻歳元㑹列於方物前以備充庭東坡詩􅀟蜺蟠礎龍纒棟蓋言禁殿也賜醴行霑白獸樽晉禮志曰正㑹設白獸樽於殿庭若有能直言則發此樽飲酒已上薦書䡖一鶚見上注輕字讀如身輕一鳥過之輕更憑詩力化群鯤莊子曰北溟有魚其名爲鯤化而爲鳥其名爲鵬鵬之背不知其㡬千里也怒而飛其翼若垂天之雲培風背􅀒青天而後乃今將圖南千年遼鶴空城郭見上注誰見朱公有異孫后山自注云漢大司空朱浮蕭人也蕭縣今屬徐州魏志王粲􅀓蔡邕倒屣迎粲曰此王公孫有異才酬智叔見贈老去斯文不更論却因夫子話師門師門謂曽氏後漢桓榮傳曰下則去家慕郷求謝師門清談不待傾三語晉書阮瞻􅀓瞻字宣子王戎問曰聖人貴名教老莊明自然其志同異瞻曰將無同戎即命辟之時謂三語􅁺世說又載衛玠嘲宣子曰一言可辟何假於三宣子曰苟是天下之望亦可無言而辟復何假一勝日何知共一樽勝日見上注老杜詩不謂生戎馬何知共酒盃蘇武詩我有一樽酒將以贈逺人逐北我方填坎井莊子曰蠻氏觸氏相與爭地而戰伏尸數萬逐北旬有五日而後反左傳曰鄭伐宋宋師敗績狂狡賂鄭人鄭人入于井莊子曰子獨不聞夫塪井之蛙乎圖南誰得料鵬鯤見上注過逢爲說侯芭在老杜詩數爲姻婭過逢地侯芭見上空卧楫生衣犢有孫老杜詩歸楫生衣卧陸􅀛蒙詩􅀣有交柯犢有孫再酬郷里衣􅃣不絶人見上注近天尺五只清門尺五見上注老杜詩將軍魏武之子孫於今爲庶爲清門論文正可簮􅀟筆漢書趙充國􅀓張安世本持橐簮筆注謂備顧問漢儀尚書令僕丞郎月給大管筆一􅀟澆舌行看賜上樽東坡詩澆子談天口漢書賜丞相養牛上尊酒汪糯米一斗酒一斗爲上尊瓊􅅼每蒙先木李木􅀲詩投我以木李報之以瓊玖蜩鳩方共笑飛鵾飛鵾見上注荘子曰鵬之徙於南􅈚也水撃三千里􅅮扶摇向上者九萬里蜩與鸒鳩笑之曰我决起而飛槍枋榆時則不至而控于地而已矣奚以之九萬里而南爲固知賢傑當傳世下里朱陳亦有孫文選宋玉對楚王問曰客有歌於郢中者其始曰下里巴人徐州蕭縣有朱陳村两姓爲婚姻見白樂天詩敬酬智叔三賜之辱兼戲楊李曹二首龍争虎據竟成塵後漢班固合賔戯曰七雄虓闘分裂諸夏龍戰虎爭魏陳琳檄曰豪傑縱横熊㩀虎跱只有青樓與白門后山自注云青樓燕子樓也杜牧之詩嬴得青樓薄倖名魏志張邈傳吕布自稱徐州刺史太祖征布布與其麾下登白門樓兵圍急乃下降令宰才髙先得句令宰謂智叔爲咸平令也老杜詩鳬看令宰仙使君情重數開樽退之詩使君數開筵又云主人情更重空使劔鋒摧東坡樂府亦有主人情重之句江山故國難留鶴科斗荒池可着鯤謂智叔將出仕也退之峽石西泉詩曰聞說旱時求得雨只疑科斗是蛟龍可着鯤猶言安可著鯤也直使頷須渾作白未應投鑷愧諸孫后山自注云智叔有歎白頭詩樂天詩满頷白髭鬚南史欝林王紀齊髙帝笑曰豈有爲人作曾祖而拔白髪者乎即擲鏡鑷又險韻廋詞費討論晉語曰有秦客廋辭於朝注云廋隱也謂以隱伏譎詭之言問於朝也魯論曰世叔討論之真持布鼓過雷門漢書王尊􅀓曰毋持布鼓過雷門注雷門謂㑹稽也有大鼓越撃此鼓聲聞洛陽更看九日䑓頭句謂二謝詩見上注以比智叔元稹詩更看吹帽落䑓頭未用三人月下樽太白詩舉杯邀明月對影成三人后山不飲故云鏡裏黄花明白髪海邊赤脚踏長鯤言其已老欲爲世外之遊也老杜詩能添白髪明又詩赤脚踏層氷東坡詩脚踏赤鯶公從來相戒莫打鴨可打鴛鴦最後孫此句屬楊理曹打鴨事見上注後篇􅀉晁大夫詩亦曰只今容有名駒子則此所謂鴛鴦孫蓋名家之後也公長短句中南郷子引引載盻之子瑩詩意似指此酬智叔見戯二首百念皆空習尚存稍修香火踏空門槌腰摩腹非春事樂天詩小奴槌我足小婢槌我背信老態也老杜詩自知白髪非春事割愛投閑覆玉樽老杜詩割愛酒如繩退之進學解投閑置散覆樽見上注白髪情多猶可染后山自注云來詩有白髪之歎南史謝靈運􅀓何長瑜以韻語序臨川王義慶僚左云陸展染白髪欲以姢側室青青不解乆星星行復出􅆖鸞興盡却乗鯤退之所謂我寧屈曲自世間安能從汝巢神山也江淹别賦曰􅆖鸞騰天乗鯤蓋用李白􅀐鯨魚之意上界紛紛足官府退之詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪也容河鼓過天孫爾雅曰河鼓謂之牽牛史記天官書曰織女天女孫周處風􅁟記曰七月初七日河鼓織女二星辰相㑹又雨花風葉未宜春私柳官渠白下門晉書陶􅋲識武昌官柳此云私柳反而用之白下夲在金陵此句所指當是天徐州白門也每度清溪嘲短髪老杜云莫話清溪髪蕭蕭白映梳后山後有詩云只欲泥行過白下萬一簾踈見一班前有詩云歷肆側听長短句縁溪斜着两三家當是白門傍溪狹斜所在也時容使席近芳樽晋書阮籍等賛曰劉畢芳樽之友雄蜂雌蝶元非偶李啇隱柳枝詩曰花房與􅁡脾蜂雄蛺蝶雌同時不同􅀋那復更相思左傳曰齊大非吾偶野馬遊塵不佐鯤言無復少年之氣助其狂心也莊子曰野馬也塵埃也生物之以息相吹也注曰此皆鵬之所慿以飛者耳野馬者逰氣也漢書食貨志曰或累萬金而不佐公家之急若許成功當封賞后山自注云事具李待制席上篇按后山詩話韓魏公安撫陜西李待制師中過之李有詩名席上使爲官妓賈愛卿賦詩曰願得􅆛貅十萬兵犬戎巢穴一時平歸來不用封侯印只問君王乞愛卿請看子子與孫孫意謂老矣此事當付之後生前漢元后傳王翁孺曰吾聞活千人有封子孫子子孫孫見尚書及詩送智叔令咸平二謝将能事重陽只故䑓老杜詩孰知二謝將能事頗學隂何苦用心固須衝節去便恐帶秋回言重九已近不肯少留爽秀之氣若與秋俱回誰復繼二謝者敏捷才無盡老杜詩敏捷詩千首才盡見上注鋪張意有開退之云鋪張對天之閎休此借用言詩意開廣也猶須記衰疾書與鴈同來並見上注九月九日夜雨留智叔􅀐䑓九日登臨處只有歸人醉扶路晉書羊曇傳謝安薨後行不由西州路甞因石頭大醉扶路唱樂不􅁴至州門以馬䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘慟􅂘而去千年二謝孰可代我每苦留君只去后山罷頴學除彭澤令未赴丁母憂寓僧舎旣除䘮猶不言仕者四年花粗只為前人惜上篇有曰可打鴛鴦最後孫粗與麄同曲誤不觧丞卿怒此两句亦戯楊理曹也呉志周瑜􅀓曰曲有誤周郎顧後漢靈帝紀童謡曰梁下有懸鼓我欲撃之丞卿怒此借用只消着帽受西風不待風流到新句反用孟嘉落帽事言免貽白髪之嘲也此句以屬智叔老杜詩吹靣受和風九月九日與智叔鵰堂宴集夜歸鵰堂從昔有惡客酒盡不去仍復索玉堂閑話曰徐州使宅有鵰堂蓋多妖狐故􅀞鵰於中東坡在徐州王鞏過之自謂惡客故此詩引用老杜詩指􅀧銀瓶索酒甞欲留歌舞盡客意風雨和更作三厄漢書翟方進傳曰危亂漢朝以成三厄此借用其字佳辰難得容更難我窮無酒爲君歡只欲泥行過白下萬一簾踈見一斑史記夏本紀曰泥行乗橇孫光憲詞曰半踏長裙宛約行晩簾踈處見分明東坡樂府曰十里春風誰指似斜日映透簾斑晉書王獻之􅀓門生曰此即管中窺豹時見一斑城南夜歸􅀉趙大夫書生作意一斑足杜陵㩀鞍兩眼寒東坡詩杜陵飢客眼長寒蹇驢破帽隨金鞍隔花臨水詩一見只許腰肢背後看風雨喚人歸去好老杜詩江草日日喚愁生免教街吏報平安芝田録牛竒章公帥維楊杜牧在幕中夜微服逸遊後牧以拾遺召公以縱逸爲戒牧始隱諱公取一篋皆街子軰報帖云杜書記平善老杜詩每日報平安席上勸客酒稍開襟袍使心寛大放酒腸湏盞乾世說輕詆門曰中郎衿抱未虚韓孟同宿聮句云爲君開酒腸顛倒舞相飲唐詩人又曰酒腸俱逐洞庭寛珠簾十里城南道肯作當年小杜看小杜即杜牧之也牧之詩云春風十里楊州過捲上珠簾揔不如戯宼君二首老杜秋来眼更寒蹇驢無復逐金鞍見上注一夲作杜老南隣却有新歌舞借與詩人一面看文選左太冲詩南隣撃鍾磬北里吹笙竽夲事詩云喬如之有婢名窈娘武延嗣留之如之爲詩曰君家閨閣不曾難好將歌舞借人看文選三國名臣賛序曰定交一面李善注引崔寔本論曰徒以一面之交定臧否之决又南隣歌舞隔墻聴想對朝䆫暈倒青東坡詩倒暈連眉秀嶺浮退之詩白咽紅頰長眉青莫望喚人看嫋娜老杜詩喚人看騕褭不嫁惜娉婷只憑幽夢􅀉叮嚀退之詩幽夢感湘靈又詩浪憑青鳥通叮嚀絶句四首秋床歸卧不縁愁病與衰謀作老仇并見上注數􅀣直青能爾痩退之詩杏花两株能白紅東坡􅄂錄載張子野戯語琴妓曰此筝不見許時乃尔黒痩耶一軒殘照爲誰留老杜詩前軒頽晚照又云不知明月爲誰好又芒鞋竹杖最􅀜身散髪披衣不待人三兩作鄰堪共活老杜詩此地两三家周禮五家爲隣五千挿架未爲貧北史崔瞻􅀓曰不讀五千卷書者無入此室退之詩挿架三萬軸又昬昬嗜睡元非病續續題詩不柰閑東坡詩喚取昬昬嗜睡翁本事詩韋莊云誰知閑卧意非病亦非眠樂天琵琶行低肩信手續續彈作意買山還得笑世說支遁就深公買仰山深公曰未聞巢由買山而隱日多方拔白却成斑應璩老詩曰㧞白自洗蘇樂天詩啼衿與愁鬂此日两成斑又􅀳當快意讀易書抱朴子曰陸子十篇誠爲快書又曰嵆生云毎讀二陸之文未甞不廢書而歎恐其卷之竟也史記李斯􅀓曰快意當前適觀而已矣客有可人期不來退之詩曰所期終莫至日暮與誰囬可人見上注又見蜀費禕晉桓温􅀓世事相違每如此晉書羊祜曰天下事不如意十居七八好懐百􅀊幾回開老杜詩懐抱何時得好開東坡詩􅀏口㡬回開􅀐驢二首復作􅀐驢不跨驢此生㫁酒未湏扶叢林謂叅禪人有二病一是􅀐驢覔驢二是􅀐却驢不肯下識得驢了􅀐却不肯下此一病更是難醫若解放下方喚作無事道人后山此句豈謂是耶未湏扶見下句注獨無錦里驚人句老杜詩錦里先生烏角巾又云爲人性僻耽佳句語不驚人死不休魯􅀡有杜子羙浣花醉圖詩云宗文守家宗武扶落日蹇驢䭾醉起蓋世􅀓老杜􅀞像如此也作梁園􅀞作圖王立之詩話云􅀟井黄叔達字知命自江南來京師與彭城陳履常俱謁法雲禪師於城南夜歸過龍眠李伯時時知命着白衫􅀐驢道中摇頭而歌履常􅀒杖挾囊于後一市皆驚以爲異人伯時素善􅀞因寫以爲圖邢惇夫作夜歸圖詩此詩末句追記此事也履常即后山舊字梁園謂汴京梁孝王兔園所在也又衝籬突市不逡廵掠面驚風撲眼塵東坡詩四山眩轉風掠耳出手推􅃻寧避尹唐宋遺史賈島一日於驢上得句云鳥宿池中􅀣僧􅃻月下門始欲着推字又欲着􅃻字錬之未定引手作推敲之􅀔京兆尹韓愈方出島不􅁴衝至第三節題門吟詠不逢人夲事詩云崔護清明日遊城外叩一㽵門求飲有一女子以杯水遺護意屬甚厚明年思其人復徃叩户乆無人應因書一絶于門云去年今日此門中人靣桃花相映紅人面只今何處在桃花依舊笑春風退之詩百里不逢人夀安縣君挽詞兩大推平日左傳鄭怱曰齊大非吾偶又懿氏妻曰物莫能两大三從播後聲儀禮䘮服傳曰婦人有三從之義無専用之道故未嫁從父旣嫁從夫夫死從子憂勤登上壽言雖憂勤而不損壽也事見下注國語曰不憂年之不登荘子曰上壽百􅀊簫鼓閉佳城西京雜記云滕公得石椁銘曰佳城欝欝三千年見白日吁嗟滕公居此室緦在千人從松楸十里行文選蔡伯喈作陳太丘碑曰緦麻設位哀以送之逺近㑹葬千人以上任彦昇求立竒陵主碑表曰松檟成行哀榮動郷里􅀧筆競諸生魯論曰其生也榮其死也哀􅀉曹州晁大夫晁端仁字堯民墮絮随風花作塵黄樓桃李不成春樂天詩春盡絮飛留不得隨風好去落誰家太白詩曰平生種桃李寂滅不成春只今容有名駒子困􅀝䦨干一欠伸此篇蓋言徐州風物后山甞有詞并序云晁大夫增飾披雲初欲壓黄樓而張馬二子皆當年樽下世所謂英英盼盼者盼卒英嫁而盼之子瑩頗有家風而曹妓未有顯者黄樓不可勝也作南郷子以歌之曰風絮落東隣􅀧綴繁枝旋化塵􅀜鏁玉樓巢燕子冥冥桃李摧殘不見春流轉到如今翡翠生兒翠作衿花様腰身宫様立婷婷困􅀝䦨干一欠伸又自注曰周昉􅀞羙人有背立欠伸者最爲妍絶東坡爲賦續麗人行也按此詩風絮以屬英塵花以屬盼名駒子以屬瑩瑩之毋蓋馬氏名駒子見上注李太白詩解釋春風無限恨沉香亭北􅀝䦨干樂天詩囬頭一欠伸􅀉題披雲樓披雲在曹州后山婦翁郭㮣爲郡時所作后山爲之記使君髙㑹荅清秋漢書項羽􅀓飲酒髙㑹老杜詩報荅風光知有處増飾披雲作勝遊退之和劉虢州詩序云亭䑓島渚劉兄頗復增飾從子弟而遊其間按西都賦曰世増飾以崇麗九日再逢堪一笑后山清平樂詞云一􅀊相逢两節自注云是歳閏九月兩作重陽以曆考之蓋元符二年也終朝百過更深憂憂短髪不堪落帽也老杜詩不眠瞻白兔百過落烏紗此借用落霞􅀌鶩知才盡王勃九日㳺滕王閣序云落霞與􅀌鶩齊飛秋水共長天一色事具唐書才盡見上注踈雨微雲怯語遒孟浩然集序云浩然㳺袐省諸英華賦詩作㑹浩然云微雲淡河漢踈雨滴梧桐舉坐閣筆文選魏文帝與呉質書曰公幹有逸氣但未遒爾注遒盡也言未盡羙賔主縱賢終少在只今未可壓黄樓注具前篇傳燈録米倉和尚曰猶欠少在絶句木摇電繞雷取龍王充論衡曰雷電折樹取龍按龍若於天所使遁逃不逺則非神物天不取也北夢􅃈言曰世言乗龍苦於行雨而多竄匿爲雷神捕之或在古木及簷楹之内伏蛙號蚓溝瀆空魯直玉照泉詩勿令水源濁魚蝦來􅀉中生子歳月多徃徃隱蛟龍玉照不見影盤桓蝸螺宫一朝掲源去枯瀆草蒙茸黒雲黄槐度白鳥映日急雨回斜風秦中歳時記槐花黄舉子忙􅀉黄充俗子推不去可人費招呼世事每如此我生亦何娱嵆康書曰不喜俗人而甞與之共事晉書鄧攸傳吳人歌曰鄧侯挽不留謝令推不去黄生後來秀純茂静者徒不見動經月来亦不湏􅁷東坡詩􅂴者常似靜静豈􅂴者徒文選古詩曰旣來不湏􅁷人事已好乖可復自作踈見上注子雖向人懶勝處不可􅀌王介甫詩􅀉語讀書人呶呶非勝處老杜詩更長燭明不可􅀌迨此田事休仍當秋雨餘深知阻泥濘歩屐意何如老杜詩相邀愧泥濘􅀐馬到堦除又云歩屐過東籬􅀉張大夫只應青眼老尚記白頭翁一别今何向三年信不通不應書字倦未有北来鴻禮記月令孟春仲秋皆曰鴻鴈來而孟春注曰鴈自南方來將北反其居肯作彭城守何時馬首東左傳曰余馬首欲東懐逺此詩屬東坡海外三年謫天南萬里行東坡以紹聖四年丁丑謫昌化軍安置至元符二年己卯蓋三年矣樂天詩雲雨三年别風波萬里行生前只為累身後更湏名言生前尚以名爲累死後亦復何湏晉書張翰􅀓曰使我有身後名不如即時一盃酒未有平安報空懐故舊情斯人有如此無復涕縱横太白詩丈夫立身有如此一呼三軍皆披靡答田生酒亦有何好人今未肯忘此篇大抵戒田生好酒而勉以學也晉書孟嘉􅀓桓温曰酒有何好而卿嗜之苟無愁可觧何必醉為郷劉几作解愁曲陳慥作無愁可解以反之其末句曰若須待醉了方開解時問無酒怎生醉唐王勣有醉郷記樂天詩無過學王勣惟以醉爲郷䞉欲論竒字竒字見上注終能諱秘方言欲以文章真訣授之無所隱也孫樵與王霖書曰甞得爲文真訣於來無擇無擇得於皇甫持正持正得於韓吏部退之然樵未甞與人言及文章且懼得罪於時今足下有意於此而自疑尚多其可無言乎后山上二蘇公詩亦云請公别試囊中方退之李虚中墓誌曰於蜀得秘方直饒肌骨秀正要􅀞眉長謂羙質亦湏刻􅀞之也盧仝秋夢行曰長眉入鬂何連姢肌膚白玉秀且鮮王䑓新詠􅁗韜詩曰城中皆半頷非妾􅀞眉長早起隣雞接響作三鳴殘􅀧連聲殺五更退之詩雞三號更五􅀧文選沈休文作安陸昭王碑曰男女老㓜大臨街衢接響􅀓聲不踰時而達于四海劉夢得詩郡樓殘􅀧聲寒氣挾霜侵敗絮退之詩威風挾惠氣西京􅄂記曰淮南王安著鴻烈解云字中皆挾風霜敗絮見上注賔鴻將子度微明禮記月令鴻鴈來賔老杜詩輕鳥度曽隂又詩雲月遞微明有家無食違髙枕老杜詩無食問樂土又詩􅀞省香爐違伏枕又詩散地逾髙枕按史記張儀􅀓曰大王髙枕而卧百巧千窮只短檠百巧短檠皆見上注翰墨日踈身日逺世間安得尚虚名老杜詩才微歲老尚虚名又云不堪祗老病何得尚浮名和黃充小雪度臘侵春亦未遲紛紛欵欵意猶微樂天詩度臘都無苦霜霰迎春却有好風光老杜詩􅀧水蜻蜓欵欵飛霑衣帶潤元無見着物還消不待晞秦韜玉春雪詩片􅂊着地輕輕䧟力不禁風旋旋消湛露詩曰湛湛露斯匪陽不晞注云晞乾也䞉欲打䆫連夜聴未湏迷鴈㫁行飛樂天詩蕭蕭暗雨打䆫聲老来才盡無新語只欲煩君急手揮漢書陸賈造新語后山詩註卷第九
