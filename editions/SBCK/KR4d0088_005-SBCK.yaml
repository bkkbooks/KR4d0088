front:
  text: 后山詩註卷第五
  hash: sha256:97899966676f0d2271838042b32c8e8205abfd5fb0541bbd48b5c061ce3a6f24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_005-1a}
body:
  text: 荅晁以道轉走東南復帝城帝城見上法后山甞㳺江浙元祐初來京師此句追記其事故人相見眼偏明退之詩相見眼偏明十年作吏仍餬口作吏見上注顔魯公帖云一作縁受替北歸中止金陵闔門百口㡬至餬口字本出左􅀓兩地為隣闕􅀉聲退之詩两地無千里因風數􅀉聲冷眼尚堪看細字白頭寧復要時名老杜詩秋山眼冷常夢稀東坡詩問龍乞水歸洗眼要看細字銷殘年熟知范叔寒如此熟知見上注又老杜詩熟知茅齋絶低小史記范睢傳湏賈曰范叔一寒如此㢤未覺嚴公有故情唐書杜甫􅀓甫依嚴武於劒南武以世舊待甫甚善北齊書趙彦深被沙汰􅀽聿修猶故情存問徃來按漢書陳勝􅀓客出入愈益發舒言勝故情病起今日秋風裏何郷一病翁老杜詩多病秋風落力微須杖起法燈禪師擬寒山子詩曰榰笻似力微禮記檀弓曰杖而後能起心在與誰同歐公詩老去自憐心尚在古樂府東飛伯勞歌曰空留可憐誰與同此借用災疾資千悟孟子所謂人之有徳慧術智者常存乎疢疾是也晉書天文志五星同色天下偃兵百姓安寧不見災疾此借用􅀓燈録仰山云若是宗門下上根大智一聞千悟得大揔持􅁈親并一空同乎大通無怨無徳也華嚴經云願一切衆生於怨於親等心攝受皆令安樂智慧清浄傳燈録曇藏禪師見大蠎不避曰毒無實性激發則強慈苟無縁􅁈親一揆其蠎倐然不見百年先得老晉嵆康養生論曰從衰得白從白得老三敗未為窮列子管仲歎曰吾甞三戰三北􅇹叔不以我爲怯知我有老母也晉書陶􅋲謂􅁃亮曰古人三敗君今始二此用老杜百年渾得醉一月不梳頭之句法皆落句也九月九日魏衍見過節裏能相過談間可解憂漢書楊雄解嘲曰或立談間而封侯解憂見孟子致踈君未肯得此我何由莊子漁父篇子路問孔子曰由得爲役乆矣未甞見夫子遇人如此其威也漁父何以得此乎語到君房妙見上注詩同客子㳺南史謝弘微傳謝靈運小名客兒按靈運有九月九日從宋公戯馬䑓集詩一經從白首楊子曰古之學耕且養三年通一經又曰童兒習之白粉如也李白詩白荀太玄經萬里有封侯後漢班超􅀓相者曰祭酒布衣諸生耳而當封侯萬里之外别黄徐州姓名曽落薦書中老杜詩名玷薦賢中元稹詩名落公卿口又王仲舒作李君房制詞曰藉藉名字落人談中刻畫無塩自不工晉周顗􅀓􅁃亮謂顗曰諸人咸以君房樂廣顗曰何乃刻畫無鹽唐突西施一日虚聲滿天下李綽輦下歳時記劉賔客賀王魏公知舉詩曰一日聲名遍天下滿城桃李屬春官東坡荅劉涇書曰向在科塲時不得已作應用文不幸爲人􅀓寫以此得虚名滿天下十年從事得途窮晉書職官志州置諸曹從事等貟后山以亳州司户爲教授故云爾晉阮籍􅀓率意獨駕不由徑路車迹所窮輙慟哭而反文選顔延之五君詠曰途窮能無慟白頭未覺功名晚以屬徐州也老杜詩男兒功名遂亦在老大時青眼常蒙今昔同晉阮籍能爲青白眼范諷詩云惟有南山與君眼相逢不改􅃇時青衰疾又爲今日别數行老淚洒西風衰疾見上注次韻答晁無斁女生願有家名妾以不聘田里亦慕君又惡不由正大率用孟子意禮記内則曰聘則爲妻奔則爲妾欲行不問􅂗用阮籍事見上注已破寧顧甑後漢郭太􅀓孟敏荷甑墮地不顧而去林宗見而問其意對曰甑已破矣視之何益時后山罷頴學耕蚕無一􅌀漢書楊雄􅀓有田一􅌀庖井要三徑晉書陶潜謂親朋曰聊欲弦歌以爲三徑之資可乎老杜詩井竈任塵埃還家憂患餘老杜詩斯文憂患餘挽鬚兒女競老杜詩生還對童稚似欲忘飢渇問事競挽鬚誰能即嗔喝十年寧有此一寒可無命老杜詩不爲困窮寧有此此借用言還家之樂十年所無一寒見上注命詩意謂離合貧富蓋皆有平生晁夫子得士公室慶謂作諸侯客也公室見魯論稍無車馬音復作賔客請車馬音見孟子論文到韓李謂韓愈李翺也似指東坡以下數句皆足此意老杜詩論文到崔蘇念舊􅀃蘇鄭謂蘇源明鄭䖍皆老杜故人也老杜甞有詩曰故􅃇誰憐我平生鄭與蘇又云早􅀊與蘇鄭痛飲形相親長年㫁消息獨語誰和應意謂東坡在貶所也老杜詩中原消息㫁退之與孟郊書云余言之而聽者誰歟余唱之而和者誰歟東坡詩獨唱無人和退之送鄭權序曰撞搪號呼以相和應此生㤙未報他日目不瞑退之詩秪縁恩未報豈謂生足藉左􅀓曰荀偃卒視不可含奕桓子撫之乃瞑受含歸卧無好懐扣門有佳聴詩來霜雪後更覺天宇浄老杜詩天宇清霜淨少好老未工楊子曰或問吾子少而好賦持刃授子柄漢書梅福傳倒持太阿授楚其柄次韻無斁偶作二首肩聳三峯峻國朝􅄂記長孫無忌嘲歐陽詢聳􅈩成山字埋肩不出頭郭縁生述征記曰華山有三峯直上數千仞眉龐八字横退之詩夜闌縱押闔哆口踈眉龐漢武故事宫人􅀞八字眉此借用玄談人絶倒見上注家法句新清老杜詩更得新清否遥知對屬忙八俊先張子後漢黨錮􅀓曰指天下名士爲之稱號三君八俊又曰張儉爲黨魁諸公少賈生漢書賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毀􅁩曰洛陽之人年少初學専欲擅權紛亂諸事於是天子後亦踈之已傳烏鵲喜欲聴鶺鴒聲􅜇一作鵒此句當屬其兄無咎老杜云浪􅀓烏鵲喜深􅀒鶺鴒詩又此老三年别何時萬里迴亦似屬東坡元祐壬申别於頴州至紹聖乙亥三年矣更無南去鴈鴈不過衡山無從􅀉聲於嶺外也猶見北枝梅言東坡過嶺未歸白氏六帖云大􅁃嶺梅花南枝落北枝開㑹有哀籠鳥文選潘岳秋興賦曰池魚籠鳥有江湖山藪之思李畋獻吕文靖生日詩曰此身若得西歸去􅀹勝開籠放雀兒寧湏溺死􅁅漢書韓安國􅀓獄吏田甲辱安國安國曰死􅁅獨不復燃乎甲曰燃則溺之聖朝無棄物老杜詩聖朝無棄物老病已成翁神宗於東坡甞有人材難得不忍終棄之詔故此詩引用與子賦歸㢤欲其來歸之意也殷其雷詩振振君子歸㢤歸㢤此亦賦詩斷章之意古墨行并序晁無斁有李墨半丸云裕陵故物也徃於秦少㳺家見李墨不爲文理質如金石亦􅁉陵所賜王平甫所蔵者潘谷見之再拜云真廷珪所作也世惟王四學士有之與此爲二矣嗟乎世不乏竒乏識者耳敬爲長句率無斁同作永􅁉陵神宗所􅁙􅁗郎百好俱第一烏丸如􅃮姿如石趙壹非草書曰十日一筆月數丸墨蕭子良書曰仲將之墨一􅀧如􅃮文房四譜云李超本易水人唐末居於歙造墨尤妙其堅如玉其文如犀巧作松身與鏡面借羙於外非良質文選琴賦曰良質羙乎潘翁拜跪摩老眼一生再見三歎息禮記曰一唱而三歎了知至鑑無遁形圎􅁴經云曽不了知如幻境界衛夫人帖云仰慿至鑑大不可言東坡詩道人胷中水鏡清萬象起滅無逃形王家􅃇物􅁗家得舊物借用王獻之青氊事君今所有亦其亞伯仲小低猶子姪老杜詩天廐真龍此其亞魏志衛臻傳注郭林宗論許玆與文生此二人非徒兄弟乃父子也黃金白璧孰不有古錦句囊聊可敵謂世人蓄金璧固多而未必可當此墨惟詩嚢差可當之耳唐書李賀􅀓毎出從小奚奴背古錦嚢遇所得投嚢中睿思殿裏春夜半燈火䦨殘歌舞散睿思蓋神宗便殿在垂拱殿後自書細字答邊臣萬里風塵入長筭元祐中蘇轍等上所編神宗皇帝御製集内四十卷皆賜中書密院及邊臣手札言攻守祕計哲宗爲之序曰其指授諸將應變制宜雖在千萬里外而盡得其形􅀔之要先後緩急之機皆如在目前而無遺畫云又按光武紀一札十行細書成文退之詩夜書細字綴語言文選陸士衡吊魏武帝文曰長竿屈於短日逺迹頓於促路初聞橋山送弓劒帝王世紀曰黄帝葬于上郡陽周之橋山漢書郊祀志黄帝鑄鼎旣成有龍下迎帝小臣持龍髯龍髯拔墮墮皇帝之弓老杜詩先帝弓劒逺寧知玉盌人間見南史沈烱行經漢武通天䑓爲表奏之其略曰茂陵玉盌遂出人間此借用以比􅁉陵遺墨夜光炎炎衝斗牛㑹有太史占星變晉書張華􅀓雷煥曰斗牛之間頗有異氣史記天官書曰常星之變不見歐公仁宗御飛白記曰今賜書之蔵于子室也吾知將有望氣者言榮光起而屬天者必賜書之所在也人生尤物不必有左􅀓曰天有􅀹物足以移人苟非徳義則必有禍時一過目驚老醜文選張景陽詩忽如鳥過目南史昭眀太子傳曰讀書過目皆憶柳子厚乞巧文獨溺臣心使甘老醜念子何忍遽磨硏少待須􅁷圖不朽魏􅄛注曰少㳺之墨甞許先生爲他日墓誌潤筆先生甞語􅄛作此時少㳺尚無恙然終先逝去􅄛謹書少待湏􅁷見上注文選蔡邕作郭有道碑曰乃相與推先生之徳以謀不朽之事而退之馬府君行狀曰託立言之君子而圖其不朽焉按左􅀓穆叔曰其次有立言雖乆不廢此之謂不朽明䆫淨几風日暖有愁萬斛才八斗晉書王羲之􅀓曰棐几滑淨􅁃信愁賦曰且將一寸心能容萬斛愁謝靈運云天下才共有一石曹子建獨得八斗徑湏脫帽管城公脫帽謂去其管㢰也退之毛頴􅀓秦皇帝封諸管城號管城子後因進見上將有任使拂拭之因免冠謝云云小試玉堂揮翰手史記孫武傳曰可以小試勒兵乎歐公詩収取王堂揮翰手却來南畒把鋤犂次韻晁無斁除日述懐世學違從衆老杜詩困學違從衆名家最近天老杜自注其詩曰俚語云城南韋杜去天尺五又詩陽􅀜已近天感時猶壯志得句起衰年老杜詩感時花濺淚又詩湯休起我病微笑索題詩又云爲報各衰年􅀽酒無何飲漢書􅀽盎傳盎爲呉相兄子種􅀃以日飲無何陶琴不具弦陶琴見上注樂天詩周易休開卦陶琴不上弦平生揮翰手㡬見絶韋編史記孔子世家曰孔子讀易韋編三絶次韻無斁雪後二首閉閣春雲薄開門夜雪深閉閣見上注江梅猶故意故意字借用范睢事湖鴈起歸心隋薛道衡詩曰人歸落鴈後思發在花前草潤留餘澤䆫明度積隂老杜詩輕鳥度層隂又云積隂帶奔濤慇懃報春信屋角有来禽老杜詩百舌來何處重占只報春又詩紅稠屋角花尚書故實云王内史有求來禽帖來禽言味甘來衆禽俗作林禽此借用其字耳又取性無通介随時有異同魏志徐邈􅀓或問盧欽徐公當武帝之時人以爲通自在涼州及還京師人以爲介何也欽荅曰徃者毛孝先崔季珪用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以爲通比來天下奢靡轉相放效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也東坡詩亦云通介寧隨薄俗移雪餘盖地白退之詩榆莢車前蓋地皮春淺着梢紅樂天詩今年春淺遊人少杜黙詩春着花梢猶半紅􅀉食虛長筭魏􅄛注云時先生􅀉婦翁郭㮣大夫曹州使宅晁時爲州教官論詩闕近功上句用韓信事見上注長筭亦見上注相看不相棄頼有古人風魏志毛玠傳太祖賜以素屏風素慿几曰君有古人風故賜君古人之服贈魏衍三首當是自曹暫還徐所作妙年文墨秀儒林老眼今晨得再明文選陳思王表曰終軍以妙年使越漢書有儒林􅀓歷塊過都聊可待老杜詩歷塊過都見汝曹事見上注未須回首一長鳴鹽鐡論曰騏驥􅀒鹽車垂頭於太行之坂見伯樂則噴而長鳴退之詠馬詩不知何故翻􅋮首牽過􅀜門妄一鳴又崔蔡論文不足過劉禹􅃬序柳子厚集曰韓退之評其文雄深雅徤似司馬子長崔蔡不足多也按後漢崔瑗蔡邕皆能文新詩平處到隂何唐書孟郊􅀓云李觀論其詩曰髙處在古無上平處下顧二謝老杜詩頗學隂何苦用心按南史隂鏗何遜皆能詩寧湏萬户權䡖重杜牧之詩曰誰人得似張公子千首詩輕萬戶侯史記律書云世儒闇於大較不權輕重不待千篇一已多世􅀃衛玠嘲阮宣子曰一言可辟何假於三宣子曰苟是天下之望亦可無言而辟復何假一南史陸瓊􅀓云此兒必荷門基所謂一不爲少此並用其意又敏捷為文筆不休老杜詩敏捷詩千首魏文帝典論云下筆不能自休何妨縮手小遲留縮手見上注名駒已自思千里宋書髙祖曰謝方明可謂名家駒魯連子徐劫言於田巴曰劫弟子魯温年十二然千里駒也老子終當譲一頭歐公與梅聖俞書云讀蘇軾書不􅁴汗出快哉快哉老夫當避路放出一頭地也贈寇國寳三首承家從昔如君少得士於今孰我先易曰開國承家老杜詩承家節操尚不泯又云文章並我先口擬􅀃詩心已觧世間快馬不湏鞭􅀓燈録外道問佛不問有言不問無言世尊良乆外道讃歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛云外道有何所證而言得入佛云如世間良馬見鞭影而行樂府梁朝歌曰快馬不湏鞭又徃􅀊黄童今寇君髙文要學亦多聞後漢黄香傳京師號曰天下無􅀟江夏黄童此借用以比黄預又寇恂􅀓頴川百姓遮道曰願從陛下復借寇君一年此借用以比國寳留年看舉天南翼韓鄂四時纂要曰鹿骨酒乆服長骨留年莊子曰鵬之背不知其㡬千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也過目先空冀北群退之送温造序云伯樂一過冀北之野而馬羣遂空又虎子堕地氣食牛尸子日虎豹之駒雖未成文已有食牛之氣老杜詩小兒五歳􅂔食牛魯􅀡詩渥洼麒麟兒墮地志千里雀兒浴處魚何求退之詩云蝦蟇跳過雀兒浴此縱有魚何足求可奈我衰才亦盡南史丘靈鞠傳王儉曰丘公仕官不進才亦退矣又江淹任昉人皆謂之才盡正須二子與同㳺謂黄寇二君次韻春懐老形已具臂膝痛此借用彭越􅀓反形已具之語林逋詩覽照老已具開樽人向稀春事無多櫻笋來老杜詩溪邊春事幽樂天詩百年夜分半一歳春無多韓偓櫻桃詩注曰秦中謂三月爲櫻笋時輦下􅀊時記曰四月自堂􅌮至百司厨通謂之櫻笋厨敗絮不温生蟣虱敗絮見上注漢書嚴安曰介胄生蟣虱大杯覆酒着塵埃晉元帝紀帝頗以酒廢事王導以爲言帝命酌引觴覆之於此遂絶陶淵明􅀓曰塵爵恥虗罍衰年此日常為客舊國當時只廢䑓老杜至日詩年年此日常爲客又登髙詩萬里悲秋常作客百年多病獨登䑓后山所指謂徐州戯馬䑓也河嶺尚堪供極目文選王粲登樓賦平原逺而極目􅀆蔽荆山之髙岑少年為句未須哀王介甫詩意氣未宜輕感槩文章尤忌數悲哀河上背水連漁屋背水借用韓信事老杜詩漁屋架泥塗横河架石梁唐人羊士諤詩行披煙衫入激瀾横石梁窺巢烏􅍎競鵲巢多爲烏所窺奪過雨艾蒿光老杜詩庭幽過雨霑東坡樂府云日暖桑麻光似潑風來蒿艾氣如薫鳥語催春事䆫明報夕陽退之送孟郊序云以鳥鳴春南部煙花錄陳后主詩夕陽如有意偏傍小䆫明老杜詩人扶報夕陽還家慰兒女歸路不應長時自徐還曹題柱二首并序永安驛廊東柱有女子題五字云無人解妾心日夜長如醉妾不是瓊奴意與瓊奴􅀋讀而哀之作二絶句桃李摧殘風雨春楊烱少姨廟記曰古木搉殘尚辨三花之樹天孫河鼓隔天津史記天官書織女天女孫也爾雅河鼓謂之牽牛晉志曰天漢起東方經尾箕之間謂之漢津古樂府華山畿曰隔津歎牽牛語織女離淚溢河漢陸系有所思曰只看今夜裏那似隔天津主㤙不與妍華盡樂天後宫詞曰紅顔未老恩先㫁斜􅀝薫籠坐到明或作王建宫詞何限人間失意人士不遇多矣何獨女子哉劉禹􅃬詠古詩曰一朝復得幸應知失意人又從昔嬋姢多命薄東坡詩目昔佳人多命薄如今歌舞更能詩麗情集元載寵􅁎薛瑶英能詩書善歌舞孰知文雅河陽令文選夏侯常侍誄曰俗疵文雅李善注引大戴禮曰天子不知文雅之辭晋書潘岳爲河陽令不削瓊奴柱下題青􅃈髙誼載􅌦奴姓王氏王郎中㓜女父死失身於趙奉常家爲主毋􅇒辱道出淮上書其事於驛壁見者哀之王平甫爲作歌云蠅虎物微􅃐下世不數老杜詩物微世競棄又詩人物世不數后山此篇蓋有所指随力捕生得稱虎唐書安禄山與史思明俱爲捉生東坡詩䆫間守宫稱蠍虎匿形注目揺兩股史記越世家曰鷙鳥之撃也必匿其形卒然一擊􅀔莫禦卒然及莫禦字皆見孟子十中失一八九取周禮醫師十全爲上十失一次之吻間流血腹如鼓元稹詩腹脹看成鼓却行奮臂吾甚武漢書猶却行而求及前人史記殷紀湯曰吾甚武故稱武王明日淮南作端午言恃勇而不知及禍也世傳淮南王安萬畢術云以五月五日取蠅虎杵汁拌豆豆自踊躍可以撃蠅陶朱公廟史記曰范蠡變名姓適齊爲鴟夷子皮之陶爲朱公陶即定陶今曹州濟隂縣乃其地也千篇奏牘謾多知史記東方朔至公車上書凡用三千奏牘老杜鸚鵡詩紅觜謾多知百戰收功未岀竒孫子曰百戰百勝非戰之善也史記白起賛曰料敵合變出竒無窮此两句言陶朱公智勇雖多猶未足道要以身退爲勝耳名下難居身可辱史記越世家范蠡以爲大名之下難以乆居乗舟浮海變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産魯論柳下恵少連降志辱身矣却将湖海換西施湖海當謂越國分封之地國語范蠡反至五湖辭於王曰臣不復入越國矣王曰子聽吾言與子分國不聽吾言身死妻子爲戮蠡曰君行制臣行意遂乗輕舟以浮於五湖杜牧之詩云西子下姑蘇舸逐鴟夷次韻晁無斁夏雨咫尺隔山海晉書王戎􅀓甞經黄公酒壚下過曰今日視之雖近邈若山河樂天詩􅂴慢不相訪隔街如隔山作書問如何老杜詩道甫問訊今何如蟻垤既畜糧蛙窟如鳴鼉淮南子曰蟻知爲垤鳴鼉見上注張籍詩天欲雨有東風南溪白鼉鳴窟中積暑復一雨斧斫仍手摩斧斫手摩夲俗間語鈎䆫欲懸麻老杜詩雨脚如麻未斷絶岀門已横河晉傅玄雨詩曰湍深激墻隅門庭若决河人言月離畢未必致滂沱史記有若􅀓孔子旣没弟子思有若狀似孔子立爲師問曰孔子當行使弟子持雨具已而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離于畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨有若不能對后山意亦謂今夏之雨非必以月離畢所致東臯繁草木蘭艾不同科此亦法華經一雨所潤而諸草木各有差别之意淵明歸去來詞曰登東臯而舒嘯南史􅇹昭曰丈夫豈可遂藴智能使蘭艾不辨老杜詩喧靜不同科字本出魯論驚魚畏密􅅈孟子注曰數􅅈密網也獨鳥鳴南柯何遜詩獨鳥赴行查老杜詩獨鳥怪人看異聞集載南柯夢事蓋古槐南枝也稍無虫飛喧復覺蟬語多因聲作好惡與物殊未和樂天聞早鶯詩云鳥聲信如一分别在人情卧聞夜來雨歸種故山禾老杜詩不意逺山雨夜來復何如百年須下澤後漢馬援􅀓援謂官屬曰吾弟少㳺常哀吾慷􅁣多大志曰士生一世但取衣食裁足乗下澤車御欵叚馬爲郡􅁺吏守墳墓郷里稱善人斯可矣萬里付長羅漢書常惠護烏孫兵撃㐫奴克獲封長羅侯先生㫁百好尚以詩作魔樂天詩惟有詩魔降未得毎逢風月一閑吟傳燈録兖州降魔禪師􅀓秀師問曰汝翻作魔耶縮子萬言手聴渠七字哦太白與韓荆州書云日試萬言􅀝馬可待縮手見上注退之詩夜夢神官與我言羅縷道妙角與根壯非少者哦七言六字常語一字難語一作言室邇人則逺詩云其室則邇其人甚逺燕黙勞者歌文選謝叔源詩曰悟彼蟋蟀唱聽此勞者歌注韓詩曰伐木廢則朋友之道缺勞者歌其事思君得老瘦文選古詩曰思君令人老􅀊月忽已晚老杜云所向泥活活思君令人瘦觸􅀬生積痾言思君欲徃又畏暑而不能行也老杜詩觸􅀬生病根後漢竇融􅀓曰是生積痾不得遂瘳􅀉無斁敬問晁夫子官池㡬許深文選夏侯湛東方朔􅀞賛曰敬問墟墳長沙法帖有云王珉敬問官池見上注已應飛鳥下列子曰海上之人有好漚鳥者毎旦之海上從漚鳥遊漚鳥之至者數百而不止其父曰吾聞漚鳥皆從汝遊汝取來吾玩之明日之海上漚鳥舞而不下此詩言飛鳥下以見無斁忘機之意漢昭帝紀黄鵠下建章宫太液池復作卧龍吟晉書習鑿齒􅀓曰西望隆中想卧龍之吟按蜀志諸葛亮􅀓亮躬耕隴畒好爲梁父吟徐庶謂先主曰諸葛孔明者卧龍也此詩借用以言無斁髙卧吟嘯要非池中物也老杜詩風雨時時龍一吟待我中痾愈魯直詩百痾從中來同君把臂臨老杜詩臨江把臂難再得泥􅂗無去馬退之書云泥水馬弱不敢出不果鞠躬親問而以書悚息􅀹深老杜詩去馬來牛不復辨夏木有来禽唐李嘉祐詩云隂隂夏木囀黄鸝此引用以􅀉鶯鳴求友之意來禽見上注次韻别張芸叟中年為别更堪頻中年别見上注四海為家託一身老杜詩有無家别此别時須問生死孰知詩力觧窮人老杜詩此别還湏各努力漢書蒯通􅀓曰使人􅀱問其死生退之詩行當掛其冠生死一相訪詩窮見上注宿深明閣二首窈窕深明閣晴寒是去年老將灾疾至樂天詩性將時共背病與老俱來灾疾見上注人與􅀊時遷此句屬魯直紹聖初言者以神宗實録多失實召魯直至陳留問狀因寓佛寺題其所居爲深明閣自此遂謫黔中老杜詩甘與歳時遷黙坐元如在退之詩黙坐念語􅀏元如在謂神交心契如在其前􅀌燈共不眠文選謝惠連詩􅀌燈暖幽幔老杜詩燈影照無睡又詩不眠瞻白兔莫年身萬里頼有故人怜魯直與張叔和書云某至黔州將一月矣曹守張倅相待如骨肉時曹譜伯逹守黔中張兟茂宗作倅皆京洛人老杜云鏡中衰謝色萬一故人怜又縹緲金華伯人間第一人金華伯謂魯直按􅁑洪神仙傳云黄初平年十五家使牧羊有道士將至金華山居石室中四十餘年其兄初起行索初平初平叱白石皆起成羊文選海賦云神仙縹緲􅇵談連晝夜史記淳于髠􅀓一語連三日三夜無倦世􅀃衛玠與謝琨達旦微言因病篤應俗費精神應俗見上注老杜詩應接䘮精神王介甫詩可怜無益費精神按楊雄解嘲曰但費精神於此而煩學者與彼時要平安報老杜詩夕烽來不近毎日報平安反愁消息真老杜詩反畏消息來寸心亦何有又云難知消息真墻根霜下草又作一番新此句蓋有所指退之詩曰白露下衆草蕭蘭共憔悴青青西墻下已復生滿地又詩墻根菊花可沽酒東山謁外大父墓􅁟山宛轉屈蒼龍下有槃槃盖世翁槃槃見上注漢書項羽傳力拔山􅀆氣蓋世萬木刺天元自直文選張平子南都賦曰森䔿䔿而刺天叢篁侵道更須東老杜詩叢篁低地碧樂天古原草詩曰逺芳侵古道齊民要術曰竹性愛西南引諺云東家種竹西家治地此言更湏東謂自已侵道不須復東引也百年富貴今誰見一代功名託至公龐丞相墓誌銘蓋司馬温公所作曽子固謝歐陽舎人譔先大父誌銘書曰後之作銘者苟託之非人則書之非公與是不足以行世而􅀓後少日拊頭期􅀋我文選沈約詩平生少年日後漢呉祐傳父恢拊其首曰呉氏世不乏季子矣楊子曰􅑺蛉之子殪而逢果臝曰􅀋我􅀋我乆則肖之矣拊頭字見魏志劉廙􅀓莫年垂淚向西風王介甫詩莫年垂淚對桓伊次韻晁無斁冬夜見􅀉寒䆫冷夜欲生塵短枕長衾却自親按唐書譲皇帝傳玄宗友悌甞製大衾長枕將與諸王共之后山意謂索居離羣衾枕特自親而已老子形骸從薄暮此句后山自道後漢馬援􅀓頗哀老子使得遨遊文選豫章行曰促促薄暮景亹亹鮮克榮李善注云景之薄暮喻人之將老也先生意氣尚青春此句以屬無斁文選潘尼贈陸機詩予渉素秋子登青春李善注云素秋喻老青春喻少也覆杯不待回丹頰言不借紅於醉面也覆杯見上注危坐猶能作直身後漢書茅容避雨􅀣下危坐愈恭孟郊詩爰得曲身成直身城郭山林兩無得暮年當復幾霑巾言出處皆不如志可爲流涕也歐公集古録䟦韓退之題名曰謂著山林與著城郭無異等語宜爲退之之言按今世所􅀓退之與大顛書云苟非所戀著則山林閑寂與城隍無異寒夜有懐晁無斁同好共城郭十日不一顧老杜詩可恨鄰里間十日不一見顔色人事雖好乖淵明荅龐參軍詩序曰人事好乖便當語離吾生亦多忤老杜詩人事多錯迕與君永相望闔門對妻子􅀊月不可度文選曹子建表曰四節之㑹塊然獨處左右惟僕􅀠所對惟妻子髙談無所與陳發義無所與展老杜詩劒南歳月不可度漢書谷永􅀓曰闔門髙枕閉目寧用遮言廢書不觀也􅀓燈錄僧問藥山何故看經山云且圖遮眼停杯仍下筯言雖止酒尚能強飯李太白詩停杯投節不能食㧞劒四顧心茫然何曽日食萬錢猶言無下筯處獨無區中縁區中縁見上注又李太白詩曰杳無區中縁永懐巖下􅃐老杜詩盛論巖中趣平生三徑資安得一朝具三徑資見上注萬里初歷塊前驅告曛暮言出仕未幾而􅃍得罪謝靈運詩朝遊窮曛黒歸懐屬有思退之秋懐詩丈夫屬有念事業無窮年棄世不待怒莊子曰夫欲免爲形者莫如棄世棄世則無累老境厭逶遲人情費将護禮記六十耆指使䟽引賀瑒云耆至也至老之境也文選江淹别賦曰車逶遲於山側注云逶遲少留貌向來張長公吾亦從兹去漢書張釋之􅀓子摯字長公官至大夫不能取容當世遂不仕漢髙祖紀曰吾亦從此逝矣燈花頻作喜老杜詩燈花何太喜月色正可歩老杜詩思家歩月清宵立預恐何水曹明朝有新句梁何遜爲水部除夜七十已強半所餘能㡬何退之詩年皆過半百來日苦無多老杜詩百年能㡬何唐摭言崔櫓梅花詩云強半瘦因前夜雪懸知暮景促懸知見上注柳子厚書曰長來􅁴日月益促歳􅀊更甚更覺後生多老杜詩所謂坐深郷里敬遁世名為累易曰遯世無悶老杜詩踈􅈸爲名誤退之詩士生爲名累留年睡作魔盧仝守歳詩曰年去留不住年來也任他石曼卿詩曰巳爲物象添詩瘦更被春隂長睡魔作魔見上注西歸端着便著便見上注老子不婆娑晉書陶􅋲􅀓曰老子婆娑正坐諸君軰王述亦曰致仕之年不爲此公婆娑之事后山詩註卷第五
