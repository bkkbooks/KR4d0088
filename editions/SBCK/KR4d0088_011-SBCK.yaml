front:
  text: 后山詩註卷第十一
  hash: sha256:3b818023b8143d3779fbf9c3b7ffef39144d8f6155fbd195e78f8a1b62d24aeb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_011-1a}
body:
  text: 和宼十一同登寺山度暑無好懐憑危略幽致衣冠蔚如林從我才一二兹山昔深登􅀊月誰得記尚有名勝流不與金石悴孰知千載後我與子復至老杜詩南陌旣留歡此山亦深登晉書王導􅀓曰帝親觀禊導及諸名勝皆􅀐從羊祜􅀓每風景必造峴山甞謂鄒湛等曰自有宇宙便有此山由來賢達勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷煙昬倐見燈洪彂疑無地魯直詩龍移山發洪楚詞曰下崢嶸而無地領略章句手江文通擬古詩云領略歸一致老杜詩云迴㠶覬延賞佳處領其要章句手謂二謝之流割據英雄志老杜丹青引英雄割㩀雖已矣又劎門詩至今英雄人髙視見覇王并吞與割據極目不相讓彭城自楚漢以來多有割㩀者后山於徐州修學記言之詳夫興壞容一瞬今昔當㡬喟漢書司馬遷傳曰稽其成敗興壊之理文選撫四海於一瞬退之詩於焉傲今昔喟音丘愧反大息也魯論夫子喟然歎曰圍山缺西北放目不可制歸懐納清境夜榻成良􅄰山缺見上注黃魯直有放目亭賦零落壁間詩豈特彼所愧東坡遊戯馬䑓有書西軒壁詩豈特二謝所愧作者皆在其下風也文選魏文帝書曰數年之間零落殆盡㑹逢南過適不問西來意按前卷有詩和宼十一同遊城南阻雨還登寺山則此山未極南遊之勝歟老杜哭韋之晉詩曰南過駭倉卒過字作平聲讀此借用后山又有詩云東渡南登稱意遊􅀓燈錄南嶽讓襌師與坦然襌師問嵩山安如何是祖師西來意安曰何不問自已意謝孫奉職惠胡徳墨奚李風流盡法傳外諸孫李廷珪本奚姓風流盡見上注常山陳贍子懐抱自髙攑孰云勝潘翁惟眉山公言眉山翁謂東坡甞題贍墨云陳贍墨潘谷不逮老杜詩云惟梁孝王都此用其句律攑音丘言反舉也四海未盡識一變歸九原胡郎少年子外家典刑存一􅀧落髹漆重價壓璵璠蕭子良書曰仲將之墨一􅀧如漆左􅀓定公五年注曰璵璠羙玉君所佩孫侯磊落人情義乆益惇退之詩定非磊落人曹子建詩親交義在惇觧囊贈玄圭熟知師白猿玄圭借用禹錫事呉越春秋越王問劒於處女處女將見王道逢􅀽公公曰聞子善劒術女子曰願試也公即挽竹以刺女女舉杖撃之公即上􅀣化爲白猿孫奉職武人故用此事我資不觧書下筆輒自喛嵆康書曰性不便書方言曰喛恚也不欲應而強答一云愁也良寳不受辱隠黙面稱􅁈南史􅁃肩吾􅀓梁簡文帝與湘東王書論文體麗靡曰徒以煙墨不言受其驅染􅁓札無情任其摇襞歐公作蔡君山墓誌曰媪色有􅁈吾不可不爲理登寺山晴山堪着眼别意不成秋小作三年别聊為五斗謀要須乗下澤不待到壷頭預恐登臨處長思馬少㳺並見上注答􅀉魏衍徃昔敦朋好猶能作報書西京賦視徃昔之遺舘老衰渾得􅂴老杜詩百年渾得醉踈密略相如謂不問交友之親踈皆一等不報書也名堕網中蝶劉禹錫詩哀我墮名網有如翾飛軰陸􅀛蒙蠧化曰橘之蠧化爲胡蝶甚可愛也湏􅁷犯蝥蝄而膠之人雖甚憐不可解而縱矣天下大橘也名位大羽化也苟滅徳忘公崇浮飾傲得不爲大螫蝄而膠之乎身随氷底魚東坡詩拙於林間鳩􅂴於氷底魚填門車馬客左席為君虚魏志王粲􅀓蔡邕貴重朝廷常車􅀐塡巷聞粲在門倒屣迎之漢書鄭當時􅀓賛云賔客塡門選詩門有車馬客左席見上注拱翠堂后山自注云蕭邑富人竇敦禮即泉山作此堂規制宏麗無咎作記千年茅竹蔽幽竒一日堂成四海知退之宴喜亭記曰斬茅而嘉􅀣列發石而清泉激又曰蔽於古而顯于今柳子厚法華西亭記曰廡之外有大竹數萬又其外山形下絶然而薪蒸篠蕩蒙􅄂擁蔽吾意伐而除之必有見焉便有文公来作記尚湏我軰與題詩文公謂無咎也李賀髙軒過曰西京才子文章公下句言巳有佳配尚何湏詩耶至人但有經行處寳盖仍存朽老枝似是東坡經塗曾􅀞枯木於此蓮經曰經行林中華嚴經曰阿僧祗寳經行處劉禹錫謝寺􅀟檜詩曰龍象界中成寳蓋鴛鴦瓦上出髙枝朽老見上注能事向來非促迫經年安得便嫌遲自言作詩乆方如約也老杜詩十日􅀞一水五日􅀞一石能事不受相促迫王宰始肯留真迹此借用其意世說簡文爲相事動經年得過桓公患遲常加勸勉太宗曰一日萬機那得爲速此頗用其語贈田從先詩意當是田君失解後作衣冠魯國動成群憂患相從只有君莊子曰舉魯國而儒服何謂少乎王介甫哭王令詩布衣阡陌動成羣卓犖髙才獨見君落筆如流寧蹈襲晉書陶􅋲􅀓筆翰如流未甞壅滯退之樊紹述誌云不蹈襲前人一言一句行前應敵却紛紜後漢耿恭撃車師奮而起曰請行前上馬引兵比入漢書夏侯勝􅀓曰讀書踈略難以應敵又王莽􅀓遣儒生能顓對者王咸使匈奴咸應敵縦横單于不能屈魏志髙貴郷公命羣臣賦詩和逌陳騫等作詩稽留有司奏免官詔曰吾廣延詩賦以知得失而乃爾紛紜良用反仄其原逌等愧非伏老成和伯漢書儒林伏生􅀓孝文聞伏生治尚書欲召之時年九十餘老不能行又歐陽生􅀓生字和伯事伏生由是尚書世有歐陽氏學喜有侯芭守子雲見上注意氣有餘功用少相望千里定能勤勉田生以學也南史王僧䖍論書云宋文帝書天然勝羊欣功夫少於欣法書􅁐曰孫過庭草書功用雖少而天材有餘此用其意韓非子問辯篇曰言行者以功用爲之的彀者也末句欲其不憚千里之勤而來問學别郷􅃇數有中年别寛為滿嵗期中年别見上注老杜詩縱死時猶寛漢書尹翁歸􅀓曰滿􅀊爲真得無魚口厄古樂府烏生八九子云鯉魚乃在洛水深淵中釣魚尚得鯉魚口東坡和放魚詩云哀哉若魚竟坐口逺愧知㡬穆生醴聊復鴈門踦漢書段㑹宗􅀓曰終更亟還亦足以復鴈門之踦注云踦􅃗不耦也音居宜反齒脫心猶壯韓平子問叔卿曰剛與軟孰堅對曰臣年八十矣齒再脫而舌尚在魏武帝歌曰烈士暮年壯心不巳秋清意自悲宋玉九辨曰悲㢤秋之爲氣也又曰沉寥􅀆天髙而氣清王介甫詩青天白日春常好白髪朱顔意自悲平生郡文學鄧禹得三為後漢馬武傳鄧禹曰臣少甞學問可郡文學􅀶士史記荀卿三爲􅀕酒后山教授徐頴棣三州故云和李使君九日登戯馬䑓登髙能賦屬吾儕漢書藝文志曰登髙能賦可以爲丈夫不用傳柸擊鉢催南史王僧孺􅀓蕭文琰與丘令楷江洪等共打銅鉢立韻響滅則詩成九日風光堪落帽中年懐抱更登䑓并見上注江山信羙因人勝王粲登樓賦日雖信羙而非吾土黄菊逢辰滿意開魯直詩爲公滿意說江湖二謝風流今復見千年留句待君来東坡詩此中有句無人見留與襄陽孟浩然與魏衍宼國寳田從先二姪分韻得坐字将老蒙誤㤙受吊不受賀陸機嘆逝賦曰予將老而爲客後漢劉表傳曰牧受吊不受賀唐書岑文本亦云欲起尚遲回積閑習成堕向来二三子相與守寒餓一日不可無三嵗安得過晉書王徽之曰何可一日無此君髙僧支遁􅀓謝安曰終日戚戚觸事惆悵惟遲君來以晤言消之一日當千載耳是時秋益髙夜永月初破退之詩新月懸半破漏鼓已再更坐者餘㡬箇酒薄多可強談勝堅莫拙世說謝胡兒語􅁃道季曰諸人暮當就卿談可堅城壘漢書匈奴傳曰破堅㧞敵如彼之難也簷昬讀字細林缺占星大老杜詩仰看明星當空大呉吟未至慢慢謂南朝慢體如徐􅁃之作魯直甞效其體楚語不假些楚辭宋玉招魂曰魂􅀆歸來去君之恒幹何爲四方些說文云語辭也懐逺巳屢歎逺謂遷謫諸人如蘇黄等論昔先急唾昔謂紹聖元符之間孫真人千金方載黄帝􅄂忌法曰清旦聞惡事即向所來方三唾之吉身世喜相違見上注真成螘旋磨晉書天文志日月東行而天牽之以西没譬之於蟻行磨石之上磨左旋而蟻右去平生陳孟公􅀊晚不驚坐自言其無復平日豪氣也漢書陳遵􅀓時有與遵同姓字者每至小門曰陳孟公坐中莫不震動旣至而非因號其人曰陳驚坐和黄生岀逰三絶句右坊左里逺相求東度南登稱意逰皆是日實録已着連峯妨目極不應疾雨使心休目極用王粲賦意見上注又諸郎聮璧萬人看新有詩聲伯仲間並見上注作意登臨還得句此生寧復要長閑謝靈運有登臨海嶠詩孟郊詩夜學曉未休苦吟神􅀑愁如何不自閑心與身爲讎又䞉欲登臨強作歡衣冠未動意先䦨從今泉石非吾事只借君詩細細看東坡詩作堤捍水非吾事盤馬山后山自注云山頂數丈無草木相􅀓漢祖盤馬放此耕桑戰伐飽曽經廟毀村荒不乞靈老杜詩老樹飽經霜左􅀓曰願乞靈於臧氏尚有君王盤馬跡至今草木不能青退之詩杏花两株能白紅爛石村亂石何年爛千林昨夜黄暁耕来鳥雀麥壠縱牛羊投老須微禄晉書王羲之􅀓曰懐祖投老可得㒒射老杜詩耽酒湏微禄持身闕寸長司馬相如過宜春宫賦曰持身不謹楚詞􅁲居曰尺有所短寸有所長洗心聞吉語時事信難量后山已洗滌當世之念忽有起廢之除故云爾洗心借用易係辭語退之詩哀情逢吉語按漢書陳湯􅀓曰不出五日當有吉語聞文選崔子玉座右銘曰悠悠故難量别叔父崐山丞父子兼知己扶携共白頭退之董溪墓誌曰父子間自爲知巳又為千里别未使寸心休鳥雀空庭曉風霜落木秋近親零落盡更覺别離愁魏文帝與呉質書曰何圖數年之間零落殆盡言之傷心從宼生求茶庫􅁓絶句南朝官紙女兒膚南朝謂李后主南史阮孝緒不書官􅁓成父之清白女膚見上注老杜詩恰以十五女兒腰玉版雲英比不如素問有玉版論要篇漢書晁錯􅀓曰刻於玉版樂天服雲母散詩云曉服雲英漱井花乞與此翁元不稱他年留待大蘇書大蘇謂東坡魯直和王炳之惠玉版紙詩云不特歸掃蘇公門乃令小人今拜辱黄樓絶句樓上當當徹夜聲樓有東坡所書子由黄樓賦碑當當塌碑聲也東坡墨妙亭詩空齋晝靜聞登登與人何事有枯榮晉書謝玄􅀓叔父安謂子妷曰子弟亦何豫人事而正欲使其佳選詩俛仰見榮枯后山意謂此碑本不􅀜人而亦隨時輕重時黨禁初開也已傳􅁓貴咸陽市紙貴見上注史記吕不韋􅀓著吕氏春秋布咸陽市門懸千金其上有能増損一字者予千金更恐書留後世名後世名見上注前詩有曰生前只爲累身後更湏名酬顔生惠茶庫紙破卵剥膜肌理滑老杜詩肌理細膩骨肉勺削玉作版光氣熏禮記曰君子於王比徳氣如白虹天也老子尚堪哦七字退之記夢詩曰壯非少者哦七言六字常語一字難阿買頗􅀎書八分退之詩阿買不識字頗能書八分此借用似言其子也黄樓樓以風流勝蘇子由黄樓賦叙曰熈寧十年八月彭城大水余兄子瞻適爲彭城守水未至使民具畚鍤畜􅁟石以爲水備水旣去而民益親即城之東門爲大樓堊以黄土曰土實勝水徐人相勸成之情縁貴賤移厄於紹聖黨禍屏亡老畢􅂐市彂大蘇碑黄樓賦乃畢仲詢篆東坡書至是起廢焉更覺江山好難忘父老思父老思見上句注只應千載後覽古勝當時謂人情貴耳賤目文選盧子諒有覽古詩答黃生魏􅄛注云時初冬尚無冬衣先生以背子贈之堅不受到家以朱氏所贐二疋􅀉之因作詩我無置錐君立壁舂􅁰作糜甘勝蜜荀子曰無置錐之地又曰猶以戈舂􅁰選詩曰斧水持作糜東坡詩送老虀鹽甘似蜜綈袍不受故人意史記范睢傳須賈曰范叔一寒如此㢤乃取其綈袍以賜之范睢曰公之所以得無死者以綈袍戀戀有故人之意樂餌肯爲兒軰屈老子曰樂與餌過容止晉書王羲之曰恒恐兒軰􅁴割白鷺股何足難食鸕鶿肉未爲失暮年五斗得千里有愧寒簷背朝日暮年五斗后山自謂寒夜閉户風将雨玉䑓集序云金星與婺女爭華通宵浪打頭東坡詩生平賀老慣乗舟􅀐馬風前怕打頭蓋呉中有打頭風若爲中夜聴復作别時愁宿鴈鳴漁火村舂急暗投老杜詩宿鴈聚圎沙退之詩漁火粲星􅀧老杜詩村舂雨外急暗投借用鄒陽語謂夜舂也不應田二頃能使寸心休史記蘇秦曰使我有洛陽􅀒郭田二頃吾豈能佩六國相印乎贈周秀才二首與君世好自比隣后山自注云宣古與大父外大父㳺君其孫也漢書孫寳􅀓􅀕竈請比隣豐悴相從乆更親急駕一作棹小舟来取别固知風味似前人豐悴取别並見上注又早逢異人得異術䆒窮咎休出頃刻相逢拍手問由來怪我今年有隂徳魏􅄛注云周甞謂先生命未甚合故有隂徳之語摭言裴晉公質狀眇小有相者曰郎君若不至貴即當餓死一日遊香山寺有婦人以父被罪假得玉帶二犀帶二以賂津要致於欄楯忘􅀵之而去度得而授之後見相者曰必有隂徳及物前途萬里非某所知也度果位極人臣五子相送至湖陵中年患别多作别早日諱窮常得窮荘子孔子曰我諱窮乆矣而不能免命也勿云一水四十里衣冠塞郭何人同周生子病輟身岀劉子逺來今㡬日石家仲叔好少年頗能厭俗從吾律南史何妃傳曰禓郎好年少后山持戒律頗嚴魏君不獨相從早自君之来吾却掃魏􅄛字昌世后山之門人也江淹恨賦曰閉􅀜却掃􅀊月磨人孰能乆反覆看渠難得好言世態淺薄也東坡詩非人磨墨墨磨人老杜詩人生反覆看亦醜湖陵古城風曰寒情義乃知生别難選詩淚爲生别滋髙懐巳為故人盡交道應留後代看老杜詩髙懐見物理後漢王丹曰交道之難未易言也老杜詩孝子忠臣後代看湖陵與劉生别觸寒歷險來特特愧無以當欣有得曆險見上注貫休詩萬水千山得得來退之書云顧無以當之如何向来憂患不相捨知子用心堅鐡石人畏有心事無難此語雖鄙理則然漢書李廣䝺曰此言雖小可以喻大君今意在翰墨間他日人争讓一先以棊爲喻言髙一着也樂天詩何處春深好春深􅀶奕家一先爭破眼六聚闘成花􅀉滕縣李奉議滕大夫伯陽父孫魯論孟公綽不可以爲滕薛大夫史記老子傳姓李名耳字伯陽烹小鮮治大國原原本也老子曰治大國若烹小鮮一得何用五千言老子曰侯王得一以爲天下貞史記老子傳曰言道德之意五千餘言㢮灾决獄人不􅁈周禮大司徒大荒大札則令􅀖國移民通財舎禁㢮力薄征緩刑漢書于定國􅀓曰民自以不􅁈盛氣走訟畏討論史記趙世家曰太后盛氣而胥之入終􅀊歛吏不到門子弟無頼皆西奔漢書髙祖紀曰始大人常以臣無頼踵門父老如雲屯拊髀跳跟走兒孫莊子曰有孫休者踵門而詫子扁慶子又曰鴻蒙拊髀爵躍絳幡翠節歌唄喧法華經曰歌唄頌佛徳􅀞盆戴頂煙如焚繡褾綵軸箱帕䌓曲躬义手前致言老杜詩聽婦前致詞畜眼未見耳不聞老杜嚴中丞詩畜眼未見有暮年何以答此㤙請誦華嚴壽我君晉書束晳􅀓衆作歌曰束先生通神明請天三日甘雨零何以醻之報束長生住鴈㫁岸通横水枯荷着早霜一陂堪度􅀊數鴈不成行市逺無矰繳家語漁者曰天暑市逺淮南子鴈㗸蘆而飛以避矰繳年豐足稲梁稲梁見上注中原有佳氣不必到衡陽似指當世事後漢光武紀氣佳哉欝欝葱葱寓目曲曲河回復山海經曰河百里一小曲千里一大曲呉都賦曰潮波汨起回復萬里青青草接連選詩曰青青河畔草老杜詩野水春來更接連去帆風力滿来鴈一聲先呉都賦五臣注曰舉颿者挂席用風力也按颿與㠶同老杜詩一聲何處送書鴈野曠低歸鳥江平進晚牽老杜詩江平不肯流又云百丈牽江色望郷從此始留眼未湏穿文選謝玄暉詩有情知望郷阮嗣宗師零落從此始老杜詩新愁眼欲穿野望霜葉紅於染吹花落更馨平江行詰曲李羣玉詩厭穿詰曲﨑嶇路小徑夾葱青選詩招隱曰峭舊青葱間竹栢得其真度鳥開愁眼遥山入􅀞屏畏人惟可飲從俗却湏醒老杜詩畏人成小築惟可飲見上注楚詞􅁲居曰將從俗富貴以偷生乎􅀉單州吕侍講希哲徃時三吕共􅁱途吕許公三子希哲希績希純老杜詩牽迫限脩途擬上青雲近玉除選詩凝霜依玉除山谷詩垂上青雲却佐州中道勒迴奔電足崔豹古今注曰􅁗始皇有馬名追電東坡徑山詩中途勒破千里足今年還直邇英廬邇英殿講筵所在陸機詩厭直承明廬縱談尚記華嚴夜枉道難随刺記金池當是所居地名玉版方書濟物情素問有玉版論要篇姜必善醫者上句隂徳亦謂此百里飢寒獨顔闔忍令一物不敷榮后山自注云顔闔謂魏􅄛荘子曰顔闔自飯牛魯君使人以幣先焉晉書王羲之傳曰頃植桑果金盛敷榮􅀉兖州張龍圖文潜二首去國遭前政還家未白頭初文潜坐黨謫監黄州酒稅時紹聖四年也老杜詩破膽遭前政百年當晚遇樂天詩晩遇何足言白髭映朱紱一辱獨先收老杜詩一辱泥塗遂晚収齒脫空餘舌齒脫見上注說􅁐曰常摐有疾老子問之摐張口曰吾舌存乎曰然吾齒存乎曰亡舌存以柔齒亡以剛此句以下皆后山自述顔衰早着秋晉書顧恱之與簡文帝同年而髪早白帝問其故對曰蒲柳常質望秋先落三為郡文學大勝鄧元侯見上注元侯鄧禹謚也又䞉喜開三面旋聞乞一州三靣見上注乞字作去聲讀力難随鳥翼行復立螭頭上句自言不能徃見下句言文潜當復爲舊官老杜詩獨把漁竿終逺去難隨鳥翼一相過螭頭見上注今日麒麟閣漢書蘇武􅀓宣帝圖􅀞功臣於麒麟閣當年鸚鵡洲後漢禰衡􅀓江夏太守黃祖大㑹賔客人有獻鸚鵡者衡􅄃筆作賦文不加􅀧後衡言不遜祖遂令殺之今鄂州江夏有鸚鵡洲即其地也黄州與鄂相望故后山用此事􅀉書愁不逹書逹得無愁老杜詩􅀉書長不達况乃未休兵家山晩立遶舎苔衣積唐人劉滄詩莎徑晚煙凝竹塢石池春色染苔衣􅀝墻棃頰紅老杜詩色好棃勝頰地平宜落日野曠自多風蘇子由詩山滿長空宜落日唐人王昌齡詩曠野饒悲風禹迹千年後家山一顧中左􅀓曰茫茫禹跡未休􅅓􅁟偶史記孟甞君傳孟甞君將入秦蘇代謂曰木偶人謂土偶人曰天雨子將敗矣土偶人曰我生於土敗則歸土今天雨流子而行未知所止息也孟甞君乃止已復遂飄蓬曹子建詩轉蓬離本根寒夜一夜風澎浪中宵月脫雲歸田録曰江南有大小􅀌山江側有澎浪磯世俗轉爲彭郎到䆫資少睡逺響倦多聞星火逺相亂江山氣不分早雞先得便退之詩歸來得使即遊覽盧仝詩楊州蝦蟹忽得便㫁鴈屢鳴群老杜􅀌鴈詩飛鳴聲念羣僧祇律曰天帝釋化爲羔子鳴羣喚母鴈二絶句来徃違寒暑飛鳴在稻梁文選謝靈運詩嗷嗷雲中鴈舉翮有委羽求涼弱水湄違寒長沙渚詩鴻鴈于飛注曰鴻鴈知避隂陽寒暑未知溟海大不肯過衡陽衡山有廽鴈峯又截水無留影天衣懐禪師語曰譬如鴈過長空影沉寒水鴈無遺蹤之意水無􅉼影之心太白詩寳刀截流水文選江文通詩云寒郊無留影哀空有㫁群老杜鴈詩行斷不堪聞翅開先作字行㫁不成文老杜鵝詩翅開遭宿雨行㫁見前句注太玄文首曰鴻文無範說者謂鴻鴈之飛偶有文字之象而無法也山口重霧真成雨踈簾不隔風青林擁紅􅀣家鶩􅄂賔鴻退之鸎詩春風紅􅀣驚眠處陶隱居注本草云鶩即是鴨鴨有家有野又尸子云野鴨爲鳬家鴨爲鶩賔鴻見上注東坡詩野鴈雜家鶩漁屋渾環水晴湖半落東徃來成一老猶在半塗中老杜詩生涯能㡬何常在羇旅中禮記中庸曰半塗而廢雪竇頌云如今要見黄頭老刹刹塵塵在半塗晚泊清切臨風笛深明隔水燈老杜詩清切歌聲上堆塲穿鳥雀暗溜入溝塍堆場見上注西都賦曰溝塍刻鏤年使扶行老舡催趂渡僧左􅀓曰絳縣老人有與疑年使之年老杜詩扶行㡬屐穿兹遊恐未已着句續先曽異聞集沈亞之夢中作舞辭曰欲疑着辭不成語東坡詩聊亦記吾曽夜雨十月天猶雨三更月失明盧仝月蝕詩偏使一目盲司馬遷書曰左氏失明厥有國語溟濛才洒潤􅀧滴不成聲左􅀓呉都賦曰迴眺溟濛闢户風煙入投林鳥雀䡖老杜詩投林羽翮輕旅懐終易感倐起别離情江文通别賦曰行子膓㫁百感悽惻宿合清口風葉初疑雨樂天詩葉聲落如雨晴䆫誤作明杜荀鶴雪詩曰先於曉色報䆫明此用其意穿林出去鳥舉棹有来聲老杜詩遲遲出林翮深渚魚猶得寒沙鴈自驚正月詩曰魚在于沼亦非克樂潜雖伏矣亦孔之昭老杜詩宿鴈聚圎沙卧家還就道自計豈蒼生言其出處皆以貧故自爲計爾非爲蒼生也晉書阮􅁉曰吾少無宦情兼拙於人間故曲躬二郡豈以騁能私計故耳又謝安􅀓桓温請爲司馬髙崧戯曰卿屢違朝㫖髙卧東山人言安石不肯出將如蒼生何蒼生今亦將如卿何漢書張敞􅀓曰便歸卧家宿泊口弱柳經寒色懸流盡夜聲荘子曰吕梁懸水三十仞流沫四十里更長疑睡少霜落怯寒生東坡詩老人無睡漏聲長樂天詩稍稍夜寒生急急占星度歐公詩山浦轉㠶迷向背夜江看斗辨西東摇摇苦舫傾梁書江革濟江惟以一舸舸艚偏歌不得安人或謂曰當移徙重物以進輕艚革旣無物乃於西陵岸取石千斤以實之風濤兼盗賊㤙重覺身䡖文選顔延年詩春江壯風濤老杜詩况兼水賊繁特戒風波駃謝靈運擬業中詩曰知深􅁴命輕注引孔坦表曰士死知遇恩令命輕潘安仁寡婦賦曰懼身輕而施重野望山開兩岸柳水遶數家村王介甫詩髙下數家村地􅀔傾崖口風濤嚙石根柳子厚鈷鉧潭記曰冉水自南奔注抵山石屈折東流盪擊益􅁀齧其涯故旁廣而中深石根見上注平林霜着色􅀞家有着色山東坡詩誰見將軍着色山沙岸水留痕老杜詩冬水各依㾗䞉􅀉還郷泣難招去國魂楚詞有招魂篇宿柴城卧埋塵葉走風煙齒豁頭童不記年退之進學解頭童齒豁起倒不供聊應俗髙低莫可只随縁言其身世興廢相仍也傳燈録優波毱多曰若因地倒還因地起退之詩帝欲長吟哦故遣起且僵不供猶不辨也南史張興世傳曰朝廷遣禇彦回就赭沂行選檄板不供由是有黄􅁓札世􅀓樂府曲曰髙來不可低來不可魏野詩生計秖隨縁通通逺鼓三行夜周禮鼓人注司馬法曰昬鼓四通爲大鼜夜半三通爲晨戒又宫正撃柝注曰暮行夜以比直宿者隠隐平湖四接天元稹詩洞庭瀰漫接天廽枕底濤波蓬上雨故将覉旅到愁邊愁邊見上注顔市阻風二首水到西流闊風從北極来聲驅峡口坼力㧞嶺根摧老杜江漲詩大聲吹地轉漢書項籍傳曰力拔山􅀆氣蓋世三􅁗記長安正南􅁗嶺嶺根水流爲􅁗川突兀重重浪轟豗處處雷言浪聲如雷此體謂之影對前卷論之詳矣木玄虚海賦曰驚浪雷奔退之聖徳詩曰衆樂並作轟豗融治順流看過舫更着快帆催用劉禹錫沉舟側畔千㠶過之意又萬古梁山泊今年末􅁺舡阻風兼着雪費日亦忘年老杜詩所畬應費日解䌫不知年又詩費日係舟長按史玄經文首曰彫韯之文徒費日也莊子曰忘年忘義世事元相忤衰懐忍自煎老杜詩回腸杜曲煎又云膏以明自煎晚來聲更惡老杜喜雨詩晚來聲不絶應得夜深聞始覺畏途邊莊子曰夫畏􅂗者十殺一人則父子兄弟相戒也老杜詩盡室畏途邊晚坐柳弱留春色梅寒讓雪花張祐詩河流側讓􅀜溪明數積石月過戀平沙選詩流水戀􅃇􅐿病减還憎藥年侵却累家後歸栖未定不但只昬鵶末句自憐未知稅駕之地老杜詩夜來歸鳥盡啼殺後栖鵶寒夜留滯常思動艱虞却悔来漢書司馬遷􅀓太史公留滯周南老杜詩削跡共艱虞又云留滯才雖盡艱危氣益増寒燈挑不熖元稹詩殘燈無熖影幢幢殘火撥成􅁅前軰詩撥盡寒爐一夜􅁅凍水滴還歇風簾掩復開老杜詩風簾掩不定熟知文有忌情至自生哀王介甫詩文章􅀹忌數悲哀世說孫楚除婦服作詩王武子見之曰未知文於情生情於文生覽之悽然使人增伉儷之重魯直詩云意不及此文生哀絶句雲海􅄀􅄀日向西春風欲動意猶微魏􅄛云丙蒿塗二字末注王子飛云趙誠伯本作欲動一云春風着意力猶微退之詩雲水蒼茫日向西老杜詩台州地闊海冥冥雲水長和島嶼青又詩今朝臘月春意動樂天詩雖有東南風力微不能吹無端一棹歸舟疾驚起鴛鴦相背飛劉禹錫詩無端陌上狂風急驚起鴛鴦出浪花老杜詩檣烏相背發禮武䑓坐化僧后山自注云時吕希哲作單州守䑓屬單州至人本無心莊子云不離於真謂之至人起滅因衆縁佛書云諸法從縁生縁離法即滅維摩經云但以衆法合成此身起唯法起㓕唯法㓕化盡悲願在留形此䑓巔家語曰化窮數盡謂之死密嚴經偈云如來以悲願普應諸有縁如淨月光明無處不周遍聞名與致敬獲福皆無前維摩經云維摩詰稽百世尊足下致敬無量千年一鉢水宿疾㡬人痊驍雄兖州軍馬歩餘數千一呼可摧山四合如垂天莊子曰翼若垂天之雲老㓜十八村頃刻理無全哀鳴􅀉香火毀塔投其塼魯論曰鳥之將死其鳴也哀黙塔謂兖軍盛怒忽驚奔如有所見然等觀同一子豈特此所憐􅄺槃經云佛視衆生猶如一子羅㬋羅想作七種羯磨爲欲示惡行之人有果報故我來已再見童稚亦䖍䖍南史王僧䖍之子慈與蔡興宗子約入寺約曰衆僧徒今日可謂䖍䖍彂火觸暗室青燈已姢妍始讀壁間碑妙力隠不傳世說司馬太傅問謝車􅀐惠子五車何以無一言入玄謝曰當是妙䖏不􅀓頗恨語未工安得筆如椽晉書王珣夢人以大筆如椽與之云此當有大手筆事歸路雲月黒濤波隔長川溪翁停舟待相喚聲相連觧䌫風泊岸中流水入舡退之羅池碑曰度中流􅀆風泊之鶡冠子曰中流失船一壷千金欹側脚不停竟脫蛟魚次樂天詩浮出蛟龍延字書次與涎同興壊如有待適當使君賢定􅀎選妙士拂塵起熏煙南史劉之遴題其子墓曰梁妙士之墓此借用昔承靈山囑早契少林禪丐我一片石併刻維摩篇退之黄陵廟碑刺史張愉自京師徃與愉故善謂曰丐我一碑石載二妃廟事且令後世知有子名􅁃信自南朝至北方惟愛温子昇所作韓山寺碑曰惟韓山寺一片石堪共話餘若驢鳴狗吙耳維摩篇謂此詩也后山持戒律故以維摩自况晚興去國猶能别逢人始欲愁南史王㑹􅀓㑹稽内史劉懐敬之郡送者傾都惠亦造别還過從弟球球問向何所見惠言唯􅁴逢人耳晉書王承􅀓承東渡江每遇艱險處之夷然旣至下邳登山北望嘆曰人言愁我始欲愁矣不干遮極目自是怯回頭退之西山詩爲遮西望眼終是􅂴囬頭樂天詩淚眼凌寒凍不流每經髙處即囬頭布網收魚槮連筒下釣鈎爾雅槮謂之涔注聚積柴木於水中魚得寒入其裏藏隱槮音桑感反蘇子由詩漁艇縦横逐釣筒誰初教鮮食澤竭未能休尚書曁益奏庶鮮食說􅁐曰竭澤以取魚非不得魚爲明年無魚故也亦見吕氏春秋宿齊河燭暗人初寂寒生夜向深潜魚聚沙窟墜鳥滑霜林樂天烏夜啼云霜滑有風枝稍作他方計初回萬里心他方計意謂西方極樂國回心言無復四方之志漢書賈誼􅀓曰使天下回心而郷道還家只有夢更著曉寒侵老杜詩天寒不成寐無夢有歸魂别劉郎魏􅄛注云宣義之壻六年之别先生䘮母劉䘮父故其詩哀甚一别已六載相逢有餘哀公私兩多事灾病百相催真誥載楊羲手帖云公私匆匆灾疾見上注無酒與君别有懐向誰開老杜詩一生懐抱向誰開深知百里逺肯為老夫来趙巖一市萬人聚四衝千里逕胡然不作邑兼自可成橋群盗去無跡諸豪壓不驕老杜詩壯士慘不驕由來天下事浮議易傾摇必甞有欲置縣於此以鎮服豪傑盗賊而爲異議所奪者盤庚曰而胥動以浮言雞籠鎮河市新經集雞籠􅃇得名初聞北人語北史曰詔㫁北語一從正音意作故郷聲其意但欲作郷聲如莊寫不忘越吟也客乆艱難極情忘去就䡖空虚仍廢忘何以慰諸生文選應休璉詩避席跪自陳賤子實空虚魏文帝紀評注曰人少好學則思専長則善忘樂天詩􅃇遊多廢忘后山詩註卷第十一
