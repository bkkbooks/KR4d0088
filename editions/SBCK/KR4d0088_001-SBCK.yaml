front:
  text: 后山詩註卷第一
  hash: sha256:9719268c24e38d81893f85d224a5d2dde89690012e206dab2a7828753fa0bdaf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_001-1a}
body:
  text: 天社任淵妾薄命二首后山自注曰爲曽南豐作按漢書許后􅀓曰柰何妾薄命端遇竟寧前故曹植樂府有妾薄命篇主家十二樓鮑照煌煌京洛行曰鳯樓十二重按漢書雖有五城十二樓事與此意不同故不援引後倣此一身當三千白樂天詩曰漢宫佳麗三千人三千寵愛在一身后山以五字導之語簡而意盡集中如此甚衆古来妾薄命事主不盡年起舞為主壽相送南陽阡言樂未畢而哀繼之也劉禹􅃬詩向來行哭里門道昨夜􅀞堂歌舞人后山蓋用此意荘子曰可以盡年漢書帝紀曰項伯亦起舞劉禹􅃬紇那歌曰願郎千萬壽長作主人翁陶淵眀挽歌向來相送人各已歸其家漢書原渉􅀓渉父爲南陽大守父死渉大治起塜舎買地開道立表署曰南陽阡忍着主衣裳為人作春妍此句及下篇向来一瓣香敬爲曽南豐之句皆以自表見其不忍更名他師也樂天燕子樓詩曰鈿暈羅衫色似煙一囬看著一潜然自從不舞霓裳曲疊在空箱得㡬年后山蓋用此意而語􅀹髙古東坡詩云爲人作容姿有聲當徹天有淚當徹泉劉子玄史通載温子昇永安故事曰怨痛之響上徹青天韓退之詩上呼無時聞滴地淚到泉漢書賈山􅀓曰下徹三泉死者恐無知家語子貢問孔子曰死者有知乎將無知乎妾身長自憐謝靈運銅雀䑓詩曰况乃妾身輕楚詞九辯曰惆悵􅀆而私自憐李太白去婦詞曰􅀌妾長自憐世或苦后山之詩非一過可了近於枯淡彼其用意直追騷雅不求合於世俗亦惟恃有東坡山谷之知也自此两公外政使舉世無領解者渠亦安暇恤哉又葉落風不起山空花自紅两句曲盡丘原淒慘意象文選潘安仁悼亡詩落葉委埏側枯荄帶墳隅南史謝貞詩風定花猶落􅂢世不待老惠妾無其終左􅀓曰抑君賜不終注云惠賜不終也一死尚可忍百􅀊何當窮忍死尚可所死實難詩意謂安得速死以從其主也晉宣帝紀魏明帝曰死乃復可忍吾忍死待君退之詩百年未老不得死天地豈不寛妾身自不容孟郊詩出門即有礙誰謂天地寛莊子云不容身於天下死者如有知殺身以相從向来歌舞地夜雨鳴寒蛬師死而遂背之讀此詩亦少知愧矣南史范縝曰王子知其祖先神靈所在而不能殺身以從之淵明詩向來相送人老杜詩回首可憐歌舞地爾雅曰蟋蟀蛬送外舅郭大夫槩西川提刑丈人東南来復作西南去風俗通曰易云師貞丈人吉非徒取尊老亦須徳行先人也左􅀓曰杖莫如信言其徳可信杖也連年萬里别更覺貧賤苦老杜詩復爲萬里别又云乃知貧賤别更苦王事有期程親年當喜懼上句謂郭以之官不得留下句自謂老母不得去也詩云王事靡盬老杜詩公家有期程喜懼見魯論畏與妻子别已復迫曛暮時后山妻子皆隨郭行迫曛暮謂明日遂當作别老杜詩欲别向曛黒何者最可憐兒生未知父史記孔子世家曰骨何者最大此用其句法盗賊非人情蠻夷正狼顧功名何用多莫作分外慮郭槩爲人頗喜功利二蘇章䟽皆甞論列故后山毎詩多有諷戒盗賊本非人所樂爲必在位者有以致之蠻夷方懐貳而不以無事鎮之則邊􅂩開矣前漢食貨志失時不雨民且狼顧注去狼性怯走且還顧晉書王羲之傳遺殷浩書曰若猶以前事爲未工故復求之於分外宇宙雖廣自容何所萬里早歸来九折慎馳騖九折坂雖用前漢王吉事實戒其行險也老杜詩云早歸來黄土汚衣眼易眯又詩㳺子慎馳騖嫁女不離家生男已當户曲逆老不侯知人公豈誤后山以貧故妻子常􅀉食㮣家異乎張􅀒所以期陳平者矣故有曲逆不侯之歎􅀓玄豫章行云男兒當門戶墮地自生神送内麀麌顧其子爾雅鹿牝曰麀其子麛麕牝曰麌其子麆韓非子曰孟孫獵得麑其母隨之而啼燕雀各有随禮記三年問曰今是大鳥獸則失䘮其羣疋越月踰時焉則必反廵過其故郷翔回焉鳴號焉躑躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉禮記又曰行則有隨立則有序退之詩禍福各有隨與子爲夫婦五年三别離兒女豈不懐母老妹已笄父子各從母可喜亦可悲此語悽然可念後篇又曰吾母亦念我與爾寧相望誦之使人孝愛之心油然而生所謂發乎情止乎禮義者也􅀜河萬里道子去何當歸後漢鄧禹􅀓論曰􅀜河響動此借用其字老杜詩黃塵翳沙漠念子何當歸三􅀊不可道白首以爲期選詩弩力崇明徳皓首以爲期百畒未為多數口可無飢吞聲不敢盡欲怨當歸誰荘子太宗師篇子桑曰吾思夫使我至此極者而弗得也父母豈欲吾貧㢤天地豈私貧我㢤求其爲之而不得也百畒數口用孟子意文選江淹恨賦曰莫不飲恨而吞聲老杜詩吞聲勿復道真宰意茫茫退之薛君墓銘曰身不得年又將􅀹誰别三子夫婦死同穴大車詩曰穀則異室死則同穴后山雖用此語而其意則謂夫婦生常别離至死方獲同穴此所以可悲也世􅀃郗嘉賔姝曰生縱不得與郗郎同室死寧不同穴父子貧賤離晉書殷浩􅀓詠曹顔逺詩曰富貴他人合貧賤親戚離天下寧有此昔聞今見之後漢伏后􅀓曹操逼帝廢后獻帝謂郗慮曰郗公天下寧有是耶此事亦夫婦不相保者故后山取其語用之雖使事而無迹餘多倣此母前三子後熟視不得追荘子曰熟視狀皃宵然空然嗟乎胡不仁使我至於斯與上篇欲怨當歸誰同意漢書溝洫志曰皇謂河公􅀆胡不仁孟子亦曰夫何使我至於此極也有女初束髪韓詩外􅀓曰夫人爲婦者必全其身體及其束髪屬授明師以成其材已知生離悲家語曰孔子晨興顔回侍側聞哭者之聲甚哀曰此聲非伹爲死者而已又爲生别離者子曰回善於知音楚辭曰悲莫悲􅀆生别離枕我不肯起畏我從此辭老杜詩嬌兒不離膝畏我却復去大兒學語言拜揖未勝衣老杜詩􅂹子好男兒前年學語時史記三王世家曰皇子頼天能勝衣趨拜喚爺我欲去此語那可思元稹詩小女呼爺血垂淚南史何􅀧哀樂過人甞行逢葬者歎曰此哭者之懐豈可思耶悲慟不能禁小兒襁褓間抱􅀒有母慈漢書衛青傳臣青子在襁褓中按宣帝紀注云襁即今之小兒綳也褓小兒被也禮記内則曰子生三日始􅀒子注云􅀒之謂抱之而使郷前老杜詩家貧仰母慈汝哭猶在耳我懐人得知左氏曰言猶在耳退之詩嬌女未絶乳念之不能忘忽如在我前耳若聞啼聲人得知猶言人那得知也老杜詩彼蒼囬斡人得知􅀉外舅郭大夫巴蜀通歸使妻孥且舊居詩曰樂爾妻孥注云孥子也老杜得家書詩曰今目得消息他郷且舊居深知報消息不忍問何如老杜詩反畏消息來寸心亦何有又云道甫問訊今何如字本出禮記文王世子身健何妨逺樂天詩且到來歳期不知身健否情親未肯踈表記曰情䟽而貌親在小人則穿窬之盗也歟老柱詩情親獨有君功名欺老病淚盡數行書魯􅀡詩淚盡才難日韓非子曰卞和泣盡繼之以血城南寓居二首㳺子莫何歸文選李少卿詩携手上河梁㳺子暮何之韋杜城南村韋曲杜曲皆在長安之南老杜所謂城南韋杜去天尺五者也秋水深可測挽衣踏行雲老杜詩短衣數挽不掩脛踏行雲謂踏水中雲影猶賈島􅂳壓水中天之句道暗失歸處棲鳥故不喧因棲鳥之喧庶可物色歸路今特不喧似欲相撩此句殊有味選詩路暗光已夕退之詩從此識歸處老杜詩已添無數鳥爭浴故相喧又云鷗輕故不還牛羊閉籬落稚子猶在門黄魯直詩牛羊卧籬落按君子于役詩曰日之夕矣牛羊下來陶淵明歸去來辭云稚子􅀱門又潭潭光明殿稽首西方僊華嚴十定品離世間品皆云佛在摩竭提國菩提􅂣中始成正􅁴普光明殿入刹那際三昧李長者謂是如來大智自果所居之報宅退之詩潭潭府中居平生􅁱何行歩有黄金蓮大論云佛足行時去地四指蓮花捧足􅀓燈録云佛初生地涌金蓮華自然捧佛足我豈昔好徑報以履下穿老子曰大道甚夷而民好徑莊子曰衣敝履穿洗足坐道場卒卒此何縁金剛經曰洗足已敷座而座法華經曰大通智勝佛十刼坐道􅂣漢書司馬迁書曰卒卒無湏􅁷之間憶少子端也早豐下􅀊晚未可量左氏􅀓曰穀也食子難也収子穀也豐下必有後於魯國注云食子奉􅀕祀共飬者也豐下蓋靣方我老不自食安得如我長漢書韓信􅀓漂母曰丈夫不能自食吾哀王孫而進食豈望報乎老杜示宗武詩曰假日從時飲明年共我長玉䑓新詠焦仲卿妻詩曰新婦初來時小姑如我長􅈱􅈱棄不子退省未始忘上句見書益稷退省其􅀻用後漢第五倫私其子之意退之詩嬌兒未絶乳念之不能忘吾母亦念我與爾寧相望唐書肅宗張后傳曰端午日肅宗召見山人李唐帝方擁㓜女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下此詩暗用其意相望言各在天一方也老杜詩人事多錯迕與君永相望絶句翼翼陳州門萬里遷人道昔人死别處一笑欲絶倒此篇與前篇蓮字韻按舊本乃秋懐十首之二其後刪去而僅存耳此篇全章云翼翼陳州門萬里遷人道雨淚落成血著木木立槁今年蘇禮部馬跡猶未掃昔人死别處一笑欲絶倒元祐初后山來京師寓居陳州門故秋懐詩又有朝暮陳州門悠悠此何爲之句時東坡新自登州召爲禮部郎中復入帝城此后山所喜也老杜云孰知是死别且復傷其寒晉書衛玠談道平子絶倒􅀉外舅郭大夫丈人魯諸生明刑如臯陶漢書叔孫通曰臣願徴魯諸生泮水詩曰淑問如臯陶幸寛右顧憂後漢書寇恂傳鄧禹曰昔髙祖任蕭何於􅀜中無復西顧之憂未惜一身遥文選歐陽堅石詩不惜一身死老杜詩天涯涕淚一身遥西南萬里行可以斷繩橋意欲其不勤逺略也老杜詩蜀嶺防秋急繩橋戰勝遲慎勿冠恵文神母仁如堯王子年拾遺記曰有青虹繞神母即􅁴有娠而生庖犠此引用比宣仁髙太后時太后臨朝専務以徳化民女主之堯舜也漢書張敞􅀓張武曰梁國大都吏民彫敞且尚以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁故云贈二蘇公岷峩之山中巴江老杜詩中巴之東巴東山天地開闢流其間桂椒柟櫨楓柞樟青金黃玉丹砂良獸皮鳥羽不足當退之送廖道士歸衡山序曰其水􅁟之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之羙千尋之名材不能獨當竒也意必有魁竒忠信材徳之民生其間此篇蓋用此意而句法則退之陸渾山火詩也左太冲蜀都賦曰楩楠幽藹於谷底呉都賦曰木則楓柞豫樟異人間岀駭四方南史蕭子顯􅀓曰甞聞異人間出今日始見知是蕭尚書嚴王陳李司馬楊嚴君平王褒陳子昻李太白司馬相如楊雄皆蜀人王羲之與蜀太守帖云嚴君平司馬相如楊雄皆有後否一翁二季對相望謂三蘇也言與諸人相望於千載竒寳横道驥服箱退之薦樊宗師書曰誠不忍竒寳横棄道側驥服箱用戰國䇿􅂹服鹽車事張平子思玄賦曰縶騕褭以服箱誰其識者有歐陽退之琴操曰巫咸上天􅀆識者其誰歐公作老蘇墓表曰當至和嘉祐之間與其二子軾轍皆至京師翰林學士歐陽脩得其所著書二十二篇獻諸朝旣出而公卿士大夫爭􅀓之其二子舉進士皆在髙等亦以文學稱於時眉山在西南數千里外一日父子隱然名動京師而蘇氏文章遂擅天下太科異等固其常東坡兄弟皆應賢良科東坡䇿入三等謝啓曰誤中乆虚之等老杜詩自適固其常小却盛之白玉堂晉人帖中徃徃用小却字其意猶言少退也南史宋武帝紀帝疾甚召太子戒之曰謝晦數從征伐頗識機變若有同異必此人也小却可以㑹稽江州處之楚詞劉向九諌曰紫貝闕而白玉堂按翰林志曰時以登翰􅁐者謂登玉署玉堂焉詩意謂縱未大用尚當以詞禁處之典謨雅頌用所長度越周漢登虞唐漢書楊雄􅀓論曰則必度越諸子矣注云度過也司馬相如難蜀父老辭曰上咸五下登三注云言漢徳與五帝皆盛而登於三王之上也選詩亦曰仁固開周義髙登漢千載之下有素王杜預左􅀓序曰􅀃者以爲仲尼自衛反魯修春秋立素王又按漢書董仲舒䇿曰孔子作春秋先正王而繫以萬事見素王之文焉平陳鄭毛視荒荒言先儒所見之不明也平陳書學鄭毛詩學以終上句典謨雅頌之意前漢書儒林傳曰林尊事歐陽髙爲博士授平當陳翁生由是歐陽尚書有平陳之學又曰毛公治詩爲河間獻王􅀶士後漢鄭玄傳曰玄注易尚書毛詩老杜詩野日荒荒白退之􅀕文云而視荒荒而髪蒼蒼俗本荒荒作茫茫非是後生不作諸老亡文體變化未可量謂熈豐間新學之弊沈約宋書謝靈運􅀓論曰自漢至魏四百餘年辭人才子文體三變老杜詩字體變化如浮雲萬口一律如吃羗退之平淮西碑曰萬口和附并爲一談又樊宗師銘曰惟古於詞必已出降而不能乃剽脫後皆指前公相襲由漢迄今用二律妖狐幻人大陸梁􅀃文曰狐妖獸􅀑所乗郭氏玄中記曰千歳之狐爲􅁋婦百歳之狐爲羙女張平子西京賦曰怪獸陸梁甘泉賦注云陸梁跳也虎豹却走逢牛羊虎豹牛羊用魯論何以文爲之意韓詩外􅀓曰却走而求逮於前人上帝惠顧祓不祥楊雄長楊賦曰上帝眷顧左傳曰君若不忘先君之好惠顧寡人韓詩外􅀓曰鄭國之俗三月上巳秉蘭草祓除不祥天門夜下龍虎章真誥有八龍雲􅂐眀光章又有玉清神虎章又按黄庭内景經曰黄衣紫帶龍虎章意與真誥異然此詩特取其語爾前驅呉回後炎皇詩曰伯也執殳爲前生驅史記楚世家帝嚳以呉回爲重􅀺後復居火正爲祝融帝王世記曰炎帝長於姜水以火承木位在南方主夏故謂之炎帝絳旂丹轂朱冠裳從以甲胄萬􅀑行楊雄傳曰朱丹其轂乗風縱燎無留蔵呉志吕蒙􅀓取闘艦實以薪草灌油其中乗風縱之同時發火悉延燒曹公岸上營天髙地下日月光禮記樂記曰天髙地下萬物散殊授公以柄扶病傷漢書梅福日倒持太阿授楚其柄李廣􅀓救死扶傷不暇士如稻苗待公秧老杜􅀘稻畦水詩云揷秧適云已臨流不度公為航用􅀓􅀃作舟楫之意張平子思玄賦曰譬臨河而無航如大醫王治膏肓金光明經曰流水長者能益衆生無量壽命汝今真是大醫之王善治衆生無量重病維摩經亦云爲大醫王善療衆病左氏􅀓晉侯夢疾爲二竪子其一曰居膏之上肓之下若我何注云肓鬲也心下爲膏外證已觧中尚強外證巳解之語張仲景方書中多有之左氏􅀓云外強中乾此反而用之探囊一試黃昬湯一夲云願借上古黄昬湯按圖經本草曰合歡夜合也一名合昬韋宙獨行方胷心甲錯是爲肺癕黄昬湯治之取夜合皮掌大一枚水煑服之探嚢借用荘子語一洗十年新學腸新學謂王介甫經學也史記扁鵲􅀓曰湔浣湯胃老生塞口不敢甞漢書朱􅀶傳曰贛老生不習吏禮侯喜石鼎聮句曰塞口且吞聲魯論曰丘未達不敢甞向来狂殺今尚狂請公别試囊中方難經曰狂癲之病自髙賢也自辯智也故此詩引用黄魯直詩亦云醫得書生自聖顛老杜詩未試嚢中飡玉法又云嚢中藥未陳南豐先生挽詞二首早棄人間事漢書張良􅀓願棄人間事欲從赤松子遊耳真從地下逰漢書朱雲傳臣得下從龍逄比干遊於地下足矣故白樂天哭劉夢得詩曰賢豪雖殁精靈在應共從之地下遊丘原無起日禮記檀公趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸注云作起也老杜詩多病馬卿無日起江漢有東流此言九原雖不可作而文章之令名常與江漢俱存老杜所謂尓曹身與名俱滅不廢江河萬古流王介甫贈南豐詩曰曽子文章世無有水之江漢星之斗故此引用身世從違裏選詩曰身世两相棄又淵眀歸去來詞曰世與我而相違退之詩觀以彛訓或從違南豐仕宦不偶晚得掌誥以憂去遂死蓋從違各半也功言取次休左傳穆叔曰太上有立徳其次有立功其次有立言晉書杜預傳預常言徳不可以企及立功立言可庶㡬也不應須禮樂始作後程仇后山自謂也文中子卷末載魏徴曰大業之際徴也甞與諸賢侍文中子謂徴及房杜曰先軰雖聦眀特逹然非董薛程仇之比雖逢眀主必愧禮樂按程元仇璋皆文中予髙弟后山自謂其材本自不及程仇不得議禮樂而判優劣也又精爽回長夜左􅀓曰心之精爽是謂魂魄王仲宣詩長夜何冥冥衣冠岀廣庭謂䘮事陳衣也勲庸留琬琰形像付丹青周禮王功曰勲民功曰庸明皇孝經序曰寫之琬琰庶有􅀘於將來老杜詩形像丹青逼主介甫作蘇才翁挽詞曰音容歸繪􅀞才業付兒孫道喪餘篇翰人亡更典刑老杜詩磨滅余篇翰詩云人之云亡􅀖國殄瘁又曰雖無老成人尚有典刑侯芭才一足白首太玄經亦后山自謂也楊雄􅀓鉅鹿侯芭常從雄居受其太玄法言吕氏春秋魯哀公問於孔子曰樂正䕫一足矣李太白詩誰能書閤下白首太玄經暑雨密雨吹不㫁貧居常閉門東溟容有限西極更能存言積雨之甚西極徃徃漂蕩不能自存西極謂天柱也老杜詩西極柱亦傾按列子湯問曰共工氏與顓頊爭爲帝怒而觸不周之山折天柱絶地維故天傾西北地不滿東南注云不周山在西北之極老杜建都詩曰其如西極存又詩移柳更能存束濕炊懸釜漢書寗成傳操下急如束濕謂濕薪也韓非子曰智伯圍晉陽城襄子決晉水灌之懸釜而炊翻床補壞垣左􅀓子産壊晉館垣唐人詩穴垣􅀘墻􅂩倒身無着處此老杜床床屋漏無乾處之意退之簟詩倒身甘寢百疾愈東坡詩冗士無處著呵手不成温言爲積隂所侵也王維詩旋呵凍手暖髭鬚送江楚州濠梁初得意言有所悟入也晉書王坦之􅀓謝安曰常謂君粗得鄙趣者猶未悟之濠上邪莊子與恵子㳺於濠梁之上莊子曰儵魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子云子非我安知我不知魚之樂云云荘子又曰筌者所以在魚得魚而忘筌言者所以在意得意而忘言闕里舊論詩闕里在今兖州仙源縣漢晉春秋曰闕里者仲尼之故宅也孔子甞許商賜可與言詩此借用豈后山與楚州皆出南豐之門耶老杜云疇借論詩早晚􅀊何多難老杜云胡羯何多難經年始一辭表記云君子三揖而進一辭而退老杜云青􅃈陪􅀟入銅梁阻一辭淮人飢饉後王介甫送呉仲純詩乆爲漢吏知文法當使淮人服教條良吏拊循時前漢循吏􅀓序曰漢世良吏於是爲盛蕭何傳曰拊循勉百姓欲託山陽簿翁歸不受私后山自注云南豐之子綰爲山陽簿前漢尹翁歸拜東海太守過辭廷尉于定國定國欲屬託邑子两人終日不敢見曰此賢將汝不任事也又不可干以私爰盎􅀓申屠嘉曰使君所言公事吾且奏之則私吾不受私語送江端禮季共魯直跋后山刀工詩曰陳留江季共言行中䂓矩極似孫辛老少時正學元非世漢書轅固謂公孫弘曰公孫子務正學以言無曲學以阿世能詩新有聲退之石鼎聮句詩序曰侯喜新有能詩聲諸公交鄭泰後漢鄭泰少有才略交結豪傑名聞山東三國志泰作太多士閉何生退之傳何蕃云蕃閔親之老一日揖諸生歸飬于和州諸生不能止乃閉蕃空舎中汎愛經過數汎愛字見魯論選詩趙李相經過移書底裏傾前漢龔遂傳云移書屬縣後漢竇融傅云自以底裏上露又爲淮海别病眼向誰明張籍詩三年病眼今年校晁無咎張文潜見過白社􅀟林去此句后山自言其偶出晉書董京􅀓常宿白社中􅀓燈録傅大士致書于梁髙祖曰􅀟林􅀣下當來觧脫善慧大士後捨宅於松下建寺因􅀟檮樹名曰􅀟林后山學佛故以大士自况髙軒二妙来此句言晁張見過李賀􅀓賀七歳能辭章韓愈皇甫湜過其家使賀賦詩援筆輙就自目曰髙軒過晉衛瓘傳瓘與索靖俱善草書人號爲二妙老杜詩暫徃比鄰去空聞二妙歸排門衝鳥雀排門用樊噲排闥字韓偓詩􅂳衝水鳥飛還徃袖拂楊花去又來老杜詩柴門鳥雀噪揮壁帶塵埃呉融贈􅙒光草書歌曰人家好壁試揮拂瞬目己留三两行不憚除堂費左􅀓曰將爲子除館于西河前漢孫寳􅀓張忠欲令寳授子經更爲除舎注云除謂修飾掃除也深愁載酒回漢書楊雄􅀓時有好事者載酒肴從㳺學太白詩稽山無賀老空掉酒舡回功名付公等老杜詩致君堯舜付公等歸路在蓬莱晁張時在館中故也後漢鄧訓傳學者稱東觀爲道家蓬萊山老杜詩指􅀧虚無引歸路次韻答邢居實二首居實字敦夫邢恕和叔子少有俊聲漢庭用少公何在樂天詩曰漢庭重少公何在按漢武故事顔駟曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三世不遇也不使群飛接羽翰退之􅀕柳子厚文云羣飛刺天歐公詩晚得飛翔接羽翰今代貴人湏白髪掛冠髙處未宜彈邢詩云微意平生在江海塵冠今日爲君彈王立之詩話云元祐初多用老成故后山有此句掛􅃣見後漢逄萌􅀓彈冠見前漢王吉􅀓又秋來為客意何如千里河山信不踈老杜詩秋來爲客情李商隱詩比來秋興復何如戰國䇿呉起曰河山之險信不足保也此言信不踈謂心意相許與不以逺而踈也昔日老人今則少戯謂若比當代貴人文吕諸公猶爲少年也樂天詩云猶有誇張少年處時呼張文喚殷兄不妨紅葉閉門書尚書故實曰鄭䖍學書而病無紙知慈恩寺有杮葉數屋遂借僧房居止日取紅葉學書李商隱詩守道清秋還寂寞葉丹苔碧閉門時丞相温公挽詞三首恭黙思良弼尚書􅀃命恭黙思道夢帝賚予良弼哲廟諒闇中以温公爲相故用此事詩書正百工言以經術師表百僚也堯典曰允􅁵百工事多違謝傅晉書謝安出鎮新城疾篤還都自以本志不遂深自慨失旣薨贈太傅天遽奪楊公唐書楊綰􅀓綰薨肅宗詔羣臣曰天不使朕致太平何奪綰之速耶一代風流盡南史張融哭張緒曰阿兄風流頓盡老杜哭李常侍詩一代風流盡用此事也三師禮數崇司馬公薨二聖哭之甚哀贈大師温國公選詩任昉哭范雲曰平生禮數絶李善注引左氏名位不同禮亦異數劉禹􅃬詩魏闕新知禮數崇若無天下議羙惡併成空􅇌公詩云後世苟不公至今無賢聖又百姓歸周老孟子曰伯夷太公聞文王作興曰盍歸乎來吾聞西伯善養老者二老者天下之大老也而歸之是天下之父歸之也天下之父歸之其子焉徃東坡作温公行狀曰神宗崩公赴闕臨民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之三年待魯儒魯論子曰如有用我者朞月而巳可也三年有成魯儒見莊子時方随日化身已要人扶黄魯直見此句歎曰陳三真不可及蓋天不憗遺之悲盡於此矣前漢許后傳曰世俗歳殊時變日化老杜詩此生已愧湏人扶樂天詩登山與臨水猶未要人扶㩀行狀哲宗初公爲門下侍郎元祐元年正月公始得疾甚上詔公肩輿至内東門子康扶入對小殿九月薨于西府銘詩亦曰爲政一年疾病半之功則多矣百年之思玉几雖来晚明堂訖授圖言温公雖不預顧命而竟輔㓜主也尚書顧命皇后慿玉儿導揚末命禮記曰昔者周公朝諸侯于明堂之位史記外戚世家曰武帝召􅀞工圖􅀞周公􅀒成王以賜霍光心知死諸葛吕不韋􅀓子楚心知所謂漢晋春秋云死諸葛走生仲達事見蜀志諸葛亮􅀓注及晉書宣帝紀終不羨曹蜍世􅀃􅁃道季曰㢘頗藺相如雖千載尚凛凛恒有生氣曹蜍李志雖見在厭厭如九泉下人两句合二事用之如老杜淮王門下客終不愧孫登是也又少學真成已禮記中庸誠者非自成巳而已也所以成物也成已仁也成物智也温公平日之學以誠爲本中年託著書英宗命公爲編年一書神宗賜其書名資治通鑑公與王介甫論政不合出知永興軍乞判西京留同御史䑓以歸居洛十五年皆以書局自隨史記曰虞卿非窮愁亦不能著書輟耕扶日月此莘野之事也宋王九辯曰農夫輟耕而容與王介甫作韓魏公挽詩云親扶日轂上天衢起􅆸極吹嘘公旣執政士大夫得罪於熈豐者極力薦引而用之日月吹嘘字雖不對而事􅀔氣象實相等此詩人之妙也柳子厚文有起廢荅按漢書司馬迁􅀓曰􅀘􅁦起廢魏志鄭渾日孔公緒能清談髙論嘘枯吹生老杜詩唯待吹嘘送上天得志寧論晚成功不願餘行狀又曰公自以遭遇聖明言听計從欲以身徇天下躬親庶務病革不復自􅁴諄諄然皆朝廷天下大事也以此觀之其汲汲於功業豈肯遺餘力哉文選左太冲詠史詩曰貴足不願餘此借用一為天下慟不敢愛吾廬東坡􅀕歐公文曰蓋上爲天下慟而下以哭其私此反而用之言不復哭吾之私也淵明詩曰吾亦愛吾廬此借用其字廬謂吾所芘託焉耳老杜詩安得廣廈千萬間大芘天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足蓋以天下爲憂而忘其私也後山用此意次韻荅學者四首后山自注云黄州何郎兄弟曽慥詩選云何頡字斯舉黄岡人甞從蘇黄問學津津爽氣貫眉目十五男兒萬里身莊子庚桑楚篇老子謂南榮趎曰然而其中津津乎猶有惡也此借用其字筆下倒傾三峽水老杜詩曰詞源倒流三峽水胷中别作一家春􅀓燈録僧問崇信曰翠微迎羅漢意作麽生師曰别是一家春樂天詩云盤下中分两州界燈前合作一家春又黃塵投老得何郎王介甫詩黄塵投老倦怱怱准擬明年共我長老杜詩春來准擬開懐乆又示宗武詩曰明年共我長熏沐不為杯酒汚欲其脩㓗不作少年熊也國語曰三亹三沐注云亹一作熏漢書司馬遷書曰未甞衘杯酒接殷勤之歡飛􅀭未許老夫量老杜贈李太白云飛揚跋扈爲誰雄本借用北史帝紀齊髙勸語文選任彦昇作王文憲集序載􅀽粲與詩云老夫亦何􅀉之子照清襟又暗中摸索不難知國史纂異許敬宗性輕見人多忘之或謂其不聦乃曰卿自難記若遇曹劉沈謝暗中摸索著亦可識眼裏輪囷却見稀前漢鄒陽傳蟠木根抵輪囷離竒而爲萬乗器者以左右先爲之容也注輪囷離竒委曲盤戾也行地徑湏先八駿易坤卦曰牝馬地􅀋行地無疆八駿見穆天子􅀓刺天終不羨群飛退之􅀕柳子厚文曰子之視人自以無前一斥不復羣飛刺天又太阿無前鋒不缺越絶書楚王召風湖子令之呉越見歐冶子使爲鐡劒三枚一曰龍泉二曰太阿三曰工市荘子􅀃劒曰此劒直之無前漢書賈誼􅀓曰釋介斧之用而欲嬰以芒刃臣以爲不缺則折鈆刀不堪供一切後漢班固賔戯曰鈆刀皆能一斷十洲記曰昆吾割王刀切玉如切土至柔繞指剛則折文選劉琨詩曰何意百煉剛化爲繞指柔老子曰太剛則折善而蔵之光奪月荘子庖丁善刀而藏之酉陽雜爼曰李廣琛有劒或風雨夜迸光出室環照方丈李白上李長史書曰明奪秋月次韻􅁗覯聽雞聞鴈二首行㫁哀多影不留老杜歸鴈詩行㫁不堪聞又􅀌鴈詩哀多如更聞文選江文通詩寒郊無留影有人中夜攪衣裘選詩憂愁不能寐􅄃衣起徘徊筆頭細字真堪恨眼裏長檠不觧愁哀樂無定隨境而變此寒士貴人同聞而異趣也退之短檠歌曰太學儒生東魯客二十辭親來射䇿夜書細字綴語言两目眵昬頭雪白此時提携當案前看書到曉那能眠一朝富貴還自恣長檠髙張照珠翠吁嗟世事無不然墻角君看短檠棄又立馬堦除待一鳴何如春夢不聞聲言朝士汲汲不如閑居之適也固知鷄口羞牛後不待鳴群已可驚史記蘇秦􅀓寧爲鷄口無爲牛後楚世家曰有鳥在於阜三年不鳴鳴必驚人僧祇律曰天地釋化爲羔子鳴羣喚母嘲􅁗覯覯字少章秦觀少㳺之弟按王立之詩話少章登第後方娶后山作此詩時猶未娶也故多戯句長鋏歸来夜帳空史記孟甞君傳馮驩彈劒而歌曰長鋏歸來乎無以爲家文選孔稚圭北山移文曰蕙帳空􅀆夜鶴怨衡陽回鴈耳偏聦戯其獨宿無寐也衡山有回鴈峯耳聦用晉書殷仲堪父聞蟻闘事若為借與春風看無限珠璣咳唾中杜牧之送李羣玉詩曰玉白花紅三百首五陵誰唱與春風後漢趙壹傳咳唾自成珠和豫章公黃梅二首豫章公謂黄魯直魯􅀡蓋豫章人寒裏一枝春白間千􅀧黄荆州記陸凱􅀉范曄梅花詩曰江南無所有聊贈一枝春道人不好色行處若為香梁書蕭􅊫不好色惡見婦人相去數丈猶聞其臭此句暗用其意豫章戒律甚嚴故有道人之語花香惱人政由愛着愛旣忘矣香復奚爲又色䡖花更艶體弱香自永樂天詩貴妃宛轉侍君側體弱不勝珠翠繁東坡茶䕷詩不糚艶已絶無風香自逺玉質金作裳棫樸詩金玉其相注相質也文選劉越石表曰玉質㓜彰西京􅄂記上作黄鵠歌曰金爲衣􅀆菊爲裳山明風弄影選詩山明望松雪王介甫詩陂梅弄影爭先舞按文選舞鶴賦疊霜毛而弄影荅張文潜后山自注曰來詩云欲餉于桑掃問婦食簞過午尚懸墻我貧無一錐􅀓燈錄溈山􅀓香嚴頌曰去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年錐也無所向皆四壁漢書司馬相如􅀓家徒四壁立瀛洲足風露胡不减飢色唐書禇亮􅀓弘文館學士十八人天下所慕向謂登瀛洲文濳時在館中故用此事列子曰列姑射山在海河洲中山上有神人焉吸風飲露不食五谷又曰子列子窮容皃有飢色老杜詩蓬萊足雲氣昔聞杜氏子翦䯻事尊客杜氏子唐王珪母也老杜送王評事詩云我之曽老姑尓之髙祖母尓祖未顯時歸爲尚書婦隋朝大業末房杜俱交友長者來在門荒年自糊口家貧無供給客位但箕帚俄頃羞頗􅈿寂寥人散後入怪􅁂髪空吁嗟爲之乆自陳剪䯻鬟鬻市充盃酒按新唐王珪􅀓云珪母李氏與杜詩不同或云李杜同出故子羙謂李爲姑尊客出曲禮君婦㝎不然三梳奉巾􅌨左氏􅀓嬴氏謂晉太子圉曰寡君使婢子侍執巾櫛以固子也后山詩註卷第一
