  text: 后山詩註卷第二
  hash: sha256:6277692f8208f1c2a15e84f437ca5afb4125d51eea4b24829c06f9f1df2032af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_002-1a}
body:
  text: 九日􅀉􅁗覯疾風回雨水明霞老杜詩殘夜水明樓沙歩䕺祠欲莫鵶柳子厚鐡爐歩志曰江之滸凡舟可縻而上下者曰歩漢書陳勝􅀓注云䕺祠謂草木岑蔚者九日清樽欺白髪十年為客􅀒黄花老杜詩生逢酒賦欺登高懐逺心如在登髙蓋九日故事文選潘岳秋興賦曰登山懐逺而悼近李善注引齊景公逰牛山流涕而歎晏子笑之云云杜牧之九日詩云古徃今來只如此牛山何必淚霑衣向老逢辰意有加遇節物而多感老者則然淮海少年天下士史記魯仲連􅀓吾乃今日知爲天下之士也秦覯漣水軍人在楊州之境故云淮海少年可能無地落烏紗用晉孟嘉落帽事唐令狐楚重陽日登落帽䑓詩云貴重近臣光綺席􅀏談從事落烏紗臣野餘力唐虞後沉人海岱西不應容桀􅃛寧復有青齊山東盗賊以巨野爲淵藪平人多被沉溺詩意謂非神禹留此餘力遺患後人也向使無此澤以受衆流青齊其爲魚矣此與東坡艶澦堆賦同意禹貢曰海岱及淮惟徐州大野旣豬東原底平大野一名鉅野史記貨殖􅀓曰桀􅃛奴人之所患也又漢書馮奉世􅀓曰羗虜桀􅃛賊害吏民燈火魚成市帆檣藕帶泥劉夢得詩漁家燈火明老杜詩藥物楚老漁商市樂府黄淡思曰象牙作㠶檣老杜詩採藕不洗泥十年塵霧底瞥眼怪鳬鷖新自京洛風塵中來故見水鳥而怪歎老杜詩呀坑瞥眼過示三子時三子已歸自外家去逺即相忘歸近不可忍脞􅀃載獨􅀌遐詩曰近家心轉切不敢問來人兒女已在眼眉目略不省言别乆不復記憶也選詩薜荔若在眼喜極不得語淚盡方一哂東坡贈朱壽昌詩喜極無言淚如雨老杜詩畏虎不得語了知不是夢華嚴梵行品曰了知境界如幻如夢此反而用之東坡詩如今不是夢真介在廬山忽忽心未穏前漢王褒􅀓太子苦忽忽善忘不樂雪峯襌師􅀧胷云某甲這裏未穏在嗚呼行去年米賤家賜粟百萬官倉不餘掬元祐初左司諌朱光廷奉使賑濟河北不問民戶之等一㮣支貸而河北措置司積年物斛九百萬爲之一空此詩所指豈謂是與詩云終朝采緑不盈一掬青錢随賜費􅇷呼昔日剜創今􅀘肉老杜詩恰有三百青銅錢圵夢􅃈言載聶夷中詩云二月賣新絲五月糶新榖醫得眼下瘡剜却心頭􅁏今年夏旱秋水生江淮轉粟千里行前漢鄒陽􅀓轉粟流輸千里不絶不應逺水救近渴此俗間語也韓非子亦有逺水救近火之語空倉四壁雀不鳴益州耆舊􅀓楊宣爲河内太守行縣有羣雀鳴宣曰前有覆車粟此雀相隨欲徃食歐公詩寒雀聚空倉似聞為政不為費善政當惠而不費徒惠而不知爲政其可繼乎兩不相傷兩相濟老予曰两不相傷而徳交歸焉此借用十年歛積用一朝驚濤破山風動地言非常之政不可乆也老杜詩築塲看歛積荘子曰疾雷破山風振海而不能驚老杜又云東南飄風動地至秋懐示黄預䆫鳴風歷耳柳子厚夢歸賦云風纚纚以經耳佛書有一歷耳根之語道壊草侵衣老杜詩壊道哀湍㵼月到千家静老杜詩千家山郭靜朝暉林昬一鳥歸老杜詩日暮歸㡬翼北林空自昬又云林昬罷幽磬冥冥塵外趣楊子曰鴻飛冥冥弋人何􅆲焉此借用稍稍眼中稀疑用老杜眼前無俗物之意史記平原君傳賔客稍稍引去者過半太白詩古來相接眼中稀送老湏公等秋棊未觧圍一作小合圍老杜詩送老白雲邊曹攄圍棊賦曰合圍促陣交相侵伐送張支使曠度逢知晚髙才處不難文選夏侯湛東方朔盡賛曰逺心曠度嵆康書云長才廣度無所不淹清秋一鶚上後漢孔融薦禰衡云鷙鳥累百不如一鶚老杜鵰賦云當九秋之凄清見一鶚直上拭目萬人看文選楊脩書云觀者駭視而拭目白酒初同醉周禮酒正注曰昔酒無事而飲也今之酋乆白酒所謂􅃇醳者也樂天詩花時同醉破春愁黄花已戒寒禮記月令季秋之月曰鞠有黃花國語曰火見而清風戒寒憑将衰老事一一報長安長安蓋后山􅃇遊之地前詩有城南寓居篇􅀰長安所作送杜侍御純陜西轉運餽粮千里古無䇿木牛流馬功不極漢書韓信􅀓千里餽粮師不宿飽唐書夷狄􅀓序劉貺謂漢無䇿蜀諸􅁑亮以木牛流馬運竟坐粮不繼不能成功漢書刑法志曰兵寢刑措帝王之極功此借用邊頭數米換黄金老杜詩邊頭公卿仍獨驕荘子曰簡髪而櫛數米而炊晉書劉曜逼京師米斗金二两将軍汗馬未伏櫪史記晉世家曰矢石之難汗馬之勞魏武帝歌曰老􅂹伏􅇫志在千里􅃛羗人面作胡語後漢馬援􅀓曰􅃛羗旅拒此乃太守事耳漢書匈奴賛曰人靣獸心老柱詩云千􅀊琵琶作胡語鳥䑕貪生爾如許言鳥䑕尚知貪生而􅃛羗輕生如此晉書王濬傳曰雀䑕貪生苟此一活耳熊虎可避蟁可驅覆巢熏穴意何如言不必深入窮討也漢書匈奴傳嚴􅀹曰視夷狄之侵譬猶蟁之螫驅之而已禮記曰不覆巢韓詩外傳曰社䑕燻之恐燒木老杜詩主簿意何如漢虜相當庸可盡選詩漢虜方未和後漢南匈奴􅀓窮鳥困獸皆相救死況種􅀋繁熾不可單盡又􅀓論曰漢之疲耗略相當矣聊城正用一封書史記魯仲連􅀓燕將保守聊城田單攻之不下仲連乃爲書約之以矢射城中燕將見書自殺此詩言得人則一書可以弭難何必窮兵黷武㢤老杜詩自􅀉一封書今已六月後巧手莫為無麵餅誰能留渴湏逺井两句皆善用俗語言治邊不可無人材猶作餅不可無􅋗而人材政自有可用者何必逺取如留渇以待井耶杜君自徐就改陜漕故詩云尓國家有急君得辭漢書陳湯􅀓曰國家有急君其母譲老杜送楊監赴蜀詩云相公鎮梁益軍事無孑遺解榻再見今用材復擇誰况君已髙位爲郡得固辭徐人不勞扣􅀜請後漢种暠遷凉州刺史吏民詣闕請留一年周禮􅀜人注曰扣􅀜猶謁􅀜人也隴上壯士莫捫舌晉書載記曰隴上壯士有陳安毛詩莫捫朕舌此借用以言壯士得食不復有哺之憂老杜詩曰運粮繩橋壯士喜河西狂王防係頸河西狂王謂夏國主也漢書西城􅀓坐知狂王當誅賈證請必係單于之頸向来此地㡬送迎草間翁仲口不瘖十年兩熟飽可待一􅀊四守人何心言徐州數易守臣人必有不安其生者漢書黄覇傳曰數易長吏送故迎新之費及姦吏縁絶簿書盗財物水經注曰鄗南千秋亭壇廟之東枕道有两石翁仲南北相對又按魏志明帝景初二年鑄銅人二列於司馬門外號曰翁仲東坡罷徐州􅀉子由詩曰道邊􅀟石人幾見太守發有知當解笑撫掌冠纓絶則徐州有石人可知后山此詩蓋用東坡意世􅀃和長輿問楊右衛何在客曰向來不坐而去老稚持車車不留前漢韓延壽􅀓老稚扶持車轂歸人不行行轉頭歸人特湏􅁷未行行即逺矣唐崔塗詩曰自是不歸歸便得即此句法樂天詩萬事轉頭空􅀜中正須蕭丞相漢書蕭何守􅀜中計户轉漕給軍老杜詩􅀜中正留蕭丞相省内早要富民侯一本此下又有两句曰可同一夫在所憫歳晚得無溝壑憂後刪去漢書田千秋爲丞相封富民侯送楊侍禁兼􅀉顔黄二公二首長道魯直相逢今已晚同府尚經年衆口不成虎韓非子曰龐共與太子質於邯鄲謂魏王曰夫市無虎明矣然而三人言成市虎今夫邯鄲去魏逺於市議臣者過三人願王察之諸公更薦賢更字作平聲讀兩親須薄禄􅀃􅁐子路曰家貧親老者不擇禄而仕昔者由事二親􅀒米百里之外老杜詩上公有薦者累奏資薄禄一障欲乗􅁁漢書張湯傳武帝謂狄山曰吾使生居一郡能無使虜人盗乎山曰不能居一障間山曰能迺山乗障徃問顔夫子何妨試着鞭欲令徃見顔君以爲道地顔君名復字長道晉書劉琨􅀓常恐祖生先吾着鞭又多問黃居士終年欠一書漢書趙廣漢􅀓曰爲我多謝問趙君元稹詩只是堂前欠一人君一作人因人􅀱消息老杜詩因人問消息有使報何如古樂府曰有信數􅀉書無信長相憶老杜詩欲問平安無使來向晚逢楊子真堪託後車文選魏文帝與呉質書曰文學託乗於後車親年方頼禄不惜借吹嘘阮嗣宗詩寵禄豈足頼此反而用之言以親飬之故也家語子貢曰家貧親老不擇禄而仕魏志鄭渾曰孔公緒能清談髙論嘘枯吹生南史謝朓􅀓士子聲名未立當共奨成無惜齒牙餘論送外舅郭大夫􅇪路提刑天險連三峽易坎卦曰天險不可升也官曹㩀上㳺老杜詩何當官曹清漢書項羽􅀓注曰上㳺水之上流也百年􅀟􅁂白萬里一身浮老杜詩百年􅀟白􅁂一别五秋螢莊子曰其生也若浮可使人無訟寧湏意外憂無訟見魯論下句勸其不生事也前詩亦云莫作分外慮晋書王彬傳荆州守文豈能意外行事平生晏平仲能費㡬狐裘勸其止足也用晉阮孚一生當著㡬两屐之意禮記檀弓有若曰晏子一狐裘三十年雪後黄樓􅀉􅀒山居士張仲連林廬煙不起老杜詩㡬地别林廬城郭􅀊将窮退之詩歳窮寒氣驕雲日明松雪選詩雲日相輝映又詩山明望松雪溪山進晚風老杜詩山谷進風凉人行圖􅀞裏鳥度醉吟中太白詩人行明鏡中鳥度屏風裏老杜詩飛閣捲簾圖􅀞裏唐白樂天自號醉吟先生不盡山隂興天留憶戴公晉書王徽之甞居山隂夜雪初霽忽憶戴逵逵時在剡溪便夜乗小􅂳詣之經宿方至造門不前而反人問其故徽之曰本乗興而來興盡而反何必見安道邪后山謂興盡則未必相憶寧不爲雪夜之行使有餘興也東坡訪張山人詩萬木鏁雲龍天留與戴公此借用謝人􅀉酒舊香餘味􅀉黄封黄封謂宫酒以黄羅帕封之東坡詩上尊日日㵼黄封厭見春泥滿眼紅紅泥謂外酒王介甫詩春泥滿眼路嶇嶔此借用其字千乗莫從公子後漢書韓王信􅀓陳豨􅁀魏公子招致賔客隨之者千餘乗百壷能為故人東老杜詩不有小舟能盪􅄴百壷􅀖送酒如泉儀禮聘禮賔之幣唯馬出其餘皆東從蘇公登後樓倐作三年别才堪一觧顔列子第四篇曰五年之後心更念是非口更念利害老啇始一解顔而笑老啇氏蓋列子之師也樓􅀌帶清洛老杜云樓􅀌屬晚晴元豐中導洛水以爲清汴南都水所過也林缺見巴山東坡蜀人當是時必有望逺思歸之意老杜詩何路出巴山五月池無水張籍詩六月人家井無水夜聞白鼉人盡起千年鶴自還續搜神記曰遼東華表柱有鶴集其上曰去家千年今始歸白鷗沒浩蕩愛惜􅁂毛班勸公髙退以安晚景也老杜詩白鷗没浩蕩萬里誰能馴又曰更憶􅁂毛班送蘇公知杭州東坡岀知杭州道由南京后山時爲徐州教授詣徐守孫􅁴願徃見而􅁴不之許乃託疾謁告來南京送别同舟東下至宿而歸事見東坡送陳􅀓道書及劉安世彈章平生羊荆州追送不作逺羊荆州謂羊祐也以比東坡按晉書羊祜傳督荆州諸軍又按晉書郭奕傳奕字大業爲野王令羊祜甞過之奕歎曰羊叔子何必减郭大業少選復徃又歎曰羊叔子去人逺矣遂送祜岀界數百里坐此免官后山旣送東坡爲劉安世所彈乞正其罪甞除太學􅀶士又爲言者以此事論列遂罷此句殆亦詩讖也有客詩云薄言追之注云追送也世􅀃范逵旣去陶􅋲追送不已且百許里文選孫子荆詩傾城逺追送餞我千里道豈不畏簡書言法令不許私出也詩云豈不懐歸畏此簡書劉安世章亦云士於知已不無私恩旣郊於官則有法令師道擅去官次陵蔑郡將徇情亂法莫此爲甚放麑誠不忍此句與上句若不相屬而意在言外叢林所謂活句也按韓非子孟孫獵得麑使􅁗西巴載之持歸其母隨之而啼秦西巴弗忍而與之孟孫大怒逐之三月復召以爲子􅀓曰夫不忍麑且忍吾子乎唐陳子昻感寓詩曰吾聞中山相乃屬放麑翁􅀌獸猶不忍况以奉君終嗚呼觀過可以知仁后山越法出境以送師友亦放麑之􅀋也一代不數人百年能幾見后山謝再授徐州教授啓亦曰昨縁知􅃇出守東南念一代之數人而百年之㡬見間以重江之阻莫期再歳之逢使一有於先顛爲两途之後悔又謂中山之相仁於放麑亂世之雄疑於食子惟其信之旣篤所以行之不疑云云其曰中山之相蓋承子昻之誤也昔為馬口衘今為禁門鍵鮑照詩昔如鞲上鷹今作檻中猿老杜詩昔爲水上鷗今如罝中兔后山此句頗用其律馬衘猶可脫去禁鍵不容輙開言官身拘係不可輙出也退之詩歸來得便即遊覽暫以壯馬脫重衘按律宫殿門忘誤不下鍵及毀管鍵而開者皆出罪王逸注楚辭大司命曰大開禁門一雨五月凉中宵大江滿風帆目力短江空􅀊年晚風㠶愈逺恨目力不能送之人去江空恍然自失吾之年歳日已遲暮惧其不復再見也其愛賢惜别之意可謂切矣韓詩歳聿其暮薛君曰言君之年歳晚也送􅁗覯二首覯字少章少游之弟也從東坡學於杭州士有從師樂諸兒却未知欲行天下獨信有俗間疑柳子厚荅韋中立論師道書曰獨韓愈奮不顧流俗抗顔而爲方未匱竭端為李君御後漢李膺􅀓荀爽甞謁膺因爲其御旣還喜曰今日乃得御李公矣盡得鄴侯書退之送諸葛􅁴徃隨州讀書詩云鄴侯家多書挿架三萬軸結友真莫逆史記㢘頗􅀓燕王私握臣手曰願結交莊子曰子桑戶孟子反子琴張三人相視而笑莫逆於心遂相與友論才有不如終上句意言亦當擇交無友不如已者折腰終不􅀘晉書陶淵明􅀓吾不能爲五斗米折腰拳拳事郷里小兒退之復志賦曰豈不登名於一科􅀆曽不􅀘其遺餘此句后山自道也可但曵長裾嚴光詩可但歩兵偏愛酒漢書鄒陽􅀓何王之門不可曵長裾詩意謂微官之與布衣其得失相去無㡬不必以貧賤依人爲羞也和江秀才獻花三首風雨東籬冷落看陶淵明詩採菊東籬下悠然見南山清溪水落玉峯寒老杜九日藍田庄詩云藍水逺從千澗落玉山髙並两峯寒酒家不辦當壚費當壚事見司馬相如􅀓觀未篇落句江君當是酒家乞與先生種杏壇荘子曰孔子休坐乎杏壇之上后山時爲徐州學官云又踈花得雨數枝黄白髪縁愁百尺長老杜丁香詩踈花枝素艶太白詩白髪三千丈縁愁似个長要與老生同一醉故留秋意作重陽又江公􅀌憤不宜秋韓非子有􅀌憤篇李商隱詩歸夢不宜秋吟作秋虫到白頭東坡詩云吟詩莫作秋䖝聲天公怪汝鈎物情使汝未老華髪生過我可為千日醉􅀶物志曰中山有酒飲者一醉千日從公難作百錢逰詩意謂官居不可放浪也晉書阮脩傳常以百錢掛杖頭至酒店便獨酣暢東坡詩芒鞵青竹杖自掛百錢逰次韻李節推九日登南山平林廣野􅀐䑓荒詩曰依彼平林漢書晁錯􅀓平林廣野此車􅀐之地文選謝宣逺靈運皆有九日從宋公戯馬䑓集送孔令詩李善注云蕭子顯齊書宋武帝爲宋公在彭城九日出項羽戯馬䑓至今相承以爲舊凖按􅀐䑓即戯馬䑓樂史寰宇記曰戯馬䑓在徐州彭城縣南三里山寺鳴鍾報夕陽老杜詩人扶報夕陽人事自生今日意寒花只作去年香李後主詩􅁂從近日添新白菊是去年依舊黄老杜詩寒花只暫香巾欹更覺霜侵􅁂用落帽事語妙何妨石作腸漢書賈􅂢之傳君房下筆言語妙天下唐皮日休桃花賦序云宋廣平爲相貞姿勁質剛熊毅狀疑其鐡腸與石心不解吐婉媚辭然觀其文而有梅花賦清便富麗得南朝徐􅁃體殊不􅁼其爲人落木無邊江不盡老杜登髙詩無􅁁落木蕭蕭下不盡長江衮衮來此身此日更湏忙言節物可念政應行樂尚須汲汲於世故邪别􅀒山居士張仲連田園相與老此别意何如漢書汲黯􅀓隱於田園老杜詩此别意茫然又詩主簿意何如更病可無酒言臨分不可不飲縱復病惱猶當勉強也樂天詩欲别能無酒猶寒已自和韓偓詩春隂漠漠土脉潤寒氣微微風意和髙名胡未廣後漢許劭􅀓曰與兄靖俱有髙名􅂖梁曰心志旣修而名譽不聞友之過也詩興尚能多老杜詩憶在潼􅀜詩興多退之詩四句意多能沙草東山路猶須一再過一再字見司馬相如􅀓送趙教授束髪相看到白頭了知公􅁂不勝憂司馬彪續漢書曰卓茂自束髪至白首未甞與人有過杜牧之公道世間惟白髪貴人頭上不曽饒可堪親老須三釜莊子曰曽子再仕而心再化曰吾及親仕三釜而樂又着儒冠忍一羞老杜詩儒冠多誤身左氏曰一慙之不忍而終身慙乎平世功名須晚節向来旬月取封侯此句用東方朔答客難意熈豐間士大夫進用甚峻今不然也孟子曰禹稷當平世漢書鄒陽􅀓云晚節末路車千秋傳云旬月取宰相封侯北州豪傑知誰徤趙君當是北人後漢光武紀北州弭定竇憲􅀓曰西州豪傑遂復附從老杜詩眀年此度知誰徤乞我黃淤十里秋乞字作去聲讀歐公詩知君欲别西湖去乞我橋南菡蓞香又詩換得西湖十頃秋黄淤謂河水所淤之田也漢書溝洫志曰河水有所㳺盪時至而去則塡淤肥羙民耕田之或乆無害老杜用塡淤字作平聲東坂亦云楚人種麥滿河淤次韻春懐欲作歸田計文選張平子有歸田賦無如二頃何史記蘇秦傳使我有雒陽􅀒郭田二頃豈能佩六國相印乎折腰方頼禄折腰見上注老杜詩上公有薦者累奏資薄禄拭面未傷和唐書婁師徳􅀓師徳弟守代州辭教之耐事弟曰人有唾面㓗之而巳師德曰未也㓗之是違其怒正使自乾耳公羊傳曰孔子反袂拭面老杜梔子詩云與道氣傷和日下烏聲樂左􅀓曰鳥烏之聲樂塵生鳥跡多世􅀃晉簡文帝爲撫軍時牀上塵不聽拂見䑕行跡視以爲佳后山蓋用此意渡頭留小楫乗興得相過乗興見上注文選阮籍詩趙李相經過黄梅五首異色深宜晚玉䑓新詠沈約芳樹詩曰氤氲非一香參差多異色生香故觸人石曼卿詩樂意相􅀜禽對語生香不斷樹交花樂天榴花詩香塵擬觸坐禪人不施千􅀧白玉登徒子好色賦曰著則太白施朱則太赤别作一家春一家春見上注又舊􅁂千絲白老杜詩人生不再好鬂髪白成絲新梅百葉黃老杜四松詩終然棖撥損得恡千葉黄留花如有待退之詩留花不發待郎歸迷國更湏香言其色自足迷國也尚何湏香邪宋玉賦曰嫣然一笑惑陽城迷下蔡又冉冉稍頭緑婷婷花下人東坡詩冉冉緑霧生人衣杜牧之詩荳蔻梢頭二月春元微之李娃行曰玉顔婷婷街下立欲􅀓千里信暗折一枝春見上注又黃裏含真意退之燈花詩黄裏排金粟蓋謂額間花鈿也此借用春容帶薄寒趙師民詩委地露花啼曉恨拂堤煙柳弄春容欲知誰稱面劉禹􅃬詩綺季衣冠稱鬂靣按􅁃信蕩子賦曰緑葉起衫紅花宜靣編挿一枝看又花裏重重葉􅁫頭􅀧􅀧黄秪應報春信故作着人香玉䑓新詠徐君􅃇詩草短猶通屧梅香漸着人田家鷄鳴人當行犬鳴人當歸秋來公事急岀處不待時左􅀓曰公事有公利孟子曰公事畢然後敢治私事昨夜三尺雨竈下已生泥人言田家樂爾苦人得知漢書楊惲曰田家作苦歐陽公歸田樂詩曰田家之樂知者誰我獨知之胡不歸爾苦猶言如許苦也巨野二首當是移頴州教授時所作紅落芙蕖晚青深蒲稗秋謝靈運詩蒲稗相因依平湖無過鳥鳴鼓有行舟老杜詩打鼓發船何處郎又蒲港侵衣緑蓮塘亂眼紅退之送王塤序云猶航㫁港絶潢老杜竹詩色侵書帙亂宋莒公集梁山泊水無岸行舟多穿菰蒲爲道州人謂之蒲巷此港字恐當作巷将身供世事結䌫待回風老杜詩惟將遲暮供帳病又詩結䌫排魚網又詩回風吹早秋别叔父録曹為吏專刑法漢書薛宣傳吏道以法令爲師成家託弟昆老杜詩實惟親弟昆三年如昨日一笑更何言三年一􅀏用列子事見上注扶老湏微禄漢書孔光􅀓賜太師靈壽杖注扶老杖也老杜詩耽酒須微禄移官實至恩老杜詩微官近至尊時后山自徐學移頴王吉傳可謂至恩兩踈元父子何日復東轅漢書踈廣􅀓廣謂兄子受曰豈如父子相隨出􅀜歸老故郷乎遂上䟽乞骸骨公卿大夫故人邑子設祖道供張東都門外東轅猶左氏所謂南轅反斾岀清口家世山東飽耕稼孟子曰自耕稼陶漁以至爲帝晚託一舟順流下爾雅順流而下曰泝㳺漁溝寒餅不下筯推柂轉頭更五夜意謂發漁溝時尚未夕食舟行已遲明矣王介甫詩任村炊米朝食魚日暮榮陽驛中宿與此同意晉何曽傳猶言無下筯處老杜詩捩柂開頭捷有神漢儀中黄門持五夜平明放溜岀清口霜落潮回霧連野歐公詩江城月下夜聞歌淮浦山前朝放溜平淮一夢三十里有日無風神所借摭遺新􅀃王勃自洪州旋舟謝向時所見老叟曰神旣借以好風躬修牢酒以報神賜似憐憂患滿人間百孔千瘡容一罅退之荅孟簡書曰羣儒區區修􅀘百孔千瘡隨亂隨失文章末技将自効老杜詩文章真小技班固幽通賦曰操末技猶必然􅀆文選任彦昇作王文憲集序曰昉甞以筆扎見知思以薄技効徳漢書蕭望之􅀓曰爭願自効語不驚人神可嚇后山自謂文章尚不能動人山川之神其可嚇耶老杜詩爲人性僻耽佳句語不驚人死不休荘子曰今子欲以子之梁國而嚇我耶嚇音許嫁反子女玉帛君所餘左􅀓曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也按搜神記呉郡太守張公直過廬山其子夢爲廬山君所聘怖而􅃍發中流􅂳不行下女水中此詩所言子女謂此􅀋也􅀉聲白鳥煩多謝漢書趙廣漢􅀓曰􅀉聲謝我又曰爲我多謝問趙君泛淮冬暖仍初日潮回更下風鳥飛雲水裏人語櫓聲中退之進學解曰冬暖而兒號寒杜牧之詩鳥去鳥來山色裏人歌人哭水聲中平野容回顧言望郷之眼不爲重山所隔老杜詩平野入青徐無山㑹有終言雖未有可隱之山豈終老於行役而不返故里耶此移頴時所歎也易曰君子有終老杜詩人生亦有初此効其律􅀝檣聊自逸吟嘯不湏工晉書王廙􅀝柂樓長嘯神氣甚逸王導謂􅁃亮曰世將爲傷時識事亮曰正足舒其逸氣耳又􅁃氷吟嘯鼓柂沂流而去東坡詩云作詩不須工猴馬并引楚州紫極宫有􅀞沐猴振索以戯馬頓索以驚圉人不測從後鞭之人言沐猴宜馬而今爲累作詩以導馬意韓鄂四時纂要曰常繋獼猴於馬房内辟惡消百病令馬不着疥沐猴自戯馬自驚漢書項籍􅀓楚人沐猴而冠圉人未觧猴馬情周禮圉師掌敎圉人飬馬猴其天資馬何罪史記啇君賛其天資刻薄人也意欲防患猶傷生宋書王泰曰酒雖㑹性亦以傷生異􅀋相宜亦相失同􅀋相傷非所及非所及猶言非思慮所及也物惡傷其􅀋此理之固然而其間亦有相傷者豈可復以常禮待之耶文選李陵書曰但見異􅀋此借用史記孔子世家曰君子諱傷其􅀋志行萬里困一誤呉志陸遜􅀓志行萬里不中道而輟足老杜詩當時歷塊誤一蹶委棄非汝能周防吐豆齕荄甘伏櫪唐李林甫傳曰君等不見立仗馬乎終日無聲而飲三品芻豆一鳴則黜之矣莊子馬蹄篇齕草飲水翹足而陸伏櫪見上注后山自徐學除太學􅀶士以言者罷旣而移頴州故有同􅀋相傷與志行萬里誤一困之語徐氏閑軒徐氏謂徐大正東坡亦有閑軒詩倦逰梁楚愛吾廬老􅀉山林孰與娯漢書司馬相如􅀓曰客遊梁又曰長卿故倦遊淵明詩吾亦愛吾廬想見杖􅀺臨過鳥言軒檻之髙莊子曰原憲杖􅀺而應門柳子厚柳州山水記曰乃臨大野飛鳥皆視其背更能赤手縛於莬魯直詩守心如􅅞虎此用其意言處閑之難也東坡詩當年老使君赤手降於莬左􅀓曰楚人謂虎於莬君寧平世輕三釜孟子曰禹稷當平世三釜見上注我亦東原有一區漢書楊雄􅀓有宅一區擬買嬋姢作歸計可無堆玉斗量珠元微之李娃行曰平常不是堆珠玉難得門前暫徘徊劉禹􅃬泰娘歌曰路傍忽見停隼旟斗量明珠鳥傳意按嶺表録異梁氏女有容貌石季倫以真珠三斛買之即緑珠也􅀉豫章公三首后山自注云許官茶未􅀉黄魯直家於洪州之􅀟井洪即古豫章密雲不雨卧烏龍張舜民小􅀃云熈寧末神廟有㫖下建州製密雲龍其品又髙於小團周易密雲不雨自我西郊此借用言茶之未破已足人間第一功言未戰而勝睡魔也漢書蕭何功第一無汗馬之勞得諾向来䡖季子漢書季布􅀓椘人諺曰得黃金百不如得季布諾打門何日走周公盧仝謝孟簡惠茶詩曰日髙丈五睡正濃將軍打門驚周公蓋用魯論不復夢見周公意后山爲學官暗用邊韶事又愧無一縷破􅀟􅇛破團茶法多以線縷觧之􅀟􅇛謂大小􅇛也慣下薑鹽枉肺肝薛能鳥觜茶詩云鹽損添常戒薑宜煑更誇東坡和􅀉茶詩云老妻稚子不知愛一半已入薑鹽煎誓酒不應忘此老晉書劉伶􅀓伶妻勸伶㫁酒伶曰吾不能自禁惟當祝􅀑神自誓耳后山持律酒戒甚嚴故有此語論詩寧肯乞麄官薛能謝王彦威􅀉茶詩曰麄官􅀉與真拋却頼有詩情合得甞乞音氣又人須百斛買􅀟鬟百斛見上注玉䑓新詠辛延年詩云一鬟五百萬两鬟千餘萬魯直詩欲買娉婷歌煮茗我無一斛明月珠水截龍章試虎班史記蘇秦􅀓水截鴻鵠晉書嵇康􅀓龍章鳯姿此借用其字龍章謂茶虎班謂盞老覺才踈渾不稱自携雲月瀉潺湲樂天詩一别承眀三領郡從教人道是粗才老杜詩雲月遞微明此借用其字言建瓷如雲中之月也張平子思玄賦曰亂弱水之潺湲字林曰潺湲流貌湲音爰亦音侯頑切贈􅁗覯兼簡蘇迨二首兩􅁗並立難爲下史記孟甞君􅀓云􅀔不两立爲雄世􅀃後漢陳寔二子紀字元方諶字季方寔曰元方難爲兄季方難爲弟此句用其事魏略栢範妻曰君前在東坐欲擅斬徐州人謂君難爲下今羞爲吕昭屈難爲上也此句用其字萬里長驅在此初成都記萬里橋後主時費禕聘呉諸􅁑亮祖於此禕曰萬里之行故始於此矣别後未忘三曰語唐書陸贄􅀓張鎰有重名贄徃見語三日竒之人来肯作數行書老杜詩相看過半百不􅀉一行書又文章從古不同時言知音未必並世也漢武聞司馬相如賦曰朕獨不得與此人同時㢤詩語驚人筆亦竒詩語驚人見上注范曄􅀓曰謂序論筆􅀔縱放實天下之竒作柳子厚先友記曰韓㑹弟愈文益竒過與阿平應絶倒晉書王澄聞魏玠言輙歎息絶倒時人爲之語曰魏玠談道平子絶倒又世􅀃云阿平若在當復絶倒阿平蓋以屬仲豫世間能有㡬人知貫休詩云禪客相逢只彈指此心寧有㡬人知次韻􅁗少逰春江秋野圖后山自注云宗室所􅀞翰墨功名裏江山富貴人倐看􅀟鳥下已􅀒百年身南史梁忠烈世子方等傳云性愛林泉特好散逸甞著論曰吾不及鳥魚逺矣鳥魚飛浮任其志性吾之進退甞在掌握若使吾終得與魚鳥同遊則去人間如脫屣耳此宗室事故后山引用蓋􅃇制宗室在宫有出入之限有不許外交之禁故也老杜詩長爲萬里客有愧百年身又江清風偃木霜落鴈横空老杜詩長林偃風色若箇丹青裏猶須着此翁后山自註曰秦詩云請君添小艇􅀞我作漁翁言小㳺方見用於世非江海之士不當􅀞之漁舟也晉書顧凱之爲謝鯤象在石巖裏曰此子宜置丘􅐿中后山蓋反此意着字甞經東坡用之所謂戯著㓜輿巖谷裏是也老杜詩秋色彫春草王孫若箇邊黄魯直荅王立之詩曰小詩若能令毎篇不苟作湏有所屬乃善頃來詩人惟陳無已得此意毎令人歎伏之蓋渠勤學不倦味古人語精深非有謂不發於筆端耳觀此詩信魯􅀡之善論也㓜嶺后山自注云外氏有石象山號㓜嶺外家英俊場漢書枚臯􅀓與英俊并㳺柳子厚書曰鼓行俊造之􅂣季氏不好㺯季氏猶詩所謂伯氏仲氏左􅀓曰夷吾弱不好弄用意丘􅐿間頗以石自奉班固序􅀓班斿曰漁釣於一􅐿則萬物不奸其志棲遲於一丘則天下不易其樂誰言拳握間後漢張湛􅀓拳握之物足富十世意作萬牛重老杜古栢行萬牛回首丘山重岱宗小天下孟子登太山而小天下不辦一席用東坡六一泉銘載惠勸語曰西湖蓋歐公几案間一物耳絶句斫水水可㫁越王勾踐有八劒二名㫁水以之指水開即不合續弦弦可完東方朔十洲記曰煑鳯喙麟角合煎作膠名之爲續弦膠两句言物理之間合者固有時可斷而斷者寧不可復續耶而客主之交一絶不續亦可歎矣如何鄭公客不作百年看漢書鄭當時傳两人中廢賔主益落故班固作賛引廷尉翟公一死一生乃見交情之語此詩必有謂而作也贈歐陽叔弼叔弼名棐六一居士之第三子家於頴州早知汝頴多能事晉書周顗􅀓汝頴多竒士能事字出周易汝頴多竒士夲曹操語晚以詩書託下僚選詩英傑沉下僚大府禮容寛懶慢漢書云敞傳贊再入大府老杜詩自識將軍禮數寛晋嵆康與山濤書云􅂴與慢相成故家文物尚嫖姚故家遺俗見孟子左􅀓臧哀伯曰文物以紀之此借用漢志景星歌曰五音六律依韋響昭􅄂變並㑹雅聲逺姚注云姚嫖姚言飛揚也只􅀅憂患供談笑憂患字見易係辭王介甫詩已將流景供談笑聊謂知音破欝陶敢望功言答聖朝功言見上注老杜詩未有㳙涘答聖朝􅀊歷四三仍此地􅀊歷四三謂十二年也下篇亦云中年見二子已復歳一終尚書或四三年此借用其字也家餘五一見今朝歐陽文忠公自號六一居士作傳曰吾家蔵書一萬卷集録三代以來金石遺文一千卷有琴一張有棊一局常置酒一壷客曰是謂五一爾何如居士曰以吾一翁老於此五物之間是豈不爲六一乎時居士已薨故曰家餘五一后山詩註卷第二
