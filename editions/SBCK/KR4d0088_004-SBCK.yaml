front:
  text: 后山詩註卷第四
  hash: sha256:c22f71124a9864b63baab463b8b8fa16d01fe046c5587f2627b3e46904bc74a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_004-1a}
body:
  text: 送趙承議令畤令畤爲頴州簽判受代而去先王隠徳世難名晚見諸孫也自成趙令畤字徳麟藝祖之後也故以呉大伯比其先王晉書王湛有隱徳人莫能知頴水向来須好句東坡頴州謝上表曰文獻相續有晏殊歐陽修之風道山今日有宗英後漢書學者謂東觀爲道家蓬萊山漢書景十三王叙傳曰四國絶祀河間賢眀禮樂是修爲漢宗英林湖更覺􅇷随盡曹子建詩清夜㳺西園􅃣蓋相追隨老杜詩秋􅁴追隨盡此引用言無復㳺從之侣巾帽猶堪語笑傾老杜詩羞將短髪還吹帽笑倩傍人爲正冠此反而用之自言其尚未老也老杜集中李之芳詩數語欹紗帽勤苦讀書終不􅀘未須墻角棄長檠神仙􅀓有年少與蘇子訓鄰居爲太學生諸貴人作計共呼生謂曰子勤苦讀書欲䂓富貴但召子訓來可不勞而得矣長檠見上注徳麟蓋王孫而有儒素風味云􅀉李學士格非格非字文叔眼看㳺􅃇半東都五嵗曽無一紙書晉書劉弘􅀓云得劉公一􅁓賢於十部從事老杜詩厚禄故人書斷絶平日齊名多早逹莫年同國未情踈老杜詩時來如宦達歳晚莫情踈稍尋東刹論兹事東刹當在頴州前有東刹贈仁公詩玆事謂一大事因縁頼有西方託後車託後車見上注李君當是西方社中人􅀃與杜郎須着便不應濠上始知魚勸其早歸依佛祖也􅀓燈錄雲門大師云觸目承當得猶是不着便東坡觀魚䑓詩曰若信萬殊歸一理子今知我即知魚晉書王坦之􅀓謝安曰常謂君粗得鄙趣者猶未悟之濠上邪雪初雪已覆地老杜詩秪應踏初雪又詩茅簷花覆地晚風仍積威漢書司馬遷書曰積威約之漸也木鳴端自語鳥起不成飛王介甫詩卧聽窽木鳴相挨樂府神弦歌道君曲曰中庭有樹自語梧桐推枝布葉孫子曰鳥起者伏也文選鴈詩曰亂起未成行寒巷聞驚犬鄰家有夜歸王維與裴迪書曰寒生野火明滅林外深巷寒犬吠聲如豹不無慙敗絮陶淵明與子儼等䟽曰余甞感仲孺賢妻之言敗絮自擁何慙兒子按後漢列女􅀓王霸字仲孺與同郡令狐子伯爲友後子伯爲楚相而其子爲郡功曹令奉書於覇車馬服從雍容如也霸子方耕於野聞客至投耒而歸見令􅀌子沮怍不能仰視覇目之有愧容客去而乆卧不起霸妻曰君少脩清節奈何忘宿心而慚兒女子乎未易泣牛衣言不爲兒女悲也漢書王章􅀓疾病無被卧牛衣中與妻訣涕泣晚岀應俗敢辭疾衝風寧小驅范曄後漢書王充等􅀓論曰應俗適事難以常條退之詩不衝風雨即衝埃聊為一日役不憚百金軀鮑昭行路難曰非我昔時千金軀雪路無行迹汝南先賢􅀓曰時大雪洛陽令至􅀽安門無行路又闕史載皇甫湜甞因積雪門無行迹氷枝有落烏樂天烏夜啼曰霜滑有風枝寒門閉蕭瑟窮里聽􅐵吁寒門亦用􅀽安事漢書趙廣漢􅀓長安少年㑹窮里空舎竒晁載之兄弟人言婚宦情欲夲后山自注古語曰人不婚宦情欲失半我始求脫君已半按列子云語有之曰人不婚宦情欲失半人不衣食君臣道息孰知一世如一夢在夢而覺寧待旦退之􅀕文曰人之生世如夢一􅁴寒簷凍雨作秋聲凍音東􅁀雨也楚詞九歌曰使凍雨苟洒塵老杜詩南風作秋聲冷屋風燈挑不明老杜風燈照夜欲三更樽前已作十年語後㑹未期吾屢驚孟浩然詩平生復能㡬一别十餘春一聞七字心已識鉤章􅁄句天與力退之記夢詩云壯非少者哦七言六字常語一字難又孟郊墓誌云其爲詩鉤章􅁄句搯擢胃腎老杜詩溟漲與筆力念子方壯我已衰不見參天二千尺老杜古栢行黛色參天二千尺季也亦有詩百篇叔子擬度驊騮前曽慥詩選云晁仲之字叔用少受知於陳無已無已贈其兄詩云駸駸擬度驊騮前謂叔用也按善本駸駸作叔子當是叔與季兼指两人但未知叔用爲叔爲季而曽氏誤以爲一人遂改作駸駸非是南史王僧䖍曰弟書如􅀐騾駸駸常欲度驊騮前鍾嶸詩品亦曰征虜卓卓殆欲度驊騮前端能過我三冬學漢書東方朔曰學三冬文史足用可復參儂一味禪勸其廣學也廣語有僧辭歸宗云諸方學五味禪去宗云我這裏有一味襌爲甚不學僧云如何是一味襌宗便打􅀉答王直方人情校徃復屢勉終不近晉嵆康絶交書曰不喜作書而人間多事堆案盈几不相酬荅則犯教傷義欲自勉強則不能乆東坡亦云人情重徃返不報生禍根新詩已經年知子不我怨退之詩元日新詩已去年生世餘幾何尺箠日取寸莊子曰一尺之箠日取其半萬世不竭懐禄有遐心漢書楊惲􅀓曰懐禄貪􅀔不能自退詩云母金玉爾音而有遐心從俗無逺韻楚詞曰將從俗富貴以偷生乎按曲禮曰禮從宜使從俗晉書􅁃凱雅有逺韻時從府中歸數過林下飯漢書鮑宣􅀓曰俱過宣一飯去後漢書第五倫􅀓光武曰聞卿爲吏不過從兄飯老杜詩僧飯屢過門雲溪友議僧靈澈詩曰林下何曽見一人平生功名意回作香火願北史陸法和曰但從空王佛所與主上有香火因縁三年不舉觴吻頻煙火焮左􅀓曰鄭火司馬司寇列居火道行火所焮注灸也豈無兩蒼龍霑我一雨潤蒼龍謂􅇛茶法華經言雖一地所生一雨所潤而諸草木各有差别官麄詩未工猛乞無小靳官麄見上注後漢崔烈入錢爲司徒及拜帝曰悔不小靳人生如此耳文字已其閠退之詩人生但如此朱紫安足僣閏謂餘事也下句蓋足此意是身雖臭腐維摩經曰是身不淨􅁾惡充滿莊子曰神竒化爲臭腐寧作青紫楦朝野僉載唐楊炯常呼朝士爲麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳無徳而朱紫何以異是永懐忘年友死矣餘令聞后山自注云忘年友邢居實也南史江揔􅀓張纉等呼爲忘年友詩云令聞令望邢居實死於元祐一三年間年二十七念子頗似之老我何所恨筆談曰歐公詩老我倦鞍馬誰能事吟哦王介甫詩老我􅀌主恩結草以爲期此文章佳語也􅀉侍讀蘇尚書六月西湖早得秋二年歸思與遲留老杜詩陂唐五月秋選詩遲留法豈輕一時賔客餘枚叟枚叟謂枚乗后山取以自比也謝惠連雪賦曰梁王不恱遊於兔園乃置㫖酒命賔友召鄒生延枚叟老杜詩空餘枚叟在應念早升堂在處兒童􅀃細侯此句屬蘇公後漢郭伋字細侯爲并州牧素結恩徳及後行部有兒童數百各􅀐竹馬道次迎拜經國向来須老手晉書石苞􅀓景帝曰苞有經國才猷東坡詩老手便􅇵郡有懐何必到壷頭後漢馬援南撃交趾軍至浪上與賊戰破之從容謂官屬曰吾從弟少㳺常哀吾慷􅁣多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中卧念少㳺平生時語何可得也其後年六十二自請征五溪進營壷頭暑甚中病卒遥知丹地開黄卷謂蘇公在經筵也北史周紀曰椒房丹地有衆如雲老杜詩閣道通丹地按漢書梅福傳注曰以丹淹泥塗殿上地晉書禇陶曰聖賢備在黄卷中解記清波沒白鷗此篇又勸蘇公髙退蘇公在頴和子由詩有明年兼與士龍去萬頃滄波没两鷗之句􅀉亳州林待制希湖海相望闕􅀉聲雲林過雨未全晴劉禹􅃬竹枝歌曰東邊日出西邊雨道是無晴却有晴后山反其意而用之言聲問闕然近於寡情也文選枚乗七發曰㳺渉乎雲林杜牧之詩自古雲林逺市朝青衫作吏非前日晉書􅄞康曰聞道士遺言餌术黄精令人乆壽意甚信之㳺山澤觀魚鳥心甚樂之一行作吏此事便廢白首論文笑後生言見笑於後生也老杜詩晚將末契託年少當面論心背靣笑又云更􅁴前賢畏後生似聴兒童迎五馬古樂府陌上桑曰使君從南來五馬立踟蹰此五馬本事所岀也後人臆􅀃妄矣兒童用後漢郭伋事稍修書札問專城書札見上注陌上桑又曰四十専城居一聞苦李蒙荘句史記老子楚苦縣人莊子蒙人按亳州衛真縣本苦縣城東有頼郷祠老子所生之地亳州雖有蒙城縣然莊子爲蒙漆園吏當在今曹之宛朐云不復人間世後名晉書張翰􅀓曰使我有身後名不如即時一盃酒卧疾絶句老裏何堪病再来愁邊不復酒相開老杜詩愁邊有江水又云何以開我愁一生也作千年調此句未分其遂死也寒山子詩云人是黒頭䖝剛作千年調鑄鐡作門限􅀑見拍手笑兩脚猶須萬里回老杜詩两脚但如舊開天􅀓信記萬回師之兄戍安西萬回覲之朝徃夕返以其萬里而廽故謂之萬廽也南軒絶句少日書林頗著勲揚雄長楊賦曰并苞書林退之復志賦朝馳騖乎書林魯直詩四㑹有黄令學古著勲多按曹子建書曰豈徒以翰墨爲勲績㢤風俗通曰蓋嚴楊惲勲著王室蜀志杜微􅀓曰著勲於竹帛莫年貪佛替論文老杜詩老夫貪佛日又詩故着浮查替入舟王介甫詩乞得膠膠擾擾身江湖波浪替埃塵銅鑪瓦枕芒鞋裏此外惟湏對此君老杜詩多病所湏惟藥物微軀此外更何求晉書王徽之指竹曰何可一日無此君獨坐文章平日事風竹暮年須老杜詩文章千古事又詩嗜酒愛風竹衰疾懸知此老杜詩時應念衰疾懸謂遥度也退之詩後日懸知漸齒莽霜毛不更除退之詩斗􅁴霜毛一半加玉䑓新詠寳月詩曰情人爲君除白髪老杜詩紅顔愁落盡白髪不能除一丘吾欲徃一丘見上注百畒有如無言不足爲養也魯論曰有若無荀子曰有之不如無之魑魅須㳺子老杜懐李白詩曰魑魅喜人過乾坤着腐儒老杜江漢詩乾坤一腐儒扣門聞啄木退之詩丁丁扣門疑啄木喚酒有提壷歐公詩獨有花上提葫蘆勸公沽酒花前傾蓋鳥名也門逕無行迹秋来不遣鋤逸史皇甫湜常因積雪門無行迹三輔决録張仲蔚所居蓬蒿没人老杜詩草茅無徑欲教鋤此反而用之􅀉送定州蘇尚書元祐八年九月蘇公知定州於時宣仁聖烈太后上昇時事漸變故此詩意勸公省事髙退初聞簡䇿侍前旒簡䇿謂作侍讀時淮南子曰王者冕而前旒所以蔽明又見衣冠送作舟世􅀃羅友荅桓温曰旦出門逢一􅀑大揶揄云我秪見汝送人作郡何以不見人送汝作郡北府時清惟可飲晉書郗愔在北府徐州人勁悍桓温云京口酒可飲兵可用深不欲愔居之此借用以言定武在河北也齊書謝朏爲呉興與弟瀹於征虜亭别指瀹口曰此中惟宜飲酒老杜詩時清猶茹芝西山氣爽更宜秋晉書王徽之爲桓冲􅀐兵參軍冲曰卿在府日乆比當相料理徽之不荅直髙視以手版柱頰云西山朝來致有爽氣耳此借用以言太行李商隱詩故郷雲水地歸夢不宜秋功名不朽聊通袖海道無違具一舟此两句皆拈出東坡語以勸之意謂功成名遂自足不朽政可縮手袖間而遂湖海之本志也東坡沁園春詞有云用舎有時行藏在我袖手何妨閑處看八聲甘州詞有云約他年東還海道願謝公雅志莫相違按晉書謝安雖受朝􅀉東山之志始末不變反鎮新城造汎海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失老杜詩平生江海心宿昔具扁舟枉讀平生三萬卷貂蟬當復自兠牟退之詩鄴侯家多書揷架三萬軸南史周盤龍爲散􅀐常侍齊武帝戯之曰貂蟬何如兠牟對曰貂蟬出於兠牟􅀉答李方叔豸平生經世䇿􅀉食不資身言其謀䇿可以經綸當世而反不能資一身也莊子曰其不可經於世亦逺矣漢書韓信傳􅀉食於漂母無資身之䇿孰使文章著老杜云名豈文章著能辭轍跡頻意謂有文如此安能免棲棲旅人哉退之進學解云孟軻好辯孔道以明轍環天下卒老于行左􅀓曰周行天下將皆必有車轍馬跡焉帝城分不入漢書陳咸傳咸滯於郡守時王音輔政信用陳湯咸數賂遺湯子書曰即蒙子公力得入帝城死不恨分謂隔絶也老杜詩闕庭分未到舟楫有光輝書札詗何人此句蓋終上意漢書淮南王安傳曰爲中詗長安注偵伺也子未知吾懶吾寧覺子貧此反濠上知魚之意而用之文選嵆康書曰人之相知貴識其天性老杜詩近有峩眉客知予􅂴是真智寳院後樓懐胡元茂前有胡士彦挽詞即元茂也晚渡呼舟疾杜牧之杜秋詩云却喚松江渡寒城着霧深老杜野望詩􅀌城隱霧深昬鷗明鳥道老杜雨詩云白鳥去邊明南中八志云交趾郡治龍編縣自興古鳥道四百里風葉亂霜林李啇隱詩風葉共成喧乆客登樓目文選王粲登樓賦曰情眷眷而懐歸􅀆孰憂思之可任平原逺而目極􅀆蔽荆山之髙岑老杜詩天畔登樓眼中年懐舊心晋書王羲之􅀓謝安曰中年以來傷於哀樂與親友别輙作數日惡文選向秀思􅃇賦序云經嵆康􅃇廬鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而歎故作賦云猶湏一長笛領覽自霑襟終上句未盡之意謂夲自悲愴尚何湏聞笛耶老杜云不須吹急管衰老易悲傷元日老境難為節寒梢未得春曲禮六十曰耆指使䟽引賀瑒云耆至也至老之境也又曰六十至老境而未全老老杜詩爲冬不亦難杜牧之詩丁香閑結春梢一官兼利害百慮孰踈親老杜詩時危􅀜百慮按易係辭曰一致而百慮老子曰名與身孰親積雪無歸路扶行有醉人望郷仍受嵗回首望松筠謝玄暉詩有情知望郷老杜詩望郷應未已李嘉祐詩白頭空受歳丹陛不朝天松筠猶松楸意謂丘墓也老杜詩窮秋正揺落囬首望松筠此借用放懐施食烏鳶喜金光明經云施食之縁獲長壽報長安志云興善寺素和尚齋時烏􅍎就掌中取食老杜詩得食堦除鳥雀馴持經鳥䑕聽戒殺文載郭氏新􅀃曰柘臯永寧之雀立化於松枝東城郭氏之䑕坐化於蓮葉豈非乗誦經功徳自有所解悟而然歟杖藜矝矍鑠後漢馬援自請擊五溪蠻夷帝愍其老援㩀鞍顧盻以示可用帝笑曰矍鑠哉是翁也顧影怪伶俜魏志何晏行歩顧影文選潘岳寡婦賦曰少伶俜而偏􅀌注單孑貌門静行随月䆫虚卧見星擁衾眼未穩艱阻飽曽經老杜詩平生耽勝事吁駭始曽經絶句此生精力盡於詩末嵗心存力已疲淮南子曰宋景公時造弓人九年乃成而進之弓人歸家三日而卒蓋匠者心力盡於此弓矣故温公通鑑序云臣之精力盡於此書不共盧王争岀手盧王謂盧照隣王勃東坡詩云詩句對君難出手却思陶謝與同時陶謝謂淵明靈運老杜詩焉得思如陶謝手令渠述作與同遊又曰楊馬宜同時送伯兄赴吏部改官先子初増秩年侵􅁂已皤漢書循吏􅀓序増秩賜金念兄今善􅁇此别喜如何以其善繼先子之志故以别爲喜也親老家仍困門衰仕未多家語子路曰家貧親老不擇禄而仕晉書李密表云門衰祚薄猶湏教兒子早要中交科􅀉張文潜舎人今代張平子後漢書張衡字平子善屬文雄深次子長劉禹􅃬序柳子厚集曰韓退之評其文雄深雅徤似司馬子長名髙三俊上翰林志曰李紳李徳􅁉元稹同在禁署時號三俊此借用以指蘇公客黄秦晁也官立右螭傍唐書張次宗􅀓文宗詔左右史立螭頭下記宰相奏對按實録文潜元祐八年冬自著作佐郎除起居舎人即右史也紹聖元年四月以直龍圖閣知潤州此詩蓋春時所作車笠吾何恨北戶録載風王記越人結交盟曰卿乗車我戴笠後日相逢下車揖我歩行卿乗馬後日相逢卿當下飛騰子莫量老杜贈髙適詩飛騰無那故人何時平身早逹未用夢凝香后山自注曰來書云􅀘郡之樂發於夢寐晉書張載曰時平則才伏世亂則竒用退之詩太平時節身難遇此反其意而用之韋應物刺蘇州有詩曰兵衛森􅀞㦸燕寢凝清香後湖晚坐水淨偏明眼老杜詩水淨樓隂直又云吾與汝曹俱眼明城荒可當山樂天詩亭眷太髙君莫折東家留取當西山青林無限意白鳥有餘閑身致江湖上王介甫與執政書曰及今愈思自致江湖之上又有詩曰委質山林如許國后山謂身致亦介甫委質之意名成伯季間伯季似指二蘇門下諸君后山甞作佛指記曰予以文義名次四君蓋謂此也魏文帝典論曰傅毅之於班固伯仲之間耳晉書王湛傳王濟對武帝曰臣叔殊不癡山濤以下魏舒以上湛曰欲處我於季孟之間乎目随歸鴈盡嵆康詩曰手揮五絃目送歸鴈坐待莫鵶還老杜詩有待至昬鵶春興東風作惡不成寒野水穿沙自作灘王介甫詩睡過東風作惡時細草無端留客卧文選丘希範詩細草藉龍􅀐老杜詩邂逅無端出餞遲鄭谷曲江春草詩云香輪莫輾青青破留與遊人一醉眠繁枝有意待人看退之詩春風也是多才思故揀繁枝折贈君又云榴花不發待郎歸老杜詩寒江流甚細有意待人歸次韻回山人贈沈東老二首前篇屬囬山人一杯領意不須沽老杜詩領客珍重意六字持身已有餘導引有六字氣謂嘻吁哂嘘呵呼也黄庭經曰至道不煩司馬相如過宜春宫賦曰持身不謹按列子曰子知持後則可言持身矣癡子未知天上樂法華經曰癡子捨我五十餘年庫蔵諸物當如之何神仙􅀓彭祖問石生曰何不服藥仙去對曰天上多有至尊相奉甚難更苦人耳李商隱作李賀小􅀓曰賀將死有緋衣人持二板書召賀曰帝城白玉樓立召爲記天上差樂不苦也先生今觧世間書退之石鼎聮句詩序曰彌眀謂劉師服曰吾不解世俗書弟子爲書吾句又後篇屬沈東老随世功名非所望稱家豐儉不求餘老杜詩稱家隨豐儉按禮記檀弓曰稱家之有無後漢馬援傳曰士生一世但求衣食裁足致求􅄹餘但自苦耳青衫岀指論竒字漢書楊雄贊劉棻甞從雄學作竒字白髪挑燈寫細書言其髙年而眼能明也退之短檠歌曰夜書細字綴語言送孝忠二首當是其兄􅀓道之子老眼元多淚春風見此行又爲貧賤别老眼固自多淚况重以别離之感耶貧賤别見上注更覺急難情常棣詩脊鴒在原兄弟急難斗食吾堪老漢書百官表百石以下有十食佐史之秩注云斗食月奉十一斛一􅀃日食一斗二升詞場爾向榮老杜詩詞􅂣繼國陶淵明歸去來辭曰木欣欣以向榮借此用未須憐野鶩法書􅁐曰􅁃翼善草􅀠少與王羲之齊名弟子皆效之羲之後進内外宗尚翼甚不平在荆州與都下人書云兒軰乃輕家雞愛野雉皆學逸少東坡詩野鶩家雞定誰羙家法付宣城齊書謝眺爲宣城太守善詩家法謂靈運恵連皆眺之族父以詩知名後漢儒林􅀓序各以家法敎授又經史三年學楊子曰古之學者三年通一經聦明一旦開楊子曰天降生民倥侗顓蒙恣于情性聦眀不開老杜詩大兒聦明到能添老樹巔崖裏小兒心孔開貌得山僧及童子把文甘潦倒老杜詩把文驚小陸此用小陸以比孝忠也晉嵆康與山濤書曰足下素知吾潦倒麄踈不切事情此借用以自况也數日待歸来左傳曰行則數日而反退之詩屈指數日憐嬰孩數字作上聲讀士患聲名早東坡和仲子迨詩曰飬氣勿吟哦聲名忌太早官今嵗月催自言老於微官也有親湏薄禄臨路尚徘􅆦言惜别眷眷之意以親養故不能與之俱去也鮑照放歌行曰今君有何疾臨路獨遲迴以柱杖供仁山主二首錯節􅀌根勁有餘坐床須按起須扶後漢虞詡􅀓不逢盤根錯節何以知利器選詩石梁有餘勁一生用底令相贈更問林間有此無趙州臨遷化以拂子送與王鎔曰此是老僧一生用不盡底事見趙州語録又洗足投筇只坐襌厭尋歧路費行􅆞金剛經云洗足已敷坐而坐東坡詩已辦布襪費行􅆞老来不復人間事不用山公更削圎桂􅁐叢談曰潤州甘露寺有僧道行􅀌髙李徳裕㢘問日以方竹杖一贈焉方竹出大宛國堅實而方正節根鬚牙四面對出及再鎮浙右其僧尚在問曰前所奉竹杖無恙否僧喜對曰已規圎而漆之矣公嗟倇彌日前軰詩曰削圎方竹杖漆却㫁紋琴項城道中􅀉劉令使修溪橋項城屬陳州老怯危橋泥沒膝老杜詩虚疑皓首衝泥怯盧仝放魚歌曰天雨曼陁羅花深没膝喜聞吾黨政如春謝承後漢書李爕拜京兆民謡曰我府君道教舉恩如春威如虎須君不惜千金費孫子曰興師十萬日費千金文選古詩曰愚者愛惜費但爲後世􅅓此後寧無我軰人言必有好事者繼之晉書石苞􅀓許允曰卿是我軰人碓磨寨唐書黄巢圍陳州人大飢􅀝死墻塹賊俘以食日數十人乃列百巨碓麋皮骨於臼并啖之以人為食殺為戲自昔無聞尔所先信有忘身一言盡獨能遺臭萬人􅀓東坡富公碑銘曰以殺爲嬉漢書五被􅀓呉王曰男子之所死者一言耳劉原甫􅀃云此言所死雖不同等是死耳晉書桓温􅀓温曰旣不能流芳後世不足復遺臭萬載耶老杜詩將詩不必萬人傳􅀉張宣州耒與世情将盡懐仁老未􅁯書云懐于有仁此借用言獨於仁賢未能忘情故人今五馬見上注髙處謾三長唐書孟郊􅀓李觀論其詩曰髙處在古無上平處下顧二謝又劉子玄言作史有三長謂才學識詩豈江山助言宣州詩本天成不用借􅂇唐書張􅀃􅀓􅀃謫岳州而詩亦悽惋人謂江山􅂇云名成沈􅇹行老杜詩沈鮑得同行謂沈約鮑照肯為文俗事後漢陳忠上䟽曰諸郎多文俗事又隗囂􅀓論曰徒以文俗自喜打鴨起鴛鴦此用宣州故事魏泰詩話吕士隆知宣州好笞官妓官妓皆欲逃去㑹杭州一妓到士隆喜之留不使去一日郡妓復犯小過士隆欲笞之妓訴曰某不敢辭罪但妓不能安也士隆愍而捨之梅聖俞作莫打鴨篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池西落不比􅀌洲老秃鶬秃鶬而欲逺飛去又況鴛鴦羽翼長杜牧之詩驚夢起鴛鴦然此詩意不特爲妓女發送倫化主赤髭白足可憐生髙僧傳佛陁耶舎爲人赤髭善解毗婆沙時人號曰赤髭毗耶沙又云釋曇始足白於面雖跣渉泥水未甞沾濕天下咸稱白足和尚劉禹􅃬送僧序曰備將迎者皆赤髭白足之侣傳燈録忠國師曰幸自可憐生須要个護身符子作麽躡蹻擔囊壯此行史記虞卿􅀓躡蹻擔簦要致雪峯千五百􅀓燈録雪峯義存襌師學者冬夏不减千五百人不妨兼識謝宣城以比張宣州也齊書謝眺爲宣城郡太守杜詩云詩接謝宣城西湖小徑才容足列子曰泰豆乃立木爲塗僅可容足張湛注云􅂊得安脚寒花知自香老杜詩寒花只暫香官池下鳬鴈老杜有官池春鴈詩漢昭帝紀黄鵠下建章宫太液池中文選劉公幹詩曰方塘含白水中有鳬與鴈荒塜上牛羊古樂府曰今日牛羊上丘壠有子吾甘老東坡詩有子萬事足老杜詩吾老甘貧病無家去未量老杜詩無家問消息作客信乾坤三年哦五字草木借輝光老杜詩擁别借輝光别月華嚴寓世生同里随方去有情漢書盧綰􅀓與髙祖同里生后山借用其意来為百年别不惜片時程老杜詩繋㠶何惜片時程齋鉢須勤供經鍾莫倦鳴勸其接物利生也當來第三㑹此界却逢迎釋氏書彌勒當來下生於龍華樹下三㑹􅀃法度人三水小牘云東都僧從練臨終呼門人戒曰人生難得惡道易淪惟有歸命釋尊勵精梵行龍華㑹上當復相逢戰國䇿曰燕太子逢迎却行送呉先生謁惠州蘇副使呉先生當是呉逺㳺蘇公甞有書與之聞名欣識面言呉君欲識東坡也老杜詩李邕求識靣􅀓燈錄夾山惟儼􅀓李翺曰見靣不如聞名此反而用之異好有同功呉君方外之士與后山異趣而好賢之意則同故云同功記曰與仁同功其仁未可知也此用其字我亦慙吾子后山不能徃見蘇公此所以有愧於呉君也人誰恕此公老杜􅀉李太白詩衆人皆欲殺吾意獨憐才東坡詩平生我亦輕餘子晚歳人誰念此公百年􅀟白􅁂時東坡年五十九老杜詩百年􅀟白鬂一别五秋螢萬里一秋風言神交心契與風無間也老杜詩瞿塘峽口曲江頭萬里風煙接素秋蓋亦此意按通鑑秦使閻􅀒謂張瓘曰晉王與君鄰藩雖山河阻絶風通道㑹爲􅀃任安在依然一秃翁漢書霍去病􅀓衛青日衰而去病日益貴故人門下多去事去病輙得官爵惟獨任安不肯去又灌夫􅀓與長孺共一秃翁注言無官位版綬也末句后山自謂不􅀒蘇公之門時亦坐黨事廢錮故云秃翁别圓澄禪師法施老人卧不岀呼我取别行問疾十二國史曰魯宓子賤爲單父宰行過楊晝取别維摩經云汝行詣維摩詰問疾磨盤拭筯勸一飽少待湏􅁷莫倉卒磨盤拭筯蓋俗間語老杜詩低頭拭小盤維摩經香積品云若欲食者且待湏􅁷當令汝得未曾有食老杜詩忍待明年莫倉卒早年着眼覷文字退之詩不如覷文字丹鈆事􅀧勘萬卷初無一言契􅀓燈録香嚴依溈山祐和尚和尚曰汝未出胞胎時本分事道將一句來師徧檢所集諸方語句無一言可將酧對又五􅂥山靈黙禪師謁石頭和尚先自約曰若一言相契我即住不然便去多生綺語未經懺樂天香山寺白氏洛中集記曰願以今生世俗文字之業狂言綺語之過轉爲將來世世讃佛乗之因轉法輪之縁按釋氏書綺語蓋口中四業之一謂綺飾文詞過有増華也半世虚名足為累退之詩士生爲名累此去他来尚有縁頭童齒豁恐無年退之進學解頭童齒豁竟死何禆世􅀃王珣歎曰人固不可以無年慇懃三請乆住世法華經曰世尊告舎利佛汝已慇懃三請豈得不􅀃華嚴經普賢行願品曰七者請佛住世弊惡可念未可􅂢華嚴經十迴向品曰菩薩不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不脩廽向平生准擬西行計老着人間此何意西行謂願生極樂國髙僧􅀓慧持謂慧逺曰若滯情愛聚者本不應出家今既割欲求道正以西方爲期耳他年佛㑹見頭陁知是當年老居士􅀓燈録傅大士傳曰有天竺僧嵩頭陁謂曰我與婆尸棄佛所發誓今兠率衣鉢見在因命臨水觀其影見大士圎光實蓋此詩以嵩頭陁比圎澄以傅大士自况别觀音山主離合應生理文選陸士衡詩離合非有常譬彼弦與括老杜詩人生有離合豈擇衰老端文選􅀽宏三國名臣序賛曰生理不可不全李善注引鷦鷯賦曰生生之理足矣此借用言人生之常理過逢豈近縁老杜詩數爲姻婭過逢地情親見今日語妙記當年情親語妙並見上注閉户安禪主衝風逆水舩两句言行藏勞逸各異也法華經偈曰安襌合掌老杜詩蕭洒共安襌又詩春多逆水風不應清夜月故作别時圓老杜宿賛公房詩云相逢成夜宿隴月向人圎而東坡水調詞云不應有限何事長向别時圎離頴河市千人聚長安萬年縣有千人聚􅀜中記曰宣帝以倡優雜伎千人樂思后園今所謂千人郷者是也此詩借用寒江百丈牽老杜詩寒江動夜扉又詩百丈牽江色吾生能㡬日此地費三年後周蕭撝勞歌曰百年能㡬許公事罷平生老杜詩爲客費多年東坡詩人生不滿百一别費三年叢竹防供㸑池魚已割鮮當是東坡去頴後代者韓川變其舊政向也徒魚今乃割鮮行將及竹矣后山所歎意蓋不止此也東坡有請罷學士劄子曰及蒙擢爲學士便爲韓川等攻撃不已以至羅織語言謂之誹謗西都賦曰割鮮野食拙勤終不􅀘他日愧無傳樂天詩救煩莫如靜􅀘拙莫如勤孟子曰是以後世無傳焉湖上湖上難為别梅梢已着春林喧鳥啄啄退之詩剥剥啄啄有客至門風過水鱗鱗樂天詩小橋裝鴈齒輕浪甃魚鱗楚詞曰魚鱗鱗􅀆媵予縁有三年盡釋氏云諸法從縁生縁離法即滅情無一日親言情之相親生於乆也此浮屠所以不三宿桑下白頭厭奔走何地與為鄰莊子曰吾誰與爲鄰舟中二首惡風横江江卷浪黄流湍猛風用壯退之感二鳥賦云窺黄流之奔猛老杜詩初聞龍用壯字本出易大壯卦疾如萬􅀐千里來歐公秋聲賦曰又如赴敵之兵衘枚疾走不聞号令但聞人馬之行聲氣壓三江五湖上東坡詩􅂔壓鄴侯三萬籖周禮曰其川三江其浸五湖岸上空荒火夜明舟中坐起待殘更老杜詩空荒咆熊羆又詩江舡火獨明此借用以言燐火少年行路今頭白不盡還家去國情言行蔵進退其皆有所迫非本志也又野火燒原雉昬雊退之詩原頭火燒靜兀兀野雉畏鷹出復没詩云雉之朝雊黄塵漲天牛亂闘蜀都賦曰黃塵漲天江間無日不風波老去何時脫奔走老杜詩江間雖炎瘴又云舟中無日不沙塵詩書滿腹不及口後漢書趙壹詩云文來宫殿隨身如意而有事見正法念處經等蓋皆持戒作福者生於此天因以比䂓禪也法華經亦曰一時五百萬億國士諸梵天王與宫殿俱少仕老不歸重門閉榛􅁄自歎其無淨居之福縁也道人秀叢林大論云譬如大􅀣叢聚是名爲林二􅀣不名爲林如一一比丘不名僧僧聚處得名叢林妙語岀襌寂老杜詩身猶縛禪寂是身如浮雲随處同建立維摩經是身如浮雲湏􅁷變滅故老杜如浮雲安可限南北圎􅁴經偈曰皆從立華嚴經曰譬如三千大千世界建立一切處所平生與二子嗜好用一律二子必皆詩僧一律見上注我此復助縁語綺已多責語綺見上注何年一把茅㩀坐􅀌崒嵂呵佛罵祖師􅀓燈録徳山宣鑒禪師抵溈山溈日是伊將來有把茅蓋頭罵佛罵祖去在又龍潭曰可中有一个漢他時向􅀌峯頂上立吾道在老杜詩好鳥啼巖扄髙岳前崒嵂塗糊千五百􅀓燈録三聖荅雪峯云一千五百善知識話頭也不識古寺和尚曰淨地上不要􅀧汚人家男女后山所謂塗糊蓋此意也后山詩註卷第四
