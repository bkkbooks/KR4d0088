body:
  text: 后山詩注巻十一宋陳師道撰任淵注和寇十一同登寺山度暑無好懷憑危略幽致衣冠蔚如林從我才一二兹山昔深登嵗月誰得記尚有名勝流不與金石悴孰知千載後我與子復至老杜詩南陌既留歡此山亦深登晉書王導傳曰帝親觀禊導及諸名勝皆騎從羊祜傳每風景必造峴山嘗謂鄒湛等曰自有宇宙便有此山由來賢達勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷煙昬倐見燈洪發疑無地魯直詩龍移山發洪楚辭曰下崢嶸而無地領略章句手江文通擬古詩云領略歸一致老杜詩云迴帆覬延賞佳處領其要章句手謂二謝之流割據英雄志老杜丹青引英雄割據雖巳矣又劔門詩至今英雄人髙視見霸王并吞與割據極目不相讓彭城自楚漢以來多有割據者后山于徐州修學記言之詳矣興壞容一瞬今昔當㡬喟漢書司馬遷傳曰稽其成敗興壞之理文選撫四海于一瞬退之詩于焉傲今昔喟音丘愧反太息也魯論夫子喟然歎曰圍山缺西北放目不可制歸懷納清境夜榻成良寐山缺見前注黄魯直有放目亭賦零落壁間詩豈特彼所愧東坡游戲馬臺有書西軒壁詩豈特二謝所愧作者皆在其下風也文選魏文帝書曰數年之間零落殆盡會逢南過適不問西來意按前巻有詩和寇十一同游城南阻雨還登寺山則此山未極南游之勝歟老杜哭韋之晉詩曰南過駭倉卒過字作平聲讀此借用后山又有詩云東渡南登稱意游傳燈録南嶽讓禪師與坦然禪師問嵩山安如何是祖師西來意曰何不問自巳意謝孫奉職惠胡徳墨奚李風流盡法傳外諸孫李廷珪本奚姓風流盡見前注常山陳贍子懷抱自髙攑孰云勝潘翁惟眉山公言眉山翁謂東坡嘗題贍墨云陳贍墨潘谷不逮老杜詩云惟梁孝王都此用其句律攑音丘言反舉也四海未盡識一變歸九原胡郎少年子外家典刑存一㸃落髹漆重價壓璵璠蕭子良書曰仲將之墨一㸃如漆左傳定公五年注曰璵璠美玉君所佩孫侯磊落人情義久益惇退之詩定非磊落人曹子建詩親交義在惇解囊贈𤣥圭熟知師白猿𤣥圭借用禹錫事吳越春秋越王問劔于處女處女將見王道逢袁公公曰聞子善劔術女子曰願試也公即挽竹以刺女女舉杖擊之公即上樹化為白猿孫奉職武人故用此事我資不解書下筆輒自喛嵇康書曰性不便書方言曰喛恚也不欲應而強答一云愁也良寳不受辱隠黙面稱寃南史庾肩吾傳梁簡文帝與湘東王書論文體麗靡曰徒以煙墨不言受其驅染紙札無情任其揺襞歐公作蔡君山墓誌曰媪色有寃吾不可不為理登寺山晴山堪著眼别意不成秋小作三年别聊為五斗謀要須乘下澤不待到壺頭豫恐登臨處長思馬少游竝見前注答寄魏衍往昔敦朋友猶能作報書西京賦視往昔之遺館老衰渾得嬾老杜詩百年渾得醉疎宻略相如謂不問交友之親疎皆一等不報書也名墮網中蝶劉禹錫詩哀我墮名網有如翾飛輩陸龜䝉蠧化曰橘之蠧化為蝴蝶甚可愛也須臾犯蝥網而膠之人雖甚憐不可解而縱矣天下大橘也名位大羽化也茍滅徳忘公崇浮飾傲得不為大蝥網而膠之乎身隨冰底魚東坡詩拙于林間鳩嬾于冰底魚填門車馬客左席為君虛魏志王粲傳蔡邕貴重朝廷常車騎填巷聞粲在門倒屣迎之漢書鄭當時傳贊云賔客填門選詩門有車馬客左席見前注拱翠堂后山自注云蕭邑富人竇孰禮即泉山作此堂規制宏麗无咎作記千年茅竹蔽幽竒一日堂成四海知退之燕喜亭記曰斬茅而嘉樹列發石而清泉激又曰蔽于古而顯于今栁子厚法華西亭記曰廡之外有大竹數萬又具外山形下絶然而薪蒸篠簜䝉雜擁蔽吾意伐而除之必有見焉便有文公來作記尚須我輩與題詩文公謂无咎也李賀髙軒過曰西京才子文章巨公下句言已有佳配尚何須詩耶至人但有經行處寳蓋仍存朽老枝似是東坡經途曽畫枯木于此蓮經曰經行林中華嚴經曰阿僧秖寳經行處劉禹錫謝寺雙檜詩曰龍象界中成寳葢鴛鴦瓦上出髙枝朽老見前注能事向來非促迫經年安得便嫌遲自言作詩久方如約也老杜詩十曰畫一水五日畫一石能事不受相促迫王宰始肯留真迹此借用其意世説簡文為相事動經年得過桓公患遲常加勸勉太宗曰一日萬㡬那得為遲此頗用其語贈田從先詩意當是田君失解後作衣冠魯國動成羣憂患相從只有君莊子曰舉魯國而儒服何謂少乎王介甫哭王令詩布衣阡陌勭成羣卓犖髙才獨見君落筆如流寧蹈襲晉書陶侃傳筆翰如流未嘗壅滯退之樊紹述誌云不蹈襲前人一言一句行前應敵卻紛紜後漢耿秉擊車師奮而起曰請行前上馬引兵北入漢書夏侯勝傳曰讀書疎略難以應敵又王莽傳遣儒生能顓對者王咸使匈奴咸應對縱横單于不能屈魏志髙貴鄉公命羣臣賦詩和逌陳騫等作詩稽留有司奏免官詔曰吾廣延詩賦以知得失而乃爾紛紜良用反仄其原逌等愧非伏老成和伯漢書儒林伏生傳孝文聞伏生治尚書欲召之時年九十餘老不能行又歐陽生傳生字和伯事伏生由是尚書世有歐陽氏學喜有侯芭守子雲見前注意氣有餘功用少相望千里定能勤勉田生以學也南史王僧䖍論書云宋文帝書天然勝羊欣功夫少于欣法書苑曰孫過庭草書功用雖少而天材有餘此用其意韓非子問辯篇曰言行者以功用為之的彀者也末句欲其不憚千里之勤而來問學别鄉舊數有中年别寛為滿嵗期中年别見前注老杜詩縱死時猶寛漢書韓延夀傳滿嵗稱職為真得無魚口厄古樂府烏生八九子云鯉魚乃在洛水深淵中釣魚尚得鯉魚口東坡和放魚詩云哀哉若魚竟坐口逺愧知㡬穆生醴聊復鴈門踦漢書段㑹宗傳曰終更亟還亦足以復鴈門之踦注云踦隻不耦也音居宜反齒脱心猶壯韓平子問叔卿曰剛與輭孰堅對曰臣年八十矣齒再脱而舌尚在魏武帝歌曰烈士暮年壯心不已秋清意自悲宋玉九辯曰悲哉秋之為氣也又曰泬寥兮天髙而氣清王介甫詩青天白日春常好白髮朱顔意自悲平生郡文學鄧禹得三為後漢馬武傳鄧禹曰臣少嘗學問可郡文學博士史記荀卿三為祭酒后山敎授徐潁棣三州故云和李使君九日登戲馬臺登髙能賦屬吾儕漢書藝文志曰登髙能賦可以為大夫不用傳杯擊鉢催南史王僧孺傳蕭文琰與丘令楷江洪等共打銅鉢立韻響滅則詩成九日風光堪落帽中年懷抱更登臺竝見前注江山信美因人勝王粲登樓賦曰雖信美而非吾土黄菊逢辰滿意開魯直詩為公滿意説江湖二謝風流今復見千年留句待君來東坡詩此中有句無人見留與襄陽孟浩然與魏衍寇國寳田從先二姪分韻得坐字將老䝉誤恩受弔不受賀陸禨歎逝賦曰予將老而為客後漢劉表傳曰牧受弔不受賀唐書岑文本亦云欲起尚遲回積閒習成墮向來二三子相與守寒餓一日不可無三嵗安得過晉書王徽之曰何可一日無此君髙僧支遁傳謝安曰終日戚戚觸事惆悵惟遲君來以晤言消之一日當千載耳是時秋益髙夜永月初破退之詩新月懸半破漏鼓已再更坐者餘㡬箇酒薄多可強談勝堅莫挫世説謝胡兒語庾道季曰諸人暮當就卿談可堅城壘漢書匈奴傳曰破堅拔敵如彼之難也簷昬讀字細林缺占星大老杜詩仰看明星當空大吳吟未至慢慢謂南朝慢體如徐庾之作魯直嘗效其體楚語不假些楚辭宋玉招魂曰魂兮歸來去君之恒幹何為四方些説文云語辭也懷逺已屢歎逺謂遷謫諸人如蘇黄等論昔先急唾昔謂紹聖元符之間孫真人千金方載黄帝雜忌法曰清旦聞惡事即向所來方三唾之吉身世喜相違見前注真成螘旋磨晉書天文志日月東行而天牽之以西沒譬之于蟻行磨石之上磨左旋而蟻右去平生陳孟公嵗晩不驚坐自言其無復平日豪氣也漢書陳遵傳時有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐和黄生出遊三絶句右坊左里逺相求東度南登稱意遊皆是日實録已著連峰妨目極不應疾雨使心休目極用王粲賦意見前注諸郎連璧萬人看新有詩聲伯仲間竝見前注作意登臨還得句此生寧復要長閒謝靈運有登臨海嶠詩孟郊詩夜學曉未休苦吟神鬼愁如何不自閒心與身為讎賸欲登臨強作歡衣冠未動意先䦨從今泉石非吾事只借君詩細細看東坡詩作隄捍水非吾事盤馬山后山自注云山頂數丈無草木相傳漢祖盤馬于此耕桑戰伐飽曽經廟毁村荒不乞靈老杜詩老樹飽經霜左傳曰願乞靈于臧氏尚有君王盤馬跡至今草木不能青退之詩杏花兩株能白紅爛石村亂石何年爛千林昨夜黄曉耕來鳥雀麥壟縱牛羊投老須微禄晉書王羲之傳曰懐祖投老可得僕射老杜詩耽酒須微禄持身闕寸長司馬相如過宜春宫賦曰持身不謹楚辭卜居曰尺有所短寸有所長洗心聞吉語時事信難量后山巳洗滌當世之念忽有起廢之除故云爾洗心借用易繫辭語退之詩哀情逢吉語按漢書陳湯傳曰不出五日當有吉語聞文選崔子玉座右銘曰悠悠故難量别叔父崑山丞父子兼知巳扶攜共白頭退之董溪墓誌曰父子間自為知己又為千里别未使寸心休鳥雀空庭曉風霜落木秋近親零落盡更覺别離愁魏文帝與吳質書曰何圖數年之間零落殆盡言之傷心從寇生求茶庫紙絶句南朝官紙女兒膚南朝謂李後主南史阮孝緒不書官紙成父之清白女膚見前注老杜詩恰似十五女兒腰玉版雲英比不如素問有玉版論要篇漢書鼂錯傳曰刻于玉版樂天服雲母散詩云曉服雲英漱井花乞與此翁元不稱他年留待大蘇書大蘇謂東坡魯直和王炳之惠玉版紙詩云不持歸掃蘇公門乃令小人今拜辱黄樓絶句樓上當當徹夜聲樓有東坡所書子由黄樓賦碑當當搨碑聲也東坡墨妙亭詩空齋畫静聞登登預人何事有枯榮晉書謝𤣥傳叔父安謂子姪曰子弟亦何預人事而正欲使其佳選詩俯仰見榮枯后山意謂此碑本不闗人而亦隨時輕重時黨禁初開也已傳紙貴咸陽市紙貴見前注史記吕不韋傳著吕氏春秋布咸陽市門懸千金其上有能増損一字者予千金更恐書留後世名後世名見前注前詩有曰生前只為累身後更須名酬顔生惠茶庫紙破卵剥膜肌理滑老杜詩肌理細膩骨肉勻削玉作版光氣熏禮記曰君子于玉比徳氣如白虹天也老子尚堪哦七字退之紀夢記曰壮非少者哦七言六字常語一字難阿買頗能書八分退之詩阿買不識字頗能書八分此借用以言其子也黄樓樓以風流勝蘇子由黄樓賦敘曰熙寧十年八月彭城大水余兄子瞻適為彭城守水未至使民具畚鍤蓄土石以為水備水既去而民益親即城之東門為大樓堊以黄土曰土實勝水徐人相勸成之情縁貴賤移厄于紹聖黨禍屏亡老畢篆市發大蘇碑黄樓賦乃畢仲詢篆東坡書因是而起廢焉更覺江山好難忘父老思父老思見前注只應千載後覽古勝當時謂人情貴耳賤目文選盧子諒有覽古詩答黄生魏衍注云時初冬尚無冬衣先生以背子贈之堅不受到家以朱氏所贐二匹寄之因作詩我無置錐君立壁舂黍作糜甘勝蜜荀子曰無置錐之地又曰猶以戈舂黍選詩曰斧冰持作糜東坡詩送老虀鹽甘似蜜綈袍不受故人意史記范睢傳須賈曰范叔一寒如此哉乃取其綈袍以賜之范睢曰公之所以得無死者以綈袍戀戀有故人之意樂餌肯為兒輩屈老子曰樂與餌過客止晉書王羲之曰恒恐兒輩覺割白鷺股何足難食鸕鷀肉未為失暮年五斗得千里有愧寒簷背朝日暮年五斗后山自謂寒夜閉户風將雨玉臺集序云金星與婺女爭華通宵浪打頭東坡詩平生賀老慣乘舟騎馬風前怕打頭蓋吳中有打頭風若為中夜聴復作别時愁宿鴈鳴漁火村舂急暗投老杜詩宿鴈聚圓沙退之詩漁火粲星㸃老杜詩村舂雨外急暗投借用鄒陽語謂夜舂也不應田二頃能使寸心休史記蘇秦曰使我有洛陽負郭田二頃吾豈能佩六國相印乎贈周秀才二首與君世好自比鄰后山自注云宣古與大父外大父遊君其孫也漢書孫寳傳祭竈請比鄰豐悴相從久更親急駕一作棹小舟來取别固知風味似前人豐悴取别竝見前注早逢異人得異術究窮咎休出頃刻相逢拍手問由來怪我今年有陰徳魏衍注云周嘗謂先生命未甚合故有陰徳之語摭言裴晉公質狀眇小有相者曰郎君若不至貴即當餓死一日遊看山寺有婦人以父被罪假得玉帶二犀帶二以賂津要致于欄楯忘收之而去度得而授之後見相者曰必有陰徳及物前途萬里非某所知也度果位極人臣五子相送至湖陵中年患别多作别早日諱窮常得窮莊子孔子曰我諱窮久矣而不能免命也勿云一水四十里衣冠塞郭何人同周生子病輟身出劉子逺來今㡬日石家仲叔好少年頗能厭俗從吾律南史何妃傳曰楊郎好年少后山持戒律頗嚴魏君不獨相從早自君之來吾卻掃魏衍字昌世后山之門人也江淹恨賦曰閉關卻掃嵗月磨人孰能久反覆看渠難得好言世態淺薄也東坡詩非人磨墨墨磨人老杜詩人生反覆看亦醜湖陵古城風日寒情義乃知生别難選詩淚為生别滋髙懷已為故人盡交道應留後代看老杜詩髙懐見物理後漢王丹曰交道之難未易言也老杜詩孝子忠臣後代看湖陵與劉生别觸寒歴險來特特愧無以當欣有得温庭筠詩馬聲特特荆門道退之答胡秀才書云顧無以當之如何向來憂患不相捨知子用心堅鐵石人畏有心事無難此語雖鄙理則然漢書李廣贊曰此言雖小可以喻大君今意在翰墨間他日人爭讓一先以棊為喻言髙一著也樂天詩何處春深好春深博奕家一先爭破眼六聚鬬成花寄滕縣李奉議滕大夫伯陽父孫魯論孟公綽不可以為滕薛大夫史記老子傳姓李名耳字伯陽烹小鮮治大國原原本也老子曰治大國若烹小鮮一得何用五千言老子曰侯王得一以為天下貞史記老子傳曰言道徳之意五千餘言弛災決獄人不寃周禮大司徒大荒大札則令邦國移民通財舍禁弛力薄征緩刑漢書于定國傳曰民自以不冤盛氣走訟畏討論史記趙世家曰太后盛氣而胥之入終嵗斂吏不到門子弟無賴皆西奔漢書髙祖紀曰始大人常以臣無賴踵門父老如雲屯拊髀跳踉走兒孫莊子曰有孫休者踵門而詫子扁慶子又曰鴻䝉拊髀爵躍絳蟠翠節歌唄喧法華經曰歌唄頌佛徳畫盆戴頂煙如焚繡褾綵軸箱帕繁曲躬义手前致言老杜詩聴婦前致詞畜眼未見耳不聞老杜嚴中丞詩畜眼未見有暮年何以答此恩請誦華嚴夀我君晉書束晳傳衆作歌曰束先生通神明請天三日甘雨零何以醻之報束長生住鴈㫁岸通横水枯荷著早霜一陂堪度嵗數鴈不成行市逺無矰繳家語漁者曰天暑市逺淮南子鴈銜蘆而飛以避矰繳年豐足稻粱稻粱見前注中原有佳氣不必到衡陽似指當時事後漢光武紀氣佳哉鬱鬱葱葱寓目曲曲河回復山海經曰河百里一小曲千里一大曲吳都賦曰潮波汩起回復萬里青青草接連選詩曰青青河畔草老杜詩野水春來更接連去帆風力滿來鴈一聲先吳都賦五臣注曰舉颿者挂席用風力也颿與帆同老杜詩一聲何處送書鴈野曠低歸鳥江平進晚牽老杜詩江平不肯流又云百丈牽江色望鄉從此始留眼未須穿文選謝𤣥暉詩有情知望鄉阮嗣宗詩零落從此始老杜詩新愁眼欲穿野望霜葉紅于染吹花落更馨平江行詰曲李羣玉詩壓穿詰曲﨑嶇路小徑夾葱青選詩招隠曰峭蒨青葱間竹柏得其真度鳥開愁眼遙山入畫屏畏人惟可飲從俗卻須醒老杜詩畏人成小築惟可飲見前注楚辭卜居曰將從俗富貴以媮生乎寄單州吕侍講希哲往時三吕共脩途吕許公三子希哲希績希純老杜詩牽迫限脩途擬上青雲近玉除選詩凝霜依玉除山谷詩垂上青雲郤佐州中道勒回奔電足崔豹古今注曰秦始皇有馬名追電東坡徑山詩中途勒破千里足今年還直邇英廬邇英殿講筵所在陸機詩厭直承明廬縱談尚記華嚴夜枉道難隨刺史車老杜過韋氏莊詩曰枉道秖從入吟詩許更過遣興寛為七字語尋人聊代一行書老杜詩遣興莫過詩又云相看過半百不寄一行書寄沛縣姜承議后山自注云姜乃潜之孫以捕寇改官豫作隠居自號金池居士平生魯國老先生晚見諸郎識老成姜潜蓋石介守道門人見于歐公所作守道墓誌怪有武功䝉寵錫果縁陰徳貫神明漢書武帝紀奏置武功賞官以寵戰士賈誼書孫叔敖母曰有陰徳者天報以福此借用言姜君善醫金池已作歸田計金池當是所居地名玉版方書濟物情素問有玉版論要篇姜必善醫者上句陰徳亦謂此百里飢寒獨顔闔忍令一物不敷榮后山自注云顔闔謂魏衍莊子曰顔闔自飯牛魯君使人以幣先焉晉書王羲之傳曰修植桑果今盛敷榮寄兗州張龍圖文潛二首去國遭前政還家未白頭初文潜坐黨謫監黄州酒税時紹聖四年也老杜詩破膽遭前政百年當晚遇樂天詩晚遇何足言白髭映朱紱一辱獨先收老杜詩一辱泥途遂晚收齒脱空餘舌齒脱見前注説苑曰常摐有疾老子問之摐張口曰吾舌存乎曰然吾齒存乎曰亡舌存以柔齒亡以剛此句以下皆后山自述顔衰早著秋晉書顧悦之與簡文帝同年而髮早白帝問其故對曰蒲桞常質望秋先落三為郡文學大勝鄧元侯見前注元侯鄧禹謚也賸喜開三面旋聞乞一州三面見前注乞字作去聲讀力難隨鳥翼行復立螭頭上句自言不能往見下句言文潜當復為舊官老杜詩獨把漁竿終逺去難隨鳥翼一相過螭頭見前注今日麒麟閣漢書蘇武傳宣帝圖畫功臣于麒麟閣當年鸚鵡洲後漢禰衡傳江夏太守黄祖大㑹賔客人有獻鸚鵡者衡攬筆作賦文不加㸃後衡言不遜祖遂令殺之今鄂州江夏有鸚鵡洲即其地也黄州與鄂相望故后山用此事寄書愁不達書達得無愁老杜詩寄書長不達況乃未休兵家山晚立遶舎苔衣積唐人劉滄詩莎徑晚煙凝竹塢石池春色染苔衣倚牆梨頰紅老杜詩色好梨勝頰地平宜落日野曠自多風蘇子由詩山滿長空宜落日唐人王昌齡詩曠野饒悲風禹跡千年後家山一顧中左傳曰茫茫禹跡未休嗤土偶史記孟嘗君傳孟嘗君將入秦蘇代謂曰木偶人語土偶人曰天雨子將敗矣土偶人曰我生于土敗則歸土今天雨流子而行未知所止息也孟嘗君乃止已復逐飄蓬曹子建詩轉蓬離本根寒夜一夜風澎浪中宵月脱雲歸田録曰江南有大小孤山江側有澎浪磯世俗轉為彭郎到牕資少睡逺響倦多聞星火遙相亂江山氣不分早雞先得便退之詩歸來得便即遊覽盧仝詩揚州蝦蟹忽得便斷鴈屢鳴羣老杜孤鴈詩飛鳴聲念羣僧祇律曰天帝釋化為羔子鳴羣喚母鴈二絶句來往違寒暑飛鳴在稻粱文選謝靈運詩嗷嗷雲中鴈舉翮有委羽求凉弱水湄違寒長沙渚詩鴻鴈于飛注曰鴻鴈知避陰陽寒暑未知溟海大不肯過衡陽衡山有迴鴈峯截水無留影天衣懷禪師語曰譬如鴈過長空影沈寒水鴈無遺踪之意水無涵影之心太白詩寳刀截流水文選江文通詩云寒郊無留影哀空有斷羣老杜鴈詩行㫁不堪聞翅開先作字行㫁不成文老杜鵝詩翅開遭宿雨行㫁見前句注太𤣥文首曰鴻文無范説者謂鴻鴈之飛偶有文字之象而無法也山口重霧真成雨疎簾不隔風青林擁紅樹家鶩雜賔鴻退之鶯詩春風紅樹驚眠處陶隠居注本草云鶩即是鴨鴨有家有野又尸子云野鴨為鳬家鴨為鶩賔鴻見前注東坡詩野鴈雜家鶩漁屋渾環水晴湖半落東往來成一老猶在半塗中老杜詩生涯能㡬何常在羇旅中禮記中庸曰半塗而廢雪竇頌云如今要見黄頭老刹刹塵塵在半塗晩泊清切臨風笛深明隔水燈老杜詩縁雲清切歌聲上堆埸穿鳥雀暗溜入溝塍堆埸見前注西都賦曰溝塍刻鏤年使扶行老船催趁渡僧左傳曰絳縣老人有與疑年使之年老杜詩扶行㡬屐穿兹游恐未巳著句續先曾異聞集沈亞之夢中作舞辭曰欲疑著辭不成語東坡詩聊亦寄吾曽夜雨十月天猶雨三更月失明盧仝月蝕詩偏使一目盲司馬遷書曰左丘失明厥有國語溟濛才酒潤㸃滴不成聲左思呉都賦曰迴眺溟濛闢户風煙入投林鳥雀輕老杜詩投林羽翮輕旅懷終易感倏起别離情江文通別賦曰行子腸㫁百感悽惻宿合清口風葉初疑雨樂天詩葉聲落如雨晴牕誤作明杜荀鶴雪詩曰先于曉色報牕明此用其意穿林出去鳥舉棹有來聲老杜詩遲遲出林翮深渚魚猶得寒沙鴈自驚正月詩曰魚在于沼亦非克樂潜雖伏矣亦孔之沼老杜詩宿鴈聚圓沙臥家還就道自計豈蒼生言其出處皆以貧故自為計爾非為蒼生也晉書阮裕曰吾少無宦情兼拙于人間故曲躬二郡豈以騁能私計故耳又謝安傳桓温請為司馬髙崧戲曰卿累違朝㫖髙臥東山人言安石不肯出將如蒼生何蒼生今亦將如卿何漢書張敞傳曰便歸臥家宿泊口弱栁經寒色懸流盡夜聲莊子曰吕梁懸水三十仞流沫四十里更長疑睡少霜落怯寒生東坡詩老人無睡漏聲長樂天詩稍稍夜寒生急急占星度歐公詩山浦轉帆迷向背夜江看斗辨東西揺搖苦舫傾梁書江革濟江惟以一舸舸艚偏欹不得安人或謂曰當移徙重物以進輕艚革既無物乃于西陵岸取石千斤以實之風濤兼盜賊恩重覺身輕文選顔延年詩春江壯風濤老杜詩況兼水賊繁恃戒風飆駛謝靈運擬鄴中詩曰知深覺命輕注引孔坦表曰士死知遇恩令命輕潘安仁寡婦賦曰懼身輕而施重野望山開兩岸栁水遶數家村王介甫詩髙下數家村地勢傾崖口風濤齧石根栁子厚鈷鉧潭記曰冉水自南奔注抵山右屈折東流盪擊益暴齧其涯故旁廣而中深石根見前注平林霜著色畫家有著色山東坡詩誰見將軍著色山沙岸水留痕老杜詩冬水各依痕賸寄還鄉泣難招去國魂楚辭有招魂篇宿柴城臥埋塵葉走風煙齒豁頭童不記年退之進學解頭童齒豁起倒不供聊應俗髙低莫可只隨縁言其身世興廢相仍也傳燈録優波毱多曰若因地倒還因地起退之詩帝欲長吟哦故遣起且僵不供猶不辦也南史張興世傳曰朝廷遣禇彦回就赭圻行選檄版不供由是有黄紙札世傳樂府曲曰髙來不可低來不可魏野詩生計秖隨縁通通逺鼓三行夜周禮鼓人注司馬法曰昬鼔四通為大鼕夜半三通為晨戒又宫正擊柝注曰暮行夜以比直宿者隠隠平湖四接天元稹詩洞庭瀰漫接天迴枕底濤波篷上雨故將羇旅到愁邊愁邊見前注顔市阻風二首水到西流闊風從北極來聲驅峽口坼力抜嶺根摧老杜江漲詩大聲吹地轉漢書項籍傳曰力拔山兮氣葢世三秦記長安正南秦嶺嶺根水流為秦川突兀重重浪轟豗處處雷言浪聲如雷此體謂之影對前巻論之詳矣木𤣥虛海賦曰驚浪雷奔退之聖徳詩曰衆樂竝作轟豗融冶順流看過舫更著快帆催用劉禹錫沈舟側畔千帆過之意萬古梁山泊今年末掾船阻風兼著雪費日亦忘年老杜詩研畬應費日解纜不知年又詩費日繫舟長按太𤣥經文首曰彫纖之文徒費日也莊子曰忘年忘日世事元相忤衰懷忍自煎老杜詩回腸杜曲煎又云膏以明自煎晩來聲更惡老杜喜雨詩晚來聲不絶應得夜深聞始覺畏途邊莊子曰夫畏途者十殺一人則父子兄弟相戒也老杜詩盡室畏途邊晩坐桞弱留春色梅寒讓雪花張祜詩河流側讓關溪明數積石月過戀平沙選詩流水戀舊壑病減還憎藥年侵卻累家後歸栖未定不但只昬鴉末句自憐未知税駕之地老杜詩夜來歸鳥盡啼殺後栖鵶寒夜留滯常思動艱虞卻悔來漢書司馬遷傳太史公留滯周南老杜詩削迹共艱虞又云留滯才雖盡艱危氣益增寒燈挑不燄元稹詩殘燈無燄影幢幢殘火撥成灰前輩詩撥盡寒爐一夜灰凍水滴還歇風簾掩復開老杜詩風簾掩不定熟知文有忌情至自生哀王介甫詩文章尤忌數悲哀世説孫楚除婦服作詩王武子見之曰未知文于情生情于文生覽之悽然使人増伉儷之重魯直詩云意不及此文生哀絶句雲海𠖇𠖇日向西春風欲動意猶微魏衍云丙藁塗二字未注王子飛云趙誠伯本作欲動一云春風著意力猶微退之詩雲水蒼茫日向西老杜詩台州地闊海𠖇𠖇雲水長和島嶼青又詩今朝臘月春意動樂天詩雖有東南風力微不能吹無端一棹歸舟疾驚起鴛鴦相背飛劉禹錫詩無端陌上狂風急驚起鴛鴦出浪花老杜詩檣烏相背發禮武臺坐化僧后山自注云時吕希哲作單州守臺屬單州至人本無心莊子曰不離于真謂之至人起滅因衆縁佛書云諸法從縁生縁離法即滅維摩經云但以衆法合成此身起惟法起滅惟法滅化盡悲願在留形此臺巔家語曰化窮數盡謂之死宻嚴經偈云如來以悲願普應諸有縁如淨月光明無處不周遍聞名與致敬獲福皆無前維摩經云維摩詰稽首世尊足下致敬無量千年一鉢水宿疾㡬人痊驍雄兗州軍馬步餘數千一呼可摧山四合如垂天莊子曰翼若垂天之雲老幼十八村頃刻理無全哀鳴寄香火毁塔投其甎魯論曰鳥之將死其鳴也哀毁塔謂兗軍盛怒忽驚奔如有所見然等觀同一子豈特此所憐湼槃經云佛視衆生猶如一子羅睺羅想作七種羯磨為欲示惡行之人有果報故我來巳再見童稚亦䖍䖍南史王僧䖍之子慈與蔡興宗子約入寺約曰衆僧徒今日可謂䖍䖍發火觸暗室青燈已娟妍始讀壁間碑妙力隠不傳世説司馬太傅問謝車騎恵子五車何以無一言入𤣥謝曰當是妙處不傳頗恨語未工安得筆如椽晉書王珣夢人以大筆如椽與之云此當有大手筆事歸路雲月黒濤波隔長川溪翁停舟待相喚聲相連解纜風泊岸中流水入船退之羅池碑曰度中流兮風泊之鶡冠子曰中流失船一壺千金攲側腳不停竟脱蛟魚㳄樂天詩浮出蛟龍涎字書㳄與涎同興壞如有待適當使君賢定能選妙士拂塵起熏烟南史劉之遴題其子墓曰梁妙士之墓此借用昔承靈山囑早契少林禪丐我一片石併刻維摩篇退之黄陵廟碑刺史張愉自京師往與愉故善謂曰丐我一碑石載二妃廟事且令後世知有子名庾信自南朝至北方惟愛温子昇所作韓山寺碑曰惟韓山寺一片石堪共話餘若驢鳴狗吠耳維摩篇謂此詩也后山持戒律故以維摩自況晚興去國猶能别逢人始欲愁南史王惠傳㑹稽内史劉懷敬之郡送者傾都惠亦造别還過從弟球球問向何所見惠言惟覺逢人耳晉書王承傳承東渡江每遇艱險處之夷然既至下邳登山北望歎曰人言愁我始欲愁矣不干遮極目自是怯回頭退之西山詩為遮西望眼終是懶回頭樂天詩淚眼凌寒凍不流每經髙處即回頭布網收魚槮連筒下釣鉤爾雅槮謂之涔注聚積柴木于水中魚得寒入其裏藏隠槮音桑感反蘇子由詩漁艇縱横入釣筒誰初教鮮食澤竭未能休尚書暨益奏庶鮮食説苑曰竭澤以取魚非不得魚為明年無魚故也亦見吕氏春秋宿齊河燭暗人初寂寒生夜向深潛魚聚沙窟墜鳥滑霜林樂天烏夜啼云霜滑有風枝稍作他方計初回萬里心他方計意謂西方極樂國回心言無復四方之志漢書賈誼傳曰使天下回心而鄉道還家只有夢更著曉寒侵老杜詩天寒不成寐無夢有歸魂别劉郎魏衍注云宣義之壻六年之别先生喪母劉喪父故其詩哀甚一别已六載相逢有餘哀公私兩多事災病百相催真誥載楊羲手帖云公私怱怱災病見前注無酒與君别有懷向誰開老杜詩一生懐抱向誰開深知百里逺肯為老夫來趙巖一市萬人聚四衝千里遙胡然不作邑兼自可成橋羣盜去無跡諸豪壓不驕老杜詩壯士慘不驕由來天下事浮議易傾搖必嘗有欲置縣于此以鎮服豪傑盜賊而為異議所奪者盤庚曰而胥動以浮言雞籠鎮河市新經集雞籠舊得名初聞北人語北史曰詔㫁北語一從正音意作故鄉聲其意但欲作鄉聲如莊舄不忘越吟也客久艱難極情忘去就輕空虛仍廢忘何以慰諸生文選應休璉詩避席跪自陳賤子實空虛魏文帝紀評注曰人少好學則思專長則善忘樂天詩舊遊多廢忘后山詩注巻十一
