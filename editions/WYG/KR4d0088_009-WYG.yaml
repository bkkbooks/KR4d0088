body:
  text: 后山詩注巻九宋陳師道撰任淵注晁无咎畫山水扇前生阮始平晉阮咸為始平太守顔延之五君詠曰屢薦不入官一麾乃出守葢謂咸也无咎亦數補外云黄魯直詩前身鄴下劉公幹今日江南庾子山今代王摩詰唐王維字摩詰工詩善畫繪上以為天機所到學者不及也偃屈葢代氣萬里入方尺南史齊竟陵王子良之孫賁于扇上圖山水咫尺之内便覺萬里為遥老杜山水圖歌云咫尺應須論萬里朽老詩作妙南史沈慶之詩曰朽老筋力盡徒步還南岡此借用以言樹石險絶天與力老杜詩溟漲與筆力君不見杜陵老翁語湘娥增悲真宰泣老杜有山水障歌云不見湘妃鼔瑟時至今斑竹臨江活又云元氣淋漓障猶濕真宰上訴天應泣又云湘娥簾外悲奉陪趙大夫游桓山後水喧江落渾黄老杜詩寒江舊落聲渾黄謂汴水也元稹有酒章曰濟涓涓而縷貫將奈兮萬里之渾黄晩雲障日作微凉東坡詩峰多巧障日笙歌聲裏旌旗動羅綺叢中語笑香勸相秋郊開稔熟易井卦曰君子以勞民勸相開謂導迎之如禮記所謂有開必先摩挲苔壁弔荒亡詩意屬桓司馬後漢書薊子訓摩挲銅人孟子曰流連荒亡風流一代今山簡有底樽前著葛強晉書山簡傳簡鎮襄陽每出嬉游有童兒歌曰舉鞭問葛強何如并州兒強家在并簡愛將也后山以自比老杜詩花飛有底急底猶言何等見顔師古匡謬正俗寄曹州晁大夫晁端仁字堯民東方千騎貴當年白髮居頭也自賢古樂府陌上桑曰東方千餘騎夫壻居上頭又曰四十専城居此詩言不必盛年出守而後為賢也文選韋𢎞嗣博奕論曰君子恥當年而功不立東坡詩直為鱸魚也自賢肯費精神修客主言不飾㕑傳以稱過使客也退之詩可憐無益費精神稍回功譽入章篇退之詩餘事作詩人虚名不救飢腸厄晚嵗仍遭末疾纒此以下皆后山自述老杜詩虛名但䝉寒温問汎愛不救溝壑辱東坡詩平生五千巻一字不救飢按世説曰愍度道人立心無義權救飢耳左傳曰風淫末疾老杜詩尚纒漳水疾死去不為天下惜晉書王坦之答謝安書曰天下之寳故為天下所惜鏡中當有故人憐老杜詩鏡中衰謝色萬一故人憐送馮翊宋令三楚風流信有人三楚見前注風流謂屈宋先聲今已徹咸秦咸陽秦所都寧為雞口官無小雞口見前注左傳曰國無小退之藍田丞㕔壁記曰官無卑顧材不足塞職欲試牛刀久要新牛刀見魯論莊子曰庖丁解牛十九年而刀刃若新發于硎細肋臥沙勤下筯馮翊沙苑監有臥沙細肋羊下筯見前注長芒刺眼莫霑唇長芒似指苜蓿沙苑多有之唐薛令之詩曰初日上團圓照見先生盤盤中何所有苜蓿長闌干老杜詩藤枝刺眼新山西豪傑知吾老山西一作西州後漢皇甫規傳黨事起自以西州豪傑恥不得預考后山與曾樞密書熙寧間常客遊秦中為説猶堪舉萬鈞言其尚強健也孟子曰今曰舉百鈞則為有力人矣嗟哉行張生服石為石奴啟顔録云後魏時諸王貴臣多服石藥皆稱石發此云為石奴言為石所使也下潦上乾如渴烏後漢馬援傳曰下潦上霧此借用李蘭刻漏法曰以銅為渴烏以引器中水太白天馬歌尾如流星首渴烏一朝僨蹶須人扶伏毒未動風出虛此生所得與昔殊退之作李干墓誌略曰余不知服食説自何世起殺人不可計而世慕尚之益至臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已韓子作志還自屠退之作李干墓誌敘以藥敗者數人以為世誡然躬自蹈之故樂天有詩曰退之服硫黄一病訖不痊吳越春秋國人作離别之聲曰天道祐助兮呉卒自屠白笑未竟人復吁樂天詩序曰予與故刑部李侍郎早結道友以藥術為事詩曰金丹同學都無益姹女丹砂燒即飛是樂天從事于金石也以身濟欲未必愚欲久而速反所圖李干墓誌有曰蘄不死乃速得死謂之智可不可也嗟哉偉然二大夫謂韓與白也漢書疏廣傳曰賢哉二大夫夜句三首過雨作秋清歸雲放月明魯直詩今夜儻放春月明入簾揺竹影塞耳落洪聲徐州有百步洪老樹仍孤秀秋蟾只獨明何須夜來雨卻聴枕前聲夜來雨見前注短短長長栁三三五五星唐人王建詩長長南山松短短北澗楊詩曰嘒彼小星三五在東東坡樂府曰旋抺新妝看使君三三五五棘籬門㫁雲當極目不盡逺峰青唐錢起湘靈鼓瑟詩曰江上數峰青送孝忠落解南歸孝忠蓋后山兄子妙年失手未須恨白璧深藏可自妍後漢薊子訓傳常抱鄰家嬰兒故失手墮地而死藏璧用魯論韞匱之意莊子曰良賈深藏若虛短髮我今能種種左傳盧蒲嫳曰余髮如此種種余奚能為注曰種種短也曉妝他日看娟娟老杜詩曉妝隨手抺東坡與潘三失解後飲酒詩曰千金敝帚人誰買半額蛾眉世所妍顧我目為都憐君欲鬬小嬋娟千金市帚寧論價魏文帝典論曰我有敝帚享之千金萬户分侯信有年漢書李廣傳文帝曰惜廣不逢時令當髙祖世萬户侯豈足道哉退之剥啄行曰往追不及來不有年清白傳家有如此後漢楊震傳使後世稱為清白吏子孫太白詩丈夫立身有如此按禮記儒行曰其特立有如此歸塗囊盡不留錢老杜詩囊空恐羞澀留得一錢看此反而用之寄單州張朝請平生天上張公子尚記門間半面人老杜贈張四學士詩云天上張公子宫中漢客星半面見前注聲烈與風來不盡文選琴賦曰聲烈遐布東京賦曰聲與風翔澤從雲遊此用其字退之書曰名聲隨風而流此用其意音書無使去難頻老杜詩風塵荏苒音書絶又詩欲問平安無使來一言悟主心猶壯漢書車千秋特以一言寤意旬月取宰相封侯百巧成窮髮自新東坡詩宛丘先生不自飽更笑老崔窮百巧聞説監河收貸粟定傾東海活窮鱗莊子曰莊周家貧貸粟于監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周曰昨周來有中道而呼者周顧視車轍中有鮒魚焉周問之對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎子可乎鮒魚曰吾得斗升之水然活耳君乃言此曽不如早索我于枯魚之肆左傳曰陳氏以公量貸而以家量收之姚嗣宗詩可惜作窮鱗謝憲臺趙史惠米平生忍欲今忍貧閉口逢人不少陳退之詩枚臯即召窮且忍俸薄身清趙都史也能作意向詩人老杜詩作意莫先鳴又詩獨能無意向漁樵和趙大夫鹿鳴宴集趙侯詩律近風騷雅意推賢答聖朝漢書蕭望之雅意本朝老杜詩未有涓埃答聖朝鴻鴈著行過渭水老杜鴈詩卻過清渭影髙起洞庭羣東坡詩旅鴈何時更著行鳯凰覽徳下虞韶漢書賈誼傳曰鳯凰翔于千仞兮覽徳輝而下之尚書簫韶九成鳯凰來儀三千著籍今為盛漢書儒林傳序曰成帝末增弟子員三千人後漢儒林牟長傳曰諸生著録前後萬人魯論曰唐虞之際於斯為盛九萬論程不作遙莊子曰摶扶摇而上者九萬里太白詩迴山倒海不作難不讀世書談世事臥看君自致青霄史記范雎傳須賈曰賈不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事晉書王衍傳曰口不論世事李善注文選辨命論云劉孝標自謂坐致青雲和朱智叔鹿鳴席上三楚風流秀士林英詞從昔動脩門三楚風流見前注英詞謂屈宋風騷沈約宋書謝靈運傳論曰英詞潤金石楚辭招魂曰魂兮歸來入脩門注脩門郢城門也郢蓋楚之所都充庭初識蒼龍礎通典曰武太后長夀三年始令舉人獻嵗元㑹列于方物前以備充庭東坡詩雙蜺蟠礎龍纒棟言禁殿也賜醴行霑白獸樽晉禮志曰正㑹設白獸樽于殿庭若有能直言則發此樽飲酒已上薦書輕一鶚見前注輕字讀如身輕一鳥過之輕更憑詩力化羣鯤莊子曰北溟有魚其名為鯤化而為烏其名為鵬鵬之背不知其㡬千里也怒而飛其翼若垂天之雲培風背負青天而後乃今將圖南千年遼鶴空城郭見前注誰見朱公有異孫后山自注云漢大司空朱浮蕭人也蕭縣今屬徐州魏志王粲傳蔡邕倒屣迎粲曰此王公孫有異才酬智叔見贈老去斯文不更論卻因夫子話師門師門謂曾氏後漢桓榮傳曰下則去家慕鄉求謝師門清談不待傾三語晉書阮曕傳曕字宣子王戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎即命辟之時謂三語掾世説又載衛玠嘲宣子曰一言可辟何假于三宣子曰苟是天下之望亦可無言而辟復何假一勝日何知共一樽勝日見前注老杜詩不謂生戎馬何知共酒盃蘇武詩我有一樽酒將以贈逺人逐北我方填坎井莊子曰蠻氏觸氏相與爭地而戰伏尸數萬逐北旬有五日而後反左傳曰鄭伐宋宋師敗績狂狡輅鄭人鄭人入于井莊子曰子獨不聞夫坎井之蛙乎圖南誰得料鵬鯤見前注過逢為説侯芭在老杜詩數為姻婭過逢地侯芭見前注臥楫生衣犢有孫老杜詩歸楫生衣臥陸龜䝉詩樹有交柯犢有孫再酬鄉里衣冠不絶人見前注近天尺五只清門尺五見前注老杜詩將軍魏武之子孫于今為庶為清門論文正可簪雙筆漢書趙充國傳張安世本持橐簮筆注謂備顧問漢儀尚書令僕丞郎月給大管筆一雙澆舌行看賜上樽東坡詩澆子談天口漢書賜丞相養牛上尊酒注糯米一斗酒一斗為上尊瓊玖每䝉先木李木𤓰詩投我以木李報之以瓊玖蜩鳩方共笑飛鵾蜩鳩飛鵾竝見前注固知賢傑當傳世下里朱陳亦有孫文選宋玉對楚王問曰客有歌于郢中者其始曰下里巴人國中屬而和者數百人樂天詩徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氲田中老與幼相見何欣欣一村惟兩姓世世為婚姻敬酬智叔三賜之辱兼戲楊理曹二首龍爭虎據竟成塵後漢班固答賔戲曰七雄據鬬分裂諸夏龍戰虎爭魏陳琳檄曰豪傑縱横熊據虎跱只有青樓與白門后山自注云青樓燕子樓也杜牧之詩嬴得青樓薄倖名魏志張邈傳吕布自稱徐州刺史太祖征布布與其麾下登白門樓兵圍急乃下降令宰才髙先得句令宰謂智叔為咸平令也老杜詩鳧看令宰仙使君情重數開樽退之詩使君數開筵又云主人情更重空使劍鋒摧東坡樂府亦有主人情重之句江山故國難留鶴科斗荒池可著鯤謂智叔將出使也退之峽石西泉詩曰聞説旱時求得雨只疑科斗是蛟龍可著鯤猶言安可著鯤也直使頷須渾作白未應投鑷愧諸孫后山自注云智叔有歎白頭詩樂天詩滿頷白髭須南史鬱林王紀齊髙帝笑曰豈有為人作曾祖而拔白鬚者乎即擲鏡鑷險韻廋詞費討論晉語曰有秦客廋詞于朝注云廋隠也謂以隠伏詭譎之言問于朝也魯論曰世叔討論之真持布鼔過雷門漢書王尊傳曰毋持布鼔過雷門注雷門謂㑹稽也有大鼔越擊此鼔聲聞洛陽更看九日臺頭句謂二謝詩見前注以比智叔元稹詩更看吹帽落臺頭未用三人月下樽太白詩舉杯邀明月對影成三人后山不飲故云鏡裏黄花明白髮海邊赤腳踏長鯤言其已老欲為世外之遊也老杜詩能添白髮明又詩赤腳踏層冰東坡詩腳踏赤鯶公云從來相戒莫打鴨可打鴛鴦最後孫此句屬楊理曹打鴨事見前注後篇寄晁大夫詩亦曰只今容有名駒子則此所謂鴛鴦孫蓋名家之後也公長短句中南鄉子引載盼之子瑩詩意似指此酬智叔見戲二首百念皆空習尚存稍修香火踏空門槌腰摩腹非春事樂天詩小奴槌我足小婢槌我背信老態也老杜詩自知白髮非春事割愛投閒覆玉樽老杜詩割愛酒如澠退之進學解投閒置散覆杯見前注白髮情多猶可染后山自注云來詩有白髮之歎南史謝靈運傳何長瑜以韻語序臨川王義慶僚佐云陸展染白髮欲以媚側室青青不解久星星行復出驂鸞興盡卻乘鯤退之所謂我寧屈曲自世間安能從汝巢神山也江淹别賦曰驂鸞騰天乘鯤蓋用李白騎鯨魚之意上界紛紛足官府退之詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪也容河鼔過天孫爾雅曰河鼔謂之牽牛史記天官書曰織女天女孫周處風土記曰七月初七日河鼓織女二星辰相㑹雨花風葉未宜春私栁官渠白下門晉書陶侃識武昌官栁此云私栁反而用之白下本在金陵此句所指當是徐州白門也每度清溪嘲短髮老杜詩莫話清溪髮蕭蕭白映梳后山後有詩云只欲泥行過白下萬一簾疎見一斑前有詩云歴肆側聴長短句緣溪斜著兩三家當是白門傍溪狹斜所在也時容使席近芳樽晉書阮籍等贊曰劉畢芳樽之友雄蜂雌蝶元非偶李商隠栁枝詩曰花房與蜜脾蜂雄蛺蝶雌同時不同類那復更相思左傳曰齊大非吾偶野馬遊塵不佐鯤言無復少年之氣助其狂心也莊子曰野馬塵埃也生物之以息相吹也注曰此皆鵬之所憑以飛者耳野馬者游氣也漢書食貨志曰或累萬金而不佐公家之急若許成功當封賞后山自注云事具李待制席上篇后山詩話韓魏公安撫陜西李待制師中過之李有詩名席上使為官妓賈愛卿賦詩曰願得貔貅十萬兵秦闗烽火一時平歸來不用封侯印只問君王乞愛卿請看子子與孫孫意謂老矣此事當付之後生前漢元后傳王翁儒曰吾聞活千人有封子孫子子孫孫見尚書及詩送智叔令咸平二謝將能事重陽只故臺老杜詩孰知二謝將能事頗學陰何苦用心固須衝節去便恐帶秋回言重九已近不肯少留爽秀之氣若與秋俱回誰復繼二謝者敏捷才無盡老杜詩敏捷詩千首見前注鋪張意有開退之云鋪張對天之閎休此借用言詩意開廣也猶須記衰疾書與鴈同來竝見前注九月九日夜雨留智叔騎臺九日登臨處只有歸人醉扶路晉書謝安傳羊曇為安所愛重安薨後行不由西州路嘗因石頭大醉扶路唱樂不覺至州門以馬䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘慟哭而去千年二謝孰可代我每苦留君只去后山罷潁學除彭澤令未赴丁母憂寓僧舎既除喪猶不言仕者四年花粗只為前人惜前篇有曰可打鴛鴦最後孫粗與麄同曲誤不解丞卿怒此兩句亦戲揚理曹也吳志周瑜傳曰曲有誤周郎顧後漢五行志童謡曰梁下有懸鼓我欲擊之丞卿怒此借用只消著帽受西風不待風流到新句反用孟嘉落帽事言免貽白髮之嘲也此句以屬智叔老杜詩吹面受和風九月九日與智叔鵰堂宴集夜歸鵰堂從昔有惡客酒盡不去仍復索玉堂閒話曰徐州使宅有鵰堂蓋多妖狐故畫鵰于中東坡在徐州王鞏遇之自謂惡客故此詩引用老杜詩指㸃銀瓶索酒嘗欲留歌舞盡客意風雨和更作三厄漢書翟方進傳曰危亂漢朝以成三厄此借用其字佳辰難得客更難我窮無酒為君歡只欲泥行過白下萬一簾疎見一斑史記夏本紀曰泥行乘橇孫光憲詞曰半踏長裙宛約行晚簾疎處見分明東坡樂府曰十里春風誰指似斜日掩映透簾斑晉書王獻之傳曰此郎管中窺豹時見一斑城南夜歸寄趙大夫書生作意一斑足杜陵據鞍兩眼寒東坡詩杜陵飢客眼長寒蹇驢破帽隨金鞍隔花臨水時一見只許腰肢背後看風雨喚人歸去好老杜詩江草日日喚愁生免敎街吏報平安芝田録牛竒章公帥維揚杜牧之在幕中夜微服逸遊後牧以拾遺召公以縱逸為戒牧始隠諱公取一篋皆街子早報帖云杜書記平善老杜詩每日報平安席上勸客酒稍開襟抱使心寛大放酒腸須盞乾世説輕詆門曰中郎襟抱未虛韓孟同宿聨句云為君開酒腸顛倒舞相飲唐人詩又曰酒腸俱逐洞庭寛珠簾十里城南道肯作當年小杜看小杜即牧之也牧之詩云春風十里揚州路捲上珠簾總不如戲寇君二首老杜秋來眼更寒蹇驢無復逐金鞍見前注一本作杜老南鄰卻有新歌舞借與詩人一面看文選左太沖詩南鄰擊鐘磬北里吹笙竽本事詩云喬知之有婢名窈娘武延嗣留之知之為詩曰君家閨閣不曾難常將歌舞借人看文選三國名臣贊序曰定交一面李善注引崔寔本論曰徒以一面之交定臧否之決南鄰歌舞隔牆聴想對朝牕暈倒青東坡詩倒暈連眉秀嶺浮退之詩白咽紅頰長眉青莫望喚人看嫋娜老杜詩喚人看騕褭不嫁惜娉婷只憑幽夢寄叮嚀退之詩幽夢感湘靈又詩浪憑青鳥通叮嚀絶句四首秋牀歸臥不縁愁病與衰謀作老仇竝見前注數樹直青能爾瘦退之詩杏花兩株能白紅東坡雜録載張子野戲語琴妓曰此箏不見許時乃爾黒瘦耶一軒殘照為誰留老杜詩前軒頽晩照又云不知明月為誰好芒鞋竹杖最關身散髮披衣不待人三兩作鄰堪共活老杜詩此地兩三家周禮五家為鄰五千插架未為貧北史崔儦傳曰不讀五千巻書者無入此室退之詩插架三萬軸昬昬嗜睡元非病續續題詩不奈閒東坡詩喚取昬昬嗜睡翁本事詩韋莊云誰知閒臥意非病亦非眠樂天琵琶行低眉信手續續彈作意買山還得笑世説支遁就深公買印山深公曰未聞巢由買山而隠多方拔白卻成斑應璩老詩曰拔白自洗蘇樂天詩啼衿與愁鬢此日兩成斑書當快意讀易盡抱朴子曰陸子十篇誠為快書又曰􅄞生云每讀二陸之文未嘗不廢書而歎恐其巻之竟也史記李斯傳曰快意當前適觀而已矣客有可人期不來退之詩曰所期終莫至日暮與誰迴可人見前注又見蜀費禕晉桓温傳世事相違每如此晉書羊祜曰天下事不如意十居八九好懷百嵗㡬回開老杜詩懐抱何時得好開東坡詩笑口㡬回開騎驢二首復作騎驢不跨驢此生㫁酒未須扶叢林謂參禪人有二病一是騎驢覓驢二是騎卻驢不肯下識得驢了卻騎不肯下此一病更是難醫若解放下方喚作無事道人后山此句豈謂是耶未須扶見下句注獨無錦里驚人句老杜詩錦里先生烏角巾又云為人性僻耽佳句語不驚人死不休魯直有杜子美浣花醉圖詩云宗文守家宗武扶落日蹇驢䭾醉起蓋世傳老杜畫像如此也得梁園畫作圖王立之詩話云雙井黄叔達字知命自江南來京師與彭城陳履常俱謁法雲禪師于城南夜歸過龍眠李伯時時知命著白衫騎驢道中揺頭而歌履常負杖挾囊于後一市皆驚以為異人伯時素善畫因寫以為圖邢惇夫作夜歸圖詩此詩末句追記此事也履常即后山舊字梁園謂汴京梁孝王兔園所在也衝籬突市不逡巡掠面驚風撲眼塵東坡詩四山眩轉風掠耳出手推敲寧避尹唐宋遺史賈島一日于驢上得句云鳥宿池邊樹僧敲月下門始欲著推字又欲著敲字鍊之未定引手作推敲之勢京兆尹韓愈方出島不覺衝至第三節題門吟咏不逢人本事詩云崔䕶清明日遊城外叩一莊門求飲有一女子以杯水遺䕶意屬甚厚明年思其人復往叩户久無人應因書一絶于門云去年今日此門中人面桃花相映紅人面只今何處去桃花依舊笑春風退之詩百里不逢人夀安縣君挽詞兩大推平日左傳鄭忽曰齊大非吾偶又懿氏妻曰物莫能兩大三從播厥聲儀禮喪服傳曰婦人有三從之義無專用之道故未嫁從父既嫁從夫夫死從子憂勤登上夀言雖憂勤而不損夀也事見後注國語不憂年之不登莊子曰上夀百嵗簫鼓閉佳城西京雜記云滕公得石椁銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室緦布千人從松楸十里行文選蔡伯喈作陳太丘碑曰緦麻設位哀以送之逺近㑹塟千人以上任彦昇求立太宰碑表曰松檟成行哀榮動鄉里㸃筆競諸生魯論曰其生也榮其死也哀寄曹州晁大夫墮絮隨風花作塵黄樓桃李不成春樂天詩春盡絮飛留不得隨風好去落誰家太白詩曰平生種桃李寂滅不成春只今容有名駒子困倚䦨干一欠伸此篇蓋言徐州風物后山嘗有詞并序云晁大夫増飾披雲初欲壓黄樓而張馬二子皆當年尊下世所謂英英盼盼者盼卒英嫁而盼之子瑩頗有家風而曹妓未有顯者黄樓不可勝也作南鄉子以歌之曰風絮落東鄰㸃綴繁枝旋化塵闗鏁玉樓巢燕子𠖇𠖇桃李摧殘不見春流轉到如今翡翠生兒翠作衿花様腰身宫様立婷婷困倚䦨干一欠伸又自注曰周昉畫美人有背立欠伸者最為妍絶東坡為賦續麗人行也按此詩風絮以屬英塵花以屬盼名駒子以屬瑩瑩之母蓋馬氏名駒子見前注李太白詩解釋春風無限恨沈香亭北倚䦨干樂天詩回頭一欠伸寄題披雲樓披雲在曹州后山婦翁郭㮣為郡時所作后山為記使君髙會答清秋漢書項羽傳飲酒髙㑹老杜詩報答風光知有處増飾披雲作勝遊退之和劉虢州詩序云亭臺島渚劉兄頗復増飾從子弟而遊其間按西都賦曰世増飾以崇麗九日再逢堪一笑后山清平樂詞云一嵗相逢兩節自注云是嵗閏九月兩作重陽以厯攷之蓋元符二年也終朝百過更深憂憂短髮不堪落帽也老杜詩不眠瞻白百過落烏紗此借用落霞孤鶩知才盡王勃九日游滕王閣序云落霞與孤鶩齊飛秋水共長天一色事具唐書才盡見前注疎雨微雲怯語遒孟浩然集序浩然遊秘省諸英華賦詩作會浩然云微雲淡河漢疎雨滴梧桐舉坐閣筆文選魏文帝與吳質書曰公幹有逸氣但未遒爾注遒盡也言未盡美賔主縱賢終少在只今未可壓黄樓注具前篇傳燈録米倉和尚曰猶欠少在絶句木搖電繞雷取龍王充論衡曰雷電折樹取龍按龍苦于天所使遁逃不逺則非神物天不取也北夢瑣言曰世言乖龍苦于行雨而多竄匿為雷神捕之或在古木及簷楹之間伏蛙號蚓溝瀆空魯直玉照泉詩勿令水泉濁魚蝦來寄中生子嵗月多往往隠蛟龍玉照不見影盤桓蝸螺官一朝揭源去枯瀆草䝉茸黒雲黄槐度白鳥映日急雨回斜風秦中嵗時記槐花黄舉子忙寄黄充俗子推不去可人費招呼世事每如此我生亦何娛嵇康書曰不喜俗人而嘗與之共事晉書鄧攸傳呉人歌曰鄧侯挽不留謝令推不去黄生後來秀純茂静者徒不見動經月來亦不須臾東坡詩懶者常似静静豈懶者徒文選古詩曰既來不須㬰人事已好乖可復自作疎見前注子雖向人懶勝處不可孤王介甫詩寄詩讀書人呶呶非勝處老杜詩更長燭明不可孤迨此田事休仍當秋雨餘深知阻泥濘步屐意何如老杜詩相邀愧泥濘騎馬到堦除又云步屐過東籬寄張大夫只應青眼老尚記白頭翁一别今何向三年信不通不應書字倦未有北來鴻禮記月令孟春仲秋皆曰鴻鴈來而孟春注曰鴈自南方來將北反其居肯作彭城守何時馬首東左傳曰余馬首欲東懷逺此首屬東坡海外三年謫天南萬里行東坡以紹聖四年丁丑謫昌化軍安置至元符二年己卯蓋三年矣樂天詩雲雨三年别風波萬里行生前只為累身後更須名言生前尚以名為累死後亦復何須晉書張翰傳曰使我有身後名不如即時一杯酒未有平安報空懷故舊情斯人有如此無復涕縱横太白詩丈夫立身有如此一呼三軍皆披靡答田生酒亦有何好人盡未肯忘此篇大抵戒田生好酒而勉以學也晉書孟嘉傳桓温曰酒有何好而卿嗜之苟無愁可解何必醉為鄉劉几作解愁曲陳慥作無愁可解以反之其末句曰若須待醉了方開解時問無酒怎生解唐王勣有醉鄉記樂天詩無過學王勣惟以醉為鄉賸欲論竒字竒字見前注終無諱秘方言欲以文章真訣授之無所隠也孫樵與王霖書曰嘗得為文真訣于來無擇無擇得于皇甫持正持正得于韓吏部退之然樵未嘗與人言及文章且懼得罪于時今足下有意于此而自疑尚多其可無言乎后山上二蘇公詩亦云請公别試囊中方退之李虛中墓誌曰于蜀得秘方直饒肌骨秀正要畫眉長謂美質亦須刻畫之也盧仝秋夢行長眉入鬢何連娟肌膚白玉秀且鮮玉臺新詠秦韜詩曰城中皆半額非妾畫眉長早起鄰雞接響作三鳴殘㸃連聲殺五更退之詩雞三號更五㸃文選沈休文作安陸昭王碑曰男女老幼大臨街衢接響傳聲不踰時而達乎四海劉夢得詩郡樓殘㸃聲寒氣挾霜侵敗絮退之詩威風挾惠氣西京雜記曰淮南王安著鴻烈解云字中皆挾風霜敗絮見前注賔鴻將子度微明禮記月令鴻鴈來賔老杜詩輕鳥度層陰又詩雲月遞微明有家無食違髙枕老杜詩無食問樂土又詩畫省香爐違伏枕又詩散地逾髙枕按史記張儀傳曰大王髙枕而臥百巧千窮只短檠百巧短檠皆見前注翰墨日疎身日逺世間安得尚虛名老杜詩才微嵗晚尚虛名又云不堪秖老病何得尚浮名和黄充小雪度臘侵春亦未遲紛紛款款意猶微樂天詩度臘都無苦霜霰迎春卻有好風光老杜詩㸃水蜻蜓款款飛霑衣帶潤元無見著物還消不待晞秦韜玉春雪詩片纔著地輕輕陷力不禁風旋旋消湛露詩曰湛湛露斯匪陽不晞注云晞乾也賸欲打牕連夜聴未須迷鴈㫁行飛樂天詩蕭蕭暗雨打牕聲老來才盡無新語只欲煩君急手揮漢書陸賈造新語后山詩注巻九
