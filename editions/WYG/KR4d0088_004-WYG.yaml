body:
  text: 后山詩注巻四宋陳師道撰任淵注送趙承議令畤令畤為潁州簽判受代而去先王隠徳世難名晚見諸孫也自成趙令畤字徳麟藝祖之後也故以呉泰伯比其先王晉書王湛有隠徳人莫能知潁水向來須好句東坡潁州謝上表曰文獻相續有晏殊歐陽修之風道山今日有宗英後漢書學者謂東觀為道家蓬萊山漢書景十三王敘傳曰四國絶祀河間賢明禮樂是修為漢宗英林湖更覺追隨盡曹子建詩清夜逰西園冠葢相追隨老杜詩秋覺追隨盡此引用言無復㳺従之侣巾帽猶堪語笑傾老杜詩羞将短髪還吹帽笑倩傍人為正冠此反而用之自言其尚未老也老杜集中李之芳詩數語攲紗帽勤苦讀書終不補未須牆角棄長檠神仙傳有年少與薊子訓鄰居為太學生諸貴人作計共呼生謂曰子勤苦讀書欲規富貴但召子訓來可不勞而得矣長檠見前注徳麟蓋王孫而有儒素風味云寄李學士格非格非字文叔眼看游舊半東都五嵗曾無一紙書晉書劉𢎞傳云得劉公一紙賢于十部従事老杜詩厚祿故人書㫁絶平日齊名多蚤達暮年同國未情疎老杜詩時來如宦達嵗晚莫情疎稍尋東刹論兹事東刹當在潁州前有東刹贈仁公詩兹事謂一大亊因縁賴有西方託後車託後車見前注李君當是西方社中人說與杜郎須著便不應濠上始知魚勸其早歸依佛祖也傳燈録雲門大師云觸目承當得猶是不著便東坡觀魚臺詩曰若信萬殊歸一理子今知我我知魚晉書王坦之傳謝安曰常謂君粗得鄙趣者猶未悟之濠上耶雪初雪已覆地老杜詩祇應蹋初雪又詩茅簷花覆地晚風仍積威漢書司馬遷書曰積威約之漸也木鳴端自語鳥起不成飛王介甫詩卧聴􅑆木鳴相挨樂府神弦歌道君曲曰中庭有樹自語梧桐推枝布葉孫子曰鳥起者伏也文選鴈詩曰亂起未成行寒巷聞驚犬鄰家有夜歸王維與裴迪書曰寒山野火明滅林外深巷寒犬吠聲如豹不無慙敗絮陶淵明與子儼等疏曰余嘗感仲孺賢妻之言敗絮自擁何慙兒子按後漢列女傳王霸字仲孺與同郡令狐子伯為友後子伯為楚相而其子為郡功曹令奉書于霸車馬服従雍容如也霸子方耕于野聞客至投耒而歸見令狐子沮怍不能仰視霸目之有愧容客去久臥不起霸妻曰君少修清節奈何忘宿心而慙兒女子乎未易泣牛衣言不為兒女悲也漢書王章傳疾病無被臥牛衣中與妻決涕泣晚出應俗敢辭疾衝風寜小驅范氏後漢書王充等傳論曰應俗適事難以常條退之詩不衝風雨即衝埃聊為一日役不憚百金軀鮑照行路難曰非我昔時千金軀雪路無行迹汝南先賢傳曰時大雪洛陽令至袁安門無行路又逸史載皇甫湜嘗因積雪門無行迹冰枝有落烏樂天烏夜啼曰霜滑有風枝寒門閉蕭瑟窮里聴嚱吁寒門亦用袁安事漢書趙廣漢傳長安少年㑹窮里空舍寄晁載之兄弟人言婚宦情欲本后山自注古語曰人不婚宦情欲失半我始求脫君已半按列子云語有之曰人不婚宦情欲失半人不衣食君臣道息孰知一世如一夢在夢而覺寜待旦退之祭文曰人之生世如夢一覺寒簷涷雨作秋聲涷音東暴雨也楚辭九歌曰使涷雨兮灑塵老杜詩南風作秋聲冷屋風燈挑不明老杜詩風燈照夜欲三更樽前已作十年語後㑹未期吾屢驚孟浩然詩平生復能幾一别十餘春一聞七字心已識鉤章棘句天與力退之記夢詩云壯非少者哦七言六字常語一字難又孟郊墓誌云其為詩鉤章棘句掐擢胃腎老杜詩溟漲與筆力念子方壮我已衰不見參天二千尺老杜古柏行黛色㕘天二千尺季也亦有詩百篇叔子擬度驊騮前曾慥詩選云晁仲之字叔用少受知于陳無己無己贈其兄詩云駸駸擬度驊騮前謂叔用也按善本駸駸作叔子當是叔與季兼指兩人但未知叔用為叔為季而曾氏誤以為一人遂改作駸駸非是南史王僧䖍曰弟書如騎騾駸駸常欲度驊騮前鍾嶸詩品亦曰征虜卓卓殆欲度驊騮前端能過我三冬學漢書東方朔曰學三冬文史足用可復參儂一味禪勸其廣學也廣語有僧辭歸宗云諸方學五味禪去宗云我這裏有一味禪為甚不學僧云如何是一味禪宗便打寄答王直方人情校往復屢勉終不近晉嵇康絶交書曰不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉强則不能久東坡亦云人情重往返不報生禍根新詩已經年知子不我怨退之詩元日新詩已去年生世餘幾何尺箠日取寸荘子曰一尺之箠日取其半萬世不竭懐禄有遐心漢書楊惲傳曰懐禄貪勢不能自退詩云母金玉爾音而有遐心従俗無逺韻楚辭曰将従俗富貴以偷生乎按曲禮曰禮従宜使従俗晉書庾凱雅有逺韻時従府中歸數過林下飯漢書鮑宣傳曰俱過宣一飯去後漢書第五倫傳光武曰聞卿為吏不過従兄飯老杜詩僧飯屢過門雲溪友議僧靈澈詩曰林下何曾見一人平生功名意回作香火願北史陸法和曰但従空王佛所與主上有香火因縁三年不舉觴吻頻烟火焮左傳曰鄭火司馬司寇列居火道行火所焮注炙也豈無兩蒼龍霑我一雨潤蒼龍謂團茶法華經言雖一地所生一雨所潤而諸草木各有差别官麄詩未工猛乞無小靳官麄見前注後漢崔烈入錢為司徒及拜帝曰悔不小靳人生如此耳文字已其閏退之詩人生但如此朱紫安足僭閏謂餘事也下句蓋足此意是身雖臭腐維摩經曰是身不淨穢惡充滿荘子曰神竒化為臭腐寜作青紫楦朝野僉載唐楊炯嘗呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳無徳而朱紫何以異是永懐忘年友死矣餘令聞后山自注云忘年友邢居實也南史江總傳張纘等呼為忘年友詩云令聞令望邢居實死于元祐二三年間年二十七念子頗似之老我何所恨筆談曰歐公詩老我倦鞌馬誰能事吟哦王介甫詩老我孤主恩結草以為期此文章佳語也寄侍讀蘇尚書六月西湖早得秋二年歸思與遲留老杜詩陂塘五月秋選詩遲留法豈輕一時賓客餘枚叟枚叟謂枚乘后山取以自比也謝惠連雪賦曰梁王不悦逰于園乃置旨酒命賓友召鄒生延枚叟老杜詩空餘枚叟在應念早升堂在處兒童説細侯此句屬蘇公後漢郭伋字細侯為并州牧素結恩徳及後行部有兒童數百各騎竹馬道次迎拜經國向來須老手晉書石苞傳景帝曰苞有經國才猷東坡詩老手便劇郡有懐何必到壺頭後漢馬援擊交趾軍至浪泊上與賊戰破之従容謂官屬曰吾従弟少㳺嘗哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣重蒸仰視飛鳶跕跕墮水中臥念少㳺平生時語何可得也其後年六十二自請征五溪進營壺頭暑甚中病卒遥知丹地開黄巻謂蘇公在經筵也北史周紀曰椒房丹地有衆如雲老杜詩閣道通丹地按漢書梅福傳注曰以丹掩泥塗殿上地晉書禇陶曰聖賢備在黄巻中解記清波沒白鷗此篇又勸蘇公高退蘇公在潁和子由詩有明年兼與士龍去萬頃滄波沒兩鷗之句寄亳州林待制希湖海相望闕寄聲雲林過雨未全晴劉禹錫竹枝詞曰東邊日出西邊雨道是無晴卻有晴后山反其意而用之言聲問闕然近于寡情也文選枚乗七發曰㳺涉乎雲林杜牧之詩自古雲林逺市朝青衫作吏非前日晉書嵇康曰聞道士遺言餌术黄精令人久夀意甚信之㳺山澤觀魚鳥心甚樂之一行作吏此事便廢白首論文笑後生言見笑于後生也老杜詩晚将末契託年少當面論心背面笑又云不覺前賢畏後生似聴兒童迎五馬古樂府陌上桑曰使君従南來五馬立踟蹰此五馬本事所出也後人臆說妄矣兒童用後漢郭伋事稍修書札問專城書札見前注陌上桑又曰四十專城居一聞苦李䝉荘句史記老子楚苦縣人荘子䝉人按亳州衛真縣本苦縣城東有賴鄉祠老子所生之地亳州雖有䝉城縣然荘子為䝉漆園吏當在今曹之宛朐云不復人間世後名晉書張翰傳曰使我有身後名不如即時一杯酒臥疾絶句老裏何堪病再來愁邊不復酒相開老杜詩愁邊有江水又云何以開我愁一生也作千年調此句未分其遂死也寒山子詩云人是黒頭蟲剛作千年調鑄鐵作門限鬼見拍手笑兩腳猶須萬里回老杜詩兩腳但如舊開天傳信記萬回師之兄戍安西萬回覲之朝往夕返以其萬里而回故謂之萬回也南軒絶句少日書林頗著勲揚雄長楊賦曰并苞書林退之復志賦朝馳騖乎書林魯直詩四㑹有黄令學古著勲多按曹子建書曰豈徒以翰墨為勲績哉風俗通曰蓋嚴楊惲勲著王室蜀志杜微傳曰著勲于竹帛暮年貪佛替論文老杜詩老夫貪佛日又詩故著浮查替入舟王介甫詩乞得膠膠擾擾身江湖波浪替埃塵銅鑪瓦枕芒鞋裏此外惟須對此君老杜詩多病所須惟藥物微軀此外更何求晉書王徽之指竹曰何可一日無此君獨坐文章平日事風竹暮年須老杜詩文章千古事又詩嗜酒愛風竹衰疾懸知此老杜詩時應念衰疾懸謂遥度也退之詩後日懸知漸鹵莽霜毛不更除退之詩斗覺霜毛一半加玉臺新詠寳月詩曰情人為君除白髮老杜詩紅顔愁落盡白髪不能除一丘吾欲往一丘見前注百畆有如無言不足為養也魯論曰有若無荀子曰有之不如無之魑魅須逰子老杜懐李白詩曰魑魅喜人過乾坤著腐儒老杜江漢詩乾坤一腐儒叩門聞啄木退之詩丁丁叩門疑啄木喚酒有提壺歐公詩獨有花上提葫蘆勸公沽酒花前傾蓋鳥名也門逕無行迹秋來不遣鋤逸史皇甫湜嘗因積雪門無行迹三輔決録張仲蔚所居蓬蒿沒人老杜詩草茅無徑欲教鋤此反而用之寄送定州蘇尚書元祐八年九月蘇公知定州于時宣仁聖烈太后上昇時事漸變故此詩意勸公省事髙退初聞簡策侍前旒簡策謂作侍讀時淮南子曰王者冕而前旒所以蔽明又見衣冠送作州世說羅友答桓温曰旦出門逢一鬼大揶揄云我祇見汝送人作郡何以不見人送汝作郡北府時清惟可飲晉書郗愔在北府徐州人勁悍桓温云京口酒可飲兵可用深不欲愔居之此借用以言定武在河北也齊書謝朏為呉興與弟瀹于征虜亭别指瀹口曰此中惟宜飲酒老杜詩時清猶茹芝西山氣爽更宜秋晉書王徽之為桓沖騎兵參軍沖曰卿在府日久比當相料理徽之不答直高視以手版拄頰云西山朝來致有爽氣耳此借用以言太行李商隠詩故鄉雲水地歸夢不宜秋功名不朽聊通袖海道無違具一舟此兩句皆拈出東坡語以勸之意謂功成名遂自足不朽政可縮手袖間而遂湖海之本志也東坡沁園春詞用舍有時行藏在我袖手何妨閒處看八聲甘州詞有云約他年東還海道願謝公雅志莫相違按晉書謝安雖受朝寄東山之志始末不變及鎮新城造汎海之裝欲須經略麤定自江道還東遂遇疾篤自以本志不遂深自慨失老杜詩平生江海心宿昔具扁舟枉讀平生三萬巻貂蟬當復自兜牟退之詩鄴侯家多書插架三萬軸南史周盤龍為散騎常侍齊武帝戲之曰貂蟬何如兜牟對曰貂蟬出于兜牟寄答李方叔豸平生經世策寄食不資身言其謀策可以經綸當世而反不能資一身也荘子曰其不可經于世亦逺矣漢書韓信傳寄食于漂母無資身之策孰使文章著老杜云名豈文章著能辭轍跡頻意謂有文如此安能免棲棲旅人哉退之進學解云孟軻好辯孔道以明轍環天下卒老于行左傳曰周行天下将皆必有車轍馬跡焉帝城分不入漢書陳咸傳咸滯于郡守時王音輔政信用陳湯咸數賂遺湯予書曰即䝉子公力得入帝城死不恨分謂隔絶也老杜詩闕廷分未到舟楫有光輝書札詗何人此句蓋終上意漢書淮南王安傳曰為中詗長安詗偵伺也子未知吾懶吾寜覺子貧此反濠上知魚之意而用之文選嵇康書曰人之相知貴識其天性老杜詩近有峨眉客知予懶是真智寳院後樓懷胡元茂前有胡士彦輓詞即元茂也晚渡呼舟疾杜牧之杜秋詩云卻喚呉江渡寒城著霧深老杜野望詩孤城隠霧深昬鵶明鳥道老杜雨詩云白鳥去邊明南中八志云交趾郡治龍編縣自興古鳥道四百里風葉亂霜林李商隠詩風葉共成喧久客登樓目文選王粲登樓賦曰情眷眷而懐歸兮孰憂思之可任平原逺而目極兮蔽荆山之高岑老杜詩天畔登樓眼中年懐舊心晉書王羲之傳謝安曰中年以來傷于哀樂與親友别輒作數日惡文選向秀思舊賦序云經嵇康舊廬鄰人有吹笛者發聲寥亮追思曩昔逰宴之好感音而歎故作賦云猶須一長笛領覽自霑襟終上句未盡之意謂本自悲愴尚何須聞笛耶老杜詩不須吹急管衰老易悲傷元日老境難為節寒梢未得春曲禮六十曰耆指使疏引賀瑒云耆至也至老之境也又曰六十至老境而未全老老杜詩為冬不亦難杜牧之詩丁香閒結春梢一官兼利害百慮孰疎親老杜詩時危闗百慮按易繫辭曰一致而百慮老子曰名與身孰親積雪無歸路扶行有醉人望鄉仍受嵗回首望松筠謝𤣥暉詩有情知望鄉老杜詩望鄉應未已李嘉祐詩白頭空受嵗丹陛不朝天松筠猶松楸意謂丘墓也老杜詩窮秋正摇落回首望松筠此借用放懐施食烏鳶喜金光明經云施食之縁獲長夀報長安志云興善寺素和尚齋時烏鵲就掌中取食老杜詩得食階除鳥雀馴持經鳥䑕聴戒殺文載郭氏新說曰柘臯永寜之雀立化于松枝東城郭氏之䑕坐化于蓮葉豈非乘誦經功徳自有所解悟而然歟杖藜矜矍鑠後漢馬援自請擊五溪蠻夷帝愍其老援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也顧影怪伶俜魏志何晏行步顧影文選潘岳寡婦賦曰少伶俜而偏孤注單孑貌門靜行隨月牕虚臥見星擁衾眠未穩艱阻飽曾經老杜詩平生耽勝事吁駭始曾經絶句此生精力盡于詩末嵗心存力已疲淮南子曰宋景公時造弓人九年乃成而進之弓人歸家三日而卒蓋匠者心力盡于此弓矣故温公通鑑序云臣之精力盡于此書不共盧王爭出手盧王謂盧照隣王勃東坡詩云詩句對君難出手卻思陶謝與同時陶謝謂淵明靈運老杜詩焉得思如陶謝手令渠述作與同逰又曰揚馬宜同時送伯兄赴吏部改官先子初增秩年侵鬢已皤漢書循吏傳序增秩賜金念兄今善繼此别喜如何以其善繼先子之志故以别為喜也親老家仍困門衰仕未多家語子路曰家貧親老不擇禄而仕晉書李宻表云門衰祚薄猶須教兒子早要中文科寄張文潛舍人今代張平子後漢書張衡字平子善屬文雄深次子長劉禹錫序栁子厚集曰韓退之評其文雄深雅健似司馬子長名高三俊上翰林志曰李紳李徳裕元稹同在禁署時號三俊此借用以指蘇公客黄秦晁也官立右螭傍唐書張次宗傳文宗詔左右史立螭頭下記宰相奏對按實録文潛元祐八年冬自著作佐郎除起居舍人即右史也紹聖元年四月以直龍圖閣知潤州此詩蓋春時所作車笠吾何恨北户録載風土記越人結交盟曰卿乘車我戴笠後日相逢下車揖我步行卿乘馬後日相逢卿當下飛騰子莫量老杜贈高適詩飛騰無那故人何時平身早達未用夢凝香后山自注曰來書云補郡之樂發于夢寐晉書張載曰時平則才伏世亂則竒用退之詩太平時節身難遇此反其意而用之韋應物刺蘇州有詩曰兵衛森畫㦸燕寝凝清香後湖晚坐水淨偏明眼老杜詩水淨樓隂直又云吾與汝曹俱眼明城荒可當山樂天詩亭脊太高君莫拆東家留取當西山青林無限意白鳥有餘閒身致江湖上王介甫與執政書曰及今愈思自致江湖之上又有詩曰委質山林如許國后山謂身致亦介甫委質之意名成伯季間伯季似指二蘇門下諸君后山嘗作佛指記曰予以文義名次四君蓋謂此也魏文帝典論曰傅毅之于班固伯仲之間耳晉書王湛傳王濟對武帝曰臣叔殊不癡山濤以下魏舒以上湛曰欲處我于季孟之間乎目隨歸鴈盡嵇康詩曰手揮五弦目送歸鴻坐待暮鵶還老杜詩有待至昬鵶春興東風作惡不成寒野水穿沙自作灘王介甫詩睡過東風作惡時細草無端留客臥文選丘希範詩細草藉龍騎老杜詩邂逅無端出餞遲鄭谷曲江春草詩云香輪莫碾青青破留與逰人一醉眠繁枝有意待人看退之詩春風也是多才思故揀繁枝折贈君又云榴花不發待郎歸老杜詩寒江流甚細有意待人歸次韻回山人贈沈東老二首前篇屬囘山人後篇屬沈東老一杯領意不須沽老杜詩領客珍重意六字持身已有餘導引有六字氣謂嘻吁呬嘘呵呼也黄庭經曰至道不煩司馬相如過宜春宫賦曰持身不謹按列子曰子知持後則可言持身矣癡子未知天上樂法華經曰癡子捨我五十餘年庫藏諸物當如之何神仙傳彭祖問石生曰何不服藥仙去對曰天上多有至尊相奉甚難更苦人耳李商隠作李賀小傳曰賀将死有緋衣人持一板書召賀曰帝成白玉樓立召為記天上差樂不苦也先生今解世間書退之石鼎聨句詩序曰彌明謂劉師服曰吾不解世俗書子為書吾句隨世功名非所望稱家豐儉不求餘老杜詩稱家隨豐儉按禮記檀弓曰稱家之有無後漢馬援傳曰士生一世但求衣食裁足致求盈餘但自苦耳青衫出指論竒字漢書揚雄賛劉棻嘗従雄學作竒字白髪挑燈寫細書言其高年而眼能明也退之短檠歌曰夜書細字綴語言送孝忠二首當是其兄傳道之子老眼元多淚春風見此行又為貧賤别老眼固自多淚況重以離别之感耶貧賤别見前注更覺急難情常棣詩脊令在原兄弟急難斗食吾堪老漢書百官表百石以下有斗食佐史之秩注云斗食月奉十一斛一說日食一斗二升詞場爾向榮老杜詩詞埸繼國風陶淵明歸去來辭木欣欣以向榮此借用未須憐野鶩法書苑曰庾翼善草隸少與王羲之齊名弟子皆效之羲之後進内外宗尚翼甚不平在荆州與都下人書云兒輩乃輕家雞愛野鶩皆學逸少東坡詩野鶩家雞定誰美家法付宣城齊書謝朓為宣城太守善詩家法謂靈運惠連皆朓之族父以詩知名後漢儒林傳序各以家法教授經史三年學揚子曰古之學者三年通一經聰明一旦開揚子曰天降生民倥侗顓䝉恣于情性聰明不開老杜詩大兒聰明到能添老樹巔崖裏小兒心孔開貌得山僧及童子把文甘潦倒老杜詩把文驚小陸此用小陸以比孝忠也晉嵇康與山濤書曰足下素知吾潦倒麄疎不切事情此借用以自況也數日待歸來左傳曰行則數日而反退之詩屈指數日憐嬰孫數字作上聲讀士患聲名早東坡和仲子迨詩曰養氣勿吟哦聲名忌太早官今嵗月催自言老于微官也有親須薄祿臨路尚徘徊言惜别眷眷之意以親養故不能與之俱去也鮑照放歌行曰今君有何疾臨路獨遲迴以拄杖供仁山主二首錯節孤根勁有餘坐牀須按起須扶後漢虞詡傳不逢盤根錯節何以知利器選詩石梁有餘勁一生用底令相贈更問林間有此無趙州臨遷化以拂子送與王鎔曰此是老僧一生用不盡厎事見趙州語録洗足投笻只坐禪厭尋岐路費行纒金剛經云洗足已敷坐而坐東坡詩已辦布襪費行纒老來不復人間事不用山公更削圓桂苑叢談曰潤州甘露寺有僧道行孤高李徳裕廉問日以方竹杖一贈焉方竹出大宛國堅實而方正節根鬚牙四面對出及再鎮浙右其僧尚存問曰前所奉竹杖無恙否僧喜對曰已規圓而漆之矣公嗟惋彌日前輩詩曰削圓方竹杖漆卻斷紋琴項城道中寄劉令使修溪橋項城屬陳州老怯危橋泥沒膝老杜詩虚疑皓首衝泥怯盧仝放魚歌曰天雨曼陁羅花深泥沒膝喜聞吾黨政如春謝承後漢書李燮拜京兆民謡曰我府君道教舉恩如春威如虎須君不惜千金費孫子曰興師十萬日費千金文選古詩曰愚者愛惜費但為後世嗤此後寜無我輩人言必有好事者繼之晉書石苞傳許允曰卿是我輩人碓磨寨唐書黄巢圍陳州人大飢倚死牆塹賊俘以食日數十人乃列百巨碓糜皮骨于臼并啖之以人為食殺為戲自昔無聞爾所先信有忘身一言盡獨能遺臭萬人傳東坡富公碑銘曰以殺為嬉漢書伍被傳呉王曰男子之所死者一言耳劉原甫説云此言所死雖不同等是死耳晉書桓温傳温曰既不能流芳後世不足復遺臭萬載耶老杜詩将詩不必萬人傳寄張宣州耒與世情將盡懐仁老未忘書云懐于有仁此借用言獨于仁賢未能忘情故人今五馬見前注高處謾三長唐書孟郊傳李觀論其詩曰高處在古無上平處下顧二謝又劉子𤣥言作史有三長謂才學識詩豈江山助言宣州詩本天成不用借助唐書張説傳説謫岳州而詩亦悽惋人謂江山助云名成沈鮑行老杜詩沈鮑得同行謂沈約鮑照肯為文俗事後漢陳忠上疏曰諸郎多文俗事又隗囂傳論曰徒以文俗自喜打鴨起鴛鴦此用宣州故事魏泰詩話吕士隆知宣州好笞官妓官妓皆欲逃去㑹杭州一妓到士隆喜之留不使去一日郡妓復犯小過士隆欲笞之妓訴曰某不敢辭罪但妓不能安也士隆愍而捨之梅聖俞作莫打鴨篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池西落不比孤洲老秃鶬禿鶬尚欲逺飛去又況鴛鴦羽翼長杜牧之詩驚夢起鴛鴦然此詩意不特為妓女發送倫化主赤髭白足可憐生高僧傳佛陁耶舍為人赤髭善解毗婆沙時人號曰赤髭毗耶沙又云釋曇始足白于面雖跣涉泥水未嘗沾濕天下咸稱白足和尚劉禹錫送僧序曰備將迎者皆赤髭白足之侣傳燈録國忠師曰幸自可憐生須要个䕶身符子作麽躡蹻擔囊壯此行史記虞卿傳躡蹻擔囊要致雪峰千五百傳燈録雪峰義存禪師學者冬夏不減千五百人不妨兼識謝宣城以比張宣州也齊書謝朓為宣城郡太守杜詩云詩接謝宣城西湖小徑才容足列子曰泰豆乃立木為塗僅可容足張湛注云纔得安腳寒花知自香老杜詩寒花只暫香官池下鳧鴈老杜有官池春鴈詩漢昭帝紀黄鵠下建章宫太液池中文選劉公幹詩曰方塘含白水中有鳧與鴈荒塜上牛羊古樂府曰今日牛羊上丘壠有子吾甘老東坡詩有子萬事足老杜詩吾老甘貧病無家去未量老杜詩無家問消息作客信乾坤三年哦五字草木借輝光老杜詩擁别借輝光别月華嚴寓世生同里隨方去有情漢書盧綰傳與高祖同里生后山借用其意來為百年别不惜片時程老杜詩繫帆何惜片時程齋鉢須勤供經鐘莫倦鳴勸其接物利生也當來第三㑹此界卻逢迎釋氏書彌勒當來下生于龍華樹下三㑹說法度人三水小牘云東都僧従練臨終呼門人戒曰人生難得惡道易淪惟有歸命釋尊勵精梵行龍華㑹上當復相逢戰國策曰燕太子逢迎卻行送呉先生謁惠州蘇副使呉先生當是呉逺㳺蘇公嘗有書與之聞名欣識面言呉君欲識東坡也老杜詩李邕求識面傳燈録夾山惟儼傳李翺曰見面不如聞名此反而用之異好有同功呉君方外之士與后山異趣而好賢之意則同故云同功記曰與仁同功其仁未可知也此用其字我亦慙吾子后山不能往見蘇公此所以有愧于呉君也人誰恕此公老杜寄李太白詩世人皆欲殺吾意獨憐才東坡詩平生我亦輕餘子晚嵗誰人念此公百年雙白鬢時東坡年五十九老杜詩百年雙白鬢一别五秋螢萬里一秋風言神交心契與風無間也老杜詩瞿塘峽口曲江頭萬里風煙接素秋蓋亦此意按通鑑秦使閻負謂張瓘曰晉王與君鄰藩雖山河阻絶風通道㑹為說任安在依然一秃翁漢書霍去病傳衛青日衰而去病日益貴故人門下多去事去病輒得官爵惟獨任安不肯去又灌夫傳與長孺共一秃翁注言無官位版綬也末句后山自謂不負蘇公之門時亦坐黨事廢錮故云秃翁别圓澄禪師法施老人臥不出呼我取别行問疾十二國史曰魯宓子賤為單父宰行過楊晝取别維摩經云汝行詣維摩詰問疾磨盤拭筯勸一飽少待須臾莫倉卒磨盤拭筯蓋俗間語老杜詩低頭拭小盤維摩經香積品云若欲食者且待須臾當令汝得未曾有食老杜詩忍待明年莫倉卒早年著眼覷文字退之詩不如覷文字丹鉛事㸃勘萬巻初無一言契傳燈録香巖依潙山祐和尚和尚曰汝未出胞胎時本分事道将一句來師徧檢所集諸方語句無一言可將醻對又五洩山靈黙禪師謁石頭和尚先自約曰若一言相契我即住不然便去多生綺語未經懴樂天香山寺白氏洛中集記曰願以今生世俗文字之業狂言綺語之過轉為将來世世讃佛乘之因轉法輪之縁按釋氏書綺語蓋口中四業之一謂綺飾文詞過有増華也半世虚名足為累退之詩士生為名累此去他來尚有縁頭童齒豁恐無年退之進學解頭童齒豁竟死何裨世說王珣歎曰人固不可以無年慇懃三請久住世法華經曰世尊告舍利弗汝已慇懃三請豈得不説華嚴經普賢行願品曰七者請佛住世弊惡可念未可捐華嚴經十迴向品曰菩薩不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不修迴向平生準擬西行計老著人間此何意西行謂願生極樂國高僧傳慧持謂慧逺曰若滯情愛聚者本不應出家今既割欲求道正以西方為期耳他年佛㑹見頭陁知是當年老居士傳燈録傅大士傳曰有天竺僧嵩頭陁謂曰我與汝毗婆尸佛所發誓今兜率宫衣鉢現在因命臨水觀其影見大士圓光寳葢此詩以嵩頭陁比圓澄以傅大士自況别觀音山主離合應生理文選陸士衡詩離合非有常譬彼弦與括老杜詩人生有離合豈擇衰老端文選袁宏三國名臣序贊曰生理不可不全李善注引鷦鷯賦曰生生之理足矣此借用言人生之常理過逢豈近縁老杜詩數為姻婭過逢地情親見今日語妙記當年情親語妙並見前注閉户安禪主衝風逆水船兩句言行藏勞逸各異也法華經偈曰安禪合掌老杜詩瀟洒共安禪又詩春多逆水風不應清夜月故作别時圓老杜宿贊公房詩云相逢成夜宿隴月向人圓而東坡水調詞云不應有恨何事長向别時圓離潁河市千人聚長安萬年縣有千人聚闗中記曰宣帝以倡優雜伎千人樂思后園今所謂千人鄉者是也此詩借用寒江百丈牽老杜詩寒江動夜扉又詩百丈牽江色吾生能幾日此地費三年後周蕭撝勞歌曰百年能幾許公事罷平生老杜詩為客費多年東坡詩人生不滿百一别費三年叢竹防供爨池魚已割鮮當是東坡去潁後代者韓川變其舊政向也徙魚今乃割鮮行将及竹矣后山所歎意蓋不止此也東坡有罷學士劄子曰及䝉擢為學士便為韓川等攻擊不已以至羅織語言謂之誹謗西都賦曰割鮮野食拙勤終不補他日愧無傳樂天詩救煩莫如靜補拙莫如勤孟子曰是以後世無傳焉湖上湖上難為别梅梢已著春林喧鳥啄啄退之詩剥剥啄啄有客至門風過水鱗鱗樂天詩小橋装鴈齒輕浪甃魚鱗楚辭曰魚鱗鱗兮媵予緣有三年盡釋氏云諸法従縁生縁離法即滅情無一日親言情之相親生于久也此浮屠所以不三宿桑下白頭厭奔走何地與為鄰莊子曰吾誰與為鄰舟中二首惡風横江江巻浪黄流湍猛風用壯退之感二鳥賦云窺黄流之奔猛老杜詩初聞龍用壯字本出易大壮卦疾如萬騎千里來歐公秋聲賦曰又如赴敵之兵銜枚疾走不聞號令但聞人馬之行聲氣壓三江五湖上東坡詩氣壓鄴侯三萬籖周禮曰其川三江其浸五湖岸上空荒火夜明舟中坐起待殘更老杜詩空荒咆熊羆又詩江船火獨明此借用以言燐火少年行路今頭白不盡還家去國情言行藏進退皆有所迫非其本志也野火燒原雉昬雊退之詩原頭火燒靜兀兀野雉畏鷹出復沒詩云雉之朝雊黄塵漲天牛亂鬬蜀都賦曰黄塵漲天江間無日不風波老去何時脱奔走老杜詩江間雖炎瘴又云舟中無日不沙塵詩書滿腹不及口後漢書趙壹詩云文籍雖滿腹不如一囊錢東坡詩平生五千巻一字不救飢遮日寜須釣竿手言雖入帝城無益也杜牧之詩惆悵江湖釣竿手卻遮西日向長安愧爾茅簷炙背人高適詩愧爾東西南北人嵇康書曰野人有快炙背而美芹子者欲獻之至尊歐公玉堂集序云曝茅簷之朝日仰目青天搔白首言其縦適也老杜詩舉觴白眼望青天又詩出門搔白首規禪停雲齋淨居衆天人宫殿隨所適欲界十天色界十八天無色界四天共三十二天初禪二禪三禪各三天四禪九天凡一十八天皆屬色界而三禪有三天一淨居天二無淨居天三徧淨居天此天無想無證思食則食至想衣則衣來宫殿隨身如意而有事見正法念處經等蓋皆持戒作福者生于此天因以比規禪也法華經亦曰爾時五百萬億國土諸梵天王與宫殿俱少仕老不歸重門閉榛棘自歎其無淨居之福縁也道人秀叢林大論云譬如大樹叢聚是名為林二樹不名為林如一一比丘不名僧僧聚處得名叢林妙語出禪寂老杜詩身猶縛禪寂是身如浮雲隨處同建立維摩經是身如浮雲須臾變滅故老杜别贊上人云是身如浮雲安可限南北華嚴經曰譬如三千大千世界建立一切處所平生與二子嗜好用一律二子必皆詩僧一律見前注我此復助緣語綺已多責語綺見前注何年一把茅據坐孤崒嵂呵佛罵祖師傳燈録徳山宣鑒禪師扺潙山潙曰是伊将來有把茅葢頭罵佛罵祖去在又龍潭曰可中有一箇漢他時向孤峯頂上立吾道在老杜詩好鳥啼岩扃高嶽前崒嵂塗糊千五百傳燈録三聖答雪峰云一千五百善知識話頭也不識古寺和尚曰淨地上不要㸃汙人家男女后山所謂塗糊蓋此意也后山詩注巻四
