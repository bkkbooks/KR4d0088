body:
  text: 后山詩注巻十二宋陳師道撰任淵注除官十一月除祕書省正字扶老趨嚴召徐行及聖時端能㡬字正漢書地理志曰幼者扶老而代其任明皇雜録劉晏以神童為祕書正字上問曰為正字正得㡬字對曰餘字皆正惟朋字未正敢恨十年遲樂天初除知制誥與三舎人中書同宿詩云莫怪不如君氣味此中來校十年遲肯著金根謬尚書故實曰韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字寧辭乳媪譏南史何承天除著作佐郎年已老而諸佐郎並名家年少荀伯子嘲之呼為嬭母此用其事金樓子曰梁人呼書巻為黄嬭言其怡神養性如乳媪也此借用其字向來憂畏斷不盡鹿門期老杜詩鹿門攜不遂又云空有鹿門期鹿門在襄陽杜鄉里也后山此句言雖免黨錮之憂而失其髙隠本趣題王平甫帖早聞英氣擅家聲晩得諸郎識老成漢書司馬遷云李陵既生降隤其家聲諸郎謂二子旊斿可恨治朝無此老卻嫌晚進不同生晉書謝混傳混為劉裕所誅宋受禪謝晦謂裕曰恨不得謝益夀奉璽紱裕曰吾亦恨之使後生不得見其風流足知落筆千言疾謂作文老杜詩集賢學士如堵牆觀我落筆中書堂按曾子固祭平甫文云操紙為文落筆千字尚想揮毫一坐傾謂作字老杜詩張旭三盃草聖傳揮毫落紙如雲烟未信哲人窮五字謂詩不能窮人檀弓曰哲人其萎乎二難還復以詩鳴世説陳太丘論其二子曰元方難為兄季方難為弟退之送孟東野序曰東野始以其詩鳴和李文叔退朝朝流駭汗蒸雙猊退之聖徳詩曰駭汗如雨此借用淮南子曰山雲蒸柱礎潤東坡答西掖諸公詩曰雙猊蟠礎龍纒棟風捲屯雲散萬蹄陸機詩胡馬如雲屯此借用以言朝士之歸任使輕衫汚嬌色可令纖手洗春泥東坡詩分無纖手裁春勝王介甫詩春泥滿眼路嶇嶔和謝公定雨行逢賣花逢花駐馬尚多情天不違人旋作晴開元天寳遺事曰長安俠少每至春時飾矮馬于花下往來遇好花則駐馬而飲王仲宣詩人欲天不違何懼不合并不使近詩增紙價得知春入鳯凰城郭受與老杜詩春興不知凡㡬首洛陽紙價頓能髙劉禹錫詩南山宿雨晴春入鳯凰城酬王立之二首王直方字立之名姓頗見于魯直集中魯直嘗有寄立之問梅花詩頓有亭前玉色梅情知不肯破寒開謝無逸溪堂集有題王立之頓有亭詩曰蘇黄兩玉人落筆傳九州按南史謝晦傳時謝混風流為江左第一宋武帝曰一時頓有兩玉人耳王立之家有蘇東坡黄豫章元祐中所題字因取宋武帝語以名亭云似憐憔悴兩公客獨倚東風遣信來兩公謂蘇黄也后山蓋蘇黄之客魏志曰馬超遣信請和又世説林公詣謝東陽朗時新病起體未堪勞母王夫人在壁後遣信令還重梅雙杏巧相將不為遊人只自芳家語曰蘭生深林不以無人而不芳應怪詩翁非老手相逢不作舊時香詩翁后山自謂老手謂蘇黄歐公詩老手尚能工翦裁范諷詩云惟有南山與君眼相逢不改舊時青送謝朝請赴蘇幕好合同黄巻詩云妻子好合此借用文選陸士衡贈曹文熊亦云疇昔之遊好合纒綿情親須白頭老杜詩童稚情親四十年須白頭謂不待白頭而情巳親胡然落丹墨不坐致公侯丹墨謂簿領北史蘇綽始制文案程式朱出墨入及計帳户籍之法退之詩苻師㺯刀筆丹墨交横揮此借用山合遮西顧一作沙輭留徐步魏本云丙藁塗上四字不注潮回趁急流平生湖海興日夜逐行舟老杜詩平生湖海心宿昔具扁舟和謝公定觀秘閣文與可枯木斯人不復有累世或可期每于丹青裏一見如平時壞障塵得入慘淡令人悲墨色落欲盡嚴顔終不移老杜詩慘淡壁飛動到今色未填又云畫色久欲盡蒼然猶出塵文選傅毅舞賦曰嚴顔和而怡懌世説桓公曰萬石撓弱常才有何嚴顔難犯朽老莫使年朽老見前注左傳曰絳縣老人有與疑年使之年石心烏銅皮晉書夏綂傳賈充曰此呉兒木人石心也念此猶少作未盡冰霰姿文選楊修答臨淄王牋云修家子雲老不曉事強著一書悔其少作北枝把異鵲老杜詩棲枝把翠梧莊子曰莊周遊乎雕陵之樊覩一異鵲意定了不疑言無繞樹未安之態東坡畫鴈詩野鶩見人時未起意先改君于何處看得此無人態惜哉不得語胸次㡬興衰用賈誼服不能言之意文選王仲宣詩惜哉空爾為其字本出史記宓不齊傳莊子曰喜怒哀樂不入于胸次一為要貴役可復辭畫師唐書閻立本傳閣外傳呼畫師閻立本羞悵汗流隠奥雖可惜塗抹復見遺言與可不為要貴所役聊自寄其意爾畫在祕閣世固不多見而亦免塗抹之汚文選七命曰吞響乎幽山之窮奥李善注曰奥隠處也盧仝示添丁曰忽來案上翻墨汁塗抹詩書如老鵶謝侯名家子感慨形苦詞庾信哀江南賦云不無危苦之詞豈惟語畫工勁特頗似之何當補諫列一吐胸中竒退之代張籍書曰何由致其身于其人之側一吐胸中之竒乎和饒節詠周昉畫李白真君不見浣花老翁醉騎驢熊兒捉轡驥子扶金華仙伯哦七字好事不復千金摹成都浣花溪老杜入蜀所居熊驥杜之二子也嘗有詩云熊兒幸無恙驥子最憐渠魯直有老杜浣花醉圖詩云浣花酒船散車騎野牆無主看桃李宗文捉轡宗武扶落日蹇驢䭾醉起后山謂魯直詩語巳自寫生不須捐金摹畫也金華見前注老杜詩云詩公乃仙伯青蓮居士亦其亞斗酒百篇天所借李太白答湖州迦葉司馬問白是何人詩曰青蓮居士謫仙人酒肆藏名三十春老杜詩李白一斗詩百篇乂詩天廐真龍此其亞英姿秀骨尚可似逸氣髙懷那得畫後漢二十八將論曰英姿茂績老杜八哀詩曰復見秀骨清逸氣見前注周郎韻勝筆有神畫㫁云周昉窮丹青之妙畫美人女子為古今冠絶張彦逺畫記云張懐素每云呉道𤣥之畫下筆有神解衣槃礴未必真莊子曰宋元君將畫圖衆史皆至䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舎公使人視之則解衣槃礴臝君曰可矣是真畫者也一朝寫此英妙質似悔只識如花人太白詩金屏笑坐如花人醉色欲盡玉色起分明尚帶金井水摭言曰太白在翰林應詔草白蓮花序及宫詞十首時方大醉中貴人以水沃之稍醒白于御前索筆一揮文不加㸃玉色見禮記玉藻老杜詩研寒金井水按荆州記益陽有金井烏紗白紵真天人不用更著山巖裏晉書顧愷之為謝鯤像在石岩裏云此子宜置丘壑中平生潦倒飽丘園禁省不識將軍尊袖手猶懷脱鞾氣豈是從來骨相屯文選東征賦曰禁省鞠于茂草唐書李白傳曰白嘗侍帝醉使髙力士脱鞾力士素恥之摘其詩以激楊貴妃帝欲官白妃輒沮止退之詩自歎虞翻骨相屯仰視雲空鴻鵠舉眼前紛紛那得顧用嵇康詩目送歸鴻之意韓詩外傳曰黄鵠一舉千里老杜詩紛紛輕薄何須數是非榮辱不到處正恐朝來有新句魯直浣花醉圖詩曰兒呼不蘇驢失腳猶恐朝來有新作勿言身後不要名尚得吳侯費百金身後名見前注晉書謝安傳曰餚饌亦屡費百金江西勝士與長吟饒節字徳操江西人後為僧名如璧法嗣潁州薦福寺晉書羊祜登峴山曰由來賢達勝士登此多矣後來不憂身陸沈莊子曰方且與世違而心不屑與之俱是陸沈者也是其市南宜僚耶注云人中隠者是無水而沈也謝王立之送花過雨生泥風作塵馬蹄聲裏度芳辰城南居士風流在時送名花與報春時送一作尤遣一作時遣老杜詩頭風吹過雨又詩百舌來何處重重只報春此借用李白詩名花傾國兩相歡和參寥明發覓鄰家花二首短牆春色過鄰家行不逢人只見花唐人王駕詩曰蛺蝶飛來過牆去應疑春色在鄰家下句用崔䕶事見前注新緑蔥蔥紅蔌蔌魯直詩黄鸝惟見緑蔥蔥元稹連昌宫詞曰風動落花紅蔌䔩卻成粧面映青紗太白烏夜啼曰機中織錦秦川女碧紗如烟隔窻語滿城桃李一番新深院繁枝别得春從此詩翁有新語不須紅濕少城闉老杜詩曉看紅濕處花重錦官城又云更歴少城闉和張奉議贈舅氏龐大夫朝下公門不曳裾晉書龔延之未曾至公門曳裾見前注身寛心逺等林居淵明詩心逺地自偏傳家聲烈三公後三公謂龐相國籍退之詩不見三公後貯腹平生萬巻餘北史崔㥄傳胸中貯千巻書老杜詩年少方開萬巻餘藤架倚春聽語鳥老杜詩露裛思藤架顧況悲歌云臨春風聴春鳥别時多見時少石池迎日數遊魚桞子厚石潭記曰潭中魚可百許頭皆若空游無所依日光下徹影布石上王介甫詩行數魚鯈賔共樂人言酷類牢之舅晉書何無忌傳桓𤣥曰何無忌劉牢之甥酷似其舅未有新詩錦不如老杜詩白髮絲難理新詩錦不如和舅氏公退言懷追陪強韻愧難過應接前聞覺未多南史王筠傳能用強韻前聞見前注老杜詩衰慙應接多盛禮每虚摩詰席唐書王維字摩詰名盛于開元間豪英貴人虛左以迎舊詞猶可雪兒歌北夢瑣言韓定辭詩云麗詞堪與雪兒歌馬彧問其事對曰雪兒李宻愛姬每賔朋文章有竒麗者付雪兒協律歌之手開新徑延徐步眼趁髙梧上碧蘿風雨入懷泥滿眼時須好語滌煩疴王介甫詩春泥滿眼路嶇嶔欽聖憲肅皇后挽詞二首神宗后向氏建中靖國元年正月崩三月加諡五月葬永裕陵二妃端協帝神宗在潁邸治平三年納后為妃魏收後魏書曰二妃嬪媯虞道克昌任姒配周周室用光二妃謂堯女娥皇女英也協帝借用舜典字三后共興周三后謂太姜太任太姒以比國朝慈聖曹后宣仁髙后及欽聖皆嘗臨朝有聖徳決䇿天同力收功語不流元符三年正月哲宗上僊太后夜半定䇿翼日召徽考自端邸入立廷臣皆不預焉蘇子由作宣仁諡冊文曰大䇿中定與天為謀羅隠詩曰時來天地皆同力語不流謂大臣帖服無敢流言如誣謗宣仁時也權宜從殺禮太后不敢當山陵之禮止稱山園詩序曰殺禮而多昬此借用老杜詩權宜借寇頻末命尚深憂書曰皇后憑玉几導揚末命深憂謂以天下為憂鬱鬱佳城閉終天配夀丘佳城見前注文選顔延年宋元后哀䇿文曰夷體夀原注漢景帝作夀陵云云此借用以指裕陵復辟先元約元符三年正月太后權同處分軍國事候祔廟禮畢還政至七月一日手書可不候祔廟止俟靈駕發引罷同聴㫁書曰朕復子明辟長年損積憂文選陸士衡歎逝賦曰嗟人生之短期孰長年之能執禮記文王世子注云文王以憂勤而損夀此借用傳曰積憂薰心春移柏城仗樂天陵園妾詩曰柏城盡日風蕭瑟仙去帝鄉遊莊子曰乘彼白雲至于帝鄉徳並塗莘敏退之王用誌銘曰蜀塗莘摯正妃之門謝承三夫人箴曰塗山翼夏有莘翼殷藎謂禹娶塗山氏女湯娶有莘氏女老杜詩學並盧王敏功臨馬鄧優後漢明徳馬后肅宗尊為太后常與帝旦夕言道政事和熹鄧后迎立殤帝太后臨朝又定策立安帝千秋修故事車馬戒如流後漢馬后紀太后詔曰前過濯龍門上見外家問起居者車如流水馬如游龍但絶嵗用以黙愧其心文選樂府曰車馬若川流欽慈皇后挽詞二首欽慈皇后陳氏徽宗之母元祐四年六月崩建中靖國元年正月追尊為皇太后三月諡曰欽慈五月陪𦵏永裕陵祔太廟神宗室奉安神御于景靈西宫坤元殿二祧從孝祀禮記注二祧謂文武廟也文武俱在應遷之例特為功徳而留此借用以比神宗五典載虞嬪堯典曰釐降二女于媯汭嬪于虞堯典即五典之一顯號追先志建中靖國元年正月欽聖太后崩遺詔追尊皇太妃陳氏為皇太后陰功見後人后蓋京兆人贈太保祁王懐徳之女懷徳沈勇有功于國後漢鄧后傳曰叔父隲言常聞活千人者子孫有封兄訓修石臼河嵗活數千人天道可信家必䝉福承顔親不待魯論色難注曰承順父母顔色為難韓詩外傳曽子曰子欲養而親不待罔極痛如新詩曰欲報之徳昊天罔極未有如椽筆光容可得陳晉書王珣夢人以大筆如椽與之云此當有大手筆事俄而孝武崩哀冊諡議皆珣所草靈岳占佳氣琳宫閟寳衣膺期符寳厯錫號煥皇扉靈岳謂嵩山事具徽宗御製西京崇福宫記大抵謂后被遇神宗有禱于嵩山崇福遂生徽宗乃詔洛師侈宫楹而大之真誥協昌期日登玉霄琳房皇扉謂堯母門日月堯同數后以元豐五年十月十日誕生徽宗皇帝漢書武帝鈎弋夫人傳任身十四月生昭帝上曰昔堯十四月而生命其門曰堯母門謳歌啟與歸事見孟子傷心五雲去不見六龍飛孝經援神契曰徳至山陵則景雲出景雲五色雲也老杜重經昭陵詩云再窺松柏路還見五雲飛六龍見易乾卦謂徽宗登極大行皇太后挽詞二首代人作欽聖太后徳名三后並曹后髙后并后為三皆有聖徳母道兩朝尊兩朝謂哲廟徽廟勇決髙千古危疑定一言謂定䇿之謀出于獨斷章惇異議竟不得行老杜詩勇決冠垂成文選王元長䇿秀才文曰餘烈千古先期還政事隆禮改山園並見前注哀挽西郊道雲愁晝亦昬西郊道謂往西京祔葬周以洛為東郊于宋朝則國西扶日行黄道扶日見前注晉志云黄道日之所行也魯直王文恭挽詩云賔日行黄道乘雲上紫微莊子曰乘彼白雲至于帝鄉晉志云紫微大帝之坐天子之常居也憂勞形末命末命見前注恭儉見陳衣周禮春官司服曰大喪廞衣服注廞陳也禮記喪大記曰凡陳衣者實之篋布徳開刑網禮記月令曰命相布徳和令漢書刑法志云禁網疎闊和戎戢武威左傳魏絳謂和戎有五利老杜詩丕承戢武威要知懷惠處行路涕交揮懐惠見魯論家語敬姜曰二三子無揮涕追尊皇太后挽詞二首代人作欽慈太后彤管書陰敎静女詩傳云古者后夫人必有女史彤管之法箋云彤管筆赤管也禮記曰后修女順母道也注云母者施陰敎于婦黄圖載徳容黄圖天子之圖籍如三輔黄圖是也周禮九嬪掌敎九御婦徳婦言婦容婦功漢宫先夢日漢書景帝王后傳武帝方在身時后夢日入其懷代邸近乘龍謂徽宗自端邸即位漢書薄姬傳髙祖召欲幸之對曰昨暮夢龍據妾胸上曰是貴徵也吾為汝成之遂生文帝初封代王文帝紀曰奉天子法駕迎代邸易乾卦曰時乘六龍以御天也喬嶽藏遺服謂嵩山崇福宫見前注青門啟故封后以元祐九年葬于開封縣多慶院之東至是改𦵏老杜詩哀挽青門去按三輔黄圖曰長安城東出南頭第一門曰霸城門或曰青門此借用退之大行皇后挽詞曰因山託故封從今祠百世東坡髙太后挽詩云原廟故應祠百世先王何止活千人清廟配商宗周頌注曰清廟者祭有清明者之徳之宫也商宗謂神宗商頌曰烈文祀中宗𤣥鳥祀髙宗典冊尊徽號欽慈煥徳名徽號字見禮記後人借用揚子曰君子徳名為㡬終身聞舜慕孟子曰大孝終身慕父母五十而慕者予于大舜見之歴月見堯生見前注世説外國貢竒香一著人則數月不歇兵衛嚴天仗車輿轉帝城故奩脂澤在哀感倍皇情後漢光烈陰后紀明帝夢先帝太后如平生歡明旦上探視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視王察院挽詞二首監察御史王回也施報終何在窮通共一空史記伯夷傳曰天之報施善人其何如哉兩言成益友左傳鄭子太叔卒晉趙簡子哭甚哀曰黄父之㑹夫子語我九言云云此用其意管輅别傳曰諸葛樂與輅别戒以二事言卿性樂酒雖温克然不可保寧當節之卿有水鏡之才所見者妙禍如膏火不可不慎此借用其事史記平原君傳毛遂曰從之利害兩言而決魯論曰益者三友百代仰髙風孟子曰百世之下聞者莫不興起文選陸機漢功臣贊曰悠悠遐風千載是仰夏侯湛東方朔畫贊曰想先生之髙風終始無遺恨老杜詩毫髮無遺恨恩榮託至公建中靖國元年正月王覿曽肇等奏故監察御史王回學術深醇氣守剛毅臺官言回交結鄒浩遂除名勒停送本鄉居住陛下嗣位命為監察御史方始供職得病而亡不得攄發素藴以報陛下眷遇之恩云云詔補一子太廟齋郎老杜詩恩榮同拜手不應埋直氣曽見吐長虹曹子建七啟曰慷慨則氣成虹蜺良貴官何與孟子曰人之所貴者非良貴也趙孟之所貴趙孟能賤之長年死不亡老子曰死而不亡曰夀身須禦魑魅左傳投之四裔以禦魑魅老杜詩從來禦魑魅多為才名誤氣已攝豺狼後漢張綱傳豺狼當道安問狐狸不盡胸中藴猶堪地下郎地下郎見前注豈惟吾道慶編簡亦輝光編簡謂史䇿贈吳氏兄弟三首一長未可衆人師桞子厚答韋中立書曰假令有取為衆人師且不敢況敢為吾子師乎萬馬元隨八馬蹄列子曰周穆王肆意逺遊命駕八駿之乗升崑崙之丘賔子西王母老杜詩崑崙虞泉八馬蹄不解征西諸子弟卻憐野鶩厭家雞南史王僧䖍傳庾征西翼書少時與王右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒輩賤家雞皆學逸少書野鶩見前注才隨年盡不重竒每愧諸郎索近詩旋作七言供一笑自癡那得使人癡才盡見前注歐公詩云詩篇自覺隨年老玉臺新詠明月篇曰秀色隨年衰得失媸妍只自知略容千載有心期老杜詩文章千古事得失寸心知文選陸機文賦序曰妍媸好惡可得而言退之詩開巻讀且想千載若相期選詩中道遇心期后山此意謂世無知音特與古人相期于千載之上耳恨君不見金華伯金華伯謂魯直見前注東坡詩恨君不識顔平原何處如今更有詩退之詩風霜滿面無人識何處如今更有詩和吳子副智海齋集法筵應供賴三車文殊云法筵龍象衆三車謂羊鹿牛以比三乘事見蓮經堆案抽身輟算沙嵇康書曰人間多事堆案盈几樂天詩抽身去得無東坡詩笙歌叢裏抽身出永嘉證道歌云入海算沙徒自因度暑好風開樂國淵明詩微雨從東來好風與之俱樂國謂西方極樂國脱塵新句散餘霞謝𤣥暉詩餘霞散成綺僧奩手汗空留迹佛几堆紅拂委花蓮經曰香風時來吹去委花更雨新者趙師民詩委地露花啼曉恨客舎黄粱應未熟且容秋蝶覺南華黄粱見前注莊子曰昔者莊周夢為蝴蝶栩栩然蝴蝶也按通典唐天寳元年封莊子號南華真人舅氏新齋堂因竹柏有花與嵗時闌欲作中年計長留别眼看管子曰百年之計種之以木别眼謂不以凡花視之也色侵杯酒重老杜竹詩色侵書帙晚又詩重碧拈春酒子熟落聲乾李商隠詩霜野物聲乾只有林園主相期耐嵗寒退之詩山翁自是園林主上晁主客后山自注云時與无咎對酒及門而閽者辭焉兩疏父子共含香不獨家榮國有光兩疏見前注應劭漢官儀曰尚書郎含雞舌香賸欲展懷因問疾老杜詩展懷詩誦魯問疾見前注孰知相對只銜觴此句蓋用竹林阮籍阮咸事以比二晁晉書阮咸傳云諸阮皆能飲太白詩無由共銜觴年侵身要兼人健節近花須滿意黄老杜詩年侵腰腳衰漢書韓信傳身辱于跨下無兼人之勇從昔竹林須小阮只今未可棄山王小阮謂阮咸籍之兄子以比无咎山王謂山濤王戎后山以自比沈約宋書曰顔延之作五君詠以述竹林七賢山濤王戎以貴顯被黜東坡詩他年五君詠山王一時數和鮮于大受崇先觀别曾元忠此别未為逺兩都東西州情親有乖隔江湖成阻脩兩都謂東汴西洛班固有兩都賦退之序曰人之于南海者若東西州焉詩云道阻且脩后山意謂相去雖近而别意則逺世説袁彦伯為謝安南司馬既自悽惘歎曰江山遼落居然有萬里之勢脱塵度翠宻徐行當尋幽各有惜别懷共此一日留退之詩此日足可惜此酒不可嘗捨酒去相語共分一日光意合豈待約酒盡不更求闕詞固未可忍手亦何猶后山自注云是日題壁坐有黄冠師未解逍遥遊退之送張道士詩云臣非黄冠師南史劉歊年十二讀莊子逍遥篇曰此可解耳客問之隨問而答皆有條理興來我與共醉罷君當休南史陶潜傳若先醉便語客我醉欲眠卿可去僧房火可親此樂行且謀老杜詩隨意宿僧房退之詩燈火稍可親萬事自糾紛髙懷元一丘老杜詩萬事糾紛猶絶粒答王立之每逢無可語暫阻即相求前輩詩相見又無事不來還憶君晉書阮修意有所思率爾褰裳不避晨夕至或無言但欣然相對解巻初増氣開懐得寫憂詩云以寫我憂昬烟宜帶雨風樹更添秋絶唱猶多和先衰卻後酬文選宋玉對楚王問曰客有歌于郢中者其曲彌髙其和彌寡又和過田承君寺古專宜僻居深自作幽退之詩僻寺境還幽興來寧憚逺句苦不縁愁太白詩白髮三千丈縁愁似箇長逸氣無前足此以馬為喻老杜馬詩云所向無空闊無前見前注虛懷不繫舟老杜詩虛懐任屈伸莊子曰泛若不繫之舟虛而遨遊者也逢人難晤語冒雨亦相求贈石先生多方作計老如期魯直詩萬端作計身愁苦劉禹錫詩與老無期約到來如等閒百疾交攻遽得衰嵇叔夜養生論曰積損成衰從衰得白晚有勝縁逢異士勝縁見前注後漢种暠傳山澤不必有異士異士不必在山澤生須快意闕前知謂丈夫生當快意恨知之晩也晉書周勰曰人生㡬時但當快意耳迫人鬢頷紛紛白樂天詩滿頷白髭鬚臨事迴迂種種遲漢書翟方進號遲頓不及事分我刀圭容不死退之詩金丹别後知傳得乞取刀圭救病身他年鶴馭得追隨江文通别賦曰駕鶴上漢驂鸞騰天送晁无咎守蒲中一麾出守自多竒顔延之五君詠阮咸詩云屢薦不入官一麾乃出守四十專城古亦稀古樂府曰四十專城居老杜詩人生七十古來稀解榻坐談無我輩用徐穉事見前注老杜詩髙人屢解陳蕃榻魏志郭嘉説太祖曰劉表坐談客耳晉書劉惔傳桓温問惔會稽王談更進耶惔曰極進然第三流耳温曰第一復誰惔曰故在我輩鋪筵踏舞欠崔徽元稹崔徽歌序曰蒲女崔徽善舞有容豔裴敬中嘗使蒲徽一見為動敬中使罷言旋徽不得從狂累月樂天詩妓筵勉力為君鋪又曰只是堂前欠一人退之詩豔姬踏筵舞的桃作劇聊同俗的桃當是河中故事樂天詩吳兒多白晳好為蕩舟劇遇事當前莫後㡬定命録魏元忠有善相者謂之曰公當位極人臣然命多蹇剥時有憂懼不足為虞但可當事便行聞言則應元忠累遭譴責憶相者之言言事未嘗屈其志文選嵇康書曰遇事便發魏志荀彧傳曰袁紹失在後機无咎起于謫籍自吏部郎中出守故以魏元忠事勸之聖世急才常患少后山自云神宗御筆曰治世常患難得人才棧羊篩酒待公歸棧羊本俗間語東京記曰普寧坊有棧羊務毛詩釃酒有藇注以筐曰釃以藪曰湑題明發髙軒過圖髙軒過李賀所作見前注宗室士暕字明發滕王蛺蝶江都馬王建宫詞曰内中數日無呼喚傳得滕王蛺蝶圖按畫㫁云嗣滕王湛然畫蛺蝶雀兒曲盡精理歐公歸田録以為滕王元嬰誤矣老杜詩國朝以來畫鞍馬神妙獨數江都王按名畫記江都王緒霍王元軌之子善書畫鞍馬擅名一紙千金不當價老杜詩未覺千金滿髙價尹文子曰魏王得玉召玉工問其價玉工曰此無價以當之異才天縱非力能畫工不是甘為下南史王僧䖍論書曰孔琳之書天然縱放唐書王維善畫繪上以為天機所到學者不及也老杜詩畫師不是無心學今代風流數大年含毫落筆開山川米芾畫史曰宗室令穰字大年作小軸甚清麗文選陸士衡文賦曰或含毫而邈然忽忘朽老壓塵底卻怪鳧鴻墮目前朽老謂木石見前注老杜畫障歌堂上不合生楓樹怪底江山起烟霧此用其意爾來八二復秀出八二當是明發行第李渉詩云唐氏一門今五龍聲華殷殷皆如鐘就中十一最年少别有後氣横心胸后山云八二亦十一之比也萬里河山才咫尺見前注眼前安得有突兀復似天地初開闢老杜畫鶻行初驚無拘攣何得立突兀尚書考靈耀曰天地開闢耀滿舒光明牕寫出髙軒過便逐愈湜聞吟哦晚知書畫真有益卻悔嵗月來無多世説戴安道好畫范宣以為無用戴為范畫南都賦圖范看畢咨嗟甚以為有益始重畫退之詩來日苦無多官禁脩嚴斷過訪時于僻寺逢税鞅周禮士師之職二曰官禁李商隠詩嚴城清夜㫁經過僻寺見前注老杜詩野税林下鞅秀潤如行琮璧間世説曰裴叔則如玉山上行光映照人周禮大宗伯以蒼璧禮天以黄琮禮地清明似引星辰上禮記曰清明在躬曽南豐作老蘇哀辭曰其輝光明白若引星辰而上也按法言曰明星皓皓者已也引而髙之者天也憂悲愉怢百不平退之送髙閑序曰往時張旭善草書不治他技喜怒窘窮憂悲愉怢怨恨思慕酣醉無聊不平有動于心必于草書發之河擘太華東南傾此句言攄寫之俊快也郭縁生述征記曰華山與首陽本同一山河神巨靈擘開太華以通河流平生秀句寰區滿掇拾餘棄成丹青王立之詩話載張嘉甫晁无咎髙軒過圖題跋頗言明發兼詩畫之工老杜作王維詩云最傳秀句寰區滿平湖逺嶺開精神斗覺文字生清新退之詩斗覺霜毛一半加機雲别傳曰雲善屬文清新不及機未許二豪今角立二豪謂滕王江都劉伶酒徳頌曰二豪在側焉如蜾臝之與螟蛉後漢徐穉傳曰角立傑出要知旁有衛夫人衛夫人蓋尚書郎李充母以夫姓自稱李衛王羲之嘗從學書或云明發之妻亦能畫故以衛夫人比之二豪謂大年明發送歐陽叔弼知蔡州潁陰為别悔怱怱十載相望信不通老杜詩所思礙行潦九里信不通晚遇聖朝收放逸旋遭官禁限西東法華經曰汝是放逸之人此借用其字官禁見前注老杜詩岸髙瀼滑限西東又為太守專淮右賸喜郎君類若翁若翁猶言乃翁謂六一居士亦嘗知蔡州蔡州在淮西梅栁作新詩興動老杜詩天邊梅栁樹相見㡬回新又云東閣官梅動詩興可令千里不同風語林曰陳元方云周公孔子異代而出周旋動静萬里同風傳燈録𤣥沙傳雪峯曰君子千里同風送晁堯民守徐中年為别不堪憂束髮登門到白頭南省望郎仍國士漢建尚書百官府名曰南宫蓋取天上南宫太微之象退之孔戣墓誌曰臣與孔戣同在南省李商隠詩望郎臨古郡孫樵髙郎中誌銘曰鴛行望郎錦川星使史記豫讓傳曰智伯以國士待我東方千騎更吾州古樂府日出東南隅行曰東方千餘騎夫壻居上頭東坡守徐和范祖禹詩云吾州下邑生劉季誰數區區張與李后山徐人故云吾州彭翁老壽終遺骨徐州彭城縣故大彭國彭祖所封也彭門記曰殷之賢臣彭祖顓頊之𤣥孫至殷末夀及七百嵗今墓猶存燕子飛來只故樓燕子樓見前注知已難逢身易老頌公置醴我歸休置醴見前注莊子許由曰歸休乎君予無所用天下為送王定國通判河南孤身十載客都城退之詩孤身無所齎此句后山自述言十年前未得官時白社雙林諱姓名白社雙林見前注諱姓名用漢書韓伯休意授館不為他日計國語曰司里授館此借用退之鄭羣墓誌曰俸禄入門與其所過逢飲酒舞歌連日夜不厭或分挈以去一無所愛惜不為後日毫髮計留也解衣真出故人情用須賈綈袍事見前注韓信曰漢王解衣衣我翹材必定延枚叟言為相君所知西京雜記公孫𢎞開東閣分三館一曰欽賢次曰翹材次曰接士文選謝惠連雪賦曰召鄒生延枚叟宣室終須記賈生言為人主所知事見前注萬里歸來髮如漆定國編置全州元符三年得歸老杜詩汝伯何由髮如漆了知句畫更新清年顔不衰詩句字畫當亦稱是老杜詩更得新清否還知對屬忙后山詩注巻十二
