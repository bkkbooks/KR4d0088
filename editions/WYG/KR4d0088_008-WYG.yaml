body:
  text: 后山詩注巻八宋陳師道撰任淵注杜侍郎挽詞三首紘美政真吾母荀子曰儒者在本朝則美政離騷經曰既莫足與為美政兮後漢杜詩為南陽太守人方于召信臣曰前有召父後有杜母名家更杜陵老杜詩名家無出杜陵人于張從昔少漢于定國張釋之皆持法平據紘傳曰議獄必傅經義又曰紘言配隸與編管太宻因悉裁其法省百二十有餘科魯衛至今稱魯論曰魯衛之政兄弟也又曰民到于今稱之此句及後棠棣傳兩馮君竝指杜純純蓋紘之兄也絲竹中年好晉書王羲之傳謝安謂羲之曰中年以來傷于哀樂與親友别輒作數日惡羲之曰頃正賴絲竹陶寫恒恐兒輩覺損其歡樂之趣詞華夙世能老杜詩詞華哲匠能王維詩夙世謬辭客周南棠棣傳平世㡬人登周南今洛京也唐書循吏傳賈敦頤為洛州司馬人為立碑弟敦實為長史人復立碑其側號棠棣碑老杜詩青竹㡬人登驥騄方懷逺松筠忽有秋魏文帝典論曰咸以自騁驥騄于千里書盤庚云乃亦有秋此借用以言嵗晩雍容名士數後漢黨錮傳序曰指天下名士為之稱號終始法家流前漢藝文志曰法家者流凜凜驚千載見温公挽詞注堂堂閟一丘魯直韓獻肅挽詩曰堂堂萬夫表直作閉佳城能令羊季子不肯過西州晉書謝安傳羊曇為安所愛重安薨後輟樂彌年行不由西州路后山嘗有寄鄧州杜侍郎詩頗述知已意身去風流在人難玉石分玉石言不為世所知也屈原曰同揉玉石兮一槩而相量鮑照見賣玉器者詩曰涇渭不可雜珉玉當早分平生才一見治行已多聞老杜詩大賢為政即多聞更覺知音少吕氏春秋曰伯牙鼓琴意在山鍾子期曰巍巍乎意在水子期曰蕩蕩乎子期死伯牙遂絶絃以世無知音還修地下文王隠晉書載蘇韶已死見其弟節節問地下亊韶言顔回卜商今為修文郎他年九原淚仍是兩馮君漢書馮奉世傳野王與弟立相代為太守吏民歌之曰大馮君小馮君兄弟接踵相因循黄預挽詞四首敏慧仍江夏風流更妙年江夏黄童見前注貧焚酒家券酒家券用漢髙祖紀折券棄責事焚劵用史記馮驩事病得里胥錢漢書食貨志曰里胥平旦坐于右塾退之詩里胥上其事精爽來鷹隼左傳曰心之精爽是謂魂魄老杜詩魏侯骨聳精神緊華嶽峯尖見秋隼神一作爽清明㵼澗瀍退之書曰奴隸亦知其清明書禹貢曰伊洛瀍澗無兒傳素業退之詩中郎有女能傳業伯道無兒可保家王介甫作王逢年挽詞亦云中郎舊業無兒付晉書陸納傳怒其兄子曰汝不能光益父叔乃復穢我素業耶有淚徹黄泉退之詩滴地淚到泉左傳曰不及黄泉無相見也骨秀神仙數詩清雅頌才老杜詩自是君身有仙骨又詩神仙才有數識髙懸日月老杜詩名與日月懸韻勝絶塵埃陶淵明詩少無適俗韻文選頭陀寺碑曰道勝之韻虚往實歸去就堪同事用孔顔用行舍藏之意摧殘盡一哀西京賦曰樸叢為之摧殘禮記檀弓孔子曰予入而哭之遇于一哀而出涕曾子問曰皆哭不踊盡一哀了知天上去不似世間來華嚴經曰了知如是悉是虛妄天上去用李賀事見前注志大期千里魏武帝歌曰老驥伏櫪志在千里身宜置一丘晉書顧愷之為謝鯤像在石巖裏云此子宜置丘壑中英詞真葢世英詞并葢世字竝見前注爽氣已横秋晉書王徽之曰西山朝來致有爽氣耳此借用其字文選北山移文云霜氣横秋地要黄金骨太白詩云三載夜郎還于兹鍊金骨雪竇禪師頌肅宗問忠國師話云鐵椎擊碎黄金骨天地之間更何物天成白玉樓李商隠作李賀小傳云賀將死時有緋衣人持一版書召賀曰帝成白玉樓立召為記天上差樂不苦也少頃遂絶平生斲泥手斤斧恐長休后山自謂也莊子曰郢人堊漫其鼻端若蠅翼匠石運斤成風聴而斲之堊盡而鼻不傷元君招匠石曰嘗試為寡人為之匠石曰自夫子之死也吾無以為質矣玉筯冰潮後唐李陽冰李潮皆能篆張懐瓘書斷曰如科斗玉筯偃波之類共五十二般舒元輿玉筯篆志曰秦丞相斯變頡籀文為玉筯篆絲桐藝業餘史記田敬仲世家曰又何為乎絲竹之間文選謝宣逺詩中堂起絲桐逺途憎早悟用老杜文章憎命達之意建康實録陸雲謂周處曰君前途尚逺且患志之不立何患名之不彰南史梁室始興王憺之子煜憺嘗目送之曰吾所深憂其過俊發恐必無年曠度得中疎恢廓者人或以為疎文選夏侯湛東方朔畫贊曰逺心曠度子逝今何遽吾生孰與居豈無文士傳未有茂陵書文士傳乃張騭所作三國志注間見之漢書司馬相如病免居茂陵既死有遺札書言封禪事秋懷四首積雨不受暑既晴還得秋老杜詩脩竹不受暑未免困河魚左傳曰河魚腹疾將奈何寧如喘吳牛世説滿奮畏風答晉武帝曰臣如吳牛見月而喘牛畏熱見月疑是日所以喘也此句謂受疾不如受熱風梧有先聲漢書韓信傳兵法固有先聲而後實巢燕無後留謝瞻九日詩巢幕無留燕人生行樂爾漢書楊惲傳曰人生行樂耳須富貴何時一經今白頭見前注小雨斷復續回斜落晩風寒心生蟋蟀秋色傍梧桐老杜詩小雨夜復宻回風吹早秋草與遙山碧花欺晚照紅口須談世事目已失飛鴻晉書王猛見桓温面談當世之事目送飛鴻見前注山斷開平野老杜詩山豁何時斷河回殺急流漢書溝洫志曰分殺水怒選詩淮泗馳急流登臨須向夕風雨更宜秋急急後飛鴈翩翩不下鷗老杜詩急急能鳴鴈輕輕不下鷗列子曰漚鳥飛而不下晚舟猶小待暮雀已深投老杜詩暮雀意何如退之社樹詩云依依絶暮禽梨埓當千户爾雅埓丘注曰謂丘邊有界埓史記貨殖傳安邑千樹棗燕秦千樹栗此其人皆與千户侯等魚防擁萬頭文選劉公幹詩流波為魚防寧須一網盡不為百人留仁宗時御史劉元瑜劾進奏院事一時名士皆貶斥語執政曰巳為相公一網打盡宻雨㸃急水老杜詩㸃水蜻蜓款款飛驚風擘繫舟東坡詩盡日舟横擘岸風百年供轉徙因病得夷猶言常困于羇旅今因病而得閒也晉書陶潜云我性不狎世因疾守閒楚詞君不行兮夷猶注猶豫也送法寳禪師平生夫鐵腳道價喧宇宙長蘆應夫禪師初參圓通秀秀遣作化主至一邸中有娼女為母所迫入其房不肯去即跏趺達旦以錢遣之仍索火焚其布單而去叢林因謂之夫鐵腳張無盡嘗為作鐵笛引云望禮東南雲吾今獨何後老杜詩每望東南雲令人㡬悲吒世説注曰恵逺名被流沙彼國衆僧皆稱漢地有大乘沙門每至燃香禮拜輒東向致謝晩始識其子瑤林一枝秀晉書王戎曰王衍神姿髙徹如瑶林瓊樹傳燈録宗派有别出一枝初聞飲光笑傳燈録摩訶迦葉此云飲光勝尊佛書云世尊拈花迦葉微笑遂付以正法眼藏復作空生瘦空生即須菩提也今年退後禪袖手不肯又真成菩薩魔后山嘗作諸月老再往薦福疏有田倦于利生亦菩薩之魔事按般若經曰或説法要辯過量生或所欲説未盡便止當知是為菩薩魔事未免化城咎法華經言有一導師導衆至珍寳處道中化作一城云云意謂暫為止息之地非究竟處白月懸清光大鐘得辭扣月不容不照鐘不容不扣師亦如是老杜謁文公詩大珠脱玷翳白月當空虚文選江文通詩秋月懸清光禮記善待問者如撞鐘扣之以小者則小鳴扣之以大者則大鳴知止一何勇隨縁豈無復老子曰知止不殆漢書東方朔傳曰一何壯也佛書曰隨縁赴感靡不問豐臺兩禪子三請期一覯三請見前注翩然挈瓶盂百里往相就貫休詩一瓶一鉢垂垂老千水千山得得來古寺風雨餘觸目初邂逅夙昔有淨縁歡然宛如舊教我早自異業成誰得救世故已備嘗躊躇復何候鑽火勿停手時來自渠透魯直詩木鑽石盤未渠透毛詩夜未央注曰猶言夜未渠央也渠音其據反殷勤禮白足白足見前注傳燈録迦葉聞世伽偈頭面禮足吾為太山溜言修證之功在乎積久也漢書枚乘傳太山之溜穿石贈趙奉議為惠不必廣但問與者誰受施何用多名義以為資樂天詩相知不在多但問同不同此句頗用其律文選崔子玉座右銘曰受施慎勿忘王粲詩從軍有苦樂但問所從誰平生師友間四海參寥師一窮無四壁百代有千詩呉僧道潜自號參寥子善詩為東坡所稱晉書習鑿齒傳云四海習鑿齒千詩見前注再逐越淮江三年魯中歸參寥子紹聖初坐累遷逐初無贊公色贊公見老杜詩本京中大雲寺主謫秦州安置杜嘗有詩云贊公釋門老放逐來上國還為世塵嬰頗帶憔悴色不異淨名衣言返初服也維摩經曰維摩詰雖為白衣持奉沙門清淨律行淨名即維摩詰才如得風鷁左傳曰六鷁退飛過宋都風也已復觸藩羝周易大壯卦羝羊觸藩羸其角路貧誰肯憐語妙君所知我往立談間欻若白受緇乃知仁者聴不待辛苦詞言聴言之易如白受緇也禮記甘受和白受采儀禮昬禮注曰以白造緇曰辱庾信哀江南賦曰不無危苦之詞趙侯名教士晉書樂廣曰名敎内自有樂地勁氣噴長霓退之詩云勁氣沮金石曹子建七啟曰慷慨則氣成虹霓論吐天下公而合吾所私所私謂參寥明牕㺯文墨妍語含英姿要與識者論且避羣兒癡漢書蕭何傳曰徒持文墨議論退之詩不知羣兒愚那用故謗傷舊好無新功終年此交綏左傳趙宣子曰秦以勝歸吾何以報乃皆出戰交綏注云兩退曰交綏未須堅百戰當即建降旗史記張儀傳曰輕走易北不能堅戰孫樵與王霖書曰誠謂足下怪于文方舉降旗且大誇朋從間元日雪二首半夜風如許後漢左慈作老羝語曰遽如許平明雪皓然晉書王徽之傳夜雪初霽月色清朗四望皓然簾疎穿瑣細竹壓更嬋娟樂天詩北牕竹嬋娟按楚辭曰嬋娟脩竹窘兔走留跡飢烏鳴乞憐遙忻炎海上還復得新年末句謂東坡在海外無恙也老杜詩南遊炎海甸度臘闕三白一作閲三白樂天詩度臘都無好霜霰朝野僉載曰正月見三白田父笑赫赫三白謂三得雪也開正還積陰沈約宋書南郊樂登歌曰開元守正禮存樂舉守一作首炊煙茅舎濕噪雀暮枝深短髮千方誤中年萬里心言終老無成而悔壯年之妄念成書著巖穴或有後人尋此句用揚雄草𤣥意漢書司馬遷曰僕誠以著此書藏之名山莊子曰其隠巖穴也難為于布衣之士次韻黄生入竹投牕夜有聲似違殘臘作初正三更爽氣侵危坐老杜詩竹凉侵臥内後漢茅容避雨樹下危坐愈恭萬里回風逼發生爾雅回風謂之飄老杜雨詩當春乃發生呵筆小吟撩我老開元天寶遺亊曰李白對明皇撰詔誥時大寒筆凍敕宫嬪執牙筆呵之王介甫詩云物華撩我有新詩閉門髙臥見君情用袁安事見前注只今剩作驚人句頗覺吟邊意未平退之送東野序云物不得其平則鳴答黄生水泥㫁道雪塞門逺坊累日無行人蜀志劉焉傳曰米賊㫁道魯直詩明朝醉起雪塞門栁子厚詩飛雪㫁道冰成梁臥聞喧呼誰叫閽漢書揚雄甘泉賦選巫咸兮叫帝閽此借用稚子往問鹿駭奔文選笛賦曰莫不張耳鹿駭小弁詩曰鹿斯之奔維足伎伎黄生學詩用力新急手疾口如翻盆北齊書魏收敏速之手邢温所不逮東坡詩文如翻水成老杜詩白帝城下雨翻盆衝風踏凍送七言要令寒屋回春温是時積陰又黄昏叫閙索火驚四鄰杜牧之李賀集序曰太和五年十月中半夜舍外有疾呼傳緘書者某曰必有異亟取火來及發之果集賢學士沈公子明書一通邇來結字穏且勻晉書衛恒曰杜氏甚得筆勢而結字小疎豈不見我參寥君參寥子能詩意黄生近必見之故爾頓進也典略袁奉髙曰卿見吾叔度耶嗟吾老矣心尚存後來得子空馬羣歐公贈王介甫詩云老去自憐心尚在後來誰與子爭先徑須赤手縛麒麟如老杜掣鯨鯢之意謂大手筆也孫樵與王霖書曰譬玉川子月蝕詩韓吏部進學解莫不拔地倚天句句欲活讀之如赤手捕長蛇不施鞚勒騎生馬急不得暇莫可捉搦四大海水一口吞四大海水之語佛經多有之傳燈録馬祖謂龎居士云待汝一口吸盡西江水即向汝道丈夫意氣抗浮雲班固答賔戲曰仲尼抗浮雲之志道逢其人兩手分兩句后山自言于詩學無所靳惜得人則分付也傳燈録歸宗曰遇人則中途授與妒婦拊膺王右軍言世人之不廣也羊欣筆陣圖曰王羲之年十二見前代筆説于其父枕中竊而讀之父因與之不旬月書便大進衛夫人見之曰此子得用筆訣近見其書便有老成之智流涕曰此子必蔽吾名墨藪曰鍾繇見蔡邕筆法于韋誕坐上搥胸三日因嘔血此詩參用其事列子曰甘蠅學射于飛衛飛衛髙蹈拊膺曰汝得之矣此用其事南史王誕傳宋明帝使虞通之撰妒婦記按戰國策曰從妻言之未免為妒婦雪後送往開新雪又晴故留臘白待春青左傳曰送往事居元稹詩曰臘雪消殘春又詩迎新别故欲沾衣稍回松色伸梅怨併得朝看與夜聴已覺庭泥生鳥迹遽修田事帶朝星吕氏春秋曰巫馬期為單父令帶星而出入暮年功力歸持律不是騷人故獨醒吳志陸抗傳曰大費損功力史記屈原曰衆人皆醉而我獨醒送張蘄縣接禄才餘嵗為邦近故園案圖三萬户漢書陳平傳髙祖問御史曲逆户口㡬何對曰始秦時三萬餘户鎮静五千言史記老子著書五千餘言道徳之意雪盡春泥滑風生沙水昏老杜詩杖藜入春泥又詩天寒沙水清猶須放琴客坐席稍能温張君必有放妾事因以戲之按麗情集顧況有宜城放琴客詩序曰琴客宜城之愛妾也宜城請老愛妾出嫁不禁人之欲而私耳目之娛達者也歌曰南山闌干千丈雪七十非人不煖熱此引用言席方假煖何須遽逐之也送何子温移亳州三首治出龍城守退之詩曰寄書龍城守謂栁栁州也名髙水部郎見前注清明人共識退之答崔羣書曰青天白日奴隸亦知其清明風味獨難忘開天傳信記曰麴生風味不可忘也其詳見前注骨立秦書瘦老杜李潮八分小篆歌曰苦縣光和尚骨力苦縣今在亳州鬚粘檜蜜香亳州地多古檜歐公亳州詩云蜂採檜花卻落香唐羅鄴早行詩旋呵鞭手凍粘鬚烹鮮師老耳老子曰治大國若烹小鮮亳州明道宫乃老子始生之地曳尾肯䝉莊莊子䝉人事見前注莊子曰楚王使大夫二人謂曰願以境内累矣莊子曰楚有神龜死已三千嵗矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾于塗中乎傳燈録僧問洞山和尚為先師設齋還昔先師也無青襟曾誦賦詩青青子衿注青衿青領也學子之所服皓首始登門文選李陵書云丁年奉使皓首而歸意得寧論晚老杜詩論交翻恨晚此反而用之髙適詩男兒貴得意何必相知早心交不待言莊子曰四人相視而笑莫逆于心遂相與友呉志孫權曰孤與子瑜可謂神交向來期北上可復改南轅后山自注云嘗請湖越而得亳期北上欲其漸近帝城也左傳曰令尹南轅反斾又曰王告令尹改乘轅而北之畫地數佳政老杜詩倒屣喜旋歸畫地求所歴文選曹子建與吳季重曰在彼自有佳政叢談何處村劉向説苑有叢談篇老杜詩慟哭秋原何處村復作中年别仍懷後日憂關山遮極目退之西山詩為遮西望眼王粲登樓賦云平原逺而極目兮蔽荆山之髙岑汴泗只東流退之詩汴泗交流郡城角謂徐州也東坡送歐陽主簿詩出處年來恨不齊一樽臨水記分攜江湖咫尺吾將老汝潁東流子卻西政好遭頻借老杜詩權宜借寇頻後漢寇恂傳潁川百姓遮道曰願從陛下復借寇君一年詩清得暗投暗投見前注得暗投猶言安得暗投也㑹看靈夀杖漢書孔光傳詔賜太師靈夀杖扶出富民侯漢書車千秋傳千秋為丞相封富民侯送詹司業學舎論交二十年白頭相對固依然才難孰為吾君借才難見魯論果滿寧容我輩先謂證果位也南史謝靈運謂孟顗曰丈人生天當在靈運前成佛必在靈運後此反而用之熟路長驅聊緩步退之送石處士序云猶駟馬駕輕車就熟路而王良造父為之先後也此借用謂功名之途百全一發不虛弦漢書晁錯傳云此其計不百全豈發乎老杜詩鳴弦不虛發此借用言其藏器待時故懷未盡還成别飽慣人間不更憐西郊二首紅緑相催春事闌可能無意待人看不因送客那能出衰疾經年一據鞍老杜詩送客逢花可自由蜀志先主見髀裏肉生慨然流涕此句頗采其意據鞍見馬援傳攢眉斂目抵風沙暗度城西十里花樂府蔡琰胡笳十八拍云攢眉向月兮撫雅琴歴肆側聴長短句雲溪友議曰崔涯張祜齊名每題詩倡肆元稹樂府古題序云句度短長之數聲韻平上之差縁溪斜著兩三家此句終上句之意東坡詩竹籬茅屋趁溪斜老杜詩江深竹淨兩三家寄亳州何郎中二首西南日下共浮雲西南謂日暮時文選李少卿與蘇武詩曰攜手上河梁遊子暮何之又詩曰仰視浮雲馳奄忽互相踰風波一失所各在天一隅江淹擬李陵詩曰樽酒送征人踟蹰在清晏日暮浮雲滋握手淚如霰人事難羣喜勸分淵明贈龎參軍詩序曰人事好乖便當語離左傳曰振廩勸分此借用其字已度城陰先得句何遜詩城陰度塹黒昬鴉接翅稀不應從俗未忘葷謂何𦙍也見前注兩句皆用何氏事松篁有節元宜晚禮記曰如松柏之有心桃李無蹊只自薫漢書李廣傳贊桃李不言下自成蹊許渾詩冬草只自薰欲入帝城須帝力用陳咸事見前注漢書張敖傳曰秋亳皆帝力也且尋詩社著詩勲孫魴沈彬同游李建勲之門為詩社歐公詩云唱髙誰敢投詩社魯直詩學古苦勲多魏志注曰示威懐而著鴻勲西原追送未成旬赫赫傳聲已迫人孟浩然詩重陽未成旬漢書何武所居無赫赫名後常見思剰欲鈔詩寄來使髙適詩尋經剰欲翻老杜詩鈔詩聴小胥尚能拂席致嘉賔史記孟子傳曰平原君側行襒席注拂也音匹結反孰知簡易歸劉向漢書劉向為人簡易無威儀誰使循良作寇恂見前注他日入東專一壑少留餘地許為鄰晉宋間人多以往㑹稽為入東南史何𦙍傳買園宅欲入東遂居若邪山漢書敘傳班嗣曰漁釣于一壑則萬物莫奸其志王介甫詩我亦暮年專一壑寄答泰州曾侍郎千里馳詩慰别離詩來吟咏轉悲思老杜詩愁極本憑詩遣興詩成吟咏轉凄凉漢書趙幽王傳曰王悲思静中取適庸非計前輩謂作文静中一業故此反其意老杜詩取適南巷翁林下相從㑹有時雲溪友議僧靈澈詩曰相逢盡道休官去林下何曾見一人魏志崔琰曰㑹當有變時生理只今那得説老杜詩我在路中央生理不得論交情從昔見于斯漢書鄭當時傳一貴一賤交情乃見含毫欲下還休去懷抱何由得細知退之答侯繼書云欲致一書聞足下并自書其所懐舍意連辭將發復已卒不能成就其説陸機文賦曰或含毫而渺然送提刑李學士移使東路據實録元符二年二月提㸃京東西路刑獄李昭玘徙京東東路襟抱從前相向開倡酬于此未多陪老杜詩一生襟抱向誰開身更寵辱談彌勝老子曰寵辱若驚髙僧傳支遁謂王濛曰貧道與君别來多年君語了不長進后山此句反其意而用之路别東西意自哀文選謝𤣥暉辭隨王牋曰岐路東西或以嗚唈注引淮南子楊朱泣岐事故栁子厚重别劉夢得詩曰二十年來萬事同今朝岐路忽西東后山徐州人徐州屬京東西路隠几忘言終不近莊子曰南郭子綦隠几而坐仰天而嘘嗒然似喪其耦又曰智北遊于𤣥水之上適遭無為謂三問而不答問乎狂屈狂屈曰予中欲言而忘其所欲言反見黄帝而問焉黄帝曰彼無為謂真是也狂屈似之我與若終不近也此句后山自述白頭青簡兩相催唐劉子𤣥曰頭白可期汗青無日此借用自言度嵗月于文字間也後漢呉祐傳父恢欲殺青簡以寫經書杜詩干戈衰謝兩相催孰知衰老難為别聲問應須續續來漢書蘇武傳曰有聲問來樂天琶琶行云低眉信手續續彈和鄭户部寳集文室二首逺遊遊則逺屈原逺遊曰悲時俗之迫隘兮願輕舉而逺遊此借用言主僧徧參也安心心已安傳燈録僧神光問達摩曰我心未寜乞師與安達摩曰將心來與汝安曰覓心了不可得達摩曰我與汝安心竟茅茨更何事一坐五年寛傳燈録汾州無業禪師曰古得道人得意之後芧茨石室向折腳鐺子裏煮飯喫過三十二十年樂天詩一坐十五年林下秋復春客來問法要示以無所還楞巖經曰今當示汝無所還地勿云空生黙聴者不勝言空生謂須菩提也般若經須菩提于巖中晏坐帝釋散花曰我聞尊者善談般若云云須菩提曰我于般若未曽談著一字帝釋曰尊者無説我亦無聞無説無聞是名真説般若貴有空王章空王佛也章印也謂傳佛心印觀佛三昧海經云住念佛者心印不壊信心銘觀心空王貧無置錐地見前注衝風牕自語古樂府中庭有樹自語涴壁蟲成字東坡詩書牕涴壁常遭罵蟲成字見前注向隅有知音説苑曰今有滿堂飲酒者一人向隅獨泣則一堂之人皆不樂矣此借用言面壁也按傳燈録達摩寓止于嵩山少林寺面壁而坐終日黙然人莫之測又忠國師曰牆壁瓦礫熾然常説故東坡贈月老詩曰拱手但黙坐牆壁方諄諄后山用此意謂無情亦解説法不可謂牆壁無知也闔門接强對傳燈録趙州和尚見真定帥王公不下禪牀曰第一等人來禪牀上接中等人來下禪牀接末等人來山門外接東坡詩安排詩律追强對按吳志陸抗傳曰外禦强對只道庭前柏西來本無意庭柏見前注傳燈録大梅云西來無意隠者郊居髙齋繚繞度雙溝謝𤣥暉有郡内髙齋閒坐詩老氣軒昂葢九州老杜詩老氣横九州不為江山開悒怏老杜詩巳知出郭少塵事更有澄江消客愁又詩汀洲稍疎散風景開悒怏正縁風味得淹留風味見前注劉安招隠士曰攀桂枝兮聊淹留招攜好客供談笑老杜詩强將笑語供主人拆補新詩擬獻酬鍾嶸詩品曰拘攣補衲蠧文已甚寒山子詩與道殊懸逺拆東補西爾楚茨詩云獻酬交錯歐公詩更約多為詩准備恐防梅老敵難當小摘自鋤稀菜甲旁觀虚作不堪憂老杜客至詩自鋤稀菜甲小摘為情親魯論曰人不堪其憂覽勝亭㫁岸通横水老杜詩決渠當㫁岸吹花滿繫船老杜詩吹花困癲傍舟楫中年擅幽獨輟食買林泉楚辭曰幽獨處乎中山草木真成主江山故作妍升沈有流轉且復賦歸田元稹詩升沈或異勢張平子有歸田賦何太沖挽詞二首一作大中課最三川守漢書宣帝紀課殿最以聞注云最凡要之首也言課居首也又倪寛傳課更以最史記李斯之子由為三川守名成萬石君漢書石奮傳景帝曰石君及四子皆二千石人臣尊寵乃集舉其門凡號奮為萬石君平生欠一識聲烈即多聞見前注兜率真歸處樂天詩海山不是吾歸處歸即應歸兜率天琴臺只斷雲老杜詩琴臺日暮雲傷心今夜月忍便到初墳漢元帝詔為初陵注未有名故曰初此用其字哀挽諸儒競老杜詩哀挽青門道晉書郗超傳及死貴戚操筆為誄者四十餘人豐碑故吏繁禮記曰公室視豐碑此借用其字按後漢諸碑多門生故吏所立素車紛雨泣周禮車僕注曰素車以白玉堊車也老杜詩路人紛雨泣玉一作土丹旐與風翻老杜詩丹旐飛飛日㡬地留遺愛孔子曰子産古之遺愛他年作九原禮記趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸注作起也涕流耆舊盡不獨為鄉園何遜詩鄉園不可見江水徒自清送大兄兼寄趙團練貧有分離苦官無早晩宜上句見第一巻注樂天詩命茍未來且求食官無髙卑及逺邇又為千里别未覺十年遲此一聨足成破題之意分屬兩句十年遲詳後注日與江山逺風連草木悲平生劉子政見可共論詩劉向字子政漢宗室也以屬趙君寄襄州程大夫中年為吏晚專城不獨身榮府亦榮專城見前注江漢風流見羊杜晉羊祜杜預皆鎮襄陽老杜詩江漢風流萬古情相門經術有韋平漢韋賢平當父子皆以明經至宰相史記孟嘗君傳曰相門有相十年一别音書絶萬里相看骨肉情杕杜詩序曰骨肉離散今代龎公入城府定將懸榻與逢迎後漢龎公傳龎公居峴山之南未嘗入城府峴山今在襄州又徐穉傳陳蕃特為置一榻去則懸之送檢法趙奉議三嵗公門不屢過作牋時得問如何晉書龔𤣥之未嘗至公門及兹去去翻為恨文選蘇武詩參辰皆已沒去去從此辭向使常常肯為多悔向來不數見也孟子曰欲常常而見之勇鋭閉房猶著酒老杜詩昔何勇鋭今何愚白虎通曰人生六十閉房者何也法六月陽氣衰也禮記内則注曰妾五十始衰閉房不復出御切深疾惡反傷和退之歐陽生哀辭曰其文章切深魏志陳矯傳陳登曰清修疾惡有識有義吾敬趙元達老杜梔子詩曰與道氣傷和一本傷作相贈言竊取仁人號贈言謂勸其止酒與和易也暗用管輅别傳諸葛樂事詳十二巻王察院挽詞注家語子路將行孔子曰贈汝以言乎史記孔子世家孔子過周問禮老子送之曰富貴者送人以財貧賤者送人以言吾不能冨貴竊仁者之號送子以言善聴君居長者科左傳所謂惟善人能受盡言送建州鄭户部清江畫舸照新晴鐃鼔喧喧聒耳鳴樂府題有鐃歌鼓吹昔日布衣今著繡著繡晝行見前注他年鶴化只空城鄭蓋徐州前輩故用丁令威化鶴事見前注還朝不待三年最漢書嚴助傳曰助為㑹稽太守願奉三年計最得郡何妨萬里行成都記萬里橋諸葛亮送費禕使呉别于此禕曰萬里之行始于此矣嵗禄二千親八十世間誰有此時榮漢太守秩二千石送張秀才學又三年積三年學見魯論功收一日長蜀志龐統曰吾似有一日之長擅埸推老手張平子東京賦曰秦政利觜長距終得擅埸杜子美詩畫手看前輩吳生逺擅場歐公詩老手尚能工翦裁附尾得諸郎史記伯夷傳顔回雖篤學附驥尾而行益顯南史王僧䖍傳曰此烏衣諸郎坐處度鳥界晴碧老杜詩身在度鳥上又詩雪嶺界天白過雲回夕黄老杜詩絶壁過雲開錦繡又詩錦城曛日黄孰知詩有驗謂詩能窮人莫愠路無糧魯論孔子在陳絶糧子路愠見莊子曰吾無糧我無食我一作餓后山詩注巻八
