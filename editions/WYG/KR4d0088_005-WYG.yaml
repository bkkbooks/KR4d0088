body:
  text: 后山詩注巻五宋陳師道撰任淵注答晁以道轉走東南復帝城帝城見前注后山嘗㳺江浙元祐初來京師此句追記其事故人相見眼偏明退之詩相見眼偏明十年作吏仍餬口作吏見前注顔魯公帖云一昨縁受朁北歸中止金陵闔門百口㡬至餬口字本出左傳兩地為鄰闕寄聲退之詩兩地無千里因風數寄聲冷眼尚堪看細字白頭寧復要時名老杜詩秋山眼冷常夢稀東坡詩問龍乞水歸洗眼要看細字銷殘年熟知范叔寒如此熟知見前注又老杜詩熟知茅齋絶低小史記范雎傳須賈曰范叔一寒如此哉未覺嚴公有故情唐書杜甫傳甫依嚴武于劍南武以世舊待甫甚善北書齊書趙彦深被沙汰袁聿修猶以故情存問往來按漢陳勝傳客出入愈益發舒言勝故情病起今日秋風裏何鄉一病翁老杜詩多病秋風落力微須杖起法燈禪師擬寒山子詩曰搘笻似力微禮記檀弓曰杖而後能起心在與誰同歐公詩老去自憐心尚在古樂府東飛伯勞歌曰空留可憐誰與同此借用災疾資千悟孟子所謂人之有徳慧術知者恒存乎疢疾是也晉書天文志五星同色天下偃兵百姓安寜不見災疾此借用傳燈録仰山云若是宗門下上根大智一聞千悟得大總持寃親併一空同乎大通無怨無徳也華嚴經云願一切衆生于怨于親等心攝受皆令安樂智慧清浄傳燈録曇藏禪師見大蟒不避曰毒無實性激發則強慈茍無縁寃親一揆其蟒倐然不見百年先得老晉嵇康養生論曰從衰得白從白得老三敗未為窮列子管仲歎曰吾嘗三戰三北鮑叔不以我為怯知我有老母也晉書陶侃謂庾亮曰古人三敗君今始二此用老杜百年渾得醉一月不梳頭之句法皆落句也九月九日魏衍見過節裏能相過談間可解憂漢書揚雄解嘲曰或立談間而封侯解憂見孟子致疎君未肯得此我何由莊子漁父篇子路問孔子曰由得為役久矣未嘗見夫子遇人如此其威也漁父何以得此乎語到君房妙見前注詩同客子游南史謝𢎞㣲傳謝靈運小名客兒按靈運有九月九日從宋公戲馬臺集詩一經從白首揚子曰古之學耕且養三年通一經又曰童而習之白首紛如也李白詩白首太𤣥經萬里有封侯後漢班超傳相者曰祭酒布衣諸生耳而當封侯萬里之外别黄徐州姓名曾落薦書中老杜詩名玷薦賢中元稹詩名落公卿口又王仲舒作李君房制詞曰籍籍名字落人談中刻畫無鹽自不工晉周顓傳庾亮謂顓曰諸人咸以君方樂廣顓曰何乃刻畫無鹽唐突西施一日虛聲滿天下李綽輦下嵗時記劉賔客賀王魏公知舉詩曰一日聲名徧天下滿城桃李屬春官東坡答劉涇書曰向在科埸時不得已作應用文不幸為人傳寫以此得虚名滿天下十年從事得途窮晉書職官志州置諸曹從事等員后山以亳州司户為敎授故云爾晉阮籍傳率意獨駕不由徑路車跡所窮輒慟哭而反文選顔延之五君詠曰途窮能無慟白頭未覺功名晩以屬徐州也老杜詩男兒功名遂亦在老大時青眼常䝉今昔同晉阮籍能為青白眼范諷詩云惟有南山與君眼相逢不改舊時青衰疾又為今日别數行老淚灑西風衰疾見前注次韻答晁無斁女生願有家名妾不以聘田里亦慕君又惡不由正大率用孟子意禮記内則曰聘則為妻奔則為妾欲行不問塗用阮籍事見前注已破寧顧甑後漢郭泰傳孟敏荷甑墮地不顧而去林宗見而問其意對曰甑已破矣視之何益時后山罷潁學耕蠶無一廛漢書揚雄傳有田一廛庖井要三徑晉書陶潛謂親朋曰聊欲弦歌以為三徑之資可乎老杜詩井竈任塵埃還家憂患餘老杜詩斯文憂患餘挽鬚兒女競老杜詩生還對童稚似欲忘飢渇問事競挽鬚誰能即嗔喝十年寧有此一寒可無命老杜詩不為困窮寧有此此借用言還家之樂十年所無一寒見前注詩意謂離合貧富蓋皆有命平生晁夫子得士公室慶謂作諸侯客也公室見魯論稍無車馬音復作賔客請車馬音見孟子論文到韓李謂韓愈李翺也似指東坡以下數句皆足此意老杜詩論文到崔蘇念舊説蘇鄭謂蘇源明鄭䖍皆老杜故人也老杜嘗有詩曰故舊誰憐我平生鄭與蘇又云早嵗與蘇鄭痛飲形相親長年斷消息獨語誰和應意謂東坡在貶所也老杜詩中原消息斷退之與孟郊書云余言之而聴者誰歟余唱之而和者誰歟東坡詩獨唱無人和退之送鄭權序曰撞搪號呼以相和應此生恩未報他日目不瞑退之詩秖縁恩未報豈謂生足藉左傳曰荀偃卒視不可含欒桓子撫之乃瞑受含歸臥無好懷叩門有佳聴詩來霜雪後更覺天宇淨老杜詩天宇清霜浄少好老未工揚子曰或問吾子少而好賦持刃授子柄漢書梅福傳倒持太阿授楚其柄次韻無斁偶作二首肩聳三峰峻國朝雜記長孫無忌嘲歐陽詢聳膊成山字埋肩不出頭郭縁生述征記曰華山有三峰直上數千仭眉龐八字横退之詩夜闌縱捭闔哆口疎眉龐漢武故事官人畫八字眉此借用𤣥談人絶倒見前注家法句新清老杜詩更得新清否遙知對屬忙八俊先張子後漢黨錮傳曰指天下名士為之稱號三君八俊又曰張儉為黨魁諸公少賈生漢書賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毁誼曰洛陽之人年少初學專欲擅權紛亂諸事于是天子後亦疎之已傳烏鵲喜欲聴鶺鴒聲鶺一作鵒此句當屬其兄无咎老杜云浪傳烏鵲喜深負鶺鴒詩此老三年别何時萬里迴亦似屬東坡元祐壬申别于潁州至紹聖乙亥三年矣更無南去鴈鴈不過衡山無從寄聲于嶺外也猶見北枝梅言東坡過嶺未歸白氏六帖云大庾嶺梅花南枝落北枝開會有哀籠鳥文選潘岳秋興賦曰池魚籠鳥有江湖山藪之思李畋獻吕文靖生日詩曰此身若得西歸去尤勝開籠放雀兒寧須溺死灰漢書韓安國傳獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然則溺之聖朝無棄物老杜詩聖朝無棄物老病已成翁神宗于東坡嘗有人材難得不忍終棄之詔故此詩引用與子賦歸哉欲其來歸之意也殷其靁詩振振君子歸哉歸哉此亦賦詩斷章之意古墨行并序晁無斁有李墨半丸云裕陵故物也往于秦少游家見李墨不為文理質如金石亦裕陵所賜王平甫所藏者潘谷見之再拜云真廷珪所作也世惟王四學士有之與此為二矣嗟乎世不乏竒乏識者耳敬為長句率無斁同作永裕陵神宗所𦵏秦郎百好俱第一烏丸如漆姿如石趙壹非草書曰十日一筆月數丸墨蕭子良書曰仲將之墨一㸃如漆文房四譜云李超本易水人唐末居于歙造墨尤妙其堅如玉其文如犀巧作松身與鏡面借美于外非良質文選琴賦曰良質美手潘翁拜跪摩老眼一生再見三歎息禮記曰一倡而三歎了知至鑒無遁形圓覺經云曽不了知如幻境界衛夫人帖云仰憑至鑒大不可言東坡詩道人胸中水鏡清萬象起滅無逃形王家舊物秦家得舊物借用王獻之青氈事君今所有亦其亞伯仲小低猶子姪老杜詩天廄真龍此其亞魏志衛臻傳注郭林宗論許兹與文生此二人非徒兄弟乃父子也黄金白璧孰不有古錦句囊聊可敵謂世人蓄金璧固多而未必可當此墨惟詩囊差可當之耳唐書李賀傳每出從小奚奴背古錦囊遇所得投囊中睿思殿裏春夜半燈火闌殘歌舞散睿思蓋神宗便殿在垂拱殿後自書細字答邊臣萬里風塵入長算元祐中蘇轍等上所編神宗皇帝御製集内四十巻皆賜中書宻院及邊臣手札言攻守祕計哲宗為之序曰其指授諸將應變制宜雖在千萬里外而盡得其形勢之要先後緩急之機皆如在目前而無遺畫云又按光武紀一札十行細書成文退之詩夜書細字綴語言文選陸士衡弔魏武帝文曰長算屈于短日逺跡頓于促路初聞橋山送弓劍帝王世紀曰黄帝𦵏于上郡陽周之橋山漢書郊祀志黄帝鑄鼎既成有龍下迎帝小臣持龍髯龍髯抜墮墮黄帝之弓老杜詩先帝弓劍逺寧知玉盌人間見南史沈炯行徑漢武通天臺為表奏之其略曰茂陵玉盌遂出人間此借用以比裕陵遺墨夜光炎炎衝斗牛㑹有太史占星變晉書張華傳雷煥曰斗牛之問頗有異氣史記天官書曰常星之變不見歐公仁宗御書飛白記曰今賜書之藏于子室也吾知將有望氣者言榮光起而屬天者必賜書之所在也人生尤物不必有左傳曰夫有尤物足以移人苟非徳義則必有禍時一過目驚老醜文選張景陽詩忽如鳥過目南史昭明太子傳曰讀書過目皆憶栁子厚乞巧文獨溺臣心使甘老醜念子何忍遽磨研少待須臾圖不朽魏衍注曰少游之墨嘗許先生為他日墓誌潤筆先生嘗語衍作此時少游尚無恙然終先逝去衍謹書少待須臾見前注文選蔡邕作郭有道碑曰乃相與推先生之德以謀不朽之事而退之馬府君行狀曰託立言之君子而圖其不朽焉按左傳穆叔曰其次有立言雖久不廢此之謂不朽明牕淨几風日暖有愁萬斛才八斗晉書王羲之傳曰棐几滑淨庾信愁賦曰且將一寸心能容萬斛愁謝靈運云天下才共有一石曹子建獨得八斗徑須脱帽管城公脱帽謂去其管弢也退之毛穎傳秦始皇封諸管城號管城子後因進見上將有任使拂拭之因免冠謝云云小試玉堂揮翰手史記孫武傳曰可以小試勒兵乎歐公詩收取玉堂揮翰手卻來南畝把鋤犂次韻晁無斁除日書懷世學違從衆老杜詩困學違從衆名家最近天老杜自注其詩曰俚語云城南韋杜去天尺五又詩陽闗已近天感時猶壯志得句起衰年老杜詩感時花濺涙乂詩湯休起我病微笑索題詩又詩為報各衰年袁酒無何飲史記袁盎傳盎為吳相兄子種説以日飲無何陶琴不具弦陶琴見前注樂天詩周易休開卦陶琴不上弦平生揮翰手㡬見絶韋編史記孔子世家曰孔子讀易韋編三絶次韻無斁雪後二首閉閤春雲薄開門夜雪深閉閤見前注江梅猶故意故意事借用范雎事湖鴈起歸心隋薛道衡詩曰人歸落鴈後思發在花前草潤留餘澤牕明度積陰老杜詩輕鳥度層陰又云積陰帶奔濤慇懃報春信屋角有來禽老杜詩百舌來何處重重只報春又詩紅稠屋角花尚書故實云王内史有求來禽帖來禽言味甘來衆禽俗作林禽此借用其字耳取性無通介隨時有異同魏志徐邈傳或問盧欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先崔季珪用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣傚而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也東坡詩亦云通介寧隨薄俗移雪餘葢地白退之詩榆莢車前葢地皮春淺著梢紅樂天詩今年春淺游人少杜黙詩春著花梢猶半紅寄食虛長算魏衍注云時先生寄婦翁郭㮣大夫曹州使宅晁時為州教官論詩闕近功上句用韓信事見前注長算亦見前注相看不相棄賴有古人風魏志毛玠傳太祖賜以素屏風素憑儿曰君有古人風故賜君古人之服贈魏衍三首當是自曹暫還徐所作妙年文墨秀儒林老眼今晨得再明文選陳思王表曰終軍以妙年使越漢書有儒林傳歴塊過都聊可待老杜詩歴塊過都見爾曹事見前注未須回首一長鳴鹽鐵論曰騏驥負鹽車垂頭于太行之阪見伯樂則噴而長鳴退之詠馬詩不知何故翻驤首牽過關門妄一鳴崔蔡論文不足過劉禹錫序栁子厚集曰韓退之評其文雄深雅健似司馬子長崔蔡不足多也案後漢崔瑗蔡邕皆能文新詩平處到陰何唐書孟郊傳云李觀論其詩曰髙處在古無上平處下顧二謝老杜詩頗學陰何苦用心按南史陰鏗何遜皆能詩寧須萬户權輕重杜牧之詩曰誰人得似張公子千首詩輕萬户侯史記律書云世闇于大較不權輕重不待千篇一已多世説衛玠嘲阮宣子曰一言可辟何假于三宣子曰茍是天下之望亦可無言而辟復何假一南史陸瓊傳曰此兒必荷門基所謂一不為少此並用其意敏捷為文筆不休老杜詩敏捷詩千首魏文帝典論云下筆不能自休何妨縮手小遲留縮手見前注名駒已自思千里宋書髙祖曰謝方明可謂名家駒魯連子徐刦言于田巴曰刦弟子魯温年十二然千里駒也老子終當讓一頭歐公與梅聖俞書云讀蘇軾書不覺汗出快哉快哉老夫當避路放出一頭地也贈寇國寳三首承家從昔如君少得士于今孰我先易曰開國承家老杜詩承家節操尚不泯又云文章並我先口擬説詩心已解世間快馬不須鞭傳燈録外道問佛不問有言不問無言世尊良久外道讚歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛云外道有何所證而言得入佛云如世間良馬見鞭影而行樂府梁朝歌曰快馬不須鞭往嵗黄童今寇君髙文要學亦多聞後漢黄香傳京師號曰天下無雙江夏黄童此借用以比黄預又寇恂傳潁川百姓遮道曰願從陛下復借寇君一年此借用以比國寳留年看舉天南翼韓鄂四時纂要曰鹿骨酒久服長骨留年莊子曰鵬之背不知其㡬千里也怒而飛其翼若垂天之雲是鳥也海運則將徙于南溟南溟者天池也過目先空冀北羣退之送温造序云伯樂一過冀北之野而馬羣遂空虎子墮地氣食牛尸子曰虎豹之駒雖未成文已有食牛之氣老杜詩小兒五嵗氣食牛魯直詩渥洼麒麟兒墮地志千里雀兒浴處魚何求退之詩云蝦蟆跳過雀兒浴此縱有魚何足求可奈我衰才亦盡南史丘靈鞠傳王儉曰丘公仕宦不進才亦退矣又江淹任昉人皆謂之才盡正須二子與同遊謂黄寇二君次韻春懷老形已具臂膝痛此借用彭越傳反形巳具之語林逋詩覽照光巳具開樽人更稀春事無多櫻筍來老杜詩溪邊春事幽樂天詩百年夜分半一嵗春無多韓偓櫻桃詩注曰秦中謂三月為櫻筍時輦下嵗時記曰四月自堂㕑至百司㕑通謂之櫻筍廚敗絮不温生蟣蝨敗絮見前注漢書嚴安曰介胄生蟣蝨大杯覆酒著塵埃晉元帝紀帝頗以酒廢事王導以為言帝命酌引觴覆之于此遂絶陶淵明傳曰塵爵恥虚罍衰年此日長為客舊國當時只廢臺老杜至日詩年年此日常為客又登髙詩萬里悲秋常作客百年多病獨登臺后山所指謂徐州戲馬臺也河嶺尚堪供極目文選王粲登樓賦平原逺而極目兮蔽荆山之髙岑少年為句未須哀王介甫詩意氣未宜輕感慨文章尤忌數悲哀河上背水連漁屋背水借用韓信事老杜詩漁屋架泥塗横河架石梁唐人羊士諤詩行披煙杉入激瀾横石梁窺巢烏鵲競雀巢多為烏所窺奪過雨艾蒿光老杜詩庭幽過雨霑東坡樂府云日暖桑麻光似潑風來蒿艾氣如薫鳥語催春事牕明報夕陽退之送孟郊序云以鳥鳴春南部煙花録陳後主詩夕陽如有意偏傍小牕明老杜詩人扶報夕陽還家慰兒女歸路不應長時自徐還曹題柱二首并序永安驛廊東柱有女子題詩云無人解妾心日夜長如醉妾不是瓊奴意與瓊奴類讀而哀之作二絶句桃李摧殘風雨春楊炯少姨廟記曰古木摧殘尚辨三花之樹天孫河鼔隔天津史記天官書織女天女孫也爾雅河鼔謂之牽牛晉志曰天漢起東方經尾箕之間謂之漢津古樂府華山㡬曰隔津歎牽牛語織女離淚溢河漢陸系有所思曰只看今夜裏那似隔天津主恩不與妍華盡樂天後宫詞曰紅顔未老恩先斷斜倚熏籠坐到明或作王建宫詞何限人間失意人士不遇多矣何獨女子哉劉禹錫咏古詩曰一朝復得幸應知失意人從昔嬋娟多命薄東坡詩自昔佳人多命薄如今歌舞更能詩麗情集元載寵姬薛瑤英能詩書善歌舞孰知文雅河陽令文選夏侯常侍誄曰俗疵文雅李善注引大戴禮曰天子不知文雅之辭晉書潘岳為河陽令不削瓊奴柱下題青瑣髙議載瓊奴姓王氏王郎中幼女父死失身于趙奉常家為主母凌辱道出淮上書其事于驛壁見者哀之王平甫為作歌云蠅虎物微趣下世不數老杜詩物微世競棄又詩人物世不數后山此篇蓋有所指隨力捕生得稱虎唐書安禄山與史思明俱為捉生東坡詩牕間守宫稱蠍虎匿形注目搖兩股史記越世家曰鷙鳥之撃也必匿其形卒然一擊勢莫禦卒然及莫禦字皆見孟子十中失一八九取周禮醫師十全為上十失一次之吻間流血腹如鼔元稹詩腹脹看成鼔卻行奮臂吾甚武漢書猶卻行而求及前人史記殷紀湯曰吾甚武故稱武王明日淮南作端午言恃勇而不知及禍也世傳淮南王安万畢術云以五月五日取蠅虎杵汁拌豆豆自踴躍可以擊蠅陶朱公廟史記曰范蠡變名姓適齊為鴟夷子皮之陶為朱公陶即定陶今曹州濟陰縣乃其地也千篇奏牘謾多知史記東方朔至公車上書凡用三千奏牘老杜鸚鵡詩紅觜謾多知百戰收功未出竒孫子曰百戰百勝非善之善也史記白起贊曰料敵合變出竒無窮此兩句言陶朱公智勇雖多猶未足道要以身退為勝耳名下難居身可辱史記越世家范蠡以為大名之下難以久居乗舟浮海變姓名自為鴟夷子皮耕于海畔苦身戮力父子治産魯論栁下恵少連降志辱身矣卻將湖海換西施湖海當為越國分封之地國語范蠡反至五湖辭于王曰臣不復入越國矣王曰子聴吾言與子分國不聴吾言身死妻子為戮蠡曰君行制臣行意遂乘輕舟以浮于五湖杜牧之詩云西子下姑蘇一舸逐鴟夷次韻晁無斁夏雨咫尺隔山海晉書王我傳嘗經黄公酒壚下曰今日視之雖近邈若山河樂天詩嬾慢不相訪隔街如隔山作書問如何老杜詩道甫問訊今何如蟻垤既畜糧蛙窟如鳴鼉淮南子曰蟻知為垤鳴鼉見前注張籍詩天欲雨有東風南溪白鼉鳴窟中積暑復一雨斧斫仍手摩斧斫手摩本俗間語鉤牕欲懸麻老杜詩雨腳如麻未斷絶出門已横河晉傅𤣥雨詩曰湍深激牆隅門庭若決河人言月離畢未必致滂沱史記有若傳孔子既沒弟子思有若狀似孔子立為師問曰孔子當行使弟子持雨具巳而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離于畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨有若不能對后山意亦謂今夏之雨非必以月離畢所致東臯繁草木蘭艾不同科此亦法華經一雨所潤而諸草木各有差别之意淵明歸去來辭曰登東臯以舒嘯南史鮑照曰丈夫豈可遂藴智能使蘭艾不辨老杜詩喧静不同科字本出魯論驚魚畏宻罟孟子注曰數罟宻網也獨鳥鳴南柯何遜詩獨鳥赴行查老杜詩獨鳥怪人看異聞集載南柯夢事蓋古槐南枝也稍無蟲飛喧復覺蟬語多因聲作好惡與物殊未和樂天聞早鶯詩云鳥聲信如一分別在人情臥聞夜來雨歸種故山禾老杜詩不意逺山雨夜來復何如百年須下澤後漢馬援傳援謂官屬曰吾弟少游嘗哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款段馬為郡掾吏守墳墓鄉里稱善人斯可矣萬里付長羅漢書常恵䕶烏孫兵擊匈奴克獲封長羅侯先生斷百好尚以詩作魔樂天詩惟有詩魔降未得每逢風月一閒吟傳燈録兗州降魔禪師傳秀師問曰汝翻作魔耶縮子萬言手聴渠七字哦太白與韓荆州書云日試萬言􅀝馬可待縮手見前注退之詩夜夢神官與我言羅縷道妙角與根壯非少者哦七言六字常語一字難語一作言室邇人則逺詩云其室則邇其人甚逺燕黙勞者歌文選謝叔源詩曰悟彼蟋蟀唱聴此勞者歌注韓詩曰伐木廢則朋友之道缺勞者歌其事思君得老瘦文選古詩曰思君令人老嵗月忽已晚老杜詩所向泥活活思君令人瘦觸熱生積疴言思君欲往又畏暑而不能行也老杜詩觸熱生病根後漢竇融傳曰是生積疴不能遂瘳寄無斁敬問晁夫子官池㡬許深文選夏侯湛東方朔畫贊曰敬問墟墳長沙法帖有云王珉敬問官池見前注已應飛鳥下列子曰海上之人有好漚鳥者每旦之海上從漚鳥遊漚鳥之至者數百而不止其父曰吾聞漚鳥皆從汝遊汝取來吾玩之明日之海上漚鳥舞而不下此詩言飛鳥下以見無斁忘機之意漢昭帝紀黄鵠下建章宫太液池復作卧龍吟晉書習鑿齒傳曰西望隆中想卧龍之吟按蜀志諸葛亮傳亮躬耕隴畆好為梁父吟徐庶謂先主曰諸葛孔明者臥龍也此詩借用以言無斁髙臥吟嘯要非池中物也老杜詩風雨時時龍一吟待我中疴愈魯直詩百疴從中來同君把臂臨老杜詩臨江把臂難再得泥塗無去馬退之書云泥水馬弱不敢出不果鞠射親問而以書悚息尤深老杜詩去馬來牛不復辨夏木有來禽唐王摩詰詩云陰陰夏木囀黄鸝此引用以寄鶯鳴求友之意來禽見前注次韻别張芸叟中年為别更堪頻中年别見前注四海為家託一身老杜詩有無家别此别時須問生死孰知詩力解窮人老杜詩此别還須各努力漢書蒯通傳曰使人候問其死生退之詩行當掛其冠生死一相訪詩窮見前注宿深明閣二首窈窕深明閣晴寒是去年老將災疾至樂天詩性將時共背病與老俱來災疾見前注人與嵗時遷此句屬魯直紹聖初言者以神宗實録多失實召魯直至陳留問狀因寓佛寺題其所居為深明閣自此遂謫黔中老杜詩甘與嵗時遷黙坐元如在退之詩黙坐念語笑元如在謂神交心契如在其前孤燈共不眠文選謝惠連詩孤燈曖幽幔老杜詩燈影照無睡又詩不眠瞻白暮年身萬里賴有故人憐魯直與張叔和書云某至黔州將一月矣曹守張倅相待如骨肉時曹譜伯達守黔中張兟茂宗作倅皆京洛人老杜詩鏡中衰謝色萬一故人憐縹緲金華伯人間第一人金華伯謂魯直按葛洪神仙傳云黄初平年十五家使牧羊有道士將至金華山居石室中四十餘年其兄初起行索初平初平叱羊白石皆起成羊文選海賦云神仙縹緲劇談連晝夜史記淳于髠傳一語連三日三夜無倦世説衛玠與謝琨達旦微言因病篤應俗費精神應俗見前注老杜詩應接喪精神退之詩可憐無益費精神按揚雄解嘲曰但費精神于此而煩學者于彼時要平安報老杜詩夕烽來不近每日報平安反愁消息真老杜詩反畏消息來寸心亦何有又云難知消息真牆根霜下草又作一畨新此句蓋有所指退之詩曰白露下衆草蕭蕭共憔悴青青西牆下已復生滿地又詩牆根菊花可沽酒東山謁外大父墓土山宛轉屈蒼龍下有槃槃葢世翁槃槃見前注漢書項羽傳力拔山兮氣葢世萬木刺天元自直文選張平子南都賦曰森䔿䔿而刺天叢篁侵道更須東老杜詩叢篁低地碧樂天古原草詩曰逺芳侵古道齊民要術曰竹性愛西南引諺云東家種竹西家治地此言更須東謂自已侵道不須復東引也百年富貴今誰見一代功名託至公龎丞相墓誌銘蓋司馬温公所作曽子固謝歐陽舎人譔先大父誌銘書曰後之作銘者茍記之非人則書之非公與是不足以行世而傳後少日拊頭期類我文選沈約詩平生少年日後漢呉祐傳父恢拊其首曰吳氏世不乏季子矣揚子曰螟蛉之子殪而逢果臝曰類我類我久則肖之矣拊頭字見魏志劉廙傳暮年垂淚向西風王介甫詩暮年垂淚對桓伊次韻晁無斁冬夜見寄寒牕冷夜欲生塵短枕長衾卻自親按唐書讓皇帝傳𤣥宗友悌嘗製大衾長枕將與諸王共之后山意謂索居離羣衾枕特自親而巳老子形骸從薄暮此句后山自道後漢馬援傳頗哀老子使得遨遊文選豫章行曰促促薄暮景亹亹鮮克榮李善注云景之薄暮喻人之將老也先生意氣尚青春此句以屬無斁文選潘尼贈陸機詩予涉素秋子登青春李善注云素秋喻老青春喻少也覆杯不待回丹頰言不借紅于醉面也覆杯見前注危坐猶能作直身後漢書茅容避雨樹下危坐愈恭孟郊詩煖得曲身成直身城郭山林兩無得暮年當復㡬霑巾言出處皆不如志可為流涕也歐公集古録跋韓退之題名曰謂著山林與著城郭無異等語宜為退之之言案今世所傳退之與大顛書云苟非所戀著則山林閒寂與城郭無異寒夜有懷晁無斁同好共城郭十日不一顧老杜詩可恨鄰里間十日不一見顔色人事雖好乖淵明答龐㕘軍詩序曰人事好乖便當語離吾生亦多忤老杜詩人事多錯迕與君永相望闔門對妻子嵗月不可度文選曹子建表曰四節之㑹塊然獨處左右惟僕隸所對惟妻子髙談無所與陳發義無所與展老杜詩劍南嵗月不可度漢書谷永傳曰闔門髙枕閉目寧用遮言廢書不觀也傳燈録僧問藥山何故看經山云且圖遮眼停杯仍下筯言雖止酒尚能強飯李太白詩停杯投筯不能食抜劍四顧心茫然何曾日食萬錢猶言無下筯處獨無區中縁區中縁見前注又李太白詩曰杳無區中縁永懷岩下趣老杜詩盛論岩中趣平生三徑資安得一朝具三徑資見前注萬里初歴塊前驅告曛暮言出仕未㡬而遽得罪謝靈運詩朝遊窮曛黒歸懷屬有思退之秋懐詩丈夫屬有念事業無窮年棄世不待怒莊子曰夫欲免為形者莫如棄世棄世則無累老境厭逶遲人情費將䕶禮記六十曰耆指使疏引賀㻛云耆至也至老之境也文選江淹别賦曰車逶遲于山側注云逶遲少留貌向來張長公吾亦從兹去漢書張釋之傳子摯字長公官至大夫不能取容當世遂不仕漢髙祖紀曰吾亦從此逝矣燈花頻作喜老杜詩燈花何太喜月色正可步老杜詩思家步月清宵立豫恐何水曹明朝有新句梁何遜為水部除夜七十已強半所餘能㡬何退之詩年皆過半百來日苦無多老杜詩百年能㡬何唐摭言崔櫓梅花詩云強半瘦因前夜雪懸知暮景促懸知見前注栁子厚書曰長來覺日月益促嵗嵗更甚更覺後生多老杜詩所謂坐深鄉里敬遯世名為累易曰遯世无悶老杜詩疎嬾為名誤退之詩士生為名累留年睡作魔盧仝守嵗詩曰年去留不住年來也任他石曼卿詩曰巳為物象添詩瘦更被春陰長睡魔作魔見前注西歸端著便著便見前注老子不婆娑晉書陶侃傳曰老子婆娑正坐諸君輩王述亦曰致仕之年不為此公婆娑之事后山詩注巻五
