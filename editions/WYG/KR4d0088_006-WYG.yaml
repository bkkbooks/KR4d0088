body:
  text: 后山詩注巻六宋陳師道撰任淵注寄鄧州杜侍郎紘南陽老幼如雲屯連日城東候使君南陽即鄧州陸士衡詩胡馬如雲屯後者排前旁捷出退之楊燕竒碑文曰乘機應㑹捷出神怪爭先見面作慇懃退之與李渤書曰若景星鳯凰之始見爭先覩之為快六年重來巳白髮一日再見回青春道傍過者怪相問按實録元祐五年正月直祕閣杜紘知鄧州自此六年而再至老杜詩道傍過者問行人共言杜母真吾親後漢杜詩傳遷南陽太守人方于召信臣故為之語曰前有召父後有杜母使君雖老心尚壯後漢馬援言老當益壯文采風流諸謝上老杜詩文采風流今尚存諸謝謂江左謝氏名家從昔杜陵人老杜詩名家無出杜陵人盛徳于今丈人行漢書蘇武傳曰漢天子我丈人行也我昔臥病老彭城畫船鳴鼔千里行致書饋奠初未識饋奠當是后山居憂時丁寧勞苦如平生漢書張耳傳曰勞苦如平生歡人言此事今未有古人中求還得否晉書王衍傳晉武帝問王戎曰夷甫當世誰比戎曰當從古人中求耳南史張緒傳王儉嘗云緒過江所未有北士可求之耳不知陳仲弓黄叔度能過之否乎忘年屈勢不虛辱公取為徳吾何取公取之取一作自忘年友見前注退之書曰厚意不可虛辱此借用漢書韓信傳曰公小人為徳不竟老杜詩賢者貴為徳菊潭之水甘且潔潭上秋花照山白請公酌此夀百年後漢書郡國志注引荆州記曰菊水源旁悉芳菊中有三十家飲此水上夀百二十三十中夀百餘奕奕長為此邦伯廣雅曰藹藹奕奕盛貌文選陸士衡贈馮文羆詩云奕奕馮生神仙傳王逺導從威儀奕奕如大將軍老杜同元使君舂陵行序曰得結輩十數公落落然參錯天下為邦伯孰先一州後四方退之送陸歙州序曰或謂先一州而後天下豈吾君吾相之心哉重金疊葢登廟堂歸田録國朝兩府金帶佩魚謂之重金春明退朝録國初兩制出入重戴請從今日至雲來月三十斛輸洛陽爾雅𤣥孫之子為來孫仍孫之子為雲孫荆州記曰菊水極廿馨漢司空王暢太傅袁隗為南陽令縣月送三十餘石杜君濮州鄄城人後徙洛陽寄提刑李學士石渠金馬青雲上言李君嘗為館職班固兩都賦序曰内設金馬石渠之署東里西門濟水邊東里子産西門豹皆古循吏今以比李君濟水邊言其持節于鄉部也上冢過家真樂事後漢岑彭傳有詔過家上冢平時持節貴當年言其未老也文選韋𢎞嗣博奕論曰君子恥當年而功不立成家舊學諸儒問漢書司馬遷傳曰成一家言脱手新詩萬口傳東坡詩云新詩如彈丸脱手不暫停又云詩句明朝萬口傳范叔一寒今若此相逢猶得故人憐並見前注寄杜擇之后山自注云杜寄惠近詩詩家兩杜昔無鄰文采風流世有人魯直詩云詩家二杜見仍雲謂審言子美俱能詩也疾置送詩驚老醜漢書劉屈氂傳乗疾置以聞老醜見前注坐曹得句自清新漢書薛宣傳坐曹治事清新見前注興來不假江山助見前注目過渾如草木春李太白上裴長史書曰他人之文猶山無烟霞春無草樹李白之文光明洞徹句句動人又太白詩云令行草木春農馬智專吾不讓退之與于頔書曰伏䝉示詩云云昔齊君行而失道管子請釋老馬隨之樊遲請學稼孔子請問之老農夫馬之智不賢于夷吾農之能不聖于尼父且云爾者聖賢之能多農馬之智專故也今愈從事于文實專且久則其贊王公之能而稱大君子之美不為僣越也洛陽紙貴子能頻郭受寄杜員外詩云洛陽紙價頓能髙蓋用左思事而后山又為杜家事也次韻晁無斁春懷城郭朝陽散積陰郊原注目日青深老杜詩注目寒江倚山閣按呉志賀邵傳云北敵注目年衰鷗鷺如今是老杜詩身許麒麟畫年衰鷗鷺羣夢斷邯鄲何處尋見前注語鵲飛烏春稍稍重簾深院晚沈沈不辭枝履衝泥雪未有瓊琚報好音元稹詩冒雨衝泥黒地來詩云投我以木𤓰報之以瓊琚又云懷我好音寄晁無斁稍聴春鳥語叮嚀又見官池出斷氷老杜詩便覺鶯語太叮嚀雪後踏青誰與共盧公範饋餉儀曰三月三日上踏青鞋花間著語老猶能雪竇禪師頌古舉徳山到溈山法堂話著語云勘破了也老杜詩不堪驅使菊花前此反其意而用之笑談莫倦尋常聴山院終同一再登今日已知他日恨搶榆況得及飛騰莊子逍遙遊篇鵬之徙于南溟也水擊三千里摶扶摇而上者九萬里蜩與鸒鳩笑之曰我決起而飛搶榆枋時則不至控于地而已矣奚以之九萬里而南為老杜詩飛騰無奈故人何别寳講主此地相逢晩他方有勝縁樂天詩曾經減劫壞今遇勝縁修咒功先服猛髙僧傳天竺僧金剛仙掛錫清逺峽蛟螭作妖則誦呪以禁之周禮服不氏掌養猛獸而教擾之戒力得扶顛大莊嚴論云我昔聞諸比丘入海採寳船舫破壞有一年少比丘捉得一板便説偈云云于時海神感其精誠即接少年置于岸上合掌曰比丘我今歸依堅持戒者扶顛見魯論暫息三支論髙僧傳優婆塞支謙者漢末遊洛受業于支亮亮受業于支讖世稱天下博知不出三支重參二祖禪后山自注云趙州臨濟皆曹人也夜牀鞋腳别何日著行纒尊宿云大修行人上牀即與鞋履為别此言著行纒蓋以人命呼吸須勸其早遊方參學也還里自曹歸徐曠士愛吾廬遊子悲故鄉謂淵明之曠達髙祖之英雄皆不能無鄉里之念事並見前注鮑照詩小人自齪齪安知曠士懷慷慨四方志老杜詩丈夫四方志老衰但悲傷長歌行少壯不努力老大徒悲傷虚名自成誤老杜詩多為才名誤失得略相當退之詩得失相乘除得少失有餘後漢書匈奴傳論曰寇雖破折而漢之疲耗略相當矣暮年還家樂未覺道里長太白蜀道難曰錦城雖云樂不如早還家后山前有詩云還家慰兒女歸路不應長閭里喜我來車馬塞康莊老杜詩鄰舎喜我歸沽酒攜葫蘆選詩鞍馬塞衢路史記荀卿傳開第于康莊之衢爭前借言色後漢馬后傳曰假借温言東坡奏疏云臣嘗疾程頤之奸未嘗假以辭色草木亦晶光老杜瘦馬詩失主錯莫無晶光向來千人聚見前注一老獨徜徉后山自謂也詩云不憖遺一老俾守我王退之盤谷序云終吾生以徜徉手開南陽阡松柏鬱蒼蒼紹聖二年七月后山𦵏其兩親于彭城大父之兆次至是三年矣故此詩有南陽阡之語漢書原涉傳涉父為南陽太守父死涉大治起冢舎買地開道立表署曰南陽阡選詩鬱鬱澗底松永願守一丘謂守先人丘墓也老杜詩永願坐長夏脱身萬里航漢書髙帝紀脱身去間至軍萬里航言世路風波也平生功名念倒海浣我腸太白詩倒海索明月史記扁鵲傳湔浣腸胃款段引下澤斷弦更空觴並見前注空觴用晉元帝事尚恐北山南有文移路傍南齊周顒字彦倫隠于鍾山後應詔出為海鹽令欲過北山孔稚圭假山神之意作北山移文以卻之其文見于文選答魏衍黄預勉予作詩我詩短淺子貢牆衆目俯視無留藏前漢書孔光傳曰智謀淺短老杜詩目短曹劉牆句中有眼黄别駕黄魯直謫涪州别駕魯直自評元祐間字云字中有筆猶禪家句中有眼又六言詩云拾遺句中有眼洗滌煩熱生清涼老杜詩洗滌煩熱足以寧君軀又詩清涼破炎毒人言我語勝黄語扶豎夜燎齊朝光后山答秦覯書言之詳矣晉書王述傳謂子坦之曰人言汝勝我定不及也庭燎詩云夜如何其夜未史庭燎之光老杜詩朝光入户牗三年不見萬里外安得奮身置汝傍時魯直在黔中退之詩三年不見兮使我心苦老杜詩安得送我置汝傍邇來諸子復秀發曾未㡬見加端章諸子謂魯直兒姪詩云未㡬見兮突而弁兮魯論端章甫注謂衣𤣥端冠章甫剰欲摧藏讓頭角選詩扶風歌曰抱膝獨摧藏豈是有意羣兒傷退之詩不知羣兒愚那用故謗傷于人無怨我何憾何一作亦言不必畏謗傷而退讓也有作魯直傳者曰公胸中恢疎初無怨恩按晉書安平獻王孚傳曰未嘗有怨于人愛者尚衆猶吾鄉后山言鄉士同臭味者如魏衍黄預輩皆愛黄詩安知他鄉無人哉平生不自解嘲誚漢書揚雄有解嘲禍來亦復非周防言遷貶之禍出于意外老杜病馬詩當時歴塊誤一蹶委棄非汝能周防我衰氣索不自振正賴好語能恢張漢書孫寳傳侯文怪寳氣索選詩酒酣氣益振智論曰諸外道中設有好語如蟲蝕木偶然成文文選皇甫謐三都賦序曰並務恢張其文博誕空類詩家小魏新有聲新有聲詩見前注舊傳秀句西里黄西里當是黄預所居後生學行闕師友臨路不進空迴遑鮑照放歌行曰今君有何疾臨路獨遲迴魏志夏侯尚傳注曰許允欲往見大將軍臨出門迴遑不定看君事業青雲上聴渠螟􅀈生膏肓青雲上用范雎事大田詩注曰食心曰螟食葉曰螣恒害田中之稚禾此引用以譬後生不親師友自賊其良心也膏肓見第一巻注老柏三首有序勝果院後庭有柏見之二十年矣疎瘦如故余寓其舎數以水溉之遂有生意庭柏無生意摧殘二十秋老杜詩羣橘少生意按晉書殷仲文傳文顧大司馬府中老槐歎曰此樹婆娑無復生意稍霑杯水潤莊子覆杯水于坳堂之上已與嵗寒謀言已作千嵗計也嵗寒見魯論黄裏青青出黄裏見前注王建新移小竹詩云嫩緑巻新葉殘黄收故枝莊子曰受命于地惟松柏獨也在冬夏青青愁邊稍稍瘳愁邊見前注退之逺遊聨句云外患蕭蕭去中悒稍稍瘳會看笙鶴下老杜詩人傳有笙鶴時過此山頭按列仙傳王子喬好吹笙作鳯鳴七月七日乘白鶴駐緱氏山頭暮雀莫深投老杜詩暮雀意何如退之枯樹詩依投絶暮禽英姿帶枯槁勁節闕和柔范氏後漢書二十八將論曰英姿茂績委而勿用漢書霍去病以和柔自媚于上物理有興壞人情成去留老杜詩物理固自然漢書司馬遷傳曰稽其成敗興壞之理文選嵇康琴賦曰委性命兮任去留后山嘗作修佛殿記云物有盛衰人有向背向盛背衰人則逐物雖然向則盛背則衰物亦有賴于人焉稍看棲鳥集聊待晩風秋解道庭前柏何曾識趙州僧問趙州和尚祖師西來意州云庭前柏樹子又有老宿忽拈拄杖謂僧曰要識趙州麽這裏是趙州嵗月􅄼能託風霜亦飽經老杜詩老樹飽經霜槁乾仍故節退之韓洪碑銘曰槁乾四呼終莫敢濡齊已松詩云蠧依乾節死蛇入朽根盤潤澤出新青潤澤字出孟子劉禹錫竹詩曰新青排故葉色與江波共老杜梔子詩無情移得汝貴在映江波聲留静夜聴王建新移小竹詩云色經寒不動聲與静相宜輝輝垂重露㸃㸃綴流螢以露比流螢此體謂之影對如無可詩云聴雨寒更静開門落葉深以落葉比雨聲也又曰微陽下喬木逺燒入秋山以微陽比逺燒也老杜螢詩曰偶經花蘂㺯輝輝又詩曰日暮拾流螢魏衍見過暑雨不作涼爽風秪自髙大車詩秪自塵兮我老亦衰疾奈此正鬱陶尚書鬱陶乎予心魏侯有新語髙處近風騷隠几聆五字未覺歴日勞老杜詩劣于漢魏近風騷呉志吕䝉傳治土山必歴日乃成灑然墮冰井薛瑩後漢書靈帝光和六年冬北海琅琊井冰厚丈餘又晉庾倏有冰井賦言藏氷也起粟豎寒毛趙飛燕外傳夜雪露立體亡軫粟東坡雪詩凍合玉樓寒起粟髙僧誌僧會傳趙繡見塔放光肅然毛豎晉書夏紘傳曰聞君之談不覺寒毛盡戴誌一作康三山已在目世説苟中郎登北固望海云雖未覩三山便使人有凌雲之意老杜詩青山若在眼後漢馬援傳曰虜在吾目中矣萬象誰能逃文選頭陀寺碑曰萬象已陳李善注引孝經鈎命決曰地以舒形萬象咸載東坡詩萬象起滅無逃形歴險見絶足家語曰歴險致逺馬力盡矣魏文帝與孫權書中國信多馬其知名絶足亦少老杜詩逸羣絶足信殊傑過口味豚膏歐公詩云更吟君句勝啗炙周禮庖人注云膏臊豕膏也願為夏雷鳴退之送孟東野序云以雷鳴夏莫作飢鳶號南史曹景宗傳曰箭如餓䲭叫東坡讀孟郊詩曰何苦將兩耳聴此寒蟲號次韻螢火年侵觀物化共被嵗時催陸機詩後途隨年侵韓詩注曰春女思秋士悲感其物化也莊子曰且吾與子觀化而化及我熠熠孤光動翩翩度水來東山詩注曰熠熠燐也燐螢火也文選鴈詩單泛逐孤光樂天詩獨立棲沙鶴雙飛照水螢稍能穿幔入已復受風回老杜螢詩隨風隔幔小又詩輕燕受風斜投巻吾衰矣言廢書也按晉書車𦙍貧無燈火以絹嚢盛螢火以照書夜讀微吟子壯哉文選魏文帝燕歌行曰短歌微吟不能長次韻夏日江村漏屋簷生菌臨江樹作門荀子曰隠于窮閻漏屋捲簾通燕子老杜詩簾户每宜通燕子織竹護雞孫老杜催宗文樹雞柵詩云織籠曹其内令入不得擲我寛螻蟻遭彼免狐貉厄退之詩云那暇更護雞窠雛按後漢髙鳯傳妻令鳯䕶雞向夕微一作風涼進相逢故意存一作霑衣汗垢存淵明詩向夕長風起老杜詩樹濕風凉進漢書司馬遷傳曰汗未嘗不發背沾衣也何當加我嵗從子問乾坤孔子曰加我數年五十以學易可以無大過矣次韻觀月風雲隨落曰河漢欲回天詩云倬彼雲漢昭回于天魏文帝雜詩曰天漢回西流隔巷如千里謝莊月賦隔千里兮共明月還家已再圓選詩頽魄不再圓老杜詩羈栖愁見裏二十四回明此用其意簾疎分細細江淨共娟娟老杜詩石瀨月娟娟他日吾何適聴詩説去年退之詩元日新詩巳去年次韻夏日江上雙峰一草堂門閒心静自清凉老杜詩萬里橋西一草堂詩書發冢功名薄莊子曰儒以詩禮發冢麋鹿同羣嵗月長見前注句裏江山隨指顧用張説事見前注劉禹錫詩相形面勢從指畫言下變化隨顧瞻樂天詩下韝隨指顧舌端幽渺致張皇舌端見韓詩外傳退之進學解曰張皇幽渺莫欺九尺鬚眉白老杜詩張公一生江海客身長九尺鬚眉蒼東坡詩錦里先生自笑狂莫欺九尺鬚毛蒼解醉佳人錦瑟傍老杜詩暫醉佳人錦瑟傍夏日有懷日一作夜臥念張居士當是負山居士張仲連後漢書馬援傳曰臥念少游平生時詩何可得也逃名老石根後漢書法真傳郭正稱之曰逃名而名不我避老杜詩老夫困石根學詩端得瘦本事詩李白戲杜甫云飯顆山前逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦識字即空樽老杜詩子雲識字終投閣又云巳畏空樽愁此言后山意謂無好事載酒以過子雲者鳴笛夜宜逺燈花曉更繁老杜詩頭白燈明裏何須花燼繁未須哀老子後漢書馬援為隴西太守諸曹時白外事援曰此丞掾之任何足相煩頗哀老子使得遨逰此借用也復守丘園前詩云西歸端著便老子不婆娑與此同意丘園見易賁卦送杜擇之兩父論詩伯仲間兩父謂杜審言子美皆能詩而擇之可為伯仲也文選魏文帝典論曰傅毅之于班固伯仲之間爾去思今識謝家安晉書謝安除吳興太守在官無當時譽去後為人所思世説注晉陽秋云諺曰大才槃槃謝家安揚州獨步王文度後來出人郗嘉賔曠懷亦苦中年别言謝安最號曠達而中年之别不免作數日惡也北史劉焯傳懷抱不曠歸翼仍愁行路難老杜詩歸翼㑹髙風古樂府有行路難四壁未堪風雨夕四壁見前注百圍已試雪霜寒莊子曰大木百圍之竅穴魯論曰嵗寒然後知松柏之後凋也欲逃富貴疑無地世説謝安在東山時兄弟巳有冨貴者劉夫人戲謂安曰大丈夫當不如此安捉鼻曰恐不免耳東坡詩長疑安石恐不免千丈竿頭試手看富貴則履危機故以尋橦為喻樂天贈牛思黯詩曰百尋竿上擲身難傳燈録長沙岑禪師偈曰百尺竿頭不動塵雖然得入未為真百丈竿頭須進步十方世界是全身又五洩山靈黙禪師云汝試下手看楊夫人挽詞元注云晁无咎母初説南奔道路長湖邊丹旐已飛揚南奔當是從无咎遷謫老杜詩丹旐飛飛日初傳發閬州樂天詩丹旐何飛揚素驂亦悲鳴百年積慶鍾連璧易曰積善之家必有餘慶南史陸暐與弟恭之並有時譽洛陽令見之歎曰僕以年老更覩雙璧此用以比无咎兄弟也晉書夏侯湛潘岳行止同輿京師謂之連璧此借用其字左傳曰天鍾美于是注云鍾聚也十念收功到淨方謂西方觀絳幔未經親宋母幔一作帳晉書韋逞母宋氏受其父周官音義後盧壺欲就宋氏家立講堂置生員百二十人隔絳紗幔而受業時稱韋氏宋母緑衣猶記識黄裳南部新書曰潘孟陽母劉晏之女問末坐緑衣少年何人曰補闕杜黄裳夫人曰此人全别必是貴人欲圖不朽須詮載退之馬府君行狀曰託立言之君子而圖其不朽焉不朽見古墨行注淵明飲酒詩序云紙行遂多辭無詮次今代誰堪著石章詛楚文曰敢數楚王熊相之背盟犯詛著諸石章柏山柏一作桓平江如抱貫秦洪雙嶺馳來欲並雄老杜詩清江一曲抱村流秦洪雙嶺皆在徐州漢書南粤王傳曰兩雄不並立兩賢不並世是物皆為萬世計老杜詩是物關兵氣賈誼過秦論曰始皇以為關中之固子孫帝王萬世之業也闔棺猶有一朝窮老杜詩曰丈夫蓋棺事始定而桓魋石槨竟不免發掘東坡守徐州時有遊桓山記言之詳矣韓詩外傳曰學而不已闔棺乃止林巒特起終有汙有一作為林巒雖秀拔竟坐桓魋為辱也東坡温泉詩幸免妃子汙老杜詩兵氣漲林巒文選西京賦曰隆崛崔崒李善注引埤蒼曰崛特起也美惡千年竟不空世間公論雖久而不泯也后山作温公挽詞亦曰若無天下議美惡倂成空尚有風流羊叔子稍經湔洗與清風后山自注云有東坡記刻石用羊叔子登峴山事以比東坡江山之辱賴此一洗也魯直詩我亦湔洗與清流劉禹錫詩東陽本是佳山水何況曽經沈隠侯答顔生煩君臨問我何堪漢書張禹傳車駕自臨問之剩欲從君十日談髙適詩尋經剰欲翻史記秦昭王遺平原君書寡人願與君為十日之飲世説謝胡兒語庾道季曰諸人暮當就卿談老退不應稱敏捷謂作詩樂天詩云多病長齋詩老退爭禁年少洛陽才老杜詩敏捷詩千首顔蒼寧復借紅酣謂止酒鄭谷詩衰顔酒借紅王介甫詩荷花落日紅酣世間公器無多取莊子曰名公器也不可多取樂天詩曰名為公器無多取句裏宗風卻飽參句中有眼見前注傳燈録道悟和尚傳曰師唱誰家曲宗風嗣阿誰又歸宗義柔禪師曰事須飽叢林陋巷逺孫還好學用顔氏事未容光禄擅東南南史顔延之傳云少孤貧居負郭好讀書無所不覽後為光禄勲又云江右稱潘陸江左稱顔謝送劉主簿羲仲羲仲字壯輿平生師友豫章公矻矻談君口不空豫章謂魯直退之答楊子書曰東野矻矻説足下不離口故不待相見相信已熟既相見不要約巳相親半面相看吾已了詩意見上句注中後漢應奉傳注奉嘗詣彭城袁賀賀時出行閉門造車匠于内開扇出半面視奉奉即委去後數十年于路中見車匠識而呼之魏志陳矯傳注文帝曰朕心故巳了連城增價子何窮史記秦昭王請以十五城易趙璧文選魏文帝與鍾大理書曰不損連城之價又廣絶交論曰顧盼増其倍價三千奏牘諸儒上用東方朔事見第二巻注四百菴寮一嵗中兩句言儒佛不相妨劉氏家于南康廬山之下山有三百六十菴詩意謂日遊一菴足了一嵗欲其徧歴叢林也杜牧詩南朝四百八十寺多少樓臺烟雨中此借用二父風流皆可繼謗禪排道不須同羲仲蓋道原之子凝之之孫二父皆排訾釋老故后山勸以惟此兩事不必同先世也東坡題黄魯直所作劉咸臨墓誌銘後云咸臨不喜佛其父道原尤甚咸臨名和叔即羲仲之弟晉書庾峻傳蘇林曰君二父孩抱經亂獨至今日此借用觸目溪響飢魚食川明柱影斜驚禽穿宻竹噪鵲立浮查談苑載僧行肇詩云聴錫樵停斧窺禪鳥立查老杜詩故立浮查替入舟谷暗山藏雨林喧雀啅虵鄉閭等行路何處更為家言雖居鄉亦無生理也晚望黑雲映黄槐更著白鳥度何遜詩夕鳥已西度蟬鳴不餘力史記虞卿傳曰秦不遺餘力矣蛙腹能許怒韓非子曰越王慮伐呉欲人之輕死也出見怒蛙乃為之式曰為其有氣力故也退之月蝕詩曰弊蛙拘送主府官帝箸下腹嘗其皤許謂如許稱目有佳思側徑無好步謝靈運詩側徑既窈窕俗諺謂速行無好步興來成獨往獨往見前注又淮南王莊子要略曰江海之士山谷之人輕天下細萬物而獨往意得誰與賦晉書郭璞客傲曰忘意非我意意得非我懷世説庾子嵩作意賦從子文康曰若有意耶非賦所能盡若無意耶復何所賦答曰正在有無之間送髙推官先王鍾舊徳先王謂武烈韓王髙瓊澶淵之役勲徳最著大府冠羣能老杜詩大府才能會過手無難事逢人有異稱人人皆稱其有異能也東坡謝奬論表曰累忝優寄卒無異稱按風俗通曰封祈遷陵長治無異稱薦賢餘一鶚言不為當世所知夙記契千燈金剛經云然燈佛與我受記作是言汝于來世當得作佛維摩經云無盡燈者譬如一燈然千百燈看挽秦梁纜頭頭數不勝秦梁即秦洪也晉鄧攸有惠政罷郡曰人入水攀其船不忍别此云頭頭數不勝言挽留者之多也漢書張耳傳頭㑹箕斂注曰吏到其家人頭頭數出穀以箕斂之和黄預感秋宿雲䕶朝霜秋陽佐殘暑退之詩宿雲寒不捲李嘉祐詩斜漢初過斗寒雲正䕶霜韓偓詩雲䕶鴈霜籠曉月雨連鶯曉落殘梅蠅癡驅復來退之詩癡如遇寒蠅又送窮文曰蠅營狗茍驅去復還汗下拭莫禦世説何平叔美姿面魏文帝疑其傅粉夏月令食湯餅汗出以巾拭之轉皎白也庭梧自黄隕風過成夜語詩曰桑之落矣其黄而隕古樂府云中庭有樹自語梧桐推枝布葉幸是可憐生晉書孫綽種一株松常自守䕶鄰人謂之曰樹子非不可憐但永無棟梁日耳此借用以言庭梧也傳燈録忠國師曰幸自可憐生胡然遽如許言搖落之速詩云胡然而天也後漢左慈傳老羝人言曰遽如許黄生多新詩如盆繭抽緒歐公詩問其别後學初若繭緒抽按文選張茂先詩將抽厥緒禮記曰夫人繅三盆手唱髙難欸乃宋玉對楚王問曰其曲彌髙其和彌寡元結集有欸乃曲欸音襖乃音靄掉船聲也栁子厚詩欸乃一聲山水緑雋永得㕮咀漢書蒯通傳通論戰國時説士權變亦自序其説號雋永注肥肉也言其論甘美而義味深長也本草序例曰凡湯酒膏藥舊云㕮咀者禹錫云即細切之意㕮音父此引用以言藥劑之寡味雋永安得比之意合無古今漢書鄒陽傳意合則骨肉為兄弟選詩云誰謂古今殊異代有同調投暗有迎拒鄒陽傳又曰明月之珠夜光之璧以暗投人于道衆莫不按劍相昐名成弟子韓黄預從學于后山老杜贈曹霸詩曰弟子韓幹早入室價重先生褚謂預詩可髙紙價也退之毛穎傳曰穎與會稽褚先生友善意謂紙也向來得斯人孰謂予齟齬韻書曰齒不正曰齟齬楚辭曰圓鑿而方枘兮吾固知齟齬而難入晚炊鄰僧米退之寄盧仝詩至今鄰僧乞未送晝拾狙公芧莊子狙公賦芧曰朝三而暮四衆狙皆怒老杜詩嵗拾橡栗隨狙公兩句皆言預之貧甘酸皆適口霜黄皆登俎言預未見用于世如黄柑未包貢以登于俎也世説魏武帝令曰前有大梅林饒子甘酸淮南子曰此皆不快于耳目不適于口腹老杜詩登俎黄甘重門有曲逆車漢書陳平傳以席為門多長者車轍平後封曲逆侯謗甚北山女楚辭抽思曰好姱佳麗兮析獨處此異域既惸獨而不羣兮又無良媒在其側道卓逺而日忘兮願自申而不得望北山而流涕兮臨流水而太息王逸注曰左右嫉妒莫行鬻也寧為溝中斷莊子曰百年之木破為犧尊青黄而文之其斷在溝中比犧尊于溝中之斷則美惡有間矣其于失性一也不作太倉䑕史記李斯傳斯少時見厠中䑕食不潔近人犬數驚恐入倉䑕食積粟居太廡下不見人犬之憂歎曰人之賢不肖譬如䑕矣在所處耳老退無好懷續明然兩炬老退見前注老杜詩庭前把燭嗔兩炬按後漢書㢘范傳交縛兩炬搔首不成眠寒蟲促機杼詩曰搔首踟蹰東坡詩玉堂清冷不成眠王介甫促織詩云只向貧家促機杼㡬家能有一鈎絲和顔生同游南山竹杖芒鞋取次行琳琅觸目路人驚東坡廬山詩芒鞋青竹杖自掛百錢游世説有人詣王太尉遇王安豐丞相大將軍别屋見李𦙍平子還語人曰今日之行觸目見琳琅珠玉當年此日仍為客是嵗在鄉里作重陽故也老杜至日詩云年年此日長為客又九日詩云世亂鬱鬱久為客病目今來喜再明張籍詩三年病眼今年校免與風光便隔生筋力尚堪供是事登臨那得總無情言筋力尚可登臨也樂天詩登山與臨水猶未要人扶世説許掾好遊山水而體便登涉時人云卿非徒有勝情亦有勝具維摩經云且置是事已知名世徒為爾謂詩名無益也樂天詩云詩稱國手徒為爾命壓人頭不奈何可復縁渠太瘦生老杜詩知君苦思縁詩瘦太瘦生見前注僧慧僧和同往南山驥騄同羣鴻鴈行登臨端為作重陽魏文帝典論曰咸以自騁驥騄于千里南臺二謝風流絶二謝有九日戲馬臺詩見前注準擬歸來古錦囊老杜詩春來準擬開懐久古錦囊見前注柏用直寧論世名成不待官老杜古柏行曰正直元因造化工此云寜論世言世常惡直而木以直為用也秦始皇封泰山遇雨避樹下遂封松為五大夫故樊宗師絳守園亭記以柏為蒼官老杜詩身退豈待官低枝縁我有魏文帝詩曰低枝拂羽葢偃葢到誰看抱朴子曰天陵偃葢之松酉陽雜俎曰世傳松千嵗方頂平偃葢傳燈録道幽禪師偈曰不知何代人得見此老松秀色有新故英姿無暑寒要為千嵗計豈慮萬牛難老杜古柏行大厦如傾要梁棟萬牛回首丘山重魯直詩翦伐萬牛難謝端硯王家舊物羣偷後石出蠻溪百丈深晉書王獻之謂偷兒青氈我家舊物可特置之羣偷驚走揮翰吾非玉堂手見古墨行注斷金君有古人心易繫辭二人同心其利斷金捕狼一狼將四子二嶺走千羊北史于日磾傳見熊將數子前漢西域傳曰失一狼走千羊意得無前敵史記始皇本紀侯生曰始皇意得欲從漢書袁盎傳絳侯趨出意得甚退之猛虎行曰共矜無當對氣性縱以乖無前見前注時乖闕後防後漢趙咨傳曰古人時同即㑹時乖即别此借用又退之詩時命雖乖心轉壯老杜病馬詩委棄非汝能周防寧知射生手唐書兵志肅宗置衙前射生手已發弩機張書曰若虞機張會使烏鳶飽空令豺虎傷莊子曰上為烏鳶食詩云投畀豺虎老杜詩秖令故舊傷和魏衍元夜同登黄樓車馬競清夜退之詩適與佳節㑹士女競光陰選詩清夜遊西園人物秀三楚選詩三楚多秀士注曰江陵為南楚吳為東楚彭城為西楚登臨得免俗兹樓豈時覩晉阮咸曰未能免俗聊復爾爾同來兩稚子冠者亦四五魯論曰冠者五六人童子六七人落落俱可人頗亦厭歌鼓晉書王澄謂王衍曰誠不如卿落落穆穆可人見前注山月出未髙潛鱗動寒渚言潜魚未為月所照故游泳自如也退之詠月詩未髙蒸逺氣詩曰魚在于渚或潜在淵檣燈接稀星奪目粲不數宋玉髙唐賦曰煌煌熒熒奪人目睛魏侯轉物手百好趨就敘楞嚴經曰若能轉物即同如來禹貢注曰四國皆就次序得句未肯吐秀氣出眉宇用莊子庚桑楚事見前注王縉古别離曰含辭未及吐淚落蘭叢中枚乘七發曰陽氣見眉宇之間水淨納行影選詩璇題納明月山空答脩語歐公詩空山答人語夜氣稍侵肌退之李花詩蒼茫夜氣生相遮文選應璩與岑文瑜書曰翦爪宜侵肌鳥駭去其侣楚辭招隠士曰禽獸駭兮亡其曹清游豈有極喜事戒多取世間可喜之事要不可極意也投靜未免喧東坡詩説靜故知猶有動無閒底處更求忙老杜詩喧靜不同科于今豈非古蘭亭序曰俛仰之間已為陳迹永懷寂寞人南北忘在所横嶺限魚鳥作書欲誰與寂寞人謂東坡言其身世兩忘不知謫在海外也揚雄傳曰惟寂寞自投閣情生文自哀世説孫楚除妻服作詩示王武子王曰未知文于情生情于文生覽之凄然增伉儷之重山谷詩曰意不及此文生哀政與此句相反意動足復佇歐公詩足雖欲往意已休此反而用之恨不能往見東坡也憑檻共一黙望舒已侵午文選登樓賦曰憑軒檻以遙望楚辭前望舒使先驅注云月御也午謂夜分樂天詩曰月午方徘徊退之詠月詩當午覺輪停和元夜笳鼓喧燈市車輿避火城國史補曰元日冬至宰相列燭多至數百炬謂之火城此借用彭黄争地勝后山自注云彭祖樓黄樓寰宇記魏刺史王延明移彭祖廟于彭城東北樓謂彭祖樓黄樓見前注文選頭陀寺碑曰信楚都之勝地也汴泗迫人情退之詩汴泗交流郡城角正謂徐州梅栁春猶淺老杜詩天邊梅栁樹相見㡬回新關山月正明樂府有關山月王褒詩曰關山夜月明賦詩隨落筆端復可憐生謂首章可愛也和魏衍同遊阻風舊説東風未世情不應作意斷人行羅鄴賞春詩云年年㸃檢人間事惟有春風不世情老杜詩戍鼔斷人行絶須一怒催新句莊子曰大塊噫氣其名為風是惟無作作則萬竅怒號老杜詩片雲頭上黒應是雨催詩此用其意更可多憂促短生文選古詩曰生年不滿百常懐千嵗憂謝靈運豫章行曰短生旅長世恍覺白日欹勝日著忙端取怪以行樂作忙事似為天所怪也元稹詩卻著閒行是忙事數人同傍曲江頭著忙蓋亦俗語僧寳傳楊岐㑹禪師問僧曰一喝兩喝後作麽生曰看這老和尚著忙晉書衛玠傳遇有勝日親友時請一言無不咨嗟妙年得此未須驚言行樂之日尚多懸知出處非吾事巳復星河爛漫晴即孟子行止非人所能為之意非吾事見莊子東坡雪後獨宿詩云天公用意真難㑹又作春風爛漫晴老杜詩三峽星河影動摇和魏衍同登快哉亭欒城集有此亭記亭在黄州不知此詩屬何處也詳此詩意終篇皆屬二蘇經時不出此同臨小徑新摧草舊侵此句似言時之所棄欲傍江山看日落老杜詩雪嶺獨看西日落不堪花鳥已春深老杜詩春來花鳥莫深愁來牛去馬中年眼似用謝安中年别作惡事老杜江漲詩去馬來牛不復辨蓋用莊子事此借用以言老眼之昬眩朗月清風萬里心世説劉尹云清風朗月輒思𤣥度𤣥度許詢字也萬里心當屬東坡老杜詩老鶴萬里心故著連峯當極目回看幽徑遶雙林謝靈運詩連峯競千仭極目見前注雙林借用傅大士事意謂僧院登快哉亭城與清江曲泉流亂石間夕陽初隠地暮靄巳依山老杜詩田舎清江曲度鳥欲何向太白詩天涯有度鳥老杜詩途逺欲何向奔雲亦自閒終自無心故也登臨興不盡稚子故須還以稚子候門之故不盡興而返招黄魏二生出門不雨即偶風閉門值睡極力攻似聞湯鼎作吟聲已賀勝敵收全功方作煮茶想而睡魔巳失去㡬于不戰而勝也文選阮元瑜書曰喜得全功長享其福卻思二子共一笑撥棄舊語無新工淵明詩撥棄且莫念退之書曰惟陳言之務去卒行好步不兩得能致公等我何窮居富貴者未必能致天下之英才故曰不兩得亦用東坡上梅直講書意魏詩黄筆今未有顧我獨得神所鍾南史沈約傳謝𤣥暉善為詩任彦昇工于筆左傳曰天鍾美于是徑須相就踏泥潦已辦煮餠澆油葱老杜詩速須相就飲一斗玉臺新詠隴西行曰促令辦麤飯崔實四民月令曰立秋無食煮餅東坡詩一杯湯餅潑油葱后山詩注巻六
