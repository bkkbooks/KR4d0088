body:
  text: 后山詩注巻二宋陳師道撰任淵注九日寄秦覯疾風回雨水明霞老杜詩殘夜水明樓沙步叢祠欲暮鴉栁子厚鐵爐步志曰江之滸凡舟可縻而上下者曰步漢書陳勝傳注云叢祠謂草木岑蔚者九日清樽欺白髪十年為客負黄花老杜詩生逢酒賦欺登高懐逺心如在登髙蓋九日故事文選潘岳秋興賦曰登山懐逺而悼近李善注引齊景公逰牛山流涕而歎晏子笑之云云杜牧之九日詩云古往今來只如此牛山何必淚霑衣向老逢辰意有加遇節物而多感老者則然淮海少年天下士史記魯仲連傳吾乃今日知為天下之士也秦覯漣水軍人在揚州之境故云淮海少年可能無地落烏紗用晉孟嘉落帽事唐令狐楚重陽日登落帽臺詩云貴重近臣光綺席笑談従事落烏紗巨野餘力唐虞後沈人海岱西不應容桀黠寜復有青齊山東盜賊以巨野為淵藪平人多被沈溺詩意謂非神禹留此餘力遺患後人也向使無此澤以受衆流青齊其為魚矣此與東坡灎澦堆賦同意禹貢曰海岱及淮惟徐州大野既豬東原厎平大野一名鉅野史記貨殖傳曰桀黠奴人之所患也又漢書馮奉世傳曰羌虜桀黠賊害吏民燈火魚成市帆檣藕帶泥劉夢得詩漁家燈火明老杜詩藥物楚老漁商市樂府黄淡思曰象牙作帆檣老杜詩採藕不洗泥十年塵霧底瞥眼怪鳧鷖新自京洛風塵中來故見水鳥而怪歎老杜詩呀坑瞥眼過示三子時三子已歸自外家去逺即相忘歸近不可忍脞説載獨孤遐詩曰近家心轉切不敢問來人兒女已在眼眉目略不省言别久不復記憶也選詩薜茘若在眼喜極不得語淚盡方一哂東坡贈朱夀昌詩喜極無言淚如雨老杜詩畏虎不得語了知不是夢華嚴梵行品曰了知境界如幻如夢此反而用之東坡詩如今不是夢真個在廬山忽忽心未穩前漢王襃傳太子苦忽忽善忘不樂雪峯禪師㸃胸云某甲言裏未穏在嗚呼行去年米賤家賜粟百萬官倉不餘掬元祐初左司諫朱光廷奉使賑濟河北不問民户之等一槩支貸而河北措置司積年物斛九百萬為之一空此詩所指豈謂是歟詩云終朝采緑不盈一掬青錢隨賜費追呼昔日剜創今補肉老杜詩恰有三百青銅錢北夢瑣言載聶夷中詩云二月賣新絲五月糶新榖醫得眼下瘡剜卻心頭肉今年夏旱秋水生江淮轉粟千里行前漢鄒陽傳轉粟流輸千里不絶不應逺水救近渇此俗間語也韓非子亦有逺水救近火之語空倉四壁雀不鳴益州耆舊傳楊宣為河内太守行縣有羣雀鳴宣曰前有覆車粟此雀相隨欲往食歐公詩寒雀聚空倉似聞為政不為費善政當惠而不費徒惠而不知為政其可繼乎兩不相傷兩相濟老子曰兩不相傷而徳交歸焉此借用十年斂積用一朝驚濤破山風動地言非常之政不可久也老杜詩築埸看斂積荘子曰疾雷破山風振海而不能驚杜詩又云東南飄風動地至秋懐示黄預牕鳴風歴耳栁子厚夢歸賦云風纚纚以經耳佛書有一歴耳根之語道壊草侵衣老杜詩壊道哀湍瀉月到千家靜老杜詩千家山郭靜朝暉林昏一鳥歸老杜詩日暮歸幾翼北林空自昏又云林昏罷幽磬冥冥塵外趣揚子曰鴻飛冥冥弋人何簒焉此借用稍稍眼中稀疑用杜詩眼前無俗物之意史記平原君傳賓客稍稍引去者過半太白詩古來相接眼中稀送老須公等秋棊未解圍一作小合圍老杜詩送老白雲邊曹攄圍棊賦曰合圍促陣交相侵伐送張支使曠度逢知晚高才處不難文選夏侯湛東方朔畫賛曰逺心曠度嵇康書云長才廣度無所不淹清秋一鶚上後漢孔融薦禰衡云鷙鳥累百不如一鶚老杜鵰賦云當九秋之凄清見一鶚之直上拭目萬人看文選楊修書云觀者駭視而拭目白酒初同醉周禮酒正注曰昔酒無事而飲也今之酋久白酒所謂舊醳者也樂天詩花時同醉破春愁黄花已戒寒禮記月令季秋之月曰鞠有黄華國語曰火見而清風戒寒憑將衰老事一一報長安長安蓋后山舊逰之地前詩有城南寓居篇即長安所作送杜侍御純陜西轉運餽糧千里古無策木牛流馬功不極漢書韓信傳千里餽糧師不宿飽唐書夷狄傳序劉貺謂漢無策蜀諸葛亮以木牛流馬運竟坐糧不繼不能成功漢書刑法志曰兵寝刑措帝王之極功此借用邊頭數米換黄金老杜詩邊頭公卿仍獨驕荘子曰簡髪而櫛數米而炊晉書劉曜逼京師米斗金二兩將軍汗馬未伏櫪史記晉世家曰矢石之難汗馬之勞魏武帝歌曰老驥伏櫪志在千里黠羌人面作夷語後漢馬援傳曰黠羌旅拒此乃太守事耳漢書匈奴賛曰人面獸心老杜詩云千載琵琶作胡語鳥䑕貪生爾如許言鳥䑕尚知貪生而黠羌輕生如此晉書王濬傳曰雀䑕貪生茍此一活耳熊虎可避蟁可驅覆巢熏穴意何如言不必深入窮討也漢書匈奴傳嚴尤曰視夷狄之侵譬猶蟁之螫驅之而已禮記曰不覆巢韓詩外傳曰社䑕熏之恐燒木老杜詩主簿意何如漢虜相當庸可盡選詩漢虜方未和後漢南匈奴傳窮鳥困獸皆相救死况種類繁熾不可殫盡又傳論曰漢之疲耗略相當矣聊城正用一封書史記魯仲連傳燕將保守聊城田單攻之不下仲連乃為書約之以矢射城中燕將見書自殺此詩言得人則一書可以弭難何必窮兵黷武哉老杜詩自寄一封書今已六月後巧手莫為無麪餅誰能留渇須逺井兩句皆善用俗語言治邊不可無人材猶作餅不可無麪而人材正自有可用者何必逺取如留渇以待井耶杜君自徐就改陜漕故詩云爾國家有急君得辭漢書陳湯傳曰國家有急君其毋讓老杜送楊監赴蜀詩云相公鎮梁益軍事無孑遺解榻再見今用材復擇誰況君已高位為郡得固辭徐人不勞敂關請後漢种暠遷涼州刺史吏民詣闕請留一年周禮關人注曰敂關猶謁關人也隴上壯士莫捫舌晉書載記曰隴上壯士有陳安毛詩莫捫朕舌此借用以言壯士得食不復有仰哺之憂老杜詩曰運糧繩橋壯士喜河西狂王防繫頸河西狂王謂夏國主也漢書西域傳坐知狂王當誅賈誼請必繫單于之頸向來此地幾送迎草間翁仲口不瘖十年兩熟飽可待一嵗四守人何心言徐州數易守臣人必有不安其生者漢書黄霸傳曰數易長吏送故迎新之費及姦吏縁絶簿書盜財物水經注曰鄗南千秋亭壇廟之東枕道有兩石翁仲南北相對又按魏志明帝景初二年鑄銅人二列于司馬門外號曰翁仲東坡罷徐州寄子由詩曰道邊雙石人幾見太守發有知當解笑撫掌冠纓絶則徐州有石人可知后山此詩蓋用東坡意世說和長輿問楊石衛何在客曰向來不坐而去老稚持車車不留前漢韓延夀傳老稚扶持車轂歸人不行行轉頭歸人特須臾未行行即逺矣唐崔塗詩曰自是不歸歸便得即此句法樂天詩萬事轉頭空關中正須蕭丞相漢書蕭何守關中計户轉漕給軍老杜詩關中正留蕭丞相省内早要富民侯一本此下又有兩句曰可同一夫在所憫嵗晚得無溝壑憂後刪去漢書車千秋為丞相封富民侯送楊侍禁兼寄顔黄二公二首長道魯直相逢今已晩同府尚經年衆口不成虎韓非子曰龐其與太子質于邯鄲謂魏王曰夫市無虎明矣然而三人言成市虎今夫邯鄲去魏逺于市議臣者過三人願王察之諸公更薦賢更字作平聲讀兩親須薄禄說苑子路曰家貧親老者不擇禄而仕昔者由事二親負米百里之外老杜詩上公有薦者累奏資薄禄一障欲乘邊漢書張湯傳武帝謂狄山曰吾使生居一郡能無使虜入盜乎山曰不能復曰居一障間山曰能迺遣山乘障往問顔夫子何妨試著鞭欲令往見顔君以為道地顔君名復字長道晉書劉琨傳常恐祖生先吾著鞭多問黄居士終年欠一書漢書趙廣漢傳曰為我多謝問趙君元稹詩只是堂前欠一人因人候消息老杜詩因君問消息君一作人有使報何如古樂府曰有信數寄書無信長相憶老杜詩欲問平安無使來向晚逢楊子真堪託後車文選魏文帝與呉質書曰文學託乘于後車親年方賴祿不惜借吹噓阮嗣宗詩寵禄豈足賴此反而用之言以親養之故也家語子路曰家貧親老不擇禄而仕魏志鄭渾曰孔公緒能清談高論噓枯吹生南史謝朓傳士子聲名未立當共奬成無惜齒牙餘論送外舅郭大夫䕫路提刑天險連三峽易坎卦曰天險不可升也官曹據上㳺老杜詩何當官曹清漢書項羽傳注曰上㳺水之上流也百年雙鬢白萬里一身浮老杜詩百年雙白鬢一别五秋螢荘子曰其生也若浮可使人無訟寜須意外憂無訟見魯論下句勸其不生事也前詩亦云莫作分外慮晉書王彬傳荆州守文豈能意外行事平生晏平仲能費幾狐裘勸其止足也用晉阮孚一生當著幾兩屐之意禮記檀弓有若曰晏子一狐裘三十年雪後黄樓寄負山居士張仲連林廬煙不起老杜詩幾地别林廬城郭嵗將窮退之詩嵗窮寒氣驕雲日明松雪選詩雲日相輝映又詩山明望松雪溪山進晚風老杜詩山谷進風凉人行圖畫裏鳥度醉吟中太白詩人行明鏡中鳥度屏風裏老杜詩飛閣捲簾圖畫裏唐白樂天自號醉吟先生不盡山隂興天留憶戴公晉書王徽之嘗居山隂夜雪初霽忽憶戴逵逵時在剡溪便夜乘小船詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶后山謂興盡則未必相憶寜不為雪夜之行使有餘興也東坡訪張山人詩萬木鏁雲龍天留與戴公此借用謝人寄酒舊香餘味寄黄封黄封謂宫酒以黄羅帕封之東坡詩上尊日日瀉黄封厭見春泥滿眼紅紅泥謂外酒王介甫詩春泥滿眼路嶇嶔此借用其字千乘莫従公子後漢書韓王信傳陳豨慕魏公子招致賓客隨之者千餘乘百壺能為故人東老杜詩不有小舟能盪槳百壺那送酒如泉儀禮聘禮賓之幣惟馬出其餘皆東従蘇公登後樓倏作三年别才堪一解顔列子第四篇曰五年之後心更念是非口更念利害老商始一解顔而笑老商氏蓋列子之師也樓孤帶清洛老杜云樓孤屬晚晴元豐中導洛水以為清汴南都水所過也林缺見巴山東坡蜀人當是時必有望逺思歸之意老杜詩何路出巴山五月池無水張籍詩六月人家井無水夜聞白鼉人盡起千年鶴自還續搜神記曰遼東華表柱有鶴集其上曰去家千嵗今始歸白鷗沒浩蕩愛惜鬢毛斑勸公高退以安晚景也老杜詩白鷗沒浩蕩萬里誰能馴又曰更憶鬢毛斑送蘇公知杭州東坡出知杭州道由南京后山時為徐州教授告徐守孫覺願往見而覺不之許乃託疾謁告來南京送别同舟東下至宿而歸事見東坡送陳傳道書及劉安世彈章平生羊荆州追送不作逺羊荆州謂羊祜也以比東坡按晉書羊祜傳督荆州諸軍又按晉書郭奕傳奕字大業為野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復往又歎曰羊叔子去人逺矣遂送祜出界數百里坐此免官后山既送東坡為劉安世所彈乞正其罪嘗除太學博士又為言者以此事論列遂罷此句殆亦詩讖也有客詩云薄言追之注云追送也世說范逵既去陶侃追送不已且百許里文選孫子荆詩傾城逺追送餞我千里道豈不畏簡書言法令不許私出也詩云豈不懐歸畏此簡書劉安世章亦云士于知己不無私恩既効于官則有法令師道擅去官次陵蔑郡将徇情亂法莫此為甚放麑誠不忍此句與上句若不相屬而意在言外叢林所謂活句也按韓非子孟孫獵得麑使秦西巴載之持歸其母隨之而啼秦西巴弗忍而與之孟孫大怒逐之三月復召以為子傅曰夫不忍麑且忍吾子乎唐陳子昻感遇詩曰吾聞中山相乃屬放麑翁孤獸猶不忍況以奉君終嗚呼觀過可以知仁后山越法出境以送師友亦放麑之類也一代不數人百年能幾見后山謝再授徐州教授啓亦曰昨縁知舊出守東南念一代之數人而百年之幾見間以重江之阻莫期再嵗之逢使一有于先顛為兩途之後悔又謂中山之相仁于放麑亂世之雄疑于食子惟其信之既篤所以行之不疑云云其曰中山之相蓋承子昂之誤也昔為馬口銜今為禁門鍵鮑照詩昔如韝上鷹今作檻中猿老杜詩昔為水上鷗今如罝中兔后山此句頗用其律馬銜猶可脫去禁鍵不容輒開言官身拘係不可輒出也退之詩歸來得便即㳺覽暫似壮馬脱重銜按律宫殿門忘誤不下鍵及毁管鍵而開者皆出罪王逸注楚辭大司命曰大開禁門一雨五月凉中宵大江滿風帆目力短江空嵗年晚風帆愈逺恨目力不能送之人去江空恍然自失吾之年嵗日已遲暮懼其不復再見也其愛賢惜别之意可謂切矣韓詩嵗聿其暮薛君曰言君之年嵗晚也送秦覯二首覯従東坡學于杭州士有従師樂諸兒卻未知欲行天下獨信有俗間疑栁子厚答韋中立論師道書曰獨韓愈奮不顧流俗抗顔而為師世果羣怪聚罵又曰天下不以非鄭尹而快孫子何哉獨為所不為也漢書陳遵傳曰浮湛俗間秋入川原秀風連鼓角悲老杜詩中原鼓角悲目前㹠犬類未必慰親思子不肖而在親側雖無離憂其志不樂也王修戒子書曰我老矣所恃汝等皆不在目前意皇皇也晉書列女傳周嵩曰惟阿奴碌碌當在母目下耳呉志孫權傳曹操曰生子當如孫仲謀劉景升兒子豚犬耳師法時難得親年富有餘荀子曰有師法者人之大寳也北史盧誕傳曰經師易求人師難得漢書齊襄王傳曰皇帝春秋富注云比之于財方未匱竭端為李君御後漢李膺傳荀爽嘗謁膺因為其御既還喜曰今日乃得御李公矣盡得鄴侯書退之送諸葛覺往隨州讀書詩云鄴侯家多書插架三萬軸結友真莫逆史記廉頗傳燕王私握臣手曰願結交荘子曰子桑户孟子反子琴張三人相視而笑莫逆于心遂相與友論才有不如終上句意言亦當擇交無友不如己者折腰終不補晉書陶淵明傳吾不能為五斗米折腰拳拳事鄉里小兒退之復志賦曰豈不登名子一科兮曾不補其遺餘此句后山自道也可但曳長裾嚴武詩可但步兵偏愛酒漢書鄒陽傳何王之門不可曳長裾詩意謂微官之與布衣其得失相去無幾不必以貧賤依人為羞也和江秀才獻花三首風雨東籬冷落看陶淵明詩採菊東籬下悠然見南山清溪水落玉峰寒老杜九日藍田荘詩云藍水逺従千澗落玉山高並兩峯寒酒家不辦當壚費當壚事見司馬相如傳觀末篇落句江君當是酒家乞與先生種杏壇莊子曰孔子休坐乎杏壇之上后山時為徐州學官云疎花得雨數枝黄白髪緣愁百尺長老杜丁香詩疎花枝素豔李太白詩白髪三千丈緣愁似个長要與老生同一醉故留秋意作重陽江公孤憤不宜秋韓非子有孤憤篇李商隠詩歸夢不宜秋吟作秋蟲到白頭東坡詩云吟詩莫作秋蟲聲天公怪汝鈎物情使汝未老華髪生過我可為千日醉博物志曰中山有酒飲者一醉千日従公難作百錢逰詩意謂官居不可放浪也晉書阮修傳常以百錢掛杖頭至酒店便獨酣暢東坡詩芒鞋青竹杖自掛百錢逰次韻李節推九日登南山平林廣野騎臺荒詩曰依彼平林漢書鼂錯傳平林廣野此車騎之地文選謝宣逺靈運皆有九日従宋公戲馬臺集送孔令詩李善注云蕭子顯齊書宋武帝為宋公在彭城九日出項羽戲馬臺至今相承以為舊準按騎臺即戲馬臺樂史寰宇記曰戲馬臺在徐州彭城縣南三里山寺鳴鐘報夕陽老杜詩人扶報夕陽人事自生今日意寒花只作去年香李後主詩鬢従近日添新白菊是去年依舊黄老杜詩寒花只暫香巾攲更覺霜侵鬢用落帽事語妙何妨石作腸漢書賈捐之傳君房下筆言語妙天下唐皮日休桃花賦序云宋廣平為相貞姿勁質剛態毅狀疑其鐵腸與石心不解吐婉媚辭然觀其文而有梅花賦清便富麗得南朝庾徐體殊不類其為人落木無邊江不盡老杜登高詩無邊落木蕭蕭下不盡長江滚滚來此身此日更須忙言節物可念政應行樂尚須汲汲于世故耶别負山居士張仲連田園相與老此别意如何漢書汲黯傳隠于田園老杜詩此别意茫然又詩主簿意如何更病可無酒言臨分不可不飲縦復病惱猶當勉强也樂天詩欲别能無酒猶寒已自和韓偓詩春隂漠漠土脈潤寒氣微微風意和高名胡未廣後漢許邵傳曰與兄靖俱有高名榖梁曰心志既修而名譽不聞友之過也詩興尚能多老杜詩憶在潼闗詩興多退之詩四句意能多沙草東山路猶須一再過一再字見司馬相如傳送趙教授束髪相看到白頭了知公鬢不勝憂司馬彪續漢書曰卓茂自束髪至白首未嘗與人有過杜牧詩公道世間惟白髪貴人頭上不曾饒可堪親老須三釡荘子曰曾子再仕而心再化曰吾及親仕三釡而樂又著儒冠忍一羞老杜詩儒冠多誤身左氏曰一慙之不忍而終身慙乎平世功名須晚節向來旬月取封侯此句用東方朔答客難意熙豐間士大夫進用甚峻今不然也孟子曰禹稷當平世漢書鄒陽傳云晚節末路車千秋傳云旬月取宰相封侯北州豪傑知誰健趙君當是北人後漢光武紀北州弭定竇憲傳曰西州豪傑遂復附従老杜詩明年此㑹知誰健乞我黄淤十里秋乞字作去聲讀歐公詩知君欲别西湖去乞我橋南菡萏香又詩換得西湖十頃秋黄淤謂河水所淤之田也漢書溝洫志曰河水有所㳺盪時至而去則填淤肥美民耕田之或久無害老杜用填淤字作平聲東坡亦云楚人種麥滿河淤次韻春懐欲作歸田計文選張平子有歸田賦無如二頃何史記蘇秦傳使我有雒陽負郭田二頃豈能佩六國相印乎折腰方賴禄折腰見前注老杜詩上公有薦者累奏資薄禄拭面未傷和唐書婁師徳傳師徳弟守代州辭教之耐事弟曰人有唾面潔之而已師徳曰未也潔之是違其怒正使自乾耳公羊傳曰孔子反袂拭面老杜梔子詩云與道氣傷和日下烏聲樂左傳鳥烏之聲樂塵生鳥跡多世說晉簡文帝為撫軍時牀上塵不聴拂見䑕行跡視以為佳后山蓋用此意渡頭留小楫乘興得相過乘興見前注文選阮籍詩趙李相經過黄梅五首異色深宜晚玉臺新詠沈約芳樹詩曰氤氳非一香參差多異色生香故觸人石曼卿詩樂意相關禽對語生香不㫁樹交花樂天榴花詩香塵擬觸坐禪人不施千㸃白宋玉登徒子好色賦曰著粉太白施朱太赤别作一家春一家春見前注舊鬢千絲白老杜詩人生不再好鬢髪白成絲新梅百葉黄老杜四松詩終然棖撥損得恡千葉黄留花如有待退之詩留花不發待郎歸迷國更須香言其色自足迷國也尚何須香耶宋玉賦曰嫣然一笑惑陽城迷下蔡冉冉梢頭緑婷婷花下人東坡詩冉冉緑霧生人衣杜牧之詩荳蔲梢頭二月初元微之李娃行曰玉顔婷婷街下立欲傳千里信暗折一枝春見前注黄裏含真意退之燈花詩黄裏排金粟蓋謂額間花鈿也此借用春容帶薄寒趙師民詩委地露花啼曉恨拂堤煙栁弄春容欲知誰稱面劉禹錫詩綺季衣冠稱鬢面徧插一枝看花裏重重葉釵頭㸃㸃黄秖應報春信故作著人香玉臺新詠徐君舊詩草短猶通屧梅香漸著人田家鷄鳴人當行犬鳴人當歸秋來公事急出處不待時左傳曰公事有公利孟子曰公事畢然後敢治私事昨夜三尺雨竈下已生泥人言田家樂爾苦人得知漢書楊惲曰田家作苦歐陽公歸田樂詩曰田家之樂知者誰我獨知之胡不歸爾苦猶言如許苦也巨野二首當是移潁州教授時所作紅落芙蕖晚青深蒲稗秋謝靈運詩蒲稗相因依平湖無過鳥鳴鼓有行舟老杜詩打鼓發船何處郎蒲港侵衣緑蓮塘亂眼紅退之送王塤序云猶航㫁港絶潢老杜竹詩色侵書帙亂宋莒公集梁山泊水無岸行舟多穿菰蒲為道州人謂之蒲巷此港字恐當作巷將身供世事結纜待回風老杜詩惟将遲暮供多病又詩結纜排魚網又詩回風吹早秋别叔父録曹為吏専刑法漢書薛宣傳吏道以法令為師成家託弟昆老杜詩實惟親弟昆三年如昨日一笑更何言三年一笑用列子事見前注扶老須微禄漢書孔光傳賜太師靈夀杖注扶老杖也老杜詩耽酒須微禄移官實至恩老杜詩微官近至尊時后山自徐學移潁王吉傳可謂至恩兩疏元父子何日復東轅漢書疏廣傳廣謂兄子受曰豈如父子相隨出闗歸老故鄉乎遂上疏乞骸骨公卿大夫故人邑子設祖道供張東都門外東轅猶左氏所謂南轅反斾出清口家世山東飽耕稼孟子曰自耕稼陶漁以至為帝晩託一舟順流下爾雅順流而下曰泝㳺漁溝寒餅不下筯推柂轉頭更五夜意謂發漁溝時尚未夕食舟行已遲明矣王介甫詩任村炊米朝食魚日暮滎陽驛中宿與此同意晉何曾傳猶言無下筯處老杜詩捩柂開頭捷有神漢儀中黄門持五夜平明放溜出清口霜落潮回霧連野歐公詩江城月下夜聞歌淮浦山前朝放溜平淮一夢三十里有日無風神所借摭遺新說王勃自洪州旋舟謝向時所見老叟曰神既借以好風躬修牢酒以報神賜似憐憂患滿人間百孔千瘡容一罅退之答孟簡書曰羣儒區區修補百孔千瘡隨亂隨失文章末技將自効老杜詩文章真小技班固幽通賦曰操末技猶必然兮文選任彦昇作王文憲集序曰昉嘗以筆札見知思以薄技効徳漢書蕭望之傳曰爭願自効語不驚人神可嚇后山自謂文章尚不能動人山川之神其可嚇耶老杜詩為人性僻耽佳句語不驚人死不休荘子曰今子欲以子之梁國而嚇我耶嚇音許嫁反子女玉帛君所餘左傳曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也按搜神記呉郡太守張公直過廬山其子夢為廬山君所聘怖而遽發中流船不行下女水中此詩所言子女謂此類也寄聲白鳥煩多謝漢書趙廣漢傳曰寄聲謝我又曰為我多謝問趙君泛淮冬暖仍初日潮回更下風鳥飛雲水裏人語櫓聲中退之進學解曰冬暖而兒號寒杜牧之詩鳥去鳥來山色裏人歌人哭水聲中平野容回顧言望鄉之眼不為重山所隔老杜詩平野入青徐無山㑹有終言雖未有可隠之山豈終老于行役而不返故里耶此移潁時所歎也易曰君子有終老杜詩人生亦有初此效其律倚檣聊自逸吟嘯不須工晉書王廙倚柂樓長嘯神氣甚逸王導謂庾亮曰世将為傷時識事亮曰正足舒其逸氣耳又庾氷吟嘯鼓枻泝流而去東坡詩云作詩不須工猴馬并引楚州紫極宫有畫沐猴振索以戲馬頓索以驚圉人不測従後鞭之人言沐猴宜馬而今為累作詩以導馬意韓鄂四時纂要曰常繫獮猴于馬房内辟惡消百病令馬不著疥沐猴自戲馬自驚漢書項籍傳楚人沐猴而冠圉人未解猴馬情周禮圉師掌教圉人養馬猴其天資馬何罪史記商君賛其天資刻薄人也意欲防患猶傷生宋書王泰曰酒雖會性亦以傷生異類相宜亦相失同類相傷非所及非所及猶言非思慮所及也物惡傷其類此理之固然而其間亦有相傷者豈可復以常禮待之耶文選李陵書曰但見異類此借用史記孔子世家曰君子諱傷其類志行萬里困一誤呉志陸遜傳志行萬里不中道而輟足老杜詩當時歴塊誤一蹶委棄非汝能周防吐豆齕荄甘伏櫪唐李林甫傳曰君等不見立仗馬乎終日無聲而飫三品芻豆一鳴則黜之矣荘子馬蹄篇齕草飲水翹足而陸伏櫪見前注后山自徐學除太學博士以言者罷既而移潁州故有同類相傷與志行萬里困一誤之語徐氏閒軒徐氏謂徐大正東坡亦有閒軒詩倦逰梁楚愛吾廬老寄山林孰與娯漢書司馬相如傳曰客逰梁又曰長卿故倦㳺淵明詩吾亦愛吾廬想見杖藜臨過鳥言軒檻之高荘子曰原憲杖藜而應門栁子厚栁州山水記曰乃臨大野飛鳥皆視其背更能赤手縛於菟魯直詩守心如縛虎此用其意言處閒之難也東坡詩當年老使君赤手降於菟左傳曰楚人謂虎於菟君寜平世輕三釡孟子曰禹稷當平世三釡見前注我亦東原有一區漢書揚雄傳有宅一區擬買嬋娟作歸計可無堆玉斗量珠元微之李娃行曰平常不是堆珠玉難得門前暫徘徊劉禹錫泰娘歌曰路旁忽見停隼旟斗量明珠鳥傳意按嶺表録異梁氏女有容貌石季倫以真珠三斛買之即緑珠也寄豫章公三首后山自注云許官茶未寄黄魯直家于洪州之雙井洪即古豫章宻雲不雨卧烏龍張舜民小說云熙寜末神廟有㫖下建州製宻雲龍其品又高于小團周易密雲不雨自我西郊此借用言茶之未破已足人間第一功言未戰而勝睡魔也漢書蕭何功第一無汗馬之勞得諾向來輕季子漢書季布傳楚人諺曰得黄金百不如得季布諾打門何日走周公盧仝謝孟簡惠茶詩曰日高丈五睡正濃將軍打門驚周公蓋用魯論不復夢見周公意后山為學官暗用邊韶事愧無一縷破雙團破團茶法多以線縷解之雙團謂大小團也慣下薑鹽枉肺肝薛能烏觜茶詩云鹽損添常戒薑宜煮更鮮東坡和寄茶詩云老妻稚子不知愛一半已入薑鹽煎誓酒不應忘此老晉書劉伶傳伶妻勸伶㫁酒伶曰吾不能自禁惟當祝鬼神自誓耳后山持律酒戒甚嚴故有此語論詩寜肯乞麄官薛能謝王彦威寄茶詩曰麄官寄與真抛卻賴有詩情合得嘗乞音氣人須百斛買雙鬟百斛見前注玉臺新詠辛延年詩曰一鬟五百萬兩鬟千萬餘魯直詩欲買娉婷歌煮茗我無一斛明月珠水截龍章試虎斑史記蘇秦傳水截鴻鵠晉書嵇康傳龍章鳯姿此借用其字龍章謂茶虎斑謂盞老覺才疎渾不稱自攜雲月瀉潺湲樂天詩一别承明三領郡従教人道是麤才老杜詩雲月遞微明此借用其字言建瓷如雲中之月也張平子思𤣥賦曰亂弱水之潺湲字林曰潺湲流貌湲音爰亦音侯頑切贈秦覯兼簡蘇迨二首兩秦竝立難為下史記孟嘗君傳云勢不兩立為雄世說後漢陳寔二子紀字元方諶字季方寔曰元方難為兄季方難為弟此句用其事魏略桓範妻曰君前在東坐欲擅斬徐州人謂君難為下今羞為吕昭屈難為上也此句用其事萬里長驅在此初成都記萬里橋後主時費禕聘呉諸葛亮祖于此禕曰萬里之行故始于此矣别後未忘三日語唐書陸贄傳張鎰有重名贄往見語三日竒之人來肯作數行書老杜詩相看過半百不寄一行書文章従古不同時言知音未必並世也漢武聞司馬相如賦曰朕獨不得與此人同時哉詩語驚人筆亦竒詩語驚人見前注范蔚宗傳諸序論筆勢縦放實天下之竒作栁子厚先友記曰韓曾弟愈文愈竒過與阿平應絶倒晉書王澄聞魏玠言輒歎息絶倒時人為之語曰魏玠談道平子絶倒又世說云阿平若在當復絶倒阿平蓋以屬仲豫世間能有幾人知貫休詩云禪客相逢只彈指此心寜有幾人知次韻秦少㳺春江秋野圖后山自注云宗室所畫翰墨功名裏江山富貴人倐看雙鳥下已負百年身南史梁忠烈世子方等傳云性愛林泉特好散逸嘗著論曰吾不及鳥魚逺矣鳥魚飛浮任其志性吾之進退嘗在掌握若使吾終得與魚鳥同逰則去人間如脫屣耳此宗室事故后山引用蓋舊制宗室在宫有出入之限有不許外交之禁故也老杜詩長為萬里客有愧百年身江清風偃木霜落雁横空老杜詩長林偃風色若箇丹青裏猶須著此翁后山自注曰秦詩云請君添小艇畫我作漁翁言少㳺方見用于世非江海之士不當畫之漁舟也晉書顧愷之為謝鯤象在石巖裏曰此子宜置丘壑中后山蓋反此意著字嘗經東坡用之所謂戲著幼輿巖谷裏是也老杜詩秋色彫春草王孫若箇邊黄魯直答王立之書曰小詩若能令每篇不茍作須有所屬乃善頃來詩人惟陳無己得此意每令人歎伏之蓋渠勤學不倦味古人語精深非有謂不發于筆端耳觀此詩信魯直之善論也幼嶺后山自注云外氏有石象山號幼嶺外家英俊埸漢書枚臯傳與英俊並㳺栁子厚書曰鼔行俊造之埸季氏不好弄季氏猶詩所謂伯氏仲氏左傳曰夷吾弱不好弄用意丘壑間頗以石自奉班固序傳班斿曰漁釣于一壑則萬物不奸其志棲遲于一丘則天下不易其樂誰言拳握間後漢張湛傳拳握之物足富十世意作萬牛重老杜古柏行萬牛回首丘山重岱宗小天下孟子登太山而小天下不辦一席用東坡六一泉銘載惠勸語曰西湖蓋歐公几案間一物耳絶句斫水水可斷越王勾踐有八劍二名㫁水以之指水開即不合續弦弦可完東方朔十洲記曰煮鳯喙麟角合煎作膠名之為續弦膠兩句言物理之間合者固有時可㫁而㫁者寜不可復續耶而客主之交一絶不續亦可歎矣如何鄭公客不作百年看漢書鄭當時傳兩人中廢賓主益落故班固作贊引廷尉翟公一死一生乃見交情之語此詩必有謂而作也贈歐陽叔弼叔弼名棐六一居士之第三子家于潁州早知汝潁多能事晉書周顗傳汝潁多竒士能事字出周易汝潁多竒士本曹操語晚以詩書託下僚選詩英俊沈下僚大府禮容寛嬾慢漢書云敞傳贊再入大府老杜詩自識将軍禮數寛晉嵇康與山濤書云嬾與慢相成故家文物尚嫖姚故家遺俗見孟子左傳臧哀伯曰文物以紀之此借用漢志景星歌曰五音六律依韋響昭雜變竝㑹雅聲逺姚注云姚嫖姚言飛揚也只将憂患供談笑憂患字見易繫辭王介甫詩已将流景供談笑聊謂知音破鬱陶敢望功言答聖朝功言見前注老杜詩未有涓埃答聖朝嵗歴四三仍此地嵗歴四三謂十二年也下篇亦云中年見二子已復嵗一終尚書或四三年此借用其字也家餘五一見今朝歐陽文忠公自號六一居士作傳曰吾家藏書一萬巻集録三代以來金石遺文一千巻有琴一張有棊一局常置酒一壺客曰是謂五一耳何如居士曰以吾一翁老于此五物之間是豈不為六一乎時居士已薨故曰家餘五一后山詩注巻二
