  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_WYG_000-1a, image: WYG1114/WYG1114-0741a.png}
body:
  text: 后山詩注别集類二宋提要臣等謹案后山詩注十二巻宋陳師道撰任淵注原本六巻此本作十二巻則淵作注時每巻釐為二也淵生南北宋間去元祐諸人不逺佚文遺跡往往而存即同時所與周旋者亦一一能知始末故所注排比年月鈎稽事實多能得作者本意然師道詩得自苦吟運思幽僻猝不易明方囘號曰知詩而瀛奎律髓載其九日寄秦覯詩猶誤解末二句他可知矣又魏衍作師道集記稱其詩未嘗無謂而作故其言外寄託亦難以臆揣如送郭槩四川提刑詩之功名何用多莫為分外慮送杜純陜西轉漕詩之誰能留渴須逺井贈歐陽棐詩之嵗厯四三仍此地家餘五一見今朝觀六一堂圖書詩之厯數况有歸敢有貪天功次韻蘇軾觀月聴琴詩之信有千丈清不如一尺渾次韻蘇軾勸酒與詩之五士三不同夙紀鳴蟬賦寄蘇軾詩之功名不朽聊通袖海道無違具一舟寄張耒詩之打鴨起鴛鴦離潁詩之叢竹防供爨池魚已割鮮送劉主簿詩之二父風流皆可繼排禪詆道不須同送王元均詩之故國山河開始終以及宿深明閣陳州門絶句寄曹州晁大夫等篇非淵一一詳其本事今據文讀之有茫不知為何語者即鉅野詩之蒲港對蓮塘儷偶相配似乎不誤非淵親見其地亦不知港字當為巷也其中如寄蘇軾詩之遙知丹地開黃巻解記清波没白鷗二語蓋宋敏求校定杜詩誤改白鷗没浩蕩句軾嘗論之見東坡志林故師道借以為諷淵惟引其寄弟轍詩萬里滄波没兩鷗句則與上句丹地黃巻不相應矣他如兒生未知父句實用孔融詩情生一念中句實用陳鴻長恨歌傳度越周漢登虞唐句虞唐顛倒實用韓愈詩孰知詩有驗句以熟為孰實用杜甫詩而皆遺漏不注次韻春懷詩塵生鳥跡多句鳥跡當為馬跡之訛而引晉簡文牀塵䑕跡附㑹之齋居詩青奴白牯靜相宜句牯字必誤而引白角簟附㑹之謁龎籍墓詩叢篁侵道更須東句東字必誤而引齊民要術東家種竹附㑹之至於以謝客兒為客子以龍為龍伯皆舛謬顯然淵亦絶不糾正是皆不免於微瑕據淵自序其編次先後亦如所注山谷集例寓年譜於目録今考和豫章公黃梅二首注曰此篇編次不論姑仍其舊又於紹聖三年下注曰是嵗春初后山當罷潁學而離潁等詩反在巻終又有未離潁時所作魏本如此不欲深加改正而於示三子詩則注曰此篇原在晁張見過詩後今遷於此於雪後黃樓寄負山居士詩則注曰此詩原在秋懷前今遷於此於再次韻蘇公示兩歐陽五詩則注曰以東坡集考之原在泛潁詩後今遷於此則亦有所竄定非衍之舊又衍記稱師道卒於建中靖國元年年四十九此集託始於元豐六年則師道年已三十一不應三十嵗前都無一詩觀城南寓居二首列於元豐七年而注曰或云熙寧間作則淵亦自疑之題趙士暕高軒過圖一首淵引王立之詩話稱作詩後數月間遂卒故其後更列送歐陽棐晁端仁王鞏三詩今考王立之詩話實作數日無已卒士暕贈以百縑校其所録情事作數日為是則小誤亦所不免然援證古今具有條理其所得者實多莊綽雞肋編嘗摭師道詩採用俚語者十八條大致皆淵注所已及可知其用意之密矣固與所注山谷集均可並傳不朽也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書
