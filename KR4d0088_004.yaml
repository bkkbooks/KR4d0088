  text: 后山詩注卷第四
  hash: sha256:8a60e5c1b5b0118f63a9e3edf2a78b01eb4f97fc1deec9bf92fa1164b7fa57f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_004-1a}
body:
  text: 送趙承議令畤令畤為頴州簽判受代而去先王隱德世難名晚見諸孫也自成趙令畤字德麟藝祖之後也故以吳大伯比其先王晉書王湛有隱德人莫能知頴水向來須好句東坡頴州謝上表曰文獻相續有晏殊歐陽修之風道山今日有宗英後漢書學者謂東觀為道家蓬萊山漢書景十三王敘傳曰四國絶祀河間賢眀禮樂是修為漢宗英林湖更覺追隨盡曹子建詩清夜遊西園冠蓋相追隨老杜詩秋覺追隨盡此引用言無復遊從之侣巾帽猶堪語笑傾老杜詩羞將短髮還吹帽笑倩傍人為正冠此反而用之自言其尚未老也老杜集中李之芳詩數語欹紗帽勤苦讀書終不輔未須墻角棄長檠神仙傳有年少與蘇子訓鄰居為太學生諸貴人作計共呼生謂曰子勤苦讀書欲規富貴但召子訓來可不勞而得矣長檠見上注德麟蓋王孫而有儒素風味云寄李學士格非格非字文叔眼看遊舊半東都五嵗曽無一紙書晉書劉弘傳云得劉公一𥿄賢於十部從事老杜詩厚祿故人書斷絶平日齊名多早逹莫年同國未情踈老杜詩時來如宦達歲晚莫情踈稍尋東剎論兹事東剎當在頴州前有東剎贈仁公詩茲事謂一大事因緣賴有西方託後車託後車見上注李君當是西方社中人説與杜郎須著便不應濠上始知魚勸其早歸依佛祖也傳燈録雲門大師云觸目承當得猶是不著便東坡觀魚臺詩曰若信萬殊歸一理子今知我即知魚晉書王坦之傳謝安曰常謂君粗得鄙趣者猶未悟之濠上邪雪初雪已覆地老杜詩秪應踏初雪又詩茅簷花覆地晚風仍積威漢書司馬遷書曰積威約之漸也木鳴端自語鳥起不成飛王介甫詩卧聽窽木鳴相挨樂府神弦歌道君曲曰中庭有樹自語梧桐推枝布葉孫子曰鳥起者伏也文選鴈詩曰亂起未成行寒巷聞驚犬鄰家有夜歸王維與裴迪書曰寒生野火明滅林外深巷寒犬吠聲如豹不無慙敗絮陶淵明與子儼等疏曰余嘗感仲孺賢妻之言敗絮自擁何慙兒子按後漢列女傳王霸字仲孺與同郡令狐子伯為友後子伯為楚相而其子為郡功曹令奉書於霸車馬服從雍容如也霸子方耕於野聞客至投耒而歸見令孤子沮怍不能仰視霸目之有愧容客去而久卧不起霸妻曰君少修清節奈何忘宿心而慚兒女子乎未易泣牛衣言不為兒女悲也漢書王章傳疾病無被卧牛衣中與妻訣涕泣晚出應俗敢辭疾衝風寧小驅范曄後漢書王充等傳論曰應俗適事難以常條退之詩不衝風雨即衝埃聊為一日役不憚百金軀鮑昭行路難曰非我昔時千金軀雪路無行迹汝南先賢傳曰時大雪洛陽令至袁安門無行路又闕史載皇甫湜嘗因積雪門無行迹氷枝有落烏樂天烏夜啼曰霜滑有風枝寒門閉蕭瑟窮里聽􅐵吁寒門亦用袁安事漢書趙廣漢傳長安少年會窮里空舍竒朝載之兄弟人言婚宦情欲夲后山自注古語曰人不婚宦情欲失半我始求脫君已半按列子云語有之曰人不婚宦情欲失半人不衣食君臣道息孰知一世如一夢在夢而覺寧待旦退之祭文曰人之生世如夢一覺寒簷凍雨作秋聲凍音東暴雨也楚詞九歌曰使凍雨苟灑塵老杜詩南風作秋聲冷屋風燈挑不明老杜風燈照夜欲三更樽前已作十年語後會未期吾屢驚孟浩然詩平生復能幾一别十餘春一聞七字心已識鉤章棘句天與力退之記夢詩云壯非少者哦七言六字常語一字難又孟郊墓志云其為詩鉤章棘句搯擢胃腎老杜詩溟漲與筆力念子方壯我已衰不見參天二千尺老杜古柏行黛色參天二千尺季也亦有詩百篇叔子擬度驊騮前曽慥詩選云朝仲之字叔用少受知於陳無已無已贈其兄詩云駸駸擬度驊騮前謂叔用也按善本駸駸作叔子當是叔與季兼指兩人但未知叔用為叔為季而曽氏誤以為一人遂改作駸駸非是南史王僧虔曰弟書如騎騾駸駸常欲度驊騮前鍾嶸詩品亦曰征虜卓卓殆欲度驊騮前端能過我三冬學漢書東方朔曰學三冬文史足用可復參儂一味禪勸其廣學也廣語有僧辭歸宗云諸方學五味禪去宗云我這裏有一味襌為甚不學僧云如何是一味襌宗便打寄答王直方人情校往復屢勉終不近晉嵆康絶交書曰不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉強則不能久東坡亦云人情重往返不報生禍根新詩已經年知子不我怨退之詩元日新詩已去年生世餘幾何尺箠日取寸莊子曰一尺之箠日取其半萬世不竭懷祿有遐心漢書楊惲傳曰懷祿貪勢不能自退詩云母金玉爾音而有遐心從俗無逺韻楚詞曰將從俗富貴以偷生乎按曲禮曰禮從宜使從俗晉書庾凱雅有逺韻時從府中歸數過林下飯漢書鮑宣傳曰俱過宣一飯去後漢書第五倫傳光武曰聞卿為吏不過從兄飯老杜詩僧飯屢過門雲溪友議僧靈徹詩曰林下何曽見一人平生功名意回作香火願北史陸法和曰但從空王佛所與主上有香火因緣三年不舉觴吻頻煙火焮左傳曰鄭火司馬司寇列居火道行火所焮注灸也豈無兩蒼龍霑我一雨潤蒼龍謂團茶法華經言雖一地所生一雨所潤而諸草木各有差别官粗詩未工猛乞無小靳官粗見上注後漢崔烈入錢為司徒及拜帝曰悔不小靳人生如此耳文字已其閠退之詩人生但如此朱紫安足僣閏謂餘事也下句蓋足此意是身雖臭腐維摩經曰是身不淨穢惡充滿莊子曰神竒化為臭腐寧作青紫楦朝野僉載唐楊炯常呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳無德而朱紫何以異是永懷忘年友死矣餘令聞后山自注云忘年友邢居實也南史江揔傳張纘等呼為忘年友詩云令聞令望邢居實死於元祐一三年間年二十七念子頗似之老我何所恨筆談曰歐公詩老我倦鞍馬誰能事吟哦王介甫詩老我孤主恩結草以為期此文章佳語也寄侍讀蘇尚書六月西湖早得秋二年歸思與遲留老杜詩陂唐五月秋選詩遲留法豈輕一時賔客餘枚叟枚叟謂枚乘后山取以自比也謝惠連雪賦曰梁王不恱遊於兔園乃置旨酒命賔友召鄒生延枚叟老杜詩空餘枚叟在應念早升堂在處兒童説細侯此句屬蘇公後漢郭伋字細侯為并州牧素結恩德及後行部有兒童數百各騎竹馬道次迎拜經國向來須老手晉書石苞傳景帝曰苞有經國才猷東坡詩老手便劇郡有懷何必到壷頭後漢馬援南擊交趾軍至浪上與賊戰破之從容謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中卧念少遊平生時語何可得也其後年六十二自請征五溪進營壷頭暑甚中病卒遙知丹地開黃卷謂蘇公在經筵也北史周紀曰椒房丹地有衆如雲老杜詩閣道通丹地按漢書梅福傳注曰以丹淹泥塗殿上地晉書禇陶曰聖賢備在黃卷中解記清波沒白鷗此篇又勸蘇公髙退蘇公在頴和子由詩有明年兼與士龍去萬頃滄波沒兩鷗之句寄亳州林待制希湖海相望闕寄聲雲林過雨未全晴劉禹錫竹枝歌曰東邊日出西邊雨道是無晴却有晴后山反其意而用之言聲問闕然近於寡情也文選枚乘七發曰遊涉乎雲林杜牧之詩自古雲林逺市朝青衫作吏非前日晉書嵇康曰聞道士遺言餌术黃精令人久壽意甚信之遊山澤觀魚鳥心甚樂之一行作吏此事便廢白首論文笑後生言見笑於後生也老杜詩晚將末契託年少當面論心背靣笑又云更覺前賢畏後生似聽兒童迎五馬古樂府陌上桑曰使君從南來五馬立踟蹰此五馬本事所出也後人臆説妄矣兒童用後漢郭伋事稍修書札問專城書札見上注陌上桑又曰四十専城居一聞苦李蒙莊句史記老子楚苦縣人莊子蒙人按亳州衛真縣本苦縣城東有賴鄉祠老子所生之地亳州雖有蒙城縣然莊子為蒙漆園吏當在今曹之宛朐云不復人間世後名晉書張翰傳曰使我有身後名不如即時一杯酒卧疾絶句老裏何堪病再來愁邊不復酒相開老杜詩愁邊有江水又云何以開我愁一生也作千年調此句未分其遂死也寒山子詩云人是黑頭蟲剛作千年調鑄鐡作門限鬼見拍手笑兩腳猶須萬里回老杜詩兩腳但如舊開天傳信記萬回師之兄戍安西萬回覲之朝往夕返以其萬里而廽故謂之萬廽也南軒絶句少日書林頗著勳揚雄長楊賦曰并苞書林退之復志賦朝馳騖乎書林魯直詩四會有黃令學古著勳多按曹子建書曰豈徒以翰墨為勳績哉風俗通曰蓋嚴楊惲勳著王室蜀志杜微傳曰著勳於竹帛莫年貪佛替論文老杜詩老夫貪佛日又詩故著浮查替入舟王介甫詩乞得膠膠擾擾身江湖波浪替埃塵銅爐瓦枕芒鞋裏此外惟須對此君老杜詩多病所須惟藥物微軀此外更何求晉書王徽之指竹曰何可一日無此君獨坐文章平日事風竹暮年須老杜詩文章千古事又詩嗜酒愛風竹衰疾懸知此老杜詩時應念衰疾懸謂遙度也退之詩後日懸知漸齒莽霜毛不更除退之詩斗覺霜毛一半加玉臺新詠寶月詩曰情人為君除白髮老杜詩紅顔愁落盡白髮不能除一丘吾欲往一丘見上注百畒有如無言不足為養也魯論曰有若無荀子曰有之不如無之魑魅須遊子老杜懷李白詩曰魑魅喜人過乾坤著腐儒老杜江漢詩乾坤一腐儒扣門聞啄木退之詩丁丁扣門疑啄木喚酒有提壷歐公詩獨有花上提葫蘆勸公沽酒花前傾蓋鳥名也門徑無行迹秋來不遣鋤逸史皇甫湜常因積雪門無行迹三輔決録張仲蔚所居蓬蒿沒人老杜詩草茅無徑欲教鋤此反而用之寄送定州蘇尚書元祐八年九月蘇公知定州於時宣仁聖烈太后上升時事漸變故此詩意勸公省事髙退初聞簡䇿侍前旒簡䇿謂作侍讀時淮南子曰王者冕而前旒所以蔽明又見衣冠送作舟世説羅友答桓溫曰旦出門逢一鬼大揶揄云我秪見汝送人作郡何以不見人送汝作郡北府時清惟可飲晉書郗愔在北府徐州人徑悍桓溫云京口酒可飲兵可用深不欲愔居之此借用以言定武在河北也齊書謝朏為吳興與弟瀹於征虜亭别指瀹口曰此中惟宜飲酒老杜詩時清猶茹芝西山氣爽更宜秋晉書王徽之為桓沖騎兵參軍沖曰卿在府日久比當相料理徽之不答直髙視以手版柱頰云西山朝來致有爽氣耳此借用以言太行李商隱詩故鄉雲水地歸夢不宜秋功名不朽聊通袖海道無違具一舟此兩句皆拈出東坡語以勸之意謂功成名遂自足不朽政可縮手袖間而遂湖海之本志也東坡沁園春詞有云用舍有時行藏在我袖手何妨間處看八聲甘州詞有云約他年東還海道願謝公雅志莫相違按晉書謝安雖受朝寄東山之志始末不變反鎮新城造泛海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失老杜詩平生江海心宿昔具扁舟枉讀平生三萬卷貂蟬當復自兜牟退之詩鄴侯家多書插架三萬軸南史周盤龍為散騎常侍齊武帝戲之曰貂蟬何如兜牟對曰貂蟬出於兜牟寄答李方叔豸平生經世䇿寄食不資身言其謀䇿可以經綸當世而反不能資一身也莊子曰其不可經於世亦逺矣漢書韓信傳寄食於漂母無資身之䇿孰使文章著老杜云名豈文章著能辭轍迹頻意謂有文如此安能免棲棲旅人哉退之進學解云孟軻好辨孔道以明轍環天下卒老于行左傳曰周行天下將皆必有車轍馬迹焉帝城分不入漢書陳咸傳咸滯於郡守時王音輔政信用陳湯咸數賂遺湯子書曰即蒙子公力得入帝城死不恨分謂隔絶也老杜詩闕庭分未到舟楫有光輝書札詗何人此句蓋終上意漢書淮南王安傳曰為中詗長安注偵伺也子未知吾懶吾寧覺子貧此反濠上知魚之意而用之文選嵆康書曰人之相知貴識其天性老杜詩近有峩眉客知豫懶是真智寶院後樓懷胡元茂前有胡士彥挽詞即元茂也晚渡呼舟疾杜牧之杜秋詩云却喚松江渡寒城著霧深老杜野望詩孤城隱霧深昏鷗明鳥道老杜雨詩云白鳥去邊明南中八志云交趾郡治龍編縣自興古鳥道四百里風葉亂霜林李啇隱詩風葉共成喧久客登樓目文選王粲登樓賦曰情眷眷而懷歸兮孰憂思之可任平原逺而目極兮蔽荆山之髙岑老杜詩天畔登樓眼中年懷舊心晉書王羲之傳謝安曰中年以來傷於哀樂與親友别輒作數日惡文選向秀思舊賦序云經嵆康舊廬鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而歎故作賦云猶須一長笛領覽自霑襟終上句未盡之意謂夲自悲愴尚何須聞笛耶老杜云不須吹急管衰老易悲傷元日老境難為節寒梢未得春曲禮六十曰耆指使疏引賀瑒云耆至也至老之境也又曰六十至老境而未全老老杜詩為冬不亦難杜牧之詩丁香間結春梢一官兼利害百慮孰踈親老杜詩時危關百慮按易係辭曰一致而百慮老子曰名與身孰親積雪無歸路扶行有醉人望鄉仍受嵗回首望松筠謝玄暉詩有情知望鄉老杜詩望鄉應未已李嘉祐詩白頭空受歲丹陛不朝天松筠猶松楸意謂丘墓也老杜詩窮秋正搖落回首望松筠此借用放懷施食烏鳶喜金光明經云施食之緣獲長壽報長安志云興善寺素和尚齋時烏鵲就掌中取食老杜詩得食階除鳥雀馴持經鳥鼠聽戒殺文載郭氏新説曰柘臯永寧之雀立化於松枝東城郭氏之鼠坐化於蓮葉豈非乘誦經功德自有所解悟而然歟杖藜矝矍鑠後漢馬援自請擊五溪蠻夷帝愍其老援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也顧影怪伶俜魏志何晏行步顧影文選潘嶽寡婦賦曰少伶俜而偏孤注單孑貌門靜行隨月窗虛卧見星擁衾眼未穩艱阻飽曽經老杜詩平生耽勝事吁駭始曽經絶句此生精力盡於詩末嵗心存力已疲淮南子曰宋景公時造弓人九年乃成而進之弓人歸家三日而卒蓋匠者心力盡於此弓矣故溫公通鑑序云臣之精力盡於此書不共盧王爭出手盧王謂盧照鄰王勃東坡詩云詩句對君難出手却思陶謝與同時陶謝謂淵明靈運老杜詩焉得思如陶謝手令渠述作與同遊又曰楊馬宜同時送伯兄赴吏部改官先子初增秩年侵鬢已皤漢書循吏傳序增秩賜金念兄今善繼此别喜如何以其善繼先子之志故以别為喜也親老家仍困門衰仕未多家語子路曰家貧親老不擇祿而仕晉書李密表云門衰祚薄猶須教兒子早要中交科寄張文潛舍人今代張平子後漢書張衡字平子善屬文雄深次子長劉禹錫序柳子厚集曰韓退之評其文雄深雅健似司馬子長名髙三俊上翰林志曰李紳李德𥙿元稹同在禁署時號三俊此借用以指蘇公客黃秦朝也官立右螭傍唐書張次宗傳文宗詔左右史立螭頭下記宰相奏對按實録文潛元祐八年冬自著作佐郎除起居舍人即右史也紹聖元年四月以直龍圖閣知潤州此詩蓋春時所作車笠吾何恨北戶録載風王記越人結交盟曰卿乘車我戴笠後日相逢下車揖我步行卿乘馬後日相逢卿當下飛騰子莫量老杜贈髙適詩飛騰無那故人何時平身早逹未用夢凝香后山自注曰來書云輔郡之樂發於夢寐晉書張載曰時平則才伏世亂則竒用退之詩太平時節身難遇此反其意而用之韋應物刺蘇州有詩曰兵衛森畫戟燕寢凝清香後湖晚坐水淨偏明眼老杜詩水淨樓隂直又云吾與汝曹俱眼明城荒可當山樂天詩亭眷太髙君莫折東家留取當西山青林無限意白鳥有餘間身致江湖上王介甫與執政書曰及今愈思自致江湖之上又有詩曰委質山林如許國后山謂身致亦介甫委質之意名成伯季間伯季似指二蘇門下諸君后山嘗作佛指記曰豫以文義名次四君蓋謂此也魏文帝典論曰傅毅之於班固伯仲之間耳晉書王湛傳王濟對武帝曰臣叔殊不癡山濤以下魏舒以上湛曰欲處我於季孟之間乎目隨歸鴈盡嵆康詩曰手揮五絃目送歸鴈坐待莫鴉還老杜詩有待至昏鴉春興東風作惡不成寒野水穿沙自作灘王介甫詩睡過東風作惡時細草無端留客卧文選丘希範詩細草藉龍騎老杜詩邂逅無端出餞遲鄭谷曲江春草詩云香輪莫輾青青破留與遊人一醉眠繁枝有意待人看退之詩春風也是多才思故揀繁枝折贈君又云榴花不發待郎歸老杜詩寒江流甚細有意待人歸次韻回山人贈沈東老二首前篇屬回山人一杯領意不須沽老杜詩領客珍重意六字持身已有餘導引有六字氣謂嘻吁哂噓呵呼也黃庭經曰至道不煩司馬相如過宜春宫賦曰持身不謹按列子曰子知持後則可言持身矣癡子未知天上樂法華經曰癡子捨我五十餘年庫藏諸物當如之何神仙傳彭祖問石生曰何不服藥仙去對曰天上多有至尊相奉甚難更苦人耳李商隱作李賀小傳曰賀將死有緋衣人持二板書召賀曰帝城白玉樓立召為記天上差樂不苦也先生今解世間書退之石鼎聮句詩序曰彌眀謂劉師服曰吾不解世俗書弟子為書吾句又後篇屬沈東老隨世功名非所望稱家豐儉不求餘老杜詩稱家隨豐儉按禮記檀弓曰稱家之有無後漢馬援傳曰士生一世但求衣食裁足致求盈餘但自苦耳青衫出指論竒字漢書楊雄贊劉棻嘗從雄學作竒字白髮挑燈寫細書言其髙年而眼能明也退之短檠歌曰夜書細字綴語言送孝忠二首當是其兄傳道之子老眼元多淚春風見此行又為貧賤别老眼固自多淚况重以别離之感耶貧賤别見上注更覺急難情常棣詩脊鴒在原兄弟急難斗食吾堪老漢書百官表百石以下有十食佐史之秩注云斗食月奉十一斛一説日食一斗二升詞場爾向榮老杜詩詞埸繼國陶淵明歸去來辭曰木欣欣以向榮借此用未須憐野鶩法書苑曰庾翼善草隸少與王羲之齊名弟子皆效之羲之後進內外宗尚翼甚不平在荆州與都下人書云兒輩乃輕家雞愛野雉皆學逸少東坡詩野鶩家雞定誰美家法付宣城齊書謝眺為宣城太守善詩家法謂靈運惠連皆眺之族父以詩知名後漢儒林傳序各以家法教授又經史三年學楊子曰古之學者三年通一經聰明一旦開楊子曰天降生民倥侗顓蒙恣于情性聰眀不開老杜詩大兒聰明到能添老樹巔崖裏小兒心孔開貌得山僧及童子把文甘潦倒老杜詩把文驚小陸此用小陸以比孝忠也晉嵆康與山濤書曰足下素知吾潦倒粗踈不切事情此借用以自况也數日待歸來左傳曰行則數日而反退之詩屈指數日憐嬰孩數字作上聲讀士患聲名早東坡和仲子逮詩曰飬氣勿吟哦聲名忌太早官今嵗月催自言老於微官也有親須薄祿臨路尚徘徊言惜别眷眷之意以親養故不能與之俱去也鮑照放歌行曰今君有何疾臨路獨遲回以柱杖供仁山主二首錯節孤根徑有餘坐床須按起須扶後漢虞詡傳不逢盤根錯節何以知利器選詩石梁有餘徑一生用底令相贈更問林間有此無趙州臨遷化以拂子送與王鎔曰此是老僧一生用不盡底事見趙州語録又洗足投筇只坐襌厭尋歧路費行纏金剛經云洗足已敷坐而坐東坡詩已辦布襪費行纏老來不復人間事不用山公更削圎桂苑叢談曰潤州甘露寺有僧道行孤髙李德裕廉問日以方竹杖一贈焉方竹出大宛國堅實而方正節根鬚牙四面對出及再鎮浙右其僧尚在問曰前所奉竹杖無恙否僧喜對曰已規圎而漆之矣公嗟倇彌日前輩詩曰削圎方竹杖漆却斷紋琴項城道中寄劉令使修溪橋項城屬陳州老怯危橋泥沒膝老杜詩虛疑皓首衝泥怯盧同放魚歌曰天雨曼陀羅花深沒膝喜聞吾黨政如春謝承後漢書李燮拜京兆民謡曰我府君道教舉恩如春威如虎須君不惜千金費孫子曰興師十萬日費千金文選古詩曰愚者愛惜費但為後世嗤此後寧無我輩人言必有好事者繼之晉書石苞傳許允曰卿是我輩人碓磨寨唐書黃巢圍陳州人大飢倚死墻塹賊俘以食日數十人乃列百巨碓麋皮骨於臼并啖之以人為食殺為戲自昔無聞爾所先信有忘身一言盡獨能遺臭萬人傳東坡富公碑銘曰以殺為嬉漢書五被傳吳王曰男子之所死者一言耳劉原甫説云此言所死雖不同等是死耳晉書桓溫傳溫曰既不能流芳後世不足復遺臭萬載耶老杜詩將詩不必萬人傳寄張宣州耒與世情將盡懷仁老未忘書云懷于有仁此借用言獨於仁賢未能忘情故人今五馬見上注髙處謾三長唐書孟郊傳李觀論其詩曰髙處在古無上平處下顧二謝又劉子玄言作史有三長謂才學識詩豈江山助言宣州詩本天成不用借助唐書張説傳説謫嶽州而詩亦悽惋人謂江山助云名成沈鮑行老杜詩沈鮑得同行謂沈約鮑照肯為文俗事後漢陳忠上疏曰諸郎多文俗事又隗囂傳論曰徒以文俗自喜打鴨起鴛鴦此用宣州故事魏泰詩話吕士隆知宣州好笞官妓官妓皆欲逃去會杭州一妓到士隆喜之留不使去一日郡妓復犯小過士隆欲笞之妓訴曰某不敢辭罪但妓不能安也士隆愍而捨之梅聖俞作莫打鴨篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池西落不比孤洲老秃鶬秃鶬而欲逺飛去又況鴛鴦羽翼長杜牧之詩驚夢起鴛鴦然此詩意不特為妓女發送倫化主赤髭白足可憐生髙僧傳佛陀耶舍為人赤髭善解毗婆沙時人號曰赤髭毗耶沙又云釋曇始足白於面雖跣涉泥水未嘗沾濕天下咸稱白足和尚劉禹錫送僧序曰備將迎者皆赤髭白足之侣傳燈録忠國師曰幸自可憐生須要個護身符子作麼躡蹻擔囊壯此行史記虞卿傳躡蹻擔簦要致雪峯千五百傳燈録雪峯義存襌師學者冬夏不減千五百人不妨兼識謝宣城以比張宣州也齊書謝眺為宣城郡太守杜詩云詩接謝宣城西湖小徑才容足列子曰泰豆乃立木為塗僅可容足張湛注云才得安腳寒花知自香老杜詩寒花只暫香官池下鳬鴈老杜有官池春鴈詩漢昭帝紀黃鵠下建章宫太液池中文選劉公幹詩曰方塘含白水中有鳬與鴈荒塜上牛羊古樂府曰今日牛羊上丘壠有子吾甘老東坡詩有子萬事足老杜詩吾老甘貧病無家去未量老杜詩無家問消息作客信乾坤三年哦五字草木借輝光老杜詩擁别借輝光别月華嚴寓世生同里隨方去有情漢書盧綰傳與髙祖同里生后山借用其意來為百年别不惜片時程老杜詩繫帆何惜片時程齋鉢須勤供經鍾莫倦鳴勸其接物利生也當來第三會此界却逢迎釋氏書彌勒當來下生於龍華樹下三會説法度人三水小牘云東都僧從練臨終呼門人戒曰人生難得惡道易淪惟有歸命釋尊勵精梵行龍華會上當復相逢戰國䇿曰燕太子逢迎却行送吳先生謁惠州蘇副使吳先生當是吳逺遊蘇公嘗有書與之聞名欣識面言吳君欲識東坡也老杜詩李雍求識靣傳燈録夾山惟儼傳李翺曰見靣不如聞名此反而用之異好有同功吳君方外之士與后山異趣而好賢之意則同故云同功記曰與仁同功其仁未可知也此用其字我亦慙吾子后山不能往見蘇公此所以有愧於吳君也人誰恕此公老杜寄李太白詩衆人皆欲殺吾意獨憐才東坡詩平生我亦輕餘子晚歲人誰念此公百年雙白鬢時東坡年五十九老杜詩百年雙白鬢一别五秋螢萬里一秋風言神交心契與風無間也老杜詩瞿塘峽口曲江頭萬里風煙接素秋蓋亦此意按通鑑秦使閻負謂張瓘曰晉王與君鄰藩雖山河阻絶風通道會為説任安在依然一秃翁漢書霍去病傳衛青日衰而去病日益貴故人門下多去事去病輒得官爵惟獨任安不肯去又灌夫傳與長孺共一秃翁注言無官位版綬也末句后山自謂不負蘇公之門時亦坐黨事廢錮故云秃翁别圓澄禪師法施老人卧不出呼我取别行問疾十二國史曰魯宓子賤為單父宰行過楊晝取别維摩經云汝行詣維摩詰問疾磨盤拭筯勸一飽少待須臾莫倉卒磨盤拭筯蓋俗間語老杜詩低頭拭小盤維摩經香積品云若欲食者且待須臾當令汝得未曾有食老杜詩忍待明年莫倉卒早年著眼覷文字退之詩不如覷文字丹鉛事點勘萬卷初無一言契傳燈録香嚴依溈山祐和尚和尚曰汝未出胞胎時本分事道將一句來師遍檢所集諸方語句無一言可將酬對又五泄山靈默禪師謁石頭和尚先自約曰若一言相契我即住不然便去多生綺語未經懺樂天香山寺白氏洛中集記曰願以今生世俗文字之業狂言綺語之過轉為將來世世讃佛乘之因轉法輪之緣按釋氏書綺語蓋口中四業之一謂綺飾文詞過有增華也半世虛名足為纍退之詩士生為名纍此去他來尚有緣頭童齒豁恐無年退之進學解頭童齒豁竟死何禆世説王珣歎曰人固不可以無年殷勤三請久住世法華經曰世尊告舍利佛汝已殷勤三請豈得不説華嚴經普賢行願品曰七者請佛住世弊惡可念未可捐華嚴經十回向品曰菩薩不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不修廽向平生準擬西行計老著人間此何意西行謂願生極樂國髙僧傳慧持謂慧逺曰若滯情愛聚者本不應出家今既割欲求道正以西方為期耳他年佛會見頭陀知是當年老居士傳燈録傅大士傳曰有天竺僧嵩頭陀謂曰我與婆尸棄佛所發誓今兜率衣鉢見在因命臨水觀其影見大士圎光實蓋此詩以嵩頭陀比圎澄以傅大士自况别觀音山主離合應生理文選陸士衡詩離合非有常譬彼弦與括老杜詩人生有離合豈擇衰老端文選袁宏三國名臣序贊曰生理不可不全李善注引鷦鷯賦曰生生之理足矣此借用言人生之常理過逢豈近緣老杜詩數為姻婭過逢地情親見今日語妙記當年情親語妙並見上注閉户安禪主衝風逆水船兩句言行藏勞逸各異也法華經偈曰安襌合掌老杜詩蕭灑共安襌又詩春多逆水風不應清夜月故作别時圓老杜宿贊公房詩云相逢成夜宿隴月向人圎而東坡水調詞云不應有限何事長向别時圎離頴河市千人聚長安萬年縣有千人聚關中記曰宣帝以倡優雜伎千人樂思后園今所謂千人鄉者是也此詩借用寒江百丈牽老杜詩寒江動夜扉又詩百丈牽江色吾生能幾日此地費三年後周蕭撝勞歌曰百年能幾許公事罷平生老杜詩為客費多年東坡詩人生不滿百一别費三年叢竹防供㸑池魚已割鮮當是東坡去頴後代者韓川變其舊政向也徒魚今乃割鮮行將及竹矣后山所歎意蓋不止此也東坡有請罷學士劄子曰及蒙擢為學士便為韓川等攻擊不已以至羅織語言謂之誹謗西都賦曰割鮮野食拙勤終不輔他日愧無傳樂天詩救煩莫如靜輔拙莫如勤孟子曰是以後世無傳焉湖上湖上難為别梅梢已著春林喧鳥啄啄退之詩剝剝啄啄有客至門風過水鱗鱗樂天詩小橋裝鴈齒輕浪甃魚鱗楚詞曰魚鱗鱗兮媵豫緣有三年盡釋氏云諸法從緣生緣離法即滅情無一日親言情之相親生於久也此浮屠所以不三宿桑下白頭厭奔走何地與為鄰莊子曰吾誰與為鄰舟中二首惡風橫江江卷浪黃流湍猛風用壯退之感二鳥賦云窺黃流之奔猛老杜詩初聞龍用壯字本出易大壯卦疾如萬騎千里來歐公秋聲賦曰又如赴敵之兵銜枚疾走不聞號令但聞人馬之行聲氣壓三江五湖上東坡詩氣壓鄴侯三萬籖周禮曰其川三江其浸五湖岸上空荒火夜明舟中坐起待殘更老杜詩空荒咆熊羆又詩江船火獨明此借用以言磷火少年行路今頭白不盡還家去國情言行藏進退其皆有所迫非本志也又野火燒原雉昏雊退之詩原頭火燒靜兀兀野雉畏鷹出復沒詩云雉之朝雊黃塵漲天牛亂鬪蜀都賦曰黃塵漲天江間無日不風波老去何時脫奔走老杜詩江間雖炎瘴又云舟中無日不沙塵詩書滿腹不及口後漢書趙一詩云文來宫殿隨身如意而有事見正法念處經等蓋皆持戒作福者生於此天因以比規禪也法華經亦曰一時五百萬億國士諸梵天王與宫殿俱少仕老不歸重門閉榛棘自歎其無淨居之福緣也道人秀叢林大論云譬如大樹叢聚是名為林二樹不名為林如一一比丘不名僧僧聚處得名叢林妙語出襌寂老杜詩身猶縛禪寂是身如浮雲隨處同建立維摩經是身如浮雲須臾變滅故老杜如浮雲安可限南北圎覺經偈曰皆從立華嚴經曰譬如三千大千世界建立一切處所平生與二子嗜好用一律二子必皆詩僧一律見上注我此復助緣語綺已多責語綺見上注何年一把茅據坐孤崒嵂呵佛罵祖師傳燈録德山宣鑒禪師抵溈山溈日是伊將來有把茅蓋頭罵佛罵祖去在又龍潭曰可中有一個漢他時向孤峯頂上立吾道在老杜詩好鳥啼巖扄髙嶽前崒嵂塗糊千五百傳燈録三聖答雪峯云一千五百善知識話頭也不識古寺和尚曰淨地上不要點汚人家男女后山所謂塗糊蓋此意也后山詩注卷第四
