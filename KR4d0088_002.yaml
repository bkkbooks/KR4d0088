front:
  text: 后山詩注卷第二
  hash: sha256:9acef1ecfa7dec3cf50eac9fee9478511e5d489c9acbc06fe7ec41d7d36ed61e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_002-1a}
body:
  text: 九日寄秦覯疾風回雨水明霞老杜詩殘夜水明樓沙步䕺祠欲莫鴉柳子厚鐡爐步志曰江之滸凡舟可縻而上下者曰步漢書陳勝傳注云䕺祠謂草木岑蔚者九日清樽欺白髮十年為客負黃花老杜詩生逢酒賦欺登高懷逺心如在登髙蓋九日故事文選潘嶽秋興賦曰登山懷逺而悼近李善注引齊景公逰牛山流涕而歎晏子笑之云云杜牧之九日詩云古往今來只如此牛山何必淚霑衣向老逢辰意有加遇節物而多感老者則然淮海少年天下士史記魯仲連傳吾乃今日知為天下之士也秦覯漣水軍人在楊州之境故云淮海少年可能無地落烏紗用晉孟嘉落帽事唐令狐楚重陽日登落帽臺詩云貴重近臣光綺席笑談從事落烏紗臣野餘力唐虞後沉人海岱西不應容桀黠寧復有青齊山東盜賊以巨野為淵藪平人多被沉溺詩意謂非神禹留此餘力遺患後人也向使無此澤以受衆流青齊其為魚矣此與東坡艷澦堆賦同意禹貢曰海岱及淮惟徐州大野既豬東原底平大野一名巨野史記貨殖傳曰桀黠奴人之所患也又漢書馮奉世傳曰羌虜桀黠賊害吏民燈火魚成市帆檣藕帶泥劉夢得詩漁家燈火明老杜詩藥物楚老漁商市樂府黃淡思曰象牙作帆檣老杜詩採藕不洗泥十年塵霧底瞥眼怪鳬鷖新自京洛風塵中來故見水鳥而怪歎老杜詩呀坑瞥眼過示三子時三子已歸自外家去逺即相忘歸近不可忍脞說載獨孤遐詩曰近家心轉切不敢問來人兒女已在眼眉目略不省言别久不復記憶也選詩薜荔若在眼喜極不得語淚盡方一哂東坡贈朱壽昌詩喜極無言淚如雨老杜詩畏虎不得語了知不是夢華嚴梵行品曰了知境界如幻如夢此反而用之東坡詩如今不是夢真介在廬山忽忽心未穩前漢王褒傳太子苦忽忽善忘不樂雪峯襌師點胸云某甲這裏未穩在嗚呼行去年米賤家賜粟百萬官倉不餘掬元祐初左司諌朱光廷奉使賑濟河北不問民戶之等一概支貸而河北措置司積年物斛九百萬為之一空此詩所指豈謂是與詩云終朝采緑不盈一掬青錢隨賜費追呼昔日剜創今𥙷肉老杜詩恰有三百青銅錢圵夢瑣言載聶夷中詩云二月賣新絲五月糶新榖醫得眼下瘡剜却心頭肉今年夏旱秋水生江淮轉粟千里行前漢鄒陽傳轉粟流輸千里不絶不應逺水救近渴此俗間語也韓非子亦有逺水救近火之語空倉四壁雀不鳴益州耆舊傳楊宣為河內太守行縣有羣雀鳴宣曰前有覆車粟此雀相隨欲往食歐公詩寒雀聚空倉似聞為政不為費善政當惠而不費徒惠而不知為政其可繼乎兩不相傷兩相濟老豫曰兩不相傷而德交歸焉此借用十年斂積用一朝驚濤破山風動地言非常之政不可久也老杜詩築場看斂積莊子曰疾雷破山風振海而不能驚老杜又云東南飄風動地至秋懷示黃預窗鳴風歷耳柳子厚夢歸賦云風纚纚以經耳佛書有一歷耳根之語道壞草侵衣老杜詩壞道哀湍㵼月到千家靜老杜詩千家山郭靜朝暉林昏一鳥歸老杜詩日暮歸幾翼北林空自昏又云林昏罷幽磬冥冥塵外趣楊子曰鴻飛冥冥弋人何篡焉此借用稍稍眼中稀疑用老杜眼前無俗物之意史記平原君傳賔客稍稍引去者過半太白詩古來相接眼中稀送老須公等秋棊未解圍一作小合圍老杜詩送老白雲邊曹攄圍棊賦曰合圍促陳交相侵伐送張支使曠度逢知晚髙才處不難文選夏侯湛東方朔盡贊曰逺心曠度嵆康書云長才廣度無所不淹清秋一鶚上後漢孔融薦禰衡云鷙鳥纍百不如一鶚老杜鵰賦云當九秋之凄清見一鶚直上拭目萬人看文選楊修書云觀者駭視而拭目白酒初同醉周禮酒正注曰昔酒無事而飲也今之酋久白酒所謂舊醳者也樂天詩花時同醉破春愁黃花已戒寒禮記月令季秋之月曰鞠有黃花國語曰火見而清風戒寒憑將衰老事一一報長安長安蓋后山舊遊之地前詩有城南寓居篇郎長安所作送杜侍御純陜西轉運餽糧千里古無䇿木牛流馬功不極漢書韓信傳千里餽糧師不宿飽唐書夷狄傳序劉貺謂漢無䇿蜀諸葛亮以木牛流馬運竟坐糧不繼不能成功漢書刑法志曰兵寢刑措帝王之極功此借用邊頭數米換黃金老杜詩邊頭公卿仍獨驕莊子曰簡髮而櫛數米而炊晉書劉曜逼京師米斗金二兩將軍汗馬未伏櫪史記晉世家曰矢石之難汗馬之勞魏武帝歌曰老驥伏櫪志在千里黠羌人面作胡語後漢馬援傳曰黠羌旅拒此乃太守事耳漢書胸奴贊曰人靣獸心老柱詩云千歲琵琶作胡語鳥鼠貪生爾如許言鳥鼠尚知貪生而黠羌輕生如此晉書王濬傳曰雀鼠貪生苟此一活耳熊虎可避蚊可驅覆巢熏穴意何如言不必深入窮討也漢書胸奴傳嚴尤曰視夷狄之侵譬猶蚊之螫驅之而已禮記曰不覆巢韓詩外傳曰社鼠燻之恐燒木老杜詩主簿意何如漢虜相當庸可盡選詩漢虜方未和後漢南胸奴傳窮鳥困獸皆相救死況種類繁熾不可單盡又傳論曰漢之疲耗略相當矣聊城正用一封書史記魯仲連傳燕將保守聊城田單攻之不下仲連乃為書約之以矢射城中燕將見書自殺此詩言得人則一書可以弭難何必窮兵黷武哉老杜詩自寄一封書今已六月後巧手莫為無麵餅誰能留渴須逺井兩句皆善用俗語言治邊不可無人材猶作餅不可無麵而人材政自有可用者何必逺取如留渴以待井耶杜君自徐就改陜漕故詩云尓國家有急君得辭漢書陳湯傳曰國家有急君其母讓老杜送楊監赴蜀詩云相公鎮梁益軍事無孑遺解榻再見今用材復擇誰况君已髙位為郡得固辭徐人不勞扣關請後漢种皓遷凉州刺史吏民詣闕請留一年周禮關人注曰扣關猶謁關人也隴上壯士莫捫舌晉書載記曰隴上壯士有陳安毛詩莫捫朕舌此借用以言壯士得食不復有哺之憂老杜詩曰運糧繩橋壯士喜河西狂王防係頸河西狂王謂夏國主也漢書西城傳坐知狂王當誅賈證請必係單于之頸向來此地幾送迎草間翁仲口不瘖十年兩熟飽可待一歲四守人何心言徐州數易守臣人必有不安其生者漢書黃霸傳曰數易長吏送故迎新之費及姦吏緣絶簿書盜財物水經注曰鄗南千秋亭壇廟之東枕道有兩石翁仲南北相對又按魏志明帝景初二年鑄銅人二列於司馬門外號曰翁仲東坡罷徐州寄子由詩曰道邊雙石人幾見太守發有知當解笑撫掌冠纓絶則徐州有石人可知后山此詩蓋用東坡意世說和長輿問楊右衛何在客曰向來不坐而去老稚持車車不留前漢韓延壽傳老稚扶持車轂歸人不行行轉頭歸人特須臾未行行即逺矣唐崔塗詩曰自是不歸歸便得即此句法樂天詩萬事轉頭空關中正須蕭丞相漢書蕭何守關中計户轉漕給軍老杜詩關中正留蕭丞相省內早要富民侯一本此下又有兩句曰可同一夫在所憫歲晚得無溝壑憂後刪去漢書田千秋為丞相封富民侯送楊侍禁兼寄顔黃二公二首長道魯直相逢今已晚同府尚經年衆口不成虎韓非子曰龐共與太子質於邯鄲謂魏王曰夫市無虎明矣然而三人言成市虎今夫邯鄲去魏逺於市議臣者過三人願王察之諸公更薦賢更字作平聲讀兩親須薄祿說苑子路曰家貧親老者不擇祿而仕昔者由事二親負米百里之外老杜詩上公有薦者纍奏資薄祿一障欲乘邊漢書張湯傳武帝謂狄山曰吾使生居一郡能無使虜人盜乎山曰不能居一障間山曰能乃山乘障往問顔夫子何妨試著鞭欲令往見顔君以為道地顔君名復字長道晉書劉琨傳常恐祖生先吾著鞭又多問黃居士終年缺一書漢書趙廣漢傳曰為我多謝問趙君元稹詩只是堂前缺一人君一作人因人候消息老杜詩因人問消息有使報何如古樂府曰有信數寄書無信長相憶老杜詩欲問平安無使來向晚逢楊子真堪託後車文選魏文帝與吳質書曰文學託乘於後車親年方賴祿不惜借吹噓阮嗣宗詩寵祿豈足賴此反而用之言以親飬之故也家語子貢曰家貧親老不擇祿而仕魏志鄭渾曰孔公緒能清談髙論噓枯吹生南史謝朓傳士子聲名未立當共奬成無惜齒牙餘論送外舅郭大夫䕫路提刑天險連三峽易坎卦曰天險不可升也官曹據上遊老杜詩何當官曹清漢書項羽傳注曰上遊水之上流也百年雙鬢白萬里一身浮老杜詩百年雙白鬢一别五秋螢莊子曰其生也若浮可使人無訟寧須意外憂無訟見魯論下句勸其不生事也前詩亦云莫作分外慮晋書王彬傳荆州守文豈能意外行事平生晏平仲能費幾狐裘勸其止足也用晉阮孚一生當著幾兩屐之意禮記檀弓有若曰晏子一狐裘三十年雪後黃樓寄負山居士張仲連林廬煙不起老杜詩幾地别林廬城郭歲將窮退之詩歲窮寒氣驕雲日明松雪選詩雲日相輝映又詩山明望松雪溪山進晚風老杜詩山谷進風凉人行圖畫裏鳥度醉吟中太白詩人行明鏡中鳥度屏風裏老杜詩飛閣捲簾圖畫裏唐白樂天自號醉吟先生不盡山隂興天留憶戴公晉書王徽之嘗居山隂夜雪初霽忽憶戴逵逵時在剡溪便夜乘小船詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道邪后山謂興盡則未必相憶寧不為雪夜之行使有餘興也東坡訪張山人詩萬木鎖雲龍天留與戴公此借用謝人寄酒舊香餘味寄黃封黃封謂宫酒以黃羅帕封之東坡詩上尊日日㵼黃封厭見春泥滿眼紅紅泥謂外酒王介甫詩春泥滿眼路嶇嶔此借用其字千乘莫從公子後漢書韓王信傳陳豨暴魏公子招致賔客隨之者千餘乘百壷能為故人東老杜詩不有小舟能蕩漿百壷邦送酒如泉儀禮聘禮賔之幣唯馬出其餘皆東從蘇公登後樓倐作三年别才堪一解顔列子第四篇曰五年之後心更念是非口更念利害老啇始一解顔而笑老啇氏蓋列子之師也樓孤帶清洛老杜云樓孤屬晚晴元豐中導洛水以為清汴南都水所過也林缺見巴山東坡蜀人當是時必有望逺思歸之意老杜詩何路出巴山五月池無水張籍詩六月人家井無水夜聞白鼉人盡起千年鶴自還續搜神記曰遼東華表柱有鶴集其上曰去家千年今始歸白鷗沒浩蕩愛惜鬢毛班勸公髙退以安晚景也老杜詩白鷗沒浩蕩萬里誰能馴又曰更憶鬢毛班送蘇公知杭州東坡出知杭州道由南京后山時為徐州教授詣徐守孫覺願往見而覺不之許乃託疾謁告來南京送别同舟東下至宿而歸事見東坡送陳傳道書及劉安世彈章平生羊荆州追送不作逺羊荆州謂羊祐也以比東坡按晉書羊祜傳督荆州諸軍又按晉書郭奕傳奕字大業為野王令羊祜嘗過之奕歎曰羊叔子何必减郭大業少選復往又歎曰羊叔子去人逺矣遂送祜出界數百里坐此免官后山既送東坡為劉安世所彈乞正其罪嘗除太學博士又為言者以此事論列遂罷此句殆亦詩讖也有客詩云薄言追之注云追送也世說范逵既去陶侃追送不已且百許里文選孫子荆詩傾城逺追送餞我千里道豈不畏簡書言法令不許私出也詩云豈不懷歸畏此簡書劉安世章亦云士於知已不無私恩既郊於官則有法令師道擅去官次陵蔑郡將徇情亂法莫此為甚放麑誠不忍此句與上句若不相屬而意在言外叢林所謂活句也按韓非子孟孫獵得麑使秦西巴載之持歸其母隨之而啼秦西巴弗忍而與之孟孫大怒逐之三月復召以為子傳曰夫不忍麑且忍吾子乎唐陳子昻感寓詩曰吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終嗚呼觀過可以知仁后山越法出境以送師友亦放麑之類也一代不數人百年能幾見后山謝再授徐州教授啓亦曰昨緣知舊出守東南念一代之數人而百年之幾見間以重江之阻莫期再歲之逢使一有於先顛為兩途之後悔又謂中山之相仁於放麑亂世之雄疑於食子惟其信之既篤所以行之不疑云云其曰中山之相蓋承子昻之誤也昔為馬口銜今為禁門鍵鮑照詩昔如鞲上鷹今作檻中猿老杜詩昔為水上鷗今如罝中兔后山此句頗用其律馬銜猶可脫去禁鍵不容輒開言官身拘係不可輒出也退之詩歸來得便即遊覽暫以壯馬脫重銜按律宫殿門忘誤不下鍵及毀管鍵而開者皆出罪王逸注楚辭大司命曰大開禁門一雨五月凉中宵大江滿風帆目力短江空歲年晚風帆愈逺恨目力不能送之人去江空恍然自失吾之年歲日已遲暮懼其不復再見也其愛賢惜别之意可謂切矣韓詩歲聿其暮薛君曰言君之年歲晚也送秦覯二首覯字少章少游之弟也從東坡學於杭州士有從師樂諸兒却未知欲行天下獨信有俗間疑柳子厚答韋中立論師道書曰獨韓愈奮不顧流俗抗顔而為方未匱竭端為李君御後漢李膺傳荀爽嘗謁膺因為其御既還喜曰今日乃得御李公矣盡得鄴侯書退之送諸葛覺往隨州讀書詩云鄴侯家多書插架三萬軸結友真莫逆史記廉頗傳燕王私握臣手曰願結交莊子曰子桑戶孟子反子琴張三人相視而笑莫逆於心遂相與友論才有不如終上句意言亦當擇交無友不如已者折腰終不𥙷晉書陶淵明傳吾不能為五斗米折腰拳拳事鄉里小兒退之復志賦曰豈不登名於一科兮曽不𥙷其遺餘此句后山自道也可但曵長裾嚴光詩可但步兵偏愛酒漢書鄒陽傳何王之門不可曵長裾詩意謂微官之與布衣其得失相去無幾不必以貧賤依人為羞也和江秀才獻花三首風雨東籬冷落看陶淵明詩採菊東籬下悠然見南山清溪水落玉峯寒老杜九日藍田莊詩云藍水逺從千澗落玉山髙並兩峯寒酒家不辦當壚費當壚事見司馬相如傳觀未篇落句江君當是酒家乞與先生種杏壇莊子曰孔子休坐乎杏壇之上后山時為徐州學官云又踈花得雨數枝黃白髮緣愁百尺長老杜丁香詩踈花枝素艷太白詩白髮三千丈緣愁似個長要與老生同一醉故留秋意作重陽又江公孤憤不宜秋韓非子有孤憤篇李商隱詩歸夢不宜秋吟作秋蟲到白頭東坡詩云吟詩莫作秋蟲聲天公怪汝鈎物情使汝未老華髮生過我可為千日醉博物志曰中山有酒飲者一醉千日從公難作百錢逰詩意謂官居不可放浪也晉書阮修傳常以百錢掛杖頭至酒店便獨酣暢東坡詩芒鞋青竹杖自掛百錢逰次韻李節推九日登南山平林廣野騎臺荒詩曰依彼平林漢書朝錯傳平林廣野此車騎之地文選謝宣逺靈運皆有九日從宋公戲馬臺集送孔令詩李善注云蕭子顯齊書宋武帝為宋公在彭城九日出項羽戲馬臺至今相承以為舊凖按騎臺即戲馬臺樂史寰宇記曰戲馬臺在徐州彭城縣南三里山寺鳴鍾報夕陽老杜詩人扶報夕陽人事自生今日意寒花只作去年香李後主詩鬢從近日添新白菊是去年依舊黃老杜詩寒花只暫香巾欹更覺霜侵鬢用落帽事語妙何妨石作腸漢書賈捐之傳君房下筆言語妙天下唐皮日休桃花賦序云宋廣平為相貞姿徑質剛熊毅狀疑其鐡腸與石心不解吐婉媚辭然觀其文而有梅花賦清便富麗得南朝徐庾體殊不類其為人落木無邊江不盡老杜登髙詩無邊落木蕭蕭下不盡長江衮衮來此身此日更須忙言節物可念政應行樂尚須汲汲於世故邪别負山居士張仲連田園相與老此别意何如漢書汲黯傳隱於田園老杜詩此别意茫然又詩主簿意何如更病可無酒言臨分不可不飲縱復病惱猶當勉強也樂天詩欲别能無酒猶寒已自和韓偓詩春隂漠漠土脉潤寒氣微微風意和髙名胡未廣後漢許劭傳曰與兄靖俱有髙名穀梁曰心志既修而名譽不聞友之過也詩興尚能多老杜詩憶在潼關詩興多退之詩四句意多能沙草東山路猶須一再過一再字見司馬相如傳送趙教授束髮相看到白頭了知公鬢不勝憂司馬彪續漢書曰卓茂自束髮至白首未嘗與人有過杜牧之公道世間惟白髮貴人頭上不曽饒可堪親老須三釜莊子曰曽子再仕而心再化曰吾及親仕三釜而樂又著儒冠忍一羞老杜詩儒冠多誤身左氏曰一慙之不忍而終身慙乎平世功名須晚節向來旬月取封侯此句用東方朔答客難意熙豐間士大夫進用甚峻今不然也孟子曰禹稷當平世漢書鄒陽傳云晚節末路車千秋傳云旬月取宰相封侯北州豪傑知誰健趙君當是北人後漢光武紀北州弭定竇憲傳曰西州豪傑遂復附從老杜詩眀年此度知誰健乞我黃淤十里秋乞字作去聲讀歐公詩知君欲别西湖去乞我橋南菡蓞香又詩換得西湖十頃秋黃淤謂河水所淤之田也漢書溝洫志曰河水有所遊蕩時至而去則填淤肥美民耕田之或久無害老杜用填淤字作平聲東坂亦云楚人種麥滿河淤次韻春懷欲作歸田計文選張平子有歸田賦無如二頃何史記蘇秦傳使我有雒陽負郭田二頃豈能佩六國相印乎折腰方賴祿折腰見上注老杜詩上公有薦者纍奏資薄祿拭面未傷和唐書婁師德傳師德弟守代州辭教之耐事弟曰人有唾面潔之而巳師德曰未也潔之是違其怒正使自乾耳公羊傳曰孔子反袂拭面老杜梔子詩云與道氣傷和日下烏聲樂左傳曰鳥烏之聲樂塵生鳥跡多世說晉簡文帝為撫軍時牀上塵不聽拂見鼠行跡視以為佳后山蓋用此意渡頭留小楫乘興得相過乘興見上注文選阮籍詩趙李相經過黃梅五首異色深宜晚玉臺新詠沈約芳樹詩曰氤氲非一香參差多異色生香故觸人石曼卿詩樂意相關禽對語生香不斷樹交花樂天榴花詩香塵擬觸坐禪人不施千點白玉登徒子好色賦曰著則太白施朱則太赤别作一家春一家春見上注又舊鬢千絲白老杜詩人生不再好鬢髮白成絲新梅百葉黃老杜四松詩終然棖撥損得吝千葉黃留花如有待退之詩留花不發待郎歸迷國更須香言其色自足迷國也尚何須香邪宋玉賦曰嫣然一笑惑陽城迷下蔡又冉冉稍頭緑婷婷花下人東坡詩冉冉緑霧生人衣杜牧之詩豆蔻梢頭二月春元微之李娃行曰玉顔婷婷街下立欲傳千里信暗折一枝春見上注又黃裏含真意退之燈花詩黃裏排金粟蓋謂額間花鈿也此借用春容帶薄寒趙師民詩委地露花啼曉恨拂堤煙柳弄春容欲知誰稱面劉禹錫詩綺季衣冠稱鬢靣按庾信蕩子賦曰緑葉起衫紅花宜靣編插一枝看又花裏重重葉叉頭點點黃秪應報春信故作著人香玉臺新詠徐君舊詩草短猶通屧梅香漸著人田家雞鳴人當行犬鳴人當歸秋來公事急出處不待時左傳曰公事有公利孟子曰公事畢然後敢治私事昨夜三尺雨竈下已生泥人言田家樂爾苦人得知漢書楊惲曰田家作苦歐陽公歸田樂詩曰田家之樂知者誰我獨知之胡不歸爾苦猶言如許苦也巨野二首當是移頴州教授時所作紅落芙蕖晚青深蒲稗秋謝靈運詩蒲稗相因依平湖無過鳥鳴鼓有行舟老杜詩打鼓發船何處郎又蒲港侵衣緑蓮塘亂眼紅退之送王塤序云猶航斷港絶潢老杜竹詩色侵書帙亂宋莒公集梁山泊水無岸行舟多穿菰蒲為道州人謂之蒲巷此港字恐當作巷將身供世事結纜待回風老杜詩惟將遲暮供帳病又詩結纜排魚網又詩回風吹早秋别叔父録曹為吏專刑法漢書薛宣傳吏道以法令為師成家託弟昆老杜詩實惟親弟昆三年如昨日一笑更何言三年一笑用列子事見上注扶老須微祿漢書孔光傳賜太師靈壽杖注扶老杖也老杜詩耽酒須微祿移官實至恩老杜詩微官近至尊時后山自徐學移頴王吉傳可謂至恩兩踈元父子何日復東轅漢書踈廣傳廣謂兄子受曰豈如父子相隨出關歸老故鄉乎遂上疏乞骸骨公卿大夫故人邑子設祖道供張東都門外東轅猶左氏所謂南轅反斾出清口家世山東飽耕稼孟子曰自耕稼陶漁以至為帝晚託一舟順流下爾雅順流而下曰泝遊漁溝寒餅不下筯推柂轉頭更五夜意謂發漁溝時尚未夕食舟行已遲明矣王介甫詩任村炊米朝食魚日暮榮陽驛中宿與此同意晉何曽傳猶言無下筯處老杜詩捩柂開頭捷有神漢儀中黃門持五夜平明放溜出清口霜落潮回霧連野歐公詩江城月下夜聞歌淮浦山前朝放溜平淮一夢三十里有日無風神所借托遺新說王勃自洪州旋舟謝向時所見老叟曰神既借以好風躬修牢酒以報神賜似憐憂患滿人間百孔千瘡容一罅退之答孟簡書曰羣儒區區修𥙷百孔千瘡隨亂隨失文章末技將自效老杜詩文章真小技班固幽通賦曰操末技猶必然兮文選任彥升作王文憲集序曰昉嘗以筆扎見知思以薄技效德漢書蕭望之傳曰爭願自效語不驚人神可嚇后山自謂文章尚不能動人山川之神其可嚇耶老杜詩為人性僻耽佳句語不驚人死不休莊子曰今子欲以子之梁國而嚇我耶嚇音許嫁反子女玉帛君所餘左傳曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也按搜神記吳郡太守張公直過廬山其子夢為廬山君所聘怖而遽發中流船不行下女水中此詩所言子女謂此類也寄聲白鳥煩多謝漢書趙廣漢傳曰寄聲謝我又曰為我多謝問趙君泛淮冬暖仍初日潮回更下風鳥飛雲水裏人語櫓聲中退之進學解曰冬暖而兒號寒杜牧之詩鳥去鳥來山色裏人歌人哭水聲中平野容回顧言望鄉之眼不為重山所隔老杜詩平野入青徐無山㑹有終言雖未有可隱之山豈終老於行役而不返故里耶此移頴時所歎也易曰君子有終老杜詩人生亦有初此效其律倚檣聊自逸吟嘯不須工晉書王廙倚柂樓長嘯神氣甚逸王導謂庾亮曰世將為傷時識事亮曰正足舒其逸氣耳又庾氷吟嘯鼓柂沂流而去東坡詩云作詩不須工猴馬并引楚州紫極宫有畫沐猴振索以戲馬頓索以驚圉人不測從後鞭之人言沐猴宜馬而今為纍作詩以導馬意韓鄂四時纂要曰常繫獼猴於馬房內辟惡消百病令馬不著疥沐猴自戲馬自驚漢書項籍傳楚人沐猴而冠圉人未解猴馬情周禮圉師掌教圉人飬馬猴其天資馬何罪史記啇君贊其天資刻薄人也意欲防患猶傷生宋書王泰曰酒雖㑹性亦以傷生異類相宜亦相失同類相傷非所及非所及猶言非思慮所及也物惡傷其類此理之固然而其間亦有相傷者豈可復以常禮待之耶文選李陵書曰但見異類此借用史記孔子世家曰君子諱傷其類志行萬里困一誤吳志陸遜傳志行萬里不中道而輟足老杜詩當時歷塊誤一蹶委棄非汝能周防吐豆齕荄甘伏櫪唐李林甫傳曰君等不見立仗馬乎終日無聲而飲三品芻豆一鳴則黜之矣莊子馬蹄篇齕草飲水翹足而陸伏櫪見上注后山自徐學除太學博士以言者罷既而移頴州故有同類相傷與志行萬里誤一困之語徐氏間軒徐氏謂徐大正東坡亦有間軒詩倦逰梁楚愛吾廬老寄山林孰與娛漢書司馬相如傳曰客遊梁又曰長卿故倦遊淵明詩吾亦愛吾廬想見杖黎臨過鳥言軒檻之髙莊子曰原憲杖黎而應門柳子厚柳州山水記曰乃臨大野飛鳥皆視其背更能赤手縛於莬魯直詩守心如縛虎此用其意言處間之難也東坡詩當年老使君赤手降於莬左傳曰楚人謂虎於莬君寧平世輕三釜孟子曰禹稷當平世三釜見上注我亦東原有一區漢書楊雄傳有宅一區擬買嬋姢作歸計可無堆玉斗量珠元微之李娃行曰平常不是堆珠玉難得門前暫徘徊劉禹錫泰娘歌曰路傍忽見停隼旟斗量明珠鳥傳意按嶺表録異梁氏女有容貌石季倫以真珠三斛買之即緑珠也寄豫章公三首后山自注云許官茶未寄黃魯直家於洪州之雙井洪即古豫章密雲不雨卧烏龍張舜民小說云熙寧末神廟有㫖下建州製密雲龍其品又髙於小團周易密雲不雨自我西郊此借用言茶之未破已足人間第一功言未戰而勝睡魔也漢書蕭何功第一無汗馬之勞得諾向來䡖季子漢書季布傳椘人諺曰得黃金百不如得季布諾打門何日走周公盧同謝孟簡惠茶詩曰日髙丈五睡正濃將軍打門驚周公蓋用魯論不復夢見周公意后山為學官暗用邊韶事又愧無一縷破雙團破團茶法多以線縷解之雙團謂大小團也慣下薑鹽枉肺肝薛能鳥觜茶詩云鹽損添常戒薑宜煮更誇東坡和寄茶詩云老妻稚子不知愛一半已入薑鹽煎誓酒不應忘此老晉書劉伶傳伶妻勸伶斷酒伶曰吾不能自禁惟當祝鬼神自誓耳后山持律酒戒甚嚴故有此語論詩寧肯乞粗官薛能謝王彥威寄茶詩曰粗官寄與真拋却賴有詩情合得嘗乞音氣又人須百斛買雙鬟百斛見上注玉臺新詠辛延年詩云一鬟五百萬兩鬟千餘萬魯直詩欲買娉婷歌煮茗我無一斛明月珠水截龍章試虎班史記蘇秦傳水截鴻鵠晉書嵇康傳龍章鳯姿此借用其字龍章謂茶虎班謂盞老覺才踈渾不稱自携雲月瀉潺湲樂天詩一别承眀三領郡從教人道是粗才老杜詩雲月遞微明此借用其字言建瓷如雲中之月也張平子思玄賦曰亂弱水之潺湲字林曰潺湲流貌湲音爰亦音侯頑切贈秦覯兼簡蘇逮二首兩秦並立難為下史記孟嘗君傳云勢不兩立為雄世說後漢陳實二子紀字元方諶字季方實曰元方難為兄季方難為弟此句用其事魏略柏範妻曰君前在東坐欲擅斬徐州人謂君難為下今羞為吕昭屈難為上也此句用其字萬里長驅在此初成都記萬里橋後主時費禕聘吳諸葛亮祖於此禕曰萬里之行故始於此矣别後未忘三曰語唐書陸贄傳張鎰有重名贄往見語三日竒之人來肯作數行書老杜詩相看過半百不寄一行書又文章從古不同時言知音未必並世也漢武聞司馬相如賦曰朕獨不得與此人同時哉詩語驚人筆亦竒詩語驚人見上注范曄傳曰謂序論筆勢縱放實天下之竒作柳子厚先友記曰韓㑹弟愈文益竒過與阿平應絶倒晉書王澄聞魏玠言輒歎息絶倒時人為之語曰魏玠談道平子絶倒又世說云阿平若在當復絶倒阿平蓋以屬仲豫世間能有幾人知貫休詩云禪客相逢只彈指此心寧有幾人知次韻秦少逰春江秋野圖后山自注云宗室所畫翰墨功名裏江山富貴人倐看雙鳥下已負百年身南史梁忠烈世子方等傳云性愛林泉特好散逸嘗著論曰吾不及鳥魚逺矣鳥魚飛浮任其志性吾之進退嘗在掌握若使吾終得與魚鳥同遊則去人間如脫屣耳此宗室事故后山引用蓋舊制宗室在宫有出入之限有不許外交之禁故也老杜詩長為萬里客有愧百年身又江清風偃木霜落鴈橫空老杜詩長林偃風色若箇丹青裏猶須著此翁后山自注曰秦詩云請君添小艇畫我作漁翁言小遊方見用於世非江海之士不當畫之漁舟也晉書顧凱之為謝鯤象在石巖裏曰此子宜置丘壑中后山蓋反此意著字嘗經東坡用之所謂戲著幼輿巖谷裏是也老杜詩秋色雕春草王孫若箇邊黃魯直答王立之詩曰小詩若能令每篇不苟作須有所屬乃善頃來詩人惟陳無已得此意每令人歎伏之蓋渠勤學不倦味古人語精深非有謂不發於筆端耳觀此詩信魯直之善論也幼嶺后山自注云外氏有石象山號幼嶺外家英俊場漢書枚臯傳與英俊并遊柳子厚書曰鼓行俊造之埸季氏不好㺯季氏猶詩所謂伯氏仲氏左傳曰夷吾弱不好弄用意丘壑間頗以石自奉班固序傳班斿曰漁釣於一壑則萬物不奸其志棲遲於一丘則天下不易其樂誰言拳握間後漢張湛傳拳握之物足富十世意作萬牛重老杜古柏行萬牛回首丘山重岱宗小天下孟子登太山而小天下不辦一席用東坡六一泉銘載惠勸語曰西湖蓋歐公几案間一物耳絶句斫水水可斷越王勾踐有八劒二名斷水以之指水開即不合續弦弦可完東方朔十洲記曰煮鳯喙麟角合煎作膠名之為續弦膠兩句言物理之間合者固有時可斷而斷者寧不可復續耶而客主之交一絶不續亦可歎矣如何鄭公客不作百年看漢書鄭當時傳兩人中廢賔主益落故班固作贊引廷尉翟公一死一生乃見交情之語此詩必有謂而作也贈歐陽叔弼叔弼名棐六一居士之第三子家於頴州早知汝頴多能事晉書周顗傳汝頴多竒士能事字出周易汝頴多竒士夲曹操語晚以詩書託下僚選詩英傑沉下僚大府禮容寬懶慢漢書云敞傳贊再入大府老杜詩自識將軍禮數寬晋嵆康與山濤書云懶與慢相成故家文物尚嫖姚故家遺俗見孟子左傳臧哀伯曰文物以紀之此借用漢志景星歌曰五音六律依韋響昭雜變並㑹雅聲逺姚注云姚嫖姚言飛揚也只將憂患供談笑憂患字見易係辭王介甫詩已將流景供談笑聊謂知音破鬱陶敢望功言答聖朝功言見上注老杜詩未有㳙涘答聖朝歲歷四三仍此地歲歷四三謂十二年也下篇亦云中年見二子已復歲一終尚書或四三年此借用其字也家餘五一見今朝歐陽文忠公自號六一居士作傳曰吾家藏書一萬卷集録三代以來金石遺文一千卷有琴一張有棊一局常置酒一壷客曰是謂五一爾何如居士曰以吾一翁老於此五物之間是豈不為六一乎時居士已薨故曰家餘五一后山詩注卷第二
