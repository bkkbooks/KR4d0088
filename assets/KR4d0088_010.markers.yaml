  - {type: variant, offset: 1687, length: 0, content: '', WYG: 使于四方不能專對雖多亦奚以為後生守章句不足供囁嚅退之送李愿序曰口將言而囁嚅一登吏部選筆硯隨掃除東坡宻州謝上表曰塵埃筆研漸忘舊學之淵源閉閣畫眉嫵漢書張敞傳為婦畫眉長安中傳張京兆眉憮注云憮音嫵隔屋聞歌呼老杜詩隔屋喚西家借問有酒不漢書曹參傳相舍後園近吏舎參游後園聞吏醉歌呼奉公用漢律寧復要詩書後漢任延曰履正奉公臣之節也漢書朱博曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也俛首出跨下枉此七尺軀言屈身于貴要也漢書韓信傳俛出跨下荀子曰何足美七尺之軀哉今代陶朱公不}
