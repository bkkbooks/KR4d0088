  - {type: variant, offset: 5197, length: 550, content: 之竊惟先生之文簡重典雅法度謹嚴詩語精妙盖未甞無謂而作其志意行事班班見於其中小不逮意則弃去故家之所留者止此昔漢楊雄作太玄法言箴賦如劉歆號知文始敬之後而短毀謂其必傳者桓譚一人而巳先生之文蚤見稱於曽蘇二公世人好之者猶以二公故也今賢士大夫競收蔵之則其傳也奚待於衍耶後豈不有得手寫故夲以證其誤者則不肖之名因附兹以不朽為幸焉其闕方求而補諸又有觧洪範相表闡微彰善詩話䕺談各自為集云政和五年十月六日謹記建中靖國辛巳之冬雲别涪翁於荆州翁曰陳無已天下士也其讀書如禹之治水知天下之脉絡有開有塞至于九川滌源四海㑹同者也其論事救首救尾如常山之蛇其作文深知古人之關鍵其作詩深得老杜之句法今之詩人不能當也子有意學問不可不徃掃斯人之門雲再拜受教明年春至亰賢士大夫岀涕相吊曰無已亡矣雲驚嘆失聲痛恨無窮洎来彭城求先生詩文且四年僅見一二最後得昌世所集凡六百五篇琮璜珩瑀貫列大備雲曰幸矣至寳不殁乃今有獲因記涪翁之語録以示昌丗自昔名世之士著書立言必頼其徒傳之文中子講道河汾以續六經房魏之倫皆北面受業及登廊廟不能顯傳其書卒以泯絶論者至今惜之昌世先生之髙弟操行文章雅善先生之風雖隠約布韋而所立絶人不苟徇合故能蒐拾遺文成一家之言又序先生岀處之大節其辭蔚然讀之使人凛凛増慕然先生之道必傳於後世者昌世之力也千載之下可以知其賢矣政和丙申正月甲午元城王雲題, WYG: ''}
