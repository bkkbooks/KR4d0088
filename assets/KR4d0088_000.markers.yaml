  - {type: variant, offset: 962, length: 257, content: 戊辰是歳后山在徐州嗚呼行秋懐示黃預送張支使送杜侍御純陜西轉運按實録元祐二年九月知徐州杜純權陜西轉運使此詩九月所作送楊侍禦兼寄顔黄二公二首長道魯直送外舅郭大夫䕫路提刑按實録元祐三年五月知濮州郭㮣提點䕫州路刑獄此詩蓋此後所作雪後黃樓寄負山居士張仲連此詩元在秋懐前今遷于此元祐四年已巳是歳后山在徐州謝人寄酒詩有厭見春泥之句從蘇公登後樓元祐四年三月東坡自翰苑出知杭州五月后山自徐州謁公於南都此詩蓋當時所作詩有五月池無水之句送蘇公知杭州東坡岀知杭州道由南京后山時爲徐州教授告徐守孫覺願徃見而覺之不許乃託疾謁告來南京送别同舟東, WYG: ''}
