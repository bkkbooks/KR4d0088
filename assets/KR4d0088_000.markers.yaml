  - {type: variant, offset: 3279, length: 1411, content: 先臣冤抑罪名未除不幸不得出於兹時詔斿監江寧府粮料院旋罷京東運判差監衡州酒稅第八卷杜侍郎挽詞三首㩀實錄元符元年八月知應天府杜紘卒紘字君章甞再爲刑部侍郎黄預挽詞四首秋懐四首送法寳襌師贈趙奉議元符二年已卯是歳后山在徐州元日雪二首時東坡謫海外三年矣故前篇末句有炎海之語次韻黄生荅黄生雪後送張蘄縣送何子温移亳州三首送詹司業西郊二首寄亳州何郎中二首寄荅秦州曽侍郎送提刑李學士移使東路按實録元符二年二月提點京東西路刑獄李昭玘徙京東東路和鄭户部寳集文室二首隠者郊居覽勝亭何大中挽詞二首送大兄兼寄趙團練寄襄州程大夫送撿法趙奉議送建州鄭户部送張秀才第九卷晁無咎畫山水扇奉陪趙大夫㳺桓山寄曹州晁大夫送馮翊宋令嗟㢤行夜句三首送李孝忠落觧南歸寄單州張朝請謝憲䑓趙史惠米和趙大夫鹿鳴宴集和朱智叔鹿鳴席上酬智叔見贈再酬敬酬智叔三賜之辱兼戲楊理曹二首酬智叔見戯二首送智叔令咸平九月九日夜雨留智叔九月九日與智叔鵰堂宴集夜歸城南夜歸寄趙大夫席上勸客酒戯寇君二首絶句四首騎驢二首夀安縣君挽詞二首寄曹州晁大夫晁端仁字堯民寄題披雲樓樓在曹州絶句寄黄充寄張大夫懐逺荅田生早起和黃充小雪第十卷寄張學士舜民謝趙使君雪中寄魏衍送澶州録曹宋叅軍和范教授同遊桓山元符三年庚辰是歲后山在徐州正月徽宗即位七月除棣州教授其冬徃赴未至間十一月除祕書省正字早春徐僊書三首寄酬咸平朱宣徳智叔咸平讀書堂絶句二首春懐示鄰里歸鴈二首和寇十一晚登白門謝寇十一惠端硯再和寇十一二首與寇趙約丁塘看花寇以疾不赴有詩用其韻和寇十一同逰南城阻雨還登寺山三月二十二日榴花盛開戲作絶句和冦十一雨後登樓荅寇十一惠朱櫻雙櫻絶句謝趙生惠芍藥三絶句寄隣絶句寄寇十一和酬魏衍觸目絶句元符三年七月蒙息復除棣學喜而成詩送姚先生歸宜山三絶上趙使君送鄭祠部第十一卷和寇十一同登寺山謝孫奉職惠胡徳墨登寺山荅寄魏衍拱翠堂贈田從先别郷舊和李使君九日登戲馬䑓與魏衍寇國寳田從先二姪分韻得坐字和黄生出㳺三絶句盤馬山爛石村别叔父崐山丞從寇生求茶庫紙絶句黃樓絶句酬顔生惠茶庫𥿄黃樓荅黄生寒夜贈周秀才二首五子相送至湖陵赴棣州敎官時所作詩有風日寒之句蓋冬時也湖陵與劉生别寄滕縣李奉議住鴈寓目野望寄單州吕侍講布哲寄沛縣姜承議寄兖州張龍圖文潜二首晚立寒食鴈二絶句山口晚泊夜雨宿合清口宿泊口野望宿柴城顔市阻風二首晚坐寒夜絶句禮武臺坐化僧晚興宿齊河别劉郎趙巖雞籠鎮除官按舊録十一月除秘書省正字題王平甫帖第十二卷建中靖國元年辛巳是歳后山在館中十二月二十九日卒見於魏衍所作集記和李文叔退朝和謝公定雨行逢賣花酬王立之二首送謝朝請赴蘇幕和謝公定觀秘閣文與可枯木和饒節詠周昉畫李白真謝王立之送花和參寥明彂覓隣家花二首和張奉議贈舅氏龐大夫和舅氏公退言懐欽聖憲肅皇后挽詞二首神宗后向氏建中靖國元年五月葬永𥙿陵欽慈皇后挽詞二首欽慈皇后陳氏徽考之母建中靖國元年五月陪葬永裕陵大行皇太后挽詞二首代人欽聖太后追尊皇太后挽詞二首代人欽慈太后王察院挽詞二首監察御史王向也元符二年十月與㳺酢焉㳙並命未㡬而卒贈呉氏兄弟三首和呉子副智海齋集舅氏新齋上晁主客晁端仁堯民也建中靖國元年二月爲主客貟外郎和鮮于大受崇先觀餞别曽元忠大受名綽荅王立之又和過田承君贈石先生送晁無咎岀守蒲中建中靖國元年九月吏部郎中晁𥙷之知河中府𥙷之字無咎題明彂髙軒過圖王立之詩話云宗室士􅌔字眀發后山作此詩數月間遂卒送歐陽叔弼知蔡州棐送晁堯民守徐端仁送王㝎國通判河南鞏后山詩註目録終彭城陳先生集記門人彭城魏衍撰先生姓陳諱, WYG: ''}
