  - {type: variant, offset: 1220, length: 486, content: 至宿而歸事見東坡荅陳傳道書及劉安世彈章送秦覯二首覯字少章少㳺之弟也從東坡學於杭州黄魯直亦有此詩和江秀才獻花三首次韻李節推九日登南山别負山居士張仲連送趙教授元祐五年庚午是歳后山移頴州教授其冬徃赴次韻春懐黃梅五首田家巨野二首當是移頴州教授時經途所作别叔父録曹岀清口泛淮猴馬并引引云楚州紫極宫蓋經途所作徐氏閑軒徐氏謂徐大止東坡亦有閑軒詩寄豫章公三首元祐六年辛未是歳后山在頴州贈秦覯兼簡蘇迨二首蘇迨字仲豫東坡仲子按實錄元祐六年八月東坡自翰林承㫖知潁州於時仲豫侍行是歳十月東坡祈雨迎張龍公文云請教授陳師道遣男迨云云次韻秦少㳺春江秋野圖㓜嶺絶句贈歐陽叔弼第三卷觀兖文忠公家六一堂圖書送蘇迨送黃生兼寄二謝二首次韻蘇公西湖徙魚三首次韻蘇公西湖觀月聽琴次韻蘇公渉頴再次韻蘇公示兩歐陽次韻蘇公勸酒與詩次韻蘇公督兩歐陽詩次韻蘇公題歐陽叔弼息齋次韻蘇公竹間亭絶句以東坡集考之歳晚所作元在渉潁詩後今遷于此寄參寥元祐七年壬申是歳后山在潁州北渚東禪八月十日二首迎新将至漕城莫歸遇雨按實録元祐七年正月辛亥東坡自潁除知楊州二月辛酉少府監晏知止除知潁州六月甲子以禮部侍郎韓川換知止此言新將當是韓川漢書嚴延年傳, WYG: ''}
