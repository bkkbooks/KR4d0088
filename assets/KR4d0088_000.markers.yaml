  - {type: variant, offset: 2064, length: 653, content: 送李孝忠二首當是其兄傳道之子以柱杖供仁山主二首項城道中寄劉令使修溪橋項城屬陳州碓磨寨亦在陳州境内寄張宣州按實録云紹聖元年八月直龍圖閣張來權知宣州送倫化主西湖别月華嚴送呉先生謁惠州蘇副使按實録紹聖元年蘇公貶寧海軍節度副使惠州安置别圎澄襌師别觀音山主離潁湖上舟中二首䂓禪停雲齋第五卷紹聖二年乙亥是歳三月后山丁母夫人憂后山作其母行狀云夫人從其不肖子就食河北舟及鄆之東阿而卒實紹聖二年二月二十九日按實録紹聖二年三月河北東路提刑郭槩知澶州當是槩未罷使事時后山奉母就食遂遭變故已而㮣知曹州七月后山歸徐葬其父母遂寄食於曹有披雲樓記在曹時爲槩作答晁以道病起詩有湏杖起及灾疾之語當是居憂後所作九月九日魏衍見過時在徐州别黄徐州自徐寄食於曹所作次韻荅晁無斁無斁時爲曹州教官次韻無斁偶作二首古墨行并序次韻晁無斁除日述懐紹聖三年丙子是歳后山寓曹州有佛指記蓋三年八月所作次韻無斁雪後二首詩有寄食之語魏衍注云時先生寄婦翁郭槩大夫使宅贈魏衍三首當是自曹暫還徐所作贈寇國實三首次韻春懐河上題柱二首蠅虎陶朱公廟史記曰范蠡變名姓適齊爲鴟夷子皮之陶爲朱公陶即定陶今曹州濟隂縣乃其地也次韻晁無斁夏雨寄無斁次韻别張芸叟宿深明閣二首時徃雍丘展龐丞相墓閣在陳留佛寺東山謁外大父墓后山蓋龐丞相籍之外孫司馬温公作丞相墓誌云葬雍丘東山次韻晁無斁冬夜見寄寒夜有懐晁無斁除夜第六卷紹聖四年丁丑是歳后山寓曹州既而歸徐寄提刑李學士按實録紹聖三年十月提黠永興軍路刑獄李昭玘權提點京東西路刑獄此詩蓋四年所作昭玘字成季濟北人寄杜擇之次韻晁無斁春懐寄晁無斁别寳講主以后山佛指記, WYG: ''}
