  - {type: variant, offset: 4692, length: 257, content: 字履常一字無己彭城人㓜好學行其所知慕古作者不為進取計也年十六謁南豐先生曽公鞏曽大器之遂業于門元豐四年神宗皇帝命曽典史事且謂脩史最難申敕切至曽薦為其屬朝廷以白衣難之方復請而以憂去遂寢太學又薦其文行乞為學録不就樞密章公惇髙其義冀来見特薦于朝而終不一徃元祐初翰林學士蘇公軾與侍從列薦乃官之俾教授其郷未㡬除太學博士言事者謂先生嘗謁告詣南都見蘇公為私遂罷移頴州教授紹聖初又以餘黨罷換江州彭澤令未行丁母憂寓僧舎人不堪其貧暨外除猶不言仕者凡四年左右圖書日以討論為務盖其志專欲以文學名後世也元符三年除棣州教授随除祕書省正字将用矣殁, WYG: 卒}
