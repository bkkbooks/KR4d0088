  - {type: variant, offset: 5441, length: 1, content: 記, WYG: 史車老杜過韋氏莊詩曰枉道秖從入吟詩許更過遣興寛為七字語尋人聊代一行書老杜詩遣興莫過詩又云相看過半百不寄一行書寄沛縣姜承議后山自注云姜乃潜之孫以捕寇改官豫作隠居自號金池居士平生魯國老先生晚見諸郎識老成姜潜蓋石介守道門人見于歐公所作守道墓誌怪有武功䝉寵錫果縁陰徳貫神明漢書武帝紀奏置武功賞官以寵戰士賈誼書孫叔敖母曰有陰徳者天報以福此借用言姜君善醫金池已作歸田計}
