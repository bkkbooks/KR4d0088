front:
  text: 后山詩註卷第七
  hash: sha256:6b924d3e81a0aced58e068b4dbfd2b3971f75dbe238bc8c740d7ccf8e627a568
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_007-1a}
body:
  text: 春夜宿鳥一枝足争林終日鳴莊子曰鷦鷯巢於深林不過一枝庭花當户彂蜀志先主誅張𥙿曰蘭生當門不得不鋤江月向人明晋書劉惔傳卿今日作此面向人耶老杜詩隴月向人圎鳥度清溪影老杜詩鳥影度寒塘風回晚市聲魯直詩市聲故有耳夢中無好語池草為誰生南史謝靈運每有篇章對族弟惠連輙得佳句甞於永嘉西堂思詩竟日不就忽夢見恵連即得池塘生春草大以爲竒和三日苦遭年少強追陪病眼看花更覆杯老杜詩老年花似霧中看覆杯見上注夾岸萬人傾國岀清江一注兩山開老杜清明詩着處䌓華矜是日長沙千人萬人出又詩胡爲傾國至周禮匠人曰两山之間必有川焉逰人欲盡驚鷗下晚日猶湏惡雨催猶須若曰尚何須也更恐明年有離别折花臨水共徘徊登燕子樓元和中張建封鎮武寧盻盻者徐之竒色建封納之於燕子樓後又爲起新樓建封薨盻盻誓不他適樂天爲作詩曰黄金不惜買娥眉揀得如花四五枝歌舞教成心力盡一朝身去不相隨緑暗連村柳司空圖詩緑樹連村暗王介甫詩楊柳鳴蜩緑暗紅明委地花樂天詩霜降春林竹委地韓偓哭花詩云今見妖紅委地時畫梁初着燕薛道衡詩空梁落燕泥廢沼已鳴哇東坡詩廢沼哇蟈淫鷗沒䡖春水老杜詩白鷗没浩蕩又云鷗輕故不還舟横著淺沙韋應物詩云野渡無人舟自横相逢千歲語猶說一枝花一枝花見題註傅大士頌云時人皆不識喚作一枝花和魏衍三日二首林花女頰紅春水瓜頭緑老杜詩色好棃勝頰歩蹇我三休文選謝宣逺詩蹇歩愧無良賈誼新書楚王作中天之䑓三休而後至其上来周君一足一足見上注苦嗟所歷小不盡千里目文選海賦曰徒識觀怪之多駭乃不悟所歷之近逺唐人詩曰欲窮千里目更上一層樓按文選顔延年詩傷㢤千里目莫景向昬鴉歸途取脩竹老杜詩有待至昬鴉又云歸蓋取荆門枚乗兔園賦曰脩竹檀欒夾于池水魯直詩還㝷密竹徑中歸又堤沙泥盡未及塵韓偓詩輕寒着背雨淒淒九陌無塵未有泥此反而用之江波不動風生汶温廷筠湖隂曲云呉波不動楚山晚劉禹錫云瀼西春水縠紋生虎頭魚尾不知數謂競􅊑也虞世基水土記曰梁孝元作神獸艦頭畫虎豹以助軍威朱旗一點来奔雲文選班固燕然山銘曰朱旗絳天劉禹錫汎舟詩曰指揮船舫點紅旌春容已老有餘態鄭文寳詩㶚陵春色老於人歐公詩譬如夭韶女老自有餘態祓禊雖古無前聞晉書束晢傳武帝問摯虞三日曲水之義對曰漢徐肇以三月初生三女至三日俱亡村人以爲怪乃招携之水濵洗祓遂因水以汎觴其義起此束晢曰虞小生不足以知臣請言之云云前聞見上注踏青摸石修祕祝一本脩作條老杜詩江邊踏青罷摸石蓋俚巷舊俗楊元素夲事詞載海雲故事是也漢書文帝紀除祕祝落日帶雨催行人賈島詩落日恐行人聴詩對月两不厭頗覺過目徒紛紛退之詩紛紛過目何由記老杜詩世上兒子徒紛紛君不見天寳杜陵翁屈宋才堪作近鄰老杜有麗人行蓋天寳中上巳所作老杜又有詩云不薄今人愛古人清詞麗句必爲隣竊攀屈宋宜方駕恐與齊梁作後塵答魏衍惠朱櫻開門先得故人書退之詩不枉故人書無由汎江水稍喜提携起覆盂言故人書來慰其寂寞如提起乆覆之盂也漢書東方朔傳云安於覆盂此借用其字得句有誰知我在甞新此日頼吾徒老杜朱櫻詩金盤玉筯無消息此日甞新任轉蓬傾藍的皪霑朝露樂天放魚詩傾藍㵼地上東坡詩霧雨不成點映空疑有無時於苑上見的皪走明珠按上林賦曰宜笑的皪岀袖熒煌得寳珠東坡謝賜御書詩云袖有明珠三十四㑹薦瑛盤驚一座以比魏衍後漢明帝宴羣臣太官進櫻桃以赤瑛盤賜羣臣月下視之盤與桃同色羣臣皆笑云是空盤事見藝文類聚太白詩山盤薦霜黎莧腸藜口未良圖退之詩腸肚集藜莧老杜詩邂逅豈即非良圖字本出左傳和魏衍聞鸎春力着人朝睡重魯直如夢詞云門外鶯啼楊柳春色着人如酒東坡詩羙人如春風着物物不知葉底黄鸝鳴自送老杜詩隔葉黄鸝空好音退之詩清歌緩送感行人按古今樂録曰凡歌曲終皆有送聲緑幕朱攔日觀明回廊側户風簾動退之短檠歌黄簾緑幕朱户閉風露氣入秋堂涼太山記東南巖名曰日觀此借用言䑓觀之向日者選詩風㢘入雙燕上四句言富貴家聞鶯初不領略任其自鳴耳昨夜春回到寒谷好鳥飛來把脩竹寒谷以言貧家謂魏衍也劉向别録曰燕有寒谷不生黍稷鄒衍吹律於其間煖氣乃至草木發生老杜詩西來有好鳥爲我下青冥又詩栖枝把翠梧整翰厲觜初一鳴文選鮑昭蕪城賦云飢鷹厲吻已落君詩專妙獨元稹作杜子羙墓銘叙曰盡古今之體勢而兼人人之獨退紅着緑春事殘魯直連理松枝詩云紅紫事退獨參天後時獨立知何言老杜詩恐爾後時難獨立退之聞鶯詩曰共矜初聽早誰貴後聞頻樂天詩鶯雖爲說不分明葉底枝頭謾饒舌側聴不盡巳飛去劉禹錫百舌吟曰數聲不盡又飛去何許相逢緑楊路懐抱此時誰與論退之晚菊詩曰此時無與語弃置奈悲何韓偓雨詩曰此時髙味共誰論掩鼻吟詩空佇立和黃生春盡逰南山逐勝缺勇功樂天詩逐勝移朝宴留歡放晚衙孫子曰善戰者無智名無勇功餞春無少色言無少年惜春之意堯典寅餞納日孟郊詩萬物無少色兆人皆老憂此借用岀門欲何向坂丸随所擊漢書蒯通傳曰猶如坂上走丸百年餘㡬何十歩復一息言其老憊也漢書王褒傳曰萬里一息同来二三子楚楚頗脩飾詩云蜉蝣之羽衣裳楚楚行前強老夫徑捷疲峻陟漢髙帝紀曰令一人行前文選阮嗣宗詩捷徑從狹路山門開煙霏禪房閑岑寂文選廣絶交論曰煙霏雨散李善注引陸機賦曰騰煙霧之霏霏唐人常建詩云禪房花木深文選舞鶴賦去帝郷之岑寂李善注云岑寂猶髙靜口燥沾茗椀乆厄此為徳文選陸機文賦云始躑躅於燥吻伽藍記王𪷟好茶人至輙飲之士大夫以爲水厄逐日下西山草露荒不識列子曰夸父欲追日影逐之於隅谷之際漢書楊雄反離騷曰恐日薄於西山文選沈約詩曰夢中不識路回溪轉鈎曲門徑入繩直文選潘安仁詩回溪縈曲阻莊子徐無鬼曰曲者中鈎潘安仁籍田賦曰遐千繩直故人喜領客内愧積腸臆老杜詩領客珍重意所來為親舊掃除稱寥閴老杜詩所來爲宗族亦不爲盤飱疾風無末勢漢書韓安國傳曰衝風之衰不能起毛羽強弩之末不能入魯縞過雨有餘瀝老杜詩頭風吹過雨史記淳于髠傳曰侍酒於前時賜餘瀝髙花初欲然退之楸樹詩看吐髙花萬萬層選詩山櫻發欲然平荷巳如拭老杜詩菱葉荷花靜如栻因君感衰盛醜好移頃刻魯直詩醜好隨手飜交新厭區區話舊聽歷歷談間十一二四座已傾側歷歷見上注漢書司馬相如傳一座盡傾茅屋漏風霜山田帶沙礫尚能哀此老舉手觸四塞哀此老見上注文選左太冲詠史詩曰習習籠中鳥舉翮觸四隅漢書成帝紀曰黄霧四塞君如澗底松迢抜岀天壁左太冲詠史詩曰欝欝澗底松老杜詩東得平崗出天壁學詩有新功黄魏共推激后山自注云生與魏衍黄預㳺魯直詩杜郎覔句有新功老杜詩風騷共推激㨂花密葉已成䕃髙花初着枝選詩宻葉成翠幄髙花見前篇注幽香不自好寒艶未多知唐人崔涯黄葵詩嫰葵淺黄色幽香寒淡姿李商隱詩春風雖自好春物太昌昌葵一作蘖㑹見垂金彈聊容折紫緌西京雜記韓嫣好彈以金爲丸禮記曰玄冠紫緌自魯桓公始也粉身非所恨猶復得聞思粉身謂以此花爲香老杜丁香詩晩墮蘭麝中休懐粉身念黄魯直論香有所謂聞思者蓋取楞嚴經觀音所言從聞思修入三摩地因以名香云和黄充實榴花春去花随盡紅榴暖欲然欲然見上注後時何所恨後時見上注孔紹石榴詩曰只爲來時晩開花不及春樂天對晚開夜合花詩後時誰肯願惟我與君憐處獨不祈憐退之畫記曰居閒處獨東坡樂府曰石榴半吐紅巾蹙待浮花浪蘂都盡伴君幽獨葉葉自相偶古樂府宋子侯董嬌嬈詩曰花花自相對葉葉自相當按榴花多有雙葉重重乆更鮮東坡樂府又曰濃艶一枝試看取芳心千里似束流珠沾署雨改色淡朝煙樂府長史變歌曰凌霜不改色枝葉永流榮老杜詩城郭朝煙淡此借用以言煙籠而色淡也着子專寒酒酒譜曰頓孫國有安石榴取汁停盆中數日成羙酒移根擅花權孔紹永石榴詩云可惜庭中樹移根逐漢臣按愽物志張騫使西域還得安石榴唐劉蕡䇿曰宰相權造化之柄愧非無價手東坡詩曰惟有此詩非昔人君更徃求無價手刻畫竟難傳老杜詩詞人取佳句刻畫竟難傳和黃預乆雨甲子仍逢夏朝野僉載曰夏雨甲子乗船入市連朝雨脚垂老杜詩雨脚如麻未㫁絶黑雲玄甲駐班固燕然銘曰玄甲耀日鐡騎冷官馳魏志注曰曹公列鐡騎五千爲十里陣老杜詩合昬排鐡騎冷官謂隂官也退之祈雨詩曰隂官想駿奔映日還蒙霧懸麻却散絲古詩春雨如散絲頽墻通犬豕破柱出蛟螭世說夏侯泰初倚柱作詩時暴雨霹靂碎柱神色無變退之詩飛雷着壁搜蛟螭野潤風光秀凉生枕席宜老杜詩野潤煙光薄選詩風光草際浮樂天詩風來入房户夜中枕席冷撥雲開日月噀水出虹蜺貧可留湏捷楊雄方言曰南楚凢人貧衣被醜敝謂之湏捷或謂之樓裂此引用言雨中解衣以供薪米之費雖垢弊亦不復行也㤙當記扊扅顔氏家訓曰樂府載百里奚妻辭曰百里奚五羊皮憶昔時烹伏雌炊扊扅今日富貴忘我爲案蔡邕月令章句曰鍵門牡也所以止扉或謂之剡移此句言雨中婦以門牡爲炊政苦食淡異時不可忘也蒼頭行冒雨漢書鮑宣傳蒼頭廬兒注漢名奴爲蒼頭元稹詩冒雨衝泥黒地來地一作也赤脚出衝泥退之詩一婢赤脚老無齒老杜詩虚疑皓首衝泥怯詩好聲生吻退之石鼎聮句序曰每營度欲出口吻聲鳴益悲書工手着胝樂天詩秉筆手生胝按莊子讓王䟽曰每自力作故生胼胝衰年得佳句懐抱頓能移和黄預病起似聞藥病已投機傳燈錄伏牛襌師曰非心非佛是藥病對治句又洞山崇敎禪師云言無展事句不投機承宗者䘮滯句者迷迷一作遂牛闘蛇妖頓覺非晉書殷仲堪父甞患耳聦聞床下蟻動謂之牛闘樂廣有親客乆闊不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有蛇意甚惡之旣飲而疾時廣聽事壁上有角漆畫弓似蛇廣意杯中蛇即弓影也復置酒於前處謂客曰酒中復有所見否荅曰所見如初廣乃告其所以客豁然意解沉痾頓愈李賀固知當得疾唐書李賀母探錦囊中見所書詩多即怒曰是兒欲嘔出心乃已耳沈侯可更不勝衣南史沈約傳曰老病百日數旬革帶常應移孔約死謚隱侯東坡樂府曰沈郎多病不勝衣按禮記檀弓曰文子其中退然如不勝衣驚逢白璧山千仞言其清痩如玉山孤聳也太白天馬歌曰白璧如山誰敢沽此借用晉顧愷之作王衍畫贊曰巖巖清峙璧立千仞㑹見黄金帶十圍歐公詩喜君新賜黄金帶後漢虞詡晉庾敳後周庾信皆腰帶十圍只信詩書端作祟史記田叔贊禇先生曰乆乗富貴禍積爲祟老杜詩蛟鼉苦爲祟魯直詩亦有湯餅作祟之語孰知糠籺亦能肥前漢陳平爲人長大羙色人或謂平貧何食而肥若是其嫂疾之曰亦食糠覈耳注覈音籺何郎中岀示黄公草書四首魯直龍蛇起伏筆無前老杜詩龍蛇動篋蟠銀鉤書法苑曰李邕書始變右軍行法頓挫起伏江漢淵囬語更妍老杜詩洞庭揚波江漢囬說文曰淵囬水也文選潘岳閑居賦曰圎海囬淵好事無須一賞足歐公菱溪大石記曰好竒之士聞此石者可以一賞而足何必取而去也哉蔵家不必萬人傳老杜詩將詩不必萬人傳又此詩此字有誰知盡省郎官自崛竒通典曰漢儀尚書郎奏事明光殿省中以胡粉塗壁畫古賢烈女退之詩西城貟外丞心跡两崛竒罪大從来身萬里謂魯直謫居戌州又退之詩我今罪重無歸望直去長安路八千政成今見麥三岐謂何郎中三岐麥蓋當時實事又四海聲名何水曹梁何遜爲水部魯直詩四海聲名習主簿新詩舊徳自相髙郭受寄老杜詩云新詩海内流傳困舊徳朝中屬望勞一官早要稱三字三字謂知制誥盧氏雜說曰不由三字直拜中書舎人者謂之撻額裹頭王禹偁詩摛毫終要居三字出郡應須借一麾二鬢何湏着兩毛何須一作誰教退之詩郎署何湏歎两毛又當年闕里與論詩闕里孔子所居孔子甞謂子貢子夏可與言詩后山亦學詩於黄公云晚歲何山㫁夢思太白詩君留洛北愁夢思時魯直遷謫蜀中妙手不爲平世用髙懐猶有故人知孟子曰禹稷當平世故人謂何郎中和黄預感懐壁立無堪佐子貧謾脩簡牒効慇懃老杜詩懶慢無堪不出村史記過秦論曰以佐公上之急漢書司馬遷書曰未甞衘盃酒接慇懃之歎起臨明鏡看生意老杜詩勲業頻看鏡晉書殷仲文曰此樹婆娑無復生意卧向晴簷共白雲退之詩日落風景曠出歸偃前簷晴雲如擘絮新月似磨鎌蘇子羙詩卧看青天行白雲逸氣不應供潦倒晉書王廙傳曰政足舒其逸氣耳潦倒見上注劇談脫或致紛紜漢書楊雄傳口吃不能劇談注云劇疾也南史朱异傳梁武帝曰脫致紛紜恐無所及但令蘇晉禪妨醉老杜詩蘇晉長齋繡佛前醉中徃徃愛逃襌不患何山病破葷南史何胤二兄求點並棲遁世號點爲大山胤爲小山㣧侈於味食必方丈周顒勸令食菜陳留市隠者有引陳留市有工力隨其所得爲一日費父子日飲于市醉負以歸行歌道上女子抵手爲節有問之者不對而去江季恭以爲達爲作傳倩予賦之陳留人物後疑有隠屠耕老杜詩陳留風俗衰人物世不數屠耕朱亥之流斯人豈其徒滿腹一杯羹言易足也莊子曰偃䑕飮河不過滿腹漢書項羽傳髙祖曰幸分我一杯羹婷婷小家子與翁同醉醒史記西門豹傳巫行視小家女好者南史羊侃傳終日獻酬同其醉醒漢書霍光傳樂成小家子薄暮行且歌列子曰林類拾穗行歌蜀志秦宓傳曰接輿行且歌問之諱姓名老杜詩問之不肯道姓名子豈逹者歟槁竹聊一鳴今所謂撃竹也淮南子曰槁竹有火弗鑚不㸐老生何所因稍稍聲過情魏志管輅傳曰老生常談耳孟子曰聲聞過情君子恥之閉門十日雨吟作飢鳶聲莊子曰子輿子桑友而淋雨十日子輿裹飯而徃食之至子桑之門則若歌若哭鼔琴曰父邪母邪天乎人乎退之詩曰閉門長安三日雪詩書工彂家見上注刀籋得養生魯直作此詩亦曰養性霜刀在閱人清鏡空莊子曰吾聞庖丁之言得飬生焉飛走不同穴言出處異趣如飛走不同我方學孔子之歷聘未能從斯人㳺也孔突不暇黔一作聖有不暖席接浙去齊行淮南子曰孔子無墨突墨子無暖席漢書班孟堅荅賔戯曰孔席不暖墨突不黔寄泰州曽侍郎肇八年門第故違離千里河山費夢思夢思見上注淮海風濤真有道莊子曰孔子觀於吕梁見一丈夫遊之孔子曰請問蹈水有道乎泰州屬淮南麒麟圖畫豈無時麒麟閣見漢書蘇武傳孫樵罵僮志曰僮何知吾豈獨無時文選三國名臣賛序曰有道無時孟子所以興嗟今朝有客傳河尹老杜詩有客傳河尹逢人問孔融謂河南尹李膺以比唐之河南韋尹也是處逢人說項斯南部新書楊敬之贈項斯詩曰㡬度見詩詩盡好及親標格過於詩平生不解蔵人善到處逢人說項斯三徑未成心已具世間惟有白鷗知太白詩心靜海鷗知下有曽子開和故人南北歎乖離忽把清詩慰所思松茂雪霜無改色鷄鳴風雨不愆時著書子已通科斗竊食吾方逐鸒斯便欲去爲林下友懶隨年少樂新知下注云無已書言作尚書傳故云答顔生見寄闕然車馬不聞音荘子曰今者闕然數日不見車馬有行色孟子曰百姓聞王車馬之音行路艱危已備更左傳曰險阻艱難備甞之矣問舍求田真得計魏志張邈傳劉備謂許汜曰今天下大亂帝王失所望君憂國忘家有救世之意而君求田問舎言無可采王介甫詩無人語與劉玄徳問舎求田意取髙莊子曰於魚得計臨流㩀石有餘清晉書謝安傳安常徃臨安山中坐石室臨濬谷悠然歎曰此亦伯夷何逺淵明歸去來辭曰臨清流而賦詩道學傳任敬至甘泉峴山據石老杜詩府中有餘清江山滿目開新卷韋杜諸人得細評退之詩應湏韋杜家家到只有今朝一日閑老杜詩郷里衣冠不乏賢杜陵韋曲未央前閑處着身容我老忙中見記識君情司空圖休亭歌曰頼是長休教閑處着和黄預七夕盈盈一水不斯湏經歲相過自作踈自作一作固自古詩迢迢牽牛星皎皎河漢女盈盈一水間脉脉不得語文選楊脩書曰曾不斯湏少留思慮坐待翔禽報佳㑹玉䑓新詠載歌辭曰東飛伯勞西飛燕黄姑織女長相見徑湏飛雨洗香車李商隱七夕詩曰已駕七香車迢騰水部陳篇上何遜甞爲水部郎有七夕詩曰仙車駐七襄鳯駕出天潢月映九微火風吹百和香劉禹錫詩曰從今紙貴後不復詠陳篇陳謂陳言收拾愚溪作賦餘愚溪謂柳子厚謫永川時所居之溪也子厚有愚溪對又有乞巧文蓋楚騷之類信有神仙足官府退之詩曰上界真人足官府我寧辛苦守殘書退之詩我寧詰屈自世間安能隨汝巢神仙辛苦守殘書蓋用神仙蘇子訓傳中事見第一卷注傳燈録龍牙頌曰食罷展殘書漢書劉歆移文曰専巳守殘贈鄭户部千載歸来遼海東江山如舊里閭空續㮴神記云遼東城門華表柱忽有白鶴來集人或欲射之鶴歌曰有鳥有鳥丁令威去家千年今始歸城郭猶是人民非何不學仙塚纍纍户部蓋后山同里后山作白鶴觀記云徐州有白鶴泉故此詩用遼東鶴事時平未覺身難遇學贍依然說不窮退之詩太平時節身難遇時平見第二卷注後漢戴憑傳帝令羣臣能說經者更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席故京師爲之語曰解經不窮戴侍中着繡晝行真細事魏志夏侯玄傳注云許允爲鎮北將軍大將軍曰所謂着繡晝行退之閔已賦云固哲人之細事此借用言鄭君不以名位誇姱郷里下車磬折得深衷說苑常樅謂老子曰過故郷而下車子知之乎老子曰非謂其不忘故耶樅曰嘻是也退之詩里門先下敬郷人蓋亦用漢書石度事曲禮䟽云身僂折如磬之背故云磬折顔延之五君詠云頌酒雖短章深衷自此見此借用言鄭君加敬郷人可見其忠厚篤實之意聖朝未有徐州相剩作功名跨數公后山自注云世稱青州王相濮州李相而吾州自開國至今才有劉李二公爲執政爾車千秋踰於前後數公九日不出魏衍見過九日登臨迫閉蔵老懐無恨自凄凉素問曰冬三月是謂閉蔵山頭落帽風流絶晉書孟嘉爲桓温叅軍九日温燕龍山風吹嘉帽墮落嘉不之覺壁面稱詩語笑香后山自注云南山有二謝詩石秦少㳺亦有花氣侵人語笑香之句衝雨肯來㝷此老退之詩不衝風雨即衝埃老杜秋述曰常時車馬之客舊雨來今雨不來子魏子獨踽踽然來汗漫其僕夫拂床聊待熟黃梁黄梁事見上注獨無樽酒為公夀正使秋花未肯黃后山自注云是日無菊送魏衍移沛積雨㫁行路重江未安流胡爲冒艱險迫此帛米謀退之盧殷墓誌曰鄭餘慶數以帛米周其家嵗晏風作横未寛爲子憂老杜詩蛟螭深作横卒然託異縣所得如所求古樂府他郷各異縣輾轉不相見主人如古人待士禮亦優人情樂新知豈不懐舊丘楚詞樂莫樂兮新相知我貧無四壁愛爾胡能留子也尚不容吾代諸公羞勿云百里逺已作千山愁念子捨我去誰復從我㳺諸石吾未識因子卜可不能此已可尚尚一作喜終焉致綢􅓎退之送董邵南序云聊以吾子之行卜之也送河間令元注云子固甥今日中牟令當年太守孫後漢魯恭爲中牟令獨能憐此老肯避席為門漢書陳平傳家負郭窮巷以席爲門然門外多長者車轍寒日風濤壯選詩春江壯風濤邊城簿領䌓選詩沉迷簿領書平生子曽子白首得重論子曽子謂曽鞏子固列子曰子列子居鄭圃四十年其後劉禹錫作子劉子傳次韻何子温祈晴二首夜半風回雨脚收萬家和氣與雲㳺樂天詩風驅雨脚回漢書王襃傳曰徳與和氣㳺後漢張衡東京賦曰澤從雲㳺蕭條寒巷荒三徑文選西征賦曰街里蕭條晋書陶潜歸去來曰三徑就荒松菊猶存突兀晴空聳二樓二樓謂燕子與黄樓也老杜詩何時眼前突兀見此屋勝日登臨䡖一醉下郷昬墊肯同憂两句此暗用謝安事上句取老杜詩謝安不倦登臨費之意下句即簡文帝所謂安石旣與人同樂必不得不與人同憂者也勝日見上注書曰下民昬墊江空峡響魚龍落盡放青青極目秋老杜詩水落魚龍夜又九虎當關信不傳楚辭虎豹九關啄害下人些晉書嵆康曰當關呼之不置燒煙才上已回天唐張玄素傳魏徴曰張公論事有回天之力驅除霧雨還朝日朝一作晴漢書王莽賛曰帝王之驅除云爾老杜詩未辭添露雨又詩侵陵雪色還萱草畜縮濤波復二川漢書息夫躬傳曰王嘉健而畜縮劉禹錫詩曰支川讓其流蓄縮空南委二川謂汴泗支一作文奪目光華開秀句宋玉髙唐賦曰煌煌熒熒奪人目精光華見詩序南史顔延之傳鮑昭曰君詩若鋪錦列繡亦雕繢滿眼老杜詩最傳秀句寰區滿堆場藁秸驗豐年劉禹錫詩場黃堆晚稻禹貢注云秸藁也從今更上中和頌漢書王褒傳作中和樂職宣布詩少費將軍九萬牋語林曰王右軍爲㑹稽謝公就乞牋紙庫中有九萬枚悉與之寄潭州張芸叟二首湖嶺一都㑹西南更上㳺都㑹上㳺並見上注秋盤堆鴨脚歐公有鴨脚詩退之詩火齊磊落堆金盤春味薦猫頭潭州有猫頭笋禮記庶人春薦韭宣室来何暮漢書賈誼爲長沙王太傅歳餘文帝思誼徴之至入見上方受釐坐宣室因感鬼神事而問鬼神之夲誼具道所以然之故至夜半文帝前席旣罷曰吾乆不見賈生自以爲過之今不及也後漢㢘范傳曰㢘叔度來何暮長沙即今潭州蒸池得借留寰宇記衡州衡陽縣呉之臨蒸以蒸水名老杜詩衡岳江湖大蒸池疫癘偏然蒸水亦在潭州之境借留用宼恂事見上注得借留猶言安得乆借留也孰知為郡樂東坡詩古稱爲郡樂莫作越郷憂越郷猶離郷也左傳宋人曰懐璧不可以越郷鮑昭詩云誰令乏古節貽此越郷憂又去國如前日為邦得舊㳺霜甘先落手老杜詩破甘霜落瓜春鴈㡬回頭南嶽有回鴈峯此句謂因鴈之回起北歸之意也只道風沙惡唐張謂長沙上風碑曰遁甲所謂沙上之地雲陽之墟可以長徃可以隱居者焉老杜詩形勝有余風土惡寧知賈宋留賈誼甞爲長沙傅潭州湘隂縣有汨羅水屈原自沉於此宋玉甞爲文招之賦詩真有助借用張說事見上注吊古不同憂意謂屈原也不同憂蓋用反騷之意送曹秀才甲第衣冠後東遷歲月侵漢書髙祖詔列侯食邑皆賜大第室注甲乙次第故曰第情親期一諾用季布事見上注急病闕千金國語魯語曰賢者急病而讓夷讓一作壤孰並還家樂見上注母忘在莒心新序鮑叔牙爲桓公壽曰願公無忘在莒時時能記衰病聲迹到雲林老杜詩時應問衰病盡䟽及滄浪又詩雲林得尔曹送王元均貶衡州兼寄元龍二首先生英氣盖區中先生謂王平甫也漢書項羽傳力拔山兮氣蓋世命與仇謀得老窮退之進學解命與仇謀取敗㡬時老杜詩窮老無兒孫又見長身有家法退之孔戣墓銘曰孔世三十八吾見其孫白而長身可辭短簿怒吾公晉書郗超傳超爲桓温參軍王恂爲温主簿皆爲温所重府中語曰髯參軍短主簿能令公喜能令公怒超髯恂短故也此借用言其髙材復如乃公不合於世宜乎不免簿領之賤也左傳曰吾公在壑谷石頭路滑行能速傳燈録道一襌師傳鄧隠峯辭師師云什麽處去對云石頭去師云石頭路滑石頭謂南岳希遷和尚所居也用衡山故事言其道學之勝宣室歸来語未終見上注謂爲帝所知不待語之盡也宛洛風塵莫回首選詩曰京洛多風塵又云宛洛佳遨逰直須留眼送歸鴻老杜詩留眼共登臨文選嵆康詩目送歸鴻手揮五絃劉孝綽詩洞庭春水緑衡陽旅鴈歸又先生秀句满天東老杜詩最傳秀句寰區滿王平甫江東人二子縁渠再得窮渠謂詩也取詩能窮人意再謂再世詩禮向来堪彂冡發冡見上注蓋指吕惠卿以經義見用也初惠卿事平甫之兄安石如父子平甫負氣惡其憸巧數面折之恵卿切齒及安石罷相引惠卿輔政恵卿欲遂代安石恐其復來乃因鄭俠獄䧟安國安國時爲著作郎放歸田里歲餘復官發病卒孫劉能使不為公此句似指當時排元均者蓋承上句再得窮下以故國山河終之能使謂不能也孫劉亦指惠卿魏志辛毗傳毗曰吾立身自有本末就與孫劉不平不過不作三公而巳謂孫資劉放也孟子曰臧氏之子焉能使予不遇㢤炎方瘴癘避軒豁老杜詩開襟驅瘴癘又詩南斗避文星退之南海碑云乾端坤倪軒豁呈露故國山河開始終此句用野人獻塊於公子重耳之意王介甫始開國於荊元均世父也衡山乃荊州之地今雖遷謫終爲異時封國之祥歟漢書韋賢成傳曰封侯故國老杜詩山河誓始終傳語元龍要相識江湖春動有来鴻后山自注云元龍亦謫金陵晉書王忱曰張祖希欲相識自可見詣此詩反而用之言書尺之間相見已了不待相詣也來鴻用蘇武鴈書事顔氏家訓亦以尺牘爲千里面目老杜詩鴻鴈㡬時到江湖秋水多謝玄暉詩遵渚有來鴻后山詩註卷第七
