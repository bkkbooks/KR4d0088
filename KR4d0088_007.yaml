front:
  text: 后山詩注卷第七
  hash: sha256:01d4c1be038d94c29f11dd7271b2ab437df9bbabec2d6aa6d58d04ef5aaaac9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_007-1a}
body:
  text: 春夜宿鳥一枝足爭林終日鳴莊子曰鷦鷯巢於深林不過一枝庭花當户彂蜀志先主誅張𥙿曰蘭生當門不得不鋤江月向人明晉書劉惔傳卿今日作此面向人耶老杜詩隴月向人圎鳥度清溪影老杜詩鳥影度寒塘風回晚市聲魯直詩市聲故有耳夢中無好語池草為誰生南史謝靈運每有篇章對族弟惠連輒得佳句嘗於永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草大以為竒和三日苦遭年少強追陪病眼看花更覆杯老杜詩老年花似霧中看覆杯見上注夾岸萬人傾國出清江一注兩山開老杜清明詩著處繁華矜是日長沙千人萬人出又詩胡為傾國至周禮匠人曰兩山之間必有川焉逰人欲盡驚鷗下晚日猶須惡雨催猶須若曰尚何須也更恐明年有離别折花臨水共徘徊登燕子樓元和中張建封鎮武寧盻盻者徐之竒色建封納之於燕子樓後又為起新樓建封薨盻盻誓不他適樂天為作詩曰黃金不惜買娥眉揀得如花四五枝歌舞教成心力盡一朝身去不相隨緑暗連村柳司空圖詩緑樹連村暗王介甫詩楊柳鳴蜩緑暗紅明委地花樂天詩霜降春林竹委地韓偓哭花詩云今見妖紅委地時畫梁初著燕薛道衡詩空梁落燕泥廢沼已鳴哇東坡詩廢沼哇蟈淫鷗沒輕春水老杜詩白鷗沒浩蕩又云鷗輕故不還舟橫著淺沙韋應物詩云野渡無人舟自橫相逢千歲語猶説一枝花一枝花見題注傅大士頌云時人皆不識喚作一枝花和魏衍三日二首林花女頰紅春水瓜頭緑老杜詩色好梨勝頰步蹇我三休文選謝宣逺詩蹇步愧無良賈誼新書楚王作中天之臺三休而後至其上來周君一足一足見上注苦嗟所歷小不盡千里目文選海賦曰徒識觀怪之多駭乃不悟所歷之近逺唐人詩曰欲窮千里目更上一層樓按文選顔延年詩傷哉千里目莫景向昏鴉歸途取修竹老杜詩有待至昏鴉又云歸蓋取荆門枚乘兔園賦曰修竹檀欒夾于池水魯直詩還尋密竹徑中歸又堤沙泥盡未及塵韓偓詩輕寒著背雨淒淒九陌無塵未有泥此反而用之江波不動風生汶溫廷筠湖隂曲云吳波不動楚山晚劉禹錫云瀼西春水縠紋生虎頭魚尾不知數謂競􅊑也虞世基水土記曰梁孝元作神獸艦頭畫虎豹以助軍威朱旗一點來奔雲文選班固燕然山銘曰朱旗絳天劉禹錫泛舟詩曰指揮船舫點紅旌春容已老有餘態鄭文寶詩灞陵春色老於人歐公詩譬如夭韶女老自有餘態祓禊雖古無前聞晉書束晢傳武帝問摯虞三日曲水之義對曰漢徐肇以三月初生三女至三日俱亡村人以為怪乃招携之水濵洗祓遂因水以泛觴其義起此束晢曰虞小生不足以知臣請言之云云前聞見上注踏青摸石修祕祝一本修作條老杜詩江邊踏青罷摸石蓋俚巷舊俗楊元素夲事詞載海雲故事是也漢書文帝紀除祕祝落日帶雨催行人賈島詩落日恐行人聽詩對月兩不厭頗覺過目徒紛紛退之詩紛紛過目何由記老杜詩世上兒子徒紛紛君不見天寶杜陵翁屈宋才堪作近鄰老杜有麗人行蓋天寶中上巳所作老杜又有詩云不薄今人愛古人清詞麗句必為鄰竊攀屈宋宜方駕恐與齊梁作後塵答魏衍惠朱櫻開門先得故人書退之詩不枉故人書無由泛江水稍喜提携起覆盂言故人書來慰其寂寞如提起久覆之盂也漢書東方朔傳云安於覆盂此借用其字得句有誰知我在嘗新此日賴吾徒老杜朱櫻詩金盤玉筯無消息此日嘗新任轉蓬傾藍的皪霑朝露樂天放魚詩傾藍㵼地上東坡詩霧雨不成點映空疑有無時於苑上見的皪走明珠按上林賦曰宜笑的皪出袖熒煌得寶珠東坡謝賜御書詩云袖有明珠三十四會薦瑛盤驚一座以比魏衍後漢明帝宴羣臣太官進櫻桃以赤瑛盤賜羣臣月下視之盤與桃同色羣臣皆笑云是空盤事見藝文類聚太白詩山盤薦霜黎莧腸藜口未良圖退之詩腸肚集藜莧老杜詩邂逅豈即非良圖字本出左傳和魏衍聞鶯春力著人朝睡重魯直如夢詞云門外鶯啼楊柳春色著人如酒東坡詩美人如春風著物物不知葉底黃鸝鳴自送老杜詩隔葉黃鸝空好音退之詩清歌緩送感行人按古今樂録曰凡歌曲終皆有送聲緑幕朱攔日觀明回廊側户風簾動退之短檠歌黃簾緑幕朱户閉風露氣入秋堂涼太山記東南巖名曰日觀此借用言臺觀之向日者選詩風廉入雙燕上四句言富貴家聞鶯初不領略任其自鳴耳昨夜春回到寒谷好鳥飛來把修竹寒谷以言貧家謂魏衍也劉向别録曰燕有寒谷不生黍稷鄒衍吹律於其間暖氣乃至草木發生老杜詩西來有好鳥為我下青冥又詩栖枝把翠梧整翰厲觜初一鳴文選鮑昭蕪城賦云飢鷹厲吻已落君詩專妙獨元稹作杜子美墓銘敘曰盡古今之體勢而兼人人之獨退紅著緑春事殘魯直連理松枝詩云紅紫事退獨參天後時獨立知何言老杜詩恐爾後時難獨立退之聞鶯詩曰共矜初聽早誰貴後聞頻樂天詩鶯雖為説不分明葉底枝頭謾饒舌側聽不盡巳飛去劉禹錫百舌吟曰數聲不盡又飛去何許相逢緑楊路懷抱此時誰與論退之晚菊詩曰此時無與語棄置奈悲何韓偓雨詩曰此時髙味共誰論掩鼻吟詩空佇立和黃生春盡逰南山逐勝缺勇功樂天詩逐勝移朝宴留歡放晚衙孫子曰善戰者無智名無勇功餞春無少色言無少年惜春之意堯典寅餞納日孟郊詩萬物無少色兆人皆老憂此借用出門欲何向坂丸隨所擊漢書蒯通傳曰猶如坂上走丸百年餘幾何十步復一息言其老憊也漢書王褒傳曰萬里一息同來二三子楚楚頗修飾詩云蜉蝣之羽衣裳楚楚行前強老夫徑捷疲峻陟漢髙帝紀曰令一人行前文選阮嗣宗詩捷徑從狹路山門開煙霏禪房間岑寂文選廣絶交論曰煙霏雨散李善注引陸機賦曰騰煙霧之霏霏唐人常建詩云禪房花木深文選舞鶴賦去帝鄉之岑寂李善注云岑寂猶髙靜口燥沾茗碗久厄此為德文選陸機文賦云始躑躅於燥吻伽藍記王𪷟好茶人至輒飲之士大夫以為水厄逐日下西山草露荒不識列子曰夸父欲追日影逐之於隅谷之際漢書楊雄反離騷曰恐日薄於西山文選沈約詩曰夢中不識路回溪轉鈎曲門徑入繩直文選潘安仁詩回溪縈曲阻莊子徐無鬼曰曲者中鈎潘安仁籍田賦曰遐千繩直故人喜領客內愧積腸臆老杜詩領客珍重意所來為親舊掃除稱寥閴老杜詩所來為宗族亦不為盤飱疾風無末勢漢書韓安國傳曰衝風之衰不能起毛羽強弩之末不能入魯縞過雨有餘瀝老杜詩頭風吹過雨史記淳于髠傳曰侍酒於前時賜餘瀝髙花初欲然退之楸樹詩看吐髙花萬萬層選詩山櫻發欲然平荷巳如拭老杜詩菱葉荷花靜如栻因君感衰盛醜好移頃刻魯直詩醜好隨手翻交新厭區區話舊聽歷歷談間十一二四座已傾側歷歷見上注漢書司馬相如傳一座盡傾茅屋漏風霜山田帶沙礫尚能哀此老舉手觸四塞哀此老見上注文選左太沖詠史詩曰習習籠中鳥舉翮觸四隅漢書成帝紀曰黃霧四塞君如澗底松迢拔出天壁左太沖詠史詩曰鬱鬱澗底松老杜詩東得平岡出天壁學詩有新功黃魏共推激后山自注云生與魏衍黃預遊魯直詩杜郎覔句有新功老杜詩風騷共推激㨂花密葉已成蔭髙花初著枝選詩密葉成翠幄髙花見前篇注幽香不自好寒艷未多知唐人崔涯黃葵詩嫩葵淺黃色幽香寒淡姿李商隱詩春風雖自好春物太昌昌葵一作蘖會見垂金彈聊容折紫緌西京雜記韓嫣好彈以金為丸禮記曰玄冠紫緌自魯桓公始也粉身非所恨猶復得聞思粉身謂以此花為香老杜丁香詩晚墮蘭麝中休懷粉身念黃魯直論香有所謂聞思者蓋取楞嚴經觀音所言從聞思修入三摩地因以名香云和黃充實榴花春去花隨盡紅榴暖欲然欲然見上注後時何所恨後時見上注孔紹石榴詩曰只為來時晚開花不及春樂天對晚開夜合花詩後時誰肯願惟我與君憐處獨不祈憐退之畫記曰居間處獨東坡樂府曰石榴半吐紅巾蹙待浮花浪蘂都盡伴君幽獨葉葉自相偶古樂府宋子侯董嬌嬈詩曰花花自相對葉葉自相當按榴花多有雙葉重重久更鮮東坡樂府又曰濃艷一枝試看取芳心千里似束流珠沾署雨改色淡朝煙樂府長史變歌曰凌霜不改色枝葉永流榮老杜詩城郭朝煙淡此借用以言煙籠而色淡也著子專寒酒酒譜曰頓孫國有安石榴取汁停盆中數日成美酒移根擅花權孔紹永石榴詩云可惜庭中樹移根逐漢臣按博物志張騫使西域還得安石榴唐劉蕡䇿曰宰相權造化之柄愧非無價手東坡詩曰惟有此詩非昔人君更往求無價手刻畫竟難傳老杜詩詞人取佳句刻畫竟難傳和黃預久雨甲子仍逢夏朝野僉載曰夏雨甲子乘船入市連朝雨腳垂老杜詩雨腳如麻未斷絶黑雲玄甲駐班固燕然銘曰玄甲耀日鐡騎冷官馳魏志注曰曹公列鐡騎五千為十里陳老杜詩合昏排鐡騎冷官謂隂官也退之祈雨詩曰隂官想駿奔映日還蒙霧懸麻却散絲古詩春雨如散絲頽墻通犬豕破柱出蛟螭世説夏侯泰初倚柱作詩時暴雨霹靂碎柱神色無變退之詩飛雷著壁搜蛟螭野潤風光秀涼生枕席宜老杜詩野潤煙光薄選詩風光草際浮樂天詩風來入房户夜中枕席冷撥雲開日月噀水出虹霓貧可留須捷楊雄方言曰南楚凡人貧衣被醜敝謂之須捷或謂之樓裂此引用言雨中解衣以供薪米之費雖垢弊亦不復行也恩當記扊扅顔氏家訓曰樂府載百里奚妻辭曰百里奚五羊皮憶昔時烹伏雌炊扊扅今日富貴忘我為案蔡雍月令章句曰鍵門牡也所以止扉或謂之剡移此句言雨中婦以門牡為炊政苦食淡異時不可忘也蒼頭行冒雨漢書鮑宣傳蒼頭廬兒注漢名奴為蒼頭元稹詩冒雨衝泥黑地來地一作也赤腳出衝泥退之詩一婢赤腳老無齒老杜詩虛疑皓首衝泥怯詩好聲生吻退之石鼎聮句序曰每營度欲出口吻聲鳴益悲書工手著胝樂天詩秉筆手生胝按莊子讓王疏曰每自力作故生胼胝衰年得佳句懷抱頓能移和黃預病起似聞藥病已投機傳燈録伏牛襌師曰非心非佛是藥病對治句又洞山崇教禪師云言無展事句不投機承宗者喪滯句者迷迷一作遂牛鬪蛇妖頓覺非晉書殷仲堪父嘗患耳聰聞床下蟻動謂之牛鬪樂廣有親客久闊不復來廣問其故答曰前在坐蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而疾時廣聽事壁上有角漆畫弓似蛇廣意杯中蛇即弓影也復置酒於前處謂客曰酒中復有所見否答曰所見如初廣乃告其所以客豁然意解沉痾頓愈李賀固知當得疾唐書李賀母探錦囊中見所書詩多即怒曰是兒欲嘔出心乃已耳沈侯可更不勝衣南史沈約傳曰老病百日數旬革帶常應移孔約死諡隱侯東坡樂府曰沈郎多病不勝衣按禮記檀弓曰文子其中退然如不勝衣驚逢白璧山千仞言其清瘦如玉山孤聳也太白天馬歌曰白璧如山誰敢沽此借用晉顧愷之作王衍畫贊曰巖巖清峙璧立千仞會見黃金帶十圍歐公詩喜君新賜黃金帶後漢虞詡晉庾敳後周庾信皆腰帶十圍只信詩書端作祟史記田叔贊禇先生曰久乘富貴禍積為祟老杜詩蛟鼉苦為祟魯直詩亦有湯餅作祟之語孰知粳籺亦能肥前漢陳平為人長大美色人或謂平貧何食而肥若是其嫂疾之曰亦食粳核耳注核音籺何郎中出示黃公草書四首魯直龍蛇起伏筆無前老杜詩龍蛇動篋蟠銀鉤書法苑曰李雍書始變右軍行法頓挫起伏江漢淵回語更妍老杜詩洞庭揚波江漢回説文曰淵回水也文選潘嶽間居賦曰圎海回淵好事無須一賞足歐公菱溪大石記曰好竒之士聞此石者可以一賞而足何必取而去也哉藏家不必萬人傳老杜詩將詩不必萬人傳又此詩此字有誰知盡省郎官自崛竒通典曰漢儀尚書郎奏事明光殿省中以胡粉塗壁畫古賢烈女退之詩西城貟外丞心迹兩崛竒罪大從來身萬里謂魯直謫居戌州又退之詩我今罪重無歸望直去長安路八千政成今見麥三岐謂何郎中三岐麥蓋當時實事又四海聲名何水曹梁何遜為水部魯直詩四海聲名習主簿新詩舊德自相髙郭受寄老杜詩云新詩海內流傳困舊德朝中屬望勞一官早要稱三字三字謂知制誥盧氏雜説曰不由三字直拜中書舍人者謂之撻額裹頭王禹稱詩摛毫終要居三字出郡應須借一麾二鬢何須著兩毛何須一作誰教退之詩郎署何須歎兩毛又當年闕里與論詩闕里孔子所居孔子嘗謂子貢子夏可與言詩后山亦學詩於黃公云晚歲何山斷夢思太白詩君留洛北愁夢思時魯直遷謫蜀中妙手不為平世用髙懷猶有故人知孟子曰禹稷當平世故人謂何郎中和黃預感懷壁立無堪佐子貧謾修簡牒效殷勤老杜詩懶慢無堪不出村史記過秦論曰以佐公上之急漢書司馬遷書曰未嘗銜杯酒接殷勤之歎起臨明鏡看生意老杜詩勳業頻看鏡晉書殷仲文曰此樹婆娑無復生意卧向晴簷共白雲退之詩日落風景曠出歸偃前簷晴雲如擘絮新月似磨鎌蘇子美詩卧看青天行白雲逸氣不應供潦倒晉書王廙傳曰政足舒其逸氣耳潦倒見上注劇談脫或致紛紜漢書楊雄傳口吃不能劇談注云劇疾也南史朱異傳梁武帝曰脫致紛紜恐無所及但令蘇晉禪妨醉老杜詩蘇晉長齋繡佛前醉中往往愛逃襌不患何山病破葷南史何胤二兄求點並棲遁世號點為大山胤為小山㣧侈於味食必方丈周顒勸令食菜陳留市隱者有引陳留市有工力隨其所得為一日費父子日飲于市醉負以歸行歌道上女子抵手為節有問之者不對而去江季恭以為達為作傳倩豫賦之陳留人物後疑有隱屠耕老杜詩陳留風俗衰人物世不數屠耕朱亥之流斯人豈其徒滿腹一杯羹言易足也莊子曰偃鼠飮河不過滿腹漢書項羽傳髙祖曰幸分我一杯羹婷婷小家子與翁同醉醒史記西門豹傳巫行視小家女好者南史羊侃傳終日獻酬同其醉醒漢書霍光傳樂成小家子薄暮行且歌列子曰林類拾穗行歌蜀志秦宓傳曰接輿行且歌問之諱姓名老杜詩問之不肯道姓名子豈逹者歟稿竹聊一鳴今所謂擊竹也淮南子曰稿竹有火弗鑽不㸐老生何所因稍稍聲過情魏志管輅傳曰老生常談耳孟子曰聲聞過情君子恥之閉門十日雨吟作飢鳶聲莊子曰子輿子桑友而淋雨十日子輿裹飯而往食之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎退之詩曰閉門長安三日雪詩書工彂家見上注刀籋得養生魯直作此詩亦曰養性霜刀在閲人清鏡空莊子曰吾聞庖丁之言得飬生焉飛走不同穴言出處異趣如飛走不同我方學孔子之歷聘未能從斯人遊也孔突不暇黔一作聖有不暖席接浙去齊行淮南子曰孔子無墨突墨子無暖席漢書班孟堅答賔戲曰孔席不暖墨突不黔寄泰州曽侍郎肇八年門第故違離千里河山費夢思夢思見上注淮海風濤真有道莊子曰孔子觀於吕梁見一丈夫遊之孔子曰請問蹈水有道乎泰州屬淮南麒麟圖畫豈無時麒麟閣見漢書蘇武傳孫樵罵僮志曰僮何知吾豈獨無時文選三國名臣贊序曰有道無時孟子所以興嗟今朝有客傳河尹老杜詩有客傳河尹逢人問孔融謂河南尹李膺以比唐之河南韋尹也是處逢人説項斯南部新書楊敬之贈項斯詩曰幾度見詩詩盡好及親標格過於詩平生不解藏人善到處逢人説項斯三徑未成心已具世間惟有白鷗知太白詩心靜海鷗知下有曽子開和故人南北歎乖離忽把清詩慰所思松茂雪霜無改色雞鳴風雨不愆時著書子已通科斗竊食吾方逐鸒斯便欲去為林下友懶隨年少樂新知下注云無已書言作尚書傳故云答顔生見寄闕然車馬不聞音莊子曰今者闕然數日不見車馬有行色孟子曰百姓聞王車馬之音行路艱危已備更左傳曰險阻艱難備嘗之矣問舍求田真得計魏志張邈傳劉備謂許汜曰今天下大亂帝王失所望君憂國忘家有救世之意而君求田問舍言無可采王介甫詩無人語與劉玄德問舍求田意取髙莊子曰於魚得計臨流據石有餘清晉書謝安傳安常往臨安山中坐石室臨濬谷悠然歎曰此亦伯夷何逺淵明歸去來辭曰臨清流而賦詩道學傳任敬至甘泉峴山據石老杜詩府中有餘清江山滿目開新卷韋杜諸人得細評退之詩應須韋杜家家到只有今朝一日間老杜詩鄉里衣冠不乏賢杜陵韋曲未央前間處著身容我老忙中見記識君情司空圖休亭歌曰賴是長休教間處著和黃預七夕盈盈一水不斯須經歲相過自作踈自作一作固自古詩迢迢牽牛星皎皎河漢女盈盈一水間脈脈不得語文選楊修書曰曾不斯須少留思慮坐待翔禽報佳會玉臺新詠載歌辭曰東飛伯勞西飛燕黃姑織女長相見徑須飛雨洗香車李商隱七夕詩曰已駕七香車迢騰水部陳篇上何遜嘗為水部郎有七夕詩曰仙車駐七襄鳯駕出天潢月映九微火風吹百和香劉禹錫詩曰從今紙貴後不復詠陳篇陳謂陳言收拾愚溪作賦餘愚溪謂柳子厚謫永川時所居之溪也子厚有愚溪對又有乞巧文蓋楚騷之類信有神仙足官府退之詩曰上界真人足官府我寧辛苦守殘書退之詩我寧詰屈自世間安能隨汝巢神仙辛苦守殘書蓋用神仙蘇子訓傳中事見第一卷注傳燈録龍牙頌曰食罷展殘書漢書劉歆移文曰専巳守殘贈鄭户部千載歸來遼海東江山如舊里閭空續㮴神記云遼東城門華表柱忽有白鶴來集人或欲射之鶴歌曰有鳥有鳥丁令威去家千年今始歸城郭猶是人民非何不學仙冢纍纍户部蓋后山同里后山作白鶴觀記云徐州有白鶴泉故此詩用遼東鶴事時平未覺身難遇學贍依然説不窮退之詩太平時節身難遇時平見第二卷注後漢戴憑傳帝令羣臣能説經者更相難詰義有不通輒奪其席以益通者慿遂重坐五十餘席故京師為之語曰解經不窮戴侍中著繡晝行真細事魏志夏侯玄傳注云許允為鎮北將軍大將軍曰所謂著繡晝行退之閔已賦云固哲人之細事此借用言鄭君不以名位誇姱鄉里下車磬折得深衷説苑常樅謂老子曰過故鄉而下車子知之乎老子曰非謂其不忘故耶樅曰嘻是也退之詩里門先下敬鄉人蓋亦用漢書石度事曲禮疏云身僂折如磬之背故云磬折顔延之五君詠云頌酒雖短章深衷自此見此借用言鄭君加敬鄉人可見其忠厚篤實之意聖朝未有徐州相剩作功名跨數公后山自注云世稱青州王相濮州李相而吾州自開國至今才有劉李二公為執政爾車千秋踰於前後數公九日不出魏衍見過九日登臨迫閉藏老懷無恨自凄涼素問曰冬三月是謂閉藏山頭落帽風流絶晉書孟嘉為桓溫參軍九日溫燕龍山風吹嘉帽墮落嘉不之覺壁面稱詩語笑香后山自注云南山有二謝詩石秦少遊亦有花氣侵人語笑香之句衝雨肯來尋此老退之詩不衝風雨即衝埃老杜秋述曰常時車馬之客舊雨來今雨不來子魏子獨踽踽然來汗漫其僕夫拂床聊待熟黃梁黃梁事見上注獨無樽酒為公夀正使秋花未肯黃后山自注云是日無菊送魏衍移沛積雨斷行路重江未安流胡為冒艱險迫此帛米謀退之盧殷墓志曰鄭餘慶數以帛米周其家嵗晏風作橫未寬為子憂老杜詩蛟螭深作橫卒然託異縣所得如所求古樂府他鄉各異縣輾轉不相見主人如古人待士禮亦優人情樂新知豈不懷舊丘楚詞樂莫樂兮新相知我貧無四壁愛爾胡能留子也尚不容吾代諸公羞勿云百里逺已作千山愁念子捨我去誰復從我遊諸石吾未識因子卜可不能此已可尚尚一作喜終焉致綢􅓎退之送董邵南序云聊以吾子之行卜之也送河間令元注云子固甥今日中牟令當年太守孫後漢魯恭為中牟令獨能憐此老肯避席為門漢書陳平傳家負郭窮巷以席為門然門外多長者車轍寒日風濤壯選詩春江壯風濤邊城簿領繁選詩沉迷簿領書平生子曽子白首得重論子曽子謂曽鞏子固列子曰子列子居鄭圃四十年其後劉禹錫作子劉子傳次韻何子溫祈晴二首夜半風回雨腳收萬家和氣與雲遊樂天詩風驅雨腳回漢書王褒傳曰德與和氣遊後漢張衡東京賦曰澤從雲遊蕭條寒巷荒三徑文選西征賦曰街里蕭條晉書陶潛歸去來曰三徑就荒松菊猶存突兀晴空聳二樓二樓謂燕子與黃樓也老杜詩何時眼前突兀見此屋勝日登臨輕一醉下鄉昏墊肯同憂兩句此暗用謝安事上句取老杜詩謝安不倦登臨費之意下句即簡文帝所謂安石既與人同樂必不得不與人同憂者也勝日見上注書曰下民昏墊江空峽響魚龍落盡放青青極目秋老杜詩水落魚龍夜又九虎當關信不傳楚辭虎豹九關啄害下人些晉書嵆康曰當關呼之不置燒煙才上已回天唐張玄素傳魏徴曰張公論事有回天之力驅除霧雨還朝日朝一作晴漢書王莽贊曰帝王之驅除云爾老杜詩未辭添露雨又詩侵陵雪色還萱草畜縮濤波復二川漢書息夫躬傳曰王嘉健而畜縮劉禹錫詩曰支川讓其流蓄縮空南委二川謂汴泗支一作文奪目光華開秀句宋玉髙唐賦曰煌煌熒熒奪人目精光華見詩序南史顔延之傳鮑昭曰君詩若鋪錦列繡亦雕繢滿眼老杜詩最傳秀句寰區滿堆場藁秸驗豐年劉禹錫詩場黃堆晚稻禹貢注云秸藁也從今更上中和頌漢書王褒傳作中和樂職宣布詩少費將軍九萬箋語林曰王右軍為會稽謝公就乞箋紙庫中有九萬枚悉與之寄潭州張藝叟二首湖嶺一都會西南更上遊都會上遊並見上注秋盤堆鴨腳歐公有鴨腳詩退之詩火齊磊落堆金盤春味薦貓頭潭州有貓頭笋禮記庶人春薦韭宣室來何暮漢書賈誼為長沙王太傅歲餘文帝思誼徴之至入見上方受釐坐宣室因感鬼神事而問鬼神之夲誼具道所以然之故至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也後漢廉范傳曰廉叔度來何暮長沙即今潭州蒸池得借留寰宇記衡州衡陽縣吳之臨蒸以蒸水名老杜詩衡嶽江湖大蒸池疫癘偏然蒸水亦在潭州之境借留用寇恂事見上注得借留猶言安得久借留也孰知為郡樂東坡詩古稱為郡樂莫作越鄉憂越鄉猶離鄉也左傳宋人曰懷璧不可以越鄉鮑昭詩云誰令乏古節貽此越鄉憂又去國如前日為邦得舊遊霜甘先落手老杜詩破甘霜落瓜春鴈幾回頭南嶽有回鴈峯此句謂因鴈之回起北歸之意也只道風沙惡唐張謂長沙上風碑曰遁甲所謂沙上之地雲陽之墟可以長往可以隱居者焉老杜詩形勝有余風土惡寧知賈宋留賈誼嘗為長沙傅潭州湘隂縣有汨羅水屈原自沉於此宋玉嘗為文招之賦詩真有助借用張説事見上注吊古不同憂意謂屈原也不同憂蓋用反騷之意送曹秀才甲第衣冠後東遷歲月侵漢書髙祖詔列侯食邑皆賜大第室注甲乙次第故曰第情親期一諾用季布事見上注急病闕千金國語魯語曰賢者急病而讓夷讓一作壤孰並還家樂見上注母忘在莒心新序鮑叔牙為桓公壽曰願公無忘在莒時時能記衰病聲迹到雲林老杜詩時應問衰病盡疏及滄浪又詩雲林得爾曹送王元均貶衡州兼寄元龍二首先生英氣蓋區中先生謂王平甫也漢書項羽傳力拔山兮氣蓋世命與仇謀得老窮退之進學解命與仇謀取敗幾時老杜詩窮老無兒孫又見長身有家法退之孔戣墓銘曰孔世三十八吾見其孫白而長身可辭短簿怒吾公晉書郗超傳超為桓溫參軍王恂為溫主簿皆為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯恂短故也此借用言其髙材復如乃公不合於世宜乎不免簿領之賤也左傳曰吾公在壑谷石頭路滑行能速傳燈録道一襌師傳鄧隱峯辭師師云什麼處去對云石頭去師云石頭路滑石頭謂南嶽希遷和尚所居也用衡山故事言其道學之勝宣室歸來語未終見上注謂為帝所知不待語之盡也宛洛風塵莫回首選詩曰京洛多風塵又云宛洛佳遨逰直須留眼送歸鴻老杜詩留眼共登臨文選嵆康詩目送歸鴻手揮五絃劉孝綽詩洞庭春水緑衡陽旅鴈歸又先生秀句滿天東老杜詩最傳秀句寰區滿王平甫江東人二子緣渠再得窮渠謂詩也取詩能窮人意再謂再世詩禮向來堪彂冡發冡見上注蓋指吕惠卿以經義見用也初惠卿事平甫之兄安石如父子平甫負氣惡其憸巧數面折之惠卿切齒及安石罷相引惠卿輔政惠卿欲遂代安石恐其復來乃因鄭俠獄陷安國安國時為著作郎放歸田里歲餘復官發病卒孫劉能使不為公此句似指當時排元均者蓋承上句再得窮下以故國山河終之能使謂不能也孫劉亦指惠卿魏志辛毗傳毗曰吾立身自有本末就與孫劉不平不過不作三公而巳謂孫資劉放也孟子曰臧氏之子焉能使豫不遇哉炎方瘴癘避軒豁老杜詩開襟驅瘴癘又詩南斗避文星退之南海碑云乾端坤倪軒豁呈露故國山河開始終此句用野人獻塊於公子重耳之意王介甫始開國於荊元均世父也衡山乃荊州之地今雖遷謫終為異時封國之祥歟漢書韋賢成傳曰封侯故國老杜詩山河誓始終傳語元龍要相識江湖春動有來鴻后山自注云元龍亦謫金陵晉書王忱曰張祖希欲相識自可見詣此詩反而用之言書尺之間相見已了不待相詣也來鴻用蘇武鴈書事顔氏家訓亦以尺牘為千里面目老杜詩鴻鴈幾時到江湖秋水多謝玄暉詩遵渚有來鴻后山詩注卷第七
