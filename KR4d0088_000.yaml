body:
  text: 宋文承五季之弊其詩綺靡刻削出晚唐下至歐陽永叔始起而變之逮蘇子羙梅聖俞起而詩又變黄山谷陳后山起而又一變黄陳雖號江西派而其風骨逼近老杜宋詩盖至此極矣然予尤酷愛后山嘗攜其遺稿過漢中令生徒録過用便旅覽而憲副朱公恨世無完集不與歐黄諸家並行遂屬知府袁君宏加板刻焉顧舛訛太甚兼有脫簡嘉其志而惜其費盖不獨予然也丙辰嵗予南歸獲㝎本於江東故家朱公喜得如重寳復以屬袁君遂再板以行精繕奚翅什百而為功為惠固不尠矣自今讀后山詩固驚其雄徤清勁幽邃雅淡有一塵不染之氣夷考其行矯厲凌烈窮餓不悔則詩又特其緒餘耳后山自謂不及山谷晦翁以山谷詩近浮薄乃后山所無然豈獨詩㢤愛其詩而不師其人固非二君板行之意而况并其詩未必知也弘治丁巳秋九月朔石淙楊一清識后山詩註目録年譜附天社任淵讀后山詩大似叅曹洞禪不犯正位切忌死語非冥搜旁引莫窺其用意深處此詩註所以作也近時刋本參錯􅓎誤政和中王雲子飛得后山門人魏衍親授本編次有序歲月可考今悉㩀依略加緒正詩止六卷益以註卷各釐為上下作之有謂而存之可傳無恠夫詩之少也衍字昌世作后山集記頗能道其岀處今置之篇首後有學者得以覽觀焉第一卷元豐六年癸亥妾薄命二首后山自注曰爲曽南豐作后山學於南豐曽鞏子固南豐卒於元豐六年此篇必是時所作今以壓卷亦推本其淵源所自元豐七年甲子八年乙丑送外舅郭大夫槩西川提刑按實録元豐七年五月朝請郎郭槩提點成都府路刑獄此詩未必是時所作姑以除官歳月爲次後多倣此送内别三子右二篇后山妻子從郭槩入蜀時作寄外舅郭大夫城南寓居二首詩有韋杜城南村之句韋曲杜曲屬長安當是后山送其妻子入蜀後遂客寄關中或云熈寧間作憶少子元祐元年丙寅是歳后山在京師絶句詩有陳州門及蘇禮部之句陳州門在汴京時后山旅寓於此其春東坡爲禮部郎中寄外舅郭大夫詩有之句神母仁如堯哲宗即位宣仁太后垂簾之眀年也贈蘇二公南豐先生挽詞二首暑雨送江楚州送江端禮季共晁無咎張文潜見過次韻荅邢居實二首元祐二年丁卯春夏后山在京師按實錄元祐二年四月乙巳徐州布衣陳師道充徐州學教授以東坡傳堯俞孫覺之薦也其年赴官丞相温公挽詞三首司馬温文正公以元祐二年正月葬此詩蓋是時所作次韻荅學者四首次韻秦覯聴雞聞鴈二首嘲秦覯和豫章公黃梅二首黄魯直家於洪州分寧之雙井洪豫章郡此篇編次不倫姑從其舊荅張文潜文潜時爲館職第二卷九日寄秦覯巨野右二篇當是得徐州教授還郷道中所作示三子將至徐州作此詩元在晁張見過詩後今遷于此元祐三年戊辰是歳后山在徐州嗚呼行秋懐示黃預送張支使送杜侍御純陜西轉運按實録元祐二年九月知徐州杜純權陜西轉運使此詩九月所作送楊侍禦兼寄顔黄二公二首長道魯直送外舅郭大夫䕫路提刑按實録元祐三年五月知濮州郭㮣提點䕫州路刑獄此詩蓋此後所作雪後黃樓寄負山居士張仲連此詩元在秋懐前今遷于此元祐四年已巳是歳后山在徐州謝人寄酒詩有厭見春泥之句從蘇公登後樓元祐四年三月東坡自翰苑出知杭州五月后山自徐州謁公於南都此詩蓋當時所作詩有五月池無水之句送蘇公知杭州東坡岀知杭州道由南京后山時爲徐州教授告徐守孫覺願徃見而覺之不許乃託疾謁告來南京送别同舟東下至宿而歸事見東坡荅陳傳道書及劉安世彈章送秦覯二首覯字少章少㳺之弟也從東坡學於杭州黄魯直亦有此詩和江秀才獻花三首次韻李節推九日登南山别負山居士張仲連送趙教授元祐五年庚午是歳后山移頴州教授其冬徃赴次韻春懐黃梅五首田家巨野二首當是移頴州教授時經途所作别叔父録曹岀清口泛淮猴馬并引引云楚州紫極宫蓋經途所作徐氏閑軒徐氏謂徐大止東坡亦有閑軒詩寄豫章公三首元祐六年辛未是歳后山在頴州贈秦覯兼簡蘇迨二首蘇迨字仲豫東坡仲子按實錄元祐六年八月東坡自翰林承㫖知潁州於時仲豫侍行是歳十月東坡祈雨迎張龍公文云請教授陳師道遣男迨云云次韻秦少㳺春江秋野圖㓜嶺絶句贈歐陽叔弼第三卷觀兖文忠公家六一堂圖書送蘇迨送黃生兼寄二謝二首次韻蘇公西湖徙魚三首次韻蘇公西湖觀月聽琴次韻蘇公渉頴再次韻蘇公示兩歐陽次韻蘇公勸酒與詩次韻蘇公督兩歐陽詩次韻蘇公題歐陽叔弼息齋次韻蘇公竹間亭絶句以東坡集考之歳晚所作元在渉潁詩後今遷于此寄參寥元祐七年壬申是歳后山在潁州北渚東禪八月十日二首迎新将至漕城莫歸遇雨按實録元祐七年正月辛亥東坡自潁除知楊州二月辛酉少府監晏知止除知潁州六月甲子以禮部侍郎韓川換知止此言新將當是韓川漢書嚴延年傳注曰新將新爲郡將也即事齋居中秋夜東刹贈仁公十五夜月胡士彦挽詞二首元茂第四卷送趙承議令畤令畤字徳麟爲潁州簽判受代寄李學士格非格非字文叔雪晚出寄晁載之兄弟寄荅王直方直方字立之自號歸叟有園亭在汴京域南甞從蘇黄諸公㳺元祐八年癸酉是歳后山在頴州寄侍讀蘇尚書按實録元祐七年八月蘇公以兵部尚書兼翰林侍讀學士十一月又除端明殿學士兼侍讀守禮部尚書此詩似今年所作蓋有六月西湖之句寄亳州林待制希希字子中卧疾絶句南軒絶句獨坐寄送定州蘇尚書按實錄元祐八年九月禮部蘇公以侍讀學士知定州寄荅李方叔豸智寳院後樓懐胡元茂前有胡士彦挽詞即元茂也紹聖元年甲戍是歲春初后山當罷潁學而離潁等詩反在卷終又有未離頴時所作魏本如此不欲深加改正亦疑以傳疑之義元曰放懐絶句送伯兄赴吏部改官寄張文潜舎人後湖晚坐春興次韻回山人贈沈東老二首前篇屬回山人回即吕洞賔事見東坡詩集送李孝忠二首當是其兄傳道之子以柱杖供仁山主二首項城道中寄劉令使修溪橋項城屬陳州碓磨寨亦在陳州境内寄張宣州按實録云紹聖元年八月直龍圖閣張來權知宣州送倫化主西湖别月華嚴送呉先生謁惠州蘇副使按實録紹聖元年蘇公貶寧海軍節度副使惠州安置别圎澄襌師别觀音山主離潁湖上舟中二首䂓禪停雲齋第五卷紹聖二年乙亥是歳三月后山丁母夫人憂后山作其母行狀云夫人從其不肖子就食河北舟及鄆之東阿而卒實紹聖二年二月二十九日按實録紹聖二年三月河北東路提刑郭槩知澶州當是槩未罷使事時后山奉母就食遂遭變故已而㮣知曹州七月后山歸徐葬其父母遂寄食於曹有披雲樓記在曹時爲槩作答晁以道病起詩有湏杖起及灾疾之語當是居憂後所作九月九日魏衍見過時在徐州别黄徐州自徐寄食於曹所作次韻荅晁無斁無斁時爲曹州教官次韻無斁偶作二首古墨行并序次韻晁無斁除日述懐紹聖三年丙子是歳后山寓曹州有佛指記蓋三年八月所作次韻無斁雪後二首詩有寄食之語魏衍注云時先生寄婦翁郭槩大夫使宅贈魏衍三首當是自曹暫還徐所作贈寇國實三首次韻春懐河上題柱二首蠅虎陶朱公廟史記曰范蠡變名姓適齊爲鴟夷子皮之陶爲朱公陶即定陶今曹州濟隂縣乃其地也次韻晁無斁夏雨寄無斁次韻别張芸叟宿深明閣二首時徃雍丘展龐丞相墓閣在陳留佛寺東山謁外大父墓后山蓋龐丞相籍之外孫司馬温公作丞相墓誌云葬雍丘東山次韻晁無斁冬夜見寄寒夜有懐晁無斁除夜第六卷紹聖四年丁丑是歳后山寓曹州既而歸徐寄提刑李學士按實録紹聖三年十月提黠永興軍路刑獄李昭玘權提點京東西路刑獄此詩蓋四年所作昭玘字成季濟北人寄杜擇之次韻晁無斁春懐寄晁無斁别寳講主以后山佛指記考之重寳蓋曹州上生院主僧還里自曹歸徐所作答魏衍黄預勉予作詩老栢三首有序魏衍見過次韻螢火次韻夏日江村次韻觀月次韻夏日夏日有懐送杜擇之楊夫人挽詞桓山宋司馬桓魋所葬也寰宇記曰桓魋墓在徐州彭城縣北檀公曰昔者夫子居於宋見桓司馬自爲石椁三年而不成荅顔生送劉主簿羲仲觸目晚望送髙推官和黃預感秋和顔生同㳺南山僧慧僧和同徃南山粕謝端硯捕狼元符元年戊寅是歳后山在徐州和魏衍元夜同登黄樓和元夜和魏衍同逰阻風和魏衍同登快㢤亭登快㢤亭招黄魏二生第七卷春夜和三日登燕子樓和魏衍三日二首荅魏衍惠朱櫻荅魏衍聞鸎和黄生春盡逰南山揀花和黃充實榴花和黄預乆雨和黄預病起何郎中岀示黃公草書四首魯直魯直甞有李伯時畫刀籋工䟦尾曰龍眠李伯時爲廬江何琬子温作子温有逺韻其賞詠古今人詩得其致意處故伯時肯以妙墨予之元祐五年九月已巳黄某題草書蓋亦同時所作也和黄預感懐陳留市隠魯直亦有此詩叙其事頗詳后山詩蓋元祐間所作舊本小異而又編次不倫豈后山因何子温出示魯直草書遂改定舊句附見于此耶寄泰州曽侍郎肇荅顔生見寄和黃預七夕贈鄭户部九日不岀魏衍見過送魏衍移沛后山作衍母劉縣君墓銘曰元符元年秋從其子衍依沛之石氏送河間令元注云曽子固甥次韻何子温祈晴二首寄潭州張芸叟二首舜民送曹秀才送王元均貶衡州兼寄元龍二首王安國字平甫二子瓬字元均斿字元龍按舊録元符元年九月看詳訴理所言宣徳郎王斿於元祐中進狀稱先臣冤抑罪名未除不幸不得出於兹時詔斿監江寧府粮料院旋罷京東運判差監衡州酒稅第八卷杜侍郎挽詞三首㩀實錄元符元年八月知應天府杜紘卒紘字君章甞再爲刑部侍郎黄預挽詞四首秋懐四首送法寳襌師贈趙奉議元符二年已卯是歳后山在徐州元日雪二首時東坡謫海外三年矣故前篇末句有炎海之語次韻黄生荅黄生雪後送張蘄縣送何子温移亳州三首送詹司業西郊二首寄亳州何郎中二首寄荅秦州曽侍郎送提刑李學士移使東路按實録元符二年二月提點京東西路刑獄李昭玘徙京東東路和鄭户部寳集文室二首隠者郊居覽勝亭何大中挽詞二首送大兄兼寄趙團練寄襄州程大夫送撿法趙奉議送建州鄭户部送張秀才第九卷晁無咎畫山水扇奉陪趙大夫㳺桓山寄曹州晁大夫送馮翊宋令嗟㢤行夜句三首送李孝忠落觧南歸寄單州張朝請謝憲䑓趙史惠米和趙大夫鹿鳴宴集和朱智叔鹿鳴席上酬智叔見贈再酬敬酬智叔三賜之辱兼戲楊理曹二首酬智叔見戯二首送智叔令咸平九月九日夜雨留智叔九月九日與智叔鵰堂宴集夜歸城南夜歸寄趙大夫席上勸客酒戯寇君二首絶句四首騎驢二首夀安縣君挽詞二首寄曹州晁大夫晁端仁字堯民寄題披雲樓樓在曹州絶句寄黄充寄張大夫懐逺荅田生早起和黃充小雪第十卷寄張學士舜民謝趙使君雪中寄魏衍送澶州録曹宋叅軍和范教授同遊桓山元符三年庚辰是歲后山在徐州正月徽宗即位七月除棣州教授其冬徃赴未至間十一月除祕書省正字早春徐僊書三首寄酬咸平朱宣徳智叔咸平讀書堂絶句二首春懐示鄰里歸鴈二首和寇十一晚登白門謝寇十一惠端硯再和寇十一二首與寇趙約丁塘看花寇以疾不赴有詩用其韻和寇十一同逰南城阻雨還登寺山三月二十二日榴花盛開戲作絶句和冦十一雨後登樓荅寇十一惠朱櫻雙櫻絶句謝趙生惠芍藥三絶句寄隣絶句寄寇十一和酬魏衍觸目絶句元符三年七月蒙息復除棣學喜而成詩送姚先生歸宜山三絶上趙使君送鄭祠部第十一卷和寇十一同登寺山謝孫奉職惠胡徳墨登寺山荅寄魏衍拱翠堂贈田從先别郷舊和李使君九日登戲馬䑓與魏衍寇國寳田從先二姪分韻得坐字和黄生出㳺三絶句盤馬山爛石村别叔父崐山丞從寇生求茶庫紙絶句黃樓絶句酬顔生惠茶庫𥿄黃樓荅黄生寒夜贈周秀才二首五子相送至湖陵赴棣州敎官時所作詩有風日寒之句蓋冬時也湖陵與劉生别寄滕縣李奉議住鴈寓目野望寄單州吕侍講布哲寄沛縣姜承議寄兖州張龍圖文潜二首晚立寒食鴈二絶句山口晚泊夜雨宿合清口宿泊口野望宿柴城顔市阻風二首晚坐寒夜絶句禮武臺坐化僧晚興宿齊河别劉郎趙巖雞籠鎮除官按舊録十一月除秘書省正字題王平甫帖第十二卷建中靖國元年辛巳是歳后山在館中十二月二十九日卒見於魏衍所作集記和李文叔退朝和謝公定雨行逢賣花酬王立之二首送謝朝請赴蘇幕和謝公定觀秘閣文與可枯木和饒節詠周昉畫李白真謝王立之送花和參寥明彂覓隣家花二首和張奉議贈舅氏龐大夫和舅氏公退言懐欽聖憲肅皇后挽詞二首神宗后向氏建中靖國元年五月葬永𥙿陵欽慈皇后挽詞二首欽慈皇后陳氏徽考之母建中靖國元年五月陪葬永裕陵大行皇太后挽詞二首代人欽聖太后追尊皇太后挽詞二首代人欽慈太后王察院挽詞二首監察御史王向也元符二年十月與㳺酢焉㳙並命未㡬而卒贈呉氏兄弟三首和呉子副智海齋集舅氏新齋上晁主客晁端仁堯民也建中靖國元年二月爲主客貟外郎和鮮于大受崇先觀餞别曽元忠大受名綽荅王立之又和過田承君贈石先生送晁無咎岀守蒲中建中靖國元年九月吏部郎中晁𥙷之知河中府𥙷之字無咎題明彂髙軒過圖王立之詩話云宗室士􅌔字眀發后山作此詩數月間遂卒送歐陽叔弼知蔡州棐送晁堯民守徐端仁送王㝎國通判河南鞏后山詩註目録終彭城陳先生集記門人彭城魏衍撰先生姓陳諱師道字履常一字無己彭城人㓜好學行其所知慕古作者不為進取計也年十六謁南豐先生曽公鞏曽大器之遂業于門元豐四年神宗皇帝命曽典史事且謂脩史最難申敕切至曽薦為其屬朝廷以白衣難之方復請而以憂去遂寢太學又薦其文行乞為學録不就樞密章公惇髙其義冀来見特薦于朝而終不一徃元祐初翰林學士蘇公軾與侍從列薦乃官之俾教授其郷未㡬除太學博士言事者謂先生嘗謁告詣南都見蘇公為私遂罷移頴州教授紹聖初又以餘黨罷換江州彭澤令未行丁母憂寓僧舎人不堪其貧暨外除猶不言仕者凡四年左右圖書日以討論為務盖其志專欲以文學名後世也元符三年除棣州教授随除祕書省正字将用矣殁於建中靖國元年十二月之二十九日年四十九友人鄒公浩買棺以殮朝廷特賜絹二百匹甞與徃來者共賻之然後得歸初先生學於曽公譽望甚偉及見豫章黃公庭堅詩愛不捨手卒從其學黃亦不譲士或謂先生過之惟自謂不及也先生既歿其子豐登以全藁授衍曰先實知子子為編次而狀其行衍既狀其行矣親録蔵於家者今十三年顧未敢當也衍甞謂唐韓愈文冠當代其傳門人李漢所編衍從先生學者七年所得為多今又受其所遺甲乙丙藁皆先生親筆合而校之得古律詩四百六十五篇文一百四十篇詩曰五七雜以古律文曰千百不分類衍今離詩為六卷類文為十四卷次皆從舊合二十卷目録一卷又手書之竊惟先生之文簡重典雅法度謹嚴詩語精妙盖未甞無謂而作其志意行事班班見於其中小不逮意則弃去故家之所留者止此昔漢楊雄作太玄法言箴賦如劉歆號知文始敬之後而短毀謂其必傳者桓譚一人而巳先生之文蚤見稱於曽蘇二公世人好之者猶以二公故也今賢士大夫競收蔵之則其傳也奚待於衍耶後豈不有得手寫故夲以證其誤者則不肖之名因附兹以不朽為幸焉其闕方求而補諸又有觧洪範相表闡微彰善詩話䕺談各自為集云政和五年十月六日謹記建中靖國辛巳之冬雲别涪翁於荆州翁曰陳無已天下士也其讀書如禹之治水知天下之脉絡有開有塞至于九川滌源四海㑹同者也其論事救首救尾如常山之蛇其作文深知古人之關鍵其作詩深得老杜之句法今之詩人不能當也子有意學問不可不徃掃斯人之門雲再拜受教明年春至亰賢士大夫岀涕相吊曰無已亡矣雲驚嘆失聲痛恨無窮洎来彭城求先生詩文且四年僅見一二最後得昌世所集凡六百五篇琮璜珩瑀貫列大備雲曰幸矣至寳不殁乃今有獲因記涪翁之語録以示昌丗自昔名世之士著書立言必頼其徒傳之文中子講道河汾以續六經房魏之倫皆北面受業及登廊廟不能顯傳其書卒以泯絶論者至今惜之昌世先生之髙弟操行文章雅善先生之風雖隠約布韋而所立絶人不苟徇合故能蒐拾遺文成一家之言又序先生岀處之大節其辭蔚然讀之使人凛凛増慕然先生之道必傳於後世者昌世之力也千載之下可以知其賢矣政和丙申正月甲午元城王雲題
