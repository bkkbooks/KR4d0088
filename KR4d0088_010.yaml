front:
  text: 后山詩註卷第十
  hash: sha256:655647a6ae14584d621ae5fdda5461705ca2fdcc4eccfb8b8b80544be0aac64f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_010-1a}
body:
  text: 寄張學士舜民湖海三年别譙徐一日間譙郡毫州也經時猶未見凡事信多難退之詩曰關山逺别固其理寸歩難見始知命理極那須說世說何晏聞王弼名因條勝理語弼曰此理僕以爲理極可得復難否情生不自還終上句之意謂相與忘言如晉阮修所謂就令相見亦何所說然念舊之情不能自已也晉書郭文曰情由憶生不憶故無情漢書原渉曰知其非禮然不能自還此借用從来闕聲問相見若為顔老杜詩從來不寄一行書聲問見上注後漢馬援傳曰將難爲顔乎謝趙使君送烏薪欲落未落雪迫人将盡不盡冬壓春老杜詩松浮欲盡不盡雲江動將崩未崩石風枝氷瓦有去鳥逺坊窮巷無来人忽聞叩門聲遽速驚雞透籬犬升屋張籍樂府曰家家雞犬驚上屋使君傳教賜薪炭世說劉惔遣傅教覔張孝㢘舡妓圍那觧思寒谷開元天寳遺事曰申王毎冬月苦寒令宫女宻圍而坐謂之妓圍寒谷見上注老身曲直不足言冷䆫凍壁作春温孟郊謝人送炭詩煖得曲身成直身史記田敬仲世家曰大弦濁以春温者君也定知和氣家家到不獨先生雪塞門雪塞門用袁安事見上注雪中寄魏衍薄薄初經眼輝輝已映空老杜螢火詩偶經花蘂㺯輝輝又詩鳴雨旣過漸細微映空摇颺如散絲融泥還結凍落木復沾叢老杜詩泥融飛燕子意在千山表情生一念中用王徽之雪夜忽憶戴逵意以比魏衍后山送衍移沛詩有曰勿云百里逺已作千山愁東坡詩古人應在千山外不寄梅花逺信來情生見上注樂天與元微之書曰平生故人去我萬里瞥然塵念此際暫生遥知吟榻上不道絮因風晉書謝道韞傳雪驟下謝安問何所似朗曰散鹽空中差可擬道韞曰未若柳絮因風起東坡雪詩柳絮才髙不用鹽此反而用之送澶州録曹宋叅軍宦遊男子事訪别故人情能吏於今少春風及此行英雄餘戰伐澶州蓋萊公却散處犴獄寄㢘平韓詩外傳曰郷亭之獄曰犴朝廷之獄曰獄漢書刑法志緹縈上書曰臣父爲吏齊中稱其㢘平未肯輕衰疾人來闕寄聲和范教授同逰桓山送客㝷山已自仙行談坐笑復忘年平郊走馬斜陽裏漢書張敞傳過走馬章䑓街唐人詩窄衫短帽斜陽裏破屋傳杯積水邊退之詩破屋數間而巳矣老杜詩傳杯不放杯洗壁留名題歲月登髙着句記山川風流幕下諸公子縮手吟邊更覺賢一夲作題名留歳月縮手見上注早春度臘不成雪迎年遽得春氷開還舊緑魚喜躍脩鱗禮記月令孟春東風解凍魚上氷柳及年年彂愁随日日新老懐吾自異不是故違人南史沈懐文素不飲酒又不好戯宋孝武謂故欲異已謝荘甞戒曰卿每與人異亦何可乆懐文曰非欲異物性之所不能耳此詩末句頗采其意徐僊書三首徐清字靜之蓬萊女官也下西里王氏詩作謝體書効黄魯直妍妙可喜敬作三絶句蓬壷仙子補天手筆妙詩清萬世功列子曰歸墟有五山一曰岱輿二曰貟嶠三曰方壷四曰瀛州五曰蓬萊又曰天地一物也物自不足故昔者女媧氏練五色石以𥙷其闕李賀詩筆𥙷造化天無功肯學黄家元祐脚信知人厄非天窮柳子厚集載劉禹錫詩曰日日臨池弄小雛還思寫論付官奴柳家新樣元和脚且盡薑芽歛手徒東坡海市詩曰信我人厄非天窮魯直見廢於世而仙真喜學其書此特厄於人耳又詩成已作客兒語筆下還為魯直書客兒謝靈運小名見南史謝弘微傳豈是神仙未賢聖不随時事向人踈退之詩乃知仙人未賢聖此反而用之不隨時事謂於元祐黨禁中肯學黃書也唐髙蟾詩云君恩秋後葉日日向人踈又金華牧羊小家子金華見上注太白詩金華牧羊兒乃是紫煙客小家見上注西真攘桃何代兒漢武故事西王母指東方朔曰仙挑三熟此兒已三偷之矣東坡樂府曰曼倩風流縁底事當時愛被西真喚作兒詩着海山書落爪向來何免世人疑詩可以置之海山書落筆而後快必非癡鬼也后山作頴師字序載徐清事曰吾里中少年毎歳首簮飾箕帚召紫姑以戯一歳有神下焉曰吾蓬萊仙伯徐君也喜句畫有求必荅下筆不休云云世人或疑徐君乃紫姑之類未必以仙官待之故后山引牧羊攘挑爲喻以言神仙有時而混迹不必疑也退之祭湘君文曰且虞海山之波霧瘴毒爲災老杜詩破甘霜落爪此借用謂筆畫從手爪而落亦暗用神仙傳中麻姑鳥瓜事寄酬咸平朱宣徳智叔冥冥超世網蔚蔚秀儒林楊子曰鴻飛冥冥弋人何慕焉選詩曰世網嬰我身他曰熟看面今詩初得心左傳曰他日吾見子面而已今吾見子之心矣白頭無故意異代有同音趣異則至老不相知意合則異世可同調漢書鄒陽傳語曰有白頭如新傾蓋如故何則知與不知也史記范睢傳曰戀戀有故人之意選詩曰誰謂古今殊異代可同調詩曰笙磬同音短綆徒施巧終然莫汲深莊子曰綆短不可以汲深此引用以終上意言平日知朱君之未盡也咸平讀書堂爲朱智叔作昔人三百篇善世已有餘魯論誦詩三百授之以政不逹作大梁屠史記范蠡傳蠡去止於陶自謂陶朱公又魏公子無忌傳侯嬴爲大梁夷門監者謂公子曰朱亥賢者世莫能知故隱屠間耳朱智叔時治咸平故引以喻之咸平隷京師即古大梁計然特未用意得䡖全吴史記貨殖傳范蠡旣雪㑹稽之恥乃喟然而歎曰計然之䇿七越用其五而得意注曰計然者范蠡之師也名研為邦得畿縣政密自計踈寧書下下考唐書陽城傳爲道州刺史觀察使數誚責州當上考功第城自署曰撫字心勞催科政拙考下下不奉急急符元次山春陵行云督郵傳急符來徃跡相追退之曲江祭龍文曰急急如律令用意簿領外築室課典謨選詩沉迷簿領書平生五千卷還舎不問途言記問精博如行熟路也近事更漢唐稍以詩自娱更謂更閱復作無事飲醉卧擁青奴退之詩幕中無事惟可飲蓋用史記犀首事青奴見上注桃李春事繁軒䆫晝景舒鳴屋鳩渴雨窺簾燕哺雛休吏散篇帙漢書薛宣傳曰日至休吏謝靈運詩散帙問所知風篁獻笙竽文選月賦云風篁成韻退之聮句云折篁嘯遺笙太白詩三千雙蛾獻歌笑文選左太冲詩北里吹笙竽欣然一啓齒斯民免為魚能一笑對古人者必不䧟溺其民矣漢書司馬相如傳亡是公欣然而笑荘子曰吾君未甞啓齒左傳曰微禹吾其魚乎絶句二首里中餽杏得甞新馬上逢花始見春漢書陳平傳曰里中社平爲宰食貨志曰社閭甞新馬上逢花蓋用前軰賣花檐上看桃李之意勤苦著書如此吏世間枉是最閑人南史梁宗室傳南平王偉之子恭好賔友酣宴終辰時元帝居蕃勤心著述恭每謂曰時人不好懽興乃仰眠牀上看屋梁而著書豈如臨清風對朗月登山泛水肆意酣歌也又密密丹房疊疊花一枝臨路為人斜丁寧語鳥傳春意白下門東第㡬家退之詩浪慿青鳥通叮嚀樂天詩柳巷當頭第一家春懐示鄰里㫁墻着雨蝸成字老屋無僧燕作家老杜詩林花着雨臙脂落酉陽雜爼睿宗爲冀王寢室壁間蝸迹成天字襄陽記楊顒曰請爲明公以作家譬之剩欲岀門追語笑却嫌歸鬢着塵沙借用元規塵汚人之意風翻蛛網開三面吕氏春秋曰湯見置囬靣網者湯拔其三面置其一面祝曰昔蛛蝥作網令人學之欲髙者髙欲下者下吾取其犯命者雷動蜂窠趂兩衙子虚賦雷動焱至禆雅云蜂有两衙應潮錢昭度詩云黄蜂衙退海潮上白蟻戰酣山雨來屢失南隣春事約只今容有未開花后山前有戯宼君詩曰南隣歌舞隔墻聽此云未開花蓋亦以戯宼容有猶言豈容復有也歸鴈二首弧矢千夫志瀟湘萬里秋弧矢謂射鴈也成公綏鴈賦曰過雲夢而妷遊兮投江湘而中憇寧爲寳箏柱李義山詩曰十三弦柱鴈行斜肯作置書郵用蘇武事晉殷羙爲豫章太守都下人士因其致書百餘函皆投之水中曰殷洪喬不作置書郵老杜詩肯作置書郵逺道勤相喚莊子曰吾固不辭逺道而來願見老杜鴈詩雲裏相呼疾覉懐誤作愁劉禹錫竹枝歌曰巫峽蒼蒼煙雨時清猿啼在最髙枝箇裏愁人膓自斷由來不是此聲悲聊寛稻梁意寧復網羅憂劉孝標絶交論曰分鴈鶩之稲梁又作計胷懐早淮南子曰鴈從風而飛以愛氣力㗸蘆而飛以避矰繳玉䑓新詠焦仲卿詩曰作計河不量文選于寳晉論曰邪僻銷於胷懐又南史蕭惠開常曰人生不能行胸懐雖壽百歲猶爲夭也為生去住頻管子桓公曰鴻鴈春北而秋南固違隂嶺雪不盡洞庭春隂嶺謂匈奴隂山老杜詩苦渉隂嶺沍巧作斜行字樂天詩鴈點青天字一行魯直詩風外竹斜行催歸去國人隋薛道衡人日思歸詩曰入春纔七日離家已二年人歸落鴈後思發在花前此言去國人謂南遷諸公將北還也是歳二月癸亥詔永州安置范純仁等皆内徙知時如有信儀禮曰下大夫相見以鴈注云鴈取知時决起亦相親此用鴈奴事荘子曰蜩與鸒鳩笑之曰我決起而飛老杜詩相親相近水中鷗和宼十一晚登白門重門傑觀屹相望退之詩隆樓傑閣磊嵬髙表裏山河自一方左傳曰表裏山河必無害也小市張燈歸意動按宋書張暢傳彭城有小市門魯直詩晩市張燈明逺近䡖衫當户晚風長選詩曰彼服羅裳衣當户理清曲孤臣白首逢新政逰子青春見故郷東坡詩喜聞新國政是歲徽考登極遊子見上注富貴夲非吾軰事江湖安得便相忘言富貴固不可期而江湖之志亦未遂也莊子曰魚相忘於江湖謝宼十一惠端硯百工營材先利器書㫁載三輔决錄曰韋誕字仲將諸書並善鄴都宫觀始就詔令仲將題署御筆墨皆不任用因奏工欲善其事必先利其器若用張芝筆左伯紙及巨墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言市道居貨如作贅史記廉頗傳曰天下以市道交作贅當是作質按史記吕不韋傳秦子楚爲質子於趙不韋見而憐之曰此竒貨可居或云漢書食貨志始皇發閭左之戍應劭注曰秦時謫戍先發吏有過及贅壻賈人故后山引用言秦云賈人與贅壻一等也書生之於筆硯亦猶工之利器賈之居貨云書生活計亦酸寒斷塼半瓦寧求備退之詩活計似鋤剗東坡詩習氣一洗儒生酸書曰與人不求備端溪四山下龍淵欝積中州清淑氣退之送廖道士序曰彬之爲州當中州清淑之氣蜿蟺扶與磅礴而欝積金聲玉骨石為容東坡硯銘曰玉徳金聲而寓於斯河江屈流雲作使言此石中含江河之潤蒸而爲雲以導荅其秀潤之氣老杜詩屈注蒼江流陸龜蒙蟬詩曰只慿風作使全仰柳爲都滑如女膚色馬肝西京雜記曰文君肌膚柔滑如脂硯譜蘇易簡云端溪硯水中石色青山半石色紫山絶頂石尤潤如猪肝色者佳漢書郊祀志曰文成食馬肝死耳夜半神光際天地漢書宣帝紀曰神光並見或興于谷郊祀志曰有羙光上屬天諸天散花百神喜知有聖人當岀世聖人謂徽考徽考初封端王元符三年十月遂升端州爲興慶軍周昭王二十四年四月八日夜天地震動恒星不見太史奏西天聖人出世沒人投深索千丈莊子注曰没人謂能鶩没於水底索讀如求索之索探頷適遭龍伯睡荘子曰千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也列子有龍伯之國轆轤挽岀萬人負千嵗之蔵一朝致琢為時様供翰墨十襲包蔵百金貴一本負作貨闞子曰宋之愚人得燕石于梧䑓之側蔵之以爲大寳革匱十重中十襲退之藤杖歌曰幾重包裹自題署北行萬里更聚目宼卿好事不計費宼甞爲太常少卿見下注南隣居士卿之孫豐悴相從不為異退之王承福傳云枊豐悴有時一去一來而不可常者耶似憐陶瓦磨竈煤輟贈不减前人志東坡種松詩曰萬竈飛青煤人言寒士莫作事鬼奪客偷天破碎南史劉祥傳禇彦回曰寒士不遜老杜桃竹杖引云路幽必爲鬼神奪退之有瘞破硯文龜玉韞匵與無同龜玉及韞匵並見魯論東坡詩背之不見與無同錦衾還客弃佳惠老杜詩錦衾卷還客始覺心和平衆所欲得當有縁天獨於予可無意敢書細字注魚虫退之詩爾雅注蟲魚定非磊落人要傳華嚴八千偈隋經籍志云沙門支法領從于䦨國得華嚴三萬六千偈此云八千未詳再和宼十一二首南山樓觀挿穹蒼林杪青燈岀上方文選顔延年詩樓觀眺豐頴爾雅曰穹蒼蒼天也謝靈運詩俛視喬木杪老杜詩上方樓閣晩字本出維摩經形勝自如諸老逝漢書髙祖紀田肯曰秦形勝之國也后山宼叅軍集序曰大父鹽鐡府君外大父頴公與文忠蔡公好太常少卿宼君蔡之出也遊二大父之間而軰先君功名随盡二流長劉夢得詩曰人世㡬回悲徃事山形依舊枕寒流二流謂汴泗馬㳺從昔哀吾老馬㳺事並見上注王粲當年賦異郷王粲在荆州作登樓賦曰雖信羙而非吾土兮曾何足以少留文選東門行曰一息不相知何况異郷别少日幻心今淨盡圎覺經云衆生幻心還依幻滅大事詩劉禹錫再遊玄都觀詩曰桃花淨盡菜花開多生綺語未全忘東坡詩多生綺語磨不盡又與世相違孰自量淵明歸去來辭世與我而相違孰自量言自知甚審資身無䇿謾多方漢書韓信傳寄食於漂毋無資身之䇿荘子曰恵施多方其書五車逢塲作戯真呈拙傳燈録馬祖道一傳鄧隱峯辭師云石頭去師云石頭路滑對云竿木隨身逢塲作戯便去石頭云云隱峯無語歸來師云向汝道石頭路滑誤筆成蠅豈所長曹丕興畫屏風誤落筆點素因就以爲蠅孫權以爲生蠅舉手彈之名字不歸青史筆老杜詩古人日已逺青史字不泯曹子建表云名挂史筆形容終老白雲郷趙飛燕外傳曰成帝呼合徳爲温柔郷曰吾老是郷矣不能効武帝求白雲郷也何湏五斗䡖千里頼有斯人未肯忘晉書陶潜傳曰吾不能爲五斗米折腰拳拳事郷里小兒王介甫詩頼有斯人慰寂寥與宼趙約丁塘看花宼以疾不赴有詩用其韻早年學苦㫁過從晚嵗逢春意未窮欲共元劉争着語元稹劉禹錫也着語見上注不堪姚魏已随風歐公牡丹釋名曰姚黄者千葉黄花出於民姚氏家又曰千葉肉紅花出於魏相仁浦家錢思公甞曰人謂牡丹花王今姚黄真爲王而魏紅乃后也坐無上客席虚左曲禮曰上客起史記魏無忌傳從車騎虚左自迎侯三月二十二日榴花盛開戯作絶句五月榴花忽見春白頭喜遇一番新退之詩五月榴花照眼明可能略不觧春意后山甞有詠榴花長短句云葉葉枝枝緑暗重重密密紅滋芳心應恨得春遲不㑹春工着意只有㝷枝摘葉人謂㝷雙葉也傳燈録僧問風冗云㝷枝摘葉即不問如何是直截根源和宼十一雨後登樓秀嶺歸雲裏華譙夕照中莊子盛鶴列於麗譙之間漢書項籍傳譙門注云謂門上爲髙樓以望敵也登臨初不數吟笑近多同麥秀知春力人和驗歲豐預爲逃暑約一快楚䑓風魏文帝典論袁紹子弟三伏之際有避暑飲宋玉風賦楚玉逰於蘭䑓之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快㢤此風答宼十一惠朱櫻故人憐一老輟食寄三山韓偓櫻桃詩曰合充鳯食留三島誰許鶯偷過五湖厚味非貧具左傳曰厚味實腊毒先嘗貴客間老杜朱櫻詩曰金盤玉筯無消息此日甞新任轉蓬后山自以安於田里有媿子羙之飄零也老杜詩又曰客間頭最白甘酸俱可口衰白不宜顔甘酸見上注莊子曰柤梨橘柚皆可於口衰白見上注妙句那能繼情深未覺慳法帖紀瞻書云粉二斗所謂物微意全者也雙櫻絶句並蔕随宜奸老杜詩並蔕芙蓉夲自雙後漢和帝詔曰隨宜䟽導連心稱意紅太平廣記趙旭幽居廣陵有一女呼青夫人扣柱歌曰仙郎獨邀青童㑹結情羅帳連心花王介甫詩荷花稱意紅只堪驚老眼持此與誰同古樂府曰空留可憐與誰同謝趙生惠芍藥三絶句郁郁芬芬十里焄紅紅白白數枝春魯直詩白白紅紅相間開要将結習惱鶖子送與毗耶彼上人維摩經云維摩詰室有一天女以天花散諸菩薩大弟子上至大弟子便著不墜天謂舎利佛曰結習未盡花着身耳鶖子即舎利佛以其母眼明靜如鶖鷺眼故也維摩經又云毗耶離城中有長者名維摩詰又云佛告文殊師利汝行詣維摩詰問疾文殊言彼上人者難爲酬對又從微至老走風塵喜見郷園第四春書堯典䟽曰舜居虞地以虞爲氏故從微至著常稱虞氏郷園見上注獨舞東風醉西子政縁無語却宜人芍藥有號醉西施者退之牡丹詩云對客偏含不語情羅隱牡丹詩若敎解語應傾國任是無情也動人東坡詩不如此花不解語世間言語元非真老杜詩宜人獨桂林又九十風光次第分天憐獨得殿殘春呉融白牡丹詩膩若裁雲薄綴霜春殘獨自殿羣芳東坡詩唯餘木芍藥獨自殿殘春一枝䞉欲簮雙髻未有人間第一人老杜詩昭陽殿裏第一人寄隣絶句借子翩翩果下駒春園随處小踟蹰後漢􅐮國岀果下馬注曰髙三尺乗之可於果樹下行元稹詩長安三月花垂草果下翩翩紫騮好可能灸背春風裏卧把青銅摘頷鬚灸背并鏡鑷事並見上注退之詩若摘頷底髭寄宼十一隣里相望信不通時因得句寄怱忽畫樓着燕春風裏畫樓謂燕子樓楊柳蔵鵶白下東古樂府歩出白門前楊柳可蔵烏按徐州有白門度日守䆫令節換老杜詩痛飲狂歌空度日又詩别離驚節換退之詩安居守䆫螢經旬無使覺門空老杜詩經旬出飮獨空床又詩欲問平安無使來又詩客子念故宅三年門巷空錦囊佳麗隣徐庾䞉欲同君賦惱公錦囊用李賀事見上注賀集有惱公篇首句宋玉愁空㫁嬌嬈粉自紅蓋艶詩也按北史庾信傳父肩吾與徐陵文辭竒艶世號徐庾體和酬魏衍闕然聲問略相同百里之間一水通春興多多髙𥿄價漢書韓信傳曰多多益辦𥿄價見上注離懐一一逐歸鴻老杜鴈詩雙雙瞻客上一一皆人飛不憂寒餓成吾老稍喜朝庭記此公此公當謂東坡夢每見君心亦了不因新句覺情東魏志陳矯傳注文帝曰朕心故已了觸目絶句果下翩翩跨紫騮見上注踏花濺水見風流唐人樂府去挿花走馬月明中踏殘紅摭言載裴處餘詩云從教水濺羅式濕知道巫山行雨歸可無雙璧千金聚付與狂兒取次㳺琴操曰王昭君旣至單于大恱遣使報送白璧一雙鮑昭白紵曲曰千金顧笑買芳年元符三年七月蒙㤙復除棣學喜而成詩老作諸侯客貧為一飽謀老杜詩早作諸侯客蓋用范睢事淵明詩傾身營一飽少許便有餘折腰真耐辱折腰見上注唐司空圖稱耐辱居士捧檄敢輕投後漢毛義家貧以孝行稱府檄以義爲郡守義以手捧檄而入喜動顔色張奉薄之後義母亡遂不仕奉歎曰徃日之喜乃爲親也退之詩君今從署天涯吏投檄北去何難哉早作千年調見上注早謂壯歳中懐萬斛愁見上注莫年随手盡心事許溟鷗樂天詩百年隨手盡謝玄暉詩心事俱已矣江上徒離憂送姚先生歸宜山三絶鄭公龍變不容親猶有先生不絶塵后山自注云鄭乃姚之師姚亦不復見莊子載孔子曰吾見老子其猶龍耶司馬遷史記論彭越魏豹曰雲蒸龍變荘子又有奔軼絶塵之語定力不為生死動始知天地有閑人大智度論曰以業力故八生死以定力故出生死又老逢熈運乞前官乞字作去聲讀前官謂復除學官也病遇先生得内丹修真袐訣老君曰含和鍊藏吐故納新上入泥丸下注丹田此内丹也一飽有期吾事了千年不死後人看終上句之意分屬两句東坡詩一飽未敢期又宇㝎心清面彂丹下床投杖覺䡖安宇㝎旯上注圓覺經曰遇善境界得心輕安此身已許壷丘子壷丘子以比姚列子見神巫而心醉以告壷丘子然後列子自爲未始學而歸三年不出他日争㝷靖長官靖長官以自况東坡送范景仁詩末句云試與劉夫子重㝷靖長官自注曰劉几云曽見人嵩山幽絶處眼光如猫意其爲靖長官也按張師正括異志静長官真定人登明經第一且棄妻子遊名山數年不歸洛下靳襲者於其家常帷一榻枕褥甚㓗人詢其故曰以待靜長官靜今隱嵩少間歳或一至或再至靳氏以神仙事之近世曾慥作集仙傳曰應靜不知何許人唐僖宗時爲登封令旣而棄官學道遂升仙去隱其姓而以名顯故世謂之靜長官元祐中劉几甞遇於嵩髙山中二說未知孰是然師正以靖爲靜豈又自有一靜長官耶上趙使君老氣崢嶸盖九州老杜詩老氣横九州治聲騰涌逐雙流蜀都賦帶二江之雙流此借用以言汴泗向来置醴蒙殊遇漢書楚元王傳穆生不嗜酒元王甞爲設醴后山亦戒酒故云蜀志諸葛亮表曰蓋追先帝之殊遇此借用此日彈冠媿少留漢書王吉傳吉與貢禹爲友世稱王陽在位貢公彈冠時后山將赴棣學老杜所謂尚憐終南山回首清渭濵亦遲遲未忍别去也千里山連環故國東坡放鶴亭記曰彭城之山岡嶺四合隱然如大環獨缺其西十二劉禹錫詩曰山圍故國周遭在中秋月好傍黄樓老杜詩中天月色好誰看不應為米䡖郷里㝎復還從馬少㳺並見上注送鄭祠部持節還家未白頭有親八十更何求老杜詩微軀此外更何求又随急詔朝天去李宗閔作王播墓碑曰今上踐祚急詔徴公歐公詩云驛騎頻來急詔隨不為寒郷盡歲留鮑昭東武吟曰僕本寒郷士四着儒冠甘送老后山再除徐學一除頴學今又除棣學東坡詩送老韲鹽甘似蜜數經竒運得銷憂漢書李廣傳大將軍以爲李廣數竒母令獨當單于得銷憂猶言安得銷憂老杜詩感動幾銷憂擬登碣石臨朝日浩蕩滄溟沒白鷗亦后山自述如老杜今欲東入海之意古樂府碣石篇云東臨碣石以觀潮海又云日月之行若出其中后山詩註卷第十
