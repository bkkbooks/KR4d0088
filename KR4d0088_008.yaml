  text: 后山詩注卷第八
  hash: sha256:008e035ca360d55987126834735eb41ed1793a0f2338671c43c7236eebf26d75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_008-1a}
body:
  text: 杜侍郎挽詞三首紘兄純美政真吾母荀子曰儒者在夲朝則美政離騷經曰既莫足與為美政兮後漢杜詩為南陽太守人方於召信臣曰前有召父後有杜母名家更杜陵老杜詩名家無出杜陵人于張從昔少漢于定國張釋之皆持法平據紘傳曰議獄必傳經義又曰紘言配隸與編管太密因悉裁其法省百二十有餘科魯衛至今稱魯論曰魯衛之政兄弟也又曰民到于今稱之此句及後棠棣傳兩馮君並指杜純純蓋紘之兄也絲竹中年好晉書王羲之傳謝安謂羲之曰中年以來傷於哀樂與親友别輒作數日惡羲之曰頃正賴絲竹陶寫恆恐兒輩覺損其歡樂之趣詞華夙世能老杜詩詞華哲匠能王維詩夙世謬辭客周南棠棣傳平世幾人登周南今洛京也唐書循吏傳賈敦頥為洛州司馬人為立碑弟敦實為長史人復立碑其側號棠棣碑老杜詩青竹幾人登又驥騄方懷逺松筠忽有秋魏文帝典論曰咸以自騁驥騄於千里書盤庚云乃亦有秋此借用以言歲晚雍容名士數後漢黨錮傳序曰指天下名士為之稱號終始法家流前漢藝文志曰法家者流凛凛驚千載見溫公挽詞注堂堂閟一丘魯直韓憲肅挽詩曰堂堂萬丈表直作閉佳城能令羊季子不肯過西州晉書謝安傳羊曇為安所知安薨後不樂彌年行不由西州路后山嘗有寄鄧州杜侍郎詩頗述知已之意又身去風流在人難玉石分玉石言不為世所知也屈原曰同糅玉石兮一槩而相量鮑照見賣玉器者詩曰涇渭不可雜珉玉當早分平生才一見治行已多聞老杜詩大賢為政即多聞更覺知音少吕氏春秋曰伯牙鼓琴意在山鍾子期曰巍巍乎意在水子期曰湯湯乎子期死伯牙遂絶絃以世無知音還修地下文王隱晉書載蘇韶已死見其弟節節問地下事韶言顔回卜啇今為修文郎他年九原淚仍是兩馮君漢書馮奉世傳野王與弟立相代為太守吏民歌之曰大馮君小馮君兄弟繼踵相因循黃預挽詞四首敏慧仍江夏風流更妙年江夏黃童見上注貧焚酒家劵酒家劵用漢髙祖紀折劵棄責事焚劵用史記馮歡事病得里胥錢漢書食貨志曰里胥平旦坐於右孰退之詩里胥上其事精爽來鷹隼左傳曰心之精爽是謂魂魄老杜詩魏侯骨聳精神繁華嶽峯尖見秋隼神一作爽清明㵼澗􅬖退之書曰奴隸亦知其清明書禹貢曰伊洛瀍澗無兒傳素業退之詩中郎有女能傳業伯道無兒可保家王介甫作王逢原挽詞亦云中郎舊業無兒付晉書陸納傳怒其兄子曰汝不能光益父叔乃復穢我素業耶有淚徹黃泉退之詩滴地淚到泉左傳曰不及黃泉無相見也又骨秀神仙數詩清雅頌才老杜詩自是君身有仙骨又詩神仙才有數識髙懸日月老杜詩名與日月懸韻勝絶塵埃陶淵明詩少無適俗韻文選頭陀寺碑曰道勝之韻虛往實歸去就堪同事用孔顔用行舍藏之意摧殘盡一哀西京賦曰朴叢為之摧殘禮記檀弓孔子曰豫入而哭之遇於一哀而出涕曽子問曰皆哭不踊盡一哀了知天上去不似世間來華嚴經曰了知如是悉是虛妄天上去用李賀事見下注又志大期千里魏武帝歌曰老驥伏櫪志在千里身宜置一丘晉書顧愷之為謝鯤象在石巖裏云此子宜置丘壑中英詞真蓋世英詞并蓋世字並見上注爽氣已橫秋晉書王徽之曰西山朝來致有爽氣耳此借用其字文選北山移文云爽氣橫秋地要黃金骨太白詩云三載夜郎還於茲鍊金骨雪竇禪師頌肅宗問忠國師話云鐡椎擊碎黃金骨天地之間更何物天成白玉樓李商隱作李賀小傳云賀將死時有緋衣人持一板書召賀曰帝成白玉樓立召為記天上差樂不苦也少頃遂絶平生斫泥手斤斧恐長休后山自謂也莊子曰郢人堊漫其鼻端若蠅翼匠石運斤成風聽而斫之盡而鼻不傷元君招匠石曰嘗試為寡人為之匠石曰自夫子之死也吾無以為質矣又玉筯凝潮後唐李陽凝李潮皆能篆張懷瓘書斷曰如科斗玉筯偃波之類共五十二般舒元輿玉筯篆志曰秦丞相斯變頡籀文為玉筯篆絲桐藝業餘史記曰敬仲世家田又何為乎絲桐之問文選謝宣逺詩中堂起絲桐逺途憎早悟用老杜文章憎命逹之意建康實録陸雲謂周處曰君前途尚逺且患志之不立何患名之不彰南史梁室始興王憺之子曄憺嘗目送之曰吾所深憂其過俊發恐必無年曠度得中踈恢廓者人或以為踈文選夏侯湛東方朔畫贊曰逺心曠度子逝今何遽吾生孰與居豈無文士傳未有茂陵書文士傳乃張騭所作三國志注間見之漢書司馬相如病免居茂陵既死有遺札書言封禪事秋懷四首積雨不受暑既晴還得秋老杜詩修竹不受暑未免困河魚左傳曰河魚腹疾將奈何寧如喘吳牛世説滿奮畏風答晉武帝曰臣如吳牛見月而喘牛畏熱見月疑是日所以喘也此句謂受疾不如受熱風梧有先聲漢書韓信傳兵法固有先聲而後實巢燕無後留謝瞻九日詩巢幕無留燕人生行樂爾漢書楊惲傳曰人生行樂爾須富貴何時一經今白頭見上注又小雨斷復續回斜落晚風寒心生蟋蟀秋色傍梧桐老杜詩小雨夜復密回風吹早秋草與遙山碧花欺晚照紅口須談世事目已失飛鴻晉書王猛見桓溫靣談當世之事目送飛鴻見上注又山斷開平野老杜詩山豁何時斷河回殺急流漢書溝洫志曰分殺水怒選詩淮泗馳急流登臨須向夕風雨更宜秋急急後飛鴈翩翩不下鷗老杜詩急急能鳴鴈輕輕不下鷗列子曰漚鳥舞而不下晚舟猶小待莫雀已深投老杜詩暮雀意何如退之社樹詩云依依絶暮禽又梨埓當千户爾雅埓丘注曰謂丘邊有界埓史記貨殖傳安邑千樹棗燕秦千樹栗此其人皆與千户侯等魚防擁萬頭文選劉公幹詩流波為魚防寧須一網盡不為百人留仁宗時御史劉元瑜劾進奏院事一時名士皆貶斥語執政曰已為相公一網打盡密雨點急水老杜詩點水蜻蜓欵欵飛驚風擘繫舟東坡詩盡日舟橫擘岸風百年供轉徙因病得夷猶言常困於羇旅今因病而得間也晉書陶潛云我性不狎世因疾守間楚辭君不行兮夷猶注猶豫也送法寶禪師平生夫鐡腳道價喧宇宙長蘆應夫禪師初參圎通秀秀遣作化主至一邸中有娼女為母所迫入其房不肯去師跏跌達旦以錢遣之仍索火焚其布單而去叢林因為之夫鐡腳張無盡嘗為作鐡笛引云望禮東南雲吾今獨何後老杜詩每望東南雲令人幾悲吒世説注曰惠逺名𬒳流沙彼國衆僧皆稱漢地有大乘沙門每至燃香禮拜輒東向致敬晚始識其子瑶林一枝秀晉書王曰王衍神姿髙徹如瑶林瓊樹傳燈録宗沠有别出一枝初聞飲光笑傳燈録摩訶迦葉此云飲光勝尊佛書云世尊拈花迦葉微笑遂付以正法眼藏復作空生瘦空生即須菩提也今年退後襌袖手不肯又真成菩薩魔后山嘗作請月老再往薦福疏有曰倦於利生亦菩薩之魔事按般若經曰或説法要辨過量生或所欲説未盡便止當知是為菩薩魔事未免化城咎法華經言有一導師導衆至珍寶處道中化作一城云云意謂暫為止息之地非究竟處白月玄清光大鍾得辭扣月不容不照鍾不容不扣師亦如是老杜謁文公詩大珠懸玷翳白月當虗空文選江文通詩秋月懸清光禮記善待問者如撞鍾扣之以小者則小鳴扣之以大者則大鳴知止一何勇隨緣豈無復老子曰知止不殆漢書東方朔傳曰一何壯也佛書曰隨緣赴感靡不周豐臺兩禪子三請期一覯三請見上注翩然挈瓶盂百里往相就貫休詩一瓶一鉢垂垂老萬水千山得得來古寺風雨餘觸目初邂逅夙昔有淨緣歡然宛如舊教我早自異業成誰得救世故已備嘗躊躇復何候鑽火勿停手時來自渠透魯直詩木鑽石槃未渠透毛詩夜未央注曰猶言夜未渠央也渠音其據反殷勤禮白足白足見上注傳燈録迦葉聞世伽偈頭面禮足吾為太山溜言修證之功在乎積久也漢書枚乘傳泰山之霤穿石贈趙奉議為惠不必廣但問與者誰受施何用多名義以為資樂天詩相知不在多但問同不同此句頗用其律文選崔子王座右銘曰受施慎勿忘王粲詩從軍有苦樂但問所從誰平生師友間四海參寥師一窮無四壁百代有千詩吳僧道潛自號參寥子善詩為東坡所稱晉書習鑿齒傳云四海習鑿齒千詩見上注再逐越淮江三年魯中歸參寥子紹聖初坐纍遷逐初無貫公色贊公見老杜詩本京中大雲寺主謫秦州安置杜嘗有詩云贊公釋門老放逐來上國還為世塵嬰頗帶憔悴色不異淨名衣言返初服也維摩經曰維摩詰雖為白衣持奉沙門清淨律行淨名即維摩詰才如得風鷁左傳曰六鷁退飛過宋都風也已復觸藩羝周易大壯卦羝羊觸藩羸其角路貧誰肯憐語妙君所知我往立談間歘若白受緇乃知仁者聽不待辛苦詞言聽言之易如白受緇也禮記甘受和白受采儀禮昏禮注曰以白造緇曰縟庾信哀江南賦曰不無危苦之詞趙侯名教士晉書樂廣曰名教內自有樂地徑氣噴長霓退之書云徑氣沮金石曹子建七啓曰慷慨則氣成虹霓論吐天下公而合吾所私所私謂參寥明窗弄文墨妍語含英姿要與識者論且避群兒癡漢書蕭何傳曰徒持文墨議論退之詩不知羣兒愚那用故謗傷舊好無新功終年此交綏左傳趙宣子曰秦以勝歸我何以報乃皆出戰交綏注云兩退曰交綏未須堅百戰當即建降旗史記張儀傳曰輕走易北不能堅戰孫樵與王霖書曰誠謂足下怪於文方舉降旗且太誇朋從間元日雪二首半夜風如許後漢左慈作老羝語曰遽如許平明雪皓然晉書王徽之傳夜雪初霽月色清朗四望皓然簾踈穿瑣細竹壓更嬋姢樂天詩北窗竹嬋姢按楚辭曰嬋姢修竹窘兔走留迹飢烏鳴乞憐遙欣炎海上還復得新年末句謂東坡在海外無恙也老杜詩南遊炎海甸又度臘闕三白一作閲三白樂天詩度臘都無好霜霰朝野僉載日正月三白田公笑赫赫三白謂三得雪也開正還積隂沈約宋書南郊樂登歌曰開元守正禮存樂舉守一作首炊煙茅舍濕噪雀暮枝深短髮千方誤中年萬里心言終老無成而悔壯年之妄念成書著巖穴或有後人尋此句用楊雄草玄意漢書司馬遷曰僕誠以著此書藏之名山莊子曰其隱巖穴也難為於布衣之士次韻黃生入竹投窗夜有聲似違殘臘作初正三更爽氣侵危坐老杜詩竹涼侵卧內後漢茅容避雨樹下危坐愈恭萬里回風逼彂生爾雅回風謂之飄老杜雨詩當春乃發生呵筆小吟撩我老開元天寶遺事曰李白對明皇撰詔誥時大寒筆凍帝敕宫嬪執牙筆呵之王介甫詩云物華撩我有新詩閉門髙卧見君情用袁安事見上注只今剩作驚人句頗覺吟邊意未平退之送東野序云物不得其平則鳴答黃生水泥斷道雪塞門逺坊纍日無行人蜀志劉焉傳曰米賊斷道魯直詩明朝醉起雪塞門柳子厚詩斷道水梁卧聞喧呼誰呌閽漢書楊雄甘泉賦選巫咸兮呌帝閽此借用稚子往問鹿駭奔文選笛賦曰莫不張耳鹿駭小辨詩曰鹿斯之奔維足伎伎黃生學詩用力新急手疾口如翻盆北齊書魏收敏速之手邢溫所不逮東坡詩文如翻水成老杜詩白帝城下雨翻盆衝風踏凍送七言要令寒屋回春溫是時積隂又黃昏呌閙索火驚四鄰杜牧之李賀集序曰太和五年十月中半夜時舍外有疾呼傳緘書者某曰必有異亟取火來及發之果集賢學士沈公子明書一通邇來結字穩且勻晉書衛恆曰杜氏甚得筆勢而結字小踈豈不見我參寥君參寥子能詩意黃生近必見之故爾頓進也典略袁奉髙曰卿見吾叔度耶嗟吾老矣心尚存後來得子空馬群歐公贈王介甫詩云老去自憐心尚在後來誰與子爭先徑須赤手縛麒麟如老杜掣鯨鯢之意謂大手筆也孫樵與王霖書曰譬玉川子月蝕詩韓吏部進學解莫不拔地倚天句句欲活讀之如赤手捕長蛇不施鞚勒騎生馬急不得暇莫不捉搦四大海水一口吞四大海水之語佛經多有之傳燈録馬祖謂龐居士云待汝一口吸盡西江水即向汝道丈夫意氣抗浮雲班固答賔戲曰仲尼抗浮雲之志道逢其人兩手分兩句后山自言於詩學無所靳惜得人則分付也傳燈録歸宗曰遇人則途中授與妬婦拊膺王右軍言世人之不廣也羊欣筆陳圖曰王羲之年十二見前代筆説於其父枕中竊而讀之父因與之不旬月書便大進衛夫人見之曰此兒必用筆訣近見其書便有老成之智流涕曰此子必蔽吾名墨藪曰鍾繇見蔡雍筆法於韋誕坐上捶胸三日因嘔血此詩參用其事列子曰甘蠅學射於飛衛飛衛髙蹈拊膺曰汝得之矣此用其字南史王誕傳宋明帝使虞通之撰妬婦記按戰國䇿曰從妻言之未免為妬婦雪後送往開新雪又晴故留臘白待春青左傳曰送往事居元稹詩曰臘雪殘消春又歸迎新别故欲沾衣稍回衫色伸梅怨併得朝看與夜聽已覺庭泥生鳥迹遽修田事帶朝星吕氏春秋曰巫馬期為單父令帶星而出入莫年功力歸持律不易騷人故獨醒吳志陸抗傳曰大費損功力史記屈原曰衆人皆醉而我獨醒送張蘄縣接祿才餘歲為邦近故園案圖三萬户漢書陳平傳髙祖問御史曲逆户口幾何對曰始秦時三萬餘户鎮靜五千言史記老子著書五千餘言道德之意雪盡春泥滑風生沙水昏老杜詩杖藜入春泥又詩天寒沙水清猶須放琴客坐席稍能溫張君必有放妾事因以戲之按麗情集顧况有宜城放琴客詩序曰琴客宜城之愛妾也宜城請老愛妾出嫁不禁人之欲而私耳目之娛逹者也歌曰南山闌干千丈雪七十非人不暖熱此引用言席方暇暖何須遽逐之也送何子溫移亳州三首治出龍城守退之詩曰寄書龍城守謂柳柳州也名髙水部郎見上注清明人共識退之答崔羣書曰青天白日奴隸亦知其清明風味獨難忘開天傳信記曰麴生風味不可忘也其詳見上注骨立秦書瘦老杜小篆歌曰苦縣光和尚骨立苦縣在今亳州鬚粘檜密香亳州地多古檜歐公亳州詩云蜂採檜花村落香唐羅鄴早行詩旋呵鞭手凍粘鬚烹鮮師老耳老子曰治大國若烹小鮮亳州明道宫乃老子始生之地曵尾肯蒙莊莊子蒙人事見上注莊子曰楚王使大夫二人謂曰願以境內纍矣莊子曰楚有神龜死巳三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎傳燈録僧問洞山和尚為先師設齋還肯先師也無又青襟曽誦賦詩青青子襟注青襟青領也學子之所服皓首始登門文選李陵書云丁年奉使皓首而歸意得寧論晚老杜詩論交翻恨晚此反而用之髙適詩男兒貴得意何必相知早心交不待言莊子曰四人相視而笑莫逆於心遂相與友吳志孫權曰孤與子瑜可謂神交向來期北上可復改南轅后山自注云嘗請湖越而得亳期北上欲其漸近帝城也左傳曰令尹南轅反斾又曰王告令尹改乘轅而北之畫地數佳政老杜詩倒屣喜旋歸畫地耒所歷文選曹子建與吳季重曰在彼自有佳政叢談何處村劉向説苑有叢談篇老杜詩慟哭秋原何處村又復作中年别仍懷後日憂關山遮極目退之西山詩為遮西望眼王粲登樓賦云平原逺而目極兮蔽荊山之髙岑汴泗只東流退之詩汴泗交流郡城角謂徐州也東坂送歐陽王簿詩出處年來恨不齊一樽臨水記分携江湖咫尺吾將老汝頴東流子却西政好遭頻借老杜詩權宜借寇頻後漢寇恂傳頴川百姓遮道曰願從陛下復借寇君一年詩清得暗投暗投見上注得暗投猶言安得暗投也會看靈夀杖漢書孔光傳詔賜太師靈壽杖扶出富民侯漢書車千秋傳千秋為丞相封富民侯送詹司業學舍論交二十年白頭相對固依然才難孰為吾君惜才難見魯論果滿寧容我輩先謂證果位也南史謝靈運謂孟顗曰丈人生天當在靈運前成佛必在靈運後此反而用之熟路長驅聊緩步退之送石處士序云猶駟馬駕輕車就熟路而王良造父為之先後也此借用謂功名之途百全一彂不虛弦漢書朝錯傳云此其計不百全豈彂乎老杜詩鳴弦不虛發此借用言藏器待時故懷未盡還成别飽慣人間不更憐西郊二首紅緑相催春事闌可能無意待人看不因送客那能出衰疾經年一據鞍老杜詩送客逢花可自由蜀志先主見髀裏肉生慨然流涕此句頗采其意據鞍見馬援傳又攢眉斂目抵風沙暗度城西十里花樂府蔡琰胡笳十八拍云攢眉向月兮撫雅琴歷肆側聽長短句雲溪友議曰崔涯張祜齊名每題詩倡肆元稹樂府古題序云句度短長之數聲韻平上之差緣溪斜著兩三家此句終上句之意東坡詩竹籬茅屋趂溪斜老杜詩江深竹淨兩三家寄亳州何郎中二首西南日下共浮雲西南謂日暮時文選李少卿與蘇武詩曰携手上河梁遊子暮何之又詩曰仰視浮雲馳奄忽互相踰風波一失所各在天一偶江淹擬李陵詩曰樽酒送征人踟蹰在清宴日暮浮雲滋握手淚如霰人事難群喜勸分淵明贈龐參軍詩序曰人事好乖便當語離左傳曰振廪勸分此借用其字已度城隂先得向何遜詩城隂度塹黑昏鴉接翅稀不應從俗未忘葷謂何徹也見上注兩句皆用何氏事松篁有節元宜晚禮記曰如松柏之有節桃李無蹊只自薰漢書李廣傳贊桃李不言下自成溪許渾詩冬草只自薰欲入帝城須帝力用陳咸事見上注漢書張敖傳曰秋毫皆帝力也且尋詩社著詩勳孫魴沈彬同逰李建勳之門為詩社歐公詩云唱髙誰敢投詩社魯直詩學古苦勳多魏志注曰示威懷而著鴻勳又西原追送未成旬赫赫傳聲已迫人孟浩然詩重陽未成旬漢書何武所居無赫赫名後嘗見思剩欲鈔詩寄來使髙適詩尋經剩欲翻老杜詩鈔詩聽小胥尚能拂席致嘉賔史記孟子傳曰平原君側行撇席注拂也音匹結反孰知簡易歸劉向漢書劉向為人簡易無威儀誰使循良作寇恂見上注他日入東專一壑少留餘地許為鄰晉宋間人多以往會稽為入東南史何徹傳賣園宅欲入東遂居若邪山漢書敘傳班嗣曰漁釣於一壑則萬物莫姦其志王介甫詩我亦莫年専一壑寄答泰州曽待郎千里馳詩慰别離詩來吟詠轉悲思老杜詩愁極夲慿詩遣興詩成吟詠轉凄涼漢書趙幽王傳曰王悲思靜中取適庸非計前輩謂作文淨中一葉故此反其意老杜詩取適南巷翁林下相從會有時雲溪友議僧靈徹詩曰相逢盡道休官去林下何曽見一人魏志崔琰曰會當有變時生理只今那得説老杜詩我在路中央生理不得論交情從昔見於斯漢書鄭當時傳一貴一賤交情乃見含毫欲下還休去懷抱何由得細知退之答侯繼書云欲致一書聞足下并自書其所懷含意連辭將發復巳卒不能成就其説陸機文賦曰或含毫而邈然送提刑李學士移使東路據實録元符二年二月提點京東西路刑獄李昭玘徙京東東路襟抱從前相向開倡酬于此未多陪老杜詩一生襟抱向誰開身更寵辱談彌勝老子曰寵辱若驚髙僧傳支遁謂王𪷟曰貧道與君别來多年君語了不長進后山此句反其意用之路别東西意自哀文選謝玄暉辭隋王箋曰歧路西東或以􅠯唈注引淮南子楊朱泣歧事故柳子厚重别劉夢得詩曰二十年來萬事同今朝歧路忽西東后山徐州人徐州屬京東西路隱几忘言終不近莊子曰南郭子綦隱几而坐仰天而噓嗒然似喪其耦又曰智北遊於玄水之上適遭無為謂三問而不答問乎狂屈狂屈曰豫中欲言而忘其所欲言反見黃帝而問焉黃帝曰彼無為謂真是也狂屈似之我與若終不近也此句后山自述白頭青簡兩相催唐劉子玄曰頭白可期汗青無日此借用自言度歲月於文字間也後漢吳祐傳父恢欲殺青簡以寫經書老杜詩干戈衰謝兩相催孰知衰老難為别聲問應須續續來漢書蘇武傳曰有聲問來樂天琵琶行云低眉信手續續彈和鄭户部寶集文室二首逺遊遊則逺屈原逺遊曰悲時俗之迫隘兮願輕舉而逺遊此借用言主僧遍參也安心心已安傳燈録僧神光問逹麼曰我心未寧乞師與安達麼曰將心來與汝安曰覔心了不可得達麼曰我與汝安心竟茅茨更何事一坐五年寬傳燈録汾州無業禪師曰古得道人得意之後茅茨石室向折腳鐺子裹煮飯喫過三十二十年樂天詩一坐十五年林下秋復春客來問法要示以無所還楞嚴經曰今當示汝無所還地勿云空生默聽者不勝言空生謂須菩提也般若經須菩提於巖中宴坐帝釋散花曰我聞尊者善談般若云云須菩提曰我於般若未曽談著一字帝釋曰尊者無説我亦無聞無説無聞是名真説般若又貴有空王章空王佛也章印也謂傳佛心印觀佛三昧海經云住念佛者心印不壞信心銘觀心空王貧無置錐地見上注衝風窗自語古樂府中庭有樹自語涴壁蟲成字東坡詩書窗涴壁常遭罵蟲成字見下注向隅有知音説苑曰今有滿堂飲酒者一人向隅獨泣則一堂之人皆不樂矣此借用言靣壁也按傳燈録達麼寓止于嵩山少林寺靣壁而坐終日默然人莫之測又忠國師曰墻壁瓦礫熾然常説故東坡贈月老詩云拱手但默坐墻壁方諄諄后山用此意謂無情亦解説法不可謂墻壁無知也闔門接強對傳燈録趙州和尚見真定師王公不下禪床曰第一等人來禪床上接中等人來下襌床接末等人來三門外接東坡詩安排詩律追強對按吳志陸抗傳曰外禦強對只道庭前柏西來本無意庭柏見上注傳燈録大梅云西來無意隱者郊居髙齋繚繞度雙溝謝玄暉有郡內髙齋間坐時老氣軒昻蓋九州老杜詩老氣橫九州不為江山開悒怏老杜詩已知出郭少塵事更有澄江銷客愁又詩汀洲稍踈散風景開悒怏正緣風味得淹留風味見上注劉安招隱士曰攀桂枝兮聊淹留招携好客供談笑老杜詩強將笑語供主人拆輔新詩擬厭酬鍾嶸詩品曰拘攣輔衲蠧文已甚寒山子詩與道殊懸逺拆東輔西爾楚茨詩云獻酬交錯歐公詩更約多為詩準備恐防梅老敵難當小摘自鋤稀菜甲旁觀虛作不堪憂老杜客至詩自鋤稀菜甲小摘為情親魯論曰人不堪其憂覽勝亭斷岸通橫水老杜詩決渠當斷岸吹花滿繫船老杜詩吹花困癲傍舟楫中年擅幽獨輟食買林泉楚詞曰幽獨處乎中山草木真宜主江山故作妍升沉有流轉且復賦歸田元稹詩升沉或異勢張平子有歸田賦何太沖挽詞二首一作太中課最三川守漢書宣帝紀課殿最以聞注云最凡要之首也言課居首也又倪寬傳課更以最史記李斯之子由為三川守名成萬石君漢書石奮傳景帝曰石君及四子皆二千石人臣尊寵乃集舉其門凡號奮為萬石君平生欠一識聲烈即多聞見上注兜率真歸處樂天詩海山不是吾歸處歸即歸諸兜率天琴臺只斷雲老杜詩琴臺日暮雲傷心今夜月忍便到初墳漢元帝詔為初陵注未有名故曰初此用其字又哀挽諸儒競老杜詩哀挽青門道晉書郗超傳及死貴賤操筆為誄者四十餘人豐碑故吏繁禮記曰公室視豐碑此借用其字按後漢諸碑多門生故吏所立素車紛雨泣周禮車僕注曰素車以白玉堊車也老杜詩路人紛雨泣玉一作土丹旐與風翻老杜詩丹旐飛飛日幾地留遺愛孔子曰子産古之遺愛他年作九原禮記趙文子與叔譽觀于九原文子曰死者如可作也吾誰與歸注作起也涕流耆舊盡不獨為鄉園何遜詩鄉園不可見江水徒自清送大兄兼寄趙團練貧有分離苦官無早晚宜上句見第一卷注樂天詩命苟未來且求食官無高卑及逺邇又為千里别未覺十年遲此一聮足成破題之意分屬兩句十年遲見下注日與江山逺風連草木悲平生劉子政見可共論詩劉向字子政漢宗室也以屬趙君寄襄州程大夫中年為吏晚專城不獨身榮府亦榮専城見上注江漢風流見羊杜晉羊祜杜預皆鎮襄陽老杜詩江漢風流萬古情相門經術有韋平漢韋賢平當父子皆以明經至宰相史記孟嘗君傳曰相門有相十年一别音書絶萬里相看骨肉情枤杜詩序曰骨肉離散今代龐公入城府定將懸榻與逢迎後漢龐公傳龐公居峴山之南未嘗入城府峴山在今襄州又徐稚傳陳蕃特為置一榻去則懸之送檢法趙奉議三嵗公門不屢過作箋時得問如何晉書龔玄之未嘗至公門及兹去去翻為恨文選蘇武詩參辰皆已沒去去從此辭向使常常肯為多悔向來不數見也孟子曰欲常常而見之勇鋭閉房猶著酒老杜詩昔何勇鋭今何愚白虎通曰人生六十閉房者何也法六月陽氣衰也禮記內則注曰妾五十始衰閉房不復出御切深疾惡反傷和退之歐陽生哀辭曰其文章切深魏志陳矯傳陳登曰清修疾惡有識有義吾敬趙元達老杜梔子詩曰與道氣傷和一夲傷作相贈言竊取仁人號贈言謂勸其止酒與和易也暗用管輅别傳諸葛樂事見下卷王察院挽詞注家語子路將行孔子曰贈汝以言乎史記孔子世家孔子過周問禮老子送之曰富貴者送人以財貧賤者送人以言吾不能富貴竊仁人之號送子以言善聽君居長者科左傳所謂惟善人能受盡言送建州鄭户部清江畫舸照新晴鐃鼓喧喧聒市鳴樂府題解漢有鐃歌鼓吹昔日布衣今著繡著繡晝行見上注他年鶴化只空城鄭蓋徐州前輩故用丁令威化鶴事見上注還朝不待三年最漢書嚴助傳曰助為會稽太守願奉三年計最得郡何妨萬里行成都記萬里橋諸葛亮送費禕使吳别於此褘曰萬里之行始於此矣歲祿二千親八十世間誰有此時榮漢太守秩二千石送張秀才學又三年積三年學見魯論功收一日長蜀志龐統曰吾似有一日之長擅場推老手張平子東京賦曰秦政利觜長距終得擅場杜子美詩畫手看前輩吳生逺擅場歐公詩老手尚能工翦裁附尾得諸郎史記伯夷傳顔回雖篤學附驥尾而行益顯南史王僧虔傳曰此烏衣諸郎坐處度鳥界晴碧老杜詩身在度鳥上又詩雪嶺界天白過雲回夕黃老杜詩絶壁過雲開錦繡又詩錦城曛日黃孰知詩有驗謂詩能窮人莫愠路無糧魯論孔子在陳絶糧子路愠見莊子曰吾無糧我無食后山詩注卷第八
