front:
  text: 后山詩注卷第三
  hash: sha256:ab9cbd743d2c091481b61be91ebfae66100795b6d290797c2fbc2052046fc484
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_003-1a}
body:
  text: 觀兖文忠公家六一堂圖書國生世何用早我已後此翁柳子厚答袁饒州論陸先生春秋書曰若吾生前距此數十年則不得是學矣今適後之不為不遇也此句頗用其意且為下句張本曹子建求自試表曰士之生世入則事父出則事君頗識門下士南豐東坡皆六一門下士東坡送曽子固詩曰醉翁門下士雜沓難為賢略已聞其風莊子雜篇曰墨翟禽滑釐聞其風而恱之中年見二子晉書王羲之傳謝安曰中年以來傷於哀樂二子謂棐與辨棐字叔弼辨字季默已復歲一終左傳晉侯曰十二年是謂一終一星終也呼我過其廬所得非所蒙漢書禹貢傳誠非草茅愚臣所宜蒙也先朝群玉殿范蜀公東齋記嘉祐七年十二月二十三日召近臣天章閣下觀書閲瑞物上親作飛白書令左右搢笏以觀又令王禹玉跋尾人賜一紙既而置酒羣玉殿云云歐公有謝賜飛白書詩并序其遊其事長編丙申庚子凡兩宴羣玉殿賜書在丙申冠佩環群公雲漢詩羣公先正神文燠王度仁宗諡號神文聖武眀孝皇帝左傳曰思我王度式如玉式如金喜色見天容老杜詩天顔有喜近臣知東坡詩天容玉色誰敢畫御榻誰復登法書要録曰唐太宗宴玄武門作飛白書衆臣乘酒就太宗手中相競散騎常侍劉泊登御床引手然後得之帝書元自工此言仁宗之書元自工非因揣而大也下句蓋終此意南史劉穆之傳宋武帝書素拙穆之曰公但縱筆為大字一字徑尺無嫌大既是有所包其勢亦美帝從之一𥿄不過六七字便滿故東坡謝賜御書表曰筆縱字大笑宋武之未工黃絹兩大字老杜詩鬱鬱三大字蛟龍岌相纒一覽涕無從世説王東亭曰一覽而盡禮記孔子曰豫惡夫涕之無從似欲託其子天意人與同謂英廟曰孟子曰天與子則與子韓魏公作仁宗哀册敘羣玉賜書事云因疑前會之非常似與羣玉之敘訣意當時必有顧託之語也七年八月英宗立為皇子十二月宴羣玉皇子與宴又召韓琦至御榻前賜酒一巵明年三月仁宗崩歷數况有歸尚書舜命禹曰天之歷數在汝躬敢有貪天功左傳晉侯賞從亡者介之推不言祿曰天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎竊人之財猶謂之盜况貪天之功以為已力乎初元豐三年王堯臣之子同老上書言其父定䇿之功詔贈太師元祐五年殿中侍御史賈易言堯臣掩韓琦之大勳故此句指其事集古一千句明明並群雄集古目録跋見居士集誰為第一手未有百世公百世公謂公論也與上羣公韻不相妨南史齊髙帝嘗與王僧虔賭書筆帝曰誰為第一僧虔對曰臣書臣中第一陛下當帝中第一廟器刻科斗寶樽播華蟲尚書序疏曰科斗書古文也所謂蒼頡本體尚書注華蟲雉也宗廟彛樽亦以山龍華蟲為飾此言集古鍾鼎書緬懷辨服士酬獻鳴瑽瑢辨服士謂陪祭諸臣韻書曰瑽瑢佩聲也文選潘嶽西征賦曰想佩聲之遺響若鏗鏘之在耳插架一萬軸退之詩鄴侯家多書插架三萬軸遺子以固窮前漢韋賢傳遺子黃金滿籝不如教子通一經固窮見魯論素琴久絶絃晉書陶潛傳蓄素琴一張弦徽不具韓詩外傳鍾子期死伯牙劈琴絶弦棊酒頗闕供自集古一千卷以下至此已見前卷贈叔弼詩春明退朝録曰宗衮嘗言律云可從而違堪供而闕亞六經之文明皇幸蜀記韋諤曰先無闕擬又恐闕供此借用向來一瓣香敬為曽南豐世雖嫡孫行向來見上注諸方開堂至第三瓣香推本其得法所自則云此一瓣香敬為某人云云曾鞏子固建昌南豐人於歐公猶宗門中嫡子而后山又師南豐乃其孫也后山以東坡薦得官作此詩時東坡政為郡守終無少貶阿附之意可謂特立之士矣然亦知東坡之大必能受之也名在惡子中此后山自貶損也前漢尹賞傳賞為長安令舉長安中輕薄少年惡子悉籍記之斯人日已逺千嵗幸一逢老杜詩古人日已逺青史字不泯東坡答舒煥書云歐陽公天人也天之生斯人意其甚難非且使之休息千百年恐未能復生斯人也吾老不可待草露濕寒蛬草露濕寒蛬自言哀傷之意寄於詩什如秋蟲之悲鳴也歐公詩蓋云堪笑區區郊與島螢飛濕露吟秋草老杜詩草露亦多濕送蘇逮胸中歷歷著千年北史崔㥄傳鄭伯猷歎曰胸中貯千卷書使人邦得不畏服老杜詩歷歷開元事分眀在目前傳燈録智常禪師謂李渤曰使君摩頂放踵如椰葉大萬卷書在何處著此詩用著字甚佳筆下源源赴百川唐蔣渙送魏淄州序云筆海納流於百川詞峯削成於二華孟子注云源源如流水與源通筍子宥坐篇論水曰其赴千仞之谷不懼似勇謝靈運擬魏太子詩曰百川赴巨海真字飄揚今有種真字多患窘束惟東坡筆墨超然於楷法之外退之雪詩波濤何飄揚漢書陳勝傳侯王將相寧有種耶清談絶倒古無傳絶倒見上注孟子曰是以後世無傳焉出塵解悟多為路傳燈録讓禪師曰汝等六人同證吾身各契一路此言多為路言當開廣不著一邉也隨世功名小著鞭言不用汲汲於功名也著鞭見上注樂天詩青雲上了無多路却要徐驅穩著鞭白首相逢恐無日幾時書扎到林泉選詩客從逺方來惠我一書扎老杜詩時應問衰病書疏及滄浪送黃生兼寄二謝二首南第諸兄蚤相見南第猶言南宅也南史元凶劭傳有此字别時託子以無倦南史謝弘微傳叔父混為韻語以奬勸靈運等並有戒厲之言唯弘微獨盡褒美曰微子基微尚無倦由慕䉮勿輕一簣少進往必千仞后山詩意謂黃生諸兄以其弟託之為其好學蓋知所慕向也百年論交見子知老杜詩論交翻恨晚百歲言其久要也左傳曰他日吾見子面而已今吾見子之心矣一朝取别寧吾願老杜詩取别何草草按十二國史云宓子賤為單父宰行過楊晝取别淵明歸去來辭曰富貴非吾願妙歲逺遊真所難言其不懷安也肯為得官近長安唐人語曰欲得官近長安聖作詩書端有意猶須用心科舉外意譏王氏經術其送邢居實序論之詳矣又城西兩謝俱能文穰丞精悍吾所聞謝景初字師厚二子悰愔皆知名穰縣今屬鄧州漢書嚴延年為人短小精悍每讀吾詩得人意南史何遜傳沈約曰吾每讀卿詩一日三復猶不能巳後漢禰衡為黃祖作書記輕重踈密各得其體祖曰處士正得祖意如祖腹中之所欲言也使不能文巳可人世説謝安少時請阮光祿道白馬于時謝不即解阮語重相咨盡阮乃歎曰非但能言人不可得正索解人亦不可得禮記雜記曰管仲遇盜取二人焉上以為公臣曰所與遊辟也可人也我昔謝公門下士早年妄作功名意如今老寄頴河東九泉雖深愧此公謝公即師厚退之送陸暢詩我實門下士力薄蚋與蚊受恩不即報永負相中墳暢蓋長源之子也此詩略采其意次韻蘇公西湖徙魚三首窮秋積雨不破塊霜落西湖露沙背退之詩嗷嗷鳴鴈鳴且飛窮秋南去春北歸又詩時秋積雨霽西京雜記董仲舒曰太平之時雨不破塊大魚泥蟠小魚樂楊子曰龍蟠於泥蚢其肆矣莊子曰倏魚出遊從容是魚樂也老杜詩小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈強泥沙有時立髙丘覆杯水如帶言水淺而丘露其狀如此爾雅釋丘曰如覆敦者敦丘注云敦盂也何遜雜詩湓水縈如帶魚窮不作搖尾憐退之與韋舍人書若俯首帖耳搖尾而乞憐者非我之志也公寧忍口不忍鱠樂天詩忍心兩三日莫作破齋人東坡元韻云老守縱饞那忍鱠修鱗失水玉參差柳子厚鏡歌曲曰手援天矛截修鱗莊子曰吞舟之魚湯而失水晚日搖光金破碎退之詩竹影金瑣碎此借用以言鱗鬛映日而光也咫尺波濤有生死安知平陸無灘瀨老杜觀打魚歌云咫尺波濤永相失又詩終然減灘瀨此身寧供刀几用著意更須風雨外御史言蘇公舊詩有聞諱而喜之語公遂其外輔得頴州后山詩意或謂此後篇又云防有任公釣江海亦此意也史記樊噲曰人方為刀爼我為魚肉續世説曰周玄豹有袁許之術見王都曰形若鯉魚難免刀杌都竟被殺東坡詩天公自著意是間相忘不為小左傳蹇叔曰必死是間莊子曰魚相忘於江湖濠上之意誰得會莊子與惠子遊於濠梁之上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂枯魚雖泣悔可及古樂府曰枯魚過河泣何時復還入作書與魴鱮相教慎出入莫待西江與東海以上四句皆終前意言外郡亦足為樂優遊卒歲可以避禍也莊子曰周顧視車轍中有鮒魚問之對曰我東海之波臣也君豈有斗升之水而活我哉周曰我且南遊吳越之王激西江之水而迎子可乎鮒魚奮然曰君言此曽不如索我於枯魚之肆又赤手取魚如拾塊孫樵與王霖書曰如赤手捕長蛇又李啇隱詩曰洞庭魚可拾不用更垂􅊻布網鳴舷攻腹背後趙王泰諌冉閔曰若我出戰必腹背受敵豈知激濁與清流唐書王圭傳曰激濁揚清吳志賀劭傳曰遂使清流變濁北夢瑣言朱全忠賜舊相裴樞等自盡李振曰此輩正謂清流宜投黃河永為濁流魯直詩我亦洗湔與清流恐懼駢頭牽翠帶易曰貫魚以宫人寵王弼注云駢頭相次似貫魚也老杜詩水荇牽風翠帶長居士仁心到魚鳥此句法用行葦詩仁及草木之意文選四子講德論曰恩及飛鳥列子曰天之於民厚矣植五榖生魚鳥以為之用會有微生化餘鱠左思吳都賦曰雙則比目片則王餘注云越王鱠魚未盡因以其半棄之為魚遂無一靣寧容網目漏吞舟晉書顧和答王導曰明公作輔寧使網漏吞舟何緣採聽風聞以察察為政世説劉文幹答魏文帝曰亦由陛下網目不踈誰能烹鮮作苛碎老子曰治大國若烹小鮮我亦江湖釣竿手杜牧之詩惆悵江湖釣竿手却遮西日向長安悮逐輕車從下瀨漢武帝紀公孫賀為輕車將軍甲為下瀨將軍鮑明逺詩後逐李輕車生當得意落鷗邊後漢梁竦曰生當封侯死當血食后山反而用之故下句云云列子曰海上之人從鷗鳥逰漚鳥之名者百數而不止其父曰汝取來吾玩之眀日之海上漚鳥舞而不下文選子虛賦云雙鶬下李善注引爾雅曰下落也談苑載鄭文寶詩云雙溪時落海邊鷗何用封侯墮鳶外後漢馬援傳援擊交趾破之封新息侯從容謂官屬曰吾從弟少遊當哀吾慷慨多大志當吾在浪泊西里間虜未滅之時仰視飛烏站站墮水中卧念小遊平生時語何可得也不如此意今得所用孟子校人事得其所哉之意置身暗與神明會退之贈李觀詩曰北極有羈羽南溟有濳鱗川原浩浩隔影響兩無因風雲一朝會變化成一身誰言道里逺感激疾如神世説謂晉武帝山濤不學孫吳而暗與之會徑須作記戒鯨鯢太白枯魚過河泣曰作書報鯨鯢勿恃風濤勢防有任公釣東海莊子曰任公子有大鉤巨緇五十犗以為餌投竿東海已而大魚牽巨鈎而下任公子得若魚離而臘之又詩成落筆驥歷塊不用安西題紙背此兩句指東坡詩語俊快書復雄竒也漢書王褒傳曰駕齧勑驂乘旦過都越國蹶如歷塊柳子厚詩云書成欲寄􅋻安西𥿄背應勞手自題注云家有右軍書每紙背庾翼題云王右軍六紙小家厚斂四壁立拆東輔西裳作帶此兩句自言窘於屬和也後漢陳蕃曰小家畜産百萬之資寒山子詩與道殊懸逺拆東輔西爾左傳曰樂桓子請帶於叔孫豹豹召使者裂裳帛而與之曰帶其𥚹矣堂下觳觫牛何罪見孟子太山之陽人作膾莊子曰盜跖膾人肝而餔之同生異趣有如此瓶懸瓽間終一碎史記李斯傳曰異趣以為髙退之送惠師詩云去矣各異趣何為浪占巾漢書陳遵傳楊雄作酒針曰觀鉼之居居井之眉處髙臨深動常近危一旦遇礙為瓽所轠身提黃泉骨肉為泥自用如此不如鴟夷云云此詩言仁與不仁趨向各異而不仁者鮮有不及如鉼與鴟夷所居不同要之鴟夷保全而瓶終不免也瓽音丁浪反井以磚為甃者也流水長者今公是雨花散亂投金瀨金光明經曰流水長者自在光王之子也見有一池其水枯涸於其池中有十千魚遂將二十大象載皮囊盛河水㵼至池中水遂彌滿又為施食解説十二因緣并稱説寶勝佛名後十千魚同日命終生忉利天是諸天子復至夲處空澤池所復雨天華便從此沒還忉利宫法華經曰彌勒當知爾時彌勒菩薩豈異人乎我身是也求名菩薩汝身是也吳越春秋曰伍子胥伐楚還栗陽瀨水上欲報自殺婦人以百金不知其家投金瀨水中而去人言充庖須此輩老杜雞詩充庖爾輩堪盧同放魚歌曰此輩肥脆為絶尤慈觀更須容度外法華經揭曰悲觀及慈觀此引用當作去聲讀南史謝朏傳曰殺之則成其名正應容之度外賜墻及肩人得視此后山自言其詩淺近也下有答魏衍詩亦云我詩淺短子貢墻衆目俯視無留藏按魯論賜之墻也及肩窺見室家之好公才槃槃一都會晉陽秋云諺曰大才槃槃謝家安漢書地理志勃碣間一都會有憐其窮與不朽我亦牽聮書玉海意謂好事者或以此詩附見東坡集中是與之以不朽之名也不朽字見左傳退之張法曹墓碣曰若爾吾束必求夫子銘是爾與吾不杇也又答元稹書曰足下與甄濟父子俱宜牽聮得書南史張融自名其集為玉海今以比東坡集次韻蘇公西湖觀月聽琴清湖納明月逺覽無留雲選詩璇題納明月嵆康琴賦曰情舒放而逺覽退之詩何限青天無片雲人生亦何須東坡詩我生亦何須一飽方想滅按蕭子顯齊書裴昭明曰人生一身之外亦復向須有酒與桐君陶隱居本草序有桐君藥録此借用意謂琴也自醉寧問客用陶淵明意見下注一杯復一杯太白詩一杯一杯復一杯平生今不飲意得同酣醺后山以戒律止酒髙僧白密傳云神領意得頓盡言前清言氷玉質劉禹錫聮句云清言如氷玉逸韻貫珠璣壞衲山水紋東坡嘗被衲衣蓋金山了元師所贈也殫精有後悟自言根領會之不早故殫竭其精思也畜耳無前聞言聞所未聞也老杜曰畜眼未見有禮記檀弓曰何居我未之前聞也潛魚避流光水至清則無魚蓋此意也文選袁宏三國名臣序贊曰潛魚擇淵上林賦曰擊流光曹子建詩明月照髙樓流光正徘徊歸鳥投重昏老杜詩仰羡黃昏鳥投林羽翮輕文選頭陀寺碑曰曜慧日於康衢則重昏夜曉信有千丈清不如一尺渾四句皆勸蘇公含垢納汚之意涉頴詩亦云至潔而納汙此水真吾師蘇公送魯元翰詩云皎皎千丈清不如尺水渾故后山言印有以印之老杜詩信有人間行路難次韻蘇公涉頴衝風不成寒楚辭衝風至兮揚波注衝隧也脫木還自竒文選謝莊月賦曰洞庭始波木葉微脫坐看白日晚起行清頴湄楚辭九歌曰白日晼冕其將入兮文選虞陽子詩曰飛狐白日晚三穴未為得馮諼曰狡兔三窟僅得免死晉書王衍謂弟澄敦曰卿二人在外而吾留此足以為三窟矣司馬相如傳楚亦未為得也一舟不作癡二句似託意以坡避謗請郡為得䇿晉傅咸傳楊濟與咸書曰生子癡了官事官事未易了也了事正作癡復為快耳詩意謂放情物外非俗吏所為路暗鳥遺音周易小過飛鳥遺之音江清魚㺯姿後漢李固傳搔頭弄姿老杜林熱鳥開口江渾魚掉頭宇㝎怪物變莊子曰宇泰定者發乎天光意行覺舟遲列子管夷吾曰姿意之所欲行劉禹錫蠻子歌曰腰斧上髙山意行無舊路此借用其字謂神遊八表非楫棹所及公與兩公子妙語含風漪兩公子謂兩歐陽也漢書賈捐之傳曰君房下筆言語妙天下退之簟詩曰卷送八尺含風漪此借用以言風行水上自然成文也但怪笑談劇漢書楊雄口吃不能劇談莫知賔主誰後漢書龐德公傳注曰司馬德操嘗詣德公值其渡沔上先人墓德操徑入其堂呼德公妻子使速作黍須臾德公還直入相就不知何者是客也東坡詩明日德公當上冡不知誰主復誰賔得句未肯吐鬱鬱見睫眉魯直詩李侯有句不肯吐又云眉間鬱鬱似隂功劉禹錫詩依依見眉睫按莊子曰向吾見若眉睫之間因以得汝矣相從能幾何行樂當及兹漢書楊惲傳人生行樂耳古詩曰為樂當及時何能待來兹生忍自作難自作難猶言徒自苦也太白詩回山轉海不作難百憂間一嬉詩云我生百憂莊子盜跖篇曰人上壽百歲中壽八十下壽六十餘病瘦死喪憂患其中開口而笑者一月之中不過四五日而已耳時尋赤眼老傳燈録廬山歸宗寺智常襌師以目有重瞳遂將藥手按摩目眥俱赤世號赤眼歸宗東坡喜從僧遊故有此句不探黃口兒晉書王澄脫衣上樹探鵲鷇而弄之劉琨謂澄外雖散朗而內實動俠以此處世難得其死家語曰孔子見羅雀者所得皆黃口小雀曰大雀善驚而難得小雀貪食而易得北史崔悛傳崔暹啓悛竊言文襄帝為黃口小兒解公頭上巾一洗七年錙昭明太子作陶淵明傳曰取頭上葛巾漉酒李太白詩豈負頭上巾沈休文新安江水詩曰紛吾隔泥滓豈假濯衣巾願以潺湲水沾吾纓上塵選詩京洛多風塵素衣化成緇緇黑色也蘇公謫居黃州凡七年為庾塵所汚多矣至潔而納汚左傳曰川澤納汚此水真吾師老杜詩痛飲真吾師須公曉二子列子曰因往曉之司馬遷書曰以曉左右人自窮非詩歐公作梅聖俞詩集序曰非詩之能窮人殆窮者而後工也兩歐陽不肯作詩故欲以此曉之再次韻蘇公示兩歐陽公詩周魯後謂歐公詩可繼周詩魯頌也曵曵垂天雲壯子曰鵬怒而飛其翼若垂天之雲府中顧長康晉書顧愷之字長康桓溫引為參軍甚見親昵詩意以比趙德麟德麟時簽判頴州按東坡泛頴詩亦曰趙陳兩歐陽同參天人師觀妙各有得共賦涉頴詩風味如麴君開天傳信記曰葉法善與朝士數人會元真觀有人請麴秀才突入坐中少年秀美語論不凡葉疑其非人潛飛小劒擊之應手墮地乃一酒榼中有美醖共飲之皆曰麴生風味不可忘也非公無此客晉書謝安見桓溫既出溫問左右頗嘗見我有如此客否請壽兩山樽漢書樓護傳王邑居樽下稱賤子上壽周禮司尊彛曰其再獻用兩山樽叔季大儒後謂叔弼季默兩歐陽也荀子曰大儒可為三公偏醒亦同醺言其清而不隘老杜詩漁父忌偏醒南史羊侃傳不飲酒而好賔遊終日獻酬同其醉醒心與柏石堅退之詩柏生兩石間章成綺繡文老杜詩揮翰綺繡揚歐公詩亦云東家太守詩尤美組織文章爛如綺按漢哀帝紀止織綺繡多難獨不補少戇今無聞兩句后山自謂也老杜詩多難身何輔漢髙帝紀曰王陵小戇魯論曰四十五十而無聞時無古今異智有功名昏史記平原君贊曰利令智昏後漢馬援傳論曰援戒人之禍智矣而不能自勉於讒隙豈功名之際理固然乎夫利不在身以之謀事則智慮不私已以之斷義必厲云云可使百尺底不作數斗渾四句皆勸公潔身髙退之意前漢溝洫志曰涇水一石其泥數斗詩意謂功名之昏人猶泥之濁水次韻蘇公勸酒與詩五士三不同煩公以詩訴東坡守頴時趙德麟作簽判后山為學官其兄傳道來過而歐陽叔弼季默家居於頴東坡送傳道詩所謂五君從我遊是也兩歐陽以新免母喪不肯作詩后山以持律不飲酒故云三不同強酒古所辭孔藂子曰平原君強子髙酒曰堯舜千鍾孔子百觚古之聖賢無不能飲也吾子何辭焉子髙曰聖賢以道德燕人未聞以飲也后山此句自解其不飲妙語神其吐謂詩可以感鬼神也左傳曰神其吐之乎此句勸兩歐陽作詩也自念每纍人舉扇無我汚兩歐陽以后山不飲酒故不作詩因有纍人之句晉書王導傳導不平庾亮常遇西風塵起舉扇自蔽曰元規塵汚人復使兩歐陽縮手不分付退之祭柳子厚文曰大匠旁勸縮手袖間平生西方社此以下后山自述髙僧慧逺傳劉遺民雷次宗等依逺遊止乃於精舍無量壽像前建齋立誓共期西方樂天詩曰南祖心應學西方社可投努力須自度古詩努力加餐飯遺教經曰當念無常之火燒諸世間常求自度不憂龜九頭法苑珠林云唐趙文信暴死三日復蘇自説閻羅王令引出􅋻信乃見一大龜身一頭九作人語云我為生時好作文章妄引佛經雜揉俗書又誹謗佛法故受此苦肯為語一誤此句本用百丈野狐話而借用謝安傳中語按僧問前百丈云大修行人還落因果無文曰不落因果以語謬故墮野狐趣後百丈為更之曰不昧因果晉書謝安語安語未嘗誤而忽一誤衆異之尋薨頓悟而漸修修一作進從此辭世故楞嚴經曰理則頓悟乘悟併銷事非頓除因次苐進傳燈録圭峯禪師傳曰顯頓悟資於漸修陶淵明詩終身與世辭文選嵆康書曰世故蘩其慮七不堪也公看萬金産寧能一朝具言證果位亦因進修之漸也退之詩指渠相告言此是萬金産兩生文章家此以後屬兩歐陽柳子厚於楊慿書曰丈人以文律通流當世鼎列天下號為文章家夙紀鳴蟬賦歐公有鳴蟬賦又有跋云豫因學書起作賦草它兒一視而過獨小子棐守之不去此兒必能為吾此賦也因以豫之請公堅城壘世説謝胡兒語庾道季曰諸人暮當就卿談可堅城壘兵來後無數前漢閩粵王傳曰漢兵衆強即幸勝之後來益多禮記聘義曰燕與時賜無數次韻蘇公督兩歐陽詩吟聲正可候蟲鳴柳子厚詩門掩候蟲秋東坡詩云欲遣何人賡絶唱滿階桐葉候蟲吟酒面猶須作老兵言二君自可作詩尚何須待我飲邪晉書謝奕嘗逼桓溫飲溫走避之奕遂引溫不真帥共飲曰失一老兵得一老兵豈有文章妨要務文選楊修答臨淄侯箋曰若乃銘功景鍾書名竹帛斯自雅量所畜也豈與文章相妨害哉晉書謝安傳王羲之曰虛談廢務浮文妨要吳志陸抗傳曰無用兵馬以妨要務孰知詩律自前生孰與熟同后山多用孰知字按資治通鑑慕容翰曰且吾孰知步夜干之為人老杜詩曰詩律羣公問王維詩曰宿世謬辭客前生應畫詩向來懷璧真成罪左傳曰匹夫無罪懷璧其罪此句夲用懷寶迷邦之意而借用此語以譬二子不肯出詩未免為纍也未必含光不屢驚此言雖欲自晦而固已駭世矣文選崔子玉座右銘曰曖曖內含光莊子曰列禦寇遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚馬曰惡乎驚曰吾食於十漿而五漿先饋夫內誠不解形諜成光以外鎮人心使人輕乎貴老而􅕖其所患血指汗顔終縮手退之有祭柳子厚文曰不善為斫血指汗顔巧匠傍觀縮手袖間此懷端復向誰傾老杜詩曰一生襟抱向誰開太白詩曰君心不肯向人傾次韻蘇公題歐陽叔弼息齋行者悲故里漢書髙祖紀遊子悲故鄉居者愛吾廬陶淵眀詩吾亦愛吾廬生須著錐地莊子曰堯舜有天下子孫無置錐之地何賴汗牛書柳子厚陸文通墓表曰其為書處則充棟宇出則汗牛馬丈室八尺床稱子閉門居唐顯慶中王玄䇿使西域至毗耶離城維摩居士石室以手板縱橫量之得十笏故名方丈維摩經云即以神力空其室內唯置一床以疾而卧樂天間居自題詩曰此是白家翁閉門終老處百為會有還龐德公所謂趣舍行止亦人之窠穴也且各得其栖宿而已一足不願餘一足字見上注左太沖詠史詩曰飲河期滿腹貴足不願餘紛紛老幼間失得了懸虛人生自幼逮老或得或去得失皆歸於一空也客在醉則眠聽我莫問渠南史陶淵明傳淵明嘗曰我醉欲眠卿可去東坡有詩及是曰醉中有客眠何害須信陶濳未苦賢論勝巳絶倒絶倒見上注句妙方愁豫楚辭目眇眇兮愁豫此借用自恨其詩之不如也竹几無留塵選詩巢幕無留燕此用其語律霜畦有餘𬞞老杜詩霜中登故畦莊子曰鼠壤有餘𬞞相從十五年不為食有餘用史記馮歡事退之招楊之罘詩曰前陳百家書食有肉與魚時須一俯仰君可待蘧蒢説文曰蘧蒢粗竹席也王介甫詩云窗明兩不借榻靜一蘧蒢次韻蘇公竹間亭絶句后山自注云是夕公畫枯木竹裏髙亭燈燭光老杜詩竹裏行厨洗玉盤又詩今夕復何夕共此燈燭光今年復得杜襄陽晉杜預嘗鎮襄陽今以比蘇公倐看老蓋千年後謂畫枯木老杜覔松栽詩曰欲存老蓋千年意為覔霜根數寸栽更想霜林百尺強因以屬蘇公南史王規傳曰王威明千里絶足百尺無技真俊人也老杜詩四松初栽時大抵三尺強算家以有餘為強寄參寥吳中詩僧道潛自號參寥子平生西方願西方社見上注擺落區中緣淵明詩曰擺落悠悠談謝靈運詩曰緬邈區中緣惟於世外人相從可忘年南史江揔傳張纘等與為忘年交道人貫公徒相識幾生前老杜詩贊公湯休徒早作步兵語晉阮籍為步兵校尉鍾榮詩品曰籍時雖無雕琢之巧而詠懷之作以陶冶性靈幽致言在耳目之內情寄八荒之表洋洋乎會於風雅矣晚參雲門禪雲門大師文偃見傳燈録拾䇿孤山下一室頗蕭然孤山在錢塘昭明太子陶潛傳曰環堵蕭然林昏出幽磬竹杪橫踈煙老杜詩林昏罷幽磬孫何詩秋磬出踈林昨曰寄書至坐想參寥泉東坡嘗作參寥泉銘序曰豫出守錢塘參寥子在焉卜智果精舍居之鑿石得泉加洌乃名之參寥泉此泉如此公遇物作清妍退之月池詩若不妬清妍却成相映燭一别今幾時緑首成白顛後漢蔡雍傳曰華顛胡老子亦憐我老我豈要子憐老杜詩不聞八尺常衆目憐會逢萬里風一繫五湖船老杜詩安得萬里風又詩永繫五湖舟按南史宗慤曰願乘長風破萬里浪國語曰范蠡遂乘輕舟以浮於五湖酌我巖下水咽子山中篇東坡詩云吾詩堪咀嚼聊送别酒燕北渚南蕩不可度北渚風浪生老杜詩春江不可度二月已風濤又詩牛女年年渡何曾風浪生向來狐兔迹已復蛟鼉鳴文選張孟陽詩云狐兔窟其中宋書五行志曰吳孫亮初公安有白鼉鳴東襌東阡急雨不成泥老杜詩急雨梢溪足又詩山雨不作泥度密穿青取徑微歐公詩一徑入蒙密已聞流水聲行穿翠篠盡忽見青山橫老杜詩微徑不復取邂逅無人成獨往詩曰邂逅相遇適我願兮莊子德充符注曰夫心之全也遺身形忘五藏忽然獨往而天下莫能離殷勤有月與同歸老杜詩昨夜月同行八月十日二首一夢人間四十年只應炊竈固依然異聞集云道士吕翁經邯鄲道士邸舍中有少年盧生自歎其貧困言訖即思寐時主人方蒸黃粱為饌翁乃探囊中枕以授之生夢自枕竅入其家見其身富貴五十年老病而卒欠伸而悟吕翁在傍主人炊黃粱尚未熟又退之詩云閭里故依然兩官不辦一丘費言俸薄不辦買山錢也時后山再為學官班固敘傳班嗣曰棲遲於一丘則天子不易其樂五字虛隨萬里船言空有詩名播於異域也北夢瑣言杜荀鶴詩只將五字句用破一生心賈島哭孟東野詩云塜近登山道詩隨過海船老杜詩下臨不測江中有萬里船又人生七十今強半老去光隂已後身老杜詩人生七十古來稀更欲置身須世外世間元自不關人樂天詩應須繩墨機關外安置踈愚鈍滯身又云置心世事外無喜亦無憂迎新將至漕城莫歸遇雨早投林野違風雨晚傍塵沙飽送迎言出處勞逸之異也張華鷦鷯賦曰違鍾岱之林野老杜詩塵沙傍蜂蠆又詩徴君晚節傍風塵又詩萬里巴渝曲三年實飽聞前漢韓信傳趨拜送迎却愧兩街屠販子卧聽車馬過橋聲從俗疲苦反不如市人之安逸也東坡詩識君拄杖過橋聲即事老覺山林可避人魯論曰與其從避人之士也豈若從避世之士哉正須麋鹿與同群潘嶽關中記曰辛孟年七十與麋鹿同羣遊世謂之鹿仙老杜云全生麋鹿羣却嫌鳥語猶多事強營隂晴報客聞此句必有所指北史髙阿那肱曰漢兒多事強知星宿東坡詩不會人間間草木豫人何事管興亡魯直詩竹山蟲鳥朋友語討論隂晴怕風雨齋居青奴白牯靜相宜黃魯直云趙子充示竹夫人詩蓋涼寢竹器憩臂休膝似非夫人之職為名曰青奴傳燈録長沙岑和尚曰貍奴白牿却知有蓋謂水牯牛也此詩借用似言白角簟老罷形骸不自持南史蔡興宗傳沈慶之曰加老罷私門兵力頓闕老杜詩白頭老罷舞猶歌漢書楊王孫傳願進醫藥厚自持一枕西窗深閉閣漢書韓延壽傳入卧傳舍閉閣思過卧聽叢竹雨來時賈島詩宿客未眠過半夜獨聞山雨到來時中秋夜東剎贈仁公盈盈秋月不餘分東坡樂府云三五盈盈還二八漢書律曆志曰商十二月甲申朔旦冬至無餘分葉露懸光可數塵老杜對月詩此時瞻白兔直欲數秋毫此地正須煩一笑要令排户問東鄰柳子厚曰填門排户十五夜月向老逢清節歸懷託素暉文選樂府云昭昭素月明暉光燭我床飛螢元失照老杜詩暗飛螢自照傳燈録鹽官和尚曰日下孤燈果然失照重露已霑衣老杜詩重露成涓滴謝莊月賦佳期可以還微露霑人衣稍稍孤光動沉沉萬籟微文選鴈詩單泛逐孤光此借用莊子顔成子遊曰敢問天籟南郭子綦曰夫吹萬不同而使其自巳也不應明白髮似欲勸人歸老杜月詩能添白髮眀詩意謂頭顱如許尚復俯仰世間為明月所照破也胡士彥挽詞二首元茂晚進違前輩後漢孔融論盛孝章書曰今之少年喜謗前輩平生闕異聞魯論曰子亦有異聞乎吾猶識此老天豈喪斯文魯論曰天之將喪斯文也後死者不得與於斯文也善學家傳業退之詩中郎有女能傳業英詞世不群沈約宋書謝靈運傳論曰英詞動金石老杜詩白也詩無敵飄然思不羣固應譏尚白官序見楊雲漢書楊雄傳雄字子雲或嘲雄以玄尚白而雄解之號曰解嘲注云玄黑色也言雄作玄不成其色猶白故無祿位也老杜詩官序潘生拙后山以楊子云為楊雲亦猶老杜以司馬長卿為馬卿也杜詩嘗云多病馬卿無日起又此地來何晚經年見未頻老杜詩此地生涯晚又云卷軸來何晚薦賢仍睹命有道可辭貧上句言其材雖為當世所知而達不逹則係於命太白詩丈夫睹命報天子當斬胡頭衣錦還列子曰客有言之鄭子陽者曰列禦寇有道之士也居君之國而窮君無乃為不好士乎徒弟三千子史記孔子世家教弟子蓋三千焉聲名四十春老杜詩才名四十年又詩龍飛四十春襄陽耆舊內無復姓龐人晉習鑿齒作襄陽耆舊傳老杜詩為於耆舊內試覔姓龐人謂龐德公也后山詩注卷第三
