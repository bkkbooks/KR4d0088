front:
  text: 后山詩註卷第十二
  hash: sha256:aba1ba366eb939a812e7fc1d245cd527bf24ab1817ec0c24936012f65b7ff4da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_012-1a}
body:
  text: 除官十一月除祕書省正字扶老趨嚴召徐行及聖時端能㡬字正漢書地理志曰㓜者扶老而代其任明皇雜錄劉晏以神童爲祕書正字上問曰爲正字正得㡬字對曰餘字皆正惟朋字未正敢恨十年遲樂天初除知制誥與三舎人中書同宿詩云莫恠不如君氣味此中來校十年遲肯着金根􅍝尚書故實曰韓昶退之子也性闇劣爲集賢校理史傳有金根車昶以誤悉改根爲銀字寧辭乳媪譏南史何承天除著作佐郎年巳老而諸佐郎並名家年少荀伯子嘲之呼爲媪母此用其事金樓子曰梁人呼書卷爲黄媪言其怡神養性如乳媪也此借用其字向來憂畏㫁不盡鹿門期老杜詩鹿門携不遂又云空有鹿門期鹿門在襄陽杜郷里也后山此句言雖免黨錮之憂而失其髙隱本趣題王平甫帖早聞英氣擅家聲晩得諸郎識老成漢書司馬遷云李陵旣生降隤其家聲諸郎謂二子瓬斿可恨治朝無此老却嫌晚進不同生晉書謝混傳混爲劉𥙿所誅宋受禪謝晦謂𥙿曰恨不得謝益壽奉壐紱𥙿曰吾亦恨之使後生不得見其風流足知落筆千言疾謂作文老杜詩集賢學士如堵墻觀我落筆中書堂按曽子固祭平甫文云操紙爲文落筆千字尚想揮毫一坐傾謂作字老杜詩張旭三盃草聖傳揮毫落紙如雲煙未信哲人窮五字謂詩不能窮人檀弓曰哲人其萎乎二難還復以詩鳴世說陳太丘論其二子曰元方難爲兄季方難爲弟退之送孟東野序曰東野始以其詩鳴和李文叔退朝朝流駭汗蒸雙猊退之聖徳詩曰駭汗如雨此借用淮南子曰山雲蒸柱楚潤東坡苔西掖諸公詩曰雙猊蟠礎龍纏棟風捲屯雲散萬蹄陸機詩胡馬如雲屯此借用以言朝士之歸任使䡖衫汚嬌色可令纎手洗春泥東坡詩分無纎手裁春勝王介甫詩春泥滿眼路嶇嶔和謝公㝎雨行逢賣花逢花駐馬尚多情天不違人旋作晴開元天寳遺事曰長安俠少每至春時飾矮馬於花下徃來遇好花則駐馬而飲王仲宣詩人欲天不違何惧不合并不使近詩増𥿄價得知春入鳯凰城郭受與老杜詩春興不知凡幾首衡陽紙價頓能髙劉禹錫詩南山宿雨晴春入鳯凰城酬王立之二首王直方字立之名姓頗見於魯直集中魯直甞有寄立之問梅花詩頓有亭前玉色梅情知不肯破寒開謝無逸溪堂集有題王立之頓有亭詩曰蘇黄两玉人落筆傳九州按南史謝晦傳時謝混風流爲江左第一宋武帝曰一時頓有两玉人耳王立之家有蘇東坡黄䂊章元祐中所題字因取宋武帝語以名亭云似憐憔悴兩公客獨倚東風遣信来两公謂蘇黃也后山蓋蘇黄之客魏志曰馬超遣信請和又世說林公詣謝東陽朗時新病起體未堪勞母王夫人在壁後遣信令還又重梅雙杏巧相将不為逰人只自芳家語曰蘭生深林不以無人而不芳應怪詩翁非老手相逢不作舊時香詩翁后山自謂老手謂蘇黄歐公詩老手尚能工剪裁范諷詩云惟有南山與君眼相逢不改舊時青送謝朝請赴蘇幕好合同黄卷詩云妻子好合此借用文選陸士衡贈曹文熊亦云疇昔之遊好合纒綿情親湏白頭老杜詩童稚情親四十年湏白頭謂不待白頭而情已親胡然落丹墨不坐致公侯丹墨謂簿領北史蘇綽始制文案程式朱出墨入及計帳户籍之法退之詩符師弄刀筆丹墨交横揮此借用山合遮西顧一作沙軟留徐歩魏本云丙藁塗上四字不注潮回趂急流平生胡海興日夜逐行舟老杜詩平生湖海心宿昔具扁舟和謝公㝎觀秘閣文與可枯木斯人不復有累世或可期每於丹青裏一見如平時壞障塵得入慘淡令人悲墨客落欲盡嚴顔終不移老杜詩慘淡壁飛動到今色未塡又云畫色乆欲盡蒼然猶出塵文選傅毅舞賦曰嚴顔和而怡懌世說桓公曰萬石橈弱常才有何嚴顔難犯朽老莫使年朽老見上注左傳曰絳縣老人有與疑年使之年石心烏銅皮晉書夏統傳賈充曰此呉兒木人石心也念此猶少作未盡氷霰姿文選楊修荅臨淄王牋云修家子雲老不曉事強著一書悔其少作北枝把異鵲老杜詩棲枝把翠梧莊子曰莊周遊乎雕陵之樊覩一異鵲意定了不疑言無繞樹未安之態東坡畫鴈詩野鶩見人時未起意先改君於何處看得此無人態惜㢤不得語胷次㡬興衰用賈誼服不能言之意文選王仲宣詩惜㢤空爾爲其字本出史記宓不齊傳荘子曰喜怒哀樂不入于胷次一爲要貴役可復辭畫師唐書閻立本傳閤外傳呼畫師閻立本羞悵汗流隠奥雖可惜塗抺復見遺言與可不爲要貴所役聊自寄其意爾畫在祕閣世固不多見而亦免塗抺之汚文選七命曰吞響乎幽山之窮奥李善注曰奥隱䖏也盧仝示添丁曰怱來案上翻墨汁塗㭑詩書如老鵶謝侯名家子感慨形苦詞庾信哀江南賦云不無危苦之詞豈惟語畫工勁特頗似之何當𥙷諌列一吐胷中竒退之代張籍書曰何由致其身於其人之側一吐出胷中竒乎和饒節詠周昉畫李白真君不見浣花老翁醉騎驢熊兒捉轡驥子扶金華仙伯哦七字好事不復千金模成都浣花溪老杜入蜀所居熊驥杜之二子也甞有詩云熊兒幸無恙驥子最怜渠魯直有老杜浣花醉圖詩云浣花酒舡散車騎野墻無主看桃李宗文捉轡宗武扶落日蹇驢䭾醉起后山謂魯直詩語已自寫生不湏捐金模畫也金華見上注老杜詩云諸公乃仙伯青蓮居士亦其亞斗酒百篇天所借李太白荅湖州迦葉司馬問白是何人詩曰青蓮居士謫仙人酒肆藏名三十春老杜詩李白一斗詩百篇又詩天廐真龍此其亞英姿秀骨尚可似逸氣髙懐那得畫後漢二十八將論曰英姿茂績老杜八哀詩曰復見秀骨清逸氣見上注周郎韻勝筆有神畫㫁云周昉窮丹青之妙畫羙人子女爲古今冠絶張彦逺畫記云張懐素每云呉道玄之畫下筆有神觧衣槃礴未必真莊子曰宋元君將畫圖衆史皆至䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舎公使人視之則解衣槃礴嬴君曰可矣是真畫者也一朝冩此英妙質似悔只識如花人太白詩金屏笑坐如花人醉色欲盡玉色起分明尚帶金井水摭言曰太白在翰林應詔草白蓮花序及宫詞十首時方大醉中貴人以水沃之稍醒白於御前索筆一揮文不加點玉色見禮記玉藻老杜詩硯寒金井水按荊州記益陽有金井烏紗白紵真天人不用更着山巖裏晉書顧愷之爲謝鯤像在石巖裏云此子冝置丘壑中平生潦倒飽丘園禁省不識將軍尊袖手猶懐脫靴氣豈是從来骨相屯文選西征賦曰禁省鞠爲茂草唐書李白傳曰白甞侍帝醉使髙力士脫韡力士素恥之擿其詩以激楊貴妃帝欲官白妃輙沮止退之詩自歎虞翻骨相屯仰視雲空鴻鵠舉眼前紛紛那得顧用嵇康詩目送歸鴻之意韓詩外傳曰黄鵠一舉千里老杜詩紛紛輕薄何須數是非榮辱不到處正恐朝来有新句魯直浣花醉圖詩曰兒呼不蘇驢失脚猶恐朝來有新作勿言身後不要名尚得呉侯費百金身後名見上注晉書謝安傳曰餚饌亦屢費百金江西勝士與長吟饒節字徳操江西人後爲僧名如璧法嗣頴州薦福月晉書羊祜登峴山曰由來賢達勝士登此多矣後來不憂身陸沉荘子曰方且與世違而心不屑與之俱是陸沉者也是其市南宜僚耶注云人中隱者是無水而沉也謝王立之送花過雨生泥風作塵馬蹄聲裏度芳辰城南居士風流在時送名花與報春時送一作尤遣一作時遣老杜詩頭風吹過雨又詩百舌來何䖏重重只報春此借用李白詩名花傾國两相歡和參寥明彂覓隣家花二首短墻春色過隣家行不逢人只見花唐人王駕詩曰蛱蝶飛來過墻去應疑春色在隣家下句用崔護事見上注新緑葱葱紅蔌蔌魯直詩黄鸝惟見緑葱葱元稹連昌宫詞曰風動落花紅蔌蔌却成粧面映青紗太白烏夜啼曰機中織錦秦川女碧紗如煙隔䆫語又滿城桃李一番新深院繁枝别得春從此詩翁有新語不湏紅濕少城闉老杜詩曉看紅濕處花重錦宫城又云更歷少城闉和張奉議贈舅氏龐大夫朝下公門不曵裾晉書龔玄之未曽至公門曵裾見上注身寛心逺等林居淵明詩心逺地自偏傳家聲烈三公後三公謂龐相國籍退之詩不見三公後貯腹平生萬卷餘北史崔悛傳胷中貯千卷書老杜詩年少方萬卷餘藤架倚春聴語鳥老杜詩露裛思藤架顧悲歌云臨春風聽春鳥别時多見時少石池迎日數遊魚柳子厚石潭記曰潭中魚可百許頭皆若空遊無所依日光下徹影布石上王介甫詩行數魚儵賔共樂人言酷類牢之舅晉書何無忌傳桓玄曰何無忌劉牢之甥酷似其舅未有新詩錦不如老杜詩白髪絲難理新詩錦不如和舅氏公退言懐追陪強韻愧難過應接前聞覺未多南史王筠傳能用強韻前聞見上注老杜詩衰慙應接多盛禮每虚摩詰席唐書王維字摩詰名盛於開元間豪英貴人虚左以迎舊詞猶可雪兒歌北夢瑣言韓定辭詩云麗詞堪與雪兒歌馬式問其事對曰雪兒李密愛姫毎賔朋文章有竒麗者付雪兒恊律歌之手開新徑延徐歩眼趂髙梧上碧蘿風雨入懐泥滿眼時湏好語滌煩痾王介甫詩春泥滿眼路嶇嶔欽聖憲肅皇后挽詞二首神宗后向氏建中靖國元年正月崩三月加謚五月葬永裕陵二妃端恊帝神宗在頴邸治平三年納后爲妃魏収後魏書曰二妃嬪媯虞道克昌任姒配周周室用光二妃謂堯女娥皇女英也恊帝借用舜典字三后共興周三后謂太姜太任大姒以比國朝慈聖曹后宣仁髙后及欽聖皆甞臨朝有聖徳决䇿天同力收功語不流元符三年正月哲宗上僊太后夜半定䇿翌日召徽考自端邸入立廷臣皆不預焉蘇子由作宣仁謚冊文曰大䇿中定與天爲謀羅隱詩曰時來天地皆同力語不流謂大臣帖服無敢流言如誣謗宣仁時也權宜從殺禮太后不敢當山陵之禮止稱山園詩曰殺禮而多昬此借用老杜詩權宜借宼頻末命尚深憂書曰皇后慿玉几導揚末命深憂謂以天下爲憂欝欝佳城閉終天配壽丘佳城見上注文選顔延年宋元后哀䇿文曰夷體壽原注漢景帝作壽陵云云此借用以指𥙿陵又復辟先元約元符三年正月太后權同處分軍國事候祔廟禮畢還政至七月一日手書可不候祔廟止俟靈駕發引罷同聽斷書白朕復子明辟長年損積憂文選陸士衡歎逝賦曰嗟人生之短期孰長年之能執禮記文王世子注云文王以憂勤而損壽此借用傳曰積憂薫心春移栢城仗樂天陵園妾詩曰栢城盡日風蕭瑟仙去帝郷遊荘子曰乗彼白雲至於帝郷徳並塗莘敏退之王用誌銘曰蜀塗莘摯正妃之門謝承三夫人箴曰塗山翼夏有莘翼殷蓋謂禹娶塗山氏女湯娶有莘氏女老杜詩學並盧王敏功臨馬鄧優後漢明徳馬后肅宗尊爲太后常與帝旦夕言道政事和熹鄧后迎立殤帝太后臨朝又定䇿立安帝千秋修故事車馬戒如流後漢馬后紀太后語曰前過濯龍門上見外家問起居者車如流水馬如㳺龍但絶歲用以黙愧其心文選樂府曰車馬若川流欽慈皇后挽詞二首欽慈皇后陳氏徽宗之母元祐四年六月崩建中靖國元年正月追尊爲皇太后三月謚曰欽慈五月陪葬永裕陵祔太廟神宗室奉安神御于景靈西宫坤元殿二桃從孝祀禮記注二祧謂文武廟也文武俱在應遷之例特爲功徳而留此借用以比神宗五典載虞嬪堯典曰釐降二女於媯汭嬪于虞堯典即五典之一顯號追先志建中靖國元年正月欽聖太后崩遺詔追尊皇太妃陳氏爲皇太后隂功見後人后蓋京兆人贈太保祁王懐徳之女懐徳沉勇有功於國後漢鄧后傳曰叔父陔言常聞活千人者子孫有封凢訓修石河歲活數千人天道可信家必蒙福承顔親不待魯論色難注曰承順父母顔色爲難韓詩外傳曾子曰子欲養而親不待罔極痛如新詩曰欲報之徳昊天罔極未有如椽筆光容可得陳晉書王恂夢人以大筆如椽與之云此當有大手筆事俄而孝武崩哀冊謚議皆珣所草又靈岳占佳氣琳宫閟寳衣膺期符寳曆錫號煥皇扉靈岳謂嵩山事具徽宗御製西京崇福宫記大抵謂后被遇神宗有禱于嵩山崇福遂生徽宗乃詔洛師侈宫楹而大之真誥恊昌期曰登玉霄琳房皇扉謂堯毋門日月堯同數后以元豐五年十月十日誕生徽宗皇帝漢書武帝鉤弋夫人傳任身十四月生昭帝上曰昔堯十四月而生命其門曰堯母門謳歌啓與歸事見孟子傷心五雲去不見六龍飛孝經援神契曰徳至山陵則景雲出景雲五色雲也老杜重經昭陵詩云再窺松栢路還見五雲飛六龍見易乾卦謂徽宗登極大行皇太后挽祠二首代人作欽聖太后徳名三后並曹后髙后并后爲三皆有聖徳母道兩朝尊兩朝謂哲廟徽廟勇决髙千古危疑定一言謂㝎䇿之謀出於獨㫁章惇異議竟不得行老杜詩勇决冠垂成文選王元長䇿秀才文曰餘烈千古先期還政事隆禮改山園并見上注哀挽西郊道雲愁晝亦昬西郊道謂徃西京祔葬周以洛爲東郊於宋朝則國西又扶日行黄道扶日見上注晉志云黄道日之所行也魯直王文恭挽詩云賔日行黄道乗雲上紫微莊子曰乗彼白雲至于帝郷晉志云紫微大帝之坐天子之常居也憂勞形末命末命見上注恭儉見陳衣周禮春官司服曰大䘮廞衣服注廞陳也禮記䘮大記曰凢陳衣者實之篋布徳開刑網禮記月令云命相布徳和令漢書刑罰志云禁網踈闊和戎戢武威左傳魏絳謂和戎有五利老杜詩丕承戢武威要知懐惠處行路涕交揮懐惠見魯論家語敬姜曰二三子無揮涕追尊皇太后挽詞二首代人作欽慈太后彤管書隂教靜女詩傳云古者后夫人必有女史彤管之法箋云彤管筆赤管也禮記曰后修女順母道也注云母者施隂教於婦黄圖載徳容黄圖天子之圖籍如三輔黄圖是也周禮九嬪掌教九御婦徳婦言婦容婦功漢宫先夢日漢書景帝王后傳武帝方在身時后夢日入其懐代邸近乗龍謂徽宗自端邸即位漢書薄姬傳髙祖召欲幸之對曰昨暮夢龍㩀妾胷上曰是貴徴也吾爲汝成之遂生文帝初封代王文帝紀曰奉天子法駕迎代邸易乾卦曰時乗六龍以御天也喬岳蔵遺服謂嵩山崇福宫見上注青門啓故封后以元祐九年葬於開封縣多慶院之東至是改葬老杜詩哀挽青門去按三輔黄圖曰長安城東出南頭第一門曰覇城門或曰青門此借用退之大行皇后挽詞曰因山託故封從今祠百世東坡髙太后挽詩云原廟故應祠百世先王何止活千人清廟配商宗周頌注曰清廟者祭有清明者之徳之宫也商宗謂神宗商頌曰烈文祀中宗玄鳥祀髙宗又典冊尊徽號欽慈煥徳名徽號字見禮記後人借用楊子曰君子徳名爲㡬終身聞舜慕孟子曰大孝終身慕父母五十而慕者予於大舜見之矣歷月見堯生見上注世說外國貢竒香一著人則數月不歇兵衛嚴天仗車輿轉帝城故奩脂澤在哀感倍皇情後漢光烈隂后紀明帝夢先帝太后如平生歡明旦上探視太后鏡奩中物感動悲涕令易脂澤装具左右皆泣莫能仰視王察院挽詞二首監察御史王回也施報終何在窮通共一空史記伯夷傳曰天之報施善人其何如哉兩言成益友左傳鄭子太叔卒晉趙簡子哭甚哀曰黄父之㑹夫子語我九言云云此用其意管輅别傳曰諸葛樂與輅别戒以二事言卿性樂酒雖温克然不可保寧當節之卿有水鏡之才所見者妙禍如膏火不可不慎此借用其事史記平原君傳毛遂曰從之利害两言而决魯論曰益者三友百代仰高風孟子曰百世之下聞者莫不興起文選陸機漢功臣贊曰悠悠遐風千載是仰夏侯湛東方朔畫贊曰想先王之髙風終始無遺恨老杜詩毫髪無遺恨㤙榮託至公建中靖國元年正月王覿曽肇等奏故監察御史王回學術深醇氣守剛毅䑓官言回交結浩遂除名勒停送本郷居住陛下嗣位命爲監察御史方始供職得病而亡不得攄發素藴以報陛下眷遇之意云云詔𥙷一子太廟齋郎老杜詩恩榮同拜手不應埋直氣㑹見吐長虹曹子建七啓曰慷慨則氣成虹蜺又良貴官何與孟子曰人之所貴者非良貴也趙孟之所貴趙孟能賤之長年死不亡老子曰死而不亡曰壽身湏禦魑魅左傳曰投之四裔以禦魑魅老杜詩從來禦魑魅多爲才名誤氣已懾豺狼後漢張綱傳豺狼當道安問狐狸不盡胷中藴猶堪地下郎地下郎見上注豈惟吾道慶編簡亦輝光編簡謂史䇿贈呉氏兄弟三首一長未可衆人師柳子厚荅韋中立書曰假令有取爲衆人師且不敢况敢爲吾子師乎萬里元随八馬蹄列子曰周穆王肆意逺遊命駕八駿之乗升崐崙之丘賔于西王毋老杜詩崐崙虞泉入馬蹄不觧征西諸子弟却憐野鶩厭家雞南史王僧䖍傳庾征西翼書少時與右軍齊名右軍後進庾猶不分在荊州與都下人書云小兒軰賤家雞皆學逸少書野鶩見上注又才随年盡不重竒每愧諸郎索近詩旋作七言供一笑自癡那得使人癡才盡見上注歐公詩云詩篇自覺隨年老玉䑓新詠明月篇曰秀色隨年衰又得失虽妍只自知略容千載有心期老杜詩文章千古事得失寸心知文選陸機文賦序曰妍虽好惡可得而言退之詩開卷讀且想千載若相期選詩中道遇心期后山此意謂世無知音特與古人相期於千載之上耳恨君不見金華伯金華伯謂魯直見上注東坡詩恨君不識顔平原何處如今更有詩退之詩風霜滿靣無人識何䖏如今更有詩和吴子副智海齋集法筵應供頼三車文殊云法筵龍象衆三車謂羊鹿牛以比三乗事見蓮經堆案抽身輟筭沙嵆康書曰人間多事堆案盈几樂天詩抽身去得無東坡詩笙歌叢裏抽身出永嘉證道歌云入海筭沙徒自困度暑好風開樂國淵明詩微雨從東來好風與之俱樂國謂西方極樂國脫塵新句散餘霞謝玄暉詩餘霞散成綺僧奩手汗空留迹佛几堆紅拂委花蓮經曰香風時來吹去委花更雨新者趙師民詩委地露花啼暁恨客舎黄粱應未熟且容秋蝶夢南華黄粱見上注莊子曰昔者荘周夢爲蝴蝶挧挧然胡蝶也按通典唐天寳元年封莊子號南華真人舅氏新齋堂因竹栢有花與歲時䦨欲作中年計長留别眼看管子曰百年之計種之以木别眼謂不以凡花視之也色侵杯酒重老杜竹詩色侵書帙晩又詩重碧拈春酒子熟落聲乾李商隱詩霜野物聲乾只有林園主相期耐歲寒退之詩山翁自是園林主上晁主客后山自註云時與無咎對酒及門而閽者辭焉两䟽父子共含香不獨家榮國有光两䟽見上注應劭漢宫曰尚書郎含雞舌香䞉欲展懐因問疾老杜詩展懐詩誦魯問疾見上注孰知相對只衘觴此句蓋用竹林阮籍院咸事以比二晁晉書阮咸傳云諸阮皆能飮太白詩無由共衘觴年侵身要兼人徤節近花須滿意黄老杜詩年侵腰脚衰漢書韓信傳身辱於跨下無兼人之勇從昔竹林須小阮只今未可棄山王小院謂阮咸籍之兄子以比無咎山王謂山濤王戎后山以自比沈約宋書曰顔延之作五君詠以述竹林七賢山濤王戎以貴顯𬒳黜東坡詩他年五君詠山王一時數和鮮于大受崇先觀餞别曽元忠此别未爲逺兩都東西州情親有乖隔江湖成阻脩两都謂東汴西洛班固有两都賦退之序曰人之於南海者若東西州焉詩云道阻且脩后山意謂相去雖近而别意則逺世說袁彦伯爲謝安南司馬旣自悽惘歎曰江山遼落居然有萬里之勢脫塵度翠密徐行當㝷幽各有惜别懐共此一日留退之詩此日足可惜此酒不可甞捨酒去相語共分一日光意合豈待約酒盡不更求闕詞固未可忍手亦何猶后山自注云是日題壁坐有黄冠師未觧逍遥遊退之送張道士詩云臣非黃冠師南史劉歆年十二讀莊子逍遥篇曰此可解耳客問之隨問而荅皆有條理興來我與共醉罷君當休南史陶潜傳若先醉便語客我醉欲眠卿可去僧房火可親此樂行且謀老杜詩隨意宿僧房退之詩燈火稍可親萬事自紏紛髙懐元一丘老杜詩萬事糾紛猶絶粒答王立之毎逢無可語暫阻即相求前軰詩相見又無事不來還憶君晉書阮修意有所思率爾蹇裳不避晨夕至或無言但欣然相對解卷初増氣開懐得寫憂詩云以寫我憂昬煙宜帶雨風樹更添秋絶唱猶多和先衰却後酬文選宋玉對楚王問曰客有歌於郢中者其曲彌髙其和彌寡又和過田承君寺古專宜僻居深自作幽退之詩僻寺境還幽興來寧憚逺句苦不縁愁太白詩白髪三千丈縁愁似箇長逸氣無前足此以馬爲喻老杜馬詩云所向無空闊無前見上注虚懐不繋舟老杜詩虚懐任屈伸莊子曰泛若不繋之舟虚而遨遊者也逢人難晤語冒雨亦相求贈石先生多方作計老如期魯直詩萬端作計身愁苦劉禹錫詩與老無期約到來如等閑百疾交攻遽得衰嵆叔夜養生論曰積損成衰從衰得白晚有勝縁逢異士勝縁見上注後漢种暠傳山澤不必有異士異士不必在山澤生湏快意闕前知謂丈夫生當快意恨知之晚也晋書周勰曰人生㡬時但當快意耳迫人鬢頷紛紛白樂天詩滿頷白髭鬚臨事迴迃種種遲漢書翟方進号遲頓不及事分我刀圭容不死退之詩金丹别後知傳得乞取刀圭救病身他年鶴馭得追随江文通别賦曰駕鶴上漢驂鸞騰天送晁無咎守蒲中一麾出守自多竒顔延之五君詠阮咸詩云屢薦不入官一麾乃出守四十專城古亦稀古樂府曰四十専城居老杜詩人生七十古來稀觧榻坐談無我軰用徐穉事見上注老杜詩髙人屢解陳蕃榻魏志郭嘉說太祖曰劉表坐談客耳晉書劉惔傳桓温問惔㑹稽王談更進耶惔曰極進然第三流耳温曰第一復誰惔曰故在我軰鋪筵踏舞欠崔徽元稹崔徽歌序曰蒲女崔徽善舞有容艶崔敬中甞使蒲徽一見爲動敬中使罷言旋徽不得從狂累月樂天詩妓筵勉力爲君鋪又曰只是堂前欠一人退之詩艶姬踏筵舞的桃作劇聊同俗的桃當是河中故事樂天詩呉兒多白晳好爲蕩舟劇遇事當前莫後㡬定命録魏元忠有善相者謂之曰公當位極人臣然命多蹇剥時有憂惧不足爲虞但可當事便行聞言則應元忠累遭譴責憶相者之言言事未甞屈其志文選嵆康書曰遇事便發魏志荀彧傳曰袁紹失在後機無咎起於謫籍自吏部郎中出守故以魏元忠事勸之聖世急才常患少后山自云神宗御筆曰治世常患難得人才棧羊篩酒待公歸棧羊本俗間語東京記曰普寜坊有棧羊務毛詩釃酒有藇注以筐曰釃以藪曰湑題明彂髙軒過圖髙軒過李賀所作見上注宗室士陳字明發滕王蛺蝶江都馬王建宫詞曰内中數日無呼喚傳得滕王蛺蝶圖按畫㫁云嗣滕王湛然畫蛺蝶雀兒曲盡精理歐公歸田録以爲滕王元嬰誤矣老杜詩國朝以來畫鞍馬神妙獨數江都王按名畫記江都王緒霍王元軌之子善書畫鞍馬擅名一紙千金不當價老杜詩未覺千金滿髙價尹文子曰魏王得玉召王工問其價玉工曰此無價以當之異才天縱非力能畫工不是甘為下南史王僧䖍論書曰孔琳之書天然縱放唐書王維善畫繪工以爲天機所到學者不及也老杜詩畫師不是無心學今代風流數大年含毫落筆開山川朱芾畫史曰宗室令穰字大年作小軸甚清麗文選陸士衡文賦曰或含毫而邈然忽忘朽老壓塵底却怪鳬鴻堕目前朽老謂木石見上注老杜畫障歌堂上不合生楓樹怪底江山起煙霧此用其意爾来八二復秀出八二當是明彂行第李渉詩云唐氏一門今五龍聲華殷殷皆如鍾就中十一最年少别有俊氣横心胷后山云八二亦十一之比也萬里河山才咫尺見上注眼前安得有突兀復似天地初開闢老杜畫鶻行初驚無拘攣何得立突兀尚書考靈耀曰天地開闢耀滿舒光明䆫冩出髙軒過便逐愈湜聞吟哦晚知書畫真有益却悔歲月来無多世說戴安道好畫范宣子以爲無用戴爲范畫南都賦圖范看畢咨嗟以爲有益然始重畫退之詩來日苦无多官禁脩嚴㫁過訪時於僻寺逢稅鞅周禮士師之職二曰官禁李商隱詩嚴城清夜㫁經過僻寺見上注老杜詩野稅林下鞅秀潤如行琮璧間世說曰裴叔則如玉山上行光映照人周禮太宗伯以蒼璧禮天以黄琮禮地清明似引星辰上禮記曰清明在躬曾南豐作老蘇哀辭曰其輝光明白若引星辰而上也按法言曰眀星皓皓者已也引而髙之者天也憂悲愉怢百不平退之送髙閑序曰徃時張旭善草書不治它技喜怒窘窮憂悲愉怢怨恨思慕酣醉無聊不平有動於心必於草書發之河擘太華東南傾此句言攄寫之俊快也郭縁生述征記曰華山與首陽本同一山河神巨靈擘開太華以通河流平生秀句寰區滿掇拾餘棄成丹青王立之詩話載張嘉甫晁無咎髙軒過圖題䟦頗言明發兼詩畫之工老杜作王維詩云最傳秀句寰區滿平湖逺嶺開精神斗覺文字生清新退之詩斗覺霜毛一半加機雲别傳曰雲善屬文清新不及機未許二豪今角立二豪謂滕王江都劉伶酒徳頌曰二豪在側焉如蜾臝之與螟蛉後漢徐穉傳曰角立傑出要知旁有衛夫人衛夫人蓋尚書郎李充母以夫姓自稱李衛王羲之甞從學書或云明發之妻亦能畫故以衛夫人比之二豪謂大年明發送歐陽叔弼知蔡州頴隂為别悔怱怱十載相望信不通老杜詩所思礙行潦九里信不通晚遇聖朝收放逸旋遭官禁限西東法華經曰汝是放逸之人此借用其字官禁見上注老杜詩岸髙瀼滑限西東又為太守專淮右䞉喜郎君類若翁若翁猶言乃翁謂六一居士亦甞知蔡州蔡州在淮西梅柳作新詩興動老杜詩天邊梅柳樹相見㡬囬新又云東閣官梅動詩興可令千里不同風語林曰陳元方云周公孔子異代而出周旋動靜萬里同風傳燈録玄沙傳雪峯曰君子千里同風送晁堯民守徐中年為别不堪憂束髪登門到白頭南省望郎仍國士漢建尚書百官府名曰南宫蓋取天上南宫太微之象退之孔戣墓誌曰臣與孔戣同在南省李商隱詩望郎臨古郡孫樵髙郎中誌銘曰鴛行望郎錦川星使史記豫讓傳曰智伯以國士待我東方千騎更吾州古樂府曰出東南隅行曰東方千餘騎夫壻居上頭東坡守徐和范祖禹詩云吾州下邑生劉季誰數區區張與李后山徐人故云吾州彭翁老壽終遺骨徐州彭城縣故大彭國彭祖所封也彭門記曰殷之賢臣彭祖顓頊之玄孫至殷末壽及七百歳今墓猶存燕子飛來只故樓燕子樓見上注知已難逢身易老頌公置醴我歸休置醴見上注莊子許由曰歸休乎君子無所用天下爲送王㝎國通判河南孤身十載客都城退之詩孤身無所齎此句后山自述言十年前未得官時白社雙林諱姓名白社雙林見上注諱姓名用後漢書韓伯休意授館不為他日計國語曰司里授館此借用退之鄭羣墓誌曰俸禄入門與其所過逢飲酒舞歌連日夜不厭或分絜以去一無所愛惜不爲後日毫髪計留也觧衣真岀故人情用須賈綈袍事見上注韓信曰漢王解衣衣我翹材必定延枚叟言爲相君所知西京雜記公孫弘開東閣分三館一曰欽賢次日翹材次曰接士文選謝惠連雪賦曰召鄒生延枚叟宣室終湏記賈生言爲人主所知事見上注萬里歸来髪如漆㝎國編置全州元符三年得歸老杜詩汝伯何由髪如漆了知句畫更新清年顔不衰詩句字畫當亦稱是老杜詩更得新清否還知對屬忙后山詩註卷第十二終
