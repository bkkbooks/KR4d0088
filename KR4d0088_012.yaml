front:
  text: 后山詩注卷第十二
  hash: sha256:cbe5fac5a545c3ecf9eb2c8d608a2693554726b04b9cbecca52be1c292b5a81e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_012-1a}
body:
  text: 除官十一月除祕書省正字扶老趨嚴召徐行及聖時端能幾字正漢書地理志曰幼者扶老而代其任明皇雜録劉晏以神童為祕書正字上問曰為正字正得幾字對曰餘字皆正惟朋字未正敢恨十年遲樂天初除知制誥與三舍人中書同宿詩云莫怪不如君氣味此中來校十年遲肯著金根􅍝尚書故實曰韓昶退之子也性暗劣為集賢校理史傳有金根車昶以誤悉改根為銀字寧辭乳媪譏南史何承天除著作佐郎年巳老而諸佐郎並名家年少荀伯子嘲之呼為媪母此用其事金樓子曰梁人呼書卷為黃媪言其怡神養性如乳媪也此借用其字向來憂畏斷不盡鹿門期老杜詩鹿門携不遂又云空有鹿門期鹿門在襄陽杜鄉里也后山此句言雖免黨錮之憂而失其髙隱本趣題王平甫帖早聞英氣擅家聲晚得諸郎識老成漢書司馬遷云李陵既生降隤其家聲諸郎謂二子瓬斿可恨治朝無此老却嫌晚進不同生晉書謝混傳混為劉𥙿所誅宋受禪謝晦謂𥙿曰恨不得謝益壽奉璽紱𥙿曰吾亦恨之使後生不得見其風流足知落筆千言疾謂作文老杜詩集賢學士如堵墻觀我落筆中書堂按曽子固祭平甫文云操紙為文落筆千字尚想揮毫一坐傾謂作字老杜詩張旭三杯草聖傳揮毫落紙如雲煙未信哲人窮五字謂詩不能窮人檀弓曰哲人其萎乎二難還復以詩鳴世說陳太丘論其二子曰元方難為兄季方難為弟退之送孟東野序曰東野始以其詩鳴和李文叔退朝朝流駭汗蒸雙猊退之聖德詩曰駭汗如雨此借用淮南子曰山雲蒸柱楚潤東坡苔西掖諸公詩曰雙猊蟠礎龍纏棟風捲屯雲散萬蹄陸機詩胡馬如雲屯此借用以言朝士之歸任使䡖衫汚嬌色可令纎手洗春泥東坡詩分無纎手裁春勝王介甫詩春泥滿眼路嶇嶔和謝公㝎雨行逢賣花逢花駐馬尚多情天不違人旋作晴開元天寶遺事曰長安俠少每至春時飾矮馬於花下往來遇好花則駐馬而飲王仲宣詩人欲天不違何懼不合并不使近詩增𥿄價得知春入鳯凰城郭受與老杜詩春興不知凡幾首衡陽紙價頓能髙劉禹錫詩南山宿雨晴春入鳯凰城酬王立之二首王直方字立之名姓頗見於魯直集中魯直嘗有寄立之問梅花詩頓有亭前玉色梅情知不肯破寒開謝無逸溪堂集有題王立之頓有亭詩曰蘇黃兩玉人落筆傳九州按南史謝晦傳時謝混風流為江左第一宋武帝曰一時頓有兩玉人耳王立之家有蘇東坡黃䂊章元祐中所題字因取宋武帝語以名亭云似憐憔悴兩公客獨倚東風遣信來兩公謂蘇黃也后山蓋蘇黃之客魏志曰馬超遣信請和又世說林公詣謝東陽朗時新病起體未堪勞母王夫人在壁後遣信令還又重梅雙杏巧相將不為逰人只自芳家語曰蘭生深林不以無人而不芳應怪詩翁非老手相逢不作舊時香詩翁后山自謂老手謂蘇黃歐公詩老手尚能工剪裁范諷詩云惟有南山與君眼相逢不改舊時青送謝朝請赴蘇幕好合同黃卷詩云妻子好合此借用文選陸士衡贈曹文熊亦云疇昔之遊好合纒綿情親須白頭老杜詩童稚情親四十年須白頭謂不待白頭而情已親胡然落丹墨不坐致公侯丹墨謂簿領北史蘇綽始制文案程式朱出墨入及計帳户籍之法退之詩符師弄刀筆丹墨交橫揮此借用山合遮西顧一作沙軟留徐步魏本云丙藁塗上四字不注潮回趂急流平生胡海興日夜逐行舟老杜詩平生湖海心宿昔具扁舟和謝公㝎觀祕閣文與可枯木斯人不復有纍世或可期每於丹青裏一見如平時壞障塵得入慘淡令人悲墨客落欲盡嚴顔終不移老杜詩慘淡壁飛動到今色未填又云畫色久欲盡蒼然猶出塵文選傅毅舞賦曰嚴顔和而怡懌世說桓公曰萬石橈弱常才有何嚴顔難犯朽老莫使年朽老見上注左傳曰絳縣老人有與疑年使之年石心烏銅皮晉書夏統傳賈充曰此吳兒木人石心也念此猶少作未盡氷霰姿文選楊修答臨淄王箋云修家子雲老不曉事強著一書悔其少作北枝把異鵲老杜詩棲枝把翠梧莊子曰莊周遊乎雕陵之樊覩一異鵲意定了不疑言無繞樹未安之態東坡畫鴈詩野鶩見人時未起意先改君於何處看得此無人態惜哉不得語胸次幾興衰用賈誼服不能言之意文選王仲宣詩惜哉空爾為其字本出史記宓不齊傳莊子曰喜怒哀樂不入于胸次一為要貴役可復辭畫師唐書閻立本傳閣外傳呼畫師閻立本羞悵汗流隱奧雖可惜塗抹復見遺言與可不為要貴所役聊自寄其意爾畫在祕閣世固不多見而亦免塗抹之汚文選七命曰吞響乎幽山之窮奧李善注曰奧隱處也盧同示添丁曰匆來案上翻墨汁塗㭑詩書如老鴉謝侯名家子感慨形苦詞庾信哀江南賦云不無危苦之詞豈惟語畫工徑特頗似之何當𥙷諌列一吐胸中竒退之代張籍書曰何由致其身於其人之側一吐出胸中竒乎和饒節詠周昉畫李白真君不見浣花老翁醉騎驢熊兒捉轡驥子扶金華仙伯哦七字好事不復千金模成都浣花溪老杜入蜀所居熊驥杜之二子也嘗有詩云熊兒幸無恙驥子最憐渠魯直有老杜浣花醉圖詩云浣花酒船散車騎野墻無主看桃李宗文捉轡宗武扶落日蹇驢䭾醉起后山謂魯直詩語已自寫生不須捐金模畫也金華見上注老杜詩云諸公乃仙伯青蓮居士亦其亞斗酒百篇天所借李太白答湖州迦葉司馬問白是何人詩曰青蓮居士謫仙人酒肆藏名三十春老杜詩李白一斗詩百篇又詩天廄真龍此其亞英姿秀骨尚可似逸氣髙懷那得畫後漢二十八將論曰英姿茂績老杜八哀詩曰復見秀骨清逸氣見上注周郎韻勝筆有神畫斷云周昉窮丹青之妙畫美人子女為古今冠絶張彥逺畫記云張懷素每云吳道玄之畫下筆有神解衣槃礴未必真莊子曰宋元君將畫圖衆史皆至䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴嬴君曰可矣是真畫者也一朝寫此英妙質似悔只識如花人太白詩金屏笑坐如花人醉色欲盡玉色起分明尚帶金井水托言曰太白在翰林應詔草白蓮花序及宫詞十首時方大醉中貴人以水沃之稍醒白於御前索筆一揮文不加點玉色見禮記玉藻老杜詩硯寒金井水按荊州記益陽有金井烏紗白紵真天人不用更著山巖裏晉書顧愷之為謝鯤像在石巖裏云此子冝置丘壑中平生潦倒飽丘園禁省不識將軍尊袖手猶懷脫靴氣豈是從來骨相屯文選西征賦曰禁省鞠為茂草唐書李白傳曰白嘗侍帝醉使髙力士脫韡力士素恥之擲其詩以激楊貴妃帝欲官白妃輒沮止退之詩自歎虞翻骨相屯仰視雲空鴻鵠舉眼前紛紛那得顧用嵇康詩目送歸鴻之意韓詩外傳曰黃鵠一舉千里老杜詩紛紛輕薄何須數是非榮辱不到處正恐朝來有新句魯直浣花醉圖詩曰兒呼不蘇驢失腳猶恐朝來有新作勿言身後不要名尚得吳侯費百金身後名見上注晉書謝安傳曰肴饌亦屢費百金江西勝士與長吟饒節字德操江西人後為僧名如璧法嗣頴州薦福月晉書羊祜登峴山曰由來賢達勝士登此多矣後來不憂身陸沉莊子曰方且與世違而心不屑與之俱是陸沉者也是其市南宜僚耶注云人中隱者是無水而沉也謝王立之送花過雨生泥風作塵馬蹄聲裏度芳辰城南居士風流在時送名花與報春時送一作尤遣一作時遣老杜詩頭風吹過雨又詩百舌來何處重重只報春此借用李白詩名花傾國兩相歡和參寥明彂覓鄰家花二首短墻春色過鄰家行不逢人只見花唐人王駕詩曰蛺蝶飛來過墻去應疑春色在鄰家下句用崔護事見上注新緑葱葱紅蔌蔌魯直詩黃鸝惟見緑葱葱元稹連昌宫詞曰風動落花紅蔌蔌却成粧面映青紗太白烏夜啼曰機中織錦秦川女碧紗如煙隔窗語又滿城桃李一番新深院繁枝别得春從此詩翁有新語不須紅濕少城闉老杜詩曉看紅濕處花重錦宫城又云更歷少城闉和張奉議贈舅氏龐大夫朝下公門不曵裾晉書龔玄之未曽至公門曵裾見上注身寬心逺等林居淵明詩心逺地自偏傳家聲烈三公後三公謂龐相國籍退之詩不見三公後貯腹平生萬卷餘北史崔悛傳胸中貯千卷書老杜詩年少方萬卷餘藤架倚春聽語鳥老杜詩露裛思藤架顧悲歌云臨春風聽春鳥别時多見時少石池迎日數遊魚柳子厚石潭記曰潭中魚可百許頭皆若空遊無所依日光下徹影布石上王介甫詩行數魚倏賔共樂人言酷類牢之舅晉書何無忌傳桓玄曰何無忌劉牢之甥酷似其舅未有新詩錦不如老杜詩白髮絲難理新詩錦不如和舅氏公退言懷追陪強韻愧難過應接前聞覺未多南史王筠傳能用強韻前聞見上注老杜詩衰慙應接多盛禮每虛摩詰席唐書王維字摩詰名盛於開元間豪英貴人虛左以迎舊詞猶可雪兒歌北夢瑣言韓定辭詩云麗詞堪與雪兒歌馬式問其事對曰雪兒李密愛姫每賔朋文章有竒麗者付雪兒協律歌之手開新徑延徐步眼趂髙梧上碧蘿風雨入懷泥滿眼時須好語滌煩痾王介甫詩春泥滿眼路嶇嶔欽聖憲肅皇后挽詞二首神宗后向氏建中靖國元年正月崩三月加諡五月葬永裕陵二妃端協帝神宗在頴邸治平三年納后為妃魏收後魏書曰二妃嬪媯虞道克昌任姒配周周室用光二妃謂堯女娥皇女英也協帝借用舜典字三后共興周三后謂太姜太任大姒以比國朝慈聖曹后宣仁髙后及欽聖皆嘗臨朝有聖德决䇿天同力收功語不流元符三年正月哲宗上仙太后夜半定䇿翌日召徽考自端邸入立廷臣皆不預焉蘇子由作宣仁諡冊文曰大䇿中定與天為謀羅隱詩曰時來天地皆同力語不流謂大臣帖服無敢流言如誣謗宣仁時也權宜從殺禮太后不敢當山陵之禮止稱山園詩曰殺禮而多昏此借用老杜詩權宜借寇頻末命尚深憂書曰皇后慿玉几導揚末命深憂謂以天下為憂鬱鬱佳城閉終天配壽丘佳城見上注文選顔延年宋元后哀䇿文曰夷體壽原注漢景帝作壽陵云云此借用以指𥙿陵又復辟先元約元符三年正月太后權同處分軍國事候祔廟禮畢還政至七月一日手書可不候祔廟止俟靈駕發引罷同聽斷書白朕復子明辟長年損積憂文選陸士衡歎逝賦曰嗟人生之短期孰長年之能執禮記文王世子注云文王以憂勤而損壽此借用傳曰積憂薰心春移柏城仗樂天陵園妾詩曰柏城盡日風蕭瑟仙去帝鄉遊莊子曰乘彼白雲至於帝鄉德並塗莘敏退之王用志銘曰蜀塗莘摯正妃之門謝承三夫人針曰塗山翼夏有莘翼殷蓋謂禹娶塗山氏女湯娶有莘氏女老杜詩學並盧王敏功臨馬鄧優後漢明德馬后肅宗尊為太后常與帝旦夕言道政事和熹鄧后迎立殤帝太后臨朝又定䇿立安帝千秋修故事車馬戒如流後漢馬后紀太后語曰前過濯龍門上見外家問起居者車如流水馬如遊龍但絶歲用以默愧其心文選樂府曰車馬若川流欽慈皇后挽詞二首欽慈皇后陳氏徽宗之母元祐四年六月崩建中靖國元年正月追尊為皇太后三月諡曰欽慈五月陪葬永裕陵祔太廟神宗室奉安神御于景靈西宫坤元殿二桃從孝祀禮記注二祧謂文武廟也文武俱在應遷之例特為功德而留此借用以比神宗五典載虞嬪堯典曰釐降二女於媯汭嬪于虞堯典即五典之一顯號追先志建中靖國元年正月欽聖太后崩遺詔追尊皇太妃陳氏為皇太后隂功見後人后蓋京兆人贈太保祁王懷德之女懷德沉勇有功於國後漢鄧后傳曰叔父陔言常聞活千人者子孫有封凡訓修石河歲活數千人天道可信家必蒙福承顔親不待魯論色難注曰承順父母顔色為難韓詩外傳曾子曰子欲養而親不待罔極痛如新詩曰欲報之德昊天罔極未有如椽筆光容可得陳晉書王恂夢人以大筆如椽與之云此當有大手筆事俄而孝武崩哀冊諡議皆珣所草又靈嶽占佳氣琳宫閟寶衣膺期符寶曆錫號煥皇扉靈嶽謂嵩山事具徽宗御製西京崇福宫記大抵謂后被遇神宗有禱于嵩山崇福遂生徽宗乃詔洛師侈宫楹而大之真誥協昌期曰登玉霄琳房皇扉謂堯毋門日月堯同數后以元豐五年十月十日誕生徽宗皇帝漢書武帝鉤弋夫人傳任身十四月生昭帝上曰昔堯十四月而生命其門曰堯母門謳歌啓與歸事見孟子傷心五雲去不見六龍飛孝經援神契曰德至山陵則景雲出景雲五色雲也老杜重經昭陵詩云再窺松柏路還見五雲飛六龍見易乾卦謂徽宗登極大行皇太后挽祠二首代人作欽聖太后德名三后並曹后髙后并后為三皆有聖德母道兩朝尊兩朝謂哲廟徽廟勇决髙千古危疑定一言謂㝎䇿之謀出於獨斷章惇異議竟不得行老杜詩勇决冠垂成文選王元長䇿秀才文曰餘烈千古先期還政事隆禮改山園并見上注哀挽西郊道雲愁晝亦昏西郊道謂往西京祔葬周以洛為東郊於宋朝則國西又扶日行黃道扶日見上注晉志云黃道日之所行也魯直王文恭挽詩云賔日行黃道乘雲上紫微莊子曰乘彼白雲至于帝鄉晉志云紫微大帝之坐天子之常居也憂勞形末命末命見上注恭儉見陳衣周禮春官司服曰大喪廞衣服注廞陳也禮記喪大記曰凡陳衣者實之篋布德開刑網禮記月令云命相布德和令漢書刑罰志云禁網踈闊和戎戢武威左傳魏絳謂和戎有五利老杜詩丕承戢武威要知懷惠處行路涕交揮懷惠見魯論家語敬姜曰二三子無揮涕追尊皇太后挽詞二首代人作欽慈太后彤管書隂教靜女詩傳云古者后夫人必有女史彤管之法箋云彤管筆赤管也禮記曰后修女順母道也注云母者施隂教於婦黃圖載德容黃圖天子之圖籍如三輔黃圖是也周禮九嬪掌教九御婦德婦言婦容婦功漢宫先夢日漢書景帝王后傳武帝方在身時后夢日入其懷代邸近乘龍謂徽宗自端邸即位漢書薄姬傳髙祖召欲幸之對曰昨暮夢龍據妾胸上曰是貴徴也吾為汝成之遂生文帝初封代王文帝紀曰奉天子法駕迎代邸易乾卦曰時乘六龍以御天也喬嶽藏遺服謂嵩山崇福宫見上注青門啓故封后以元祐九年葬於開封縣多慶院之東至是改葬老杜詩哀挽青門去按三輔黃圖曰長安城東出南頭第一門曰霸城門或曰青門此借用退之大行皇后挽詞曰因山託故封從今祠百世東坡髙太后挽詩云原廟故應祠百世先王何止活千人清廟配商宗周頌注曰清廟者祭有清明者之德之宫也商宗謂神宗商頌曰烈文祀中宗玄鳥祀髙宗又典冊尊徽號欽慈煥德名徽號字見禮記後人借用楊子曰君子德名為幾終身聞舜慕孟子曰大孝終身慕父母五十而慕者豫於大舜見之矣歷月見堯生見上注世說外國貢竒香一著人則數月不歇兵衛嚴天仗車輿轉帝城故奩脂澤在哀感倍皇情後漢光烈隂后紀明帝夢先帝太后如平生歡明旦上探視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視王察院挽詞二首監察御史王回也施報終何在窮通共一空史記伯夷傳曰天之報施善人其何如哉兩言成益友左傳鄭子太叔卒晉趙簡子哭甚哀曰黃父之㑹夫子語我九言云云此用其意管輅别傳曰諸葛樂與輅别戒以二事言卿性樂酒雖溫克然不可保寧當節之卿有水鏡之才所見者妙禍如膏火不可不慎此借用其事史記平原君傳毛遂曰從之利害兩言而决魯論曰益者三友百代仰高風孟子曰百世之下聞者莫不興起文選陸機漢功臣贊曰悠悠遐風千載是仰夏侯湛東方朔畫贊曰想先王之髙風終始無遺恨老杜詩毫髮無遺恨恩榮託至公建中靖國元年正月王覿曽肇等奏故監察御史王回學術深醇氣守剛毅臺官言回交結浩遂除名勒停送本鄉居住陛下嗣位命為監察御史方始供職得病而亡不得攄發素藴以報陛下眷遇之意云云詔𥙷一子太廟齊郎老杜詩恩榮同拜手不應埋直氣㑹見吐長虹曹子建七啓曰慷慨則氣成虹霓又良貴官何與孟子曰人之所貴者非良貴也趙孟之所貴趙孟能賤之長年死不亡老子曰死而不亡曰壽身須禦魑魅左傳曰投之四裔以禦魑魅老杜詩從來禦魑魅多為才名誤氣已懾豺狼後漢張綱傳豺狼當道安問狐狸不盡胸中藴猶堪地下郎地下郎見上注豈惟吾道慶編簡亦輝光編簡謂史䇿贈吳氏兄弟三首一長未可衆人師柳子厚答韋中立書曰假令有取為衆人師且不敢况敢為吾子師乎萬里元隨八馬蹄列子曰周穆王肆意逺遊命駕八駿之乘升昆崙之丘賔于西王毋老杜詩昆崙虞泉入馬蹄不解征西諸子弟却憐野鶩厭家雞南史王僧䖍傳庾征西翼書少時與右軍齊名右軍後進庾猶不分在荊州與都下人書云小兒輩賤家雞皆學逸少書野鶩見上注又才隨年盡不重竒每愧諸郎索近詩旋作七言供一笑自癡那得使人癡才盡見上注歐公詩云詩篇自覺隨年老玉臺新詠明月篇曰秀色隨年衰又得失雖妍只自知略容千載有心期老杜詩文章千古事得失寸心知文選陸機文賦序曰妍雖好惡可得而言退之詩開卷讀且想千載若相期選詩中道遇心期后山此意謂世無知音特與古人相期於千載之上耳恨君不見金華伯金華伯謂魯直見上注東坡詩恨君不識顔平原何處如今更有詩退之詩風霜滿靣無人識何處如今更有詩和吳子副智海齊集法筵應供賴三車文殊云法筵龍象衆三車謂羊鹿牛以比三乘事見蓮經堆案抽身輟算沙嵆康書曰人間多事堆案盈几樂天詩抽身去得無東坡詩笙歌叢裏抽身出永嘉證道歌云入海算沙徒自困度暑好風開樂國淵明詩微雨從東來好風與之俱樂國謂西方極樂國脫塵新句散餘霞謝玄暉詩餘霞散成綺僧奩手汗空留迹佛几堆紅拂委花蓮經曰香風時來吹去委花更雨新者趙師民詩委地露花啼曉恨客舍黃粱應未熟且容秋蝶夢南華黃粱見上注莊子曰昔者莊周夢為蝴蝶挧挧然胡蝶也按通典唐天寶元年封莊子號南華真人舅氏新齊堂因竹柏有花與歲時䦨欲作中年計長留别眼看管子曰百年之計種之以木别眼謂不以凡花視之也色侵杯酒重老杜竹詩色侵書帙晚又詩重碧拈春酒子熟落聲乾李商隱詩霜野物聲乾只有林園主相期耐歲寒退之詩山翁自是園林主上朝主客后山自注云時與無咎對酒及門而閽者辭焉兩疏父子共含香不獨家榮國有光兩疏見上注應劭漢宫曰尚書郎含雞舌香䞉欲展懷因問疾老杜詩展懷詩誦魯問疾見上注孰知相對只銜觴此句蓋用竹林阮籍院咸事以比二朝晉書阮咸傳云諸阮皆能飮太白詩無由共銜觴年侵身要兼人健節近花須滿意黃老杜詩年侵腰腳衰漢書韓信傳身辱於跨下無兼人之勇從昔竹林須小阮只今未可棄山王小院謂阮咸籍之兄子以比無咎山王謂山濤王戎后山以自比沈約宋書曰顔延之作五君詠以述竹林七賢山濤王戎以貴顯𬒳黜東坡詩他年五君詠山王一時數和鮮于大受崇先觀餞别曽元忠此别未為逺兩都東西州情親有乖隔江湖成阻修兩都謂東汴西洛班固有兩都賦退之序曰人之於南海者若東西州焉詩云道阻且修后山意謂相去雖近而别意則逺世說袁彥伯為謝安南司馬既自悽惘歎曰江山遼落居然有萬里之勢脫塵度翠密徐行當尋幽各有惜别懷共此一日留退之詩此日足可惜此酒不可嘗捨酒去相語共分一日光意合豈待約酒盡不更求闕詞固未可忍手亦何猶后山自注云是日題壁坐有黃冠師未解逍遙遊退之送張道士詩云臣非黃冠師南史劉歆年十二讀莊子逍遙篇曰此可解耳客問之隨問而答皆有條理興來我與共醉罷君當休南史陶潜傳若先醉便語客我醉欲眠卿可去僧房火可親此樂行且謀老杜詩隨意宿僧房退之詩燈火稍可親萬事自紏紛髙懷元一丘老杜詩萬事糾紛猶絶粒答王立之每逢無可語暫阻即相求前輩詩相見又無事不來還憶君晉書阮修意有所思率爾蹇裳不避晨夕至或無言但欣然相對解卷初增氣開懷得寫憂詩云以寫我憂昏煙宜帶雨風樹更添秋絶唱猶多和先衰却後酬文選宋玉對楚王問曰客有歌於郢中者其曲彌髙其和彌寡又和過田承君寺古專宜僻居深自作幽退之詩僻寺境還幽興來寧憚逺句苦不緣愁太白詩白髮三千丈緣愁似箇長逸氣無前足此以馬為喻老杜馬詩云所向無空闊無前見上注虛懷不繫舟老杜詩虛懷任屈伸莊子曰泛若不繫之舟虛而遨遊者也逢人難晤語冒雨亦相求贈石先生多方作計老如期魯直詩萬端作計身愁苦劉禹錫詩與老無期約到來如等間百疾交攻遽得衰嵆叔夜養生論曰積損成衰從衰得白晚有勝緣逢異士勝緣見上注後漢种皓傳山澤不必有異士異士不必在山澤生須快意闕前知謂丈夫生當快意恨知之晚也晋書周協曰人生幾時但當快意耳迫人鬢頷紛紛白樂天詩滿頷白髭鬚臨事回迃種種遲漢書翟方進號遲頓不及事分我刀圭容不死退之詩金丹别後知傳得乞取刀圭救病身他年鶴馭得追隨江文通别賦曰駕鶴上漢驂鸞騰天送朝無咎守蒲中一麾出守自多竒顔延之五君詠阮咸詩云屢薦不入官一麾乃出守四十專城古亦稀古樂府曰四十専城居老杜詩人生七十古來稀解榻坐談無我輩用徐稚事見上注老杜詩髙人屢解陳蕃榻魏志郭嘉說太祖曰劉表坐談客耳晉書劉惔傳桓溫問惔㑹稽王談更進耶惔曰極進然第三流耳溫曰第一復誰惔曰故在我輩鋪筵踏舞缺崔徽元稹崔徽歌序曰蒲女崔徽善舞有容艷崔敬中嘗使蒲徽一見為動敬中使罷言旋徽不得從狂纍月樂天詩妓筵勉力為君鋪又曰只是堂前缺一人退之詩艷姬踏筵舞的桃作劇聊同俗的桃當是河中故事樂天詩吳兒多白晳好為蕩舟劇遇事當前莫後幾定命録魏元忠有善相者謂之曰公當位極人臣然命多蹇剝時有憂懼不足為虞但可當事便行聞言則應元忠纍遭譴責憶相者之言言事未嘗屈其志文選嵆康書曰遇事便發魏志荀彧傳曰袁紹失在後機無咎起於謫籍自吏部郎中出守故以魏元忠事勸之聖世急才常患少后山自云神宗御筆曰治世常患難得人才棧羊篩酒待公歸棧羊本俗間語東京記曰普寧坊有棧羊務毛詩釃酒有藇注以筐曰釃以藪曰湑題明彂髙軒過圖髙軒過李賀所作見上注宗室士陳字明發滕王蛺蝶江都馬王建宫詞曰內中數日無呼喚傳得滕王蛺蝶圖按畫斷云嗣滕王湛然畫蛺蝶雀兒曲盡精理歐公歸田録以為滕王元嬰誤矣老杜詩國朝以來畫鞍馬神妙獨數江都王按名畫記江都王緒霍王元軌之子善書畫鞍馬擅名一紙千金不當價老杜詩未覺千金滿髙價尹文子曰魏王得玉召王工問其價玉工曰此無價以當之異才天縱非力能畫工不是甘為下南史王僧䖍論書曰孔琳之書天然縱放唐書王維善畫繪工以為天機所到學者不及也老杜詩畫師不是無心學今代風流數大年含毫落筆開山川朱芾畫史曰宗室令穰字大年作小軸甚清麗文選陸士衡文賦曰或含毫而邈然忽忘朽老壓塵底却怪鳬鴻墮目前朽老謂木石見上注老杜畫障歌堂上不合生楓樹怪底江山起煙霧此用其意爾來八二復秀出八二當是明彂行第李涉詩云唐氏一門今五龍聲華殷殷皆如鍾就中十一最年少别有俊氣橫心胸后山云八二亦十一之比也萬里河山才咫尺見上注眼前安得有突兀復似天地初開闢老杜畫鶻行初驚無拘攣何得立突兀尚書考靈耀曰天地開闢耀滿舒光明窗寫出髙軒過便逐愈湜聞吟哦晚知書畫真有益却悔歲月來無多世說戴安道好畫范宣子以為無用戴為范畫南都賦圖范看畢咨嗟以為有益然始重畫退之詩來日苦無多官禁修嚴斷過訪時於僻寺逢稅鞅周禮士師之職二曰官禁李商隱詩嚴城清夜斷經過僻寺見上注老杜詩野稅林下鞅秀潤如行琮璧間世說曰裴叔則如玉山上行光映照人周禮太宗伯以蒼璧禮天以黃琮禮地清明似引星辰上禮記曰清明在躬曾南豐作老蘇哀辭曰其輝光明白若引星辰而上也按法言曰眀星皓皓者已也引而髙之者天也憂悲愈怢百不平退之送髙間序曰往時張旭善草書不治它技喜怒窘窮憂悲愈怢怨恨思慕酣醉無聊不平有動於心必於草書發之河擘太華東南傾此句言攄寫之俊快也郭緣生述征記曰華山與首陽本同一山河神巨靈擘開太華以通河流平生秀句寰區滿掇拾餘棄成丹青王立之詩話載張嘉甫朝無咎髙軒過圖題跋頗言明發兼詩畫之工老杜作王維詩云最傳秀句寰區滿平湖逺嶺開精神斗覺文字生清新退之詩斗覺霜毛一半加機雲别傳曰雲善屬文清新不及機未許二豪今角立二豪謂滕王江都劉伶酒德頌曰二豪在側焉如蜾裸之與螟蛉後漢徐稚傳曰角立傑出要知旁有衛夫人衛夫人蓋尚書郎李充母以夫姓自稱李衛王羲之嘗從學書或云明發之妻亦能畫故以衛夫人比之二豪謂大年明發送歐陽叔弼知蔡州頴隂為别悔匆匆十載相望信不通老杜詩所思礙行潦九里信不通晚遇聖朝收放逸旋遭官禁限西東法華經曰汝是放逸之人此借用其字官禁見上注老杜詩岸髙瀼滑限西東又為太守專淮右䞉喜郎君類若翁若翁猶言乃翁謂六一居士亦嘗知蔡州蔡州在淮西梅柳作新詩興動老杜詩天邊梅柳樹相見幾回新又云東閣官梅動詩興可令千里不同風語林曰陳元方云周公孔子異代而出周旋動靜萬里同風傳燈録玄沙傳雪峯曰君子千里同風送朝堯民守徐中年為别不堪憂束髮登門到白頭南省望郎仍國士漢建尚書百官府名曰南宫蓋取天上南宫太微之象退之孔戣墓志曰臣與孔戣同在南省李商隱詩望郎臨古郡孫樵髙郎中志銘曰鴛行望郎錦川星使史記豫讓傳曰智伯以國士待我東方千騎更吾州古樂府曰出東南隅行曰東方千餘騎夫壻居上頭東坡守徐和范祖禹詩云吾州下邑生劉季誰數區區張與李后山徐人故云吾州彭翁老壽終遺骨徐州彭城縣故大彭國彭祖所封也彭門記曰殷之賢臣彭祖顓頊之玄孫至殷末壽及七百歲今墓猶存燕子飛來只故樓燕子樓見上注知已難逢身易老頌公置醴我歸休置醴見上注莊子許由曰歸休乎君子無所用天下為送王㝎國通判河南孤身十載客都城退之詩孤身無所齎此句后山自述言十年前未得官時白社雙林諱姓名白社雙林見上注諱姓名用後漢書韓伯休意授館不為他日計國語曰司里授館此借用退之鄭羣墓志曰俸祿入門與其所過逢飲酒舞歌連日夜不厭或分潔以去一無所愛惜不為後日毫髮計留也解衣真出故人情用須賈綈袍事見上注韓信曰漢王解衣衣我翹材必定延枚叟言為相君所知西京雜記公孫弘開東閣分三館一曰欽賢次日翹材次曰接士文選謝惠連雪賦曰召鄒生延枚叟宣室終須記賈生言為人主所知事見上注萬里歸來髮如漆㝎國編置全州元符三年得歸老杜詩汝伯何由髮如漆了知句畫更新清年顔不衰詩句字畫當亦稱是老杜詩更得新清否還知對屬忙后山詩注卷第十二終
