front:
  text: 后山詩注卷第五
  hash: sha256:357036553c437d10faf687179486925ea7b7c6aac9082409bb2bcbf387db14b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0088_SBCK_005-1a}
body:
  text: 答朝以道轉走東南復帝城帝城見上法后山嘗遊江浙元祐初來京師此句追記其事故人相見眼偏明退之詩相見眼偏明十年作吏仍糊口作吏見上注顔魯公帖云一作緣受替北歸中止金陵闔門百口幾至糊口字本出左傳兩地為鄰闕寄聲退之詩兩地無千里因風數寄聲冷眼尚堪看細字白頭寧復要時名老杜詩秋山眼冷常夢稀東坡詩問龍乞水歸洗眼要看細字銷殘年熟知范叔寒如此熟知見上注又老杜詩熟知茅齊絶低小史記范睢傳須賈曰范叔一寒如此哉未覺嚴公有故情唐書杜甫傳甫依嚴武於劒南武以世舊待甫甚善北齊書趙彥深被沙汰袁聿修猶故情存問往來按漢書陳勝傳客出入愈益發舒言勝故情病起今日秋風裏何鄉一病翁老杜詩多病秋風落力微須杖起法燈禪師擬寒山子詩曰榰笻似力微禮記檀弓曰杖而後能起心在與誰同歐公詩老去自憐心尚在古樂府東飛伯勞歌曰空留可憐誰與同此借用災疾資千悟孟子所謂人之有德慧術智者常存乎疢疾是也晉書天文志五星同色天下偃兵百姓安寧不見災疾此借用傳燈録仰山云若是宗門下上根大智一聞千悟得大揔持冤親并一空同乎大通無怨無德也華嚴經云願一切衆生於怨於親等心攝受皆令安樂智慧清淨傳燈録曇藏禪師見大蠎不避曰毒無實性激發則強慈苟無緣冤親一揆其蠎倐然不見百年先得老晉嵆康養生論曰從衰得白從白得老三敗未為窮列子管仲歎曰吾嘗三戰三北鮑叔不以我為怯知我有老母也晉書陶侃謂庾亮曰古人三敗君今始二此用老杜百年渾得醉一月不梳頭之句法皆落句也九月九日魏衍見過節裏能相過談間可解憂漢書楊雄解嘲曰或立談間而封侯解憂見孟子致踈君未肯得此我何由莊子漁父篇子路問孔子曰由得為役久矣未嘗見夫子遇人如此其威也漁父何以得此乎語到君房妙見上注詩同客子遊南史謝弘微傳謝靈運小名客兒按靈運有九月九日從宋公戲馬臺集詩一經從白首楊子曰古之學耕且養三年通一經又曰童兒習之白粉如也李白詩白荀太玄經萬里有封侯後漢班超傳相者曰祭酒布衣諸生耳而當封侯萬里之外别黃徐州姓名曽落薦書中老杜詩名玷薦賢中元稹詩名落公卿口又王仲舒作李君房制詞曰藉藉名字落人談中刻畫無鹽自不工晉周顗傳庾亮謂顗曰諸人咸以君房樂廣顗曰何乃刻畫無鹽唐突西施一日虛聲滿天下李綽輦下歲時記劉賔客賀王魏公知舉詩曰一日聲名遍天下滿城桃李屬春官東坡答劉涇書曰向在科場時不得已作應用文不幸為人傳寫以此得虛名滿天下十年從事得途窮晉書職官志州置諸曹從事等貟后山以亳州司户為教授故云爾晉阮籍傳率意獨駕不由徑路車迹所窮輒慟哭而反文選顔延之五君詠曰途窮能無慟白頭未覺功名晚以屬徐州也老杜詩男兒功名遂亦在老大時青眼常蒙今昔同晉阮籍能為青白眼范諷詩云惟有南山與君眼相逢不改舊時青衰疾又為今日别數行老淚灑西風衰疾見上注次韻答朝無斁女生願有家名妾以不聘田里亦慕君又惡不由正大率用孟子意禮記內則曰聘則為妻奔則為妾欲行不問塗用阮籍事見上注已破寧顧甑後漢郭太傳孟敏荷甑墮地不顧而去林宗見而問其意對曰甑已破矣視之何益時后山罷頴學耕蠶無一門里漢書楊雄傳有田一門里庖井要三徑晉書陶潜謂親朋曰聊欲弦歌以為三徑之資可乎老杜詩井竈任塵埃還家憂患餘老杜詩斯文憂患餘挽鬚兒女競老杜詩生還對童稚似欲忘飢渴問事競挽鬚誰能即嗔喝十年寧有此一寒可無命老杜詩不為困窮寧有此此借用言還家之樂十年所無一寒見上注命詩意謂離合貧富蓋皆有平生朝夫子得士公室慶謂作諸侯客也公室見魯論稍無車馬音復作賔客請車馬音見孟子論文到韓李謂韓愈李翺也似指東坡以下數句皆足此意老杜詩論文到崔蘇念舊說蘇鄭謂蘇源明鄭䖍皆老杜故人也老杜嘗有詩曰故舊誰憐我平生鄭與蘇又云早歲與蘇鄭痛飲形相親長年斷消息獨語誰和應意謂東坡在貶所也老杜詩中原消息斷退之與孟郊書云余言之而聽者誰歟余唱之而和者誰歟東坡詩獨唱無人和退之送鄭權序曰撞搪號呼以相和應此生恩未報他日目不瞑退之詩秪緣恩未報豈謂生足藉左傳曰荀偃卒視不可含奕桓子撫之乃瞑受含歸卧無好懷扣門有佳聽詩來霜雪後更覺天宇淨老杜詩天宇清霜淨少好老未工楊子曰或問吾子少而好賦持刃授子柄漢書梅福傳倒持太阿授楚其柄次韻無斁偶作二首肩聳三峯峻國朝雜記長孫無忌嘲歐陽詢聳膊成山字埋肩不出頭郭緣生述征記曰華山有三峯直上數千仞眉龐八字橫退之詩夜闌縱押闔哆口踈眉龐漢武故事宫人畫八字眉此借用玄談人絶倒見上注家法句新清老杜詩更得新清否遙知對屬忙八俊先張子後漢黨錮傳曰指天下名士為之稱號三君八俊又曰張儉為黨魁諸公少賈生漢書賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毀誼曰洛陽之人年少初學専欲擅權紛亂諸事於是天子後亦踈之已傳烏鵲喜欲聽鶺鴒聲􅜇一作鵒此句當屬其兄無咎老杜云浪傳烏鵲喜深負鶺鴒詩又此老三年别何時萬里回亦似屬東坡元祐壬申别於頴州至紹聖乙亥三年矣更無南去鴈鴈不過衡山無從寄聲於嶺外也猶見北枝梅言東坡過嶺未歸白氏六帖云大庾嶺梅花南枝落北枝開㑹有哀籠鳥文選潘嶽秋興賦曰池魚籠鳥有江湖山藪之思李畋獻吕文靖生日詩曰此身若得西歸去尤勝開籠放雀兒寧須溺死灰漢書韓安國傳獄吏田甲辱安國安國曰死灰獨不復燃乎甲曰燃則溺之聖朝無棄物老杜詩聖朝無棄物老病已成翁神宗於東坡嘗有人材難得不忍終棄之詔故此詩引用與子賦歸哉欲其來歸之意也殷其雷詩振振君子歸哉歸哉此亦賦詩斷章之意古墨行并序朝無斁有李墨半丸云裕陵故物也往於秦少遊家見李墨不為文理質如金石亦𥙿陵所賜王平甫所藏者潘谷見之再拜云真廷圭所作也世惟王四學士有之與此為二矣嗟乎世不乏竒乏識者耳敬為長句率無斁同作永𥙿陵神宗所葬秦郎百好俱第一烏丸如􅃮姿如石趙一非草書曰十日一筆月數丸墨蕭子良書曰仲將之墨一點如􅃮文房四譜云李超本易水人唐末居於歙造墨尤妙其堅如玉其文如犀巧作松身與鏡面借美於外非良質文選琴賦曰良質美乎潘翁拜跪摩老眼一生再見三歎息禮記曰一唱而三歎了知至鑑無遁形圎覺經云曽不了知如幻境界衛夫人帖云仰慿至鑑大不可言東坡詩道人胸中水鏡清萬象起滅無逃形王家舊物秦家得舊物借用王獻之青氊事君今所有亦其亞伯仲小低猶子姪老杜詩天廄真龍此其亞魏志衛臻傳注郭林宗論許茲與文生此二人非徒兄弟乃父子也黃金白璧孰不有古錦句囊聊可敵謂世人蓄金璧固多而未必可當此墨惟詩囊差可當之耳唐書李賀傳每出從小奚奴背古錦囊遇所得投囊中睿思殿裏春夜半燈火䦨殘歌舞散睿思蓋神宗便殿在垂拱殿後自書細字答邊臣萬里風塵入長算元祐中蘇轍等上所編神宗皇帝御製集內四十卷皆賜中書密院及邊臣手札言攻守祕計哲宗為之序曰其指授諸將應變制宜雖在千萬里外而盡得其形勢之要先後緩急之機皆如在目前而無遺畫云又按光武紀一札十行細書成文退之詩夜書細字綴語言文選陸士衡吊魏武帝文曰長竿屈於短日逺迹頓於促路初聞橋山送弓劒帝王世紀曰黃帝葬于上郡陽周之橋山漢書郊祀志黃帝鑄鼎既成有龍下迎帝小臣持龍髯龍髯拔墮墮皇帝之弓老杜詩先帝弓劒逺寧知玉碗人間見南史沈炯行經漢武通天臺為表奏之其略曰茂陵玉碗遂出人間此借用以比𥙿陵遺墨夜光炎炎衝斗牛㑹有太史占星變晉書張華傳雷煥曰斗牛之間頗有異氣史記天官書曰常星之變不見歐公仁宗御飛白記曰今賜書之藏于子室也吾知將有望氣者言榮光起而屬天者必賜書之所在也人生尤物不必有左傳曰天有尤物足以移人苟非德義則必有禍時一過目驚老醜文選張景陽詩忽如鳥過目南史昭眀太子傳曰讀書過目皆憶柳子厚乞巧文獨溺臣心使甘老醜念子何忍遽磨研少待須臾圖不朽魏衍注曰少遊之墨嘗許先生為他日墓志潤筆先生嘗語衍作此時少遊尚無恙然終先逝去衍謹書少待須臾見上注文選蔡雍作郭有道碑曰乃相與推先生之德以謀不朽之事而退之馬府君行狀曰託立言之君子而圖其不朽焉按左傳穆叔曰其次有立言雖久不廢此之謂不朽明窗淨几風日暖有愁萬斛才八斗晉書王羲之傳曰棐几滑淨庾信愁賦曰且將一寸心能容萬斛愁謝靈運云天下才共有一石曹子建獨得八斗徑須脫帽管城公脫帽謂去其管㢰也退之毛頴傳秦皇帝封諸管城號管城子後因進見上將有任使拂拭之因免冠謝云云小試玉堂揮翰手史記孫武傳曰可以小試勒兵乎歐公詩收取王堂揮翰手却來南畒把鋤犂次韻朝無斁除日述懷世學違從衆老杜詩困學違從衆名家最近天老杜自注其詩曰俚語云城南韋杜去天尺五又詩陽關已近天感時猶壯志得句起衰年老杜詩感時花濺淚又詩湯休起我病微笑索題詩又云為報各衰年袁酒無何飲漢書袁盎傳盎為吳相兄子種說以日飲無何陶琴不具弦陶琴見上注樂天詩周易休開卦陶琴不上弦平生揮翰手幾見絶韋編史記孔子世家曰孔子讀易韋編三絶次韻無斁雪後二首閉閣春雲薄開門夜雪深閉閣見上注江梅猶故意故意字借用范睢事湖鴈起歸心隋薛道衡詩曰人歸落鴈後思發在花前草潤留餘澤窗明度積隂老杜詩輕鳥度層隂又云積隂帶奔濤殷勤報春信屋角有來禽老杜詩百舌來何處重占只報春又詩紅稠屋角花尚書故實云王內史有求來禽帖來禽言味甘來衆禽俗作林禽此借用其字耳又取性無通介隨時有異同魏志徐邈傳或問盧欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先崔季圭用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相放效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也東坡詩亦云通介寧隨薄俗移雪餘蓋地白退之詩榆莢車前蓋地皮春淺著梢紅樂天詩今年春淺遊人少杜默詩春著花梢猶半紅寄食虛長算魏衍注云時先生寄婦翁郭概大夫曹州使宅朝時為州教官論詩闕近功上句用韓信事見上注長算亦見上注相看不相棄賴有古人風魏志毛玠傳太祖賜以素屏風素慿几曰君有古人風故賜君古人之服贈魏衍三首當是自曹暫還徐所作妙年文墨秀儒林老眼今晨得再明文選陳思王表曰終軍以妙年使越漢書有儒林傳歷塊過都聊可待老杜詩歷塊過都見汝曹事見上注未須回首一長鳴鹽鐡論曰騏驥負鹽車垂頭於太行之坂見伯樂則噴而長鳴退之詠馬詩不知何故翻􅋮首牽過關門妄一鳴又崔蔡論文不足過劉禹錫序柳子厚集曰韓退之評其文雄深雅健似司馬子長崔蔡不足多也按後漢崔瑗蔡雍皆能文新詩平處到隂何唐書孟郊傳云李觀論其詩曰髙處在古無上平處下顧二謝老杜詩頗學隂何苦用心按南史隂鏗何遜皆能詩寧須萬户權䡖重杜牧之詩曰誰人得似張公子千首詩輕萬戶侯史記律書云世儒暗於大較不權輕重不待千篇一已多世說衛玠嘲阮宣子曰一言可辟何假於三宣子曰苟是天下之望亦可無言而辟復何假一南史陸瓊傳云此兒必荷門基所謂一不為少此並用其意又敏捷為文筆不休老杜詩敏捷詩千首魏文帝典論云下筆不能自休何妨縮手小遲留縮手見上注名駒已自思千里宋書髙祖曰謝方明可謂名家駒魯連子徐劫言於田巴曰劫弟子魯溫年十二然千里駒也老子終當讓一頭歐公與梅聖俞書云讀蘇軾書不覺汗出快哉快哉老夫當避路放出一頭地也贈寇國寶三首承家從昔如君少得士於今孰我先易曰開國承家老杜詩承家節操尚不泯又云文章並我先口擬說詩心已解世間快馬不須鞭傳燈録外道問佛不問有言不問無言世尊良久外道讃歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛云外道有何所證而言得入佛云如世間良馬見鞭影而行樂府梁朝歌曰快馬不須鞭又往歲黃童今寇君髙文要學亦多聞後漢黃香傳京師號曰天下無雙江夏黃童此借用以比黃預又寇恂傳頴川百姓遮道曰願從陛下復借寇君一年此借用以比國寶留年看舉天南翼韓鄂四時纂要曰鹿骨酒久服長骨留年莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也過目先空冀北群退之送溫造序云伯樂一過冀北之野而馬羣遂空又虎子墮地氣食牛尸子日虎豹之駒雖未成文已有食牛之氣老杜詩小兒五歲氣食牛魯直詩渥窪麒麟兒墮地志千里雀兒浴處魚何求退之詩云蝦蟇跳過雀兒浴此縱有魚何足求可奈我衰才亦盡南史丘靈鞠傳王儉曰丘公仕官不進才亦退矣又江淹任昉人皆謂之才盡正須二子與同遊謂黃寇二君次韻春懷老形已具臂膝痛此借用彭越傳反形已具之語林逋詩覽照老已具開樽人向稀春事無多櫻笋來老杜詩溪邊春事幽樂天詩百年夜分半一歲春無多韓偓櫻桃詩注曰秦中謂三月為櫻笋時輦下歲時記曰四月自堂厨至百司厨通謂之櫻笋厨敗絮不溫生蟣虱敗絮見上注漢書嚴安曰介胄生蟣虱大杯覆酒著塵埃晉元帝紀帝頗以酒廢事王導以為言帝命酌引觴覆之於此遂絶陶淵明傳曰塵爵恥虗罍衰年此日常為客舊國當時只廢臺老杜至日詩年年此日常為客又登髙詩萬里悲秋常作客百年多病獨登臺后山所指謂徐州戲馬臺也河嶺尚堪供極目文選王粲登樓賦平原逺而極目兮蔽荆山之髙岑少年為句未須哀王介甫詩意氣未宜輕感槩文章尤忌數悲哀河上背水連漁屋背水借用韓信事老杜詩漁屋架泥塗橫河架石梁唐人羊士諤詩行披煙衫入激瀾橫石梁窺巢烏鵲競鵲巢多為烏所窺奪過雨艾蒿光老杜詩庭幽過雨霑東坡樂府云日暖桑麻光似潑風來蒿艾氣如薰鳥語催春事窗明報夕陽退之送孟郊序云以鳥鳴春南部煙花録陳后主詩夕陽如有意偏傍小窗明老杜詩人扶報夕陽還家慰兒女歸路不應長時自徐還曹題柱二首并序永安驛廊東柱有女子題五字云無人解妾心日夜長如醉妾不是瓊奴意與瓊奴類讀而哀之作二絶句桃李摧殘風雨春楊炯少姨廟記曰古木榷殘尚辨三花之樹天孫河鼓隔天津史記天官書織女天女孫也爾雅河鼓謂之牽牛晉志曰天漢起東方經尾箕之間謂之漢津古樂府華山畿曰隔津歎牽牛語織女離淚溢河漢陸系有所思曰只看今夜裏那似隔天津主恩不與妍華盡樂天後宫詞曰紅顔未老恩先斷斜倚薰籠坐到明或作王建宫詞何限人間失意人士不遇多矣何獨女子哉劉禹錫詠古詩曰一朝復得幸應知失意人又從昔嬋姢多命薄東坡詩目昔佳人多命薄如今歌舞更能詩麗情集元載寵姬薛瑶英能詩書善歌舞孰知文雅河陽令文選夏侯常侍誄曰俗疵文雅李善注引大戴禮曰天子不知文雅之辭晋書潘嶽為河陽令不削瓊奴柱下題青瑣髙誼載瓊奴姓王氏王郎中幼女父死失身於趙奉常家為主毋凌辱道出淮上書其事於驛壁見者哀之王平甫為作歌云蠅虎物微趣下世不數老杜詩物微世競棄又詩人物世不數后山此篇蓋有所指隨力捕生得稱虎唐書安祿山與史思明俱為捉生東坡詩窗間守宫稱蠍虎匿形注目搖兩股史記越世家曰鷙鳥之擊也必匿其形卒然一擊勢莫禦卒然及莫禦字皆見孟子十中失一八九取周禮醫師十全為上十失一次之吻間流血腹如鼓元稹詩腹脹看成鼓却行奮臂吾甚武漢書猶却行而求及前人史記殷紀湯曰吾甚武故稱武王明日淮南作端午言恃勇而不知及禍也世傳淮南王安萬畢術云以五月五日取蠅虎杵汁拌豆豆自踊躍可以擊蠅陶朱公廟史記曰范蠡變名姓適齊為鴟夷子皮之陶為朱公陶即定陶今曹州濟隂縣乃其地也千篇奏牘謾多知史記東方朔至公車上書凡用三千奏牘老杜鸚鵡詩紅觜謾多知百戰收功未出竒孫子曰百戰百勝非戰之善也史記白起贊曰料敵合變出竒無窮此兩句言陶朱公智勇雖多猶未足道要以身退為勝耳名下難居身可辱史記越世家范蠡以為大名之下難以久居乘舟浮海變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産魯論柳下惠少連降志辱身矣却將湖海換西施湖海當謂越國分封之地國語范蠡反至五湖辭於王曰臣不復入越國矣王曰子聽吾言與子分國不聽吾言身死妻子為戮蠡曰君行制臣行意遂乘輕舟以浮於五湖杜牧之詩云西子下姑蘇舸逐鴟夷次韻朝無斁夏雨咫尺隔山海晉書王戎傳嘗經黃公酒壚下過曰今日視之雖近邈若山河樂天詩懶慢不相訪隔街如隔山作書問如何老杜詩道甫問訊今何如蟻垤既畜糧蛙窟如鳴鼉淮南子曰蟻知為垤鳴鼉見上注張籍詩天欲雨有東風南溪白鼉鳴窟中積暑復一雨斧斫仍手摩斧斫手摩夲俗間語鈎窗欲懸麻老杜詩雨腳如麻未斷絶出門已橫河晉傅玄雨詩曰湍深激墻隅門庭若决河人言月離畢未必致滂沱史記有若傳孔子既沒弟子思有若狀似孔子立為師問曰孔子當行使弟子持雨具已而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離于畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨有若不能對后山意亦謂今夏之雨非必以月離畢所致東臯繁草木蘭艾不同科此亦法華經一雨所潤而諸草木各有差别之意淵明歸去來詞曰登東臯而舒嘯南史鮑昭曰丈夫豈可遂藴智能使蘭艾不辨老杜詩喧靜不同科字本出魯論驚魚畏密罟孟子注曰數罟密網也獨鳥鳴南柯何遜詩獨鳥赴行查老杜詩獨鳥怪人看異聞集載南柯夢事蓋古槐南枝也稍無蟲飛喧復覺蟬語多因聲作好惡與物殊未和樂天聞早鶯詩云鳥聲信如一分别在人情卧聞夜來雨歸種故山禾老杜詩不意逺山雨夜來復何如百年須下澤後漢馬援傳援謂官屬曰吾弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御欵假馬為郡掾吏守墳墓鄉里稱善人斯可矣萬里付長羅漢書常惠護烏孫兵擊凶奴克獲封長羅侯先生斷百好尚以詩作魔樂天詩惟有詩魔降未得每逢風月一間吟傳燈録兖州降魔禪師傳秀師問曰汝翻作魔耶縮子萬言手聽渠七字哦太白與韓荆州書云日試萬言倚馬可待縮手見上注退之詩夜夢神官與我言羅縷道妙角與根壯非少者哦七言六字常語一字難語一作言室邇人則逺詩云其室則邇其人甚逺燕默勞者歌文選謝叔源詩曰悟彼蟋蟀唱聽此勞者歌注韓詩曰伐木廢則朋友之道缺勞者歌其事思君得老瘦文選古詩曰思君令人老歲月忽已晚老杜云所向泥活活思君令人瘦觸熱生積痾言思君欲往又畏暑而不能行也老杜詩觸熱生病根後漢竇融傳曰是生積痾不得遂瘳寄無斁敬問朝夫子官池幾許深文選夏侯湛東方朔畫贊曰敬問墟墳長沙法帖有云王珉敬問官池見上注已應飛鳥下列子曰海上之人有好漚鳥者每旦之海上從漚鳥遊漚鳥之至者數百而不止其父曰吾聞漚鳥皆從汝遊汝取來吾玩之明日之海上漚鳥舞而不下此詩言飛鳥下以見無斁忘機之意漢昭帝紀黃鵠下建章宫太液池復作卧龍吟晉書習鑿齒傳曰西望隆中想卧龍之吟按蜀志諸葛亮傳亮躬耕隴畒好為梁父吟徐庶謂先主曰諸葛孔明者卧龍也此詩借用以言無斁髙卧吟嘯要非池中物也老杜詩風雨時時龍一吟待我中痾愈魯直詩百痾從中來同君把臂臨老杜詩臨江把臂難再得泥塗無去馬退之書云泥水馬弱不敢出不果鞠躬親問而以書悚息尤深老杜詩去馬來牛不復辨夏木有來禽唐李嘉祐詩云隂隂夏木囀黃鸝此引用以寄鶯鳴求友之意來禽見上注次韻别張藝叟中年為别更堪頻中年别見上注四海為家託一身老杜詩有無家别此别時須問生死孰知詩力解窮人老杜詩此别還須各努力漢書蒯通傳曰使人候問其死生退之詩行當掛其冠生死一相訪詩窮見上注宿深明閣二首窈窕深明閣晴寒是去年老將灾疾至樂天詩性將時共背病與老俱來灾疾見上注人與歲時遷此句屬魯直紹聖初言者以神宗實録多失實召魯直至陳留問狀因寓佛寺題其所居為深明閣自此遂謫黔中老杜詩甘與歲時遷默坐元如在退之詩默坐念語笑元如在謂神交心契如在其前孤燈共不眠文選謝惠連詩孤燈暖幽幔老杜詩燈影照無睡又詩不眠瞻白兔莫年身萬里賴有故人憐魯直與張叔和書云某至黔州將一月矣曹守張倅相待如骨肉時曹譜伯逹守黔中張兟茂宗作倅皆京洛人老杜云鏡中衰謝色萬一故人憐又縹眇金華伯人間第一人金華伯謂魯直按葛洪神仙傳云黃初平年十五家使牧羊有道士將至金華山居石室中四十餘年其兄初起行索初平初平叱白石皆起成羊文選海賦云神仙縹眇劇談連晝夜史記淳于髠傳一語連三日三夜無倦世說衛玠與謝琨達旦微言因病篤應俗費精神應俗見上注老杜詩應接喪精神王介甫詩可憐無益費精神按楊雄解嘲曰但費精神於此而煩學者與彼時要平安報老杜詩夕烽來不近每日報平安反愁消息真老杜詩反畏消息來寸心亦何有又云難知消息真墻根霜下草又作一番新此句蓋有所指退之詩曰白露下衆草蕭蘭共憔悴青青西墻下已復生滿地又詩墻根菊花可沽酒東山謁外大父墓土山宛轉屈蒼龍下有槃槃蓋世翁槃槃見上注漢書項羽傳力拔山兮氣蓋世萬木刺天元自直文選張平子南都賦曰森䔿䔿而刺天叢篁侵道更須東老杜詩叢篁低地碧樂天古原草詩曰逺芳侵古道齊民要術曰竹性愛西南引諺云東家種竹西家治地此言更須東謂自已侵道不須復東引也百年富貴今誰見一代功名託至公龐丞相墓志銘蓋司馬溫公所作曽子固謝歐陽舍人撰先大父志銘書曰後之作銘者苟託之非人則書之非公與是不足以行世而傳後少日拊頭期類我文選沈約詩平生少年日後漢吳祐傳父恢拊其首曰吳氏世不乏季子矣楊子曰螟蛉之子殪而逢果裸曰類我類我久則肖之矣拊頭字見魏志劉廙傳莫年垂淚向西風王介甫詩莫年垂淚對桓伊次韻朝無斁冬夜見寄寒窗冷夜欲生塵短枕長衾却自親按唐書讓皇帝傳玄宗友悌嘗製大衾長枕將與諸王共之后山意謂索居離羣衾枕特自親而已老子形骸從薄暮此句后山自道後漢馬援傳頗哀老子使得遨遊文選豫章行曰促促薄暮景亹亹鮮克榮李善注云景之薄暮喻人之將老也先生意氣尚青春此句以屬無斁文選潘尼贈陸機詩豫涉素秋子登青春李善注云素秋喻老青春喻少也覆杯不待回丹頰言不借紅於醉面也覆杯見上注危坐猶能作直身後漢書茅容避雨樹下危坐愈恭孟郊詩爰得曲身成直身城郭山林兩無得暮年當復幾霑巾言出處皆不如志可為流涕也歐公集古録跋韓退之題名曰謂著山林與著城郭無異等語宜為退之之言按今世所傳退之與大顛書云苟非所戀著則山林間寂與城隍無異寒夜有懷朝無斁同好共城郭十日不一顧老杜詩可恨鄰里間十日不一見顔色人事雖好乖淵明答龐參軍詩序曰人事好乖便當語離吾生亦多忤老杜詩人事多錯忤與君永相望闔門對妻子歲月不可度文選曹子建表曰四節之㑹塊然獨處左右惟僕隸所對惟妻子髙談無所與陳發義無所與展老杜詩劒南歲月不可度漢書谷永傳曰闔門髙枕閉目寧用遮言廢書不觀也傳燈録僧問藥山何故看經山云且圖遮眼停杯仍下筯言雖止酒尚能強飯李太白詩停杯投節不能食拔劒四顧心茫然何曽日食萬錢猶言無下筯處獨無區中緣區中緣見上注又李太白詩曰杳無區中緣永懷巖下趣老杜詩盛論巖中趣平生三徑資安得一朝具三徑資見上注萬里初歷塊前驅告曛暮言出仕未幾而遽得罪謝靈運詩朝遊窮曛黑歸懷屬有思退之秋懷詩丈夫屬有念事業無窮年棄世不待怒莊子曰夫欲免為形者莫如棄世棄世則無纍老境厭逶遲人情費將護禮記六十耆指使疏引賀瑒云耆至也至老之境也文選江淹别賦曰車逶遲於山側注云逶遲少留貌向來張長公吾亦從兹去漢書張釋之傳子摯字長公官至大夫不能取容當世遂不仕漢髙祖紀曰吾亦從此逝矣燈花頻作喜老杜詩燈花何太喜月色正可步老杜詩思家步月清宵立預恐何水曹明朝有新句梁何遜為水部除夜七十已強半所餘能幾何退之詩年皆過半百來日苦無多老杜詩百年能幾何唐托言崔櫓梅花詩云強半瘦因前夜雪懸知暮景促懸知見上注柳子厚書曰長來覺日月益促歲歲更甚更覺後生多老杜詩所謂坐深鄉里敬遁世名為纍易曰遁世無悶老杜詩踈懶為名誤退之詩士生為名纍留年睡作魔盧同守歲詩曰年去留不住年來也任他石曼卿詩曰巳為物象添詩瘦更被春隂長睡魔作魔見上注西歸端著便著便見上注老子不婆娑晉書陶侃傳曰老子婆娑正坐諸君輩王述亦曰致仕之年不為此公婆娑之事后山詩注卷第五
